      "summary": "(E) 錯誤在參數。聚焦式體外震波（focused ESWT）治療足底筋膜病變的典型參數是 **2000-3000 發、能量通量密度 0.08-0.25 mJ/mm²（medium energy）、頻率 4-5 Hz**。**4000 發過多、0.5 mJ/mm² 屬高能量（high energy，需麻醉）、10 Hz 頻率過快**，三個參數皆超出標準建議。",
      "detail": "**體外震波治療（ESWT）與足底筋膜病變**\n\n## 震波類型\n\n### 1. Focused ESWT（聚焦式）\n- **電磁式（electromagnetic）、壓電式（piezoelectric）、電液壓式（electrohydraulic）**\n- 能量**集中於一點**\n- 穿透深度：可至 12 cm\n- 能量通量密度（EFD）：\n  - Low energy：< 0.08 mJ/mm²\n  - **Medium energy**：0.08-0.28 mJ/mm² ★ 肌腱病變常用\n  - High energy：> 0.28 mJ/mm²（需局麻）\n- 典型治療：每次 **2000-3000 發**，頻率 **4-5 Hz**\n\n### 2. Radial / Defocused ESWT（發散式）\n- 氣壓式（pneumatic）\n- 能量**由淺至深發散**\n- 只能穿透 3-4 cm\n- 稱 RSWT（Radial Shock Wave Therapy）\n- 技術上非真正震波（是機械壓力波）\n- 疼痛較輕，不需麻醉\n- 典型治療：每次 **2000-4000 發**，頻率 **10-15 Hz**\n\n## 治療足底筋膜病變的參數（★ 本題核心）\n\n### 聚焦式 ESWT 標準建議\n| 參數 | 範圍 | (E) 選項 |\n|---|---|---|\n| **發數** | **2000-3000** | 4000 ✗ 過多 |\n| **能量 (EFD)** | **0.08-0.25 mJ/mm²** | 0.5 ✗ 過高（需麻醉） |\n| **頻率** | **4-5 Hz** | 10 Hz ✗ 過快（發散式才用） |\n| **療程** | 1-3 次，間隔 1-2 週 | — |\n\n### 發散式 RSWT 參數\n- 發數：2000-4000\n- 壓力：2-4 bar\n- **頻率：10-15 Hz** ← 選項 E 的 10 Hz 其實是發散式的\n- 療程：3-5 次，每週 1 次\n\n**選項 (E) 的問題**：混淆了聚焦式與發散式的參數。\n\n## 機轉 — (C) 正確\n\n### 已知的生物效應\n1. **機械作用**：\n   - 微創傷 → 誘發組織修復\n2. **破壞無髓鞘神經末梢 (unmyelinated nerve fibers)**：\n   - Substance P、CGRP 釋放減少\n   - 疼痛減輕\n3. **血管新生（neovascularization）**：\n   - 釋放 VEGF、eNOS\n   - 增加慢性肌腱病灶的血流\n4. **骨組織刺激**：\n   - 治療不癒合骨折、avascular necrosis\n5. **抗發炎效應**：\n   - 調節 NF-κB、IL-6\n\n## 臨床證據 — (A)(B) 正確\n\n### Level 1 evidence（多個 RCTs）\n- **Gollwitzer 2015 (JBJS Am)**：RCT，focused ESWT vs sham，3 個月成功率 70% vs 40%\n- **Rompe 1996, 2003**：多個 RCTs 支持\n- **Cochrane review**：中等證據支持\n\n### 成功率\n- **3 個月**：60-80%\n- **6 個月**：60-70%（持續效果）\n- **12 個月**：50-70%\n- 慢性（> 6 個月症狀）效果更好\n\n## 臨床指引 — (D) 正確\n\n### American College of Foot and Ankle Surgeons (ACFAS) 2010 Heel Pain Guideline\n- **Tier 1（保守）**：NSAIDs、伸展、鞋墊、副木\n- **Tier 2（進階保守）**：\n  - **ESWT**\n  - 類固醇注射\n  - 夜間副木\n- **Tier 3**：手術（筋膜切開、endoscopic plantar fascia release）\n\n### 美國 FDA 已核准 ESWT 治療\n- **Plantar fasciitis**（2000）\n- **Lateral epicondylitis**（2002）\n- 其他 off-label 使用：Achilles tendinopathy、patellar tendinopathy、rotator cuff calcific tendinitis、non-union fractures\n\n## 禁忌症\n\n- 懷孕（特別於骨盆區）\n- 凝血異常、抗凝藥使用\n- 感染、開放傷口\n- 腫瘤\n- 心律節律器（使用電磁式時）\n- 小孩（生長板）\n- 肺組織（氣胸風險）\n\n## 聚焦式 vs 發散式簡表\n\n| 項目 | Focused | Radial |\n|---|---|---|\n| 穿透深度 | 深（up to 12 cm） | 淺（3-4 cm） |\n| 能量 | 高 | 低 |\n| 發數 | 2000-3000 | 2000-4000 |\n| 頻率 | 4-5 Hz | 10-15 Hz |\n| 麻醉 | high energy 需要 | 不需 |\n| 價格 | 高 | 低 |\n| 適應 | 深層肌腱、骨病灶 | 淺表肌筋膜 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 19 \"Physical Agent Modalities\"", "url": null },

      "summary": "(B) 錯誤在「相反極性」。離子導入的基本原理是**同性相斥**：要將藥物推入組織，必須將**帶電離子置於與自身相同極性的電極下**。例如類固醇（dexamethasone, phosphate-containing）帶**負電**，應置於**陰極（cathode, negative electrode）**，被陰極排斥後導入組織。「相反極性」會吸附藥物而非推送進去。",
      "detail": "**離子導入法（Iontophoresis）**\n\n## 原理\n\n利用**直流電（DC, galvanic current）**驅動**帶電離子**穿過皮膚進入深層組織。\n\n### 核心原理（★）\n**同性相斥（like charges repel）**：\n- **正離子** → 置於 **陽極（+, anode）** → 被陽極排斥推入組織\n- **負離子** → 置於 **陰極（-, cathode）** → 被陰極排斥推入組織\n\n### (B) 為什麼錯誤？\n- 選項說「塗於**相反極性**的電極」\n- 若正離子放在陰極：會被陰極**吸引而留在電極上**，無法推入組織\n- 正確：**相同極性**\n\n## 皮膚穿透的路徑\n\n- **汗腺（sweat ducts）**：主要路徑，電流阻抗低\n- **毛囊（hair follicles）**\n- **皮膚破損處**：電流阻抗極低，藥物易穿透\n- 一般完整角質層：主要阻擋屏障\n\n**(C) 正確**：汗腺與破損皮膚穿透力較好。\n\n## 標準參數\n\n| 參數 | 範圍 |\n|---|---|\n| 電流強度 | **1-4 mA**（注意！不是 10-30 mA） |\n| 劑量 | **40-80 mA·min**（標準 40 mA·min） |\n| 治療時間 | **10-40 分鐘**（常見 15-20 分鐘） |\n| 電極 | Active + Dispersive |\n\n**(D) 選項爭議**：\n- 治療時間 15-20 分鐘：合理\n- 「10-30 毫安培」：部分文獻有爭議，多數標準是 **1-4 mA**；10-30 mA 可能指「累積劑量」 mA·min 而非「電流強度」\n- 本題官方答案 (B)，表示 (D) 被視為可接受\n\n## 常用藥物與極性\n\n| 藥物 | 極性 | 置於電極 | 用途 |\n|---|---|---|---|\n| **Dexamethasone phosphate** | **負（−）** | **陰極** | 肌腱炎、關節炎 |\n| **Hydrocortisone** | 正/中性 | 陽極 | 發炎 |\n| **Lidocaine** | **正（+）** | **陽極** | 局部麻醉 |\n| **Acetic acid** | 負（−） | 陰極 | **Calcific tendinitis**（溶解鈣化） |\n| **Iodine** | 負（−） | 陰極 | 疤痕、沾黏 |\n| **Salicylate** | 負（−） | 陰極 | 鎮痛 |\n| **Magnesium sulfate** | 正（+） | 陽極 | 肌肉放鬆 |\n| **Zinc** | 正（+） | 陽極 | 潰瘍、傷口癒合 |\n\n## 臨床應用 — (E) 正確\n\n### 常見疾病\n- **肌腱炎**（Achilles、supraspinatus、patellar）\n- **Lateral epicondylitis**\n- **Plantar fasciitis**\n- **Carpal tunnel syndrome**\n- **Postherpetic neuralgia**（用局麻 + 類固醇）\n- **Calcific tendinitis**（醋酸溶解鈣）\n- **TMJ dysfunction**\n- **疤痕、沾黏**\n\n### 優勢\n- 避免全身副作用（口服、注射類固醇）\n- 無針、無痛（相對）\n- 可居家 / 門診\n\n## 禁忌症\n\n- 皮膚破損、感染\n- 心律節律器（需評估）\n- 對藥物過敏\n- 金屬植入（局部）\n- 懷孕（腹部）\n- 感覺缺損（無法感受燒灼）\n- **急性受傷 48 小時內**（可能加重發炎）\n\n## 副作用\n\n- **化學灼傷（chemical burn）**：最常見，尤以陰極下（產生 NaOH）\n- 皮膚紅斑、癢\n- 短暫麻木\n- 極少過敏反應\n\n## Iontophoresis vs Phonophoresis\n\n| | Iontophoresis | Phonophoresis |\n|---|---|---|\n| 驅動力 | 直流電 | **超音波** |\n| 藥物條件 | 帶電離子 | 不必帶電 |\n| 深度 | 較淺 | 較深 |\n| 適應 | 表淺發炎 | 深層肌肉、肌腱 |\n\n## 考點口訣\n\n**「同性相斥才能推，相反極性只能吸」**\n\n陰（−）推 Dexa、陽（+）推 Lido",

    "question": "下列有關手法矯治的論述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "滑液關節 (synovial joints) 的動作可分為「生理動作 (physiologic movements)」與「關節內活動 (joint play)」兩種。生理動作是人們肉眼可見的動作，而關節內活動通常肉眼不能發現" },
      { "key": "B", "text": "當一個關節發生「生理動作」時，一定會伴隨「關節內活動」" },
      { "key": "C", "text": "關節鬆動術 (mobilization) 與快扳手法 (impulse 或 thrust) 是以被動的方式突破「關節內活動」的限制界限，當「關節內活動」的動態改善，「生理動作」亦會隨之改善" },
      { "key": "D", "text": "臨床可應用 Kaltenborn 提出的凹凸規則 (concave-convex rule)，當關節近心端的關節面是凹面，遠心端的關節面是凸面時，鬆動的施力方向應與活動受限的方向相同" },
      { "key": "E", "text": "冰凍肩造成肩盂肱骨關節的外展動作受限，要增加外展的角度，手法治療應先增加肱骨頭的向下滑動" },

    "answer": "D",
    "explanation": {
      "summary": "(D) 錯誤在施力方向。**Kaltenborn 凹凸規則**：若**移動端是凸面**（如肱骨頭、股骨頭），**滑動方向與骨頭運動方向相反（opposite）**；若**移動端是凹面**（如脛骨近端），**滑動方向與骨頭運動方向相同（same）**。本選項的情境「近端凹、遠端凸（肩盂-肱骨、髖臼-股骨）」屬於「凸面移動」→ 滑動方向**相反**於活動受限方向，非「相同」。",
      "detail": "**關節手法治療（Manual Therapy / Joint Mobilization）**\n\n## 關節動作分類\n\n### 1. Physiologic Movement（生理動作）\n- 肉眼可見的動作\n- 病人可主動做出\n- 例：屈曲、伸展、外展、內收、旋轉\n\n### 2. Accessory Movement / Joint Play（關節內活動）\n- **肉眼不可見**\n- 病人**無法主動**做出（只能被動）\n- 包括：\n  - **Roll**（滾動）\n  - **Glide / Slide**（滑動）\n  - **Spin**（旋轉）\n  - **Distraction**（牽開）\n  - **Compression**（擠壓）\n\n→ (A) 正確\n\n## Roll-Slide 的配合（★ 核心概念）\n\n當關節做生理動作時，關節面必須同時產生：\n- **Rolling**（一點對一點的滾動）\n- **Sliding / Gliding**（一點對多點的滑動）\n\n→ (B) 正確：生理動作必伴隨 joint play\n\n## Kaltenborn 凹凸規則（Concave-Convex Rule）★ 本題關鍵\n\n### 核心原則\n**Slide 的方向取決於「移動端」是凹面還是凸面**：\n\n### 1. Convex-on-Concave（凸面移動）\n- **肱骨頭在肩盂上** ← 典型例\n- **股骨頭在髖臼上**\n- **肱骨遠端在尺橈骨上**\n\n→ **Slide 方向與骨運動方向相反（opposite）**\n\n**例：肩關節外展**\n- 肱骨向**上**運動\n- 但肱骨頭（凸面）在肩盂（凹面）上必須**向下滑動**，否則會撞擊肩峰\n- → 手法：**向下滑動肱骨頭** ✓ （這就是選項 E 正確的原理）\n\n### 2. Concave-on-Convex（凹面移動）\n- **脛骨近端在股骨髁上** ← 膝屈伸時\n- 中節指骨在近節指骨頭上\n\n→ **Slide 方向與骨運動方向相同（same）**\n\n**例：膝屈曲**\n- 脛骨向**後**運動\n- 脛骨（凹面）在股骨髁（凸面）上**向後滑動**\n- → 手法：**向後滑動脛骨**\n\n## (D) 為什麼錯誤？\n\n選項設定「近端凹、遠端凸」：\n- 近端 = 肩盂（凹）\n- 遠端 = 肱骨頭（凸）\n- **移動端是凸面（遠端）**\n\n→ 應用規則：**Convex-on-Concave**\n- **Slide 方向 = 與骨運動方向「相反」**\n- 選項卻寫「**相同**」→ ✗\n\n**正確敘述應為**：\n\n> 當移動端（遠心端）是凸面時，鬆動的**滑動方向**應與活動受限的**骨運動方向「相反」**。\n\n## 冰凍肩的手法應用 — (E) 正確\n\n肩盂肱骨關節：\n- **肩盂（glenoid）= 凹**\n- **肱骨頭 = 凸**\n- 肩外展 → 肱骨向上運動\n- 凸面規則 → **肱骨頭向下滑動**\n\n**手法**：\n- **Inferior glide of humeral head**（向下滑動）\n- 可改善外展受限\n- 常用 Grade III-IV mobilization（Maitland 分級）\n\n## Mobilization vs Thrust（Manipulation）\n\n### Grade of Mobilization（Maitland 分級）\n| Grade | 振幅 | 位置 | 用途 |\n|---|---|---|---|\n| **I** | 小 | 可動範圍起始處 | **止痛**（急性期） |\n| **II** | 大 | 中段可動範圍 | 止痛 |\n| **III** | 大 | 可動範圍末段 | **增加活動度** |\n| **IV** | 小 | 可動範圍末段 | **增加活動度** |\n| **V (Thrust)** | 快速小幅 | 超越可動末段 | **關節操弄** |\n\n### Grade of Mobilization（Kaltenborn 分級）\n| Grade | 描述 |\n|---|---|\n| I | Loosen（移除關節壓力） |\n| II | Tighten（移除組織鬆弛） |\n| III | Stretch |\n\n## 手法治療的適應與禁忌\n\n### 適應\n- 關節僵硬（ROM 受限）\n- 關節內疼痛\n- 肌肉僵硬（次要）\n- 神經根刺激（謹慎）\n\n### 禁忌\n- 骨折、脫位未處理\n- 骨質疏鬆嚴重\n- 腫瘤、感染（局部）\n- 急性發炎\n- 椎動脈功能不全（頸椎操弄）\n- Down syndrome（atlantoaxial instability）\n- 凝血異常\n\n## 考點口訣\n\n**凸面反向、凹面同向**\n\n- **Convex moves → Opposite slide**\n- **Concave moves → Same direction slide**\n\n（原題目只有 A-E 五個選項，我刪去了 F 佔位符）",
      "sources": [

        { "text": "Hengeveld E, Banks K. Maitland's Peripheral Manipulation: Management of Neuromusculoskeletal Disorders. 5th ed. Elsevier, 2013", "url": null }
      ]

      "detail": "**Charcot-Marie-Tooth Disease / HMSN（遺傳性感覺運動神經病變）**\n\n## HMSN 分類（★ 核心考點）\n\n### HMSN I (CMT1) — **去髓鞘型（demyelinating）**\n- **最常見**（占所有 CMT 約 50%）\n- 自體顯性\n- **基因**：\n  - **CMT1A（最常見）**：PMP22 基因重複（17p11.2）\n  - CMT1B：MPZ\n  - 其他\n- **發病**：兒童至青少年（通常 < 20 歲）\n- **NCS 特徵**：\n  - **神經傳導速度（CV）明顯下降**：**< 38 m/s** 於上肢正中/尺神經\n  - Amplitude 也下降\n  - **Uniform slowing**（均勻減速）\n  - F-wave 延長\n- **病理**：Onion bulb formation（洋蔥皮狀）\n- Nerve enlargement（可觸摸到肥大的神經）\n\n### HMSN II (CMT2) — **軸突型（axonal）** ★ 本題\n- 第二常見（約 20-40%）\n- 自體顯性為主\n- **基因**：MFN2（最常見）、NEFL、GDAP1 等\n- **發病**：較晚（青少年至成年）\n- **NCS 特徵**：\n  - **CV 正常或輕微下降**（通常 > 38 m/s）\n  - **Amplitude 明顯下降** ★\n  - 表現以運動神經元軸突損傷為主\n- **臨床**：\n  - 和 CMT1 相似（pes cavus、垂足、反覆扭傷）\n  - 感覺障礙通常較 CMT1 輕\n  - 症狀進展相對緩慢\n\n### HMSN III (Dejerine-Sottas Syndrome)\n- **最嚴重、罕見**\n- **嬰兒期**發病（< 2 歲）\n- 自體隱性或新突變\n- **基因**：PMP22、MPZ、EGR2（點突變）\n- **NCS**：CV **極低**（< 10 m/s）\n- 常需輪椅，壽命縮短\n\n### HMSN IV (Refsum's Disease)\n- **Phytanic acid 代謝異常**\n- 自體隱性\n- **基因**：PHYH\n- **四聯徵**：\n  1. **Retinitis pigmentosa**（視網膜色素變性）\n  2. **慢性多發性神經病變**\n  3. **小腦共濟失調**\n  4. **血中 phytanic acid 升高**\n- 治療：低 phytanic acid 飲食（避免乳製品、反芻動物肉、魚油）\n\n### HMSN V-VII\n- V：with spastic paraplegia\n- VI：with optic atrophy\n- VII：with retinitis pigmentosa\n\n### Roussy-Levy Syndrome\n- 曾被視為 CMT 的變異型\n- 現歸類為 **CMT1 的 subtype**\n- 特徵：典型 CMT + **essential tremor**（特發性震顫）\n- 遺傳：自體顯性，PMP22 duplication\n\n## 本題分析\n\n### 病人資料\n- 25 歲男性\n- **青少年發病** → 符合 CMT1 或 CMT2\n- 步態不穩、反覆踝扭傷 → 典型 CMT\n- **高弓足（pes cavus）** → CMT 標誌\n- **遠端肌萎縮、近端保留** → 典型「Stork legs / inverted champagne bottle」外觀\n- 輕度感覺喪失\n\n### NCS 結果（關鍵）\n- **Amplitude 下降** → 軸突損傷\n- **CV 輕微下降** → **非 demyelinating**\n\n→ **典型軸突型 CMT → HMSN II (CMT2)**\n\n## 快速鑑別表\n\n| 特徵 | HMSN I (CMT1) | **HMSN II (CMT2)** | HMSN III |\n|---|---|---|---|\n| 病理 | Demyelinating | **Axonal** ★ | 嚴重去髓鞘 |\n| 發病年齡 | 兒童-青少年 | 青少年-成年 | 嬰兒 |\n| CV | < 38 m/s (明顯慢) | **> 38 m/s 或正常** ★ | < 10 m/s |\n| Amplitude | 下降 | **顯著下降** | 極低 |\n| 臨床嚴重度 | 中等 | 中等 | 重 |\n| 可觸摸神經肥大 | 常見 | 少 | 常見 |\n| 常見基因 | PMP22 | MFN2 | PMP22, MPZ |\n\n## 臨床特徵（所有 CMT 共通）\n\n### 下肢\n- **Pes cavus**（高弓足）★\n- **Hammer toes**\n- **Foot drop**（腓神經無力）\n- 反覆踝扭傷\n- **Stork legs** / inverted champagne bottle 外觀（遠端萎縮）\n- 跟腱反射消失\n\n### 上肢（較晚出現）\n- 手內在肌萎縮（claw hand）\n- 精細動作退步\n\n### 感覺\n- 遠端 glove-stocking 感覺下降\n- **本體感覺、震動覺**受影響較明顯\n\n## 復健處方（考點）\n\n- **AFO**（處理 foot drop）★ 最常用\n- Custom 鞋墊（高弓足支撐）\n- 腳趾矯形\n- 物理治療（伸展、強化）\n- 職能治療（精細動作代償）\n- **避免使用 vincristine、大劑量 B6、某些化療藥**（可能加重症狀）\n- 基因諮詢",

      "detail": "**ICU-Acquired Weakness（ICUAW）**\n\n## 定義與分類\n\nICUAW 是一組**在加護病房發生**、無其他病因可解釋的**對稱性肢體無力**，涵蓋：\n\n1. **Critical Illness Polyneuropathy (CIP)**：周邊神經軸突病變\n2. **Critical Illness Myopathy (CIM)**：肌肉病變\n3. **Combined CIP/CIM (CRIMYNE)**：兩者並存（最常見）\n\n## 危險因子\n\n- **敗血症 / SIRS / 多重器官衰竭** ★\n- **機械通氣 > 7 天**\n- **高劑量 IV 類固醇**（特別與 NMBA 併用）\n- **神經肌肉阻斷劑（NMBA）使用**\n- 高血糖（研究顯示強化血糖控制可降低 CIP 發生率）\n- 高齡\n- 女性\n- 重症嚴重度（APACHE II、SOFA 高分）\n- 長期臥床與不活動\n\n## 病理機轉（★）\n\n### CIP（神經）\n- **軸突退化（axonal degeneration）** ★ 不是 demyelination\n- 細胞激素、自由基損傷微血管\n- 神經能量代謝失衡\n- 離子通道病變\n- **SOMA（sensory-motor axonal neuropathy）**\n\n### CIM（肌肉）\n- Thick filament loss（myosin heavy chain 選擇性喪失）\n- 肌膜電興奮性降低\n- 肌細胞能量失衡\n- **類固醇 + NMBA 為已知誘因**\n- 三種亞型：\n  - Cachectic myopathy（消瘦型）\n  - Thick filament myopathy\n  - Necrotizing myopathy\n\n### 選項 (B) 為什麼錯誤？\n- 「非炎症性**去髓鞘化**」描述錯誤\n- CIP 是 **axonal（軸突型）**，不是 demyelinating\n- 若是去髓鞘，應為 AIDP（Guillain-Barré）\n\n## 臨床表現\n\n### 典型特徵\n- **對稱性、近端 > 遠端肢體無力**\n- 四肢反射減弱 / 消失\n- 軀幹肌無力（呼吸肌）\n- **臉部肌肉通常保留**（CIM、CIP 皆如此）\n- **感覺通常正常** ← 與 AIDP 區別\n- **意識通常清楚**\n- **無法脫離呼吸器** → 臨床線索之一\n\n### 選項 (C) 為什麼錯誤？\n- CIM 會有**明顯肌肉萎縮**\n- 病人臥床、蛋白質流失、廢用性萎縮\n- 「不會有明顯萎縮」敘述錯誤\n\n## 電生理檢查 — (D) 正確\n\n### 核心：區分 CIP vs CIM vs 兩者並存\n\n### Nerve Conduction Study (NCS)\n- **CIP**：\n  - CMAP 振幅 **顯著下降**\n  - SNAP 振幅 **下降**（< 80% normal）\n  - CV 正常或輕微下降（軸突型特徵）\n- **CIM**：\n  - CMAP 振幅下降\n  - **SNAP 正常** ★ 區分關鍵\n- **兩者並存**：CMAP、SNAP 皆下降\n\n### Needle EMG\n- Spontaneous activity（fibs, PSW）\n- Short duration, low amplitude MUPs（CIM 典型）\n- Early recruitment\n\n### Direct Muscle Stimulation (DMS) — 最準確的鑑別方法\n- **CIP**：神經刺激 CMAP 下降，但直接肌肉刺激 **正常**（因為肌肉完好）\n- **CIM**：神經刺激與直接肌肉刺激**都下降**（因為肌肉本身有問題）\n- Ne/Mu ratio：\n  - CIP：< 0.5（神經有問題）\n  - CIM：> 0.5（肌肉有問題）\n\n### CK（肌酸激酶）\n- **CIM 急性期可升高**（但非必然）\n- CIP 通常正常\n- 連續監測可反映病程\n\n## 診斷標準（Stevens 2009）\n\n所有條件符合：\n1. 在重症後出現的全身無力\n2. 無力為對稱性、遲緩性、涵蓋肢體\n3. MRC < 48/60（平均 < 4/5）\n4. 依賴呼吸器（無其他原因可解釋）\n5. 排除其他原因\n\n## 鑑別診斷\n\n| 疾病 | 特徵 |\n|---|---|\n| **AIDP (GBS)** | 升序無力、有感覺異常、CSF 蛋白增高、**demyelinating** |\n| **MG（重症肌無力）** | 波動、眼肌受侵、Tensilon test (+) |\n| **Botulism** | 下降麻痺、自主神經症狀 |\n| **MND** | 上下運動神經元徵象、肌萎縮性、進行性 |\n| **Porphyria** | 腹痛、精神症狀 |\n| **Hypokalemic paralysis** | 低血鉀 |\n\n## 預後\n\n### 恢復\n- CIM 較 CIP 恢復快\n- 多數數週至數月恢復\n- 部分嚴重者數月至數年\n- 約 30% 長期功能障礙\n\n### 長期後遺症\n- 慢性肌無力\n- 步態異常\n- **多發性神經病變（非特定神經）**\n- 認知功能問題\n- 心理影響（PTSD、憂鬱）\n\n### 選項 (E) 為什麼錯誤？\n- 長期影響**不是脛神經專屬**\n- CIP 為廣泛性軸突神經病變，影響所有長神經\n\n## 預防與治療\n\n### 預防\n- **早期活動（early mobilization / ICU rehab）** ★\n- **避免過度鎮靜**\n- **血糖控制**\n- 避免不必要的 NMBA、類固醇\n- 營養支持\n\n### 治療\n- 尚無特效藥\n- **復健為核心**：\n  - 被動活動 → 主動活動\n  - 肌力訓練\n  - 呼吸訓練（脫離呼吸器）\n  - 站立、轉位、步行\n- 治療原發病\n\n## 本題答案速覽\n\n| 選項 | 正確/錯誤 | 原因 |\n|---|---|---|\n| (A) | ✗ | AIDP 應有感覺症狀、病史不合 |\n| (B) | ✗ | CIP 是 **axonal**，不是 demyelinating |\n| (C) | ✗ | CIM 有明顯萎縮 |\n| **(D)** | **✓** | **CK + 連續電生理監測病程** |\n| (E) | ✗ | 長期影響非脛神經專屬 |",

      "detail": "**中樞性中風後疼痛（Central Post-Stroke Pain, CPSP）**\n\n## 定義與流行病學\n\n- 又稱 **Dejerine-Roussy syndrome**（病灶在丘腦時）\n- 中風後發生率：**1-12%**（平均約 8%）\n- **丘腦出血/梗塞後**：發生率最高（約 25-50%）\n- 多發生於中風後 **數週至數個月內**（中位數 3 個月）\n- 部分在中風後數年才發生\n\n## 機轉\n\n### 解剖\n- **Spinothalamocortical pathway**（脊髓-丘腦-皮質徑路）沿途任何損傷皆可能造成 CPSP\n- 最常見病灶位置：\n  1. **丘腦 VPL / VPM**（最經典，Dejerine-Roussy syndrome）\n  2. **腦幹外側**（外側延腦，Wallenberg syndrome）\n  3. 皮質（頂葉、島葉、次級感覺皮質）\n  4. 皮質下白質\n\n### 病理生理\n- 中樞性 disinhibition（抑制喪失）\n- 神經可塑性異常重組\n- NMDA 受體過度活化\n- Central sensitization\n- 交感神經-體感神經異常連結\n\n## 臨床表現\n\n### 疼痛性質（★ 關鍵考點）\n\n| 病灶位置 | 主要疼痛性質 |\n|---|---|\n| **丘腦（特別 VPL）** | **Burning（灼熱）** ★ |\n| 皮質 / 皮質下 | **Pricking（刺痛）、shooting（刺電感）** |\n| 延腦外側（Wallenberg） | 同側面部 + 對側肢體 |\n\n→ (D) 選項說「**皮質或皮質下病灶以灼熱感最常見**」方向錯誤。\n\n### 其他特徵\n- **疼痛區域 < 感覺缺損區域** → (C) 正確\n  - 例如：感覺喪失整個對側半身，但疼痛只在手掌或腳\n- **Allodynia**（異位痛）\n- **Hyperalgesia**（痛覺過敏）\n- **Hyperpathia**（延遲、誇大的痛覺反應）\n- 冷刺激特別誘發\n- 情緒壓力加重\n\n### Wallenberg Syndrome 與 CPSP\n- 外側延腦梗塞\n- **同側面部、對側軀幹/肢體**感覺障礙（交叉性 crossed）\n- 若演變為 CPSP，疼痛分佈亦呈**交叉性** → (B) 正確\n\n## 診斷\n\n**CPSP 必要條件**（Klit 2009）：\n1. 中風病史\n2. 疼痛分佈符合中風病灶\n3. 有感覺症狀/徵象\n4. 排除其他疼痛原因\n5. 影像學證實中風病灶\n\n## 治療\n\n### 第一線：抗癲癇 / 抗憂鬱藥\n\n**三環抗憂鬱劑（TCA）**\n- **Amitriptyline**：首選\n  - 起始劑量 10-25 mg/晚\n  - 漸增至 75-100 mg\n  - **通常第 2 週開始顯效** → (E) 正確\n- 副作用：嗜睡、口乾、便秘、姿勢性低血壓\n\n**抗癲癇藥**\n- **Pregabalin** 150-600 mg/天（Vranken 2008）\n- **Gabapentin** 1800-3600 mg/天\n- Lamotrigine、Carbamazepine\n\n**SNRI**\n- Duloxetine、Venlafaxine\n\n### 第二線\n- Tramadol、opioids（慎用）\n- Lidocaine 貼片（局部 allodynia）\n- 針灸\n\n### 介入性治療（頑固型）\n- **Motor cortex stimulation (MCS)**\n- **Deep brain stimulation (DBS)**\n- **rTMS**：運動皮質\n\n## 考點速記\n\n| 項目 | CPSP 重點 |\n|---|---|\n| 最常病灶 | 丘腦 VPL / VPM |\n| 同義詞 | Dejerine-Roussy syndrome |\n| 丘腦型疼痛性質 | Burning（灼熱） |\n| 皮質型疼痛性質 | Pricking, shooting |\n| 疼痛區 vs 感覺缺損區 | 疼痛區 **較小** |\n| 第一線藥物 | Amitriptyline, Pregabalin, Gabapentin |\n| TCA 起效時間 | 約 2 週 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 18 \"Chronic Pain\" + Ch. 44 \"Stroke\"", "url": null },

        { "text": "Vranken JH et al. Pregabalin in patients with central neuropathic pain: a randomized, double-blind, placebo-controlled trial of a flexible-dose regimen. Pain 2008;136:150", "url": "https://pubmed.ncbi.nlm.nih.gov/17703885/" },
        { "text": "Leijon G, Boivie J. Central post-stroke pain--a controlled trial of amitriptyline and carbamazepine. Pain 1989;36:27", "url": "https://pubmed.ncbi.nlm.nih.gov/2465530/" }
      ]

    "question": "一名 42 歲男性於兩週前因上呼吸道感染發燒數日後痊癒，近日突然出現左側肩部劇烈疼痛，影響日常活動。幾天後，病人發現左側肩部與上臂肌肉逐漸無力，無法抬高手臂。神經學檢查發現：(1) 肩部與上臂外展無力，但手部與前臂肌力相對保留 (2) 肩胛骨翼狀畸形。根據上述表現，下列何者錯誤？",

    "explanation": {
      "summary": "(B) 錯誤在「upper **subscapular** nerve」。**神經痛性肌萎縮（Parsonage-Turner syndrome / brachial neuritis）** 常影響的是 **long thoracic nerve（長胸神經，造成翼狀肩胛）+ suprascapular nerve（肩胛上神經，影響棘上/棘下肌）+ 偶爾 axillary nerve 或 anterior interosseous nerve**。「**Subscapular** nerve」並非典型受侵犯神經。",
      "detail": "**神經痛性肌萎縮（Neuralgic Amyotrophy / Parsonage-Turner Syndrome）**\n\n## 定義\n\n- 又稱：**Parsonage-Turner syndrome**、idiopathic brachial plexitis\n- 特徵：**突發劇烈肩痛 → 數日至數週後出現肌無力與萎縮**\n- 年發生率：約 1-3 / 100,000\n\n## 流行病學與誘因 — (C) 正確\n\n### 好發族群\n- 男 > 女（2:1）\n- 年齡 20-60 歲（峰值 30-40 歲）\n\n### 誘發因素（約 50% 有明確誘因）\n- **病毒感染**（感冒、腸胃道感染）★\n- **疫苗接種**（尤其破傷風、COVID-19）\n- **手術後**（特別麻醉後）\n- **外傷或激烈運動**\n- **懷孕、產後**\n- **家族性（HNA）**：SEPT9 基因突變\n\n### 雙側受侵\n- **約 1/3 病例為雙側**，但嚴重度常不對稱\n\n## 臨床表現\n\n### 典型病程（三階段）\n\n1. **急性疼痛期（數天至 4 週）**\n   - **突發、嚴重肩痛**（VAS 7-10）\n   - 夜間加劇\n   - 一般止痛劑難控制\n\n2. **肌萎縮期（疼痛減輕後 1-2 週）**\n   - 開始出現肌無力\n   - 肌萎縮\n\n3. **恢復期（數月至數年）**\n   - 漸進恢復\n\n### 最常受侵神經（★ 考點）\n\n**上臂神經叢神經**（約 70-80% 病例）：\n\n| 神經 | 支配肌 | 臨床表現 |\n|---|---|---|\n| **Long thoracic n.** ★ | Serratus anterior | **翼狀肩胛（scapular winging）** |\n| **Suprascapular n.** ★ | Supraspinatus, infraspinatus | 肩外展、外旋無力 |\n| Axillary n. | Deltoid | 肩外展無力 |\n| Musculocutaneous n. | Biceps, brachialis | 肘屈曲無力 |\n| Anterior interosseous n. | FPL, FDP I-II, PQ | OK 手勢困難 |\n| Phrenic n. | Diaphragm | 單側膈肌無力（7%） |\n\n**注意**：Subscapular nerves（upper/lower）支配 subscapularis 與 teres major，**並非神經痛性肌萎縮的典型受侵神經**。\n\n### (B) 為什麼錯誤？\n- 選項寫「long thoracic + **upper subscapular** nerve」\n- 正確應為「long thoracic + **suprascapular** nerve」\n- 兩個神經名字相近，是經典考試陷阱\n\n## 鑑別診斷\n\n| 疾病 | 特徵 |\n|---|---|\n| **Cervical radiculopathy** | 頸部活動誘發痛、皮節感覺異常 |\n| **Rotator cuff tear** | 外傷相關、無神經學缺損 |\n| **Frozen shoulder** | 漸進性 ROM 下降 |\n| **Pancoast tumor** | 肺尖腫瘤、Horner's |\n| **HNPP** | 反覆多處卡壓 |\n\n## 診斷\n\n### 電生理檢查（症狀出現 3 週後最有診斷價值）\n- **EMG**：受侵肌肉有 denervation\n- **NCS**：motor amplitude 下降\n- **感覺神經通常正常**\n\n### MRI\n- **排除結構性原因**\n- MRI neurography：神經叢發炎、T2 增強\n- Hourglass constriction 特徵\n\n## 治療\n\n### 急性疼痛期\n- **強效鎮痛**：opioids + NSAIDs\n- **類固醇**（prednisolone 60 mg × 1 週 → taper）\n  - **縮短疼痛期**\n  - **但不改變長期預後** → (D) 正確\n- 副木、頸圈\n\n### 復健（疼痛緩解後）\n- **被動 ROM → 主動**\n- **避免過早阻力訓練**\n- 翼狀肩胛代償訓練\n- 姿勢矯正\n\n### 預後 — (E) 正確\n- 1 年恢復率：60-75%\n- 2-3 年恢復率：80-90%\n- **部分病人恢復需數年**\n- 約 **25-30%** 有永久性殘餘無力\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 經典三部曲 | 急性劇痛 → 無力 → 恢復 |\n| 常見誘因 | 感染、疫苗、手術、懷孕 |\n| **最常侵犯神經** | **Long thoracic + Suprascapular** ★ |\n| 翼狀肩胛 | Long thoracic n. → Serratus anterior |\n| 急性期治療 | 類固醇（縮短痛期）+ 強效止痛 |\n| 類固醇長期影響 | **不改變自然病程** |",

    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "通常會對稱性影響上下肢遠端之感覺及運動神經" },

      { "key": "C", "text": "可能伴隨腦部病變，出現失智症、眼肌麻痺 (ophthalmoplegia) 及運動失調 (ataxia) 之症狀" },
      { "key": "D", "text": "爆量飲酒後可能同時出現肌肉疼痛、倦怠及近端肌肉無力等症狀" },

    "answer": "B",
    "explanation": {
      "summary": "(B) 錯誤在「**去髓鞘**」。酒精性神經病變的電生理特徵是**軸突型（axonal）神經病變**：**CMAP/SNAP 振幅下降，但傳導速度相對保留**。去髓鞘型變化並非其主要表現。毒性神經病變（toxic neuropathy）整體以 axonal 為主。",
      "detail": "**酒精性神經病變（Alcoholic Neuropathy）**\n\n## 流行病學\n\n- 長期酗酒者盛行率：**25-66%**\n- 每日飲酒量 > 100 g ethanol、持續數年者風險高\n- 女性所需總量較低（較脆弱）\n\n## 病因學\n\n### 多因素機制\n\n1. **酒精及其代謝物（acetaldehyde）直接毒性**\n2. **營養缺乏**：\n   - **Thiamine (B1)** → Wernicke-Korsakoff\n   - **B6, B12, folate, niacin**\n3. **氧化壓力（oxidative stress）**\n4. **慢性肝功能不全**\n\n## 臨床表現\n\n### 典型特徵 — (A) 正確\n- **對稱性**\n- **遠端 > 近端**\n- **下肢 > 上肢**（長神經先受損）\n- 感覺 + 運動神經均侵犯\n- **襪套-手套分佈**\n- 漸進發病（不同於 AIDP 之急性）\n\n### 症狀\n- **感覺異常**：麻木、刺痛、灼熱痛、本體覺異常\n- **運動無力**：足下垂、步態不穩\n- **自主神經症狀**：姿勢性低血壓、陽萎、便秘\n- 深層肌腱反射減弱（踝反射最早消失）\n\n## 電生理檢查（★ 本題考點）\n\n### 軸突型（Axonal Pattern）\n- **Amplitude 下降**（CMAP, SNAP 皆受影響）\n- **傳導速度正常或輕度下降**（通常 > 38 m/s）\n- **Needle EMG**：\n  - Fibrillation、PSW（去神經支配）\n  - Reduced recruitment\n- **下肢變化 > 上肢**\n\n### 為什麼 (B) 錯誤？\n\n| 神經病變類型 | Amplitude | CV | 代表疾病 |\n|---|---|---|---|\n| **Axonal** | **↓↓** | 正常或輕微下降 | **酒精、糖尿病、毒性、HIV** |\n| **Demyelinating** | 正常或下降 | **↓↓** | AIDP, CIDP, CMT1 |\n\n→ 酒精性屬**軸突型**，非去髓鞘型。\n\n## 相關腦部病變（合併症） — (C) 正確\n\n### 1. Wernicke Encephalopathy\n- **Thiamine（B1）缺乏**\n- **三聯徵**：\n  1. **Ophthalmoplegia / nystagmus**\n  2. **Ataxia**\n  3. **Confusion / altered mental status**\n- 治療：**立即 IV Thiamine 500 mg × 3 天**\n- 禁忌：**葡萄糖先於 thiamine**（會加重 Wernicke）\n\n### 2. Korsakoff Syndrome\n- Wernicke 治療延遲後的後遺症\n- **順行性失憶（anterograde amnesia）**\n- **虛構（confabulation）**\n- 通常**不可逆**\n\n### 3. Alcoholic Cerebellar Degeneration\n- 主要影響**小腦蚓部（vermis）**\n- 軀幹、步態共濟失調\n\n## Acute Alcoholic Myopathy — (D) 正確\n\n- 大量爆飲後（binge drinking）\n- 突發**肌肉疼痛、腫脹、倦怠**\n- **近端肌肉為主**\n- **CK 顯著上升**\n- 可能合併 rhabdomyolysis、急性腎衰竭\n- 戒酒後 1-2 週恢復\n\n## Alcohol Tremor — (E) 正確\n\n- **酒精戒斷時生理性震顫加劇**\n- 機轉：\n  - 慢性酒精抑制 NMDA 受體\n  - 戒斷時 CNS 興奮性反彈\n- 6-12 小時內出現\n- 可進展為 seizure、delirium tremens\n- 治療：**Benzodiazepine**\n\n## 治療\n\n### 1. 戒酒（最核心）\n- 多學科介入\n- 藥物（naltrexone, acamprosate, disulfiram）\n\n### 2. 營養補充\n- **Thiamine 100 mg/day**（至少 3 個月）\n- 多種 B 群\n\n### 3. 症狀控制\n- 神經病變痛：gabapentin, pregabalin, TCA\n- 平衡訓練、步態訓練\n- AFO（若垂足）\n\n### 4. 預後\n- 戒酒 + 營養補充 → 約 50-70% 病人改善\n- 完全戒酒是**唯一**能停止惡化的因素\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 分佈 | 對稱、遠端、下肢 > 上肢 |\n| **NCS 型態** | **Axonal** ★（非 demyelinating） |\n| 合併 Wernicke | Ophthalmoplegia, ataxia, confusion |\n| 急性 myopathy | Binge → 近端肌痛、CK 升高 |\n| 戒斷震顫 | 6-12 小時內出現 |\n| 治療核心 | 戒酒 + Thiamine |",
      "sources": [

        { "text": "Sechi G, Serra A. Wernicke's encephalopathy: new clinical settings and recent advances in diagnosis and management. Lancet Neurol 2007;6:442", "url": "https://pubmed.ncbi.nlm.nih.gov/17434099/" }

      "detail": "**Parkinson Disease 復健**\n\n## 疾病概述\n\n### 病理\n- **黑質（substantia nigra pars compacta）多巴胺神經元變性**\n- **Lewy body 堆積（α-synuclein）**\n- 皮質-基底核-丘腦環路功能異常\n\n### 四大動作症狀（TRAP）\n- **T**remor（休息型震顫）\n- **R**igidity（僵硬）\n- **A**kinesia / Bradykinesia（運動遲緩）\n- **P**ostural instability（姿勢不穩）\n\n### 非動作症狀（Non-motor）\n- 自主神經失調（便秘、姿勢性低血壓）\n- 睡眠障礙（RBD）\n- 嗅覺減退\n- 認知障礙、憂鬱\n- 吞嚥困難、構音障礙\n\n## 運動的神經可塑性效應 — (A)(B)(C) 正確\n\n### 1. 運動抑制疾病進展\n- **缺乏運動 → 加速神經退化** → (A) ✓\n- 每日規律運動顯著降低進展速率\n\n### 2. 分子層面\n- **增加 BDNF**（腦源性神經營養因子）\n- **促進突觸可塑性**\n- **增加被殼（putamen）內 dopamine D2 receptor 密度** → (B) ✓\n  - Fisher 2013、Petzinger 2013 研究支持\n- **增加皮質運動興奮性**\n\n### 3. 臨床效益\n- **動作症狀改善**：UPDRS-III 下降\n- **非動作症狀改善** → (C) ✓\n  - 睡眠、憂鬱、認知、疲勞、便秘\n- **跌倒減少**\n\n## 步態訓練 — (D)(E) 本題關鍵\n\n### Parkinson 典型步態問題\n- **Shuffling gait**（拖曳步）\n- **Short stride length**（步幅短）\n- **Festinating gait**（碎步加速）\n- **Freezing of gait (FoG)**\n- **Reduced arm swing**\n\n### 跑步機訓練\n- **改善步行速度、步幅**\n- **跑步機 > 地面步行**，尤其在步幅（Mehrholz 2015 Cochrane）\n- → (D) 正確\n\n### External Cueing（外部提示）★ 本題核心\n\n提示利用**替代性神經環路**（繞過基底核）達到步態啟動。\n\n#### 1. Auditory Cueing（聽覺提示）\n- **Rhythmic Auditory Stimulation (RAS)**\n- 節拍器、音樂節奏\n- **改善步頻、步幅、步行速度** ★\n- **對整體步態參數的促進效果最佳**\n- Thaut 1996、Nieuwboer 2007 研究支持\n- **RESCUE trial** (2007)：家庭 cue 訓練 3 週顯著改善\n\n#### 2. Visual Cueing（視覺提示）\n- 地面平行線、膠帶、雷射投影\n- **主要改善步幅**\n- **對 Freezing of Gait 啟動特別有效**\n- 步頻改善效果**不如 auditory**\n\n### 為什麼 (E) 錯誤？\n\n| 提示類型 | 主要改善 | 整體步態參數 |\n|---|---|---|\n| **Auditory（聽覺）** ★ | **Cadence, stride, speed** | **最佳** |\n| **Visual（視覺）** | 步幅、FoG 啟動 | 次之 |\n\n→ (E) 選項說「視覺提示優於聽覺」方向錯誤。\n\n## 其他重要復健介入\n\n### 1. LSVT BIG\n- **High-amplitude movement training**\n- 每次 60 分鐘，每週 4 次，持續 4 週\n- 強調「放大」動作\n- 顯著改善 UPDRS-III\n\n### 2. LSVT LOUD\n- 改善構音障礙\n\n### 3. Tai Chi（太極拳）\n- NEJM 2012 RCT（Li et al.）\n- 改善平衡、姿勢穩定、跌倒率\n\n### 4. Boxing（Rock Steady Boxing）\n- 高強度間歇\n\n### 5. Dance（探戈）\n- 改善節奏感、平衡、心情\n\n## Freezing of Gait 處置\n\n1. **Visual cue**（地面線條、雷射鞋）\n2. **Auditory cue**（節拍器）\n3. **Mental imagery**\n4. 嚴重頑固性 → **DBS (STN)**\n\n## 考點總整\n\n| 運動介入 | 主要效果 |\n|---|---|\n| 規律運動 | 減緩疾病進展 |\n| 跑步機 > 地面 | 改善步幅、速度 |\n| **Auditory cueing** | **整體步態參數最佳** ★ |\n| Visual cueing | 步幅、FoG 啟動 |\n| LSVT BIG | UPDRS-III |\n| Tai Chi | 平衡、跌倒率 |",

      "detail": "**腰薦神經叢病變（Lumbosacral Plexopathy）**\n\n## 解剖\n\n### Lumbar Plexus（腰神經叢）\n- **L1-L4**（有時 T12 參與）\n- 位於 **腰大肌（psoas major）內**\n- 主要神經：\n  - **Femoral nerve** (L2-L4)\n  - **Obturator nerve** (L2-L4)\n  - Lateral femoral cutaneous (L2-L3)\n  - Iliohypogastric, Ilioinguinal, Genitofemoral\n\n### Sacral Plexus（薦神經叢）\n- **L4-S4**\n- 位於 **骨盆後壁**\n- 主要神經：\n  - **Sciatic nerve** (L4-S3)\n  - **Superior gluteal** (L4-S1)\n  - **Inferior gluteal** (L5-S2)\n  - **Pudendal nerve** (S2-S4)\n\n## 常見病因\n\n### 1. 出血（Hemorrhage） — (A) 正確\n\n**腹膜後出血（retroperitoneal hemorrhage）**：\n- 影響 **lumbar plexus**（在 psoas 內）\n- 誘因：\n  - **抗凝血劑**（warfarin, heparin）★ 最常見\n  - **血友病**\n  - **主動脈瘤滲漏**\n  - 外傷\n- 臨床：急性髖/大腿痛 + 神經缺損（股神經常受侵）\n- 診斷：CT / MRI\n- 治療：止血、逆轉抗凝、血腫引流\n\n### 2. 外傷 — (B) 正確\n\n**骨盆或髖部骨折**：\n- 主要影響 **sacral plexus**\n- **薦髂關節分離 → root avulsion**（撕脫）\n- 預後較差\n\n**Iatrogenic（醫源性）**：\n- 全髖關節置換術\n- 骨盆手術\n- 產科（難產、分娩）\n\n### 3. 腫瘤（Neoplastic） — (C)(D)(E) 考點\n\n**轉移性腫瘤**：\n- 最常見的非外傷腰薦神經叢病變\n- 來源（依頻率）：\n  1. **大腸直腸癌**（最常，直接侵犯）\n  2. **乳癌**（骨盆轉移）\n  3. **子宮頸癌、卵巢癌**\n  4. **前列腺癌**\n  5. **淋巴瘤**\n  6. **肉瘤**\n\n### 4. 放射性（Radiation-induced） ★ 本題\n\n**特徵**：\n- 骨盆放射治療（子宮頸癌、前列腺癌、直腸癌）後\n- 發病時間：**數年至數十年**（中位數 5 年）\n- 劑量相關：**> 50 Gy 風險顯著增加**\n\n## 腫瘤性 vs 放射性腰薦神經叢病變的鑑別（★ 高頻考點）\n\n| 特徵 | **腫瘤性（Neoplastic）** | **放射性（Radiation-induced）** |\n|---|---|---|\n| **側別** | **單側** ★ | **雙側** ★ |\n| **主要症狀** | **疼痛為主** | **無力為主，疼痛輕或無** |\n| 發病速度 | 較快 | 漸進、緩慢 |\n| 感覺異常 | 顯著 | 輕度 |\n| 肌束顫動 | 少 | **Myokymia（肌纖維顫搐）常見** ★ |\n| 影像 | MRI 可見腫塊 | 多無腫塊 |\n| EMG | 去神經變化 | **Myokymia discharges** |\n| 預後 | 依原發病 | 漸進惡化、不可逆 |\n\n### (E) 為什麼錯誤？\n- 放射性：**雙側對稱性**（兩側骨盆都在放射野內）\n- 腫瘤性：**單側**（通常原發側）\n- 選項顛倒描述\n\n## 其他病因\n\n### 5. 糖尿病性肌萎縮（Diabetic Amyotrophy）\n- 又稱 Bruns-Garland syndrome\n- T2DM 控制不佳老年人\n- **急性疼痛 → 單側/不對稱近端下肢無力 → 萎縮**\n- 常合併體重下降\n- 大多自行緩解（數月至 2 年）\n\n### 6. 感染\n- Lyme disease\n- HIV\n- Tuberculous psoas abscess\n\n## 臨床表現\n\n### Lumbar plexus 病變\n- 大腿前方疼痛\n- 髖屈曲、膝伸展無力\n- 股神經感覺缺損\n- Patellar reflex 消失\n\n### Sacral plexus 病變\n- 臀部、大腿後方、小腿疼痛\n- 髖伸展、膝屈曲、足踝動作無力\n- Sciatic 分佈感覺缺損\n- Ankle reflex 消失\n\n## 診斷\n\n### 神經電生理\n- NCS：分別檢查各神經\n- EMG：確認侵犯範圍\n- **Paraspinal muscle EMG**：\n  - Plexopathy：**正常**（神經叢位於脊神經節後）\n  - Radiculopathy：**異常**（脊神經節前病灶）\n- **Myokymia discharges** → 強烈提示放射性\n\n### 影像\n- **MRI**（首選）\n- MRI neurography\n\n## 考點速記表\n\n| 病因 | 侵犯部位 | 特徵 |\n|---|---|---|\n| 腹膜後出血 | Lumbar plexus | 抗凝藥、AA 破裂 |\n| 骨盆骨折 | Sacral plexus | 可能 root avulsion |\n| **腫瘤（轉移）** | **單側** | **疼痛為主**、乳癌/腸癌 |\n| **放射性** | **雙側** ★ | **無力為主，myokymia** |\n| 糖尿病肌萎縮 | Lumbar plexus | 疼痛→無力→萎縮、自行緩解 |\n| Paraspinal EMG | Plexopathy 正常 | 區分 radiculopathy |",

      "detail": "**腋神經（Axillary Nerve）**\n\n## 解剖\n\n### 起源\n- **Brachial plexus 的 posterior cord**\n- C5-C6 神經根\n\n### 走行路徑\n- 在肩胛下肌下緣\n- 通過 **quadrangular space（四邊形空間）**：\n  - 上：Teres minor\n  - 下：Teres major\n  - 內側：Triceps long head\n  - 外側：Humerus surgical neck\n- 繞肱骨外科頸（surgical neck of humerus）\n- 分為前、後兩支\n\n### 支配\n\n#### 運動\n- **Deltoid muscle**（三角肌）：\n  - Anterior：肩屈曲\n  - **Middle：肩外展（15-90°）** ★\n  - Posterior：肩伸展\n- **Teres minor**：肩外旋\n\n#### 感覺\n- **Superior lateral cutaneous nerve of arm**\n- 支配「**regimental badge area（軍徽區）**」\n  - 肩部外側、三角肌下緣以上\n  - 約手掌大小的圓形區域\n\n## 臨床：腋神經損傷\n\n### 常見病因 — (B) 正確\n\n| 病因 | 機轉 |\n|---|---|\n| **肩關節前脫位** ★ 最常 | 下移的肱骨頭拉扯腋神經 |\n| 肱骨近端骨折（外科頸） | 骨折端壓迫 |\n| 鈍挫傷 | 肩部直接撞擊 |\n| 手術併發症 | Bankart repair、關節鏡 |\n| **Quadrangular space syndrome** | 四邊形空間壓迫（運動員） |\n| 注射傷害 | 三角肌肌肉注射太深 |\n\n### 臨床表現 — (C)(E) 正確\n\n- **肩部外側感覺下降**（regimental badge area）\n- **肩外展無力**（< 90°）\n- **三角肌萎縮**\n- 肩外旋輕度無力（teres minor）\n- 嚴重時手臂自重難以抬起\n\n**重要：肩脫位後一定要檢查腋神經**\n- 檢查三角肌肌力\n- 檢查 regimental badge 感覺\n- 約 30% 的前脫位會合併腋神經傷害（老年人更高）\n\n## 神經轉移（Nerve Transfer）★ 本題關鍵\n\n### 基本原則\n**源神經（donor）必須健康 → 目標神經（recipient）受損**\n\n### 腋神經相關神經轉移\n\n#### 1. Somsak Transfer（恢復肩外展）\n- **將 radial nerve 的 triceps long head 分支 → 轉移到 axillary nerve**\n- 用於：C5-C6 avulsion、腋神經損傷無法修復\n- 犧牲：Triceps long head 分支（其他 triceps 頭仍支配）\n- 恢復：三角肌功能\n\n#### 2. Oberlin Transfer（恢復肘屈曲）\n- 將 ulnar nerve 的 FCU 分支 → 轉移到 musculocutaneous nerve biceps 分支\n- 用於：臂神經叢上幹損傷\n\n#### 3. AIN to Ulnar（恢復手內在肌）\n- 將 AIN → 轉移到 ulnar nerve motor branch\n- 用於：高位尺神經損傷\n\n#### 4. PIN 相關\n- **PIN**（posterior interosseous nerve）= 橈神經的運動分支，支配伸拇、伸指肌群\n- 若 PIN 損傷：可用其他 branches 或神經移植重建\n- **沒有「axillary → PIN」的轉移做法**\n  - 腋神經距離太遠\n  - 失去腋神經會犧牲三角肌（肩外展是核心功能）\n  - 不符合 donor 選擇原則\n\n### (A) 為什麼錯誤？\n\n**選項說**：「腋神經可以透過神經轉移技術轉移到 posterior interosseous nerve，以提供拇指和手指的伸展」\n\n**錯誤點**：\n1. **方向不對**：應該是其他神經轉去腋神經，不是腋神經轉去 PIN\n2. **失去核心功能**：把腋神經拿來支配 PIN 會失去肩外展（比手指伸展更重要）\n3. **臨床上無此標準手術**\n4. 若真要恢復 PIN 支配的伸指功能，常用的是 **FDS 或 pronator teres 的 tendon transfer**\n\n## 檢查與診斷\n\n### 理學檢查\n- 三角肌視診、觸診\n- 肩外展肌力測試\n- 肩部外側感覺\n- 壓痛點（四邊形空間）\n\n### 電生理\n- **EMG**：Deltoid fibrillation、reduced recruitment\n- **NCS**：軸突損傷表現\n- Teres minor 也可檢查\n\n### 影像\n- MRI neurography\n- 評估肱骨骨折\n\n## 治療\n\n### 保守治療（首選）\n- 3-6 個月觀察（多數 neurapraxia 會恢復）\n- 被動 ROM 防止冰凍肩\n- 電刺激\n- 漸進肌力訓練\n\n### 手術\n- 若 6 個月無恢復徵象\n- 選擇：\n  - **Neurolysis**（鬆解）\n  - **Nerve graft**（sural nerve graft）\n  - **Nerve transfer**（Somsak）\n  - **Tendon transfer**（trapezius to deltoid, late cases）\n\n## Quadrangular Space Syndrome\n\n- 運動員（棒球投手、排球）\n- 反覆肩外展外旋動作\n- 壓迫腋神經 + posterior circumflex humeral artery\n- 表現：後肩痛、paresthesia、teres minor 萎縮\n- 診斷：MRA\n- 治療：保守 → 手術減壓\n\n## 考點總整\n\n| 項目 | 重點 |\n|---|---|\n| 起源 | Posterior cord（C5-C6） |\n| 通過 | Quadrangular space |\n| 支配運動 | Deltoid + teres minor |\n| 支配感覺 | Regimental badge area |\n| **最常損傷機轉** | **肩前脫位** ★ |\n| 檢查重點 | Deltoid 肌力 + 肩外側感覺 |\n| **Nerve transfer（Somsak）** | **Radial (triceps) → Axillary** ★ |",

      "detail": "**HIV 相關神經病變**\n\n## 分類\n\nHIV 感染可在不同病程階段引起多種神經病變：\n\n### 1. HIV-DSP（Distal Sensory Polyneuropathy）\n- **最常見**（高達 50% 進展期 HIV 病人）\n- HIV 本身直接造成\n\n### 2. ARV-DSP（Antiretroviral Toxicity）\n- 藥物引起\n- 特別是 **ddI, ddC, d4T（dideoxy-NRTIs）**\n\n### 3. Inflammatory Demyelinating Polyneuropathy\n- AIDP-like（急性）或 CIDP-like（慢性）\n- 早期 HIV 較常見（血清轉換時）\n\n### 4. Mononeuritis Multiplex\n- 中期 HIV\n- 血管炎機制\n\n### 5. CMV Polyradiculomyelopathy\n- **末期 HIV（CD4 < 50）**\n- **神經急症** ★\n\n### 6. Progressive Polyradiculopathy\n- 常由 CMV、VZV、結核引起\n\n## 1. HIV-DSP vs ARV-DSP\n\n### 臨床表現（兩者類似）— (D) 部分正確\n- **對稱性、遠端、感覺為主**\n- 雙足麻木、灼熱、刺痛\n- 「襪套-手套」分佈\n- **運動功能相對保留**\n\n### 電生理檢查\n- **Axonal sensorimotor neuropathy**\n- **SNAP 明顯下降**\n- CMAP 通常保留或輕度下降\n- **EMG 通常「正常」**（因為此病以感覺軸突損傷為主）\n- → (D) 正確\n\n### 鑑別 HIV-DSP 與 ARV-DSP（★ 臨床挑戰）\n\n| 項目 | HIV-DSP | ARV-DSP |\n|---|---|---|\n| 病因 | HIV 直接侵犯 | NRTI 毒性 |\n| 發病時序 | 隨 HIV 進展 | 啟動藥物後 |\n| CD4 | 通常 < 200 | 可任何時期 |\n| 藥物暫停 | 無效 | **症狀改善** ← (E) 正確 |\n| 治療 | 症狀控制 | 換藥 |\n\n→ 時序是區分關鍵\n\n### NRTI 引發的「Coasting phenomenon」 — (A) 正確\n\n**特徵**：\n- 停藥後症狀**先惡化**（數週）\n- 之後逐漸改善\n- 機轉：神經軸突的粒線體損傷延遲修復\n- 是 ddI, d4T 的典型現象\n\n## 2. CMV Polyradiculomyelopathy — (B) 正確\n\n### 流行病學\n- 末期 HIV，**CD4 < 50**\n- ART 時代後少見（< 5%）\n\n### 臨床表現\n- 急性、亞急性下肢無力（流暢性癱瘓）\n- **鞍部感覺缺損**（saddle anesthesia）\n- **膀胱、腸道失禁**\n- 下肢反射消失\n- 常合併 CMV retinitis\n\n### 診斷\n- **CSF**：中度 pleocytosis、PMN 為主（少見）、蛋白上升、glucose 下降\n- CSF CMV PCR（+）\n- MRI：cauda equina、conus enhancement\n\n### 治療（★ 神經急症）\n- **立即 Ganciclovir + Foscarnet**\n- 延遲治療 → 不可逆癱瘓\n- ART 最佳化\n- 未治療死亡率極高\n\n## 3. IRIS（Immune Reconstitution Inflammatory Syndrome）★ 本題核心\n\n### 定義\n- ART 啟動後 **CD4 急速恢復** → 免疫系統對既存感染產生**過度發炎反應**\n- 惡化既有感染症狀或暴露隱性感染\n\n### 風險因素\n- **CD4 起始值 < 50** ★\n- 高 viral load\n- 合併機會感染（TB, MAC, CMV, PCP, cryptococcus）\n- ART 啟動到發病時間短\n\n### 神經系統 IRIS\n- CMV polyradiculomyelitis reactivation\n- Cryptococcal meningitis worsening\n- PML reactivation\n- TB meningitis\n\n### 治療 — 為什麼 (C) 錯誤？\n\n**正確處置**：\n1. **繼續 ART**（不應停藥，除非危及生命）\n2. **治療底層感染**\n3. **類固醇**（methylprednisolone 或 prednisone）\n   - **立即使用，不需等 CD4 上升** ★\n   - 中到重度 IRIS\n   - 嚴重 CNS IRIS：pulse therapy\n4. NSAIDs（輕度）\n\n### (C) 為什麼錯誤？\n\n選項寫「需等 CD4 上升後才可改用類固醇」\n\n**錯誤原因**：\n1. **IRIS 治療不需等 CD4 變化**\n2. 反而**越早給類固醇越好**（尤其嚴重 CNS/pulmonary IRIS）\n3. 部分研究：預防性短期類固醇可降低 TB-IRIS 發生（PredART trial）\n4. ART 不停用\n\n## HIV-DSP 治療原則\n\n### 對因治療\n- **HIV-DSP**：優化 ART（確保病毒抑制）\n- **ARV-DSP**：換藥（避免 d4T, ddI, ddC）\n\n### 症狀控制\n- **神經性疼痛**：\n  - Gabapentin, Pregabalin\n  - Duloxetine\n  - TCA\n  - Lamotrigine（HIV-DSP 有 RCT 支持）\n- **局部治療**：\n  - Lidocaine patch\n  - **Capsaicin 8% patch**（HIV-DSP 有強證據）\n\n## HIV 相關神經病變速記\n\n| 類型 | CD4 | 特徵 |\n|---|---|---|\n| **HIV-DSP** | < 200 | 對稱遠端感覺 |\n| **ARV-DSP** | 任何 | 藥物相關，停藥可逆 |\n| **AIDP/CIDP** | 早期、血清轉換 | 類似 GBS |\n| **Mononeuritis multiplex** | 中期 | 血管炎 |\n| **CMV polyradiculomyelitis** ★ | **< 50** | **神經急症** |\n| **IRIS 神經症狀** | ART 後 CD4 快速升 | **需類固醇，不停 ART** ★ |",

      "detail": "**運動心肺測驗（CPET）在肺高壓的診斷應用**\n\n## 病生理：為什麼這些指標指向肺高壓？\n\n### 肺高壓的病理生理\n- 肺動脈壓上升\n- 右心負荷增加、RV 功能失調\n- **V/Q mismatch** → 死腔通氣增加\n- 運動時 CO 無法適當提升\n- 周邊氧氣供應不足\n\n## 關鍵 CPET 指標逐項分析\n\n### 1. VO₂peak ↓（最大攝氧量低） — 非特異性\n- 各種心肺疾病都會降低\n- 正常 > 85% predicted\n- PH 病人通常 < 60% predicted\n\n### 2. AT ↓（無氧閾值低）\n- 運動時提前進入無氧代謝\n- 心臟 / 肺功能不足的共通指標\n\n### 3. Exercise-induced hypoxemia（運動誘發低血氧）\n- **運動時 SpO₂ < 90%** ★ 是 PH 的典型發現\n- 原因：\n  - V/Q mismatch\n  - Intracardiac shunt（若合併 PFO）\n  - Reduced pulmonary transit time\n- COPD 也會，但 COPD 通常**休息時就低血氧**\n\n### 4. EtCO₂ 低（End-tidal CO₂ 降低） ★★ 特異性高\n- **休息時 EtCO₂ < 30 mmHg** → 強烈暗示 PH\n- 運動時進一步下降\n- 機轉：\n  - 大量死腔通氣稀釋呼出的 CO₂\n  - Hyperventilation（代償性）\n\n### 5. 休息時心跳偏高\n- 代償性（因 stroke volume 受限）\n- PH 病人 resting HR 常 > 85 bpm\n\n### 6. VE/VCO₂ slope 升高 ★★★ **PH 最特異指標**\n\n**正常值與分級**：\n\n| VE/VCO₂ slope | 意義 |\n|---|---|\n| < 30 | 正常 |\n| 30-35 | 輕度異常（早期心/肺病） |\n| 35-45 | 中度異常（CHF, moderate PH） |\n| **> 45** | **嚴重通氣效率下降（advanced PH, severe CHF）** |\n| **> 50-55** | **PH 病人常見** |\n\n**機轉**：\n- 每排出 1 L CO₂ 所需的通氣量增加\n- 反映 **死腔通氣（VD/VT）增加**\n- PH、PE、COPD 末期、嚴重 CHF 皆會升高\n\n## 各選項鑑別（★ 考點）\n\n| 疾病 | VO₂peak | EtCO₂ | VE/VCO₂ slope | 運動誘發低氧 | 其他特徵 |\n|---|---|---|---|---|---|\n| **肺高壓** ★ | ↓↓ | **↓↓（< 30）** | **↑↑（> 45-55）** | **✓** | 休息 HR 高、O₂ pulse 平坦 |\n| 缺血性心臟病 | ↓ | 正常或輕降 | 可能↑（30-40） | 不典型 | VO₂ 隨運動曲線 flatten |\n| 肥胖 | ↓（絕對值正常） | **正常** | **正常** | 否 | O₂ cost 增加、無效率下降 |\n| COPD | ↓ | 正常或升高 | ↑ | **休息時就低氧** | Ventilatory limitation (VE/MVV > 0.85) |\n| 心臟移植 | ↓ | 略低 | 中度↑ | 否 | **Chronotropic incompetence** |\n\n## 鑑別要點\n\n### 為什麼不是 COPD？\n- COPD：**通氣限制（ventilatory limitation）**\n- 運動時 VE/MVV 比值高\n- **常休息時就有低血氧**（PH 是運動時才明顯）\n- 運動時 EtCO₂ 可能因 CO₂ 滯留而升高（不是降低）\n\n### 為什麼不是 IHD？\n- 缺血性心臟病常見指標：\n  - ST 段變化\n  - Oxygen pulse flattening\n  - VE/VCO₂ slope 中度升高\n  - 但不會有休息 EtCO₂ 很低\n\n### 為什麼不是肥胖？\n- 肥胖：\n  - 絕對 VO₂ 正常（甚至高）\n  - **EtCO₂ 正常**\n  - **VE/VCO₂ slope 正常**\n  - 無低血氧\n\n### 為什麼不是心臟移植？\n- 去神經化心臟：\n  - **Chronotropic incompetence**：HR 啟動慢、peak HR 低\n  - **休息心跳高**（失去迷走神經抑制）\n  - 但無低血氧\n  - VE/VCO₂ slope 只中度升高\n\n## CPET 在 PH 的應用\n\n### 診斷提示指標（Wasserman 九格圖）\n1. **VE/VCO₂ slope > 45**\n2. **休息 EtCO₂ < 30 mmHg**\n3. **Oxygen pulse（VO₂/HR）低且 plateau**\n4. **運動誘發低血氧**\n5. 低 anaerobic threshold\n6. Heart rate recovery 差\n\n### 預後價值\n- **VO₂peak < 10.4 ml/kg/min** → 預後差\n- VE/VCO₂ slope > 60 → 高死亡風險\n\n## 肺高壓分類（WHO 2022）\n\n| Group | 原因 |\n|---|---|\n| 1 | PAH（原發性、結締組織病等） |\n| 2 | 左心疾病引起 |\n| 3 | 肺疾病 / 慢性低氧 |\n| 4 | 慢性血栓栓塞 (CTEPH) |\n| 5 | 多因素 |\n\n## 肺高壓復健考量\n\n### 運動處方原則\n- 低強度 aerobic（50-70% peak HR）\n- Interval training\n- 阻力訓練（避免 Valsalva）\n- 呼吸肌訓練\n- 目標：維持 SpO₂ > 88%，必要時氧氣補充\n- 避免爆發性、高強度運動",
      "sources": [

      "summary": "(E) 錯誤在「**心肺循環中樞器官的功能異常**」作為主要原因。肺移植後 VO₂peak 進步不如肺功能（FEV1、FVC）顯著的主要原因是**周邊肌肉（peripheral limitation）限制**：長期慢性肺病、類固醇、肌少症、免疫抑制劑（cyclosporine, tacrolimus 的粒線體毒性）導致的**周邊肌肉功能障礙**，而非中樞循環器官問題。",
      "detail": "**肺移植復健（Lung Transplant Rehabilitation）**\n\n## 肺移植適應症\n\n- 末期肺病（end-stage lung disease）\n- 常見原發病：\n  - **COPD（最常見）**\n  - **IPF（間質性肺病）**\n  - **囊性纖維化（CF）**\n  - **PAH（原發性肺高壓）**\n  - **α1-antitrypsin deficiency**\n\n## 復健時機\n\n### 移植前（Pretransplant）\n- **等候期可能數月至數年**\n- **Pre-hab** 可優化體能儲備、呼吸功能、心理準備\n- 移植前 6MWT 距離與移植後存活率正相關\n\n### 移植後（Posttransplant）\n- **立即術後期**：ICU、早期活動\n- **亞急性期**（1-3 個月）：建立運動耐力\n- **長期維持**（> 3 個月）：終生規律運動\n\n## 各選項分析\n\n### (A) 移植前後皆有好處 — 正確\n- Pretransplant：維持功能\n- Posttransplant：恢復體能、防止併發症\n- 進展緩慢：需考慮排斥監測、免疫抑制劑影響、心肺去神經化\n\n### (B) 完整評估 — 正確\n- **6MWT**：基本功能評估\n- **CPET**：黃金標準\n- **肺功能**：FEV1、FVC、DLCO\n- 肌力測試、平衡、呼吸肌力\n\n### (C) 血氧管理與脫氧 — 正確\n- 等候期：SpO₂ > 88%，需要時 supplemental O₂\n- 間歇訓練原則\n- **移植後肺功能顯著改善** → 可脫離氧氣\n\n### (D) 去神經化與換氣反應 — 正確\n\n**肺移植後為什麼換氣反應不受大影響？**\n\n#### 去神經化（Denervation）影響\n- 移植時切斷 **vagus nerve 的肺支** → 失去 **Hering-Breuer reflex**\n- 理論上可能影響呼吸調控\n- **但實際上影響很小**：\n  - 中樞化學感受器仍完整（CO₂ 調控）\n  - 周邊化學感受器（carotid body）完整\n  - 換氣對 CO₂ 反應正常\n  - 換氣對運動反應正常\n\n#### 去神經化的真正影響\n- **Cough reflex 減弱**：痰液滯留風險增加\n- **黏液清除受損**：mucociliary clearance 下降\n- → 易感染、適合早期拔管 + 呼吸道清潔\n\n### (E) 移植後 VO₂peak 改善有限 ★ 本題關鍵\n\n**事實**：\n- 肺功能（FEV1, FVC）：移植後**顯著改善**（可達正常 70-100%）\n- VO₂peak：**僅改善至正常的 40-60%**\n- 差距來自哪裡？\n\n#### 主要原因：**周邊限制（Peripheral Limitation）**\n\n**1. 長期肺病造成的肌肉萎縮**\n- 長期制動\n- 慢性缺氧對肌肉粒線體傷害\n- 營養不良（COPD cachexia）\n\n**2. 類固醇肌病**\n- 長期類固醇治療\n- 近端肌肉無力、萎縮\n\n**3. 免疫抑制劑的粒線體毒性**\n- **Calcineurin inhibitors**（Cyclosporine, Tacrolimus）\n  - 直接抑制肌肉粒線體功能\n  - 氧化能力下降\n  - Type II fiber 萎縮為主\n- **Glucocorticoids**：促 proteolysis\n\n**4. 肌少症（Sarcopenia）**\n- 移植候選人常有顯著肌肉流失\n- 即使肺功能恢復，肌力不會自動恢復\n\n**5. 骨骼肌粒線體功能障礙**\n- 生物能學改變\n- 氧氣利用效率下降\n\n#### (E) 為什麼錯誤？\n- 選項說「**心肺循環中樞器官功能異常**」\n- **不正確**：\n  - 移植肺功能良好\n  - 心臟功能通常正常\n  - 中樞循環不是主要限制\n- **正確答案應為「周邊肌肉功能限制」**\n\n## 肺移植後的運動限制模式\n\n### CPET 發現\n- **Ventilatory reserve**：**充足**（新肺功能好）\n- **Cardiovascular reserve**：**正常或略差**\n- **HR response**：**正常**（非去神經心臟）\n- **O₂ utilization**：**受限**（周邊）\n- **AT**：偏低\n- **VO₂peak**：40-60% predicted\n\n→ 這種模式稱為「**peripheral limitation**」\n\n## 肺移植後復健重點\n\n### 1. Aerobic Training\n- 60-80% peak HR\n- 20-45 分鐘/次，3-5 次/週\n\n### 2. Resistance Training（★ 特別重要）\n- 重點：代償周邊肌肉限制\n- 大肌群為主（下肢優先）\n- 8-12 reps，2-3 組\n- 2-3 次/週\n\n### 3. Balance Training\n- 類固醇、免疫抑制劑 → 骨質疏鬆風險\n- 跌倒風險高\n\n### 4. Respiratory Training\n- 呼吸肌訓練（IMT）\n- 黏液清除技術（因 cough reflex 減弱）\n\n## 肺移植後併發症與復健調整\n\n### 急性排斥\n- 第一年風險高（10-30%）\n- 症狀：咳嗽、呼吸困難、FEV1 下降\n\n### 慢性排斥 / BOS（Bronchiolitis Obliterans Syndrome）\n- 移植後 > 1 年\n- 漸進性阻塞性病變\n\n### 感染、骨質疏鬆、代謝症候群\n- 免疫抑制相關\n- 肌力 + 平衡訓練預防跌倒\n\n## 考點速記\n\n| 特點 | 詳情 |\n|---|---|\n| 換氣 denervation 影響 | **對運動換氣反應影響小** |\n| 肺功能 vs VO₂peak | 肺功能明顯改善、VO₂peak 改善有限 |\n| **VO₂peak 受限主因** | **周邊肌肉功能** ★ |\n| 類固醇影響 | 近端肌病 |\n| Calcineurin inhibitor | 粒線體毒性 |\n| 關鍵復健 | 阻力訓練、平衡 |",

      "detail": "**運動誘發氣喘 / Exercise-Induced Bronchoconstriction（EIB / EIA）**\n\n## 名詞釐清\n\n- **EIA（Exercise-Induced Asthma）**：舊名\n- **EIB（Exercise-Induced Bronchoconstriction）**：現代標準術語\n- **EIB with asthma**：氣喘病人運動誘發\n- **EIB without asthma**：單純運動誘發，無基礎氣喘\n\n## 流行病學 — (A) 錯誤\n\n- **氣喘病人 EIB 發生率：40-90%**\n- **一般人口**：5-20%\n- **精英運動員**：30-70%（冬季運動員、游泳者）\n- → (A)「不常發生」錯誤\n\n## 病理生理\n\n### 觸發機轉（兩大理論）\n\n#### 1. Hyperosmolarity Theory（高滲透壓理論）\n- 運動時過度通氣 → 呼吸道水分流失\n- 氣道上皮細胞脫水 → 高滲透壓\n- 肥大細胞與嗜酸球釋放 histamine、leukotrienes、prostaglandins\n- 支氣管收縮\n\n#### 2. Airway Rewarming Theory（氣道復溫理論）\n- 運動時冷空氣吸入 → 氣道冷卻\n- 運動停止後氣道重新加溫\n- 血管反應性充血 → 黏膜水腫\n- 支氣管收縮\n\n### 誘發因素 — (B) 錯誤\n\n| 因素 | 影響 |\n|---|---|\n| **冷乾空氣** ★ | **主要誘發** |\n| 濕熱空氣 | **保護作用**（游泳較少發作） |\n| 氯氣、污染 | 誘發 |\n| 高強度有氧 | 誘發 |\n| 低強度阻力 | 較少誘發 |\n| 過敏原 | 加重 |\n| 上呼吸道感染 | 暫時性增加敏感度 |\n\n→ (B) 選項「**濕冷**」錯誤，應為「**乾冷**」\n\n### 運動類型與 EIB 風險\n\n- **高風險**：長跑、越野滑雪、自行車、足球、籃球、冰上曲棍球\n- **中風險**：網球、排球、體操\n- **低風險**：**游泳**（溫濕環境）、重量訓練、高爾夫\n\n## 臨床表現 — (D) 錯誤\n\n### 典型症狀\n- 運動開始後 **5-10 分鐘** 內出現（或運動停止後數分鐘）\n- **運動停止後 15-60 分鐘症狀持續** ★\n- 症狀：乾咳、喘鳴、胸悶、呼吸困難、運動表現下降\n- 約 **1-2 小時自行緩解**\n- → (D)「停止運動馬上就好」錯誤\n\n### Refractory Period（難反應期）\n- 一次 EIB 發作後 **2-4 小時內**，再次運動反而較不易發作\n- 這就是暖身策略的生理基礎\n\n### Late-Phase Response\n- 約 **2-8 小時後**可能再次發作\n\n## 診斷\n\n### Exercise Challenge Test\n- **Gold standard**\n- 跑步機或腳踏車，6-8 分鐘高強度\n- 測 FEV1 基線 → 運動後監測\n- **FEV1 下降 ≥ 10% → 確診 EIB**\n- 下降 10-24%：輕度\n- 25-49%：中度\n- ≥ 50%：重度\n\n### 其他誘發測試\n- **Eucapnic Voluntary Hyperpnea (EVH)**\n- **Mannitol inhalation**\n- **Methacholine challenge**\n\n## 預防與治療 — (C) 正確\n\n### 1. 藥物預防（運動前）\n\n#### (a) SABA ★ 首選\n- **Albuterol / Salbutamol 2 puffs**\n- **運動前 15 分鐘使用**\n- 效果：80-90% 有效\n- 作用 2-4 小時\n\n#### (b) ICS\n- 長期控制氣道發炎\n- 對氣喘合併 EIB 者重要\n\n#### (c) LTRA\n- Montelukast 10 mg qd\n- 運動前 2 小時使用\n- 無 tolerance\n\n#### (d) Cromolyn / Nedocromil\n- 肥大細胞穩定劑\n\n### 2. 暖身策略（★ 非藥物核心）\n\n**漸進式暖身**：\n- **10-15 分鐘低-中強度運動**\n- 間歇式短時間衝刺\n- 誘發小劑量支氣管收縮\n- 利用 refractory period → 正式運動時不發作\n\n**研究支持**：暖身可降低 EIB 嚴重度 50% 以上\n\n### 3. 環境策略\n\n- **避免乾冷空氣**：\n  - 冬季用口罩或圍巾（濕潤吸入空氣）\n  - Heat and moisture exchanger (HME) masks\n- **游泳**為較佳運動\n\n### 4. 生活方式 — (E) 錯誤\n\n- **鼓勵運動**：規律運動改善整體肺功能、氣道發炎\n- 有氧適能好 → EIB 嚴重度降低\n- **不應因 EIB 減少運動**\n\n## 運動員與 EIB\n\n### WADA 禁藥考量\n- **Inhaled β2-agonist**：\n  - Salbutamol：**≤ 1600 mcg/24h**（可用）\n  - 口服 β2-agonist：禁用\n- 文件證明 EIB 診斷（TUE, Therapeutic Use Exemption）\n\n## 鑑別診斷\n\n| 疾病 | 特徵 |\n|---|---|\n| **EIB** | 運動後 FEV1 ↓ ≥ 10% |\n| **Vocal cord dysfunction (VCD)** | 運動中立即發作、吸氣為主 |\n| **Exercise-induced laryngeal obstruction** | 青少年、嘈雜吸氣音 |\n| 心因性 | 焦慮、過度換氣 |\n| 心衰竭 | 運動時呼吸困難、心臟徵象 |\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 發生率 | 氣喘病人 40-90% ★ |\n| **誘發環境** | **乾冷**（非濕冷） |\n| 症狀起始 | 運動開始 5-10 分 或 停止後幾分 |\n| 症狀持續 | **15-60 分鐘**，非立即緩解 |\n| **預防首選** | **SABA 運動前 15 分 + 暖身** ★ |\n| Refractory period | 2-4 小時 |\n| 最佳運動類型 | 游泳 > 跑步 / 越野滑雪 |\n| 策略原則 | **鼓勵運動**，非減少運動 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 33 \"Pulmonary Rehabilitation\"", "url": null },

        { "text": "Stickland MK et al. Effect of warm-up exercise on exercise-induced bronchoconstriction. Med Sci Sports Exerc 2012;44:383", "url": "https://pubmed.ncbi.nlm.nih.gov/21811185/" }

      "summary": "(E) 正確。氣體交換（gas exchange）發生問題的核心是**肺泡層次**的 V/Q mismatch、shunt 或 diffusion 障礙。**Atelectasis（肺塌陷）** 造成肺泡無法通氣但仍有血流 → **shunt 增加** → **氣體交換真正受損**。(A)(B)(C)(D) 都是**通氣泵（ventilatory pump）問題**—肌肉、神經、胸廓限制—導致**通氣（ventilation）不足**，肺本身氣體交換功能是完好的。",
      "detail": "**氣體交換 vs 通氣：兩個不同概念（★ 重要區分）**\n\n## 呼吸系統的兩大功能\n\n### 1. Ventilation（通氣）\n- **空氣進出肺部的機械動作**\n- 負責單位：**呼吸肌 + 胸廓 + 氣道**\n- 評估指標：\n  - Minute ventilation (VE)\n  - FEV1、FVC\n  - PaCO₂ → 反映通氣量\n\n### 2. Gas Exchange（氣體交換）\n- **肺泡 ↔ 微血管之間的氧氣與二氧化碳交換**\n- 負責單位：**肺泡-微血管界面、V/Q 匹配**\n- 評估指標：\n  - **PaO₂**\n  - **A-a gradient**\n  - **DLCO**（瀰散能力）\n  - **SpO₂**\n\n## 病生理模式分類\n\n### Pump Failure（通氣泵衰竭）\n- **問題在通氣不足（hypoventilation）**\n- 病灶：神經、肌肉、胸廓\n- **PaCO₂ ↑、PaO₂ 相對保留**（直到重度）\n- **A-a gradient 正常**\n- 肺本身功能完好\n\n### Lung Failure（肺衰竭）\n- **問題在氣體交換**\n- 病灶：肺實質（肺泡、間質、血管）\n- **PaO₂ ↓↓、PaCO₂ 可能正常或下降**\n- **A-a gradient 增加** ★\n- Shunt、V/Q mismatch、diffusion 障礙\n\n## 各選項分析（★ 考點）\n\n### (A) 肌肉病變 → 呼吸肌無力\n- **Pump failure**\n- 例：DMD、ALS、重症肌無力\n- 肺本身正常 → 氣體交換正常\n- 問題：無法有效通氣\n- 數據：\n  - FVC ↓\n  - PaCO₂ ↑（末期）\n  - **A-a gradient 正常** ← 氣體交換完好\n\n### (B) 高位脊髓損傷\n- **Pump failure**\n- C3 以上：完全失去橫膈神經支配（C3-5）\n- C4-5：部分橫膈功能\n- 肺本身正常\n\n### (C) 脊柱側彎、胸廓活動不好\n- **Pump failure（restrictive pattern）**\n- 胸廓活動受限 → 限制性肺病\n- 肺容積下降\n- 但肺泡本身與 V/Q 相對正常\n\n### (D) 中風造成呼吸中樞受損\n- **Pump failure（中樞性）**\n- 呼吸驅動下降\n- 延腦呼吸中樞或橋腦損傷\n- 可能出現 Cheyne-Stokes 呼吸\n- PaCO₂ 升高\n- 肺本身正常\n\n### (E) 術後肺塌陷（Atelectasis） ★ 答案\n\n- **Gas exchange failure**\n- 機轉：\n  1. **肺泡塌陷** → 無通氣\n  2. **血流仍通過塌陷區** → **shunt 形成**\n  3. **血液未氧合即回到動脈端**\n  4. **PaO₂ ↓↓（hypoxemia）**\n  5. **A-a gradient 顯著增加**\n\n#### Atelectasis 病生理\n- **V/Q = 0**（extreme V/Q mismatch → shunt）\n- 給 100% O₂ 也無法完全矯正（shunt 特徵）\n- 典型術後併發症\n\n#### 治療\n- **深呼吸運動**\n- **Incentive spirometer**\n- **咳嗽訓練**\n- **體位引流、姿勢改變**\n- **BiPAP / CPAP**\n- **早期活動**\n- **適當止痛**\n\n## 臨床鑑別：Pump 還是 Lung 失能？\n\n### Pump failure 特徵\n- PaCO₂ ↑\n- PaO₂ 輕微降低（直到末期）\n- **A-a gradient 正常**（< 15 mmHg）\n- 吸 O₂ 可輕易矯正 hypoxemia\n- 治療：機械通氣（NIV、氣管內管）\n\n### Lung failure / Gas exchange 特徵\n- PaCO₂ 可能正常或低（hyperventilation 代償）\n- PaO₂ ↓↓\n- **A-a gradient 增加**（> 15-20 mmHg）\n- Shunt → O₂ 反應差\n- V/Q mismatch → O₂ 反應佳\n\n## Hypoxemia 的機制（★ 完整整理）\n\n### 1. Hypoventilation（通氣不足）\n- 選項 A, B, C, D 屬於此類\n- 特徵：\n  - PaCO₂ ↑\n  - A-a gradient 正常\n  - 給 O₂ 完全矯正\n\n### 2. V/Q Mismatch（最常見）\n- 部分區域通氣少於血流\n- 例：COPD, asthma, PE（局部）\n- **給 O₂ 可矯正**\n\n### 3. Shunt（分流）\n- V/Q = 0：肺泡完全無通氣仍有血流\n- 例：**Atelectasis**、肺炎、肺水腫、ARDS\n- **給 100% O₂ 也無法矯正** ★\n\n### 4. Diffusion Impairment\n- 肺泡-微血管膜受損\n- 例：肺纖維化、emphysema\n- 運動時明顯（休息時可能正常）\n\n### 5. Low Inspired O₂\n- 高海拔\n\n## A-a Gradient 公式\n\n- **A-a gradient = PAO₂ − PaO₂**\n- PAO₂ = FiO₂(Patm − PH₂O) − PaCO₂/R\n- 室內空氣海平面：PAO₂ ≈ 150 − PaCO₂/0.8\n- **正常 A-a gradient = (年齡/4) + 4**\n- 年輕人 < 10-15 mmHg\n- 增加 → 肺本身問題\n\n## 考點速記\n\n| 病因 | 機制 | PaCO₂ | A-a grad | 氣體交換 |\n|---|---|---|---|---|\n| 肌肉病變呼吸肌無力 | Pump | ↑ | 正常 | **正常** |\n| 高位 SCI | Pump | ↑ | 正常 | **正常** |\n| 脊柱側彎 | Pump | ↑ | 正常 | **正常** |\n| 中風呼吸中樞 | Central pump | ↑ | 正常 | **正常** |\n| **Atelectasis** ★ | **Shunt (gas exchange)** | 正常或↓ | **↑↑** | **受損** |",

      "detail": "**呼吸肌肌力測量**\n\n## 呼吸肌分類\n\n### 吸氣肌（Inspiratory Muscles）\n- **Diaphragm（橫膈膜）** ★ 最主要\n  - 佔吸氣 70-80% 工作\n  - 神經：Phrenic nerve（**C3-C5**）\n- **External intercostals**（外肋間肌）\n  - 神經：T1-T11 肋間神經\n- **Scalenes**（斜角肌） — accessory\n- **Sternocleidomastoid (SCM)** — accessory\n\n### 呼氣肌（Expiratory Muscles）\n- 平靜呼氣：被動（彈性回縮）\n- 用力呼氣 / 咳嗽：\n  - **Abdominal muscles**（腹肌）★ 最主要\n    - 神經：**T6-T12**\n  - **Internal intercostals**（內肋間肌）\n\n## 脊髓損傷（SCI）與呼吸肌\n\n### 依損傷層級的影響\n\n| 損傷層級 | 吸氣肌 | 呼氣肌 | 特徵 |\n|---|---|---|---|\n| **C1-C2** | 橫膈完全喪失 | 全失 | 完全依賴呼吸器 |\n| **C3-C5** | 橫膈部分 | 大部分失去 | 可能需呼吸支持、橫膈刺激器 |\n| **C6-C8** | 橫膈完好 | 全失 | **可自主呼吸但咳嗽差** |\n| **T1-T5** | 橫膈 + 部分斜角肌 | 肋間 + 腹肌全失 | **咳嗽能力嚴重受損** |\n| **T6-T12** | 橫膈 + 肋間部分 | 腹肌不同程度喪失 | 咳嗽中度受損 |\n| **L1 以下** | 全功能 | 全功能 | 呼吸基本不受影響 |\n\n### 胸髓 SCI 的呼吸特徵 — (B) 為什麼錯誤？\n\n- **吸氣肌**：橫膈（C3-5）完好 → 受影響不大\n- **呼氣肌**：\n  - 肋間肌（T1-T11）受損\n  - 腹肌（T6-T12）受損\n  - **呼肌損傷 > 吸肌損傷** ★\n- 臨床意義：\n  - 吸氣相對正常\n  - 呼氣主動用力、咳嗽能力大減\n  - 痰液清除困難 → 感染、atelectasis 風險\n- **(B) 「吸肌損傷比呼肌大」錯誤** — 應該相反\n\n## 肺活量作為呼吸肌力指標 — (A) 正確\n\n### 為什麼 VC 可反映呼吸肌力？\n- **VC = TLC − RV**\n- 達到 TLC 需最大吸氣肌力\n- 達到 RV 需最大呼氣肌力\n- **VC 整合兩者**\n- 肺本身正常時，VC 主要受呼吸肌力限制\n\n### 臨床應用\n- SCI 病人定期監測 VC\n- **VC < 50% predicted**：可能需呼吸支持\n- **VC < 15 ml/kg**：考慮插管\n- 夜間 VC 可能更低\n- 不需昂貴儀器、操作簡單\n\n## 呼吸肌力直接測量\n\n### 1. PImax（Maximum Inspiratory Pressure）— (C) 錯誤\n- **從 RV 用力吸氣**所能產生的最大負壓\n- 測量「吸氣肌力」\n- 正常值：男性 > -100 cmH₂O，女性 > -70 cmH₂O\n- 又稱 **MIP**\n- **不是「最大吐氣壓」**\n\n### 2. PEmax（Maximum Expiratory Pressure）\n- **從 TLC 用力呼氣**所能產生的最大正壓\n- 測量「呼氣肌力」\n- 正常值：男性 > 140 cmH₂O，女性 > 90 cmH₂O\n- 又稱 **MEP**\n\n### (C) 為什麼錯誤？\n- 測吸氣肌 → **PImax（最大吸氣壓，負壓）**\n- 選項寫「最大吐氣壓」方向顛倒\n\n## 性別差異 — (D) 錯誤\n\n| 項目 | 男性 | 女性 |\n|---|---|---|\n| **PImax** | ~100-120 cmH₂O | ~70-80 cmH₂O |\n| **PEmax** | ~140-180 cmH₂O | ~90-110 cmH₂O |\n\n- 男性呼吸肌力**明顯大於女性**\n- 正常值表格都有性別分別\n- **(D) 「男女無不同」錯誤**\n\n## 吸肌 vs 呼肌 — (E) 錯誤\n\n### 生理事實\n- **PEmax > PImax**（一般人）\n- 即 **呼氣肌比吸氣肌有力** ★\n- 原因：\n  - 呼氣肌（特別腹肌）動員數量多\n  - 腹肌強壯\n  - 咳嗽、打噴嚏需高壓\n- 吸氣肌主要靠橫膈（單一主要肌肉）\n\n### **(E) 「吸肌比呼肌有力」錯誤**\n\n## 其他呼吸肌力測量方法\n\n### 1. Peak Cough Flow（PCF）\n- 測咳嗽能力\n- 正常：> 360 L/min\n- **PCF < 270 L/min** → 咳嗽能力不足\n- **PCF < 160 L/min** → 咳嗽完全無效\n\n### 2. SNIP（Sniff Nasal Inspiratory Pressure）\n- 嗅吸時測鼻腔內壓\n- 替代 PImax（病人配合差時）\n\n### 3. 橫膈肌特殊測試\n- **Transdiaphragmatic pressure (Pdi)**\n- 超音波\n\n## SCI 呼吸復健重點\n\n### Pump 功能代償\n1. **姿勢教育**：仰臥 vs 坐姿呼吸差異\n2. **Abdominal binder**（腹帶）：\n   - 穩定鬆弛的腹壁 → 協助橫膈\n   - **站坐位時使用**\n3. **Glossopharyngeal breathing (GPB)**：青蛙呼吸法\n4. **Inspiratory muscle training (IMT)**\n\n### 咳嗽輔助\n1. **Manual assisted cough (MAC)**：照護者壓腹\n2. **Mechanical insufflator-exsufflator (MI-E)**：CoughAssist\n3. **Abdominal binder**\n4. **Functional electrical stimulation (FES)**：腹肌\n\n## 考點速記\n\n| 項目 | 正確 |\n|---|---|\n| SCI 呼吸肌力指標 | **肺活量（VC）** ★ |\n| 胸髓 SCI | 呼肌受損 > 吸肌受損 |\n| 吸肌力測量 | **PImax**（最大吸氣壓、負壓） |\n| 呼肌力測量 | PEmax（最大呼氣壓、正壓） |\n| 性別差異 | **男 > 女** |\n| 一般人比較 | **呼肌 > 吸肌** |\n| 咳嗽能力 | PCF > 270 L/min 正常 |",
      "sources": [

      "summary": "(C) 錯誤。**運動前預防性使用支氣管擴張劑（SABA）是標準建議**，有助於減少運動誘發的支氣管收縮、改善運動耐力、減輕呼吸困難，並**不會**造成血液動力學不穩定。此外，COPD 是**阻塞性**（obstructive）而非「限制性（restrictive）」肺病，選項用詞本身也有誤。",
      "detail": "**慢性阻塞性肺病（COPD）與肺部復健**\n\n## 肺部復健的核心角色\n\n### 定義（ATS/ERS 2013）\n肺部復健是 **以病人為中心的綜合介入**，包含完整評估、**運動訓練、衛教、行為改變**。\n\n### 適應症\n- **COPD**（證據最強）\n- 間質性肺病\n- 肺高壓\n- 囊性纖維化\n- 肺移植前後\n- 肺減容手術前後\n\n### 禁忌症\n- 急性惡化（穩定後才開始）\n- 嚴重心血管疾患未控制\n- 嚴重精神疾患\n\n## 各選項分析\n\n### (A) 上半身阻力訓練改善呼吸困難 — 正確\n\n**為什麼重要？**\n- COPD 病人常有**上肢肌肉無力**\n- 上肢活動（如梳頭、吹頭髮）使用輔助呼吸肌 → **加重呼吸困難感**\n- 上肢阻力訓練：\n  - 改善肌力 → 減少對輔助肌的依賴\n  - 改善 ADL\n  - **降低呼吸困難**\n\n**處方原則**：\n- 8-12 reps × 2-3 sets\n- 60-80% 1RM\n- 2-3 次/週\n\n### (B) IMT 對無法運動者有助 — 正確\n\n**Inspiratory Muscle Training (IMT)**：\n- 使用阻力裝置\n- 30% PImax 起始\n- 15-30 分鐘/次，每週 5-7 次\n\n**適應**：\n- **PImax < 60 cmH₂O** 的病人最受益\n- 嚴重 COPD 無法耐受全身性運動者\n- 合併一般肺部復健 → 更佳效果\n\n### (C) 運動前使用支氣管擴張劑 — ★ 本題答案（錯誤）\n\n**正確做法**：\n\n**Short-acting β2-agonist (SABA)**\n- **運動前 15-30 分鐘使用**（例：albuterol 2 puffs）\n- 優勢：\n  - 減少 dynamic hyperinflation\n  - 改善 FEV1\n  - 降低 EELV（end-expiratory lung volume）\n  - **改善運動耐力、減輕呼吸困難**\n  - 減少 EIB\n\n**Short-acting anticholinergic (SAMA)**\n- Ipratropium：也可運動前使用\n\n**為什麼不會影響血液動力學？**\n- 吸入型 β2-agonist 全身吸收少\n- 輕微心跳加速、震顫但不顯著\n- 標準治療劑量下**安全**\n- 與運動訓練相容\n\n### (C) 為什麼錯誤？\n\n選項說「運動前**最好不要使用支氣管擴張藥物**以免影響運動時的血液動力學平衡」\n\n**錯誤點**：\n1. **事實相反**：GOLD 指引、ATS 指引明確建議運動前使用支氣管擴張劑\n2. **不會引起血液動力學不穩定**\n3. 不使用反而**降低**運動表現\n4. 「限制性呼吸道疾患」用詞也不精確 — COPD 是**阻塞性**（obstructive），不是限制性（restrictive）\n\n### (D) 運動時氧氣處方標準 — 正確\n\n**Long-term Oxygen Therapy (LTOT) 標準**：\n\n| 項目 | 標準 |\n|---|---|\n| 休息狀態 | **PaO₂ ≤ 55 mmHg** 或 **SaO₂ ≤ 88%** |\n| 合併 CHF、RV failure、HCT > 55% | PaO₂ ≤ 59 mmHg 或 SaO₂ ≤ 89% |\n| 運動誘發去飽和 | SpO₂ < 88% 運動時 |\n\n**運動時氧氣處方**：\n- SpO₂ < 88% 時需補充\n- 目標：維持 SpO₂ ≥ 90%\n- NOTT 與 MRC 研究：LTOT 延長 COPD 壽命\n\n### (E) 急性惡化期限制運動 — 正確\n\n**急性惡化（AECOPD）時**：\n- 避免高強度運動\n- **低強度 bedside 活動即可**\n- 預防 atelectasis、DVT\n- 症狀改善後漸進恢復\n- **早期恢復運動（5-7 天內）**可降低再住院率\n\n## COPD 運動處方原則\n\n### 1. Aerobic Exercise（最重要）\n- **模式**：走路、跑步機、腳踏車、水中運動\n- **強度**：\n  - **60-80% peak work rate** 或\n  - **Borg RPE 4-6**（10 分量表）\n  - **Borg dyspnea 3-5**\n- **時間**：20-60 分鐘/次\n- **頻率**：3-5 次/週\n- **持續**：至少 8 週，最好 12 週以上\n\n### 2. Resistance Training\n- 大肌群\n- 2-3 組 × 8-12 reps\n- 60-70% 1RM\n- 2-3 次/週\n\n### 3. 間歇訓練（Interval Training）\n- 高強度 × 低強度交替\n- 對嚴重 COPD 更可耐受\n\n### 4. 呼吸技巧\n- **Pursed-lip breathing**：延長呼氣、防止氣道塌陷\n- **Paced breathing**：活動時配合呼吸節奏\n\n### 5. 衛教與行為\n- 戒菸（最重要）\n- 疫苗（流感、肺炎鏈球菌）\n- 自我管理\n- 營養\n\n## 肺部復健的效益（證據等級 A）\n\n1. **改善運動耐力**（6MWT 增加 30-50 m，MCID 30 m）\n2. **減輕呼吸困難**\n3. **改善生活品質**\n4. **減少住院**\n5. **減少急診**\n6. 改善憂鬱、焦慮\n\n## COPD 分級（GOLD 2023）\n\n### 肺功能（GOLD 1-4）\n| GOLD | FEV1 %predicted |\n|---|---|\n| 1（輕度） | ≥ 80% |\n| 2（中度） | 50-79% |\n| 3（重度） | 30-49% |\n| 4（極重度） | < 30% |\n\n## 考點速記\n\n| 項目 | 正確做法 |\n|---|---|\n| 上肢阻力訓練 | **有助改善呼吸困難** |\n| IMT | PImax 低者受益 |\n| **運動前支氣管擴張劑** | **標準建議** ★ |\n| 氧氣補充標準 | PaO₂ ≤ 55 或 SaO₂ ≤ 88% |\n| 急性惡化 | 避免高強度，早期輕度活動 |\n| Aerobic 強度 | 60-80% peak work rate |\n| PR 持續時間 | ≥ 8-12 週 |",
      "sources": [

      "detail": "**神經性膀胱的排尿訓練（Voiding Training）**\n\n## 神經性膀胱分類\n\n### UMN 病變（reflex bladder）\n- 脊髓損傷 T12 以上\n- 多發性硬化症\n- 脊髓腫瘤\n- 表現：\n  - **Detrusor overactivity**\n  - **Detrusor-sphincter dyssynergia (DSD)**\n  - 膀胱容量小\n  - 不自主排尿\n\n### LMN 病變（areflexic bladder）\n- 骶髓（S2-S4）以下病變\n- 馬尾症候群\n- 糖尿病性神經病變（晚期）\n- 表現：\n  - **Detrusor areflexia**\n  - 膀胱鬆弛、過脹\n  - 溢流性失禁\n  - 殘尿量多\n\n## 排尿訓練前評估 — (A) 正確\n\n### 評估項目\n1. **病史**：病因、病程、排尿型態、藥物\n2. **神經學檢查**：\n   - Bulbocavernosus reflex\n   - Anal wink reflex\n   - 肛門張力\n3. **身體檢查**：膀胱觸診、下腹\n4. **Ice water test**（冰水試驗）：\n   - 注入冰水 → 刺激膀胱收縮\n   - UMN 病變：（+）bladder contraction\n   - LMN 病變：（-）\n5. **Urodynamic study**：\n   - 膀胱壓力、容量\n   - Pressure-flow study\n   - EMG 括約肌活動\n6. **實驗室**：\n   - **排除尿路感染** ★（訓練前必做）\n   - 腎功能\n   - **超音波**：腎、輸尿管、膀胱殘尿\n\n## 飲水控制 — (B) 正確\n\n### 原則\n- **每日總量 1500-2000 mL**（需扣除排汗、蒸發 400-500 mL）\n- **每小時 100-200 mL** 分散攝取\n- **避免大量集中攝取**\n- **膀胱容量控制 < 400-500 mL**（上限 600 mL 避免過脹）\n- 每 4 小時產生 300-500 mL 尿液為目標\n- 夜間限制攝入\n\n### 過脹的危害\n- 膀胱壁缺血\n- 逼尿肌過度擴張 → 永久性 detrusor 損傷\n- Autonomic dysreflexia（高位 SCI）\n- Vesicoureteral reflux → 腎損傷\n\n## 排尿手法 — (C) 正確\n\n### 反射性膀胱（UMN） — 輕敲誘發\n**Suprapubic tapping**：\n- 手掌輕敲恥骨上方 → 觸發反射性收縮\n- 每 3-5 秒敲一次，持續 1 分鐘\n- 常見於 UMN SCI\n- 若 DSD 嚴重 → 效果不佳\n\n### Areflexic bladder（LMN） — 外力加壓\n**Credé manoeuvre**：\n- 雙手壓迫恥骨上方\n- 機械性擠壓膀胱\n- 適合 LMN 病變\n\n**Valsalva manoeuvre**：\n- 腹部用力\n- 增加腹內壓\n\n**注意事項**：\n- 長期使用 Credé/Valsalva：\n  - 風險：**VUR（膀胱-輸尿管逆流）**、**hydronephrosis**\n  - 不適合 DSD\n- 近年 Credé 已**不建議作為長期策略**\n- CIC 為更安全選擇\n\n## Bethanechol — (D) 正確\n\n### 藥理\n- **Muscarinic agonist**（M3 receptor 為主）\n- 副交感作用\n- 理論上可促進膀胱收縮\n\n### 臨床效果\n- **口服吸收差、生體可用率低**\n- 全身副作用多\n- **對 detrusor areflexia 效果不佳** ★\n- 現代臨床**很少使用**\n- 較有效的做法：\n  - CIC\n  - Sacral neuromodulation\n\n## Clean Intermittent Catheterization (CIC) ★ 本題核心\n\n### Lapides 1972 原則\n- **Clean, not sterile**\n- 核心觀念：\n  1. 頻繁完整排空（避免殘尿）\n  2. 降低膀胱過脹\n  3. 比留置導尿感染率低\n  4. 可由病人自行完成\n\n### CIC 導尿管清潔方式（★ 本題關鍵）\n\n**一次性使用（single-use）**：\n- 目前**全球推薦**\n- 減少感染\n- 台灣健保開始給付一次性導尿管\n\n**重複使用（reusable）的做法**：\n1. **清水沖洗** ★\n2. **肥皂水清洗**\n3. **沖淨、風乾**\n4. 保存在清潔袋內\n5. 定期（每週）更換\n\n### 不建議的做法\n\n**浸泡消毒液**：\n- 優碘：\n  - 刺激尿道黏膜\n  - 殘留物難完全沖洗\n  - 反而可能造成化學性發炎\n- **Antiseptol**：\n  - 同樣不建議浸泡\n- 酒精：使導管變硬、易斷裂\n- Chlorhexidine：同樣殘留問題\n\n### (E) 為什麼錯誤？\n\n選項說「**浸泡**在優碘或 antiseptol」\n\n**錯誤原因**：\n1. 現代 CIC 原則是「**清潔**」不是「**無菌**」\n2. **不需**浸泡消毒液\n3. **清水 + 肥皂 + 風乾**即可\n4. 浸泡消毒液反而有害\n\n## 排尿訓練的整體流程\n\n### Step 1：評估\n- Urodynamic、影像、實驗室\n- 排除 UTI\n\n### Step 2：藥物準備\n- **UMN（反射性）**：\n  - Antimuscarinic（oxybutynin, tolterodine）減少逼尿肌過動\n  - α-blocker（tamsulosin）降低括約肌阻力\n- **LMN（無反射）**：\n  - α-blocker 協助 bladder neck 打開\n  - Bethanechol 效果有限\n\n### Step 3：行為訓練\n- 飲水量控制\n- 定時排尿\n- 輕敲 / Credé / Valsalva（選擇性）\n- **最佳選擇：CIC**\n\n### Step 4：追蹤\n- 殘尿量\n- 感染徵象\n- 腎功能\n- Urodynamic（每 1-3 年）\n\n## 排尿訓練的目標\n\n1. **低壓儲存**（detrusor pressure < 40 cmH₂O）\n2. **完全排空**（PVR < 100 mL 或 < 20%）\n3. **乾爽**（避免尿失禁）\n4. **預防併發症**：UTI、結石、VUR、腎損傷、AD\n5. **生活獨立**\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 訓練前評估 | 必須**排除 UTI** |\n| 飲水控制 | 每小時 100-200 mL，膀胱 < 500 mL |\n| **UMN 排尿法** | **Suprapubic tapping**（輕敲） |\n| **LMN 排尿法** | **Credé / Valsalva**（加壓） |\n| Bethanechol | 對 areflexia 效果有限 |\n| **CIC 導管清潔** | **清水洗、風乾，不浸泡消毒液** ★ |\n| 現代首選 | Single-use CIC |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 21 \"Neurogenic Bladder\"", "url": null },
        { "text": "Lapides J et al. Clean, intermittent self-catheterization in the treatment of urinary tract disease. J Urol 1972;107:458", "url": "https://pubmed.ncbi.nlm.nih.gov/5010715/" },
        { "text": "Wyndaele JJ et al. Clean intermittent catheterization and urinary tract infection: review and guide for future research. BJU Int 2012;110:E910", "url": "https://pubmed.ncbi.nlm.nih.gov/23020692/" },
        { "text": "Consortium for Spinal Cord Medicine. Bladder management for adults with spinal cord injury: a clinical practice guideline. J Spinal Cord Med 2006;29:527", "url": "https://pubmed.ncbi.nlm.nih.gov/17274492/" }
      ]

      "summary": "(A) 錯誤。**小量灌腸（mini-enema，如 Enemeez、Therevac SB）在脊髓損傷病人是常見、有效且安全的腸道處置**，實證研究（Dunn 1994、House 1997）支持其縮短排便時間、減少 AD 發生。選項所述「不安全、無效、損傷黏膜、電解質不平衡、AD」的說法與實證相反。大量清水灌腸或磷酸鹽灌腸才可能有上述風險。",
      "detail": "**神經性腸道功能障礙（Neurogenic Bowel Dysfunction, NBD）**\n\n## 分類（★ 重要）\n\n### 1. UMN 型（Reflex / Spastic bowel）\n- 病灶：脊髓圓錐以上\n- **特徵**：\n  - 肛門張力**保留或增加**\n  - Anocutaneous reflex（+）\n  - **外括約肌痙攣**\n  - **結腸蠕動減緩**\n  - **肛門反射完整**\n- 排便策略：**利用反射**（digital stimulation, 塞劑, mini-enema）\n\n### 2. LMN 型（Areflexic / Flaccid bowel）\n- 病灶：圓錐、馬尾、下位\n- **特徵**：\n  - 肛門張力**低下**\n  - Anocutaneous reflex（-）\n  - **括約肌鬆弛**\n  - **失禁風險高**\n  - **反射消失**\n- 排便策略：**手指挖便（manual evacuation）、飲食調整、formed stool**\n\n## Bowel Program 組成要件\n\n### 1. 時機\n- **固定時間**（通常每天或隔日）\n- **餐後 30-60 分鐘** — 利用 gastrocolic reflex ← (B) 正確\n- 同樣時間訓練反射\n\n### 2. 飲食\n- 高纖維（20-30 g/day）\n- 充足水分（2-3 L/day）\n\n### 3. 體位\n- **坐姿（toilet chair / commode）**\n- 利用重力\n\n### 4. 機械方法\n- **Digital stimulation**（手指肛門刺激）\n- **Manual evacuation**（手指挖便，LMN 常用）\n- **Abdominal massage**（腹部按摩）\n- **Valsalva**（小心 AD）\n\n### 5. 藥物\n- Stool softeners（docusate）\n- Bulk laxatives（psyllium）\n- Stimulant laxatives（senna, bisacodyl）\n- Osmotic laxatives（lactulose, PEG）\n\n### 6. 塞劑與灌腸\n- **Glycerin suppository**（甘油塞劑）\n- **Bisacodyl suppository**\n- **Mini-enemas**（Enemeez, Therevac SB）\n- **大容量灌腸**（最後選擇）\n\n## 各選項詳細分析\n\n### (A) Mini-enema 的爭議 ★ 本題答案\n\n**小量灌腸（Mini-enema）產品**：\n- **Enemeez（docusate sodium）**\n- **Therevac SB（docusate + glycerin）**\n- **Magic Bullet**\n\n**研究實證**：\n- **Dunn & Galka 1994**：Therevac vs bisacodyl\n  - Therevac 顯著縮短 bowel care 時間\n- **House & Stiens 1997**：\n  - Therevac 時間 < bisacodyl 50%\n  - **副作用、AD 發生率相近或更低**\n\n**為什麼小量灌腸安全？**\n- 量少（5-10 mL）\n- 非機械性刺激\n- 直接作用直腸\n- 不造成電解質異常（非高滲透壓）\n- AD 發生率不高於其他方法\n\n**真正有風險的灌腸**：\n- **大量自來水灌腸**：電解質流失\n- **磷酸鹽灌腸**（Fleet enema）：\n  - 高滲透壓\n  - 電解質不平衡（**hyperphosphatemia, hypocalcemia**）\n  - 老年人、腎功能差者禁忌\n- **肥皂水灌腸**：刺激黏膜\n\n**(A) 選項錯誤點**：\n1. 混淆了不同類型的灌腸\n2. Mini-enema **是推薦的第一線策略**\n3. 臨床證據支持其安全性\n\n### (B) Gastrocolic Reflex — 正確\n\n**機轉**：\n- 食物進入胃 → 胃擴張\n- 經迷走神經 + 腸神經系統\n- 觸發結腸（especially 左半邊）蠕動\n- **時間：餐後 30-60 分鐘峰值**\n- 持續 1-2 小時\n\n**臨床應用**：\n- 餐後 30 分鐘安排 bowel care\n- 熱飲咖啡也可誘發\n- 規律用餐建立 conditioned reflex\n\n### (C) Abdominal Massage — 正確\n\n**技巧**：\n- **順時針方向**（跟結腸走向）\n- **從右下腹（盲腸）→ 上行 → 橫行 → 下行 → 乙狀結腸**\n- 使用手掌、拳頭或網球\n- 時間：排便前或排便中\n- 持續 10-15 分鐘\n\n**作用**：\n- 機械推動糞便\n- 刺激結腸蠕動\n- 減少氣體\n\n### (D) Digital Stimulation — 正確\n\n**機轉**：\n- 手指戴手套 + 潤滑\n- 插入肛管 2-3 cm\n- **輕柔旋轉 15-20 秒**\n- 刺激：\n  - **Recto-anal inhibitory reflex (RAIR)**：內括約肌放鬆\n  - **Recto-colic reflex**：結腸蠕動增加\n  - **Peristaltic reflex**\n- 效果：左側大腸蠕動增加\n\n**注意**：\n- 過度用力可能引起 AD（T6 以上 SCI）\n- 避免挖傷黏膜\n\n### (E) Stimulant Laxatives — 正確\n\n**機轉**：\n- **Senna（Senokot）**：\n  - Anthraquinone 類\n  - 水解為活性代謝物 → 作用於結腸\n- **Bisacodyl（Dulcolax）**：\n  - Polyphenolic\n  - 直接刺激腸黏膜\n- 共同作用：\n  - 活化 **Auerbach's plexus（myenteric plexus）**\n  - 增加蠕動\n\n**Cathartic Colon**：\n- **長期大量使用**導致\n- Auerbach's plexus 退化\n- 結腸擴張、張力下降\n- **依賴刺激性瀉劑才能排便**\n- 預防：**間歇性使用**\n\n## Autonomic Dysreflexia (AD) 與排便\n\n### AD 定義\n- T6 以上 SCI 特有\n- 誘因：**膀胱/腸道的有害刺激**\n- 表現：\n  - **突發高血壓**\n  - 頭痛、冒汗、潮紅\n  - **心跳過慢**（反射性）\n  - 病灶以上潮紅，以下蒼白\n\n### 排便相關 AD\n- 糞便嵌塞是常見誘因\n- 直腸擴張誘發\n- 處置：\n  - **先移除嵌塞**（用局部麻醉凝膠）\n  - 扶起坐姿\n  - 降血壓藥物\n  - 監測血壓\n\n## 其他進階治療\n\n### 1. Transanal Irrigation (TAI)\n- 經肛門大量灌洗\n- 特殊設備（Peristeen, Qufora）\n- 縮短 bowel care 時間\n\n### 2. Sacral Anterior Root Stimulation\n- 電刺激 S2-S4\n\n### 3. Antegrade Continence Enema (ACE / MACE)\n- 盲腸造口\n\n### 4. 永久性結腸造口\n- 最後選擇\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| UMN bowel | 肛門張力保留、反射完整 |\n| LMN bowel | 肛門鬆弛、失禁風險 |\n| Gastrocolic reflex | **餐後 30-60 分鐘** ★ |\n| Abdominal massage | **順時針**從右下腹開始 |\n| Digital stimulation | 觸發 RAIR + recto-colic |\n| **Mini-enema** | **安全有效**，縮短 bowel care ★ |\n| Phosphate enema | **風險大**：hyperphosphatemia |\n| Cathartic colon | 長期 stimulant 導致、需間歇使用 |",
      "sources": [

      "summary": "(D) 錯誤。燒燙傷擺位的核心原則是**「抗攣縮擺位（anti-contracture positioning）」**—將關節擺在**相反於預期攣縮方向**的位置。前臂的典型攣縮方向是**旋前（pronation）**，因此正確擺位應為**前臂旋後（supination）或中立位**，而非旋前（會加重攣縮）。",
      "detail": "**燒燙傷病人的抗攣縮擺位（Anti-Contracture Positioning）**\n\n## 核心原則\n\n燒燙傷後疤痕收縮、肌肉攣縮的方向是**可預測的**—通常朝**屈曲、內收**的方向。抗攣縮擺位的目的是**將關節持續擺在「與預期攣縮相反」的位置**，使深層組織保持拉長狀態。\n\n### 通用原則\n- **抗攣縮擺位（opposite to contracture direction）**\n- **靜脈回流友好**（稍微抬高肢體）\n- **皮膚完整度保護**（預防壓瘡）\n- **功能性位置**\n- 合併副木輔助\n\n## 各關節標準擺位（★ 考點）\n\n### 頸部 (Neck) — (E) 正確\n- **預期攣縮**：頸屈曲\n- **正確擺位**：\n  - **頸部伸展（extension）輕微 15°**\n  - **不枕頭 或 薄枕**\n- 目標：避免「低頭、縮下巴」\n\n### 肩膀 (Shoulder) — (A) 正確\n- **預期攣縮**：內收（adduction）\n- **正確擺位**：\n  - **外展（abduction）90°**\n  - **水平內收 10-15°**（避免完全水平，減少臂神經叢壓迫）\n  - **輕微外旋**\n- 副木：airplane splint\n\n### 肘部 (Elbow)\n- **預期攣縮**：屈曲\n- **正確擺位**：\n  - **伸展（extension）**\n  - 避免長時間屈曲\n\n### 前臂 (Forearm) ★ 本題\n- **預期攣縮**：**旋前（pronation）**\n- **正確擺位**：\n  - **旋後（supination）** 或\n  - **中立位（neutral, mid-position）**\n- **絕不用旋前位**\n- 原因：\n  - 掌側、手腕屈肌燒傷後易形成旋前攣縮\n  - 旋後可拉長 pronator teres, pronator quadratus\n\n**(D) 為什麼錯誤？**\n- 選項寫「旋前（pronation）」\n- 正確：**旋後或中立**\n- 方向完全相反\n\n### 手腕 (Wrist)\n- **預期攣縮**：屈曲\n- **正確擺位**：\n  - **伸展（extension）20-30°**\n\n### 手部 (Hand)\n- **預期攣縮**：MCP 伸展 + PIP/DIP 屈曲（「爪型手」）\n- **正確擺位（safe position of immobilization, intrinsic plus）**：\n  - **Wrist extension 20-30°**\n  - **MCP flexion 70-90°**\n  - **PIP/DIP extension**\n  - **Thumb abduction + opposition**\n\n### 軀幹 (Trunk)\n- 保持中立、伸展\n- 避免側彎\n\n### 髖部 (Hip) — (B) 正確\n- **預期攣縮**：屈曲、內收\n- **正確擺位**：\n  - **伸展（extension）**\n  - **外展（abduction）15-20°**\n  - **中立旋轉**\n\n### 膝部 (Knee)\n- **預期攣縮**：屈曲\n- **正確擺位**：\n  - **伸展**\n  - 避免膝下放枕頭\n\n### 踝部 (Ankle)\n- **預期攣縮**：蹠屈（foot drop）\n- **正確擺位**：\n  - **中立位（0°）或輕度背屈（dorsiflexion）**\n  - 使用 AFO 或足托板\n\n## 「大字形」擺位 (Starfish / Spread-eagle Position) — (C) 正確\n\n- 適用於大面積燒燙傷（> 50% TBSA）\n- 全身抗攣縮擺位：\n  - 雙肩外展 90°\n  - 雙髖外展 15-20°\n  - 四肢伸展\n- 使用特殊床具（air-fluidized bed, Clinitron）支持\n- 預防多關節攣縮\n\n## 各部位燒傷的特殊考量\n\n### 顏面\n- 眼瞼：預防瞼外翻（ectropion）\n- 嘴巴：使用 mouth stretcher 預防小口症（microstomia）\n- 頸部：頸部伸展 + 無頭枕\n\n### 腋下\n- 預期腋下蹼狀攣縮（axillary web）\n- 肩外展副木\n- 定期拉伸\n\n### 肘窩（antecubital fossa）\n- 預期屈曲攣縮\n- Elbow extension splint（尤其夜間）\n\n### 手部\n- 最常形成攣縮部位\n- 手部燒傷佔所有燒傷 80%\n- 靜態、動態副木交替\n- 早期被動 ROM\n\n### 膝後（popliteal）\n- 膝屈曲攣縮\n- Knee extension splint\n- 俯臥時間\n\n## 擺位之外的抗攣縮策略\n\n### 1. 早期 ROM\n- 術後 24-72 小時開始\n- 主動 > 主動協助 > 被動\n- 每小時、每個關節全 ROM\n\n### 2. 副木（Splinting）\n- **靜態副木**：維持特定角度（夜間）\n- **動態副木**：漸進伸展（serial casting）\n- 全天 24 小時策略\n\n### 3. 壓力衣（Pressure garments）\n- 燒傷後 2-4 週傷口癒合後開始\n- 20-30 mmHg 壓力\n- 持續 12-24 個月\n- 防止肥厚疤痕\n\n### 4. 矽膠片（Silicone gel sheets）\n- 輔助疤痕管理\n- 改善疤痕厚度、色澤\n\n### 5. 按摩與疤痕處理\n- 軟組織活動\n- 防止沾黏\n\n## 擺位實施注意事項\n\n### 壓力點保護\n- 薦部、足跟、枕後\n- 使用 gel pad、sheepskin\n- 定期翻身（每 2 小時）\n\n### 管路管理\n- 氣管內管、導尿管、IV lines、胸管\n- 避免擺位造成管路扭曲\n\n### 靜脈回流\n- 肢體稍抬高\n- 減少水腫\n\n## 考點速記\n\n| 部位 | 抗攣縮擺位 |\n|---|---|\n| **頸** | **伸展 15°** |\n| **肩** | **外展 90°，水平內收 15°** |\n| 肘 | 伸展 |\n| **前臂** | **旋後 或 中立** ★ |\n| 腕 | 伸展 20-30° |\n| 手 | Intrinsic plus（MCP 屈、PIP/DIP 伸） |\n| **髖** | **伸展 + 外展 15-20°** |\n| 膝 | 伸展 |\n| 踝 | 中立 / 輕度背屈 |",

      "summary": "依 **Braden Scale** 計分：Sensory perception very limited = **2**、Moisture often moist = **2**、Activity chairfast = **2**、Mobility very limited = **2**、Nutrition probably inadequate = **2**、Friction and shear no apparent problem = **3**，**總分 = 13**。Braden 分級：**15-18 輕度風險、13-14 中度風險、10-12 高度風險、≤ 9 極高風險**。13 分落在**中度風險（moderate risk）**。",
      "detail": "**Braden Scale for Predicting Pressure Sore Risk**\n\n## 量表簡介\n\n- Braden & Bergstrom 1988 開發\n- 美國最廣泛使用\n- 適用：住院、長照、居家\n- 6 個面向，每項 1-4 分（除 friction 為 1-3 分）\n- **總分範圍：6-23**\n- **分數越低、風險越高**\n\n## 六個評估面向\n\n### 1. Sensory Perception（感覺知覺）\n反應對壓力相關不適的能力。\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Completely limited（昏迷或感覺完全喪失） |\n| **2** | **Very limited（嚴重受限）— 僅對痛有反應、無法表達不適** ★ |\n| 3 | Slightly limited |\n| 4 | No impairment |\n\n### 2. Moisture（潮濕度）\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Constantly moist |\n| **2** | **Very/Often moist** ★ |\n| 3 | Occasionally moist |\n| 4 | Rarely moist |\n\n**注意**：「often moist」非 Braden 標準用詞，臨床判斷對應 **very moist (2)**\n\n### 3. Activity（活動度）\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Bedfast |\n| **2** | **Chairfast（僅限椅/輪椅）** ★ |\n| 3 | Walks occasionally |\n| 4 | Walks frequently |\n\n### 4. Mobility（移動能力）\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Completely immobile |\n| **2** | **Very limited（偶爾能小幅改變姿勢）** ★ |\n| 3 | Slightly limited |\n| 4 | No limitation |\n\n### 5. Nutrition（營養狀態）\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Very poor |\n| **2** | **Probably inadequate** ★ |\n| 3 | Adequate |\n| 4 | Excellent |\n\n### 6. Friction and Shear（摩擦力與剪力）\n\n| 分數 | 描述 |\n|---|---|\n| 1 | Problem |\n| 2 | Potential problem |\n| **3** | **No apparent problem** ★ |\n\n**注意**：Friction 只有 1-3 分，沒有 4 分\n\n## 本題計算\n\n| 項目 | 評估 | 分數 |\n|---|---|---|\n| Sensory perception | Very limited | **2** |\n| Moisture | Often moist | **2** |\n| Activity | Chairfast | **2** |\n| Mobility | Very limited | **2** |\n| Nutrition | Probably inadequate | **2** |\n| Friction and shear | No apparent problem | **3** |\n| **Total** | | **13** |\n\n## Braden 風險分級（★ 記憶）\n\n| 總分 | 風險分級 |\n|---|---|\n| **≥ 19** | **No risk** |\n| **15-18** | **Mild risk** |\n| **13-14** | **Moderate risk** ★ 本題 |\n| **10-12** | **High risk** |\n| **≤ 9** | **Very high risk** |\n\n**本題 13 分 → Moderate risk**\n\n## 依風險分級的預防策略\n\n### No / Mild Risk (≥ 15)\n- 一般基本照護\n- 每日皮膚檢查\n- 翻身每 2 小時\n- 保持皮膚清潔乾燥\n\n### Moderate Risk (13-14)\n- 加強翻身頻率\n- **減壓床墊**（泡棉、air overlay）\n- 加強皮膚保濕\n- 轉位訓練、會陰腳跟減壓\n- 定期坐姿壓力釋放\n\n### High Risk (10-12)\n- **主動減壓床**（alternating air mattress）\n- 每小時壓力釋放（坐輪椅者）\n- 頻繁翻身（每 1-2 小時）\n- 營養師會診\n- 皮膚完整性評估加強\n\n### Very High Risk (≤ 9)\n- **Low-air-loss 或 air-fluidized bed**\n- 連續壓力釋放\n- 積極營養支持\n- 多學科團隊介入\n- 每 30 分鐘檢視皮膚\n\n## 其他常用壓瘡風險量表\n\n### Norton Scale\n- 5 項（physical condition, mental status, activity, mobility, incontinence）\n- 總分 5-20\n- ≤ 14 為高風險\n\n### Waterlow Scale\n- 較詳細（涵蓋 BMI、特殊風險、藥物等）\n- 英國常用\n- 分數越高風險越大\n\n## 壓瘡分期（NPUAP 2016）\n\n| 分期 | 描述 |\n|---|---|\n| **Stage 1** | 完整皮膚 + 不可褪色紅斑 |\n| **Stage 2** | 部分皮膚缺損，露出真皮 |\n| **Stage 3** | 全層皮膚缺損、露出皮下脂肪 |\n| **Stage 4** | 全層組織缺損，露出骨、肌腱或肌肉 |\n| **Unstageable** | 全層缺損但被腐肉或焦痂覆蓋 |\n| **Deep Tissue Injury (DTI)** | 持續性非蒼白性深紅或紫色變色 |\n\n## SCI 病人壓瘡預防特別注意\n\n- SCI 是壓瘡**最高風險族群**之一\n- 常見位置：\n  - **坐姿**：坐骨、尾骨、大轉子\n  - **仰臥**：薦骨、足跟、枕部\n  - **側躺**：大轉子、踝、耳\n- 預防措施：\n  - **每 15-30 分鐘壓力釋放**（push-up、lean-forward）\n  - 客製化坐墊（ROHO, Jay, Stimulite）\n  - 每日皮膚檢查（家屬協助或鏡子）\n  - 營養管理\n  - 禁菸（減少組織缺血）\n  - 控制 spasticity、incontinence\n\n## 考點速記\n\n| 分數 | 風險 |\n|---|---|\n| ≥ 19 | 無風險 |\n| 15-18 | 輕度 |\n| **13-14** | **中度** ★ |\n| 10-12 | 高度 |\n| ≤ 9 | 極高 |",

      "detail": "**脊髓損傷壓瘡皮瓣術後照護（Flap Reconstruction Post-op Care）**\n\n## 壓瘡手術重建的背景\n\n### 適應症\n- **Stage 3-4 壓瘡**\n- 保守治療 > 3-6 個月無效\n- 骨髓炎需切除\n- 病人整體狀況適合手術\n- 坐骨、薦骨、大轉子、跟骨常見\n\n### 常用皮瓣\n- **Gluteal musculocutaneous flap**（薦部、坐骨）\n- **Tensor fasciae latae (TFL) flap**（大轉子）\n- **Hamstring V-Y flap**（坐骨）\n- **Gracilis flap**\n- **Rotational / perforator flaps**\n\n## 各選項詳細分析\n\n### (A) Prophylactic Ischiectomy — ★ 錯誤\n\n**歷史沿革**：\n- 1960s-70s：有學者提倡切除坐骨以預防坐姿壓瘡\n- **長期追蹤（> 5 年）發現**：\n  - **單側 ischiectomy**：對側坐骨壓瘡發生率大增\n  - **雙側 ischiectomy**：會陰壓瘡（perineal pressure sores）發生率**反而更高**\n    - 會陰壓瘡位置尷尬、易感染、難照護\n    - 嚴重影響性功能、排便、皮膚衛生\n\n**現代共識（NPUAP, PVA guidelines）**：\n- **不建議預防性切除坐骨**\n- 僅在**已有骨髓炎或無法避免骨質切除**時\n- 重點放在：\n  - **坐姿管理**（pressure mapping、客製化坐墊）\n  - **壓力釋放訓練**\n  - 衛教、行為修正\n  - 高品質座椅（ROHO, Jay）\n\n**為什麼預防性切除失敗？**\n- 人體壓力分佈是整體的\n- 移除骨性突起 → 壓力**轉移到相鄰結構**\n- 會陰與坐骨下方組織不耐壓\n- 手術本身有高併發症\n\n### (B) Low-air-loss Mattress + Bed Rest — 正確\n\n**Low-air-loss mattress**：\n- 多個空氣隔間輪流充放氣\n- 降低壓力\n- 促進濕度蒸發（保持皮膚乾燥）\n- 減少 shear\n\n**其他選擇**：\n- **Air-fluidized bed（Clinitron）**：頂級減壓，但昂貴且重\n- **Alternating air mattress**：間歇性減壓\n- **Static foam overlay**：次級選擇\n\n**臥床休息目的**：\n- 絕對防止傷口受壓\n- 允許皮瓣血供重建\n- 防止肌肉收縮拉扯縫線\n\n### (C) 床頭搖高 < 15° — 正確\n\n**薦部、坐骨術後特別注意**：\n- 床頭搖高 > 15° → **剪力（shear）增加**\n- 剪力是皮瓣存活的**殺手**\n- 會陰部皮膚與深層組織相對移動 → 微血管損傷\n- 原則：**Flat bed（完全平躺）或 < 15°**\n- 餐食時可短暫搖高，餐後立即復位\n\n**例外**：\n- 坐骨手術：可側躺避開\n- 薦部手術：俯臥更理想\n\n### (D) 臥床時間 2-6 週 — 正確\n\n**共識不一**：\n- 傳統：4-6 週\n- 近年趨勢：**漸進式、個別化**\n- 2-6 週範圍內調整\n\n**考量因素**：\n- 皮瓣大小與類型\n- 合併症（DM、低白蛋白）\n- 手術技術\n- 病人依從性\n- 皮瓣癒合速度\n- 痙攣程度\n\n### (E) 開始坐立訓練條件 — 正確\n\n**坐姿漸進式訓練（Sitting Protocol）**：\n\n**先決條件**：\n- **髖關節被動 ROM ≥ 90°**（避免勉強屈曲拉扯傷口）\n- **無皮瓣張力**\n- 傷口癒合初步完成\n- 無感染\n- 無皮膚發紅（30 分鐘測試）\n\n**漸進時程（示例）**：\n- **Day 1**：15 分鐘坐姿 × 2 次\n- **Day 2**：30 分鐘 × 2 次\n- **Day 3**：45 分鐘 × 2 次\n- 每次增加 15-30 分鐘\n- 每次坐後檢查皮膚（若紅斑 > 30 分不褪 → 退回上一個時間）\n- **數週逐漸恢復全日坐姿**\n\n**坐姿檢查重點**：\n- 皮膚發紅\n- 溫度變化\n- 疼痛\n- 皮瓣感\n\n## 術後併發症與預防\n\n### 1. 皮瓣壞死（Flap Necrosis）\n- 發生率：10-30%\n- 原因：\n  - 血供不足\n  - 感染\n  - 剪力\n  - 張力過大\n  - 糖尿病\n  - 吸菸\n- 預防：嚴格姿勢管理、禁菸、優化營養\n\n### 2. 傷口裂開（Dehiscence）\n- 常見於早期負重、痙攣強烈\n- 預防：\n  - 痙攣控制（baclofen, botulinum）\n  - 姿勢管理\n  - 漸進坐立\n\n### 3. 血腫、漏液\n- 需引流管監測\n- 壓迫止血\n\n### 4. 感染\n- 全身性預防性抗生素\n- 傷口照護\n- 遠離尿便污染\n\n### 5. 復發\n- 2 年內復發率高達 **30-60%**\n- 不改變生活習慣、坐姿管理是主因\n- 衛教 + 客製化坐墊為核心\n\n## 術前與術後復健整合\n\n### 術前（Prehabilitation）\n- 營養優化\n  - 白蛋白 > 3.5 g/dL\n  - 前白蛋白（prealbumin）監測\n  - 高蛋白飲食\n  - 維他命 C、鋅補充\n- 戒菸\n- 血糖控制\n- 痙攣管理\n- 尿便管理優化\n- 心理準備\n\n### 術中\n- 無菌操作\n- 適當組織負荷\n- Tension-free closure\n- 骨切除至健康骨\n\n### 術後（Postoperative）\n- 嚴格減壓（減壓床 + bed rest）\n- 引流管管理\n- 傷口檢查\n- 抗生素\n- 營養持續\n- 痙攣控制\n- **漸進坐立訓練**\n\n## 長期預防復發\n\n### 生活方式\n- 每日皮膚檢查\n- 規律壓力釋放（每 15-30 分鐘）\n- 客製化坐墊\n- 適當運動、營養\n- 禁菸\n\n### 輔助策略\n- **Pressure mapping**（坐姿壓力分佈檢測）\n- 坐墊汰舊換新（通常 2-3 年）\n- Tilt-in-space 輪椅\n- 規律醫療追蹤\n- Psycho-social support\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| **Prophylactic ischiectomy** | **不建議** ★ |\n| 術後床墊 | Low-air-loss / air-fluidized |\n| 床頭搖高限制 | **< 15°** |\n| 臥床時間 | 2-6 週（個別化） |\n| 坐姿條件 | 髖 ROM ≥ 90°、無張力 |\n| 漸進坐立 | 15 分鐘起、每日增加 |\n| 高復發率 | 2 年內 30-60% |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 50 \"Pressure Injuries\"", "url": null },
        { "text": "Consortium for Spinal Cord Medicine. Pressure ulcer prevention and treatment following spinal cord injury: a clinical practice guideline for health-care professionals. J Spinal Cord Med 2014;37:1", "url": "https://pubmed.ncbi.nlm.nih.gov/24094331/" },
        { "text": "Schryvers OI, Stranc MF, Nance PW. Surgical treatment of pressure ulcers: 20-year experience. Arch Phys Med Rehabil 2000;81:1556", "url": "https://pubmed.ncbi.nlm.nih.gov/11128889/" },
        { "text": "Keys KA et al. Multivariate predictors of failure after flap coverage of pressure ulcers. Plast Reconstr Surg 2010;125:1725", "url": "https://pubmed.ncbi.nlm.nih.gov/20517097/" },
        { "text": "Kierney PC et al. Results of 268 pressure sores in 158 patients managed jointly by plastic surgery and rehabilitation medicine. Plast Reconstr Surg 1998;102:765", "url": "https://pubmed.ncbi.nlm.nih.gov/9727442/" }
      ]

    "category": "職業醫學",
    "question": "Function Capacity Evaluation (FCE) 是用來評估工作能力的一系列測試，下列有關 FCE 之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "FCE 的評估過程複雜且多樣化，可用來評估個體能力，判斷是否能夠回歸工作" },
      { "key": "B", "text": "測試內容包含肌力、柔軟度、耐力、執行特定工作項目的安全性及操作能力" },
      { "key": "C", "text": "可協助重新評估受傷工作者的能力基準，並於治療期間協助監測進步幅度，療程結束後也能作為職務調整的參考" },
      { "key": "D", "text": "FCE 可當作篩檢或預測再次工作受傷的評估工具" },

    ],
    "answer": "D",
    "explanation": {
      "summary": "(D) 錯誤。**FCE 無法可靠地預測未來工作受傷風險**。多篇系統性回顧（Gouttebarge 2004、Innes 1999、Kuijer 2006）顯示 FCE 在「**預測未來受傷**」或「**篩檢高風險員工**」方面**證據薄弱、預測效度不佳**。FCE 的主要用途是**評估「當下」的功能表現與工作匹配度**，不是預測未來事件。",
      "detail": "**功能性能力評估（Functional Capacity Evaluation, FCE）**\n\n## 定義\n\n**FCE** 是一組標準化的測試，系統性評估個體執行**工作相關任務**的能力，用以：\n- 判斷可否回到原工作\n- 提供職務調整建議\n- 作為失能評估依據\n- 建立復健基準\n- 訴訟、保險參考\n\n## 使用情境\n\n1. **工傷後返回工作（Return-to-work, RTW）評估**\n2. **失能判定**（disability determination）\n3. **職業重建計畫擬定**\n4. **職業重返前評估**\n5. **受傷前 baseline**（某些高風險職業）\n\n## 常見 FCE 系統\n\n- **Blankenship System**\n- **WorkWell / Isernhagen FCE**\n- **Matheson System**\n- **ErgoScience PWPE**\n- **EPIC Lift Capacity**\n\n## FCE 典型測試項目\n\n### 1. 基本功能評估\n- 肌力（Material handling）\n- 柔軟度 (ROM)\n- 平衡\n- 耐力（心肺）\n- 疼痛評估\n- 姿勢耐受\n\n### 2. Material Handling（搬運能力）\n- Lifting（不同高度 / 頻率）\n  - Floor to waist\n  - Waist to shoulder\n  - Overhead\n- Carrying\n- Pushing / Pulling\n\n### 3. Mobility 測試\n- Walking\n- Stair climbing\n- Crouching / Kneeling\n- Crawling\n\n### 4. 精細動作\n- Handling\n- Fingering\n- Reaching\n\n### 5. 姿勢耐受\n- Sitting / Standing tolerance\n- Driving\n- Repetitive movements\n\n### 6. 認知與安全\n- 理解指令\n- 作業安全判斷\n- Distraction handling\n\n## Dictionary of Occupational Titles (DOT) 分級\n\nFCE 結果通常對應美國 DOT 的工作強度分類：\n\n| 等級 | 最大搬運 | 常用搬運 |\n|---|---|---|\n| **Sedentary** | 10 lbs | 極少 |\n| **Light** | 20 lbs | 10 lbs |\n| **Medium** | 50 lbs | 25 lbs |\n| **Heavy** | 100 lbs | 50 lbs |\n| **Very Heavy** | > 100 lbs | > 50 lbs |\n\n## 各選項分析\n\n### (A) 評估個體能力、判斷返回工作 — 正確\n- FCE 的核心用途之一\n\n### (B) 測試內容多元 — 正確\n- 肌力、柔軟度、耐力、安全性、操作能力均包含\n\n### (C) 作為治療期間的追蹤基準 — 正確\n- 可重複測試比較進步\n- 療程前 → 中 → 後評估\n- 調整復健處方\n- 職務調整（如：從 heavy → medium work）\n\n### (D) 篩檢或預測再次受傷 — ★ 錯誤\n\n**文獻證據**：\n\n**Gouttebarge et al. 2004 (Spine)**\n- 系統性回顧\n- 結論：**FCE 預測未來工作受傷的證據不足**\n\n**Innes & Straker 1999**\n- **Test-retest 可靠性**：中等（0.6-0.9）\n- **Predictive validity**：弱\n\n**Kuijer et al. 2006 (JOR)**\n- FCE 與未來再度工傷風險**無明確關聯**\n\n**Gross et al. 2004**\n- FCE 結果與實際工作能力有中等相關\n- 但**預測「是否再次受傷」效度差**\n\n**為什麼 FCE 不能預測未來受傷？**\n1. 受傷受多因素影響：\n   - 工作環境\n   - 心理社會因素\n   - 意外\n   - 個體差異\n2. FCE 是**靜態評估**，無法捕捉動態職場狀況\n3. 執行者間差異（inter-rater variability）\n4. 測試當天表現 ≠ 長期表現\n\n### (E) 可靠性與有效性研究不足 — 正確\n\n**爭議**：\n- **Reliability**：部分系統 test-retest 可靠性好，但系統間比較性差\n- **Validity**：\n  - Face validity（表面效度）OK\n  - **Predictive validity（預測效度）poor**\n  - Content validity：依工作而異\n- **Responsiveness**：對介入變化的敏感度中等\n- 不同 FCE 系統結果**互相不一致**\n- **缺乏統一標準**\n- 健保、保險給付爭議多\n\n## FCE 流程\n\n### 評估前\n1. **病史審查**：診斷、病程、治療史\n2. **工作描述**：DOT 分類、Job Analysis\n3. **醫療文件**：影像、檢查、MMI 狀態\n4. **知情同意**\n\n### 評估日（通常 4-8 小時，可能分 2 天）\n1. **晨間評估**：\n   - 病史、症狀、疼痛評估\n   - 體檢（ROM、肌力、神經）\n   - 基本功能測試\n2. **上午**：\n   - Material handling\n   - Mobility tests\n3. **午餐休息**\n4. **下午**：\n   - 姿勢耐受\n   - Repetitive tasks\n   - Work simulation\n\n### 評估後報告\n- DOT 分類建議\n- 具體能力限制\n- **Work restrictions**\n- **Job modifications 建議**\n- 返回工作建議\n- 進一步介入建議\n\n## Effort Assessment（努力評估）\n\n**重要概念**：FCE 過程中需評估病人是否**充分努力（full effort）**：\n\n### 不充分努力的指標\n- **Waddell signs**（非器質性徵象）\n- 測試結果**不一致**（test-retest variability > 15%）\n- **CV > 15%**（coefficient of variation）\n- 生理指標與自述不符（HR、血壓）\n- Verbal vs behavioral 不一致\n\n### 處置\n- 報告標示「effort appeared submaximal」\n- 建議進一步心理評估\n- 不輕易下「malingering」結論\n\n## FCE 的限制\n\n1. **成本高**（8 小時評估，數千美元）\n2. **主觀性**（評估者判斷）\n3. **缺乏普遍共識**\n4. **無法預測長期結果**\n5. **壓力大**（病人體能、心理負擔）\n6. 僅反映**評估當下**的功能\n\n## FCE 與其他評估的區別\n\n| 項目 | FCE | 一般 PT 評估 | 工作 site visit |\n|---|---|---|---|\n| 時間 | 4-8 hr | 1 hr | 2-4 hr |\n| 內容 | 標準化、全面 | 聚焦症狀 | 實際工作環境 |\n| 目的 | 返工評估 | 治療計畫 | 工作匹配 |\n| 費用 | 高 | 中 | 中 |\n\n## 考點速記\n\n| 特性 | FCE |\n|---|---|\n| 評估當下功能 | ✓ |\n| 指導工作調整 | ✓ |\n| 監測治療進展 | ✓ |\n| **預測未來受傷** | **✗ 證據不足** ★ |\n| 現有研究充足 | 爭議多 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 35 \"Occupational Rehabilitation\"", "url": null },
        { "text": "Gouttebarge V et al. Reliability and validity of functional capacity evaluation methods: a systematic review with reference to Blankenship system, Ergos work simulator, Ergo-Kit and Isernhagen work system. Int Arch Occup Environ Health 2004;77:527", "url": "https://pubmed.ncbi.nlm.nih.gov/15346235/" },
        { "text": "Innes E, Straker L. Validity of work-related assessments. Work 1999;13:125", "url": "https://pubmed.ncbi.nlm.nih.gov/12441606/" },
        { "text": "Kuijer W et al. Prediction of sickness absence in patients with chronic low back pain: a systematic review. J Occup Rehabil 2006;16:439", "url": "https://pubmed.ncbi.nlm.nih.gov/16775760/" },
        { "text": "Gross DP, Battié MC. The prognostic value of functional capacity evaluation in patients with chronic low back pain: part 2: sustained recovery. Spine 2004;29:920", "url": "https://pubmed.ncbi.nlm.nih.gov/15082996/" }
      ]
    }

    "explanation": {
      "summary": "(D) 錯誤。**DELIVER 模型的設計目的就是涵蓋「短期與長期失能」病人**，包含已經失能多年、長期失業、多重複雜需求的個案。它的多面向（biopsychosocial）架構特別適合**長期失能族群**—這正是傳統 RTW 模型難以處理的區塊。選項說「不適用於長期失能」恰好與模型設計初衷相反。",
      "detail": "**DELIVER Model**\n\n## 模型全名\n\n**DELIVER**：**D**isability **E**valuation, **L**ivelihood, and **I**ncome **V**ocational **E**mployment **R**ehabilitation model\n\n## 背景\n\n- 由美國 PM&R 學會（AAPM&R）推動\n- 目的：建立**標準化、以 ICF 為基礎**的職業復健評估架構\n- 整合醫療、職業、社會、經濟層面\n- 對應**WHO ICF**（International Classification of Functioning, Disability and Health）概念\n\n## 核心特色\n\n### 1. 以 ICF 為理論框架 ★\n- 涵蓋 ICF 所有面向：\n  - **Body functions and structures**\n  - **Activities**\n  - **Participation**\n  - **Environmental factors**\n  - **Personal factors**\n- 目前**唯一**系統性將 ICF 應用於職業復健評估的綜合性模型 → (E) 正確\n\n### 2. Biopsychosocial Model\n- **生理層面**：身體損傷、功能限制\n- **心理層面**：動機、認知、情緒、自我效能\n- **社會層面**：家庭、工作場所、社會網絡\n- **經濟層面**：保險、福利、政府補助\n- **環境層面**：物理障礙、科技支援\n\n### 3. 整合性評估\n- 不只評估「失能」本身\n- 包括「可用資源」與「支援系統」\n- 跨專業團隊合作\n\n## 評估面向\n\n### (1) Disability Evaluation（失能評估）\n- 整體失能嚴重度\n- 特定功能限制\n- 共病症\n- MMI（maximum medical improvement）狀態\n\n### (2) Work Capacity & Work Demand（工作能力與需求）\n- **Work capacity**：病人能做什麼\n- **Work demand**：工作要求什麼\n- **Fit / Mismatch analysis**：兩者匹配度\n- 工具：\n  - **FCE**\n  - Job Analysis\n  - Ergonomic assessment\n  - **WHODAS 2.0**（WHO Disability Assessment Schedule）\n\n### (3) Well-being 評估 — (B) 正確\n- **生活幸福感（quality of life）**\n- **工作滿意度（job satisfaction）**\n- **績效測量（performance）**\n- 心理健康（憂鬱、焦慮）\n- 疼痛感受\n- 社會參與\n\n### (4) 環境因素\n- **經濟狀況** → (C) 正確\n  - 保險補助\n  - 失業救濟\n  - 殘障年金\n- **政策**：\n  - 反歧視法\n  - 職業重建補助\n  - ADA（美國）、身權法（台灣）\n- **工作場所**：\n  - 雇主態度\n  - 同事支持\n  - 物理環境調整\n  - **合理調整（reasonable accommodation）**\n\n### (5) Personal factors\n- 年齡、教育、技能\n- 動機、自我效能\n- 家庭責任\n- 文化背景\n\n## 各選項分析\n\n### (A) 生物心理社會方法 — 正確\n- DELIVER 核心精神\n\n### (B) 多面向評估內容 — 正確\n- 涵蓋失能、能力、負荷、幸福、滿意、績效\n\n### (C) 經濟與政策影響 — 正確\n- 失能者就業受這兩個因素影響**顯著大於**一般人群\n- 例如：\n  - 殘障年金可能**阻礙**就業（reverse incentive）\n  - 就業補助可能**促進**就業\n  - 長期照護費用影響 RTW 決策\n\n### (D) 不適用於長期失能 — ★ 錯誤\n\n**真相**：\n- DELIVER 特別設計來**處理長期、複雜的失能個案**\n- 傳統 RTW 模型對短期（< 6 個月）個案有效\n- **長期失能（> 1 年）** 涉及更多層面：\n  - 身份認同轉變\n  - 社會角色喪失\n  - 經濟困難\n  - 心理合併症\n- DELIVER 的多面向架構**正是為此設計**\n- 適用範圍：\n  - 短期失能（傳統 RTW）\n  - **中長期失能**\n  - **重大創傷後**（SCI、TBI、amputation）\n  - **慢性疾病**（stroke、MS、rheumatic）\n\n### (E) 唯一基於 ICF 的綜合職業復健模型 — 正確\n- 許多模型涉及部分 ICF 概念\n- DELIVER 是**目前唯一系統性、完整性應用 ICF** 的綜合性模型\n- 強調 ICF 的**參與（participation）**面向\n\n## DELIVER 與其他模型比較\n\n### 其他 RTW / 職業復健模型\n\n1. **Sherbrooke Model**（1991）\n   - 早期介入\n   - 人體工學 + 職業\n   - 聚焦腰痛\n\n2. **Readiness for RTW Model**（Franche 2002）\n   - 心理準備度階段\n   - Transtheoretical Model 應用\n\n3. **Biopsychosocial Model of Pain and Disability**\n   - Waddell 發展\n   - 聚焦慢性痛\n\n4. **Work Disability Prevention Paradigm**\n   - Loisel et al.\n   - 系統性干預\n\n5. **DELIVER（本題）**\n   - 完整 ICF 整合\n   - 長短期失能\n   - 多面向\n\n## 台灣職業復健實務\n\n### 法律依據\n- 《**身心障礙者權益保障法**》\n- 《職業災害勞工保護法》\n- 《職業安全衛生法》\n\n### 實務流程\n1. **醫療復健**（急性/亞急性期）\n2. **職業評估**\n3. **職業訓練**\n4. **就業服務**\n5. **就業支持**（follow-up）\n\n### 資源\n- 各縣市**勞工局**職業重建個管中心\n- 庇護工場\n- 支持性就業\n- 社區日間照顧\n- 職務再設計補助\n\n## 考點速記\n\n| 特性 | DELIVER Model |\n|---|---|\n| 理論基礎 | **ICF** |\n| 方法 | Biopsychosocial |\n| 評估面向 | 失能、能力、負荷、環境、個人 |\n| **適用族群** | **短期 + 長期失能皆適用** ★ |\n| 創新 | 唯一完整應用 ICF 的職業復健模型 |\n| 特別考量 | 幸福感、工作滿意度、績效 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 35 \"Occupational Rehabilitation\"", "url": null },

        { "text": "Escorpizo R et al. A conceptual definition of vocational rehabilitation based on the ICF: building a shared global model. J Occup Rehabil 2011;21:126", "url": "https://pubmed.ncbi.nlm.nih.gov/21152954/" },
        { "text": "Loisel P et al. Disability prevention: new paradigm for the management of occupational back pain. Dis Manag Health Outcomes 2001;9:351", "url": null }

    "question": "下列有關失能判定 (disability determination) 之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "行政機關的失能判定 (administrative disability) 通常依賴對損傷（impairment）的醫學評估，在永久性狀況下經常以功能性能力評估（Functional Capacity Evaluation, FCE）來衡量" },
