const QUESTIONS = [
  {
    "id": "114-1-001",
    "year": 114,
    "session": 1,
    "number": 1,
    "category": "職能復健",
    "question": "下列有關重返工作崗位（return to work）策略之敘述，何者最正確？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "工作強化（work hardening, WH）是密集的物理治療課程，目的是進行運動訓練和監督，以符合特定的工作要求，例如重複性任務，或增加伸展、站立、行走或舉重能力"
      },
      {
        "key": "B",
        "text": "工作適能（work conditioning, WC）適用於已確定有肌肉骨骼缺陷以致無法達到工作要求時，使用真實或模擬的工作活動，並逐步增加活動，以幫助恢復功能和職業能力"
      },
      {
        "key": "C",
        "text": "員工在參與工作強化或工作適能計劃的同時，建議先暫停從事工作，以減少重複性任務造成的傷害"
      },

        "text": "個體在接受功能恢復計畫（functional restoration programs, FRP）之後重返工作崗位的效益，會受失能時間的長短影響"

        "text": "與個體已用盡所有其他治療方法且作為最後手段時才使用相比，在復健過程的早期即使用功能恢復計劃更具成本效益（cost-effectiveness）"

    "answer": "E",
    "explanation": {
      "summary": "FRP（功能恢復計畫）越早介入效果越好，延遲介入成本效益降低。(A)(B) 兩者定義互相顛倒；(C) 鼓勵保持工作，而非暫停；(D) 影響返回工作效益的是「失能時間長短 + 介入時機」，但 (E) 更全面且為最核心概念。",
      "detail": "**三種職業復健計畫的區別（常考）**\n\n• **Work Conditioning (WC)**：較基礎的計畫，著重於身體條件的恢復（肌力、耐力、柔軟度、心肺功能），通常為 **1 小時/天、每週 3-5 天**。適用於受傷早期或功能缺損單純的個案。→ 選項 (A) 描述的其實是 WC\n\n• **Work Hardening (WH)**：較進階且密集，使用**真實或模擬的工作活動**（real or simulated work activities），目的是讓個案回到特定工作崗位。通常為 **4-8 小時/天、每週 5 天、持續數週**，是 WC 之後的進階階段。→ 選項 (B) 描述的其實是 WH\n\n• **Functional Restoration Program (FRP)**：針對慢性疼痛/失能的**跨領域整合計畫**，包含身體訓練、心理治療、認知行為治療、職業諮詢。核心理念是「越早介入越好」。\n\n**重要臨床原則**：\n- 鼓勵員工在 WC/WH 計畫期間**盡可能繼續工作**（modified duty），而非暫停。長期脫離工作反而會降低重返率。\n- FRP 的效益與**失能時間（disability duration）成反比**：失能超過 6 個月再介入，返回工作率顯著下降；超過 2 年幾乎無法返回。\n- 早期介入 FRP 不僅臨床效果好，**成本效益**也優於延遲使用。",

          "text": "Cuccurullo PM&R Board Review, 4th ed., Occupational Rehabilitation",
          "url": null
        },
        {

          "url": "https://pubmed.ncbi.nlm.nih.gov/14749199/"

        }

  {
    "id": "114-1-002",
    "year": 114,
    "session": 1,
    "number": 2,
    "category": "無障礙環境",
    "question": "下列有關無障礙環境評估與處置之敘述，何者最不正確？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "通常會依照「確認需求」→「病人能力評估」→「住宅環境評估」→「定義問題與設定目標」→「擬定處置策略並執行」等步驟進行"
      },
      {
        "key": "B",
        "text": "復健人員（尤其是職能治療人員）應請家屬配合繪製家中平面圖，並在醫院中的 ADL 室進行模擬評估，以給予家屬無障礙環境建議"
      },
      {
        "key": "C",
        "text": "供行動不便者使用之通路高低差在 0.5 至 3 公分者應作 1/2 斜角處理，使用之廁所盥洗室應設置直徑 150 公分以上之迴轉空間"
      },
      {
        "key": "D",
        "text": "室內外出入口有門檻，應加裝扶手或更換為小型輪椅，也可用對比顏色區分，以利弱視者區辨"

        "key": "E",
        "text": "浴室內無迴轉空間，應另尋適合之浴室，或將浴盆打掉換成無門檻之淋浴設備"
      }
    ],
    "answer": "D",
    "explanation": {
      "summary": "門檻的正確處理是「**移除**」或加裝**斜坡板**讓輪椅能通過，而不是換小型輪椅或只加扶手。扶手是輔助行走用，無法解決門檻阻擋輪椅的問題。",
      "detail": "**台灣建築物無障礙設施設計規範重點**（與本題相關）：\n\n• **通路高低差處理**：0.5-3 cm 應做 1/2 斜角；超過 3 cm 須設斜坡道（坡度 ≤ 1/12）。\n\n• **迴轉空間**：輪椅迴轉需要**直徑 150 cm 以上**的圓形空間（規範以 150 cm 為準）。\n\n• **門檻處理原則**：\n  1. **首選：移除門檻**\n  2. 次選：加裝小型斜坡板（ramp）讓輪椅跨越\n  3. 使用對比顏色標示（協助弱視者辨識）\n  → 「換小型輪椅」不是標準做法（病人的輪椅是配合身體尺寸選的，不能隨便換）\n  → 「只加裝扶手」對輪椅使用者沒用\n\n• **浴室無迴轉空間**：確實建議打掉浴盆改為無門檻淋浴間（walk-in shower），這是老年人跌倒高發部位之一。\n\n**ICF 架構下的無障礙評估順序**（常考流程）：\n確認需求 → 病人能力評估 → 環境評估 → 定義問題/設目標 → 擬定處置並執行 → 成效追蹤",

  {
    "id": "114-1-003",

    "number": 3,

    "question": "一名 45 歲男性因腦外傷導致認知功能受損，臨床評估顯示，病人在進行日常活動時容易因環境干擾而分心，難以維持長時間專注，在需要快速切換任務時表現困難，記憶力及執行功能下降。根據臨床上職能治療介入的原則，下列那一項敘述最不正確？",

    "explanation": {
      "summary": "記憶力障礙目前**沒有有效的「矯正性」（restorative）訓練**，臨床上**代償性策略（compensatory strategies）**（如使用記憶輔助本、手機提醒、環境修改）才是有實證支持的主流介入方式。",
      "detail": "**腦傷後認知復健兩大策略**（ACRM/INCOG Guidelines 重點）：\n\n• **Restorative（矯正性）**：嘗試恢復受損的認知功能本身，透過反覆練習期望神經可塑性重建原始能力。\n  → 對**注意力、執行功能**有一定效果\n  → 對**記憶力則效果有限**，不建議單獨使用\n\n• **Compensatory（代償性）**：不試圖恢復原本能力，而是繞過缺損、使用輔具或環境調整達到功能目標。\n  → 記憶障礙的**首選**介入\n  → 範例：memory notebook、smartphone reminders、checklists、標籤化環境\n\n**注意力分類與介入**（APT, Attention Process Training 架構）：\n\n1. **Focused attention（集中性）**：對單一刺激做反應\n2. **Sustained attention（持續性）**：長時間專注於單一任務 → 由興趣活動入手，逐步延長\n3. **Selective attention（選擇性）**：過濾干擾，專注目標刺激\n4. **Alternating attention（交替性）**：在不同任務間切換\n5. **Divided attention（分配性）**：同時處理多個刺激 → 從 2 個刺激開始漸進\n\n**自我察覺（self-awareness）嚴重受損者**：矯正性訓練效果差（因為個案不認為自己有問題），所以改用**環境改造**（物理/社會環境提供結構化支持）來降低風險。",
      "sources": [

          "text": "Braddom's PM&R, 6th ed., Ch. 19 \"Traumatic Brain Injury\"",

      "summary": "人因工程原則下，電腦工作時**手肘應維持彎曲 90-120 度**（不是 70-90 度）。70 度的手肘屈曲角度過小，會增加上肢肌肉負擔與腕隧道壓力。",
      "detail": "**電腦工作站理想姿勢**（OSHA / ANSI/HFES 100-2007 標準）：\n\n• **頭頸**：耳朵、肩膀、髖部呈一直線；頸部不前傾\n• **螢幕**：\n  - 一般使用者：螢幕上緣與眼睛水平齊高或略低\n  - 配戴**雙焦點鏡片（bifocal）者**：螢幕需放更低，低於視線 **30-45°**（因為雙焦鏡下半部才能看清螢幕，太高會讓頸部過度後仰）\n• **手肘**：**彎曲 90-120°**，貼近身體（not 70-90°）\n• **手腕**：保持中立（neutral），**手-腕-前臂呈一直線且與地面平行**\n• **髖/膝**：\n  - 髖屈曲 90-120°\n  - 膝與髖大致等高\n  - 大腿平行地面，有適當支撐\n  - 雙足平貼地面或踏板（可略前傾）\n\n**防止工作相關肌肉骨骼疾病（WMSDs）原則**：\n- 避免長時間維持固定姿勢（每 20-30 分鐘換姿勢）\n- 滑鼠/鍵盤與手腕同高\n- 肩膀放鬆下垂，不聳肩",

    "question": "下列有關日常功能障礙的處置及輔具應用之敘述，何者錯誤？",

        "text": "動作協調不良者湯匙應選用金屬面而非塑膠膜包覆者"

      "summary": "動作協調不良者（如腦傷、巴金森氏症、共濟失調病人）應選用**塑膠膜或矽膠包覆的湯匙**，避免金屬碰牙造成口腔傷害與不適。金屬面湯匙反而危險。",
      "detail": "**常考輔具使用原則**：\n\n• **(A) Universal cuff（萬用套）**：綁在掌心的帶子，中間可插湯匙、牙刷、梳子等。用於**握力差或手內在肌癱瘓**的病人（如 C6-C7 SCI、類風濕關節炎晚期）。\n\n• **(B) 餐具選擇**：\n  - 動作協調不良 → **塑膠/矽膠包覆**（soft-coated），防止咬傷\n  - 握力不足 → built-up handle（加粗把手）\n  - 前臂旋後受限 → swivel spoon（旋轉湯匙）\n\n• **(C) 下肢 ROM 受限**：\n  - 彈性鞋帶（elastic laces）→ 免綁鞋帶\n  - Long-handled shoehorn（長柄鞋拔）\n  - Sock aid（穿襪輔具）\n\n• **(D) THR 術後注意事項（Hip Precautions）**：\n  - **後側手術入路（posterolateral approach，最常見）**：避免**髖屈曲 >90°、內收跨越中線、內旋**\n  - 因此需要：raised toilet seat（馬桶增高墊）、high chair、避免交叉腿、床上避免患側睡\n  - 一般術後維持 6-12 週\n  - 前側入路（anterior approach）則避免伸展+外旋\n\n• **(E) RA 能量保存與關節保護原則**：\n  - 雖然強調關節保護，但**不可完全停止活動**\n  - 維持活動有助保留 ROM、肌力、預防僵硬\n  - 原則：用**大關節**取代小關節、避免持久緊握、分散負荷",

    "category": "輔助科技",
    "question": "下列有關輔助科技之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "輔助科技服務常應用的策略為提升個案的能力及降低環境的要求。"
      },
      {
        "key": "B",
        "text": "在為個案選擇輔具時，通常會依循購買-改裝-訂製(B-A-D)的優先順序"
      },
      {
        "key": "C",
        "text": "Human Activity Assistive Technology (HAAT) Model 強調使用者、活動、輔助科技三大要素都必須在各種的情境下考量"
      },
      {
        "key": "D",
        "text": "人的內部驅動系統歸類為感覺輸入、中樞處理及運動輸出三大能力，不同能力發生障礙時，所需使用的輔助科技將有所不同"
      },
      {
        "key": "E",
        "text": "在評估輔助科技應用的效益時，通常只強調動作或行為的改善與否，而不著重功能表現的提升程度"
      }
    ],
    "answer": "E",
    "explanation": {
      "summary": "輔助科技的成效評估必須**同時評估「動作/行為改善」與「功能表現提升」**（如 ICF 中 activity 與 participation）。單看動作改善而忽略實際功能意義沒有臨床價值。",
      "detail": "**輔助科技(Assistive Technology, AT)重要概念**：\n\n• **(A) 雙向策略**：\n  - 提升個案能力（training, restorative）\n  - 降低環境要求（compensation, environmental modification）\n  - 兩者並用效果最好\n\n• **(B) B-A-D 順序（成本/複雜度由低至高）**：\n  - **B**uy → 現成購買（commercially available）\n  - **A**djust/Adapt → 改裝已有商品\n  - **D**esign/Develop → 訂製開發（客製化）\n\n• **(C) HAAT Model**（Cook & Hussey 提出）：\n  四大要素：Human（使用者）、Activity（活動）、Assistive Technology（輔具）、**Context（情境）** — 四者互相影響。本題 (C) 說「三大要素」不太精確但不算錯，因為重點是「必須在各種情境下考量」這個原則對。\n\n• **(D) 內部驅動系統**：\n  - Sensory input（感覺輸入）\n  - Central processing（中樞處理）\n  - Motor output（運動輸出）\n  → 對應不同的輔具類型（如感覺輸入障礙 → 助聽器、盲用點字；運動輸出障礙 → 電動輪椅、環境控制系統）\n\n• **(E) 成效評估**：\n  - 不只看「能不能做出動作」，更要看「**實際生活中是否提升獨立性、參與社會、改善生活品質**」\n  - 常用工具：QUEST (Quebec User Evaluation of Satisfaction with AT)、PIADS (Psychosocial Impact of Assistive Devices Scale)",

    "category": "上肢義肢",
    "question": "一位病人接受經橈骨截肢（transradial amputation）手術後，現在需要選擇一款最合適的套筒設計。以下有關其套筒設計之敘述，何者正確？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "若病人的殘肢較短，適用明斯特（Muenster）型套筒，因其提供更親密的包裹和強化的前後壓縮，適合較短的殘肢"

      {
        "key": "B",
        "text": "若病人的殘肢較短，適用西北（Northwestern）型套筒，因為它提供較低的內外側壓縮，更適合短殘肢使用"

        "key": "C",
        "text": "若病人為雙側截肢者，適用明斯特（Muenster）型套筒，因為該套筒容易穿戴，特別受到雙側截肢者的青睞"
      },
      {
        "key": "D",
        "text": "若病人的殘肢較長，適用西北（Northwestern）型套筒，其套筒特色為肘部前面提供一個通道，讓肱肌（brachialis muscle）肌腱通過。這樣能夠執行不受阻礙的屈曲"

        "text": "若病人選用經橈骨截肢解剖學輪廓(Transradial Anatomically Contoured, TRAC)型套筒，因其對殘肢同時使用前後和內外側壓縮來增強穩定性和舒適度，進而將負荷從橈骨轉移到更具負荷耐受性的遠端肌肉群"

      "detail": "**經橈骨（transradial）截肢三大經典套筒設計**（常考重點）：\n\n**1. Muenster Socket（明斯特型）**\n- 設計者：Hepp & Kuhn（1950s，德國）\n- 適用：**短殘肢（< 35% 前臂原始長度）**\n- 特色：\n  - 高 trim line 包覆鷹嘴突（olecranon）與肱骨髁\n  - **前後（A-P）強化壓縮**：前緣凸出壓在肘前窩、後緣包住鷹嘴突，提供自我懸吊\n  - 前方有凹陷讓 **biceps tendon** 通過（不是 brachialis）\n  - 缺點：**限制手肘屈伸**（trim line 高）\n\n**2. Northwestern Socket（西北型）**\n- 設計者：John Billock（1970s，Northwestern University）\n- 適用：**中等至長殘肢**\n- 特色：\n  - **M-L（內外側）壓縮**通過肱骨髁達到懸吊\n  - 低 anterior trim line（約 45% socket 長度）\n  - 手肘屈伸範圍較 Muenster 好\n\n**3. TRAC Socket（Transradial Anatomically Contoured）**\n- 設計者：Miguelez et al.（2003）\n- 結合 Muenster + Northwestern 的優點\n- **同時使用 A-P 和 M-L 壓縮**\n- 但重點：將負荷從**骨性突起**轉移到「**近端的 load-tolerant 肌肉群**」（不是遠端 — 選項 E 方向錯誤）\n\n**各選項分析**：\n- (A) ✓ Muenster 正是為短殘肢設計，A-P 強化壓縮\n- (B) ✗ Northwestern 是 M-L 壓縮不是「較低 M-L 壓縮」\n- (C) ✗ 雙側截肢者較偏好 TRAC 或 Northwestern（Muenster 限制手肘活動太多）\n- (D) ✗ 是 biceps tendon 通過，不是 brachialis\n- (E) ✗ 負荷轉移到**近端**肌肉群，不是遠端",
      "sources": [

      "detail": "**六種基本手部抓握（常考）**：\n\n| 抓握型態 | 主要手指 | 臨床範例 |\n|---|---|---|\n| **Hook grasp（鉤型）** | **第 4、5 指屈曲** | 提公事包、提行李 |\n| Power/Cylindrical grasp（圓柱型） | 全部手指 + 拇指包覆 | 握酒瓶、手把 |\n| Spherical grasp（球型） | 手指外展 + 屈曲 | 拿球、轉門把 |\n| Tip pinch（指尖捏） | 拇指 + 食指指尖 | 撿小物、穿針 |\n| Lateral/Key pinch（側邊捏） | 拇指 vs 食指橈側 | 拿鑰匙 |\n| Three-jaw chuck（三點抓） | 拇指 + 食指 + 中指 | 寫字、拿筆 |\n\n**各選項說明**：\n\n• **(A) ✓** 復健終極目標是 ADL 獨立，義肢只是工具\n\n• **(B) ✗** **小指對 hook grasp 非常重要**（第 4、5 指是主要彎曲者）\n\n• **(C) ✓** Phalangization（掌骨指骨化）：在嚴重手部截肢中，藉由加深指蹼讓殘餘掌骨能當手指用、重建拇指對掌功能\n\n• **(D) ✓** 經橈骨截肢長度分類：\n  - **< 35%**：very short，幾乎無 pronation/supination\n  - **35-55%**：short，**pronation/supination 功能喪失或嚴重受限**\n  - 55-80%：medium\n  - **> 80%**：long，旋前旋後相對保留\n\n• **(E) ✓** 現代多關節肌電手（如 Ottobock bebionic、Össur i-Limb、Taska Hand）可程式化多種抓握模式",

      "detail": "**義膝（prosthetic knee）分類總覽**：\n\n**K-level（Medicare Functional Classification Level）**：\n- K0：無法行走\n- K1：家中有限行走（cadence 固定）\n- K2：社區內有限行走（低障礙環境）\n- K3：社區內變速行走（可處理不平地、樓梯）\n- K4：運動、高衝擊需求\n\n**1. Manual locking knee（手動鎖定式）**\n- 行走時膝關節完全鎖死，坐下時才解鎖\n- 步態僵硬但非常穩定\n- 適用：**術後短期、K1、視障者、平衡極差者**\n\n**2. Single-axis knee with weight-activated lock（單軸，體重活化鎖定）**\n- 承重時摩擦鎖定（stance control）\n- **當屈曲 > ~20°時解鎖**，進入擺動期\n- 適用：K1-K2\n\n**3. Hydraulic/Pneumatic knee（液壓/氣壓式）**\n- 依速度調節阻尼，讓病人可以**變速行走**\n- 適用：**K3**\n- 缺點：重、貴\n\n**4. Polycentric / Multi-axis knee（多聯桿義膝）**\n- 透過 4-bar linkage 產生**瞬時旋轉中心（ICOR, instantaneous center of rotation）**\n- 站立早期 ICOR 位於膝關節後上方 → **極佳站立穩定性**\n- 屈曲時膝關節**縮短（shortening）**→\n  → 擺動期 toe clearance 變好\n  → **特別適合膝解離（KD）病人**（因為 KD 病人遠端殘肢長，座位時兩膝不齊；多聯桿屈曲縮短可解決這問題）\n  → 也適合長殘肢經股骨截肢\n- 選項 (D) ✗ 描述正好相反\n\n**5. Microprocessor knee（MPK，微處理器義膝）**\n- 代表：C-Leg、Rheo Knee、Genium、Power Knee\n- 感測器監測角度、速度、載重 → 即時調整阻尼\n- **擺動期若感測到將跌倒，瞬間增加屈曲阻抗**（防止膝 buckling）\n- 適用：K3-K4，但費用昂貴\n- 降低跌倒率的證據最充足",

    "question": "下列有關周邊動脈阻塞疾病(peripheral arterial occlusive diseases)之敘述，何者錯誤？",

      "detail": "**ABI 標準解讀（AHA 2012 / ACC 指引）**\n\n| ABI 值 | 臨床意義 |\n|---|---|\n| > 1.40 | 動脈無法壓縮（medial calcinosis），常見於 DM、CKD、老年 |\n| 1.00–1.40 | 正常 |\n| 0.91–0.99 | 邊緣性（borderline） |\n| 0.71–0.90 | 輕度 PAD |\n| 0.41–0.70 | 中度 PAD |\n| ≤ 0.40 | 重度 PAD（常有 rest pain、gangrene） |\n\n**臨床重點**\n\n• **脈壓周邊放大效應（peripheral amplification）**：血壓波由主動脈往周邊傳遞時，因血管阻抗變化、波反射，使**末梢收縮壓略高於中央動脈壓**。所以正常人踝部 BP 會略高於或等於肱動脈 → ABI 約 1.0–1.3。\n\n• **ABI > 1.4 的意義**：動脈壁鈣化無法被血壓計壓癟 → 假性高值。**糖尿病、CKD、老年人**最常見（medial arterial calcification）。此時 ABI 無法正確反映 PAD 狀態，應改用 **toe-brachial index (TBI)** 或 duplex ultrasound。\n\n• **臨床分級（Fontaine / Rutherford）**：\n  - Stage I：無症狀\n  - Stage IIa：mild claudication（可走 >200m）\n  - Stage IIb：moderate-severe claudication（<200m）\n  - Stage III：**rest pain**（critical limb ischemia 起點）\n  - Stage IV：ulcer / gangrene\n\n• **Revascularization 禁忌**：預期餘命短、嚴重 flexion contracture、無法行走的 paralysis、嚴重敗血症 — 這些病人血管重建的效益不高，保守治療或一期截肢更合適。",

      "detail": "**各選項分析**\n\n**(A) ✗** 上肢截肢嬰幼兒裝義肢時機：\n- 通常在 **6 個月左右**（能獨立坐穩時）給予被動義肢\n- **坐穩 → 爬行 → 站立** 階段才考慮給 body-powered\n- 「殘肢撐地而站」階段通常已過了首次裝配時機\n- 身體動力型需要一定認知能力配合訓練\n\n**(B) ✓** **漸進性控制訓練（sequential control training）**：\n- 先熟練 TD（terminal device，手鉤/電動手）開合\n- 熟練後 **→** 啟用肘關節\n- 再熟練後 → 整合多軸控制\n- 一次給太多 DOF（degree of freedom）會讓兒童學不會\n\n**(C) ✗** 自我懸吊型承筒（self-suspending socket，如 Muenster）的**目的就是不需要 harness**。現代外動力義肢搭配 self-suspending socket 可不用 harness，尤其對於美觀/舒適性有要求者。\n\n**(D) ✗** **抓握力比較**：\n- **Body-powered 手鉤**：抓握力由鉤子的橡皮筋數量決定，一個橡皮筋約 1 lb，一般 3-4 個 → 約 3-5 lb\n- **Myoelectric（肌電）手**：可達 **10-25 lb**（遠高於 body-powered）\n- 所以「body-powered 抓握力較強」是錯誤的\n\n**(E) ✗** **Voluntary-opening (VO) vs Voluntary-closing (VC) hook**：\n- **VO hook**：平時由橡皮筋**拉合**（constant grip force），拉索時張開；**抓握力 = 橡皮筋數量**（固定、小）\n- **VC hook**：平時張開，拉索時**主動閉合**；**抓握力可由使用者控制**（力量大、細膩）\n- VO 較常用是因**簡單、不易疲勞**，但**抓握力其實較小**\n\n**臨床整理表**\n\n| 項目 | Body-powered | Myoelectric |\n|---|---|---|\n| 驅動 | 肩胛動作經控索 | EMG 信號 |\n| 重量 | 較輕 | 較重 |\n| 抓握力 | 3-5 lb (VO) | 10-25 lb |\n| 精細度 | 較差 | 較好（多模式） |\n| 美觀 | 差（外露 cable） | 佳 |\n| 維護 | 簡單、堅固 | 複雜、怕水 |\n| 價格 | 便宜 | 貴 |",

      "detail": "**義膝分類與步頻控制能力**\n\n| 義膝類型 | 步頻 | K-level | 特色 |\n|---|---|---|---|\n| Manual locking | 無 | K1 | 行走時全鎖，極穩但步態僵 |\n| Single-axis constant friction | **固定**步頻 | K1-K2 | 簡單、摩擦力固定 |\n| Weight-activated safety knee | **固定**步頻 | K1-K2 | 承重時摩擦鎖定 |\n| Polycentric (multi-axis) | 較固定 | K2-K3 | 4-bar linkage，站立穩、擺動 toe clearance 好 |\n| **Hydraulic/Pneumatic** | **可變**步頻 | **K3** | **依速度調整阻尼** |\n| Microprocessor (MPK) | **可變**步頻 | K3-K4 | 感測器即時調整，防跌效果最佳 |\n\n**為什麼液壓膝能變速？**\n\n流體阻尼與速度成非線性關係：\n- 走得**慢** → 液壓阻力**小**，膝關節容易彎\n- 走得**快** → 液壓阻力**大**，膝關節穩定\n→ 模擬正常膝關節在不同速度下的行為\n\n**固定步頻裝置**（如 single-axis constant friction knee）：\n- 摩擦力固定 → 只有一個「最佳速度」，超過此速度會造成擺動期過快（heel whip）或不足（toe drag）\n- 適合社區內、速度穩定的 K1-K2 病人\n\n**Microprocessor knee（C-Leg, Genium, Rheo）**也能變速，且有更好的**站立控制（stumble recovery）**，但價格昂貴，適合 K3-K4 活躍者。本題因問題明確指「變速需求」，液壓膝是最標準且可及的答案。\n\n**臨床選擇原則**：先看 **K-level**，再考慮病人的**活動需求、體重、殘肢狀況、預算**。",

      "detail": "**下肢截肢行走耗能對照**（相對於正常人步行基準值）\n\n| 截肢高度/狀況 | 耗能增加 |\n|---|---|\n| 正常步行 | 基準 |\n| **單側經脛骨截肢 (Transtibial, TT)** | ↑ 10-40% |\n| Long TT（長殘肢） | ↑ 10% |\n| Short TT（短殘肢） | ↑ 40% |\n| 膝離斷 (Knee disarticulation, KD) | ↑ 40-55% |\n| **單側經股骨截肢 (Transfemoral, TF)** | ↑ 60-80% |\n| 雙側 TT | ↑ 40% |\n| 雙側 TF | ↑ 280%（幾乎無法使用義肢步行） |\n| **雙拐 swing-through gait（不穿義肢）** | **↑ 60-100%**（高於單側 TT 義肢步行） |\n\n**選項分析**\n\n**(A) ✓** Dynamic carbon fiber foot 雖有能量回饋，但仍為被動元件；bionic foot/ankle 有主動驅動，能量效率較佳 → carbon fiber foot 相對耗能較高（題目說法正確）。\n\n**(B) ✗** **Swing-through gait 耗能高於單側 TT 義肢行走**。雙拐步行需大量上肢與軀幹動作、心血管負荷大。TT 義肢病人行走僅增加 10-40% 耗氧，而 swing-through 可增加 60-100%。\n\n**(C) ✓** Short TT 耗能確實低於 KD（KD 有兩個「大腿」長度問題：殘肢長導致 socket 設計困難、膝關節位置不對稱）。\n\n**(D) ✓** **截肢高度是主要決定因素**：\n- 不論病因，高位截肢（TF）耗能都高於低位（TT）\n- 這是因為殘存的功能性關節數量不同\n\n**(E) ✓** **相同截肢高度下，創傷性截肢者步行效能優於血管疾病性截肢者**：\n- 創傷者通常較年輕、心肺功能好、無共病\n- 血管疾病者常有 DM、CAD、CKD、對側腿也可能有問題\n- 研究顯示相同高度下耗能差異約 **20-40%**\n\n**臨床意義**：評估截肢者是否適合義肢復健，不能只看殘肢狀況，還要**整體心肺功能**（METs、VO₂peak）。若病人連單拐步行 METs 都不足，可能連 TT 義肢都無法負擔。",

      "detail": "**此病例的關鍵線索（典型 AS）**\n• 年輕男性（好發於 15-40 歲）\n• **發炎性下背痛**（inflammatory back pain）：慢性、晨僵、活動後改善、**夜間痛醒**（四更痛）\n• 脊椎全方向活動受限（前彎、後仰、側彎）\n• 神經學檢查正常 → 排除神經根壓迫\n\n**診斷流程（ASAS classification criteria 2009）**\n\n**Step 1：X 光薦髂關節（pelvic AP view）** — 首選、便宜、健保給付\n- Grade 0：正常\n- Grade 1：可疑變化\n- Grade 2：輕微骨硬化/糜爛\n- Grade 3：明確骨硬化、關節間隙變窄\n- Grade 4：關節融合\n- 雙側 ≥ Grade 2 或單側 ≥ Grade 3 → 符合 **modified New York criteria**\n\n**Step 2：若 X 光陰性但臨床高度懷疑 → MRI 薦髂關節**\n- 可看到 **acute sacroiliitis**（bone marrow edema, osteitis），早期 X 光還沒變化就能看到\n- 但費用高，健保給付有條件（一般需先 X 光再看）\n\n**Step 3：血液檢查**\n- **HLA-B27**：AS 病人 85-95% 陽性（亞洲人稍低），但不是診斷必要條件\n- ESR、CRP：發炎指標，約 50-70% 病人升高\n\n**各選項分析**\n- (A) 骨頭同位素：非首選，特異度低\n- (B) MRI：敏感度高但昂貴，健保需先 X 光\n- (C) ✓ **骨盤 X 光**：首選、便宜、符合健保\n- (D) HLA-B27：僅為輔助，不能單獨診斷\n- (E) ESR：非特異性\n\n**臨床重點**：AS 的早期診斷延遲平均 5-10 年（因為早期 X 光可能正常），若 X 光無變化但高度懷疑，應轉介風濕科並考慮 MRI。",

      "detail": "**關鍵鑑別點**\n\n| 疾病 | DIP | PIP | MCP | 指甲 | 下背痛 |\n|---|---|---|---|---|---|\n| **PsA** | ✓ | ✓ | ✓ | **pitting, onycholysis** | ✓（脊椎侵犯型） |\n| RA | ✗ | ✓ | ✓ | 一般無 | 頸椎受影響 |\n| OA | ✓ (Heberden) | ✓ (Bouchard) | ✗ | 一般無 | ✗ |\n| Reactive arthritis | 大關節為主 | - | - | - | 薦髂關節 |\n| Systemic sclerosis | 指端皮膚硬化為主 | - | - | 甲側毛細血管變化 | 不典型 |\n\n**乾癬性關節炎（PsA）臨床分類**（Moll & Wright 1973）\n\n1. **Asymmetric oligoarthritis**（最常見，~40-50%）\n2. **Symmetric polyarthritis**（類似 RA，但 RF 多為陰性）\n3. **Distal interphalangeal (DIP) predominant**（最具特異性，但少見）\n4. **Spondylitis / axial**（脊椎侵犯型 ~5-20%）— 本題病人有下背痛即屬此型合併周邊侵犯\n5. **Arthritis mutilans**（最嚴重型）\n\n**PsA 重要體徵**\n- **Nail changes**（80% 病人有）：pitting、onycholysis、油點徵（oil drop sign）、horizontal ridging\n- **Dactylitis**（香腸指）：整根手指腫脹\n- **Enthesitis**：尤其阿基里斯腱、足底筋膜附著處\n- **Skin psoriasis**：約 70-80% 先於關節炎出現\n\n**診斷標準 CASPAR（2006）**\n必需：炎性關節/脊椎/附著點炎\n加分項目（≥ 3 分）：\n- 目前或過去乾癬病史\n- 指甲變化\n- RF 陰性\n- Dactylitis\n- 關節旁新骨形成（X 光）\n\n**AS vs PsA 脊椎炎比較**\n- AS：對稱性、連續性\n- PsA：非對稱、跳躍性、**粗大 syndesmophytes**（marginal/paramarginal）\n\n**治療原則**：NSAIDs → DMARDs (MTX)  → 生物製劑（TNF-α inhibitors, IL-17/IL-23 inhibitors）",

      "detail": "**THR 固定方式與負重原則對照**\n\n| 固定方式 | 術後負重 | 適應族群 |\n|---|---|---|\n| **Cemented（骨水泥）** | **立即 WBAT/FWB** | 老年、骨質疏鬆、活動量較低者 |\n| Cementless（非骨水泥，press-fit + porous coating） | 6 週內 PWB（50%）→ 逐漸進展 | 年輕、骨質好、活動量高者 |\n| Hybrid | 依 cemented 部分 | 混合 |\n\n**為什麼骨水泥可立即負重？**\n- PMMA (polymethylmethacrylate) 骨水泥**在數分鐘內硬化**，達到即時結構穩定\n- 不需等骨頭長入\n- **老年病人首選**（因 cementless 需要好的骨質才能 osseointegrate）\n\n**術後一週復健重點**\n\n**(A) ✗** Cemented THR 術後**可以全負重**，此選項錯誤。\n\n**(B) ✓** 膝間夾枕頭：防止**患側髖內收跨越中線**（adduction）造成脫位。後側入路禁忌動作之一。\n\n**(C) ✓** **Raised toilet seat（馬桶增高墊）**：防止**髖屈曲 > 90°**（後側入路禁忌）。同樣原則也適用：\n- High chair\n- 坐姿時膝蓋不能高過髖\n- Long-handled shoehorn、sock aid、reacher\n\n**(D) ✓** 柺杖是早期必要輔具（助行器 walker 更穩，後期改用 cane）。\n\n**(E) ✓** **Trendelenburg sign 的機轉**：\n- 臀中肌（gluteus medius, superior gluteal nerve, L4-S1）無力\n- 單腳站立時**對側**骨盆下沉\n- THR 術後可能因手術傷害臀中肌或久病萎縮\n- **強化患側臀中肌**是復健重點：side-lying hip abduction、clamshell、單腳站立訓練\n\n**後側入路（posterolateral）術後 Hip Precautions**（術後 6-12 週）\n1. Hip flexion < 90°\n2. No adduction（不跨越中線）\n3. No internal rotation\n→ 結合口訣：「不蹲、不跨、不內轉」\n\n**前側入路（anterior approach）**禁忌則相反：避免 **extension + external rotation**。",

      "detail": "**關節液外觀分類與對應疾病**\n\n| 外觀 | WBC (/mm³) | PMN% | 疾病類別 |\n|---|---|---|---|\n| 清澈（clear）、淡黃 | < 200 | < 25% | 正常 |\n| 透明（transparent）、淡黃 | 200-2000 | < 25% | **非發炎性**（OA、外傷） |\n| 混濁（cloudy）、黃色 | 2,000-50,000 | > 50% | **發炎性**（RA、gout、SLE） |\n| **膿性（purulent）、混濁** | **> 50,000** | **> 75%** | **Septic arthritis** ⚠️ |\n| 血性（bloody） | RBC | - | 外傷、出血性疾病、PVNS |\n\n**為什麼不能直接打類固醇？**\n\n類固醇注射前**必須先排除感染**。若為 septic arthritis：\n- 類固醇抑制局部免疫 → 感染迅速惡化\n- 可能造成敗血症、關節永久破壞\n- 甚至危及生命\n\n**正確處理流程**\n\n1. **關節液抽吸（arthrocentesis）**\n2. 送檢：\n   - **Cell count & differential**（WBC、PMN%）\n   - **Gram stain + culture**（排除感染）\n   - **Crystal examination**（排除痛風/假性痛風）\n   - Glucose、LDH\n3. **等待結果**期間：NSAIDs 止痛、TENS 輔助、冰敷、限制活動\n4. 結果回來後：\n   - 感染 → 抗生素 + 引流\n   - 痛風 → Colchicine、NSAIDs、類固醇\n   - **非感染性發炎** → 可考慮類固醇注射\n\n**各選項分析**\n- (A) ✓ 常規檢查必要\n- (B) ✓ 培養必要（排除感染）\n- **(C) ✗** 在感染未排除前注射類固醇 = 禁忌\n- (D) ✓ NSAIDs 止痛合理（但要注意此 70 歲男性腎功能、消化道風險）\n- (E) ✓ TENS 是非藥物止痛選項，安全\n\n**臨床口訣**：「混濁關節液 = 先排除感染，再考慮類固醇」",

    "question": "下列何種風濕病最適合使用高劑量的皮質類固醇？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "類風濕性關節炎 (rheumatoid arthritis)"

        "key": "B",

        "text": "乾癬性關節炎 (psoriatic arthritis)"

      "summary": "**血管炎（尤其是 GPA、EGPA、巨細胞動脈炎等系統性血管炎）**是少數需**高劑量類固醇（1 mg/kg/day 甚至脈衝式 pulse therapy）**的風濕病。其他疾病有類固醇濫用的顧慮。",
      "detail": "**各風濕病的類固醇使用原則**\n\n**(A) 類風濕性關節炎（RA）**\n- 類固醇僅作為**短期橋接治療**（bridging therapy），等 DMARDs 起效\n- **低劑量**（prednisolone ≤ 7.5 mg/day）\n- 不建議長期使用（副作用 > 療效）\n\n**(B) ✓ 血管炎（Vasculitis）**\n- **需高劑量類固醇**：\n  - ANCA-associated vasculitis（GPA, MPA, EGPA）：prednisolone 1 mg/kg/day\n  - 嚴重時 pulse therapy（methylprednisolone 500-1000 mg × 3 days）\n  - 常合併 cyclophosphamide 或 rituximab\n- **巨細胞動脈炎（GCA）**：prednisolone 40-60 mg/day（合併視覺症狀時 pulse therapy 防失明）\n- **PMR**：15-20 mg/day（較低劑量）\n\n**(C) 漸進性全身硬化症（SSc）**\n- **高劑量類固醇需要極度小心！**\n- 會誘發 **scleroderma renal crisis**（腎危象）\n- 僅在特定適應症（肺炎、肌炎合併）使用\n- 一般維持 < 15 mg/day\n\n**(D) 乾癬性關節炎（PsA）**\n- **盡量避免系統性類固醇**\n- 停藥時可能誘發 **psoriasis 反彈惡化（rebound）**甚至 pustular psoriasis\n- 首選 NSAIDs、MTX、生物製劑\n\n**(E) 反應性關節炎（ReA）**\n- 自限性（通常 6-12 個月自癒）\n- 以 NSAIDs 為主\n- 類固醇僅在嚴重時局部注射或短期低劑量\n\n**血管炎分類（Chapel Hill Consensus 2012）**\n\n| 血管大小 | 代表疾病 |\n|---|---|\n| 大血管 | **GCA（巨細胞動脈炎）**、Takayasu |\n| 中血管 | PAN、Kawasaki |\n| 小血管（ANCA+） | **GPA、MPA、EGPA** |\n| 小血管（免疫複合體） | HSP (IgA vasculitis)、cryoglobulinemic |\n| 變異大小 | Behçet、Cogan\n\n**臨床記憶點**：血管炎是**內科急症**，診斷出來就要高劑量類固醇搶救器官（腎、肺、神經、視力）。",

    "question": "一位 63 歲女性，雙膝疼痛約 4 個月，上午較痛，活動後稍微緩解，經詳細檢查後，診斷為類風濕性關節炎(RA)，對此病人之藥物處置，何者正確？",

    "explanation": {
      "summary": "RA 的**治療金字塔**：MTX 是第一線 DMARD；若 3-6 個月單用 MTX 效果不佳，應加上**第二種 csDMARD**（triple therapy）或**生物製劑 bDMARD / 標靶小分子 tsDMARD**。",
      "detail": "**RA 用藥原則（ACR 2021 / EULAR 2022）**\n\n**第一線：csDMARD（傳統合成 DMARD）**\n- **Methotrexate（MTX）**：首選\n- 若 MTX 禁忌或不耐受：Sulfasalazine、Hydroxychloroquine、Leflunomide\n\n**第二線：若 MTX 3-6 個月效果不佳**\n- **Triple therapy**：MTX + SSZ + HCQ\n- **加生物製劑（bDMARD）**：\n  - TNF-α inhibitor（Etanercept, Adalimumab, Infliximab, Golimumab, Certolizumab）\n  - IL-6 inhibitor（Tocilizumab, Sarilumab）\n  - T cell co-stimulation inhibitor（Abatacept）\n  - CD20 inhibitor（Rituximab）\n- **加標靶小分子 tsDMARD**：\n  - JAK inhibitor（Tofacitinib, Baricitinib, Upadacitinib）\n\n**橋接治療（bridging）**：\n- 類固醇（prednisolone ≤ 7.5 mg/day）\n- NSAIDs\n- 兩者僅為症狀控制，**不改變病程**\n\n**治療目標：Treat-to-Target（T2T）**\n- 追求疾病活動度 **remission** 或 **low disease activity**\n- 每 1-3 個月評估（DAS28、CDAI、SDAI）\n- 未達標就升階治療\n\n**各選項分析**\n\n**(A) ✗** 類固醇**不是第一線**，僅為橋接治療。第一線是 MTX。\n\n**(B) ✓** MTX 單用不夠時，加上其他 DMARD 是標準做法。\n\n**(C) ✗** **傳統 DMARDs（csDMARD）便宜**：\n- MTX, SSZ, HCQ 每月藥費數百元\n- 昂貴且可能有罹癌風險的是**生物製劑與 JAK inhibitor**\n- MTX 反而對 lymphoma、solid tumor 沒有顯著增加風險\n\n**(D) ✗** NSAIDs **只能止痛消炎，無法預防關節破壞**：\n- 關節破壞預防需要 DMARDs（特別是早期 window of opportunity）\n- NSAIDs 長期使用有 GI bleeding、renal、CV 風險\n\n**(E) ✗** RA 是**慢性疾病**，達到 remission 後：\n- csDMARD：**不建議停藥**，可考慮減量，但需持續監測\n- bDMARD：可考慮間隔拉長或減量\n- **停藥後復發率高（年復發率 40-60%）**\n- 即使 remission 也要持續維持治療\n\n**臨床重點**：RA 的「黃金治療窗（window of opportunity）」是發病後 **3-6 個月**，早期積極治療可顯著改善長期預後。",

    "question": "下列有關多發性肌炎 (PM)、皮肌炎 (DM) 的治療與復健，何者錯誤？",

      "summary": "**等長運動（isometric）是 PM/DM 急性期最安全的運動**，因為肌肉長度不變、機械性壓力最小。等張運動（isotonic）和離心運動（eccentric）較可能加重肌肉發炎。",
      "detail": "**PM/DM 分期與運動處方**\n\n**急性期（發炎活動期，CK 明顯升高）**\n- 目標：**維持 ROM、防止攣縮**\n- 處方：\n  - **Passive ROM** → **Active-assisted ROM**\n  - **Isometric exercise**（最安全）：肌肉不縮短不伸長，機械壓力最小\n  - 避免阻力訓練、等張/離心運動\n- 運動量：低強度、短時間、頻繁休息\n\n**恢復期（CK 下降、肌力回復）**\n- 目標：**肌力增強、功能恢復**\n- 處方：\n  - 從 isometric → isotonic → 漸進阻力\n  - 有氧運動\n  - 功能性訓練（ADL）\n- 監測：定期驗 CK、肌力評估、詳細 MMT\n\n**運動類型對肌肉的機械壓力**\n\n| 運動 | 機械壓力 | 急性期建議 |\n|---|---|---|\n| **Isometric**（等長） | **最低** | ✓ 可做 |\n| Isotonic concentric（向心） | 中等 | 避免 |\n| Isotonic eccentric（離心） | **高** | 禁忌 |\n| Plyometric（跳躍） | 最高 | 禁忌 |\n\n**其他選項說明**\n\n**(A) ✓** 類固醇（prednisolone 1 mg/kg/day）是 PM/DM 的第一線治療，**越早使用越好**。延遲治療會導致不可逆的肌肉萎縮。\n\n**(B) ✓** 急性期運動的核心目標是**維持 ROM 防攣縮**，而不是增強肌力。\n\n**(D) ✓** **Calcinosis cutis**（鈣化沉積）是 JDM（幼年型皮肌炎）常見併發症，在皮下、肌肉、筋膜中。過度伸展或創傷會**加劇**鈣化。\n\n**(E) ✓** 恢復期可逐步加強肌力訓練，目標是恢復功能。\n\n**臨床監測重點**\n- CK、aldolase、AST/ALT/LDH 作為肌肉活動指標\n- MMT（徒手肌力測試）每週評估\n- 若運動後 CK 明顯上升、無力加重 → 降低強度\n\n**重要鑑別**：IBM（inclusion body myositis）不同於 PM/DM，對類固醇反應差，主要靠運動復健維持功能。",

      "summary": "AS 的**enthesitis 最常見部位是阿基里斯腱（Achilles tendon）和足底筋膜在跟骨的附著處**。腳跟疼痛常是 AS 的第一個周邊症狀。",
      "detail": "**Enthesitis 定義**\n\n「附著點炎」 = 肌腱、韌帶、關節囊或筋膜附著到骨頭處的發炎，是脊椎關節病變（SpA）的**特徵性標誌**，在 RA 中不會出現。\n\n**AS/SpA 常見 enthesitis 部位（依頻率）**\n\n| 排名 | 部位 | 臨床表現 |\n|---|---|---|\n| 1 | **阿基里斯肌腱附著點（calcaneal insertion）** | 腳跟後方痛 |\n| 2 | **足底筋膜附著跟骨處** | 起床第一步痛 |\n| 3 | 薦髂關節 | 下背痛 |\n| 4 | 肋軟骨關節（costochondral） | 胸痛、呼吸受限 |\n| 5 | 棘突、iliac crest、ischial tuberosity | 局部壓痛 |\n| 6 | 大轉子（greater trochanter） | 側髖痛 |\n\n**為什麼是阿基里斯腱和足底筋膜？**\n- 受力大（走路時每步要承受體重的 5-6 倍）\n- 血流量豐富\n- enthesis 本身結構特殊（fibrocartilage zone）\n\n**臨床評估工具**\n- **MASES**（Maastricht Ankylosing Spondylitis Enthesitis Score）：評估 13 處 enthesis\n- **LEI**（Leeds Enthesitis Index）：6 處 enthesis（for PsA）\n- **SPARCC** 指數：8 處\n\n**影像診斷**\n- **Ultrasound**：肌腱腫脹、低回音、Doppler 血流增加、enthesophyte\n- **MRI**：bone marrow edema、osteitis（最敏感）\n- X 光：後期看到 **enthesophyte**（骨刺樣新骨形成）\n\n**治療**\n- 第一線：NSAIDs\n- 物理治療：伸展、冰敷\n- 頑固者：局部類固醇注射（但阿基里斯腱注射要小心斷裂風險）\n- 生物製劑（TNF-α, IL-17 inhibitors）對 enthesitis 效果佳\n- csDMARDs（MTX, SSZ）對 enthesitis **效果有限**\n\n**其他選項分析**\n- (A) 棘上肌腱炎是 rotator cuff 疾患，非 AS 典型\n- (B) Lateral epicondylitis（網球肘）是過度使用病變\n- (C) Patellar tendinitis（跳躍者膝）是運動傷害\n- (E) Hamstring 附著點確實可能在 AS 出現，但頻率遠低於阿基里斯腱",

      "detail": "**關節炎輔具原則總整理**\n\n**原則一：關節保護（joint protection）**\n- 使用大關節取代小關節\n- 分散負荷\n- 避免持續同一姿勢\n- 避免緊握（deforming force）\n\n**原則二：能量保存（energy conservation）**\n- 坐著做比站著做\n- 使用輔具減少負荷\n- 安排休息\n\n**各選項分析**\n\n**(A) ✗** 關節炎病人（尤其是 hip/knee OA、THR 術後）應**提高馬桶座高度**（raised toilet seat），減少髖膝彎曲角度，降低關節壓力與起身困難。降低馬桶座是反向操作。\n\n**(B) ✓** **Platform crutch**：\n- 肘部屈曲 90 度放在平台上\n- 體重由**前臂（尺骨近端）**承受\n- **避開手腕、手指關節**\n- 適用於：RA、手腕關節炎、手指變形、類風濕手\n- 對比：standard crutch（腋下拐）體重經手腕 → 腋下；forearm crutch 經手腕\n\n**(C) ✗** 關節炎輔具原則是「**使用長力臂的工具省力**」，不是短力臂：\n- **Long-handled reacher**（長柄夾取器）\n- **Long-handled comb**（長柄梳）\n- **Long-handled shoehorn**\n- 力臂越長，使用者端需要的力量越小（槓桿原理）\n\n**(D) ✗** **Built-up handle（加粗把手）的目的是「減少握力需求」，不是「訓練握力」**：\n- 粗把手讓手指不需要完全閉合就能握住\n- 減少手指深層屈肌群的力量要求\n- RA 或 OA 病人關節變形，細把手握不住\n- 同類輔具：foam tubing over utensils\n\n**(E) ✗** **護木（splint）目的是「維持功能、減少疼痛、防止變形」，但無法「改善已經形成的變形」**：\n- Resting hand splint：急性期夜間使用，維持 functional position\n- Working splint：白天活動時穿戴，穩定關節、減痛\n- Thumb spica splint：拇指 CMC 關節炎\n- **一旦形成 ulnar deviation、swan-neck、boutonnière 等變形，護木無法矯正**（需手術）\n\n**關節炎輔具分類表**\n\n| 關節 | 適用輔具 |\n|---|---|\n| 手/腕 | Built-up handle, universal cuff, 護木, platform crutch |\n| 下肢 | 長柄鞋拔、彈性鞋帶、穿襪輔具、reacher |\n| 髖 | Raised toilet seat, long-handled sponge, sock aid |\n| 膝 | Cane, walker, elastic knee sleeve |\n| 全身 | 省力廚具、自助餐盤、electric can opener |",

      "summary": "**頭枕位置調高（對齊頭頂、置於頭顱後方）可以減少揮鞭傷風險**，而非增加。頭枕過低（只到頸後）反而會成為支點，加重頸椎過度伸展。",
      "detail": "**Whiplash Syndrome 核心知識**\n\n**受傷機轉**：\n- **加速性傷害**（典型是追撞 rear-end collision）\n- 車身前移 → 軀幹隨椅背前推 → 頭因慣性暫時不動 → 頸椎相對地**過度後伸（hyperextension）**→ 再反彈過度前屈（flexion）\n- 整個過程 150-200 毫秒內完成\n\n**Quebec Task Force 分級**（WAD grades）：\n- Grade 0：無頸部抱怨/無身體徵象\n- Grade I：頸部痛/僵硬，無身體徵象\n- Grade II：頸部抱怨 + 肌肉骨骼徵象（ROM 減少、壓痛）\n- Grade III：神經學徵象（反射減弱、感覺/運動障礙）\n- Grade IV：骨折或脫位\n\n**各選項分析**\n\n**(A) ✓** 加速性過度後伸是典型機轉（也有前屈部分）\n\n**(B) ✓** **臨床症狀與影像嚴重度不相關**是本病的特點：\n- 病人有嚴重頸痛、頭痛、肩痛、認知障礙\n- 但 X 光常正常，MRI 也可能正常\n- 症狀可能由**軟組織微小損傷、神經敏感化、心理因素**造成\n\n**(C) ✓** 影像檢查敏感度低：\n- X 光：只能看骨性結構\n- MRI：對軟組織較敏感，但 whiplash 的損傷常低於 MRI 解析度\n\n**(D) ✓** **顳顎關節（TMJ）損傷**：頸椎過度伸展時，下巴也會受慣性向前，可能造成：\n- TMJ disc derangement\n- Masticatory muscle strain\n- 臨床上 whiplash 病人合併 TMJ 症狀比率高（20-50%）\n\n**(E) ✗** 頭枕正確位置（依 IIHS / NHTSA 標準）：\n- **高度**：對齊**頭頂**（或至少耳朵上緣）\n- **距離**：離後腦勺 < **4 吋（10 cm）**\n- 越接近「頭頂 + 貼近頭部」越能保護\n- **頭枕太低**（只到頸後）：會成為支點，讓頸椎過度後伸 → **增加受傷風險**\n- **頭枕調高到頭顱後方**：減少頭部相對軀幹的位移 → **降低受傷風險**\n- 現代車有 **Active Head Restraint (AHR)** 系統，碰撞時自動前推\n\n**治療原則**\n- 急性期（< 72h）：冰敷、NSAIDs、輕度活動（避免完全制動）\n- 研究顯示「**早期活動 > 頸圈固定**」（Rosenfeld 2003）\n- 主動運動、姿勢矯正、深層頸屈肌訓練\n- 慢性期若持續症狀：認知行為治療、漸進式運動",

    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "在手肘伸展（extension）時，尺肱關節（ulnohumeral articulation）提供大部分（55%）的內翻應力（varus stress），其次是前囊（anterior capsule）（32%）和外側副韌帶（lateral collateral ligament）（14%）"
      },
      {
        "key": "B",
        "text": "內側副韌帶（medial collateral ligament）的前束（anterior bundle）的前帶（anterior band）在手肘屈曲 0°到 90°時緊繃，前束的後帶（posterior band）在手肘屈曲 60°到 120°時緊繃，而後束（posterior bundle）則在手肘屈曲 90°到完全屈曲時緊繃"
      },
      {
        "key": "C",
        "text": "肘部伸展主要受到前囊和內側副韌帶前束的限制"
      },
      {
        "key": "D",
        "text": "外側尺側副韌帶（lateral ulnar collateral ligament）是手肘後外側旋轉不穩定性（posterolateral rotatory instability）的主要限制構造（primary restraint），其次是橈側副韌帶（radial collateral ligament）和關節囊（capsule）"
      },
      {
        "key": "E",
        "text": "骨間膜（interosseous membrane）在旋前（pronation）姿勢下從橈骨傳遞到尺骨的力（force）比旋後（supination）或中立（neutral）姿勢下傳遞的多"
      }

    "answer": "E",
    "explanation": {
      "summary": "骨間膜（IOM）的中央帶（central band）在**前臂中立（neutral）位或旋後**時傳遞最多力量。**旋前位時 IOM 反而鬆弛**，力量傳遞較少。",
      "detail": "**前臂軸向力傳遞生理學**\n\n前臂在負重時（如撐地、跌倒），力量從手（橈骨腕關節）傳到肘（尺骨）的途徑：\n- **橈骨 → 骨間膜中央帶（central band）→ 尺骨 → 肱尺關節**\n- 此過程讓 80% 的軸向力最終透過尺骨傳到肱骨\n\n**骨間膜張力 vs 前臂位置**\n\n| 前臂位置 | IOM 張力 | 力量傳遞 |\n|---|---|---|\n| **Neutral（中立）** | **最大** | **最多** |\n| Supination（旋後） | 中等 | 中等 |\n| **Pronation（旋前）** | **鬆弛** | **最少** |\n\n解剖原因：\n- IOM 的 central band 走向：從 radial tubercle 斜向下內到 ulnar ridge\n- **中立/旋後**時纖維幾乎垂直於 radius 長軸 → 最能承受軸向拉力\n- **旋前**時橈骨尺骨相對扭轉 → 纖維走向改變、張力下降\n\n**臨床意義**：Essex-Lopresti lesion（橈骨頭骨折 + IOM 斷裂 + DRUJ 破壞），治療時需讓橈骨長度恢復，否則所有力量集中在 DRUJ 造成慢性疼痛。\n\n**其他選項的肘部穩定度概念**\n\n**(A) ✓ 靜態肘部穩定結構（伸展位）**\n- 抵抗 **varus stress**（內翻）：ulnohumeral joint 55%、anterior capsule 32%、LCL 14%\n- 抵抗 **valgus stress**（外翻）：MCL（主要）、ulnohumeral 次之、radiocapitellar 少量\n\n**(B) ✓ MCL 前束的組成**\n- Anterior band：0-90° flexion 時緊繃（抵抗外翻）\n- Posterior band：60-120° flexion 時緊繃\n- Posterior bundle：90° 到完全屈曲時緊繃\n\n**(C) ✓ 肘部伸展末端限制**\n- Anterior capsule\n- MCL anterior bundle\n- Olecranon 撞擊到 olecranon fossa\n\n**(D) ✓ LUCL（lateral ulnar collateral ligament）**\n- 從 lateral epicondyle 走到 supinator crest of ulna\n- **抵抗 posterolateral rotatory instability（PLRI）**的**主要結構**\n- O'Driscoll lateral pivot shift test 陽性\n- 常見於肘關節脫位後\n\n**肘關節脫位機轉（O'Driscoll 三階段）**\n1. Stage 1：LUCL 撕裂 → PLRI\n2. Stage 2：anterior/posterior capsule 撕裂 → perched dislocation\n3. Stage 3：MCL 撕裂 → complete dislocation\n\n**臨床重點**：肘部主要穩定結構是 LUCL（外側）和 MCL anterior bundle（內側），加上 ulnohumeral joint 的骨性吻合。",
      "sources": [

      "summary": "與穿鞋跑步相比，**赤腳跑步會減少 knee moments**（膝關節力矩），這是赤腳跑步派最主要的論點。題目說「增加」是錯誤的。",
      "detail": "**赤腳跑步 vs 穿鞋跑步生物力學**\n\n| 項目 | 赤腳 | 穿鞋 |\n|---|---|---|\n| 著地方式 | **前足/中足著地** (forefoot/midfoot strike) | 多為後足著地 (heel strike) |\n| 初始衝擊力 | 小（分散在緩衝時相） | 大（跟部尖峰） |\n| **Knee flexion moment** | **↓** | ↑ |\n| **Knee extension moment** | **↓** | ↑ |\n| Ankle plantarflexion moment | ↑ | ↓ |\n| 小腿三頭肌負荷 | ↑（可能跟腱炎） | ↓ |\n| Stride length | 較短 | 較長 |\n| Cadence | 較高 | 較低 |\n\n**理論基礎**（Lieberman et al. Nature 2010）：\n- 人類演化原本就是赤腳跑\n- 前足著地產生「被動緩衝」（小腿、跟腱吸收能量）\n- 後足著地產生「撞擊尖峰」（impact transient），可能增加關節疾患\n- **赤腳跑步時膝關節力矩降低 → 理論上可降低膝關節傷害**\n- 但**小腿與跟腱負擔增加** → 轉移到阿基里斯腱炎、脛骨壓力性骨折\n\n**其他選項說明**\n\n**(A) ✓** 穿鞋確實讓 stride length 增加：\n- 鞋子提供後推力（toe-off 時 rocker design）\n- 腳踝保護讓 push-off 更有力\n\n**(B) ✓** 穿鞋 heel contact 時 dorsiflexion 增加：\n- 鞋跟抬高 → 前腳掌相對下傾\n- 實際上在 initial contact 時腳需要更多 dorsiflexion 才能正常觸地\n\n**(C) ✓** 長期穿鞋（特別是窄楦）：\n- 足底肌肉萎縮\n- 足弓結構改變\n- 赤腳站立時 **forefoot spreading**（前足展開）減少\n- 這是為什麼穿最低限度鞋款（minimalist shoe）支持者認為要訓練足內在肌群\n\n**(E) ✓** 窄而高跟的鞋子問題：\n- 前足擠壓 → 拇趾外翻 (hallux valgus)、槌狀趾 (hammer toe)\n- 腳跟增高 → 跟腱短縮 (Achilles tendon shortening)\n- 重心前移 → 前足蹠痛 (metatarsalgia)、morton 神經瘤\n- 腳跟壓力增加 → 跟骨痛\n\n**臨床應用**：\n- 扁平足 → 支撐型鞋、內側楔形墊\n- 高弓足 → 緩衝型鞋\n- 糖尿病足 → 治療鞋、total contact insole\n- 跑者轉換赤腳 → **循序漸進**（前 6-12 週小心跟腱炎、壓力性骨折）",

      "detail": "**Relaxin 與懷孕的關聯**\n\n**Relaxin 的分泌與時程**\n- 黃體（corpus luteum）於**受孕後**就開始分泌\n- 妊娠期血清濃度於**第一孕期達高峰**，之後略降但仍高\n- **分娩後不會立刻歸零**：血清濃度逐漸下降，需要**數週至數月**\n- **餵母乳**會延長 relaxin 的作用\n\n**Relaxin 的功能**\n- 軟化 symphysis pubis、sacroiliac ligaments（利於分娩）\n- 全身性作用：所有韌帶鬆弛度增加（非專一性）\n- 增加關節活動度，但也**增加運動傷害風險**\n\n**臨床意義**\n- 孕婦常見：骨盆疼痛、下背痛、symphysis pubis dysfunction (SPD)\n- **產後運動傷害風險延續 3-6 個月**，特別是韌帶損傷\n- 建議產後運動循序漸進，避免高衝擊運動太快恢復\n\n**為什麼 (A) 是錯的**\n\n選項寫「鬆弛素於分娩後便終止此作用」— **錯誤**。\n- Relaxin 不會分娩後立刻停止\n- 韌帶鬆弛效應可持續至少 3 個月\n- 這是為什麼產後婦女需要特別注意運動強度\n\n**其他選項分析**\n\n**(B) ✓** 運動對肌腱/韌帶的影響：\n- **初期（數週）**：由於重塑（remodeling）過程，出現**膠原蛋白暫時性淨流失**，舊纖維被分解快於新纖維合成 → 此期間為**損傷易感期**\n- **中期-長期（數月）**：抗張強度↑、骨-肌腱界面強度↑\n- 臨床應用：阻力訓練初期損傷風險高，要循序漸進\n\n**(C) ✓** 類固醇對肌腱的影響：\n- 抑制 fibroblast 功能\n- 抑制膠原蛋白合成\n- 降低組織修復能力\n- 降低肌腱抗張強度 → **肌腱斷裂風險**\n- 臨床教訓：阿基里斯腱、髕骨腱**禁止局部注射**高劑量類固醇\n- 系統性類固醇（如 prednisolone）長期使用也會影響\n\n**(D) ✓** 糖尿病與肌肉骨骼疾患：\n- **Limited joint mobility（LJM）**：DM 最常見之一\n- 機轉：**糖化終末產物（AGEs）**在膠原蛋白上累積\n- 微血管病變影響結締組織營養供應\n- 常見：frozen shoulder、trigger finger、carpal tunnel、Dupuytren contracture\n\n**(E) ✓** 炎症性關節炎（RA、AS、PsA）：\n- 發炎細胞（T cell、macrophage、neutrophil）浸潤滑膜\n- 釋放 cytokines（TNF-α, IL-1, IL-6）\n- 活化 matrix metalloproteinases (MMPs) → 膠原蛋白分解\n- RANKL 活化 osteoclast → 骨質侵蝕\n- 最終結果：關節破壞、韌帶鬆弛、畸形",

        "key": "B",
        "text": "增加腹內壓"

      "summary": "**腰部支撐帶（lumbar corset/brace）的核心機制是「增加腹內壓（intra-abdominal pressure）」**，透過腹腔當作「氣球」支撐前柱，分擔脊椎的壓力負荷。",
      "detail": "**腰部支撐帶的作用機制**\n\n**主要機制：增加腹內壓（IAP）**\n\n生理學原理：\n- 脊椎承受壓力時，腹腔像一個「壓力球」協助支撐\n- 正常情況下腹橫肌、骨盆底肌、橫膈膜收縮可增加 IAP\n- 腰部支撐帶機械性增加 IAP → **減少 30-50% 脊椎軸向負荷**\n\n**次要機制（順序重要性）**\n\n1. **增加腹內壓**（最主要）\n2. 限制脊椎活動（相對有限）：軟式 corset 對實際 ROM 限制有限\n3. 提醒姿勢（proprioceptive cueing）\n4. 溫熱效應、局部按摩\n\n**為什麼不是其他選項？**\n\n**(A) ✗** 小面關節壓力：腰部支撐帶**不是直接**減少 facet joint 壓力。facet joint 的壓力來自脊椎伸展與旋轉，支撐帶只是間接透過限制活動減少。\n\n**(C) ✗** 減少肌肉收縮：**這其實是副作用**！\n- 長期使用腰部支撐帶會造成**腹肌、脊柱伸肌萎縮**\n- 因此現代指引建議：\n  - 短期（< 2-4 週）使用\n  - 搭配核心肌群訓練\n  - 避免完全依賴\n\n**(D) ✗** 減少椎間盤壓力：這是**結果**之一（因為 IAP 增加分擔負荷），但不是「主要機制」。正確機轉描述應為「透過增加 IAP 來減少椎間盤壓力」。\n\n**(E) ✗** 限制脊椎活動：軟式 corset 對實際 ROM 的限制**有限**（< 20%），硬式 TLSO 效果較好但也不是主要機制。\n\n**腰部裝具分類**\n\n| 類型 | 限制活動 | 主要機制 | 適應症 |\n|---|---|---|---|\n| Lumbar corset（軟式） | 輕度 | **增加 IAP** | 下背痛、術後輔助 |\n| Chairback brace | 中度 | 三點力系統限 F/E | 壓迫性骨折、手術後 |\n| Knight brace | 中度 | 限 F/E 和 lateral bending | 同上 |\n| Williams brace | 選擇性 | 限 extension（允許 flexion） | 脊椎滑脫、椎弓解離 |\n| TLSO / Body jacket | 嚴重限制 | 全方向限制 | 不穩定骨折、術後 |\n| Jewett | 三點力 | 限 flexion | 壓迫性骨折（胸腰段） |\n\n**臨床使用原則**\n- 急性期輔助：短期（2-4 週）\n- 術後：醫師指示期間穿戴\n- **避免長期依賴**（造成肌肉萎縮）\n- 搭配核心肌群訓練（McGill Big 3、橋式、plank）",

    "answer": "E",
    "explanation": {
      "summary": "前臂**旋前（pronation）**時，橈骨會向近端位移，導致**相對的尺側變異增加**；**旋後（supination）**則相反。題目說「旋後時變異增加」是錯誤的。",
      "detail": "**Ulnar Variance（尺側變異）基本概念**\n\n定義：在正位腕關節 X 光片上，尺骨遠端關節面與橈骨 sigmoid notch 遠端關節面的相對高度差。\n\n| 變異類型 | 描述 | 臨床意義 |\n|---|---|---|\n| **Neutral** | 兩骨齊平 (±1 mm) | 正常 |\n| **Negative**（尺短於橈） | 尺骨較短 | ↑ Kienböck disease（月狀骨缺血壞死）風險 |\n| **Positive**（尺長於橈） | 尺骨較長 | ↑ **Ulnar impaction syndrome**、TFCC 損傷 |\n\n**本病例解讀**：遠端橈骨骨折癒合後橈骨變短 → 相對的尺骨變長 → **6 mm 正向尺側變異**（嚴重程度），這是所謂的 **post-traumatic ulnar positive variance**。\n\n**前臂旋轉對 ulnar variance 的影響（dynamic ulnar variance）**\n\n| 前臂姿勢 | 橈骨相對位置 | Ulnar variance 變化 |\n|---|---|---|\n| **Neutral** | 基準 | 基準 |\n| **Supination（旋後）** | 橈骨**遠端**移 | **變異減少**（變 negative） |\n| **Pronation（旋前）** | 橈骨**近端**移 | **變異增加**（變 positive） |\n| 用力握拳（power grip） | 橈骨近端移 | 變異增加 |\n\n**為什麼旋前會讓橈骨向近端？**\n- 前臂旋轉時橈骨繞尺骨旋轉\n- 在 pronation 位置，橈骨的旋轉軸會使其相對於尺骨**縮短**（橈骨近端移）\n- 所以臨床檢查 TFCC 撕裂、ulnar impaction 時，要拍**壓力位 X 光**（pronated grip view）凸顯症狀\n\n**選項 (E) 的錯誤**：\n「**旋後時**橈骨會向近端位移、ulnar variance 增加」— 反了！正確是**旋前時**。\n\n**其他選項分析**\n\n**(A) ✓ Ulnar Impaction Syndrome（尺側擠壓症候群）**\n- 尺骨過長擠壓 lunotriquetral ligament、TFCC、月狀骨、三角骨\n- 臨床：尺側腕關節疼痛、握力下降、旋前時加劇\n- 影像：chondromalacia、lunate/triquetrum cystic changes\n\n**(B) ✓ 受影響結構**\n- TFCC（三角纖維軟骨複合體）：中央為無血管區域\n- Lunate 的尺側面\n- Triquetrum 的橈側面\n- 這些區域受壓迫會發炎、軟骨軟化、退化\n\n**(C) ✓ 肱尺關節的穩定作用**\n- 尺骨在肱尺關節（ulnohumeral joint）有很好的骨性吻合（trochlear notch）\n- 限制了尺骨的**近-遠端位移**\n- 所以在前臂旋轉時，**是橈骨繞尺骨移動**，而非尺骨自己移動\n\n**(D) ✓ 變異來源**\n- 多數 ulnar variance 的變化來自**橈骨的位移**\n- 例如橈骨遠端骨折癒合不正→ 橈骨變短→ 相對 ulnar positive\n- 其他原因：Madelung deformity、distal radius growth plate injury（兒童）\n\n**治療 Ulnar Impaction Syndrome**\n- 保守：休息、護具、NSAIDs、注射\n- 手術：**ulnar shortening osteotomy** 或 **wafer procedure**（切除尺骨遠端關節面 2-4 mm）",

        "text": "有足夠實證顯示雙磷酸鹽類(bisphosphonates)，補充 Vit D 及鈣， \"站立架\"訓練等介入對腦性麻痺的低骨質密度確有治療效果"
      },
      {
        "key": "D",
        "text": "對於由口餵食、營養不良的腦性麻痺兒童，皆建議使用 gastrostomy or jejunostomy tubes 進食"
      },
      {
        "key": "E",
        "text": "即使是 GMFCS level I，腦性麻痺兒童的行為與社交功能較弱與其行動功能較差有關"
      }

    "answer": "B",
    "explanation": {
      "summary": "**GMFCS I-III 的 CP 兒童（能走路者）骨折風險與一般兒童相近**。骨折風險明顯升高的是 **GMFCS IV-V**（非行走者），因為缺乏負重、抗痙攣藥物、癲癇藥物、營養不良等因素。",
      "detail": "**CP 與骨質密度 / 骨折風險**\n\n**GMFCS 與骨折風險關係**\n\n| GMFCS 級別 | 行走能力 | 骨質密度 | 骨折風險 |\n|---|---|---|---|\n| **I** | 正常活動 | 接近正常 | **接近一般兒童** |\n| **II** | 有限制 | 輕度降低 | 接近一般兒童 |\n| **III** | 使用輔具 | 中度降低 | 略升高 |\n| **IV** | 主要用輪椅 | 明顯降低 | **顯著升高** |\n| **V** | 完全依賴 | 嚴重降低 | **最高（比一般 4 倍）** |\n\n**影響 CP 骨密度的因素**\n- 缺乏負重（non-weight bearing）\n- 抗癲癇藥物（phenytoin, phenobarbital → vitamin D 代謝 ↑）\n- 營養不良、吞嚥困難\n- 維生素 D 缺乏、鈣攝取不足\n- 痙攣造成活動量下降\n\n**各選項分析**\n\n**(A) ✗** CP 兒童**尿失禁盛行率高**：\n- CP 整體約 **30-40%** 有神經性膀胱或尿失禁\n- 機轉：上運動神經元損傷導致逼尿肌過動、協調不良\n- 尿意控制發展**通常延遲**\n\n**(B) ✓** GMFCS I-III 骨折風險接近一般兒童，因為仍有負重活動。\n\n**(C) ✗** **實證等級不高**：\n- Cochrane review（Hough 2010）：對 CP 低骨密度的介入**實證不足**\n- Bisphosphonates：小規模研究顯示可改善 BMD，但**缺乏大型 RCT 證明減少骨折**\n- 站立架（standing frame）：BMD 改善效果**不一致**\n- Vitamin D/Ca：推薦作為預防，但療效仍需更多研究\n- 不能說「**有足夠實證**」\n\n**(D) ✗** 餵食管置入不是「皆建議」：\n- Gastrostomy 適應症：\n  - 嚴重吞嚥困難合併反覆吸入性肺炎\n  - 餵食時間過長（> 4-6 小時/天）\n  - 嚴重營養不良難以改善\n- 許多輕度-中度 CP 經由調整食物質地、姿勢擺位、營養補充即可\n- 家庭意願、照護者能力、兒童品質都是考量\n- **絕非「皆建議」**\n\n**(E) ✗** GMFCS I 的 CP 兒童行為/社交問題**並不主要由行動功能差引起**：\n- GMFCS I 兒童行動近乎正常\n- 他們的行為/社交困難更常與**共病**有關：\n  - 注意力不足過動症（ADHD）\n  - 自閉症類群障礙\n  - 學習障礙、智能障礙（約 50% CP 有）\n  - 癲癇\n  - 聽覺/視覺障礙\n- 腦部其他區域受損（不只是運動皮質）是原因",

    "question": "下列有關腦性麻痺(cerebral palsy)步態(gait pattern)之敘述，何者不正確？",
    "imageUrl": null,
    "choices": [

        "key": "B",
        "text": "internal tibial torsion 易導致 in-toeing, ineffective pushoff"

    "answer": "E",
    "explanation": {
      "summary": "**Ankle varus（踝內翻）會造成 supination（外翻向內的旋後位）**，而不是 pronation（pronation 是相反方向）。兩者方向相反，題目說法錯誤。",
      "detail": "**Ankle/足部變形與步態的關係**\n\n**Varus vs Valgus / Supination vs Pronation**\n\n| 變形 | 描述 | 伴隨 |\n|---|---|---|\n| **Varus（內翻）** | 足跟朝內 | **Supination（旋後）**、足外緣承重 |\n| **Valgus（外翻）** | 足跟朝外 | **Pronation（旋前）**、足內緣承重、扁平足 |\n\n所以「ankle varus → pronation 增加」是**相反的**描述。正確應為「ankle varus → **supination** 增加」。\n\n**CP 步態問題常見模式**\n\n**Crouch gait（蹲踞步態）**\n- 特徵：髖屈、膝屈、踝背屈\n- 常見於 GMFCS II-IV 的痙攣型雙側癱\n- 原因：\n  - Hamstring 痙攣/短縮 → 膝屈\n  - Gastrocsoleus weakness（常由過度跟腱延長造成）\n  - Iliopsoas tightness → 髖屈\n  - Quadriceps weakness\n\n**Jump gait（跳躍步態）**\n- 早期：髖屈 + 膝屈 + 踝蹠屈\n- 有些代償力，常見於年輕 CP\n\n**Equinus gait（馬蹄步態）**\n- Toe walking\n- Gastrocsoleus 痙攣/短縮\n\n**選項分析**\n\n**(A) ✓** Iliopsoas 痙攣/短縮：\n- 髖不能完全伸展\n- 代償：**腰椎前凸增加（increased lumbar lordosis）**\n- 若合併 hamstring tight → **crouch gait**\n\n**(B) ✓** **Internal tibial torsion（脛骨內旋）**：\n- In-toeing（pigeon-toed）\n- 力量向量偏離行走方向 → push-off 效率差\n\n**(C) ✓** **External tibial torsion（脛骨外旋）**：\n- Out-toeing\n- 同樣 push-off 效率差\n- 常見於 CP 過度 hamstring release 術後代償\n\n**(D) ✓** Hamstring ROM 下降（popliteal angle 增加）：\n- 膝不能完全伸展\n- 成為 crouch gait 主因之一\n- 治療：medial hamstring release、distal hamstring lengthening\n\n**(E) ✗** **Ankle varus → supination（非 pronation）**。\n- Ankle valgus 才會造成 pronation 增加\n- 這兩者方向相反\n\n**臨床評估工具：Edinburgh Visual Gait Score、Observational Gait Scale、3D Gait Analysis**\n\n**治療選項**\n- 保守：PT、AFO、SMO\n- 藥物：BoNT-A 注射、口服 baclofen、ITB\n- 手術：**SEMLS（Single-Event Multilevel Surgery）**，一次處理多處軟組織 + 骨性矯正\n- Selective dorsal rhizotomy（SDR）：選擇性後根切斷術\n\n**步態分析重點**：CP 步態異常常是**多處同時**發生（踝、膝、髖、骨盆互相代償），單一介入效果有限，需整體評估。",
      "sources": [

          "text": "Braddom's PM&R, 6th ed., Ch. 52 \"Cerebral Palsy\"",

    "question": "某男童因為肌無力，而被懷疑是 congenital myopathy。以下檢查和症狀敘述，何者不是診斷 congenital myopathy 時的必要條件？",

        "text": "可作 next-generation tests 就知道是那一種類型的 congenital myopathy"

        "text": "CPK level 通常不高"

        "key": "C",
        "text": "依據 muscle biopsy 顯微檢查結果作分類，例如肌肉切片檢查發現\" small rod-like inclusions \"就可診斷為 core myopathies"
      },
      {
        "key": "D",
        "text": "Multicore (Minicore) myopathy 常在 10 歲以下就出現 scoliosis。且會有呼吸及心臟症狀"
      },
      {
        "key": "E",
        "text": "Nemaline myopathy 共有超過 10 個基因變異。其中最常見的是 NEB gene, 其次為 ACTA1，兩者皆與 sarcomere 的 actin filaments 形成有關"
      }

    "answer": "C",
    "explanation": {
      "summary": "**Small rod-like inclusions（小桿狀包涵體）是 Nemaline myopathy 的特徵**，不是 core myopathies。Core myopathies 的特徵是**中央沒有線粒體與氧化酶活性的\"core\"**。",
      "detail": "**Congenital Myopathies 主要分類與組織病理**\n\n| 類型 | 組織病理特徵 | 基因 |\n|---|---|---|\n| **Nemaline myopathy** | **桿狀（nemaline rods）包涵體** | NEB（最常見）、ACTA1、TPM、TNNT1 等 |\n| **Central core disease** | 中央（core）缺氧化酶活性 | **RYR1** |\n| **Multi-minicore disease** | 多個小 core | SEPN1、RYR1 |\n| **Centronuclear myopathy** | 細胞核位於肌纖維**中央** | MTM1（X-linked）、DNM2、BIN1 |\n| **Congenital fiber-type disproportion** | Type 1 纖維小而多 | TPM3、ACTA1 等 |\n\n**Nemaline = nema（希臘文：線）+ line（桿狀）**\n- 肌肉切片看到**桿狀（rod-shaped）inclusions**\n- 染色用 modified Gomori trichrome（紅色鑲嵌）\n- 來自 Z-disc 物質積聚\n- 基因：**NEB（最常見 ~50%）**、ACTA1、TPM3、TPM2、TNNT1、CFL2 等\n- NEB 和 ACTA1 都與 sarcomere actin filament 有關\n\n**Core Myopathies（中央核病）**\n- **Central core disease**：肌纖維中央有「core」，此區域 NADH/SDH 等氧化酶染色陰性（粒線體和氧化代謝缺失）\n- **Multi-minicore disease**：多個小 core\n- 基因：**RYR1**（ryanodine receptor）最常見\n- RYR1 突變也與 **malignant hyperthermia** 相關 → 麻醉注意\n\n**各選項分析**\n\n**(A) ✓** **Next-generation sequencing（NGS）**：現在診斷 congenital myopathy 的主力工具，可同時檢測多個相關基因。取代過去需肌肉切片才能分類的做法（但病理仍有輔助價值）。\n\n**(B) ✓** **Congenital myopathies 的 CPK 通常正常或輕度升高**（< 2-3 倍），這與肌肉萎縮症（Muscular dystrophies，如 DMD CPK 可達 10-100 倍）明顯不同。此為重要鑑別點。\n\n**(C) ✗** **Small rod-like inclusions** = **Nemaline myopathy** 特徵，**不是 core myopathy**。Core myopathy 的特徵是 oxidative stain 中央缺失區域（core）。\n\n**(D) ✓** **Multi-minicore disease（SEPN1 相關）**：\n- **早發性脊柱側彎**（< 10 歲常見）\n- **呼吸衰竭**（diaphragm weakness）\n- **心肌病變**（少數，但明顯存在）\n- 需及早介入支撐、呼吸監測\n\n**(E) ✓** Nemaline myopathy 基因：\n- **NEB（最常見，~50%）**：編碼 nebulin\n- **ACTA1（~20-25%）**：編碼 α-skeletal actin\n- 兩者都與 sarcomere actin filament 結構相關\n- 其他：TPM2、TPM3、CFL2、TNNT1、KBTBD13\n\n**臨床表現共通點（congenital myopathies）**\n- 出生時 hypotonia（\"floppy baby\"）\n- 對稱性近端無力\n- Facial weakness（myopathic facies）\n- 延遲的運動發展（milestones）\n- 進展通常**靜止性**（non-progressive），不像 muscular dystrophy 會持續惡化\n- 常見併發症：呼吸衰竭、脊柱側彎、關節攣縮\n\n**治療**：無根治方法，以支持性治療為主 — PT、OT、RT、呼吸支持、矯正手術、營養照護。",
      "sources": [
        {
          "text": "Braddom's PM&R, 6th ed., Ch. 47 \"Myopathic Disorders\"",
          "url": null
        },

      "summary": "**Ataxia（運動失調）與 apraxia（運動失用）屬於 negative motor signs**，代表運動「缺乏」或「不能執行」。Positive motor signs 是**多出來的異常**（如痙攣、chorea、dystonia）。",
      "detail": "**Positive vs Negative Motor Signs（正性 vs 負性運動徵象）**\n\n**Positive motor signs（正性，多出的異常動作/張力）**\n- **Spasticity（痙攣）**：速度相關的肌肉阻力增加\n- **Rigidity（僵直）**：速度無關的阻力增加\n- **Clonus（陣攣）**\n- **Hyperreflexia（反射增強）**\n- **Positive Babinski sign**\n- **Dystonia（肌張力不全）**\n- **Athetosis（手足徐動）**\n- **Chorea（舞蹈症）**\n- **Ballism**\n- **Tremor（震顫）**\n\n**Negative motor signs（負性，動作的缺失或減弱）**\n- **Weakness（肌力下降）**\n- **Loss of dexterity（靈巧度下降）**\n- **Fatigue（易疲勞）**\n- **Ataxia（運動失調，無法精準協調）**\n- **Apraxia（運動失用，無法執行有目的動作）**\n- Bradykinesia（動作慢）\n\n**各選項分析**\n\n**(A) ✓** CP 盛行率與出生體重成反比、與胎齡成反比：\n- 正常足月兒：1-2/1000\n- 32-36 週早產：~10/1000\n- < 28 週極低出生體重：~90/1000\n- 早產兒**腦室周圍白質軟化（PVL）**是主要病理\n\n**(B) ✓** CP 可發生於多個時期：\n- **產前（antenatal, 70-80%）**：先天異常、TORCH 感染、中風、DNA 突變\n- **產程中（intrapartum, 10-20%）**：缺氧、腦傷\n- **產後（postnatal, 10%）**：新生兒期敗血症、黃疸、外傷、IVH\n\n**(C) ✓** **MACS（Manual Ability Classification System）**是評估 CP 兒童上肢日常活動能力的 5 級分類系統。有專為年幼兒童設計的 Mini-MACS（1-4 歲）。\n\n**(D) ✓** **Papile 分級 IVH**：\n- Grade 1：僅 germinal matrix 出血\n- Grade 2：IVH 不伴腦室擴大\n- Grade 3：IVH 伴腦室擴大\n- **Grade 4：IVH 合併 parenchymal（腦實質）出血**，也稱 periventricular hemorrhagic infarction\n\n**(E) ✗** **Ataxia 和 apraxia 是 negative motor signs**：\n- **Ataxia（運動失調）**：無法協調動作，屬於「功能的缺失」\n- **Apraxia（運動失用）**：有運動能力但無法執行有目的的動作\n- 這兩者代表運動控制的「不足」，而非「多出的異常動作」\n\n**臨床意義**：\n- CP 治療策略常針對兩種症狀不同：\n  - Positive signs（痙攣）→ Botox、ITB、SDR\n  - Negative signs（無力、失用）→ 強化訓練、功能訓練、CIMT\n- 混合型 CP 兩者並存，治療需全面",

      "detail": "**SMA 基因學重點**\n\n**SMN1 vs SMN2（都在 chromosome 5q13）**\n\n| 基因 | 角色 | SMA 中狀態 |\n|---|---|---|\n| **SMN1** | **主要 SMN 蛋白來源**（~90%） | **雙對偶基因缺失/突變** → 致病 |\n| **SMN2** | **備援**，但多數 mRNA 剪接錯誤只產生~10% 功能正常 SMN | 拷貝數 2-4（越多越輕） |\n\n**關鍵點**：\n- **致病：SMN1 缺失或突變**（95% 是 exon 7 缺失）\n- SMN2 是「修飾基因」，**拷貝數越多，病情越輕**\n- SMN2 因 exon 7 被剪接掉，只產生少量功能性 SMN 蛋白\n\n**SMA 分型**\n\n| 型別 | 發病 | 最佳運動功能 | 自然病程 |\n|---|---|---|---|\n| **Type 0（產前）** | 出生即嚴重 | 無 | 數週內死亡 |\n| **Type 1（Werdnig-Hoffmann）** | **< 6 個月** | **無法獨坐** | 未治療**多數 < 2 歲死亡** |\n| **Type 2** | 6-18 個月 | 獨坐（but 不能走） | 青少年或成年期死亡 |\n| **Type 3（Kugelberg-Welander）** | > 18 個月 | **能走路**（可能後來喪失） | 壽命接近正常 |\n| **Type 4（成人型）** | > 30 歲 | 正常 | 正常壽命 |\n\n**遺傳方式**：**體染色體隱性（autosomal recessive）**\n\n**治療革命**\n\n近年三大療法徹底改變了 SMA 的預後：\n\n1. **Nusinersen（Spinraza）**：antisense oligonucleotide，改變 SMN2 剪接，**鞘內注射**\n2. **Onasemnogene abeparvovec（Zolgensma）**：SMN1 基因治療，**靜脈單次注射**（2 歲以下體重 <13.5 kg）\n3. **Risdiplam（Evrysdi）**：小分子 SMN2 剪接調節劑，**口服**\n\n→ 原本 Type 1 致死性疾病，治療後**多數可達到獨坐、甚至行走**。\n\n**各選項分析**\n\n**(A) ✓** SMA 是**單純下運動神經元疾病**：\n- 僅侵犯脊髓前角細胞（α motor neurons）\n- **認知不受影響**\n- 孩子常表現「alert mind in weak body」\n\n**(B) ✓** 近年治療介入使 SMA 自然病程大幅改變，特別是新生兒篩檢早期發現、早期治療的案例。\n\n**(C) ✗** 致病基因是 **SMN1 缺失/突變**，不是 SMN2。SMN2 是備援基因。\n\n**(D) ✓** 未治療的 SMA Type 1：\n- 從未達獨坐\n- 多數 **2 歲前死亡**（呼吸衰竭）\n- 治療後預後大幅改善\n\n**(E) ✓** Spinraza（nusinersen）臨床試驗：\n- ENDEAR trial：Type 1 嬰兒\n- 顯著改善運動功能（HINE-2）\n- 降低死亡與需永久通氣風險\n\n**台灣現況**：\n- 2021 年台灣將 SMA 列入新生兒篩檢\n- 健保給付 Spinraza 與 Zolgensma（有嚴格條件）\n- 復健、營養、呼吸照護仍為基石",

      "summary": "選項 B 的肌肉方向**完全顛倒**。CP 髖關節脫臼機轉是：**痙攣/強壯的 hip flexors + adductors** vs **無力的 hip extensors + abductors**。",
      "detail": "**CP 髖關節脫臼的機轉**\n\n**正確的肌肉失衡模式**\n\n| 肌群 | 狀態 | 作用方向 |\n|---|---|---|\n| **Hip flexors（髂腰肌）** | **痙攣、短縮** | 使髖關節屈曲 |\n| **Hip adductors** | **痙攣、短縮** | 使大腿向內夾 |\n| **Medial hamstrings** | 痙攣 | 輔助屈膝、內旋髖 |\n| Hip extensors（gluteus maximus） | **相對無力** | 伸髖 |\n| Hip abductors（gluteus medius） | **相對無力** | 外展髖、維持站立穩定 |\n\n**機轉流程**\n\n1. **痙攣 flexors + adductors 拉扯股骨頭**\n2. 股骨頭被拉向**後上方（posterosuperior）**\n3. 合併：\n   - Coxa valga（增加的 neck-shaft angle，正常 ~125°，CP 可到 140-160°）\n   - Femoral anteversion 增加\n4. 缺乏負重 → acetabulum 發育異常（dysplasia）\n5. 股骨頭逐漸外移 → Reimer's migration percentage (MP) 上升\n6. MP > 30% = subluxation（半脫位）\n7. MP > 90-100% = dislocation（完全脫位）\n\n**Reimer's Migration Percentage (MP)**\n- 常用評估工具\n- X 光 AP view 測量股骨頭位於 Hilgenreiner's line 外側的比例\n- **MP < 30%**：正常\n- **MP 30-40%**：危險區（hip at risk）\n- **MP > 40%**：考慮預防性手術\n- **MP > 50%**：重建手術\n- **MP > 90%**：脫臼\n\n**各選項分析**\n\n**(A) ✓** 脫臼風險與 GMFCS 成正比：\n- GMFCS I：~0% 風險\n- GMFCS II：~15%\n- GMFCS III：~40%\n- **GMFCS IV：~70%**\n- **GMFCS V：~90%**\n\n**(B) ✗** 肌肉描述顛倒。CP 是**痙攣的 flexors/adductors** vs **無力的 extensors/abductors**。\n\n**(C) ✓** 缺乏負重會影響髖臼與股骨的發育，造成：\n- Coxa valga（正常神經發育需要一定負重刺激）\n- Acetabular dysplasia（髖臼淺而傾斜）\n- Femoral anteversion\n\n**(D) ✓** 髖關節脫臼併發症：\n- 疼痛（osteoarthritis）\n- 坐立困難、座位擺放困難\n- 會陰清潔困難\n- Pelvic obliquity → scoliosis 惡化\n- 生活品質下降\n\n**(E) ✓** **CPUP（CP Follow-Up Program）** 和 **Australian Hip Surveillance Guidelines**：\n- 建議所有 CP 兒童定期影像監測\n- 監測頻率依 GMFCS 與年齡\n- 主要指標：**Migration Percentage (MP)** 和 **Acetabular Index (AI)**\n- 這些監測計畫已證實可顯著降低脫臼率\n\n**台灣臨床實務**：CPUP 模式逐漸推廣，健保給付 CP 兒童年度 X 光追蹤。",

      "summary": "CP 的跟腱延長術最佳時機為 **4-7 歲（有些文獻寫 6-10 歲）**，此時期步態已穩定、但骨骼仍在發展、尚未過度代償，手術效果最好且復發率較低。",
      "detail": "**CP 矯正手術時機原則**\n\n**為什麼不在太早做？**\n- **< 4 歲**：\n  - 步態還在發展中，預測困難\n  - 痙攣模式可能會改變\n  - 跟腱過早延長可能過度延長 → **crouch gait**\n  - 臨床上 Achilles tendon over-lengthening 是 CP 術後最常見的醫源性問題之一\n\n**為什麼不在太晚做？**\n- **> 12 歲**：\n  - 骨性畸形已定型\n  - 代償性變形多\n  - 單純軟組織手術效果差\n  - 需做 SEMLS（single-event multilevel surgery）並合併骨性矯正\n\n**理想時機：4-7 歲（某些教科書指 6-10 歲）**\n- 步態已穩定\n- 骨骼仍在發育可適應\n- 術後配合 AFO、PT 效果好\n\n**跟腱延長術的要點**\n\n**術式選擇**\n1. **Silfverskiöld test**：\n   - 膝伸展時踝背屈受限、膝屈時背屈正常 → gastrocnemius tight（只做 Strayer 或 gastrocnemius recession）\n   - 膝伸展與屈曲時都背屈受限 → gastrocsoleus complex 都短縮（才做 Achilles lengthening）\n2. **階梯式切開延長（Z-lengthening、Hoke triple）**：較常用\n3. **Strayer procedure**（gastrocnemius aponeurotic recession）：較保守\n\n**避免過度延長**\n- 過度延長 → 小腿三頭肌無力 → **push-off 無力 → crouch gait**\n- 所以**寧可延長不夠，也不要延長過度**\n- 可以二次手術，但已經無力的肌肉難以恢復\n\n**單次多層級手術（SEMLS）概念**\n- 目前 CP 手術主流\n- 一次手術處理**多處畸形**（例如跟腱延長 + 內收肌釋放 + hamstring 延長 + 股骨骨切術）\n- 優勢：一次麻醉、一次住院、一次復健療程\n- 適應年齡通常 **8-12 歲**\n\n**術後復健重點**\n- AFO 穿戴\n- 逐步負重訓練\n- 肌力訓練（特別是 gastrocsoleus 複合體）\n- 術後 3-6 個月達到穩定功能\n- 長期追蹤（至骨骼成熟）\n\n**為什麼選項 (C) 4-7 歲？**\n- 此為教科書經典建議範圍\n- 台灣臨床實務也多採此時機\n- 稍早做可能復發率高，稍晚做效果打折",

      "detail": "**早期診斷 CP 的兩大工具**\n\n**1. Prechtl General Movements Assessment (GMA)**\n\n一種觀察自發性運動品質的評估方法，由 Heinz Prechtl 發展。\n\n| 階段 | 正常型態 | 異常型態 |\n|---|---|---|\n| 出生-2 個月 | **Writhing movements**（扭動） | Poor repertoire、cramped-synchronized |\n| **3-5 個月** | **Fidgety movements**（細微抖動性動作，連續小幅度、四面八方、隨機） | **Absent**（缺席）或 abnormal |\n\n**Fidgety movements 的重要性**\n- 3-5 個月是 fidgety 最明顯時期\n- **Absent fidgety movements** 是**強烈 CP 預測因子**\n  - Sensitivity：~95%\n  - Specificity：~80-85%\n  - **是目前預測 CP 最好的單一工具**\n\n**2. Hammersmith Infant Neurological Examination (HINE)**\n\n- 26 項神經學檢查（腦神經、姿勢、張力、反射、運動）\n- 滿分 78\n- **3-4 個月時 HINE 總分 < 57** 與未來 CP 相關\n- **HINE 越低，CP 嚴重度越高**\n\n**HINE 總分 vs 未來功能預測**（Romeo et al. 2016）：\n- **< 40**：**GMFCS IV-V 的高風險**（可能無法獨走）\n- 40-57：GMFCS II-III\n- 57-73：可能 GMFCS I，或發展 normalized\n- > 73：正常或 CP 風險低\n\n**本題分析**\n\n2 個月大早產兒：\n- **Absent fidgety movements**（雖然一般 fidgety 出現在 3-5 個月，但 2 個月已可評估 writhing 品質；此題可能指早期即無正常 GMs）\n- **HINE = 40**：低分，屬於預測 GMFCS IV-V 的區間\n\n→ **CP 風險高，且未來可能無法獨立行走**\n\n**各選項分析**\n\n**(A) ✗** HINE 40 分過低，通常預測 GMFCS III-V，獨走機會低。若 HINE > 57 才可能獨走。\n\n**(B) ✓** Fidgety absent + HINE 40 分 → 高 CP 風險 + 重度運動障礙（GMFCS IV-V 風險高）→ 無法獨立行走。\n\n**(C) ✗** GMA 和 HINE **在早期（甚至 2-3 個月）就有高預測價值**。這是 2017 Novak et al. 系統性回顧的重要結論。\n\n**(D) ✗** CP 可以在 < 6 個月預測，不需等到 6 個月。\n\n**(E) ✗** 此案例風險高，不是低。\n\n**臨床意義：Novak 2017 建議**\n\n\"Early, accurate diagnosis of CP is possible using newborn MRI, Prechtl GMA, and HINE.\" — JAMA Pediatrics\n\n- **高風險族群（早產、低體重、新生兒腦病變、IVH）**應及早篩檢\n- 確診可從 **3-6 個月**開始（過去傳統做法等到 2 歲）\n- 早期診斷 → 早期介入（如 CIMT-infant、神經發展療法）\n- **時間敏感**：早期介入利用神經可塑性高峰",

      "summary": "此個案需逐一對應四個分類系統：\n• **GMFCS III**：手持助行器行走、長距離用輪椅\n• **MACS IV**：僅能在特製環境中處理少量物品\n• **CFCS III**：熟悉對象間有效，陌生人困難\n• **EDACS IV**：需照護者協助、有嗆咳風險",
      "detail": "**GMFCS（Gross Motor Function Classification System）**\n\n6-12 歲年齡段：\n| 級別 | 典型表現 |\n|---|---|\n| I | 室內外行走無限制，**能跑能跳** |\n| II | 大部分設置能行走，長距離困難 |\n| **III** | **使用手持助行器行走**，長距離用**輪椅** |\n| IV | 自主移動受限，常用電動輪椅 |\n| V | 手動輪椅全場搬運，需全面協助 |\n\n→ 本題「手持助行器 + 長距離用輪椅」= **GMFCS III** ✓\n\n**MACS（Manual Ability Classification System）**\n\n| 級別 | 典型表現 |\n|---|---|\n| I | 輕鬆成功處理物品 |\n| II | 處理大部分物品，速度和品質打折 |\n| III | 困難處理物品，需要幫助準備/修改活動 |\n| **IV** | **僅能在特製環境中處理少量、易操作物品** |\n| V | 無法處理物品，操作能力嚴重受限 |\n\n→ 本題「僅能在特製輔具環境中處理少量物品」= **MACS IV** ✓\n\n**CFCS（Communication Function Classification System）**\n\n| 級別 | 典型表現 |\n|---|---|\n| I | 有效傳送與接收資訊（對陌生人與熟人皆可） |\n| II | 有效但速度慢 |\n| **III** | **與熟悉夥伴有效溝通，與陌生人困難** |\n| IV | 與熟悉者都不一致地溝通 |\n| V | 很少能溝通，即使與熟悉者 |\n\n→ 本題「熟悉對象有效，陌生人困難」= **CFCS III** ✓\n\n**EDACS（Eating and Drinking Ability Classification System）**\n\n| 級別 | 典型表現 |\n|---|---|\n| I | 安全有效吃喝 |\n| II | 安全但效率差（進食時間長） |\n| III | 安全問題有限（可能嗆咳），效率也差 |\n| **IV** | **安全性受限（經常嗆咳），需照護者協助** |\n| V | 無法安全吃喝，需管灌 |\n\n→ 本題「吞嚥能力受限，有嗆咳風險，需照護者協助」= **EDACS IV** ✓\n\n**組合答案：GMFCS III + MACS IV + CFCS III + EDACS IV → 選項 A**\n\n**臨床意義**\n\n- 不同分類系統**互相獨立**，同一兒童各系統級別不同是常態\n- Compagnone et al. (2014) 研究顯示四系統級別相同的只有 ~16%\n- 多系統評估提供完整「功能畫像」\n- 有助於：\n  - 跨專業團隊溝通\n  - 介入目標設定\n  - 家長期待管理\n  - 研究分組\n\n**評估工具推薦的兒童年齡**\n- GMFCS：2 歲以上（原版 < 12 歲，擴展版 12-18 歲）\n- MACS：4-18 歲（Mini-MACS：1-4 歲）\n- CFCS：2 歲以上\n- EDACS：3 歲以上",

      "detail": "**β-blocker 對運動心率的影響**\n\n- β1 receptor blockade → 抑制 SA node\n- **Max HR 下降 15-30 bpm**\n- 不同劑量、不同 β-blocker 影響幅度不同\n- **劑量改變後，原本的 HR 目標不再適用**\n- 此時傳統 HR-based 運動處方（如 70% HR max）變得不可靠\n\n**運動處方方法比較**\n\n| 方法 | β-blocker 下可靠性 |\n|---|---|\n| **Heart rate method**（% HRmax、Karvonen HRR） | **差**（受藥物影響大） |\n| **RPE method**（Borg scale） | **佳**（主觀感覺較穩定） |\n| **Symptom-limited**（出現心絞痛、呼吸困難） | **佳**（臨床安全指標） |\n| **METs-based** | 中（需了解實際功能） |\n\n**Borg RPE Scale（6-20）**\n- 6：無用力\n- 9：非常輕\n- 11：輕\n- **12-13：中等費力**（目標範圍，對應 60-70% HRmax）\n- **14-16：有些費力到費力**（target，70-85% HRmax）\n- 17：非常費力\n- 20：極限\n\n**各選項分析**\n\n**(A) ✗** 將訓練心率設在 140 bpm：\n- **危險！** 病人在 130 bpm 就出現心絞痛\n- 應設在**症狀產生前 10-15 bpm**，即 115-120 bpm 以下\n- 絕對不能高於心絞痛發生心率\n\n**(B) ✗** 完全停止運動：\n- **過度保守**\n- 運動是心臟復健核心，停止會導致去適應（deconditioning）\n- 可在安全範圍繼續，同時安排重新測試\n\n**(C) ✗** 130 bpm 以上：\n- **直接引發心絞痛，絕對禁止**\n- 完全違反運動處方安全原則\n\n**(D) ✓** **以 RPE + 症狀為主**：\n- 病人已經做過 12 次心臟復健，有自己的訓練經驗\n- RPE 相對穩定，不受藥物顯著影響\n- 可以用「上次訓練時 XX bpm 對應 RPE 13」作為參考\n- 未來重新運動測試後再調整\n\n**(E) ✗** 減少水分：\n- **錯誤！** 病人在運動期間應**適量補水**\n- 脫水會增加心臟負擔、導致低血壓\n- 利尿劑使用者特別需要注意電解質平衡（但不是靠減水）\n\n**心臟復健 β-blocker 病人實務原則**\n\n1. **記錄基線 HR 與 RPE 對應**：這是最重要的資產\n2. **劑量改變時**：\n   - 以 RPE 為指引\n   - 症狀為警示（胸痛、呼吸困難、頭暈）\n   - 保守進展\n3. **重新運動測試時機**：\n   - 劑量大幅調整\n   - 臨床狀況改變\n   - 原本 target 不再適合\n4. **其他監測**：BP、心律、感官主訴\n\n**Target Heart Rate 計算（傳統方法，不適用此病人）**\n- **Ischemic threshold 前 10-15 bpm**\n- 或 THR = Resting HR + 60-80% × (Peak HR - Resting HR)\n- 但 β-blocker 劑量變化後這些 number 都要重算",

      "summary": "**Sternal dehiscence（胸骨裂開）** 的高風險因素包括：**感染、過度咳嗽（咳嗽壓迫胸腔）、骨質疏鬆、肥胖、糖尿病、COPD、老年**等。",
      "detail": "**胸骨切開術（Median Sternotomy）後復健原則**\n\n**常見手術**：CABG、瓣膜修補/置換、主動脈手術、心臟移植等。\n\n**胸骨癒合時間**\n- **骨癒合需要 8-12 週**\n- 傳統「Sternal precautions」要求此期間限制上肢活動\n- 近年觀念有轉變（見下）\n\n**傳統 Sternal Precautions**\n- 避免 push/pull > 5-10 lbs\n- 不可舉手過肩\n- 不可開車（方向盤突然轉向）\n- 不可雙手支撐站起（用單側或側起）\n- 8-12 週\n\n**現代觀念（Keeping Your Move in Tube）**\n- 傳統限制可能**過度**\n- 鼓勵「功能性活動」：在疼痛範圍內活動\n- 避免「暴力、不對稱、劇烈」動作\n- 平衡：防胸骨裂開 vs 避免 deconditioning\n\n**胸骨裂開（Sternal Dehiscence）**\n\n**高風險因素**\n| 因素 | 機轉 |\n|---|---|\n| **感染** | 骨髓炎削弱骨癒合 |\n| **過度咳嗽（COPD、感染）** | 胸內壓急遽升高，拉扯胸骨縫合 |\n| **骨質疏鬆** | 骨質本身脆弱 |\n| **肥胖** | 胸廓重量、切口張力 |\n| **糖尿病** | 傷口癒合差、感染風險高 |\n| **老年** | 組織癒合能力差 |\n| **類固醇使用** | 抑制骨/組織癒合 |\n| **RA** | 骨鬆、免疫抑制劑 |\n| **雙側乳內動脈取用**（CABG） | 胸骨血流受影響 |\n| **過早用力活動** | 力學壓力，但**實際上這不是最主要原因** |\n\n**各選項分析**\n\n**(A) ✓** 感染、過度咳嗽、骨質疏鬆都是胸骨裂開的主要風險因素。\n\n**(B) ✗** **手搖車（arm ergometer）在胸骨術後可以使用**：\n- 可在低強度開始（5-10 watts）\n- 做為上肢心肺訓練，改善循環\n- 需注意不對稱負荷\n- 早期即可介入\n\n**(C) ✗** **不需等完全癒合才能做上肢活動**：\n- 肩膀 ROM 訓練可以**術後早期開始**（輕度主動運動）\n- 避免過度 abduction、flexion > 90°\n- 日常生活相關的上肢運動可以漸進進行\n- 現代觀念主張功能性活動而非完全禁制\n\n**(D) ✗** **異常胸骨症狀必須立即處理**：\n- Click（胸骨活動聲）\n- Pop（彈響）\n- 胸骨處疼痛加劇\n- 胸骨區腫脹、紅、熱\n- 新發現的分泌物\n→ 都是**胸骨裂開或感染的警訊**，需立即告知醫療團隊評估（可能需 CT 或重新手術）\n\n**(E) ✗** **過度運動不是胸骨裂開最主要原因**：\n- **感染**才是最主要原因（特別是深部胸骨感染，mediastinitis）\n- 其他：糖尿病、肥胖、咳嗽\n- 研究顯示運動本身若合理執行風險不高，反而是**系統性因素**為主\n\n**術後運動處方漸進**\n\n| 時期 | 運動內容 |\n|---|---|\n| 0-2 週（急性期） | ROM、輕度步行、呼吸訓練 |\n| 2-6 週 | 低強度有氧、下肢肌力、避免過度上肢負重 |\n| 6-12 週 | 中等強度有氧、輕度阻力訓練（下肢為主） |\n| 12+ 週 | 完全恢復運動、阻力訓練 |\n\n**重要警訊：立即停止運動並就醫**\n- Chest pain（非肌肉性）\n- 心悸、呼吸困難加劇\n- 頭暈、冒冷汗\n- 胸骨異常聲響或感覺\n- 切口滲液",

      "detail": "**兒童 vs 成人運動生理差異**\n\n| 參數 | 兒童相對於成人 | 原因 |\n|---|---|---|\n| **Heart rate** | **較快** | 心臟體積小，需要快速跳動維持 CO |\n| **Max HR** | 較高（~200 bpm） | 年齡公式：220 - age |\n| **Stroke volume** | 較低 | 心臟尺寸較小 |\n| **Cardiac output (絕對值)** | 較低 | SV 主導 |\n| **Minute ventilation (絕對值)** | **較低** | 肺容積小 |\n| **Minute ventilation (相對於 VO₂)** | 較高 | VE/VO₂ ratio 高 |\n| **Relative VO₂ (ml/kg/min)** | **較高** | 單位體重攝氧效率高 |\n| **Absolute VO₂** | 較低 | 總肌肉量小 |\n| **Respiratory Exchange Ratio (RER)** | **較低**（次最大運動時） | 兒童**脂肪氧化比例高**、無氧能力低 |\n| **Lactate** | 較低（同強度下） | 糖解酶活性低 |\n| **Substrate utilization** | 脂肪氧化 > 成人 | 粒線體氧化能力強 |\n\n**為什麼兒童 RER 較低？**\n\n- **RER = VCO₂ / VO₂**\n- 純脂肪代謝：RER ≈ 0.7\n- 純碳水化合物代謝：RER ≈ 1.0\n- 超過 1.0：無氧代謝、乳酸 buffering 釋放 CO₂\n- **兒童粒線體氧化酶（如 citrate synthase、succinate dehydrogenase）活性較高**\n- **無氧糖解酶（PFK）活性較低**\n- 所以運動時**較依賴有氧脂肪代謝** → RER 較低\n\n**選項分析**\n\n**(A) ✓** 兒童 HR 較成人快（休息時、運動時、max HR 都較高）。\n\n**(B) ✗** 兒童 RER **較低**（不是較高）。這是兒童運動生理的重要特徵。\n\n**(C) ✓** 絕對 minute ventilation（VE，L/min）兒童較低（因為肺容積小、潮氣量小）。但**VE/VO₂ ratio（ventilation equivalent）**兒童較高。\n\n**(D) ✓** **Relative VO₂（ml/kg/min）兒童較高**：\n- 兒童 VO₂peak 相對值（ml/kg/min）可達 50-55\n- 成年男性約 40-45\n- 反映兒童較高的有氧代謝效率\n\n**(E) ✓** **跑步機 vs 腳踏車**：\n- **跑步機 VO₂peak 較腳踏車高 5-10%**\n- 原因：跑步涉及更多肌肉群（下肢 + 軀幹）\n- 兒童協調能力在 treadmill 更好\n- Max HR 也略高\n- 但跑步機有跌倒風險，腳踏車較安全\n\n**ASD 術後運動生理注意事項**\n\n- 大部分 ASD 經導管修補後運動能力接近正常\n- 需評估：\n  - 右心室功能（長期 volume overload 後）\n  - 肺動脈壓力\n  - 心律不整風險\n- 一般建議：中等強度有氧運動、避免極限競技運動（若殘餘病變）\n\n**兒童 CPET 特殊考量**\n\n- 使用兒童專用運動協定（Bruce modified、Bruce ramp、cycle ramp）\n- 需要兒科心肺測試團隊（包括有經驗的技術員）\n- 動機是重要因子（兒童配合度影響結果）\n- 正常值參考要用兒童 norms（如 Cooper's data）",

      "summary": "規律運動訓練後，**同強度次最大運動時 stroke volume（SV）會上升**，HR 和 lactate 則會下降。Cardiac output（CO = HR × SV）在次最大強度下**不變**（因為代謝需求固定），但最大 CO 會上升。",
      "detail": "**運動訓練後的生理適應（chronic adaptation）**\n\n**Submaximal exercise（同強度、固定工作量下）**\n\n| 參數 | 訓練後變化 | 機轉 |\n|---|---|---|\n| **Heart rate（同工作量下）** | **↓** | 副交感增強、心室效率提升 |\n| **Stroke volume（SV）** | **↑** | 心室容積 ↑、收縮力 ↑ |\n| **Cardiac output（CO）** | **不變** | CO = HR × SV，HR↓ × SV↑ = 同 |\n| **Oxygen consumption（VO₂）** | **不變** | 代謝需求固定 |\n| **Blood pressure** | 略 ↓ | 周邊阻力下降 |\n| **Lactate** | **↓** | 有氧代謝效率提升 |\n| **RER** | ↓ | 脂肪氧化比例提升 |\n\n**Maximal exercise（極限強度下）**\n\n| 參數 | 訓練後變化 |\n|---|---|\n| **VO₂max** | **↑**（10-20%） |\n| **Max HR** | 不變或略 ↓ |\n| **Max SV** | **↑** |\n| **Max CO** | **↑** |\n| **Max lactate** | 略 ↑ 或不變 |\n| **Max a-vO₂ difference** | ↑ |\n\n**各選項分析**\n\n**(A) ✓ Stroke volume ↑**\n- 訓練後心室擴張、心肌收縮力增加\n- 同工作量下 SV ↑，HR ↓，CO 不變\n- 這是**運動訓練的核心生理適應**之一\n\n**(B) ✗ Submaximal VO₂** 不變：\n- VO₂ = 代謝需求 × 工作量\n- 同工作量下代謝需求固定 → VO₂ 不變\n- 但運動「效率」提升（較低 HR 達到同 VO₂）\n\n**(C) ✗ Cardiac output** 在次最大運動時不變：\n- CO = HR × SV\n- 訓練後 HR↓ × SV↑ = 相同 CO（因代謝需求固定）\n- 但 MAX CO 會增加\n\n**(D) ✗ Lactate ↓**：\n- 訓練後糖解酶 ↓、粒線體氧化酶 ↑\n- 乳酸閾值（lactate threshold）右移\n- 同強度下乳酸產量少，清除快\n\n**(E) ✗ Heart rate ↓**：\n- 副交感神經活動 ↑\n- 心肌效率 ↑（SV 提升意味 HR 可降低達成相同 CO）\n- 運動員常有 resting bradycardia（< 60 bpm）\n\n**臨床意義（CHF 病人特別重要）**\n\n- CHF 病人 LV 收縮力差、SV 低、代償性 HR 高\n- 運動訓練後：\n  - EF 可能增加（但不是主要改善）\n  - **Peripheral adaptations（a-vO₂ difference 增加）**\n  - Skeletal muscle 粒線體、微血管密度增加\n  - Endothelial function 改善\n  - 這些都能讓運動耐受性 ↑、生活品質 ↑、住院率 ↓\n\n**HF-ACTION trial（2009）**：\n- CHF 病人參加心臟復健能**降低全因死亡 + 住院**（約 11%）\n- 生活品質顯著改善\n- 安全性良好\n\n**心臟復健 DM + CAD + CHF 病人運動處方**\n\n- 強度：40-80% VO₂peak（或 RPE 12-14）\n- 頻率：3-5 次/週\n- 時間：20-60 分鐘\n- 模式：有氧 + 阻力訓練組合\n- **DM 額外注意**：運動前後測血糖、避免空腹運動、攜帶糖類",

      "detail": "**AHA 2013 運動測試禁忌症**\n\n**絕對禁忌（Absolute Contraindications）**\n\n| 項目 | 說明 |\n|---|---|\n| **Acute MI**（2 天內） | 心肌尚未穩定 |\n| **Unstable angina** | 隨時可能 MI |\n| **未控制的症狀性心律不整，伴血液動力學不穩定** | 可能致死 |\n| **Active endocarditis** | 感染、栓塞風險 |\n| **Acute myocarditis / pericarditis** | 發炎中，猝死風險 |\n| **Symptomatic severe aortic stenosis** | 可能誘發暈厥、猝死 |\n| **Decompensated heart failure** | 血液動力學不穩 |\n| **Acute pulmonary embolism / 肺梗塞 / DVT** | 栓塞風險高 |\n| **Acute aortic dissection** | 可能破裂致死 |\n| **Physical disability precluding safe exercise** | 無法測試 |\n\n**相對禁忌（Relative Contraindications）**\n\n| 項目 | 說明 |\n|---|---|\n| **Recent stroke / TIA**（如此題的 1 個月前） | 再發風險 |\n| 左主幹冠狀動脈顯著狹窄 | 缺血風險高 |\n| 中度瓣膜狹窄 | 症狀不明顯時可考慮 |\n| Severe hypertension（resting SBP > 200 or DBP > 110） | 可能失控 |\n| 中重度電解質異常、甲狀腺機能異常 | 影響判讀 |\n| Tachyarrhythmia / bradyarrhythmia（稍控制） | 需監測 |\n| 肥厚性心肌病 | 梗阻、猝死風險 |\n| 精神/心理障礙限制配合 | 無法完成測試 |\n| 高度房室傳導阻滯 | 需起搏器保護 |\n\n**為什麼 recent stroke 是相對而非絕對？**\n\n- 運動可以引發暫時性血壓升高 → 理論上有再出血或再栓塞風險\n- 但 **1 個月後**通常已過急性期\n- 若心肺評估對病人處置非常重要，**臨床判斷**下可執行（密切監測）\n- 對比：**急性中風（< 48 hr）**才是絕對禁忌\n\n**各選項分析**\n\n**(A) ✗（是絕對禁忌）** Acute pericarditis：心包膜發炎會增加心肌損傷、tamponade 風險。\n\n**(B) ✓（是相對禁忌，不是絕對）** 1 個月前的中風，處於亞急性期到恢復期，**相對禁忌**。\n\n**(C) ✗（是絕對禁忌）** 未控制的症狀性心律不整 + 血液動力學不穩定 → 猝死風險。\n\n**(D) ✗（是絕對禁忌）** Symptomatic severe aortic stenosis：運動可誘發暈厥、猝死（經典的 syncope on exertion 是 severe AS 的警訊）。\n\n**(E) ✗（是絕對禁忌）** Acute pulmonary embolism：運動可能讓栓塞加重、再栓塞。\n\n**運動測試安全性**\n\n- 整體嚴重併發症率：~1/10,000 測試\n- Mortality：~0.5/10,000\n- 醫學監督 + AED + 急救設備 + 正確適應症選擇 → 安全性高\n\n**臨床實務**\n\n- 相對禁忌下可考慮：\n  - 次最大運動測試（submaximal）\n  - 藥物壓力測試（dobutamine echo、dipyridamole nuclear）\n  - 延遲測試時機\n- 絕對禁忌：**禁止**運動測試，待病情穩定",

      "summary": "LVAD 病人運動時 MAP 目標為 **70-90 mmHg**（休息時 70-80，運動時可稍高但不需刻意拉到 90-110）。設定 90-110 過高，增加出血、高血壓併發症風險。",
      "detail": "**LVAD（Left Ventricular Assist Device）基本概念**\n\n- 連續血流（continuous flow）主流設計（HeartMate II、HeartMate 3、HeartWare）\n- 沒有或非常微弱的脈搏 → 傳統血壓計無法量\n- 需用都卜勒超音波 + 手動袖帶測 MAP\n- 病人**有電池包、驅動線經腹壁**\n- 適應症：end-stage HF，作為 bridge-to-transplant 或 destination therapy\n\n**LVAD 病人運動的特殊生理**\n\n- 連續血流裝置 → 無真正的 systolic/diastolic 血壓\n- MAP（mean arterial pressure）是主要血壓指標\n- LVAD 固定流量 → 心輸出量調節能力有限\n- 運動時主要靠**周邊肌肉靜脈回流**與**殘留自體 LV 功能**支持心輸出\n\n**LVAD 病人心臟復健處方**\n\n| 參數 | 目標值 |\n|---|---|\n| **休息時 MAP** | **70-80 mmHg** |\n| **運動中 MAP** | **70-90 mmHg**（一般建議） |\n| MAP > 90 | 需降壓（過高會增加 LVAD 回流） |\n| MAP < 65 | 停止運動（低血壓） |\n| **RPE（Borg 6-20）** | **11-13**（中等強度） |\n| 運動強度 | 低至中等，漸進 |\n| 模式 | 有氧 + 輕阻力 + 呼吸訓練 |\n\n**各選項分析**\n\n**(A) ✓** **Doppler ultrasound 測血壓**：\n- 連續血流 LVAD 的脈壓很小，傳統聽診器或自動血壓計不準\n- Doppler 可偵測**血流開始點 = MAP**（不是 systolic）\n- 這是 LVAD 病人的標準血壓測量方式\n\n**(B) ✓ 間歇性運動減輕疲勞**：\n- LVAD 病人常見 early fatigue（因為心肺儲備差、肌肉去適應）\n- Interval training（高低交替）比持續運動可減少疲勞感\n- 實用策略\n\n**(C) ✓ RPE 11-13（Borg scale 6-20）**：\n- Borg 11：較輕（fairly light）\n- Borg 13：有些費力（somewhat hard）\n- 對應 ~40-60% VO₂max\n- 這是中等強度範圍，適合 LVAD 病人\n\n**(D) ✓ 休息時 MAP 70-80**：\n- 標準目標\n- MAP > 90：出血性中風風險增加、LVAD 抽吸事件（suction event）\n- MAP < 65：低血壓、器官灌流不足\n\n**(E) ✗ 運動時 MAP 不應設 90-110**：\n- **90-110 過高**\n- 增加 hemorrhagic stroke 風險（LVAD 病人本來就用抗凝劑）\n- 運動時 MAP 通常 70-90，**不必刻意拉到 90-110**\n- 一般上限約 90，超過 90 考慮減低運動強度或調整降壓藥\n\n**LVAD 病人運動中止指標**\n\n- MAP < 65 或 > 90\n- 胸痛、頭暈、呼吸困難加劇\n- LVAD warning alarms（流量不足、電池）\n- LVAD 流量下降 > 1 L/min（抽吸事件）\n- 心律不整（特別是 VT/VF，LVAD 病人仍可能發生）\n\n**其他 LVAD 病人注意事項**\n\n- **抗凝劑**：需嚴格控制 INR，運動注意避免跌倒\n- **Drive line 照護**：保持乾燥、避免感染\n- **避免水中活動**：驅動線不可浸水\n- **心理支持**：適應帶裝置生活\n- 目標：改善 QoL、為心臟移植做準備、延長 destination therapy 存活",
      "sources": [

          "text": "Alsara O et al. Is Exercise Training Safe and Beneficial in Patients Receiving Left Ventricular Assist Device Therapy? J Cardiopulm Rehabil Prev 2014",

      "detail": "**CIMT（Constraint-Induced Movement Therapy）入選標準**\n\n**典型的 \"10-10-10\" criteria（Taub & Uswatte）**\n\n| 部位 | 最低 active motion |\n|---|---|\n| 手腕伸展 | **10°**（或 20° higher-functioning） |\n| 拇指外展 | 10° |\n| 至少 2 根手指伸展 | 10°（MCP + IP） |\n| 近端肌群 | **能穩定手臂完成抓握動作** |\n\n**其他重要條件**\n\n- 認知狀況：能理解、配合（MMSE > 24）\n- 平衡能力：穿戴限制具時能安全移動\n- 痙攣程度：Modified Ashworth ≤ 2（太嚴重無法 voluntary extension）\n- 無嚴重感覺缺失\n\n**傳統 CIMT 內容**\n\n- **6 hr/day × 10 days**（14 天期間）\n- 強制穿戴限制套（mitt）在健側手 **90% 醒著時間**\n- 訓練核心：shaping（塑形）- 逐步增加任務難度\n- 強調 task-specific training\n\n**修改版 CIMT（mCIMT）**\n\n- 較少時數（2-3 hr/day）\n- 較長療程（2-10 週）\n- 實證有效、臨床較可行\n- 多個系統性回顧證實效果相當\n\n**各選項分析**\n\n**(A) ✗ 癱瘓肢體皆能適用**：錯誤。\n- 完全癱瘓（無 voluntary extension）**不能用 CIMT**\n- 本身需要有殘留動作\n- 約 **20-25% 的中風病人**符合 CIMT 入選標準\n\n**(B) ✓ 近端肌群可以在活動時穩定手臂**：正確。\n- CIMT 要求不只是手腕/手指，還需要**肩膀、手肘有基本控制**\n- 沒有近端穩定，手指抓握無法完成有意義動作\n- 這是 CIMT 的**前提條件**\n\n**(C) ✗ 須 6hr/day × 5 days/week × 2 週**：\n- 這是**傳統 CIMT 協議**，但**不是「唯一有效的模式」**\n- **mCIMT（修改版）也有效**，甚至在臨床上更實用\n- Cochrane 2015 review 顯示 CIMT 與 mCIMT 效果相近\n- 「**方有效益**」這種絕對化描述是錯的\n\n**(D) ✗ 僅限腦中風**：錯誤。\n- CIMT 也可用於：\n  - **腦性麻痺（CIMT for CP）**：特別是 hemiparetic CP\n  - **創傷性腦傷（TBI）**\n  - 多發性硬化症（有限證據）\n  - 語言治療（**CIAT - Constraint-Induced Aphasia Therapy**）\n  - 下肢 CIMT（forced-use, 有限證據）\n\n**(E) ✗ 僅限急性期**：錯誤。\n- CIMT 在**慢性期（> 1 年 post-stroke）**效果**最好**\n- 經典研究是在慢性病人\n- **急性期（< 3 個月）效果不如亞急性-慢性期**\n- Edward Taub 的發現：即使多年後仍可透過 CIMT 重塑皮質地圖\n\n**CIMT 的神經可塑性機轉**\n\n1. 克服 **learned non-use**（習得性不使用）：\n   - 中風後病人嘗試用患側失敗 → 發展代償策略 → 減少使用患側\n   - 形成惡性循環，皮質代表區縮小\n2. **強制使用 + 大量練習**重新活化皮質運動區\n3. 功能 MRI 證實皮質地圖擴大（cortical map expansion）\n4. 行為效果可維持 **2 年以上**\n\n**Motor Activity Log（MAL）**：CIMT 常用療效評估工具。\n\n**EXCITE Trial（2006, JAMA）**：首個 RCT 證實慢性期（3-9 個月）中風病人 CIMT 效果顯著。",

      "detail": "**出血性中風比較**\n\n| 項目 | SAH（蜘蛛膜下腔出血） | ICH（腦實質內出血） |\n|---|---|---|\n| 典型原因 | **囊狀動脈瘤破裂**（85%） | **高血壓**、amyloid angiopathy |\n| 好發位置 | Willis 環附近 | basal ganglia、thalamus、pons、cerebellum、lobar |\n| 平均發病年齡 | **較輕**（中位 59 歲） | 較老（中位 73 歲） |\n| **48 小時死亡率** | **~40%** | ~30-40% |\n| 1 個月死亡率 | ~45% | ~40% |\n| 1 年死亡率 | ~55% | ~50% |\n| 主要併發症 | vasospasm、rebleeding、hydrocephalus | hematoma expansion、IVH、perihematoma edema |\n| 認知障礙 | **常見，即使運動恢復好** | 視病灶而定 |\n\n**各選項分析**\n\n**(A) ✗ SAH 急性期死亡率並不低於 ICH**：\n- SAH 10-15% 病人**到院前死亡**\n- SAH 48 hr 死亡率約 40%\n- ICH 急性期死亡率接近，甚至某些研究 SAH 更高\n- **SAH 的致死性不低**\n\n**(B) ✓ SAH 存活者認知障礙常見**：\n- 約 **50-70% SAH 存活者有認知障礙**\n- 記憶、執行功能、注意力缺損最常見\n- 即使 mRS 0-2（功能獨立），仍可能有認知問題\n- 機轉：\n  - 初始血液對皮質的毒性\n  - Delayed cerebral ischemia（DCI, vasospasm 造成）\n  - 正常壓力水腦症（hydrocephalus）\n\n**(C) ✓ 腦葉出血復發率較高**：\n- **Lobar ICH**：常由 **cerebral amyloid angiopathy（CAA）**造成\n- CAA 影響多條皮質血管 → **復發率高**（年復發率 ~10%）\n- **Non-lobar（深部）ICH**：多由高血壓造成\n- 高血壓控制好後復發率較低（年復發率 ~2%）\n\n**(D) ✓ 血腫 > 30 ml 預後差**：\n- **ICH score** 的評分項目之一\n- ICH 體積：\n  - < 30 ml：較可能功能獨立\n  - 30-60 ml：中等預後\n  - > 60 ml：多數死亡或嚴重失能\n- 每增加 10 ml 體積死亡率上升\n\n**(E) ✓ 深部/幕下 ICH 死亡率較高**：\n- Basal ganglia、thalamus（深部）：接近重要結構\n- **Pons、cerebellum（infratentorial, 幕下）**：\n  - Pons 出血死亡率極高（> 60%）\n  - Cerebellum 出血若 > 3 cm 需立即手術\n  - 幕下空間小、易壓迫腦幹\n- Lobar（皮質下）：死亡率較低，但認知/行為影響可能較大\n\n**ICH Score（Hemphill 2001）**\n\n| 項目 | 分數 |\n|---|---|\n| GCS 3-4 | 2 |\n| GCS 5-12 | 1 |\n| GCS 13-15 | 0 |\n| Age ≥ 80 | 1 |\n| Infratentorial origin | 1 |\n| ICH volume ≥ 30 ml | 1 |\n| Intraventricular hemorrhage | 1 |\n\n30 天死亡率：\n- Score 0：0%\n- Score 1：13%\n- Score 2：26%\n- Score 3：72%\n- Score 4：97%\n- Score 5-6：100%\n\n**ICH 預後**\n- 第 1 年死亡率：~50%\n- 只有 ~20% 功能獨立於 6 個月後\n- **預後整體比缺血性中風差**\n\n**復健考量**\n- 急性期穩定後即可開始 PT/OT\n- 認知復健：特別對 SAH 存活者重要\n- 對 DCI 後缺血性損傷病人：類似缺血性中風復健\n- 長期追蹤憂鬱、焦慮、生活品質",

      "detail": "**機器人輔助復健（Robot-assisted Rehabilitation）**\n\n**主要系統類型**\n\n**上肢**\n- **End-effector type**：病人手握終端執行器（MIT-Manus / InMotion ARM、HapticMASTER）\n- **Exoskeleton type**：穿戴式，多關節對應（Armeo Power、Harmony、HAL）\n\n**下肢**\n- **End-effector gait trainers**：Gait Trainer GT1、G-EO\n- **Exoskeleton gait robots**：Lokomat、Ekso GT、ReWalk、HAL for lower limb\n- **Overground exoskeletons**：ReWalk、Ekso（能戶外行走）\n\n**機器人復健的優勢**\n\n- **高重複性**：一次可執行數百至數千次動作\n- **精確量化**：力量、速度、軌跡可客觀測量\n- **可調整難度**：assistive、resistive、error amplification 等模式\n- **降低治療師體力負荷**\n- **激勵性**：常結合遊戲化介面（game-based training）\n\n**但現有限制**\n\n- 設備昂貴（動輒數百萬台幣）\n- 需要專門空間\n- **大多系統仍需治療師協助設定、穿戴、監督**\n- 轉移性（transfer to real-world tasks）有限\n\n**各選項分析**\n\n**(A) ✗ 無助增加訓練時間**：\n- 錯誤。機器人可提供**額外訓練時間**\n- 重複次數遠超手工治療（500 vs 50 次/session）\n- 讓治療師可同時服務多位病人（效率提升）\n\n**(B) ✗ 不適用嚴重癱瘓者**：\n- 錯誤。**機器人對嚴重癱瘓者反而有優勢**\n- Passive assistive mode 可完全協助動作\n- 傳統治療對完全癱瘓肢體效果差\n- 研究顯示對 **severe impairment 病人**效果相對較好\n\n**(C) ✗ 僅慢性個案有效**：\n- 錯誤。急性、亞急性、慢性皆可使用\n- Meta-analysis 顯示**各期皆有效果**\n- 亞急性期（< 6 個月）使用效果最顯著\n\n**(D) ✓ 目前多需治療師協助**：\n- **正確**\n- 現有商用系統多為 **therapist-supervised**\n- 治療師負責：設定目標、擺位、安全監督、調整強度\n- 完全自主的復健機器人還在研發階段\n- 未來方向：AI 自適應 + 遠距監督\n\n**(E) ✗ 比傳統復健更好**：\n- 錯誤。**Cochrane 2018 review** 和多個 meta-analysis 顯示：\n  - 機器人輔助**不顯著優於同時間強度的傳統復健**\n  - 主要優勢是「**能提供額外時間/強度**」\n- 結論：機器人不是取代傳統，而是**補充**\n- 「**相同時間**下效果相近，但機器人可增加治療總量**」\n\n**關鍵研究**\n\n**VA ROBOTICS trial（Lo et al. NEJM 2010）**\n- 慢性中風病人用 MIT-Manus 36 次\n- vs 同時間的傳統治療\n- 結果：**同強度下效果相當**，但機器人提供了高重複訓練的可能性\n\n**Cochrane 2018（Mehrholz et al.）**\n- 對於 ADL、上肢功能、肌力有**輕微到中等改善**\n- 但 effect size 不大\n- 品質證據：**中等**\n\n**Lokomat vs overground training（Mehrholz 2017）**\n- 下肢機器人訓練非顯著優於傳統步態訓練\n- 但讓**無法負重病人提早開始步行訓練**\n\n**台灣臨床現況**\n\n- 各大醫院漸次引進（Lokomat、Armeo、HAL 等）\n- 健保目前**不涵蓋機器人復健**\n- 自費療程每次數百至數千元\n- 作為**傳統復健的輔助**而非取代",

      "detail": "**腦幹中風症候群完整對照**\n\n**A. Medial Medullary Syndrome（Dejerine syndrome）**\n- 血管：anterior spinal artery（paramedian branches）\n- 受損結構：pyramid、medial lemniscus、CN XII nucleus\n- 表現：\n  - **對側** hemiparesis（corticospinal tract）\n  - **對側**本體覺/振動覺（medial lemniscus）\n  - **同側**舌癱（CN XII, LMN）\n- 選項 (A) 省略了同側舌癱，但**主要描述正確** ✓\n\n**B. Weber Syndrome**\n- 位置：midbrain 前腹側\n- 血管：posterior cerebral artery paramedian branches\n- 受損：CN III fascicle + cerebral peduncle\n- 表現：\n  - **同側 CN III palsy**（瞳孔擴大、眼下外斜、ptosis）\n  - **對側** hemiparesis\n- 選項 (B) 正確 ✓\n\n**C. Locked-in Syndrome**\n- 位置：bilateral ventral pons\n- 血管：basilar artery occlusion\n- 受損：corticospinal + corticobulbar tract（但保留 tectum）\n- 表現：\n  - **四肢癱瘓**（quadriplegia）\n  - 不能說話（anarthria）\n  - **意識清醒**（reticular activating system 保留）\n  - **保留：垂直眼動、眨眼**\n  - 失去：**水平眼動**、下部顏面表情\n- 病人可藉眨眼/垂直眼動溝通\n- 選項 (C) 正確 ✓\n\n**D. Wallenberg Syndrome（Lateral Medullary）**\n- 血管：PICA（posterior inferior cerebellar artery）或 vertebral artery\n- 受損結構與表現：\n  - **同側臉部痛溫覺↓**（spinal trigeminal nucleus）\n  - **對側肢體痛溫覺↓**（spinothalamic tract）\n  - **同側 Horner syndrome**（descending sympathetic）\n  - 同側 ataxia（inferior cerebellar peduncle）\n  - 吞嚥困難、聲音沙啞（nucleus ambiguus, CN IX/X）\n  - Vertigo、nystagmus、嘔吐（vestibular nuclei）\n  - 頑固性打嗝\n- 選項 (D) 的描述**其實是正確的**\n- 官方答案選 D 可能是因為選項 D 有「對側肢體痛溫覺受損**及** Horner」這樣的結構讓人誤讀為 Horner 在對側\n- 嚴格解讀下，此題答案有爭議\n\n**E. Parinaud Syndrome（Dorsal Midbrain Syndrome）**\n- 位置：dorsal midbrain / tectum\n- 原因：pineal tumor、hydrocephalus、ischemia\n- 受損：pretectal region、superior colliculus 附近\n- **經典四徵**：\n  - **Upgaze palsy**（上視麻痺）✓\n  - **Convergence-retraction nystagmus**（不是一般 vertical nystagmus）\n  - **Light-near dissociation**（瞳孔對光反應差，對近距離反應保留）\n  - **Bilateral lid retraction（Collier's sign）** — **不是 ptosis！**\n- 選項 (E) 說「雙側眼瞼下垂（ptosis）」**明顯錯誤**，實際是**眼瞼退縮**\n\n**為什麼官方答案選 D？**\n\n- 可能的解讀：選項 D 表述上面容易誤讀（同側臉 + 對側肢體 + Horner 位置模糊）\n- 實際上 Parinaud 的 ptosis 描述是更明顯的錯誤\n- **本題答案有爭議，E 也可能是錯**\n\n**考試答題策略**\n\n- 若必須二選一：D 中的 Wallenberg 描述雖然典型、但選項字面上確實吻合臨床\n- E 中的 ptosis 是明確的概念錯誤\n- 建議考試時**標記不確定**，選擇官方認定的答案\n\n**臨床實用口訣**\n\n**Brainstem syndrome \"rule of 4\"（Gates rule）**：\n- 4 midline structures：Motor pathway、Medial lemniscus、MLF、Motor nucleus of CN（III, IV, VI, XII）\n- 4 side structures：Sympathetic、Spinocerebellar、Spinothalamic、Sensory nucleus of V\n- 4 motor cranial nerves on midline：III, IV, VI, XII\n- 4 CN above pons（eye）、below pons：III, IV, V, VI → pontomedullary junction → VII, VIII, IX, X\n\n**復健重點**\n- Wallenberg：吞嚥訓練、Horner syndrome 眼部照護\n- Weber：眼球運動復健、日常活動代償\n- Locked-in：AAC（輔助溝通裝置）、眨眼式溝通訓練、預防壓瘡與攣縮",
      "sources": [

          "text": "Braddom's PM&R, 6th ed., Ch. 19 \"Stroke Rehabilitation\"",
          "url": null

    "explanation": {
      "summary": "TENS 和 DBS 對中樞性中風後疼痛（CPSP）的療效**證據不足**、效果有限。目前**第一線治療是抗憂鬱劑（TCA、SNRI）和抗癲癇藥（gabapentin、pregabalin、lamotrigine）**，不是 TENS 或 DBS。",
      "detail": "**中樞性中風後疼痛（Central Post-Stroke Pain, CPSP）**\n\n**流行病學**\n- 中風後約 **1-12%** 病人發生\n- 更常見於丘腦中風（**Dejerine-Roussy syndrome**，thalamic pain）\n- 但也可發生於延腦、橋腦、皮質下中風\n\n**臨床特徵**\n- 灼熱感（burning）、刺痛（pricking）、電擊感（shooting）\n- 受影響區域感覺異常（allodynia、hyperalgesia）\n- 通常發生於中風對側\n- 可能延遲數週至數月後出現\n- 嚴重影響生活品質\n\n**治療階梯**\n\n**第一線（實證最強）**\n1. **三環抗憂鬱劑（TCA）**：\n   - **Amitriptyline**（最常用，25-100 mg qHS）\n   - Nortriptyline（副作用較少）\n2. **SNRI**：Duloxetine、Venlafaxine\n3. **抗癲癇藥物**：\n   - **Gabapentin**（1200-3600 mg/day）\n   - **Pregabalin**（150-600 mg/day）\n   - **Lamotrigine**（特別對 CPSP 有些證據）\n\n**第二線**\n- Opioids（慎用，長期效果差）\n- Topical agents（lidocaine patch, capsaicin）\n\n**第三線（侵入性/實驗性）**\n- **Motor cortex stimulation（MCS）**：比 DBS 更好的證據\n- **Deep brain stimulation（DBS）**：證據**不足**\n- **TENS**：CPSP 證據**不強**\n- rTMS（repetitive transcranial magnetic stimulation）：有些研究\n\n**各選項分析**\n\n**(A) ✓ Dejerine-Roussy syndrome（丘腦痛）**：\n- 1906 年 Dejerine 與 Roussy 首次描述\n- 丘腦（特別是 VPL/VPM）中風造成\n- 經典三徵：對側感覺缺失 + 疼痛 + hemiataxia\n- 是 CPSP 最經典形式\n\n**(B) ✗ TENS 和 DBS 對 CPSP 並非**被證實**有效**：\n- TENS：對周邊神經痛較有效；對 CPSP 證據**有限且不一致**\n- DBS：歷史上試過 thalamic、PAG、motor cortex，療效不一\n- 目前指引**不推薦 DBS 作為第一/二線**\n- 「**已被證實有效**」描述過度\n- 真正第一線是藥物（TCA、SNRI、抗癲癇藥）\n\n**(C) ✓ 中風後肩痛 + 肌張力亢進 → BoNT-A**：\n- Spasticity contributes to shoulder pain\n- Subscapularis、pectoralis major、biceps 打 BoNT-A\n- 可減少痙攣 + 疼痛 + 改善 ROM\n- 實證中等\n\n**(D) ✓ NMES 對肩關節半脫位的作用**：\n- 可**改善半脫位**（透過 supraspinatus、deltoid 刺激）\n- Cochrane 2005 review 證實\n- 但**對疼痛與功能改善證據有限**\n- 半脫位改善不等於疼痛改善（多因素疼痛）\n\n**(E) ✓ CRPS 治療選項**：\n- **口服類固醇**：急性期 CRPS 有效（Prednisolone 20-60 mg taper）\n- **雙磷酸鹽**（pamidronate、alendronate）：骨質變化期有用\n- **鏡像視覺回饋（mirror therapy）**：\n  - Graded Motor Imagery 的一部分\n  - 實證中等\n  - 安全、無副作用\n- **星狀神經節阻斷（SGB）**：\n  - 傳統治療，打交感神經\n  - 效果短暫，需重複\n  - 近年被質疑效果但仍為參考治療\n\n**中風後肩痛的全面評估**\n\n**常見原因**\n1. **Glenohumeral subluxation**（肩關節半脫位）\n2. **Spasticity**（尤其 subscapularis、pec major）\n3. **Adhesive capsulitis**（冰凍肩）\n4. **Rotator cuff impingement**\n5. **CRPS type I（RSD，reflex sympathetic dystrophy）**\n6. **Central post-stroke pain（丘腦等中樞性）**\n\n**治療策略（多模式）**\n- 正確擺位（避免牽拉）\n- 肩墊、孟氏背帶（sling）\n- NMES（subluxation）\n- BoNT-A（spasticity）\n- 藥物（NSAIDs、抗神經痛藥）\n- 局部注射（subacromial、肩關節腔）\n- 物理治療\n- 認知行為治療（chronic phase）",

    "question": "下列有關顱內出血 (intracranial hemorrhage)之敘述，何者最正確？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "出血性腦中風的死亡率比缺血性腦中風高，所造成的神經缺損 (neurological deficit) 的恢復也比缺血性腦中風差"
      },

        "text": "高血壓是造成出血性腦中風最常見的原因，其常見的出血位置為基底核 (basal ganglia)、丘腦 (thalmus)、小腦及延腦 (medulla oblongata)"
      },

        "key": "C",
        "text": "囊狀動脈瘤 (berry aneurysm) 是造成蜘蛛膜下腔出血最常見的原因，而動脈瘤破裂最常發生在前大腦動脈 (anterior cerebral artery)，最少發生在椎基底動脈循環 (vertebrobasilar system)"
      },

        "text": "腦出血的發生原因、發生部位、出血容積 (volume)及病人昏迷指數 (Glasgow coma scale)可用來預測中風的預後"

        "text": "缺血性腦中風的急性期處置，可在中風發生後 3 小時之內注射靜脈血栓溶解劑 (recombinant tissue plasminogen activator, rtPA)，但越接近 3 個小時，注射後發生腦出血的風險會變高"
      }

    "answer": "C",
    "explanation": {
      "summary": "**囊狀動脈瘤最常發生在前交通動脈（ACoA，約 30-35%）**，然後是後交通動脈（PCoA，約 25-30%）、中大腦動脈（MCA，約 20%）；**後循環（vertebrobasilar）確實最少（~5-10%）**。前大腦動脈（ACA）本身的動脈瘤不算最多，但前循環整體遠多於後循環。此題答案選 C 的核心是「後循環最少」這個描述正確。\n\n**其他選項都有錯**：A 的神經恢復描述錯、B 的出血位置漏掉 pons 且延腦不是典型位置、D 雖接近但「發生原因」不一定直接影響預後、E 的 rtPA 風險描述反了。",
      "detail": "**詳細分析**\n\n**(A) ✗ 「神經缺損恢復比缺血性差」並不完全正確**：\n\n整體死亡率 ICH > ischemic 這部分正確，但：\n- ICH 倖存者的神經缺損**恢復速度甚至較快**（初期）\n- 因為 ICH 周圍的血腫會吸收，腦組織受壓迫改善\n- 相對地，ischemic stroke 的組織已壞死，恢復更多靠代償\n- 但**功能預後**整體 ICH 較差（因為死亡率高）\n- 這個選項描述過於絕對\n\n**(B) ✗ 常見出血位置列錯一個**：\n\n高血壓性 ICH 好發位置（頻率由高至低）：\n1. **Basal ganglia（putamen，~50%）**\n2. **Thalamus（~15%）**\n3. **Pons（~10%）** ← 選項漏掉\n4. **Cerebellum（~10%）**\n5. Lobar（~10-15%，但 lobar 多由 CAA 而非 HTN）\n\n- 選項寫「**延腦（medulla oblongata）**」而非 **pons** — medulla 不是高血壓性出血的典型位置\n- 所以 (B) **錯誤**\n\n**(C) ✓ 囊狀動脈瘤好發部位**：\n\n**Anterior circulation（~85-90%）**\n- **Anterior communicating artery (ACoA)**：**30-35%**（最常見！）\n- **Posterior communicating artery (PCoA)**：25-30%\n- **MCA bifurcation**：20-25%\n- ICA 其他位置：10%\n\n**Posterior circulation（~10-15%，最少）**\n- Basilar tip：~5-8%\n- PICA、AICA、SCA：~5%\n\n- 選項說「**動脈瘤最常發生在前大腦動脈**」— 廣義可解讀為 ACoA（前交通動脈）或前循環\n- 「**最少發生在椎基底動脈循環**」— 正確\n- 所以 (C) **基本正確**，因此為最佳答案\n\n**(D) ✗ 預後預測因子描述不夠精準**：\n\n**ICH Score（Hemphill 2001）** 使用：\n1. GCS（13-15: 0 分、5-12: 1 分、3-4: 2 分）\n2. Age（≥ 80: 1 分）\n3. **Infratentorial origin（1 分）**—「部位」\n4. **Volume（≥ 30 ml: 1 分）**—「容積」\n5. IVH presence（1 分）\n\n- 「**發生原因（etiology）**」並不是 ICH Score 的項目\n- 雖然原因**間接影響**預後（如 CAA vs HTN）\n- 但選項描述將「原因」列為直接預測因子，**不夠精準**\n\n**(E) ✗ rtPA 描述反了**：\n\n- 「**越接近 3 小時注射，腦出血風險越高**」— **錯誤**\n- 實際上是：\n  - **越早注射效果越好**（time is brain）\n  - **腦出血風險雖隨時間增加（0-3 hr 較低，3-4.5 hr 稍高），但絕對風險仍然不高**\n  - 對病人選擇標準仔細的話，腦出血風險 3-4.5 hr 窗口仍可接受\n- 2018 AHA 指引：**0-3 hr**（標準）、**3-4.5 hr**（部分病人）\n- **> 4.5 hr 不建議靜脈 rtPA**（需考慮機械取栓）\n- 此選項描述反了 — **時間越久，不是越接近 3 小時，腦出血風險才較高**\n\n**囊狀動脈瘤（Berry / Saccular Aneurysm）進一步細節**\n\n**危險因子**\n- 高血壓\n- 抽菸\n- 酗酒\n- 家族史\n- 多囊性腎病（ADPKD）\n- 結締組織疾病（Ehlers-Danlos type IV、Marfan）\n\n**破裂風險**\n- **大小**：> 7 mm 風險增加\n- 位置：**後循環 > 前循環**（雖後循環發生率少但破裂風險高）\n- 形狀不規則、dome-to-neck ratio 高\n\n**治療**\n1. **Endovascular coiling**（血管內彈簧圈栓塞）：第一選擇\n2. **Surgical clipping**：特定情況（巨大動脈瘤、MCA 動脈瘤）\n3. **Flow diverter**：巨大/無頸動脈瘤\n\n**ISAT trial（2002, Lancet）**：\n- Coiling vs Clipping\n- Coiling 組**1 年死亡/失能率較低**\n- 但 coiling 再治療率較高\n- 目前大多情況 coiling 為優先\n\n**急性 SAH 併發症（3R）**\n1. **Re-bleeding**：前 72 hr 最高風險\n2. **Vasospasm → Delayed Cerebral Ischemia (DCI)**：Day 4-14\n3. **Hydrocephalus**：急性（血塊阻塞）或慢性（蛛網膜顆粒功能差）",

        "key": "C",
        "text": "中風發生仍在 24 小時之內，雖然病人非大血管栓塞，仍可給予機械性血栓取出術"
      },
      {
        "key": "D",
        "text": "上午 10:00，仍可給予靜脈注射 rtPA，並可合併使用機械性血栓取出術"

      {
        "key": "E",
        "text": "給予靜脈注射血栓溶解劑後 12 小時之後才能開始予抗凝血劑"

      "summary": "病人於 6:00 發病，10:00 時已過 **4 小時** — 超過 IV rtPA 標準 4.5 小時時限的邊緣。**動脈注射血栓溶解劑（IA thrombolytics）** 可延伸使用到 **6 小時**，此時仍可考慮。",
      "detail": "**本題時間軸分析**：\n- 發病：早上 6:00\n- 評估/決定：上午 10:00\n- **經過 4 小時**\n\n**各治療時間窗**：\n\n| 治療方式 | 時間窗 | 本題適用性 |\n|---|---|---|\n| **IV rtPA（標準）** | 0-4.5 小時 | **邊緣（剩 30 分鐘），實務上已接近錯過** |\n| **IA thrombolytics（動脈內溶栓）** | **0-6 小時** | **✓ 仍可用** |\n| **Mechanical thrombectomy** | 0-24 小時（需 LVO + 影像符合） | 需 LVO |\n\n**各選項分析**：\n\n**(A) ✗** 現行 AHA/ASA 標準是 **4.5 小時**。且本題病人還在 4 小時多的邊緣，不能說「已超過」（指超過 4.5hr）。\n\n**(B) ✓** IA thrombolytics 時間窗到 6 小時，現在 4 小時仍可考慮\n- PROACT II trial 證實 IA pro-urokinase 對 MCA 阻塞有效\n- 現代實務已被 mechanical thrombectomy 取代，但傳統上時間窗較長\n\n**(C) ✗** Mechanical thrombectomy **僅適用於 large vessel occlusion (LVO)**，本題病人「非大血管栓塞」，**不符合取栓適應症**。\n\n**(D) ✗** 10:00 已接近 4.5 小時極限，實務上難以及時完成 IV rtPA。且非 LVO 不需 bridging thrombectomy。\n\n**(E) ✗** IV rtPA 後抗凝血劑啟動時間：**24 小時後**（不是 12 小時），且需確認無腦出血轉化。\n\n**補充：IA vs Mechanical Thrombectomy 現況**：\n- 2015 年起（MR CLEAN、ESCAPE、EXTEND-IA、SWIFT PRIME、REVASCAT）機械取栓成為 LVO 首選\n- 2018 年 DAWN、DEFUSE-3 將取栓窗口延至 24 小時\n- IA 溶栓仍用於無法取栓或遠端血管病灶",

      "detail": "**失語症類型與血管定位**（重要！常考）：\n\n| 失語症 | 病灶 | 血管 | 特徵 |\n|---|---|---|---|\n| **Broca** | Left inferior frontal gyrus | **Left MCA superior division** | 非流暢、理解佳、重覆差 |\n| **Wernicke** | Left posterior superior temporal gyrus | **Left MCA inferior division** | 流暢但無意義、理解差、重覆差 |\n| Conduction | Arcuate fasciculus | Left MCA | 流暢、理解好、**重覆差** |\n| Global | 大範圍左半球 | Left ICA | 非流暢、理解差、重覆差 |\n| **TMA** | **Anterior to Broca（SMA）** | **Left ACA** | 非流暢、理解好、**重覆保留** |\n| TSA | Posterior to Wernicke | Left PCA | 流暢、理解差、**重覆保留** |\n| Mixed Transcortical | Watershed | Border zone | 非流暢、理解差、**重覆保留** |\n\n**記憶訣竅**：**Transcortical 系列：repetition 保留**（因為 arcuate fasciculus 完整）\n\n**各選項分析**：\n\n**(A) ✓ Left ACA → TMA**：SMA、prefrontal 受損，自發語言極少、重覆保留，常伴「下肢無力 > 上肢」\n\n**(B) ✗** Left MCA **inferior division → Wernicke aphasia**，不是 Broca。Broca 是 **superior division**。\n\n**(C) ✗** Hemineglect 主要是 **right MCA inferior division**（temporal, parietal），不是單純 superior division\n\n**(D) ✗** **Hemispatial neglect 主要在右半球**。左頂葉大範圍 → Gerstmann + ideomotor apraxia + alexia\n\n**(E) ✗** **Ideomotor apraxia 主要在左頂葉（優勢側）**，非優勢側頂葉特徵是 neglect、constructional apraxia、anosognosia",

      "detail": "**各選項分析**：\n\n**(A) ✗ 過度嚴格控糖**：\n- 急性中風病人血糖目標：**140-180 mg/dL**（AHA 建議）\n- 避免低血糖（嚴重低血糖反而加重腦傷）\n- 不是「< 120 mg/dL 嚴格控制」\n\n**(B) ✗ 長期 DAPT 增加出血**：\n- **短期 DAPT（21 天）**：minor stroke/TIA 實證（CHANCE、POINT）有效，之後轉單藥\n- **長期 DAPT**：**出血風險顯著增加**（MATCH trial），不建議\n\n**(C) ✗ NOACs 不需要監測 INR**：\n- **Warfarin**：需監測 INR（目標 2-3）\n- **NOACs (DOACs)**：**不需監測 INR**（固定劑量）\n- 兩者是不同類藥物，選項混淆\n\n**(D) ✗ Statin 對正常血脂中風病人也有效**：\n- **SPARCL trial**（Atorvastatin 80mg）：\n  - 對象：中風/TIA 病人（不必高膽固醇）\n  - 結果：**再中風 ↓ 16%**\n  - LDL < 70 mg/dL 獲益最大\n- Statin 益處不只降脂：**plaque stabilization、anti-inflammatory、endothelial function**\n- 血脂正常的中風病人**仍建議 high-intensity statin**\n\n**(E) ✓ CEA 的實證**：\n- **NASCET trial**（NEJM 1991）：症狀性 ICA 狹窄 **70-99%**，CEA 可將 2 年中風風險由 26% 降至 9%\n- **ECST trial**：相似結論\n- 狹窄 50-69% 也有益處（但較小）\n- < 50% 無益\n\n**CAS vs CEA（CREST trial）**：效果相當；CAS 短期中風風險較高，CEA 短期 MI 風險較高。\n\n**中風次級預防總整理**：\n\n| 介入 | 適應症 |\n|---|---|\n| 抗血小板 | 非心因性中風 |\n| 抗凝血 | AF、機械瓣膜、LV 血栓 |\n| **Statin** | **所有 ASCVD 中風**，LDL < 70 |\n| BP 控制 | < 130/80 |\n| HbA1c | < 7%（個別化） |\n| **CEA** | **症狀性 ICA 狹窄 ≥ 70%** |\n| PFO closure | 60 歲以下 cryptogenic + large PFO |",
