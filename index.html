      "summary": "(C) 錯誤。**鵝掌肌肌腱與脛骨之間要注意的血管是「膝下內動脈(inferior medial genicular artery)」,而非「脛前返動脈(anterior tibial recurrent artery)」**。脛前返動脈位於脛骨前外側,在脛骨平台的前外側區域;鵝掌肌位於膝**前內側**,該區域的血管是 inferior medial genicular artery(膕動脈分支)。注射時確實需避開此血管。",
      "detail": "**鵝掌肌肌腱 (Pes Anserinus) 病變**\n\n## 解剖 — (A) 正確\n\n### 鵝掌肌肌腱(Pes Anserinus)組成\n\n**三條肌腱從前到後排列(SGT)**:\n1. **S**artorius(縫匠肌)— 最前\n2. **G**racilis(股薄肌)— 中間\n3. Semi**T**endinosus(半腱肌)— 最後\n\n### 附著點\n- **脛骨前內側**(tibial metaphysis)\n- 膝關節下方約 5-7 cm\n- 遠端、前方、淺層附著\n\n### 記憶口訣\n- \"**Say Grace before Tea**\" (Sartorius → Gracilis → Semitendinosus)\n- 從前到後、由淺至深\n\n## 鵝掌肌肌腱炎 / 滑囊炎\n\n### 流行病學\n- 中老年女性好發\n- 常合併 OA、肥胖、糖尿病\n- 跑者常見\n\n### 臨床表現 (符合本病人)\n- **膝前內側疼痛**\n- 膝關節下方 5-7 cm\n- 特徵性疼痛:\n  - **久坐或久蹲後站起來瞬間特別疼痛** ★\n  - 走路後改善\n  - **上下樓梯加重**\n- 壓痛點明確\n- 常合併膝 OA\n\n### 超音波所見\n- 肌腱增厚、低回音\n- 滑囊積液(anserine bursa)\n- Pes bursa 位於肌腱深層、脛骨淺層\n- 正常看不到,積液才明顯 — (B) 正確\n\n## 注射考量 — (C) 本題關鍵\n\n### 需避開的血管\n\n#### **Inferior Medial Genicular Artery (膝下內動脈)** ★\n- **膕動脈分支**\n- 繞過脛骨內側\n- 位於鵝掌肌深層、**接近脛骨**\n- **注射鵝掌滑囊時需避開**\n- 超音波可見低回音血管(可用 Doppler 確認)\n\n#### **Anterior Tibial Recurrent Artery (脛前返動脈)**\n- 脛前動脈(anterior tibial artery)的分支\n- **位於脛骨前外側**\n- **不在鵝掌肌區域**(前內側)\n- 走行於 tibialis anterior 肌群\n\n### (C) 為什麼錯誤?\n- 選項將「**脛前返動脈**」放在鵝掌肌 vs 脛骨之間\n- **位置錯誤**:\n  - 脛前返動脈在前外側\n  - 鵝掌肌在前內側\n  - 兩者不同位置\n- **正確是 inferior medial genicular artery**\n\n## 鑑別診斷\n\n### 1. Medial Tibial Plateau Stress Fracture — (D) 正確\n- 壓力性骨折\n- 高風險族群:\n  - 營養不良\n  - 頻繁運動者\n  - 停經女性(骨質疏鬆)\n  - 創傷風險\n- **X-ray 輔助診斷**\n- MRI 更敏感\n- 疼痛深、骨壓痛\n\n### 2. **Voshell Bursitis(Voshell 滑囊炎)** — (E) 正確\n- 位於 **MCL(內側副韌帶)表層與深層之間**\n- 少見但臨床上被忽略\n- **鑑別診斷**很重要\n- 疼痛類似鵝掌肌\n- 超音波可區分位置\n\n### 3. 其他\n- **OA(膝內側間室)**\n- **MCL 傷害**\n- **內側半月板病變**\n- Medial patellofemoral pain\n- Bone bruise\n\n## 治療\n\n### 保守\n- 休息、冰敷\n- NSAIDs\n- 物理治療(伸展、強化)\n- 減重\n- 矯正鞋墊\n\n### 介入\n- **超音波導引滑囊/肌腱 peritendinous 注射**\n- 類固醇 ± 局部麻醉劑\n- PRP(證據有限)\n- 避開血管(★ 膝下內動脈)\n\n### 手術(少見)\n- 保守治療無效時\n- 肌腱清創或切除部分滑囊\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| **鵝掌肌組成** | **Sartorius + Gracilis + Semitendinosus** |\n| 附著 | 脛骨前內側 |\n| 典型症狀 | **久坐站起、上下樓梯加重** |\n| 注射要避開 | **Inferior medial genicular artery** ★ |\n| 鑑別 | MCL、Voshell bursitis、脛骨平台骨折 |",

      "detail": "**足底纖維瘤病 (Plantar Fibromatosis / Ledderhose Disease)**\n\n## 定義\n\n- 又稱 **Ledderhose disease**\n- **足底筋膜(plantar fascia)內的良性纖維增生**\n- 與 Dupuytren's contracture(掌腱膜攣縮)同源\n- 屬 **Superficial Fibromatosis**\n\n## 流行病學\n\n- 中老年好發(40-60 歲)\n- 男 > 女\n- 雙側 25-50%\n- 家族史\n- 合併 Dupuytren's 約 15%\n\n## 病因 — (A) 正確\n\n- **良性纖維組織結節增生**\n- 足底筋膜內成纖維細胞過度增生\n- 膠原蛋白沉積\n- 機轉不明\n\n### 危險因子\n- 糖尿病\n- 酗酒\n- 癲癇藥(phenytoin)\n- 反覆創傷(? 有爭議)\n- 遺傳\n\n## 臨床表現\n\n### 典型\n- **足底內側中央硬結節**\n- 無痛或輕度疼痛\n- 按壓痛\n- **走路時不適**\n- 穿鞋壓迫\n- 慢性進展\n- 不如 Dupuytren's 造成嚴重攣縮\n\n### 結節特徵\n- **位於足底筋膜內**\n- 通常 **< 3 cm**\n- 圓形或橢圓形\n- 硬質、固定\n- 多位於內側或中央\n\n## 超音波特徵\n\n- **低回音或高回音結節**(fibromatosis 特徵可變)\n- **位於足底筋膜內**\n- **與筋膜連續**(重要辨識點)\n- 邊界可清楚或模糊\n- 大多無 Doppler 訊號(纖維組織)\n\n## 與神經壓迫 — (B) 正確\n\n### 當腫塊變大時\n- 壓迫 **Medial Plantar Nerve(內蹠神經)**\n- 症狀:\n  - 足底麻、刺痛\n  - 足底蹠側不適\n  - 類似跗骨隧道症候群\n- 臨床檢查:\n  - Tinel 徵象可能陽性\n\n## (C) 治療與復發 — 本題關鍵\n\n### 保守治療\n- **物理治療**(伸展、按摩)\n- **矯正鞋墊**(減壓)\n- **NSAIDs**(止痛)\n\n### 局部類固醇注射\n- **效果有限** ★\n- 不是標準治療\n- 可能暫時緩解\n- 但無法逆轉病理\n- **不是首選**\n\n### 其他介入\n- **放射治療**(有證據、預防惡化)\n- **Collagenase injection**(Dupuytren 有 FDA 批准,Ledderhose 研究中)\n- **Verapamil gel**(外用)\n- 震波治療(ESWT)\n\n### 手術(★ 本題關鍵)\n\n#### 手術適應\n- 保守治療無效\n- 嚴重影響功能\n- 神經壓迫症狀\n\n#### 手術範圍\n\n**Local excision(局部切除)**:\n- **復發率極高(40-80%)** ★\n- 不建議\n\n**Wide excision / Complete fasciectomy(擴大切除 / 全筋膜切除)**:\n- **切除整個足底筋膜**\n- **復發率較低(< 20%)**\n- **現代建議做法** ★\n- 併發症:\n  - 足弓下降\n  - 術後疼痛\n  - 傷口癒合問題\n- 需長期追蹤\n\n### (C) 為什麼錯誤?\n\n選項兩個錯誤:\n1. 「局部注射類固醇通常**效果不錯**」❌ — 實際上效果有限\n2. 「**復發率低**,僅需局部切除,不須切除深層筋膜」❌\n   - **實際復發率高(40-80% 局部切除後)**\n   - **需要完整筋膜切除才降低復發**\n   - 完全相反\n\n## 鑑別診斷 — (D)(E) 正確\n\n### 1. Plantar Fasciitis(足底筋膜炎)\n- **跟骨附著處疼痛**\n- 晨起第一步疼痛\n- 無結節\n- 超音波:筋膜增厚(> 4 mm)、低回音\n\n### 2. Plantar Fascia Partial Tear(部分撕裂)\n- **外傷史**\n- **急性發病**\n- 局部血腫、筋膜斷裂\n- 可能合併骨刺\n\n### 3. 其他腫瘤\n- **神經纖維瘤**(neurofibroma)\n- **脂肪瘤**(lipoma)\n- **腱鞘囊腫**(ganglion cyst)\n- **血管瘤**\n- **肉瘤**(惡性,罕見)\n\n### 鑑別方法 — (D)(E) 正確\n- **是否與跟骨相連**(筋膜炎)\n- **是否與筋膜相連**(纖維瘤病特徵)★\n- 病史(外傷、漸進)\n- X-ray 骨刺\n- 超音波回音特徵\n- MRI(複雜案例)\n\n## 考點速記\n\n| 項目 | 足底纖維瘤病 |\n|---|---|\n| 別名 | Ledderhose disease |\n| 性質 | 良性纖維增生 |\n| 位置 | 足底內側 / 中央,**與筋膜相連** |\n| 同源疾病 | Dupuytren's contracture |\n| **類固醇注射** | **效果有限** |\n| **局部切除** | **復發率 40-80%** |\n| **完整筋膜切除** | **復發率 < 20%**(首選手術) |\n| 鑑別 | 筋膜炎、撕裂、軟組織腫瘤 |",

      "detail": "**超音波導引頸椎神經根注射**\n\n## 解剖辨識關鍵 ★\n\n### 頸椎橫突(Transverse Process)特徵\n\n每個頸椎(C3-C6)橫突有 **anterior tubercle + posterior tubercle**:\n\n| 頸椎 | Anterior Tubercle | Posterior Tubercle | 特點 |\n|---|---|---|---|\n| **C3-C5** | 存在 | 存在 | 兩者大小類似 |\n| **C6** | **大**(Chassaignac tubercle) | 存在 | Anterior 特別大 |\n| **C7** | **缺如或極小** ★ | **存在** | **只有 posterior** |\n\n### C6 特徵\n- Anterior tubercle 稱 **Carotid tubercle (Chassaignac's)**\n- 最大的 anterior tubercle\n- 頸動脈在此可壓迫\n- 超音波辨識 C6 的關鍵\n\n### **C7 特徵(★ 本題核心)**\n- **Anterior tubercle 缺如或極小**\n- **只有 posterior tubercle**\n- 不對稱特徵\n- 是辨識 C7 的金標準\n- Vertebral artery 在 C7 通常在 anterior 位置(未進入 foramen transversarium)\n\n## (C) 為什麼錯誤?\n\n選項說「anterior 與 posterior tubercle **大小類似** → C7」\n\n**錯誤原因**:\n- **大小類似 = C3-C5**(不是 C7)\n- **C7 的特徵是 anterior tubercle 缺如**\n- 選項定義完全顛倒\n- 若兩個 tubercle 大小相近,應是 **C5 或 C6**\n\n## 超音波頸椎辨識流程\n\n### 由下往上辨識\n1. **找 C7**:只有 posterior tubercle\n2. **找 C6**:大的 anterior (Chassaignac) tubercle\n3. **C5**:兩個 tubercle 大小中等\n4. **C4**:類似 C5\n5. **C3**:較小\n\n### 由上往下辨識\n1. 從 C2 開始(只有 posterior)\n2. 下一個找 C3\n3. 計算到目標節段\n\n## 頸椎神經根阻斷 (Cervical Nerve Root Block)\n\n### 臨床適應\n- 頸椎神經根壓迫\n- 椎間盤突出\n- 椎孔狹窄\n- 神經根性疼痛\n\n### 超音波導引優點\n- 避免 X-ray 輻射\n- 即時可視神經根、血管\n- 減少血管注射風險\n\n## 注射技巧 — (B)(D)(E) 分析\n\n### (B) 針頭深入神經根正下方? — 正確(但需謹慎)\n- **Peri-neural 注射**\n- 接近神經根\n- **但需避開血管** ★\n- **不得直接注入神經**\n\n### (D) **嚴禁使用結晶態類固醇** ★ 正確(重要!)\n\n**原因**:\n- 頸椎區域血管豐富\n- 結晶態類固醇(particulate steroid)顆粒大\n- 意外注入血管 → **微血管栓塞**\n- 風險:\n  - **頸部脊髓栓塞**\n  - **腦梗塞**\n  - **失明**\n  - **死亡**\n\n**FDA 警告**:\n- Triamcinolone(Kenalog)\n- Methylprednisolone(Depo-Medrol)\n- **禁用於頸椎 transforaminal injection**\n\n**應使用 non-particulate 類固醇**:\n- **Dexamethasone** ★\n- **Betamethasone sodium phosphate**\n- 溶解於溶液中,無顆粒\n- 通過微血管不栓塞\n\n### (E) 椎動脈變異 — 正確\n\n**Vertebral Artery(椎動脈)走行**:\n- **正常**:從 C6 進入 foramen transversarium\n- 在 **C6 以上**(C1-C6)穿過橫突孔\n- **C7 位置**:椎動脈**在前方**(尚未進入橫突孔)\n- 因此 C7 神經根注射**理論上較少碰到椎動脈**\n\n**解剖變異**:\n- **5-10% 人椎動脈從 C5 或 C7 進入**\n- 必須個別確認\n- 使用 Doppler 超音波檢查血管位置\n- 是注射前必要步驟\n\n## 其他構造辨識 — (A) 正確\n\n### 超音波頸部解剖(前側入路)\n\n**由淺到深**:\n- 皮膚、皮下組織\n- **胸鎖乳突肌(SCM)** ★ — 白色箭頭\n- 頸動脈、頸靜脈\n- Anterior scalene\n- 頸椎橫突\n- 神經根\n\n## 注射併發症\n\n### 主要風險\n- **椎動脈栓塞**(結晶態類固醇最嚴重)\n- **脊髓損傷**\n- 血腫\n- 感染\n- 神經損傷\n- 局部麻醉毒性\n\n## 考點速記\n\n| 頸椎節段 | Anterior Tubercle | Posterior Tubercle |\n|---|---|---|\n| C3-C5 | 中等 | 中等 |\n| **C6** | **大(Chassaignac)** | 中等 |\n| **C7** | **缺如 / 極小** ★ | 存在 |\n\n| 注射要點 | 重點 |\n|---|---|\n| **類固醇類型** | **Non-particulate**(Dexamethasone) |\n| **禁用** | **結晶態類固醇**(Triamcinolone) |\n| 椎動脈位置 | C6 以上穿橫突孔 |\n| C7 附近 | **椎動脈通常在前方** |\n| 變異 | 5-10%,需 Doppler 確認 |",

      "detail": "**膝關節超音波 — Suprapatellar Recess**\n\n## 解剖結構 — (A)(B) 正確\n\n### Suprapatellar Recess (髕上隱窩)\n\n**位置**:\n- **股四頭肌腱**下方\n- **髕骨上方**約 3-6 cm\n- **兩個脂肪墊之間**:\n  - **Suprapatellar fat pad**(1):**上方**,位於股四頭肌腱深層\n  - **Prefemoral fat pad**(2):**下方**,位於股骨前方\n- 脂肪墊之間的空間即為 **suprapatellar recess**\n- 與膝關節腔相通\n\n### 股四頭肌腱特徵 — (B) 正確\n\n**伸膝位姿**:\n- 肌腱放鬆\n- **外觀呈波浪狀**\n- 髕骨附著處可能見低迴音\n- **不一定代表病變**\n- 是 **Anisotropy 偽影**\n\n**屈膝位姿**:\n- 肌腱繃緊\n- 波浪狀消失\n- 髕骨附著處回音正常\n\n### 其他脂肪墊\n- **Hoffa's fat pad(髕下脂肪墊)**:在髕腱深層\n- **Quadriceps fat pad**\n- **Prefemoral fat pad**\n\n## Suprapatellar Recess 積液評估 — (C) 本題關鍵\n\n### 正常值 ★\n\n**EULAR 與多項研究的正常值**:\n- **健康者 < 2 mm** ★\n- 超過 2 mm 即視為異常\n- 4 mm 已明顯病理性\n\n**研究文獻**:\n- Schmidt et al. 2004 EULAR:\n  - 正常 < 2 mm\n  - 2-4 mm:mild\n  - 4-10 mm:moderate\n  - > 10 mm:severe\n\n### (C) 為什麼錯誤?\n\n選項說「健康者少量積液,厚度應 **< 4 mm**」\n\n**錯誤原因**:\n- 正確標準是 **< 2 mm**\n- **4 mm 已經是中度病理積液**\n- 標準顛倒\n- 臨床會漏診早期關節病變\n\n## (D) 病理積液 — 正確\n\n### Suprapatellar Recess 大量積液的意義\n\n**病因分類**:\n\n#### 1. 外傷性\n- **半月板損傷**\n- **十字韌帶撕裂**\n- **軟骨損傷**\n- **骨折**(hemarthrosis)\n- **髕骨脫臼**\n\n#### 2. 炎症性\n- **RA, OA**\n- 痛風、pseudo gout\n- 滑膜炎\n- 感染性關節炎(化膿)\n\n#### 3. 退化性\n- **OA**(最常)\n- 漸進積液\n\n#### 4. 其他\n- 出血性疾病(血友病、抗凝藥)\n- 腫瘤(罕見)\n\n### 超音波特徵\n- **Anechoic**(單純積液)\n- **Hypoechoic 含 debris**(血腫、膿)\n- 可合併滑膜增厚(PDI 陽性)\n\n## 股四頭肌腱撕裂 — (E) 正確\n\n### 病因\n\n#### 1. 直接外傷\n- 跌倒、運動\n- 膝屈曲狀態下強力抗力\n\n#### 2. 全身性疾病\n- **SLE**\n- **RA**\n- 糖尿病\n- 慢性腎病(CKD)\n- 繼發性 hyperparathyroidism\n- 類固醇使用者\n- **Fluoroquinolone 抗生素**\n- 統計:約 33% 自發性肌腱斷裂合併全身疾病\n\n### 臨床\n- 急性劇痛\n- 無法伸膝\n- 肌腱缺損觸診\n- 影像確認\n\n## 超音波評估膝關節積液\n\n### 標準測量方法\n\n- **探頭縱向**放在髕骨上方\n- **膝屈曲 30°**(理想位置)\n- 測量**髕上脂肪墊**到**股骨前脂肪墊**之間的**最大距離**\n- 單位:mm\n\n### 分級\n\n| 厚度 (mm) | 分級 |\n|---|---|\n| **< 2** | **正常** ★ |\n| 2-4 | 輕度 |\n| 4-10 | 中度 |\n| > 10 | 重度 |\n\n### 積液 vs 滑膜炎鑑別\n- **積液(effusion)**:\n  - Anechoic(純液體)\n  - Compressible(可壓縮)\n  - **PDI 陰性**\n- **滑膜炎(synovitis)**:\n  - Hypoechoic(低回音組織)\n  - **Non-compressible**(不可壓縮)\n  - **PDI 可陽性**(活動性)\n\n## 考點速記\n\n| 解剖構造 | 位置 |\n|---|---|\n| **Suprapatellar fat pad** (1) | **上方** (股四頭肌腱深層) |\n| **Prefemoral fat pad** (2) | **下方** (股骨前) |\n| **Suprapatellar recess** | 兩脂肪墊之間 |\n| Hoffa's fat pad | 髕腱深層 |\n\n| 積液厚度 | 意義 |\n|---|---|\n| **< 2 mm** ★ | 正常 |\n| 2-4 mm | 輕度異常 |\n| 4-10 mm | 中度異常 |\n| > 10 mm | 重度異常 |\n\n| 肌腱撕裂原因 | 注意 |\n|---|---|\n| 直接外傷 | 運動 |\n| **RA、SLE、DM、CKD** | **全身性疾病** |\n| 類固醇 | 藥物 |\n| Fluoroquinolone | 藥物 |",

      "summary": "(D) 正確。**MLD 的「清空原則(central clearing first)」**:先清空健側、近端、替代引流區,再處理患側遠端。順序應為 **D(雙側腋下 + 左鼠蹊)→ C(胸腹)→ A(右大腿)→ B(右小腿)**。先打開健康的引流通道,讓中央淋巴系統有「空間」接收從患肢引流過來的淋巴液,再逐步向患肢遠端推進。",
      "detail": "**徒手淋巴引流 (Manual Lymphatic Drainage, MLD)**\n\n## 基本原理\n\n### MLD 核心概念\n- **不是按摩、不是深壓**\n- 輕柔皮膚牽拉(< 30-40 mmHg)\n- 增加微淋巴管收縮頻率\n- **促進側枝循環**\n- 將淋巴液**從受損區導向健康區**\n- 適應症:\n  - 癌症術後淋巴水腫\n  - 原發性淋巴水腫\n  - 術後腫脹\n\n## 淋巴區 (Lymphotomes) 概念\n\n- 皮膚被分為多個淋巴引流區\n- 各區引流到特定淋巴結群\n- **分水嶺(watershed)**:淋巴區的邊界\n- MLD 可跨越分水嶺引流\n\n## MLD 順序原則 ★ 本題核心\n\n### 核心原則:**Central Clearing First(中央清空先)**\n\n**步驟**:\n1. **先清空中央(健側近端淋巴結)** ★\n2. **再清胸腹淋巴區**\n3. **再處理患肢近端**\n4. **最後處理患肢遠端**\n\n### 為什麼要這個順序?\n\n**比喻**:\n- 淋巴系統像排水管\n- 要先把**接收端**的管路清空\n- 否則從遠端推液也無處可去\n\n**生理基礎**:\n1. 先刺激健康淋巴結 → 增加收縮\n2. 打開替代路徑\n3. 在胸腹淋巴區建立負壓\n4. 從患肢近端將淋巴推向中央\n5. 最後從遠端向近端推進\n\n## 本病例應用\n\n### 病情\n- 右側腹股溝淋巴結切除\n- 右下肢淋巴水腫\n- 右鼠蹊引流受損\n\n### 替代引流路徑\n\n**可用的健康區域**:\n- **雙側腋下淋巴結**(axillary nodes)\n- **左側腹股溝淋巴結**\n- **胸腹淋巴區**(作為通道)\n\n### 正確順序\n\n#### Step 1: **D - 雙側腋下 + 左鼠蹊**(清空健側近端)\n- 刺激健康淋巴結收縮\n- 建立中央負壓\n- 準備接收淋巴液\n\n#### Step 2: **C - 胸部及腹部淋巴區**(建立通道)\n- 活化胸腹淋巴系統\n- 建立從右下肢到健側的通道\n- 引流方向:\n  - 右下肢 → 跨腹部 → 左鼠蹊\n  - 或 右下肢 → 跨胸腹 → 腋下\n\n#### Step 3: **A - 右大腿**(患肢近端)\n- 將大腿的淋巴向中央引流\n- 送往已活化的腹部區\n\n#### Step 4: **B - 右小腿**(患肢遠端)\n- 最後處理遠端\n- 從小腿向大腿推進\n- 延續已建立的引流\n\n### 最終順序:**D → C → A → B**\n\n## 其他選項分析\n\n### (A) ABCD — 錯誤\n- 從患肢遠端開始,沒有建立中央引流\n- 淋巴液無處可去 → 效果差\n\n### (B) DCBA — 錯誤\n- 順序大致對(D, C 先)\n- 但 B → A(遠端 → 近端)錯誤\n- 應該是近端先、遠端後\n\n### (C) BACD — 錯誤\n- 從患肢開始,未先清空中央\n\n### **(D) DCAB** ★ 正確\n- 先清中央(D),再通道(C)\n- 再近端(A),最後遠端(B)\n- 符合 MLD 標準原則\n\n### (E) CDAB — 部分對\n- C 和 D 順序顛倒\n- 應該是 **D 先(清空)→ C(通道)**\n\n## MLD 技巧要點\n\n### 基本手法\n- **輕柔、慢速**\n- **皮膚表面滑動**(不深壓)\n- **壓力 < 30-40 mmHg**\n- 每個點 5-7 次\n- 停留、放鬆、推進\n\n### 方向\n- 永遠朝向健康淋巴結\n- 不逆流\n\n### 時間\n- 每次 30-60 分鐘\n- 每天 1 次\n- Complete Decongestive Therapy (CDT) 一部分\n\n## Complete Decongestive Therapy (CDT) 完整治療\n\n### 兩階段\n\n#### Phase 1: Intensive Phase(密集期,2-4 週)\n1. **MLD**(徒手淋巴引流)\n2. **Multi-layer bandaging**(多層繃帶)\n3. **Exercise**(運動)\n4. **Skin care**(皮膚護理)\n\n#### Phase 2: Maintenance Phase(維持期,終生)\n1. **Compression garments**(壓力衣)\n2. 自我 MLD\n3. 運動\n4. 皮膚護理\n\n## MLD 禁忌症\n\n### 絕對禁忌\n- **急性感染**(蜂窩性組織炎)\n- **急性血栓(DVT)**\n- **急性心衰竭**\n- **惡性腫瘤活躍**(有些教科書列為相對禁忌)\n\n### 相對禁忌\n- 高血壓未控制\n- 腎衰竭\n- 甲狀腺疾病\n- 放療剛結束\n\n## 考點速記\n\n| MLD 順序原則 | 步驟 |\n|---|---|\n| 1. 健側近端清空 | D(淋巴結) |\n| 2. 中央通道建立 | C(胸腹) |\n| 3. 患肢近端引流 | A(大腿) |\n| 4. 患肢遠端引流 | B(小腿) |\n| **總序** | **DCAB** ★ |\n\n| CDT 四要素 | 重點 |\n|---|---|\n| MLD | 徒手引流 |\n| Bandaging | 多層繃帶 |\n| Exercise | 運動 |\n| Skin care | 皮膚護理 |",

      "detail": "**癌症病人骨質疏鬆處理**\n\n## 癌症病人 OP 的特殊性\n\n### 高風險因素\n- 化療(特別 aromatase inhibitor)\n- 放療\n- 手術切除(睪丸、卵巢)\n- **Androgen deprivation therapy(ADT)**\n- 類固醇使用\n- 生活方式改變\n- 營養不良\n- 長期臥床\n- 直接骨轉移\n\n## 各選項分析\n\n### (A) Vit 25-OH-D > 20 ng/ml? — 錯誤\n\n**正確目標值**:\n- **一般成人**:**> 30 ng/ml** ★\n- **> 50 ng/ml**:最佳\n- **< 20 ng/ml**:缺乏\n- **20-30 ng/ml**:不足\n- **癌症病人**:特別需要 > 30\n\n**為什麼需要 > 30?**\n- 改善 PTH 水平\n- 最佳鈣吸收\n- 肌肉功能\n- 跌倒預防\n- 癌症輔助治療(研究持續)\n\n**補充建議**:\n- **1000-2000 IU/day**(維持)\n- **50,000 IU/週 × 8 週**(缺乏時補充)\n\n### (B) 負重運動 ★ 正確\n\n**負重運動(Weight-Bearing Exercise)**:\n- **機械性壓力刺激骨形成**\n- Wolff's law 應用\n- 對骨密度有最強證據的運動類型\n\n**高衝擊負重運動**(最佳):\n- **跳繩**\n- **慢跑**\n- **跳躍**\n- **舞蹈** ★ 選項\n- 階梯運動\n\n**中衝擊**:\n- **快走**\n- **在不同路面步行** ★ 選項\n- 網球、羽球\n\n**低衝擊**(不夠理想):\n- 游泳(不負重)\n- 騎腳踏車(不負重)\n\n**建議**:\n- 每週 3-5 次\n- 每次 30-60 分鐘\n- 中-高強度\n- 結合阻力訓練效果最佳\n\n### (C) 停經後婦女運動無法增加 BMD? — 錯誤\n\n**事實**:\n- **停經後婦女運動仍可增加 BMD** ★\n- 特別是高強度、衝擊性運動\n- **LIFTMOR trial**(Watson 2018):\n  - HiRIT(high intensity resistance training)\n  - 停經後婦女 8 個月\n  - 腰椎、髖部 BMD 顯著增加\n- 雖效果不如年輕人\n- 但**絕非無效** ★\n- 配合適當阻力訓練尤佳\n\n### (D) 胃酸過多 → 碳酸鈣? — 錯誤(反向)\n\n**正確觀念**:\n\n#### **Calcium Carbonate(碳酸鈣)**\n- **需要胃酸活化才吸收**\n- **空腹不吸收**\n- 需**隨餐服用**\n- **胃酸不足者(萎縮性胃炎、PPI 使用)吸收差**\n- 最便宜、含鈣量最高(40%)\n\n#### **Calcium Citrate(檸檬酸鈣)**\n- **不需胃酸**\n- **空腹可吸收**\n- **適合胃酸不足者** ★\n- 副作用較少\n- 含鈣 21%\n\n### 題目陷阱\n\n選項說「**胃酸過多**的病人,碳酸鈣為首選」\n\n**分析**:\n- 碳酸鈣**需要胃酸**\n- **胃酸多的人用碳酸鈣吸收尚可**(邏輯上不算錯)\n- 但**一般常考點是相反**:\n  - 胃酸**少**者 → **檸檬酸鈣**\n  - 胃酸**多**者 → 可用碳酸鈣\n- 但整體現代建議:檸檬酸鈣適用性更廣\n\n**實際錯誤在於**:\n- 「為首選」描述過於絕對\n- 近年許多建議檸檬酸鈣更好\n- 對**胃酸過少(老人、PPI 使用者)**更重要\n\n### (E) 阻力訓練不建議? — 錯誤\n\n**阻力訓練(Resistance Training)的重要性**:\n- **改善骨密度**\n- **增加肌力**\n- **預防跌倒**(最重要!)\n- **改善姿勢**\n- **降低骨折風險**\n\n**建議**:\n- **高負重、低反覆**(70-85% 1RM)\n- 每週 2-3 次\n- 大肌群為主\n- 專業指導\n\n**有效方案**:\n- **HiRIT (High-Intensity Resistance Training)**\n- **Bone-loading exercises**\n- 包括:\n  - 硬舉(deadlift)\n  - 深蹲(squat)\n  - 過頭肩推(overhead press)\n\n## 骨質疏鬆處置全套\n\n### 1. 生活方式\n- **負重運動 + 阻力訓練** ★\n- 避免吸菸、酗酒\n- 減少咖啡因\n- 充足陽光\n\n### 2. 營養\n- **鈣 1000-1200 mg/day**\n- **Vit D > 30 ng/ml** (1000-2000 IU/day)\n- 蛋白質充足\n\n### 3. 跌倒預防\n- 平衡訓練\n- 家居安全\n- 視力矯正\n- 藥物檢視(避免鎮靜劑、降血糖藥嚴控)\n\n### 4. 藥物(BMD 明顯下降時)\n- **Bisphosphonates**(alendronate, zoledronic acid)\n- **Denosumab**\n- **Teriparatide**(高骨折風險)\n- **Raloxifene**(停經後婦女)\n- **Romosozumab**(新藥)\n\n## 癌症特殊處置\n\n### 乳癌 + Aromatase Inhibitor(AI)\n- AI 顯著降骨質\n- 預防:Zoledronic acid 或 denosumab\n- 定期 DXA\n\n### 攝護腺癌 + ADT\n- 類似\n- Denosumab 常用\n\n### 骨轉移\n- **Bisphosphonate / Denosumab**\n- 預防骨骼事件(pathologic fracture, 脊髓壓迫)\n- 放療止痛\n\n## 考點速記\n\n| 項目 | 正確 |\n|---|---|\n| **Vit D 目標** | **> 30 ng/ml**(非 20) |\n| **負重運動** | **✓ 推薦**(舞蹈、走路) |\n| **停經後運動效果** | **✓ 可增加 BMD** |\n| **鈣片選擇** | **胃酸少 → 檸檬酸鈣** |\n| **阻力訓練** | **✓ 建議**(預防跌倒) |\n| 鈣攝取 | 1000-1200 mg/day |\n| Vit D 劑量 | 1000-2000 IU/day |",

      "summary": "(E) 錯誤。**脊副神經(spinal accessory nerve, CN XI)損傷是「頸部淋巴結清除術(neck dissection)」的典型併發症**(如頭頸癌手術),而非乳癌手術。乳癌腋下淋巴結清除風險的神經是**胸長神經(long thoracic nerve,造成翼狀肩胛)、胸背神經(thoracodorsal nerve)、內外側胸神經**。脊副神經支配斜方肌和 SCM,位置不同。",
      "detail": "**乳癌術後併發症**\n\n## 乳癌手術類型\n\n### 1. Breast-Conserving Surgery (BCS)\n- Lumpectomy\n- Partial mastectomy\n- **常合併放療**\n\n### 2. Mastectomy\n- Simple mastectomy\n- **Modified Radical Mastectomy (MRM)**(最常)\n- Radical mastectomy(少用)\n\n### 3. Axillary Procedures\n- **Sentinel Lymph Node Biopsy (SLNB)**:併發症少\n- **Axillary Lymph Node Dissection (ALND)**:併發症多\n\n## 常見乳癌術後併發症\n\n### 1. **淋巴水腫 (Lymphedema)** — (A) 正確\n\n**盛行率**:\n- SLNB:5-10%\n- ALND:20-40%\n- **+ 放療**:更高(40-50%)\n\n**特徵**:\n- 術後 6-12 個月最常發生\n- 可能延遲數年\n- 不可逆(但可控制)\n\n**治療**:\n- **Complete Decongestive Therapy (CDT)**\n- MLD, bandaging, compression, exercise\n\n### 2. **胸大肌攣縮** — (B) 正確\n\n**原因**:\n- 手術疤痕\n- 放療纖維化\n- 制動\n\n**表現**:\n- 肩關節 ROM 受限\n- 外展、外旋困難\n- 胸前緊繃感\n\n**治療**:\n- ROM 運動\n- 伸展\n- 疤痕管理\n- 物理治療\n\n### 3. **腋網症候群 (Axillary Web Syndrome, AWS)** — (C) 正確\n\n**定義**:\n- Mondor's disease of axilla\n- 腋下可見/可觸摸**繩索狀結構**\n- 延伸至上臂、前臂\n\n**病因**:\n- **淋巴管發炎、纖維化**\n- 術後 2-8 週內發生\n- 自限性,通常 3 個月內消退\n\n**症狀**:\n- 腋下緊繃\n- 肩外展、伸直受限\n- 輕度疼痛\n\n**治療**:\n- 輕柔伸展\n- MLD\n- 物理治療\n- 時間\n\n### 4. **旋轉肌袖異常** — (D) 正確\n\n**原因**:\n- 術後姿勢不良\n- 活動減少\n- 肩關節攣縮\n- **放療影響**\n- 肩部肌肉失衡\n\n**常見**:\n- Subacromial impingement\n- Rotator cuff tendinopathy\n- Adhesive capsulitis(冰凍肩)\n\n### 5. **其他常見併發症**\n- **疼痛症候群**:\n  - Post-mastectomy pain syndrome (PMPS)\n  - Phantom breast pain\n- **神經損傷**:\n  - **Intercostobrachial nerve**(最常):上臂內側麻木\n  - **Long thoracic nerve**:翼狀肩胛 ★\n  - **Thoracodorsal nerve**:背闊肌無力\n  - **Medial/lateral pectoral nerve**:胸肌無力\n- **Seroma**(血清腫)\n- **感染、傷口癒合不良**\n- **靜脈栓塞**\n- **肩關節功能障礙**\n- **認知障礙**(chemobrain)\n- **慢性疲倦**\n\n## (E) 為什麼錯誤?\n\n### 脊副神經 (Spinal Accessory Nerve, CN XI)\n\n**解剖**:\n- 從延腦發出\n- **經頸靜脈孔出顱**\n- 走行於**頸後三角**\n- **支配肌肉**:\n  - **斜方肌 (trapezius)**\n  - **胸鎖乳突肌 (SCM)**\n\n**典型損傷場景** ★:\n- **Radical neck dissection**(頸部根治性淋巴清除術)\n- **頭頸癌手術**\n- **淋巴結切片**(頸後三角)\n- 創傷\n\n**乳癌手術一般不損傷脊副神經**:\n- 乳癌腋下淋巴結清除**不會觸及頸後三角**\n- 位置不同\n- 除非極不尋常的手術範圍\n\n### 損傷症狀\n- **翼狀肩胛**(斜方肌型,與 long thoracic 不同)\n- **肩胛骨下垂、外移、外旋**\n- **肩外展無力**(> 90°)\n- **聳肩無力**\n- **慢性肩痛**\n\n## 乳癌手術真正風險的神經\n\n### Long Thoracic Nerve (C5-C7)\n- 支配 **serratus anterior**(前鋸肌)\n- 損傷 → **翼狀肩胛**(serratus anterior 型)\n  - 肩胛骨**內側緣突出**\n  - 手推牆測試陽性\n- **ALND 風險**(約 1-2%)\n\n### Thoracodorsal Nerve (C6-C8)\n- 支配 **latissimus dorsi**(背闊肌)\n- 損傷 → 背闊肌無力\n- **ALND 時常在保留範圍內**\n\n### Intercostobrachial Nerve (T1-T2)\n- 純感覺神經\n- **最常受損** ★\n- 術後 50-70% 病人有異感\n- 上臂內側麻木/疼痛\n- 可能漸改善\n\n### Medial and Lateral Pectoral Nerves\n- 支配胸大、小肌\n- 損傷可能造成胸肌無力\n\n## 翼狀肩胛的鑑別診斷\n\n| 神經 | 侵犯肌肉 | 翼狀型態 |\n|---|---|---|\n| **Long thoracic** | Serratus anterior | **內側緣突出、內移** |\n| **Spinal accessory** | Trapezius | 肩胛**外移、下垂** |\n| **Dorsal scapular** | Rhomboids | 輕微(不典型) |\n\n## 乳癌復健整合\n\n### 術前介入\n- 衛教\n- 基線評估\n- 運動計畫準備\n\n### 術後早期(1-2 週)\n- 漸進 ROM\n- 疼痛管理\n- 傷口照護\n- 避免過度活動患側\n\n### 亞急性(2-8 週)\n- 加強 ROM\n- 輕度肌力\n- 預防淋巴水腫\n- 觀察 AWS\n\n### 長期\n- 肌力訓練\n- 姿勢\n- 淋巴水腫監測\n- 心理支持\n- 回歸工作\n\n## 考點速記\n\n| 併發症 | 乳癌手術 |\n|---|---|\n| 淋巴水腫 | ✓ 常見 |\n| 胸大肌攣縮 | ✓ 常見 |\n| 腋網症候群 | ✓ 特有 |\n| 旋轉肌袖異常 | ✓ 常見 |\n| **脊副神經損傷** | **✗(頸部淋巴清除術才會)** ★ |\n\n| 乳癌手術風險神經 | 表現 |\n|---|---|\n| **Intercostobrachial** | **最常**,上臂內側麻 |\n| **Long thoracic** | 翼狀肩胛(內側型) |\n| Thoracodorsal | 背闊肌無力 |\n| Medial/lateral pectoral | 胸肌無力 |",

      "summary": "(A) 錯誤。**癌症相關認知功能障礙(CRCI, cancer-related cognitive impairment 或 chemobrain)最典型受影響的正是「執行功能」,加上注意力、工作記憶、處理速度、語言流暢度**。病人常抱怨「霧感(brain fog)」、難以專注、計畫困難、多工困難—這些都是執行功能障礙表現。不是「較不受影響」,而是「最常受影響」。",
      "detail": "**癌症相關認知功能障礙 (Cancer-Related Cognitive Impairment, CRCI)**\n\n## 別名\n\n- **Chemobrain**(化療腦,最廣為人知)\n- **Chemofog**\n- **Post-cancer cognitive impairment**\n- **Cancer-therapy-associated cognitive change (CTACC)**\n\n## 流行病學\n\n- **乳癌化療病人盛行率:15-70%**(視評估方法)\n- **長期存留 30-40%**(治療後數年仍有)\n- 其他癌症(前列腺、大腸、婦科)也常見\n- 影響年輕與老年病人皆有\n- 醫護人員常低估此問題\n\n## 病因(多因素)\n\n### 1. 治療相關\n- **化療**(經典:anthracycline, taxane, platinum, methotrexate)\n- **放療**(特別頭頸、CNS)\n- **荷爾蒙治療**(tamoxifen、AI)\n- **免疫治療**\n- **手術麻醉**\n\n### 2. 疾病相關\n- 腫瘤本身\n- 腦轉移\n- Paraneoplastic\n\n### 3. 共伴疾病 — (C) 正確\n- **貧血**(缺氧)\n- **甲狀腺功能低下**\n- **電解質失衡**\n- 感染\n- 憂鬱、焦慮\n- 睡眠障礙\n- 疼痛\n- **都會加重認知症狀**\n\n### 4. 機轉\n- 神經炎症\n- 氧化壓力\n- 白質損傷\n- BBB 穿透\n- 粒線體功能障礙\n- 神經可塑性改變\n- DNA 損傷\n\n## 臨床表現 — (A) 本題核心\n\n### 受影響的認知領域\n\n**最常受影響 ★**:\n1. **Executive function(執行功能)** ★\n   - 計畫、組織\n   - 決策、判斷\n   - Multi-tasking\n   - 認知彈性\n2. **Attention(注意力)**\n   - 持續注意\n   - 選擇性注意\n3. **Working memory(工作記憶)**\n4. **Processing speed(處理速度)**\n5. **Verbal fluency(語言流暢)**\n\n**相對保留**:\n- Long-term memory\n- 一般智力\n- 語言理解\n\n### 病人常抱怨\n- \"Brain fog\"(霧感)\n- 記憶退步\n- 難以專心\n- 多工困難\n- 找字困難\n- 決策遲疑\n\n### (A) 為什麼錯誤?\n\n選項說「**執行功能較不受影響**」\n\n**錯誤原因**:\n- 執行功能是 **CRCI 最常受影響** ★\n- 是病人主訴最核心的症狀\n- 方向完全顛倒\n\n## 發病時機 — (B) 正確\n\n- 化療期間\n- 化療後數月內最明顯\n- 部分病人可持續數年\n- **急性** + **持久型**兩種病程\n\n## 診斷 — (D) 正確\n\n### 評估工具\n- **MoCA**(Montreal Cognitive Assessment)\n- **MMSE**(較不敏感)\n- 完整神經心理評估\n- **Self-report**(FACT-Cog 量表)\n\n### 影像學角色\n- **對診斷無直接幫助**\n- **排除結構性病因**:\n  - 腦轉移\n  - 放療後變化\n  - 新發中風\n  - 其他器質性原因\n- MRI 研究可見 white matter changes、grey matter volume 下降\n- 但臨床診斷不靠影像\n\n## 治療 — (E) 正確\n\n### 非藥物(第一線)\n\n#### 1. **Cognitive Rehabilitation / Cognitive Training** ★\n- **注意力訓練**\n- **記憶策略**\n- **執行功能訓練**\n- **代償策略**(筆記、提醒)\n- 有證據改善功能\n\n#### 2. **Cognitive Behavioral Therapy (CBT)**\n- Meta-Memory and Attention Training\n- Memory and Attention Adaptation Training (MAAT)\n- 證據支持\n\n#### 3. 運動\n- 有氧運動改善認知\n- 抗阻力運動\n\n#### 4. 正念、冥想\n- 降低壓力\n- 改善注意力\n\n### 處理共伴因素\n- 治療貧血\n- 甲狀腺補充\n- 睡眠改善\n- 控制疼痛\n- 治療憂鬱、焦慮\n\n### 藥物(證據有限)\n- **Methylphenidate**\n- **Modafinil**\n- **Donepezil**\n- 多為嘗試性,非標準\n\n## 考點速記\n\n| CRCI 特徵 | 重點 |\n|---|---|\n| 別名 | Chemobrain |\n| **最常受影響** | **執行功能**、注意力、工作記憶 |\n| 發病時機 | 治療期間最明顯 |\n| 共伴疾病 | 貧血、甲狀腺、憂鬱加重 |\n| 影像 | **排除性**,非診斷 |\n| **首選治療** | **認知訓練 + CBT** |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 53 \"Cancer Rehabilitation\"", "url": null },
        { "text": "Janelsins MC et al. Prevalence, mechanisms, and management of cancer-related cognitive impairment. Int Rev Psychiatry 2014;26:102", "url": "https://pubmed.ncbi.nlm.nih.gov/24716504/" },
        { "text": "Ferguson RJ et al. Development of CBT for chemotherapy-related cognitive change: results of a waitlist control trial. Psychooncology 2012;21:176", "url": "https://pubmed.ncbi.nlm.nih.gov/22271538/" },
        { "text": "Von Ah D et al. Advanced cognitive training for breast cancer survivors: a randomized controlled trial. Breast Cancer Res Treat 2012;135:799", "url": "https://pubmed.ncbi.nlm.nih.gov/22918524/" }
      ]
    }

    "question": "下列有關乳癌用藥芳香環轉化酶抑制劑 (aromatase inhibitor) 的使用,何者錯誤?",

    "choices": [
      { "key": "A", "text": "多數病人停止使用主要是因為它的副作用" },

    "explanation": {
      "summary": "(C) 錯誤。**AIMSS 的危險因子是「肥胖(obesity)」而非「過瘦」**—體重過重、BMI 高、脂肪組織多會增加 AI 相關肌肉骨骼症狀風險。其他危險因子包括:更年期症狀、既往化療(特別 taxane)、已知關節炎、年齡、維他命 D 缺乏等。過瘦不是 AIMSS 的危險因子。",
      "detail": "**Aromatase Inhibitor Musculoskeletal Syndrome (AIMSS)**\n\n## AI 藥物概述\n\n### Aromatase Inhibitors(芳香環轉化酶抑制劑)\n\n**機轉**:\n- 抑制 **aromatase 酶**\n- 阻斷 androgens → estrogens 的轉化\n- 降低**周邊組織 estrogen 水平**\n- 對**停經後**女性特別有效(停經後主要 estrogen 來源)\n\n**常用藥物**:\n- **Anastrozole** (Arimidex)\n- **Letrozole** (Femara)\n- **Exemestane** (Aromasin)\n\n**適應症**:\n- ER-positive 乳癌\n- 停經後女性\n- 輔助治療 5-10 年\n- 降低復發率\n\n## AIMSS(AI 肌肉骨骼症候群)\n\n### 盛行率\n- **50-60% 使用 AI 病人**\n- **20-30% 因此停藥** — (A) 正確\n- 顯著影響生活品質與治療順從度\n\n### 症狀\n\n#### **關節疼痛** — (B) 正確\n- 最常見\n- **對稱性、多關節**\n- 好發手腕、手指、膝蓋、髖\n- 類似 RA 但無滑膜炎證據\n\n#### 其他\n- **全身性僵硬**(特別早晨)\n- 肌肉疼痛\n- Tendinopathy\n- 肩部疾患風險↑\n- **CTS(腕隧道症候群)風險↑** ★\n- 骨質流失、骨折風險\n\n### 機轉(不完全明瞭)\n- **Estrogen 急劇下降** → 關節、肌腱敏感度改變\n- 免疫系統變化\n- 滑膜液改變\n- 維他命 D 受體變化\n\n## AIMSS 危險因子 — (C) 本題核心\n\n### 已知危險因子 ★\n\n1. **肥胖 / BMI 高** ★ — (C) 關鍵\n2. **維他命 D 缺乏**\n3. **既往化療**(特別 taxane)\n4. **Taxane 化療史**(Taxotere, Taxol)\n5. **既有關節炎**(OA, RA)\n6. **更年期症狀嚴重**(停經較短者)\n7. **較年輕**(相對於年長病人)\n8. 失眠、憂鬱\n9. Body fat distribution\n\n### (C) 為什麼錯誤?\n\n選項說「**過瘦**是 AIMSS 危險因子」\n\n**錯誤原因**:\n- **實際危險因子是肥胖/過重**\n- 不是過瘦\n- 方向完全相反\n- 肥胖女性脂肪組織多 → 周邊 AI 受質多 → 反應更強\n\n## AIMSS 治療 — (D)(E) 正確\n\n### 1. **運動治療** ★\n\n**中等強度運動有效** — (D) 正確\n\n**研究支持**:\n- **Irwin et al. 2015 HOPE 試驗**:\n  - RCT, 121 位 AIMSS 女性\n  - 每週 150 分鐘有氧 + 2 次阻力訓練\n  - **12 個月後關節痛改善 20-30%**\n  - BMI 下降\n  - 功能改善\n\n**建議**:\n- 每週 150 分鐘中強度有氧\n- 每週 2-3 次阻力訓練\n- 伸展\n- 循序漸進\n\n### 2. **NSAIDs**\n- 症狀緩解\n- 注意副作用(胃、腎)\n\n### 3. **Duloxetine**\n- SNRI\n- **SWOG 1202 RCT** 支持\n- 改善 AIMSS 疼痛\n\n### 4. **針灸 (Acupuncture)**\n- SWOG 1200 試驗支持\n- 減輕關節痛\n- 改善僵硬\n\n### 5. **Glucosamine-Sulfate** — (E) 正確\n- 可能改善症狀\n- **證據力薄弱** ★\n- 副作用少\n- 可嘗試\n\n### 6. **Vitamin D 補充**\n- 缺乏者補充\n- 改善部分症狀\n\n### 7. **Omega-3 脂肪酸**\n- 抗發炎\n- 可能幫助\n\n### 8. **換藥**\n- 若某種 AI 症狀嚴重\n- 換另一種 AI(不同分子)\n- 有時可改善\n- 或合併 Tamoxifen(TSOI 試驗)\n\n### 9. **停藥(最後手段)**\n- 影響治療效果\n- 考慮權衡\n- 通常與主治醫師討論\n\n## 考點速記\n\n| AIMSS | 重點 |\n|---|---|\n| 藥物 | Anastrozole, Letrozole, Exemestane |\n| 盛行率 | 50-60% |\n| **最常症狀** | **關節痛(對稱多關節)** |\n| **停藥率** | 20-30% |\n| **危險因子** | **肥胖** ★、Vit D 低、化療史 |\n| **不是危險因子** | **過瘦** |\n| 首選治療 | **運動**(中等強度) |\n| 其他 | Duloxetine、針灸、NSAIDs |\n| Glucosamine | 證據薄弱但可嘗試 |",
      "sources": [

        { "text": "Irwin ML et al. Randomized exercise trial of aromatase inhibitor-induced arthralgia in breast cancer survivors. J Clin Oncol 2015;33:1104", "url": "https://pubmed.ncbi.nlm.nih.gov/25452437/" },
        { "text": "Hershman DL et al. Effect of acupuncture vs sham acupuncture or waitlist control on joint pain related to aromatase inhibitors among women with early-stage breast cancer. JAMA 2018;320:167", "url": "https://pubmed.ncbi.nlm.nih.gov/29998338/" }

    "question": "下列有關頭頸部癌症治療後的功能障礙,何者錯誤?",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "由於檳榔使用者的口腔黏膜纖維化 (submucosal fibrosis) 會導致牙關緊閉 (trismus),這些病人在接受頭頸癌治療後,牙關緊閉情況可能進一步惡化,且對復健治療的反應較差" },

    "answer": "E",
    "explanation": {
      "summary": "(E) 錯誤。**頦骨舌肌(geniohyoid)的功能是將舌骨「向前上」拉,以協助吞嚥時打開上食道括約肌(UES)**,而非「舌骨後移」。且**雙側完全切除後,無法用其他口底肌訓練代償此功能**—其他口底肌(如下頜舌骨肌)雖相似但無法完全取代。因此雙側切除後,吞嚥功能恢復極困難,需要義齒或特殊訓練。",
      "detail": "**頭頸部癌症治療後的功能障礙**\n\n## 頭頸癌治療的影響\n\n### 手術\n- 口腔、咽部、喉部組織切除\n- 舌部分切除\n- 頸部淋巴清除\n- Tissue flap 重建\n\n### 放療\n- 纖維化\n- 黏膜炎\n- 口乾症(xerostomia)\n- Trismus\n- 吞嚥困難\n\n### 化療\n- 黏膜炎\n- 感覺異常\n- 周邊神經病變\n\n## 主要功能障礙\n\n### 1. Trismus(牙關緊閉) — (A)(B) 正確\n\n**定義**:\n- 無法正常張口\n- **Inter-incisor distance(門齒間距)< 35 mm**\n- 嚴重:< 20 mm\n\n**好發病人**:\n- **檳榔使用者**(submucosal fibrosis)★\n- **放療後**(咬肌、翼肌纖維化)\n- **手術切除**(手術區纖維化)\n- 組合高風險\n\n**影響**:\n- **門齒間距 < 2 cm**(20 mm):\n  - 牙科治療困難\n  - 口腔衛生維持困難\n  - 進食受影響\n  - 生活品質顯著下降\n\n**檳榔 + 頭頸癌治療**:\n- 既有黏膜纖維化\n- 放療後進一步惡化\n- **對復健治療反應差** — (A) 正確\n- 預後差\n\n**治療**:\n- 伸展運動(jaw stretching devices)\n- **TheraBite、Dynasplint**\n- 物理治療\n- 早期介入關鍵\n- 嚴重者手術\n\n### 2. 軟顎缺損 → Hypernasality — (C) 正確\n\n**軟顎(Velum)功能**:\n- 抬起關閉鼻咽\n- 分隔口腔與鼻腔\n- 維持腔內壓力(說話、吞嚥)\n\n**缺損後果**:\n- **VPI(腭咽閉鎖不全)**\n- **Hypernasal speech(過度鼻音)**\n- 吞嚥時食物逆流至鼻腔\n\n**治療**:\n- **吞嚥技巧訓練**:\n  - 可部分改善吞嚥\n  - 對 **hypernasality 改善有限** ✓\n- **語音治療**:改善發音\n- **Palatal obturator / Speech bulb**:填補缺損(效果最好)\n- 手術:pharyngeal flap\n\n### 3. 硬顎缺損 — (D) 正確\n\n**硬顎切除後果**:\n- 口腔與鼻腔相通\n- **進食時食物逆流至鼻腔**\n- 說話 hypernasal\n- 影響吸吮、吞嚥\n\n**治療**:\n- **Palate prosthesis(硬顎義齒)** ★\n  - 覆蓋缺損\n  - 分隔兩腔\n  - 改善進食、說話\n  - **是標準處置**\n- 手術重建(free flap)\n\n### 4. 舌部分或全切除\n\n**影響**:\n- 咀嚼、食團形成\n- 舌頭推送\n- 構音\n- 吞嚥\n\n**治療**:\n- 舌代償動作訓練\n- Palatal augmentation prosthesis\n- 吞嚥姿勢調整\n- 食物質地調整\n\n## 頦骨舌肌 (Geniohyoid Muscle) — (E) 本題關鍵\n\n### 解剖\n- **位置**:口底,下頜骨至舌骨\n- **起點**:下頜骨 mental spine\n- **止點**:舌骨(hyoid bone)\n- **神經支配**:舌下神經 + C1 纖維(geniohyoid branch)\n\n### 功能\n- **將舌骨向「前上」拉** ★\n- **協助吞嚥時打開上食道括約肌(UES)**\n- 協助張口(aid in mouth opening)\n- **不是「向後」拉舌骨**\n\n### 吞嚥機制\n- 吞嚥時舌骨 + 喉部**向上前移**\n- UES 打開\n- 食團通過\n- 若舌骨動作不足 → UES 打不開 → **梨狀竇殘留、誤吸**\n\n### 雙側切除後果\n- **嚴重吞嚥困難**\n- **UES 打開不足**\n- 食物無法通過\n- 誤吸風險高\n\n### (E) 為什麼錯誤?\n\n選項兩個錯誤:\n\n1. **「頦骨舌肌...代償舌骨後移」**:\n   - 頦骨舌肌是將舌骨**前上拉**,不是後移\n   - 吞嚥需要的是**前上移動**\n   - 方向錯誤\n\n2. **「仍可透過口底肌訓練代償」**:\n   - 雙側完全切除後,無法充分代償\n   - 其他口底肌(下頜舌骨、莖突舌骨)輔助有限\n   - 實際上需**義齒輔助、PEG**、或**特殊介入**\n   - 功能恢復極困難\n\n## 其他常見功能障礙\n\n### 5. 口乾症 (Xerostomia)\n- 放療後唾液腺損傷\n- 影響咀嚼、吞嚥、說話\n- 齲齒風險↑\n- 治療:\n  - **Sialogogues**(pilocarpine)\n  - **人工唾液**\n  - **IMRT 放療**(保護唾液腺)\n  - **Amifostine**(放療保護)\n\n### 6. 頸肩淋巴水腫\n- 頸清除術後\n- 肩關節活動受限\n\n### 7. 聲音、言語\n- 喉切除後無聲音\n- Esophageal speech\n- **電子喉(electrolarynx)**\n- **TEP(tracheoesophageal puncture)**\n\n### 8. 脊副神經損傷\n- 頸部淋巴清除術併發症\n- 翼狀肩胛\n- 肩功能障礙\n\n### 9. 吞嚥困難\n- **最嚴重併發症之一**\n- 可能需 PEG\n- 長期追蹤\n\n## 考點速記\n\n| 併發症 | 特徵 |\n|---|---|\n| Trismus | 門齒間距 < 2cm 嚴重影響 |\n| 檳榔 + 放療 | 對復健反應差 |\n| 軟顎缺損 | Hypernasality、VPI |\n| 硬顎缺損 | **Palate prosthesis** |\n| **頦骨舌肌** | **拉舌骨前上**(非後移) |\n| **雙側 geniohyoid 切除** | **難以代償**,需特殊介入 |",
      "sources": [

      "summary": "(B) 錯誤。**中樞敏感化的特徵是「轉譯後修飾(post-translational modification)」而非「轉譯前修飾(pre-translational)」**。Post-translational modification 包括 NMDA 受體磷酸化、膜離子通道改變、受體 trafficking 等,都是「蛋白質已製造後」的快速修飾。轉譯前修飾(如基因表達)發生在後續 chronic 階段,不是核心特徵。",
      "detail": "**疼痛敏感化機轉**\n\n## 疼痛的兩類敏感化\n\n### 1. Peripheral Sensitization(周邊敏感化)\n\n**定義**:周邊傷害感受器閾值降低、反應增強\n\n**位置**:周邊神經(C 纖維、Aδ 纖維)\n\n**發生於**:組織發炎、受傷區域\n\n### 2. Central Sensitization(中樞敏感化)\n\n**定義**:脊髓及上位中樞的疼痛訊號處理異常增強\n\n**位置**:\n- **脊髓背角 (dorsal horn)**\n- **腦幹**\n- **丘腦**\n- **大腦皮質**\n\n## 周邊敏感化機轉 — (A)(C)(D)(E)\n\n### (A) 發炎物質降低閾值 — 正確\n\n**發炎物質(Inflammatory soup)**:\n- 前列腺素 (PGE2)\n- Bradykinin\n- Histamine\n- 5-HT (serotonin)\n- ATP\n- H+(酸)\n- 細胞激素 (TNF-α, IL-1β, IL-6)\n- Nerve growth factor (NGF)\n\n**作用**:\n- 結合傷害感受器(nociceptor)上受體\n- **降低 C 纖維、Aδ 纖維閾值** ★\n- 原本無害的刺激變成疼痛(**allodynia**)\n- 原本輕微疼痛變劇烈(**hyperalgesia**)\n\n### (C) Second Messenger System — 正確\n\n**機轉**:\n- 發炎物質 → G-protein coupled receptors\n- → 第二信使系統(cAMP, PKA, PKC, ERK 等)\n- → 離子通道磷酸化(TRPV1, Nav1.7, Nav1.8)\n- → **受體敏感化**\n- → **基因表達改變**\n- → 長期敏感化\n\n### (D) 神經性發炎 — 正確\n\n**機轉**:\n- C 纖維、Aδ 纖維活化後\n- 從末梢釋放神經肽:\n  - **Substance P** ★\n  - **CGRP** (Calcitonin gene-related peptide)\n  - Neurokinin A\n- 造成:\n  - **血管擴張**\n  - **血漿外滲**\n  - **肥大細胞脫顆粒**\n  - **免疫細胞招募**\n- 稱為 **Neurogenic inflammation(神經性發炎)**\n\n### (E) Feed-Forward Loop — 正確\n\n**迴路**:\n1. 受傷 → 發炎物質釋放\n2. 發炎物質刺激 C 纖維、Aδ 纖維\n3. 神經釋放 Substance P、CGRP\n4. **更多神經性發炎**\n5. **更多發炎物質**\n6. **進一步敏感化**\n7. **循環放大**\n\n## 中樞敏感化機轉 — (B) 本題核心\n\n### 核心特徵\n\n**Post-translational modification(轉譯後修飾)★ — 關鍵**\n\n### 什麼是 Post-translational modification?\n\n**定義**:\n- 蛋白質**翻譯完成後**的化學修飾\n- 改變蛋白質功能、位置、活性\n- 發生**迅速(秒-分鐘)**\n\n**在疼痛的例子**:\n- **NMDA 受體磷酸化**(Src, PKA, PKC)\n- **AMPA 受體 trafficking**(更多受體上膜)\n- **Ca²⁺ 通道磷酸化**\n- **離子通道活性改變**\n\n**結果**:\n- 突觸傳遞增強\n- Excitatory postsynaptic potentials 放大\n- **Wind-up 現象**(反覆刺激後反應放大)\n- **Long-term potentiation (LTP)**\n\n### Pre-translational vs Post-translational\n\n| Pre-translational | Post-translational |\n|---|---|\n| 影響基因表達 | **修飾已存在的蛋白** |\n| 慢(小時-天) | **快(秒-分鐘)** |\n| Chronic phase | **Acute-subacute phase** ★ |\n| 例:mRNA 調控 | 例:磷酸化、糖基化 |\n\n### (B) 為什麼錯誤?\n\n選項說「中樞敏感化特徵是 **pre-translational** modification」\n\n**錯誤原因**:\n- 中樞敏感化的**核心特徵是 post-translational modification** ★\n- 特別是 NMDA 受體的快速磷酸化\n- Pre-translational(基因表達改變)出現在後期,非核心特徵\n- Woolf 的經典論文明確指出是 post-translational\n\n## 中樞敏感化的完整機轉\n\n### 1. 脊髓背角突觸可塑性\n- Substance P、glutamate 釋放增加\n- NMDA 受體解除鎂離子阻斷\n- Ca²⁺ 大量進入\n- 二信使活化\n- **Post-translational modification**\n- 敏感化\n\n### 2. Descending Modulation 改變\n- 下行調控路徑異常\n- 抑制性↓、興奮性↑\n- Pain 增強\n\n### 3. Glial Activation\n- 微膠細胞、星狀細胞活化\n- Cytokines 釋放\n- **神經發炎於中樞**\n\n### 4. Wind-Up & LTP\n- 反覆刺激後反應累積\n- Long-term 改變\n\n## 臨床表現\n\n### Central Sensitization 特徵\n- **Allodynia**(異痛)\n- **Hyperalgesia**(痛覺過敏)\n- **Secondary hyperalgesia**(病灶外疼痛)\n- **Chronic pain**\n- **Widespread pain**\n\n### 相關臨床疾病\n- **纖維肌痛症 (Fibromyalgia)**\n- **慢性下背痛**\n- **CRPS**\n- **IBS**\n- **TMD**\n- **Migraine**\n- **神經病變性疼痛**\n\n## 治療意義\n\n### 周邊敏感化\n- NSAIDs(抑制前列腺素)\n- 局部麻醉劑\n- 神經阻斷\n- 冰敷\n\n### 中樞敏感化\n- **NMDA 受體拮抗劑**(Ketamine, Dextromethorphan)\n- **Gabapentinoids**(Gabapentin, Pregabalin)\n- **TCA, SNRI**(改善下行調控)\n- 認知行為治療\n- 物理治療\n\n## 考點速記\n\n| 項目 | Peripheral Sensitization | Central Sensitization |\n|---|---|---|\n| 位置 | 周邊神經 | **脊髓背角、腦幹、皮質** |\n| **核心修飾** | 受體活化 | **Post-translational** ★ |\n| 時程 | 急性炎症 | 持續、慢性 |\n| 結果 | Primary hyperalgesia | **Allodynia, secondary hyperalgesia** |\n| 臨床 | 急性傷害 | 慢性疼痛症候群 |",

      "detail": "**疼痛與睡眠的交互關係**\n\n## 疼痛-睡眠的雙向關係 — (B) 正確\n\n### 疼痛 → 睡眠\n- **難以入睡**\n- **夜間易醒**\n- **睡眠品質差**\n- **睡眠片段化**\n- REM 減少\n- 深度睡眠減少\n\n### 睡眠不足 → 疼痛\n- **痛覺閾值降低**\n- **痛覺敏感度↑**\n- 發炎物質增加\n- 降低下行疼痛抑制\n- **加重慢性疼痛**\n- **形成惡性循環**\n\n### 流行病學\n- **慢性疼痛病人 50-88% 有睡眠問題** ★\n- 纖維肌痛症:幾乎 100%\n- 類風濕關節炎:70%\n- OA:60%\n- 治療睡眠可改善疼痛\n\n## SSRI 與睡眠 — (A) 本題核心\n\n### SSRI 藥理\n- 抑制 serotonin 再回收\n- 提高突觸血清素\n- 代表藥物:Fluoxetine, Sertraline, Paroxetine, Citalopram\n\n### SSRI 對睡眠的實際影響\n\n**失眠副作用顯著** ★:\n- **降低總睡眠時間**\n- **增加 sleep latency**(入睡時間延長)\n- **抑制 REM 睡眠**\n- **增加夜間覺醒**\n- **降低睡眠效率**\n\n### 為什麼 SSRI 會影響睡眠?\n- Serotonin 對睡眠是**雙面刃**\n- 某些 5-HT 受體(5-HT2, 5-HT3)過度活化 → 促覺醒\n- SSRI 造成不對稱受體活化\n- 結果大多是**激活 > 鎮靜**\n- 失眠為 SSRI 常見副作用(15-20%)\n\n### 臨床建議\n- SSRI **早上服用**(避免失眠)\n- 若有失眠,考慮改 SNRI 或其他類型\n\n### (A) 為什麼錯誤?\n\n選項說 SSRI 「**增加睡眠時間、提升 NREM 第 2 階段**」\n\n**錯誤原因**:\n- **事實相反**:SSRI **減少**睡眠、**抑制** REM、造成失眠\n- 選項描述更符合:\n  - **Trazodone**(serotonin modulator)\n  - **Mirtazapine**(NaSSA)\n  - **Doxepin**(TCA)\n  - 這些才會增加睡眠時間並保護 NREM\n- SSRI 絕非典型助眠藥\n\n## 其他助眠藥分析\n\n### (C) Benzodiazepines — 正確\n\n**長期 BZD 的問題**:\n- **認知影響**:\n  - 記憶損害(抗遺忘)\n  - 注意力下降\n  - 老人失智風險↑\n- **跌倒風險↑**:\n  - 肌肉鬆弛\n  - 站姿不穩\n  - 老人骨折\n- **Tolerance(耐受性)**:\n  - 劑量漸增\n  - 效果遞減\n- **Dependence(依賴性)**:\n  - 停藥反彈失眠\n  - **Rebound insomnia** ★\n  - 戒斷症狀\n- **抑制 REM + SWS**\n- **不建議長期使用**\n\n### (D) 酒精與睡眠 — 正確\n\n**酒精的 paradoxical 效應**:\n- **初期鎮靜**:\n  - 縮短 sleep latency\n  - **促進 SWS(slow-wave sleep)**\n  - **減少 REM**\n- **後期(後半夜)**:\n  - **REM rebound**\n  - **睡眠片段化** ★\n  - 易醒\n  - 夢魘\n- 長期飲酒:\n  - 睡眠品質嚴重下降\n  - Sleep disordered breathing 加重\n  - OSA 惡化\n\n### (E) Eszopiclone — 正確\n\n**Eszopiclone (Lunesta)**:\n- **第三代非 BZD 安眠藥**(Z-drug)\n- 與 zolpidem、zaleplon 同類\n- **選擇性 GABA-A 受體結合**\n- **半衰期較長(6-9 小時)** ★\n- **FDA 批准用於慢性失眠長期管理** ★\n- 副作用較 BZD 少\n- 但仍有依賴性風險\n\n### 其他 Z-drugs 比較\n\n| 藥物 | 半衰期 | 適應 |\n|---|---|---|\n| **Zaleplon** | 1 小時 | 入睡困難 |\n| **Zolpidem** | 2-3 小時 | 入睡、部分維持 |\n| **Eszopiclone** | **6-9 小時** | **入睡 + 維持**、**長期管理** |\n\n## 疼痛 + 失眠的治療策略\n\n### 非藥物(首選)\n\n#### 1. Cognitive Behavioral Therapy for Insomnia (CBT-I)\n- **一線治療**\n- 刺激控制\n- 睡眠限制\n- 認知重建\n- 睡眠衛教\n- 放鬆訓練\n\n#### 2. Sleep Hygiene\n- 規律作息\n- 避免晚餐酒、咖啡\n- 適當運動\n- 舒適環境\n- 避免午睡過長\n\n#### 3. 物理治療、運動\n- 減輕疼痛\n- 改善功能\n- 疲倦有助入睡\n\n#### 4. 正念、放鬆\n- Mindfulness meditation\n- Yoga\n- Progressive muscle relaxation\n\n### 藥物治療\n\n#### 有效改善疼痛 + 睡眠的藥物\n\n1. **Amitriptyline (TCA)**:\n   - 低劑量 10-25 mg 睡前\n   - 改善神經病變痛 + 促進睡眠\n   - 纖維肌痛首選之一\n\n2. **Duloxetine (SNRI)**:\n   - 改善多種慢性痛\n   - 對睡眠中立\n\n3. **Gabapentin / Pregabalin**:\n   - 神經病變痛\n   - 改善睡眠結構\n\n4. **Trazodone**:\n   - 低劑量 25-50 mg 睡前\n   - 助眠 + 輕度抗憂鬱\n\n5. **Mirtazapine**:\n   - 助眠、增加食慾\n   - 抗憂鬱\n\n#### 避免長期使用\n- Benzodiazepines\n- Opioids(會影響睡眠結構)\n- 高劑量 Z-drugs\n\n## 考點速記\n\n| 藥物 | 對睡眠影響 |\n|---|---|\n| **SSRI** | **抑制 REM、造成失眠** ★ |\n| TCA (amitriptyline) | 助眠、改善睡眠 |\n| Trazodone | 促 SWS、助眠 |\n| Mirtazapine | 促睡眠、食慾 |\n| BZD | 長期 → 耐受、依賴、rebound |\n| Z-drugs (Eszopiclone) | **FDA 批准長期使用** |\n| 酒精 | **初期助眠、後期片段化** |\n\n| 疼痛-睡眠 | 關係 |\n|---|---|\n| 雙向關係 | ✓ |\n| 首選治療 | **CBT-I** |\n| 藥物首選 | 神經病變:gabapentinoid |\n| 避免 | 長期 BZD、opioid |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 38 \"Chronic Pain\"", "url": null },
        { "text": "Finan PH, Smith MT. The comorbidity of insomnia, chronic pain, and depression: dopamine as a putative mechanism. Sleep Med Rev 2013;17:173", "url": "https://pubmed.ncbi.nlm.nih.gov/22748562/" },
        { "text": "Wilson SJ, Nutt DJ. British Association for Psychopharmacology consensus statement on evidence-based treatment of insomnia. J Psychopharmacol 2010;24:1577", "url": "https://pubmed.ncbi.nlm.nih.gov/20813762/" },
        { "text": "Smith MT, Haythornthwaite JA. How do sleep disturbance and chronic pain inter-relate? Sleep Med Rev 2004;8:119", "url": "https://pubmed.ncbi.nlm.nih.gov/15033151/" }
      ]

    "question": "依據《人體研究法》,以研究原住民族為目的者,研究主持人需額外完成什麼步驟?",
    "imageUrl": null,

      "summary": "(C) 正確。**《人體研究法》第 15 條規定:以研究原住民族為目的者,除依本法規定外,並應諮詢、取得「各該原住民族之同意」**。此為**族群層級的集體同意**,不同於個人的 informed consent。這是台灣保障原住民族權益的特別規定,體現對原住民族自主權的尊重。",
      "detail": "**《人體研究法》與原住民族研究**\n\n## 人體研究法概述\n\n### 立法目的\n- 保障研究對象權益\n- 促進醫學研究健全發展\n- 制定於 2011 年\n\n### 核心原則\n1. **尊重受試者**\n2. **風險最小化**\n3. **受益最大化**\n4. **公正性**\n5. **知情同意**\n6. **IRB 審查**\n\n## 第 15 條 — 原住民族研究特別規定 ★\n\n### 條文內容\n> **「以研究原住民族為目的者,除依本法規定外,並應諮詢、取得各該原住民族之同意;其研究結果之發表,亦同。」**\n\n### 要點\n\n#### 1. **族群層級的同意** ★\n- **不是個人 informed consent**\n- 是**該原住民族整體的同意**\n- 透過部落會議或正式諮詢\n\n#### 2. **適用對象**\n- **以原住民族為研究目的**的研究\n- 不只是納入少數原住民受試者\n- 例:\n  - 原住民族特有疾病研究\n  - 原住民族文化、基因研究\n  - 針對特定族群的流行病學\n\n#### 3. **兩個階段都要諮詢**\n- **研究開始前**\n- **研究結果發表時**\n\n#### 4. **與 IRB 審查並行**\n- 除 IRB 審查外\n- 需額外諮詢原住民族\n- **雙重程序**\n\n### 實務程序\n\n**諮詢流程**:\n1. 與原住民族代表接洽\n2. 召開部落會議\n3. 研究計畫說明\n4. 族群集體審議\n5. 取得同意文件\n6. IRB 審查\n7. 執行研究\n8. **發表前再諮詢**\n\n**涉及機關**:\n- **原住民族委員會**(原民會)\n- 地方原住民族委員會\n- 部落會議\n- 族群代表\n\n## 其他選項分析\n\n### (A) 向原民會登記 — 錯誤\n- 法條要求的是**諮詢、取得同意**\n- 不是登記程序\n- 登記只是行政步驟,非核心要求\n\n### (B) 聘請族民共同主持人 — 錯誤\n- 法條未要求聘請共同主持人\n- 實務上建議邀請,但非法律規範\n- 可能是好的研究倫理實踐\n- 但不是法條要求\n\n### (C) **取得族群同意** ★ 正確\n- **法條明文要求**\n- 族群集體同意\n- 研究前 + 發表時\n\n### (D) 提供報告給代表 — 錯誤\n- 雖然是好的做法\n- 但法條要求的是「同意」(主動)\n- 不只是「告知」(被動)\n\n### (E) 提交主管機關批准後發表 — 錯誤\n- 發表時要**諮詢原住民族**\n- 不是提交主管機關批准\n- 原民會、衛福部不是審批發表的機關\n\n## 原住民族研究的倫理背景\n\n### 歷史脈絡\n- 過去原住民族研究常被剝削\n- 例:基因研究、血液採樣\n- 未告知、未同意\n- 缺乏利益回饋\n- 傷害族群自主權\n\n### 國際準則\n- **UN Declaration on the Rights of Indigenous Peoples (2007)**\n- 自由、事前、知情同意(FPIC: Free, Prior, Informed Consent)\n- 各國保護原住民族研究權益\n\n### 台灣相關法規\n- **《人體研究法》第 15 條** ★\n- 《原住民族基本法》\n- 《原住民族傳統智慧創作保護條例》\n- 各大學原住民族研究倫理規範\n\n## 人體研究法其他重點\n\n### 一般受試者保護\n\n#### 1. 知情同意(第 12 條)\n- 書面同意\n- 說明研究目的、方法、風險、受益\n- 可隨時退出\n\n#### 2. 特殊族群保護\n- 未成年人\n- 孕婦\n- 受刑人\n- 身心障礙者\n- **原住民族** ★\n\n#### 3. IRB 審查(第 5 條)\n- 獨立審查\n- 科學性 + 倫理性\n- 持續監督\n\n#### 4. 研究資料保密(第 20 條)\n- 個人資料保護\n- 去識別化\n\n## 相關國際宣言\n\n- **Declaration of Helsinki**(赫爾辛基宣言)\n- **Belmont Report**\n- **CIOMS Guidelines**\n- **UN Declaration**\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| **法源** | **人體研究法第 15 條** |\n| **核心要求** | **取得各該原住民族同意** ★ |\n| 時機 | 研究前 + 發表時 |\n| 同意層級 | **族群集體**(非個人) |\n| 常見陷阱 | 登記、聘請族民、提交批准 → **都非正確** |\n| 與 IRB 關係 | **並行**(雙重程序) |",
      "sources": [

        { "text": "United Nations Declaration on the Rights of Indigenous Peoples (UNDRIP), 2007", "url": "https://www.un.org/development/desa/indigenouspeoples/declaration-on-the-rights-of-indigenous-peoples.html" }

    "question": "依據《身心障礙者鑑定作業辦法》,下列那些病人不需進行活動參與及環境因素之鑑定?",

      "detail": "**身心障礙者鑑定 — 新制(ICF 制)**\n\n## 台灣身心障礙新制沿革\n\n### 2012 年起實施 ICF 新制\n- 取代舊制「16 類別 × 6 等級」\n- 採用 **ICF 架構**\n- **8 大類身心障礙**\n\n### 評估方法\n\n#### 舊制\n- 只做**身體功能**評估\n- 醫師單獨鑑定\n\n#### 新制(現行)★\n- **醫事人員** + **社工人員**雙向評估\n- **兩部分**:\n  1. **身體功能與構造**(ICF Part 1)\n  2. **活動參與與環境因素**(ICF Part 2)\n\n## 新制鑑定內容\n\n### Part 1: 身體功能與構造 (A + B)\n- **A 類**:身體功能(Body Functions)\n- **B 類**:身體構造(Body Structures)\n- 由**醫事人員**評估\n\n### Part 2: 活動參與與環境因素 (D + E)\n- **D 類**:活動與參與(Activities and Participation)\n- **E 類**:環境因素(Environmental Factors)\n- 由**社工人員**訪視評估\n- 使用 **WHODAS 2.0** 量表\n\n## 免除活動參與及環境因素鑑定的規定 ★ 本題核心\n\n### 條文依據\n《身心障礙者鑑定作業辦法》規定**特定族群免除 Part 2(D + E)鑑定**:\n\n### 免除的族群\n\n#### **未滿六歲兒童** ★ — (B) 正確\n- 活動能力仍在發展\n- 不適合用成人標準\n- 以身體功能、構造鑑定為主\n\n### 為什麼未滿六歲免做?\n\n1. **發展因素**:\n   - 幼兒活動能力仍在發展中\n   - 每日活動以家庭為主\n   - 尚未進入學校、社會參與\n   - 評估成人標準不適用\n\n2. **簡化程序**:\n   - 減少幼兒家庭負擔\n   - 鑑定流程簡化\n   - 快速取得身障證明\n   - 及早介入療育\n\n3. **早療體系銜接**:\n   - 未滿六歲優先**早期療育**\n   - 療育目標與成人身障不同\n   - 動態評估、適時重新鑑定\n\n## 其他選項分析\n\n### (A) 80 歲以上 — 需要鑑定\n- **仍需**完整鑑定\n- 老年人生活品質、活動參與重要\n- 依據 WHODAS 2.0\n- 環境因素(居家、社區)評估重要\n\n### (B) 未滿六歲 ★ 免除\n- **免除 D + E**\n- 只做身體功能、構造鑑定\n\n### (C) 15-17 歲有工作無學籍 — 需要鑑定\n- **仍需**完整鑑定\n- 已有工作 → 活動參與評估必要\n- 職場環境因素重要\n\n### (D) 6-14 歲 — 需要鑑定\n- **需完整鑑定**\n- 含學齡兒童\n- 學校活動、教育環境\n- 使用**兒少版 WHODAS**評估\n- 不同於成人版但仍要評估\n\n### (E) 需呼吸器成人 — 需要鑑定\n- **仍需完整鑑定**\n- 即使身體功能受限顯著\n- 活動參與與環境因素仍需評估\n- 環境因素(輔具、家人協助)特別重要\n\n## 身心障礙鑑定流程(新制)\n\n### Step 1: 申請\n- 向戶籍地公所申請\n- 攜帶相關醫療資料\n\n### Step 2: 醫療鑑定\n- 指定醫療機構\n- **醫事人員**評估 A、B 類\n- 出具鑑定結果\n\n### Step 3: 需求評估\n- **社工訪視**\n- 評估 D、E 類(**6 歲以上**)\n- WHODAS 2.0 量表\n- 居家訪視\n\n### Step 4: 鑑定審議\n- 縣市政府審議\n- 核發身心障礙證明\n\n### Step 5: 需求評估與服務連結\n- 依評估結果提供服務\n- 補助、輔具、照護\n\n## 八大類身心障礙(新制)\n\n1. **神經系統構造及精神、心智功能**\n2. **眼、耳及相關構造與感官功能及疼痛**\n3. **涉及聲音與言語構造及其功能**\n4. **循環、造血、免疫與呼吸系統構造及其功能**\n5. **消化、新陳代謝與內分泌系統相關構造及其功能**\n6. **泌尿與生殖系統相關構造及其功能**\n7. **神經、肌肉、骨骼之移動相關構造及其功能**\n8. **皮膚與相關構造及其功能**\n\n## 障礙程度分級\n\n### 四級\n- **輕度**\n- **中度**\n- **重度**\n- **極重度**\n\n## 身心障礙證明有效期\n\n- **新發**:5 年內重新鑑定\n- **永久性**:無需重新鑑定(部分條件)\n- **進展性**:較短期間重新鑑定\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 新制開始 | 2012 年 |\n| 制度架構 | **ICF** |\n| 評估部分 | **A+B**(醫事) + **D+E**(社工) |\n| **免 D+E 鑑定** | **未滿六歲** ★ |\n| 其他族群 | 均需完整鑑定 |\n| D+E 工具 | WHODAS 2.0 |\n| 八大類 | 依 ICF 身體系統 |",

      "detail": "**《醫療爭議評析作業辦法》**\n\n## 背景\n\n### 立法時機\n- 民國 **112 年 12 月 28 日公布**\n- 配合《醫療事故預防及爭議處理法》(112 年 6 月施行)\n- 改善醫療爭議處理機制\n- 降低訟訴、促進和解\n\n### 目的\n- 提供專業醫療爭議評析\n- 協助爭議處理會釐清案情\n- 提供客觀意見\n- 作為調解、訴訟參考\n\n## 評析員的資格條件 ★ 本題核心\n\n### 一、醫師類評析員\n\n**條件(需同時符合)**:\n1. **領有專科醫師證書**\n2. **經部定專科醫學會或中央主管機關指定機構推薦**\n3. **任教學醫院主治醫師三年以上** ★ 關鍵\n4. 完成特定訓練\n\n### 二、牙醫師類評析員\n- 領有牙醫師證書\n- 任**教學醫院主治醫師三年以上**(同樣要求)\n- 經相關公會推薦\n\n### 三、其他醫事人員類(藥師、護理師、物理治療師等)\n- 領有中央主管機關核定醫事人員證書\n- **執業滿五年以上** (原條文,具體依各醫事人員辦法)\n- 經相關公會推薦\n\n### 四、社會公正人士類\n- 具有下列領域學識與經驗:\n  - **法律**\n  - **心理**\n  - **社會工作**\n  - **社會福利**\n  - **病人權益保護**\n- 無醫師身份\n- 確保多元觀點\n\n## 為什麼強調「教學醫院」?\n\n### 教學醫院的特性\n- 有**較完整的醫療體系**\n- 有**教學、研究、服務**三大任務\n- 有**臨床訓練制度**\n- 有**完整專科訓練**\n- 由衛福部評鑑認證\n- 案例多樣、經驗豐富\n\n### 與診所比較\n- 診所:**社區醫療**為主\n- 規模小\n- 無教學研究\n- 案例類型可能侷限\n- **非評析員適合背景**(對複雜醫療爭議)\n\n## 各選項分析\n\n### (A) **教學醫院主治醫師 4 年** + 專科證書 + 部定專科醫學會推薦\n**✓ 符合資格**\n- 教學醫院 ✓\n- 主治醫師 3 年以上(4 年) ✓\n- 專科證書 ✓\n- 部定專科醫學會推薦 ✓\n\n### (B) **教學醫院主治醫師 3 年** 牙醫師\n**✓ 符合資格**\n- 教學醫院 ✓\n- 牙醫師 ✓\n- 主治醫師 3 年以上 ✓\n\n### (C) 護理師 執業 6 年 + 中央主管機關證書\n**✓ 符合資格(其他醫事人員類)**\n- 醫事人員證書 ✓\n- 執業滿 5 年以上(6 年) ✓\n\n### (D) **診所醫師** + 專科證書 + 醫師公會推薦 ★ 錯誤\n\n**不符合資格的原因**:\n- **診所醫師 ≠ 教學醫院主治醫師**\n- 條文明確要求「**教學醫院**主治醫師三年以上」\n- **診所醫師即使有專科證書、4 年經歷也不符合**\n- 縣市醫師公會推薦**不能**取代「教學醫院」要求\n\n### (E) 社會公正人士\n**✓ 符合資格**\n- 法律、心理、社工、社福、病人權益 ✓\n- 非醫師身份\n- 提供多元觀點\n\n## 評析員的職責\n\n### 主要工作\n1. **審閱**爭議案件資料\n2. **提供專業意見**\n3. **醫療專業判斷**\n4. **協助釐清事實**\n5. **提出建議**\n\n### 專業倫理\n- **保密**原則\n- **利益迴避**\n- **客觀公正**\n- **獨立判斷**\n\n## 醫療爭議處理機制\n\n### 發生爭議後\n\n#### Step 1: 院內關懷\n- 醫療機構關懷小組\n- 初步處理\n\n#### Step 2: 縣市爭議處理會\n- 醫療爭議處理會調解\n- **評析員參與**\n\n#### Step 3: 訴訟或其他途徑\n- 若調解不成\n- 民事、刑事訴訟\n- 醫療糾紛仲裁\n\n## 相關法規\n\n- **《醫療事故預防及爭議處理法》**(112 年 6 月)\n- **《醫療爭議評析作業辦法》**(112 年 12 月)\n- **《醫療法》**\n- **《醫師法》**\n- **《民法》、《刑法》醫療相關條文**\n\n## 考點速記\n\n| 評析員類型 | 資格 |\n|---|---|\n| **醫師** | **教學醫院**主治醫師 **3 年以上** + 專科 + 推薦 |\n| **牙醫師** | 同上 |\n| **其他醫事人員** | 證書 + 執業 **5 年以上** + 推薦 |\n| **社會公正人士** | 法律、心理、社工、社福、       "detail": "**《身心障礙者鑑定作業辦法》113 年修訂重點**\n\n## 身心障礙者鑑定審議諮詢小組 — (A) 本題核心\n\n### 組成原則\n\n**法規要求成員包含**:\n1. **醫療領域**專業人員\n2. **社政領域**專業人員(社工)\n3. **教育領域**專業人員\n4. **勞政領域**專業人員\n5. **身心障礙者本人或家屬代表**\n6. **學者專家**\n7. **身心障礙團體代表**\n\n### **不包含**:\n- **宗教團體代表** ★\n- 宗教背景不在鑑定評審專業考量內\n- 鑑定是**醫療、社會、教育專業**範疇\n\n### (A) 為什麼錯誤?\n\n選項說「**必須包含宗教團體代表**」\n\n**錯誤原因**:\n- 法規**未要求**宗教團體代表\n- 宗教團體代表**不在法定組成**範圍內\n- 鑑定諮詢小組以**專業、服務使用者、倡議團體**為主\n- 與宗教無關\n\n## 其他選項(113 年修訂條文重點)\n\n### (B) 免重複診察(正確)\n\n**條文精神**:\n- **減輕申請人負擔**\n- 避免重複檢查\n- 以**三個月內**就診紀錄或診斷證明為依據\n- 若資料充足,鑑定機構**可免重複檢查**\n- 便民、效率\n\n**適用情境**:\n- 申請人曾於其他醫院就診\n- 已有完整評估紀錄\n- 病情穩定\n- 避免重複**昂貴檢查**(如神經電生理、影像)\n\n### (C) 到府鑑定(正確)\n\n**條文精神**:\n- **重度失能者**不便就醫\n- **申請指派鑑定人員到府**\n- 提供友善服務\n\n**適用條件**:\n- 全癱病人\n- 植物人\n- 無法下床\n- 呼吸器依賴\n- 其他經醫師證明無法外出者\n\n### (D) 第二類增加等級(正確)\n\n#### 第二類身心障礙\n- **眼、耳及相關構造與感官功能及疼痛**\n- 包括:\n  - 視覺障礙\n  - 聽覺障礙\n  - 平衡功能障礙\n  - 味覺、嗅覺\n  - 慢性疼痛\n\n#### 規則\n- 若**不同感官功能**同時受損\n- 且**最高障礙程度相同**\n- **等級增加 1 級**(例:中度 → 重度)\n- **增加幅度以 1 級為限**\n- 代表多重感官障礙的累積影響\n\n**範例**:\n- 中度視障 + 中度聽障 → 重度\n- 不是兩個中度相加為極重度(只能增加 1 級)\n\n### (E) 第七類增加等級(正確)\n\n#### 第七類身心障礙\n- **神經、肌肉、骨骼之移動相關構造及其功能**\n- 包括:\n  - 上肢障礙\n  - 下肢障礙\n  - 脊柱障礙\n  - 平衡障礙\n\n#### 規則\n- **上肢 + 下肢**最高障礙程度相等\n- **等級增加 1 級**\n- **增加幅度以 1 級為限**\n\n**範例**:\n- 重度上肢 + 重度下肢 → 極重度\n- 中度上肢 + 中度下肢 → 重度\n\n## 113 年修訂背景\n\n### 改革重點\n1. **簡化程序**:減少重複檢查\n2. **便民措施**:到府鑑定\n3. **多重障礙認定**:合理加級\n4. **跨領域審議**:多元成員\n5. **數位化**:電子化申請\n\n### 服務導向\n- 以申請人為中心\n- 尊重自主權\n- 提高效率\n- 公正透明\n\n## 台灣身心障礙者福利體系\n\n### 核心法規\n1. **《身心障礙者權益保障法》**\n2. **《身心障礙者鑑定作業辦法》**\n3. **《身心障礙者需求評估辦法》**\n4. **《身心障礙者醫療復健補助辦法》**\n\n### 八大類鑑定\n- 第一類:神經系統、精神、心智\n- **第二類:眼、耳、感官、疼痛** ★\n- 第三類:聲音與言語\n- 第四類:循環、造血、免疫、呼吸\n- 第五類:消化、代謝、內分泌\n- 第六類:泌尿、生殖\n- **第七類:神經、肌肉、骨骼、移動** ★\n- 第八類:皮膚\n\n## 考點速記\n\n| 113 年修訂重點 | 是否正確 |\n|---|---|\n| **宗教團體代表**必須包含 | **✗ 錯誤** ★ |\n| 三個月內就診紀錄可免重複檢查 | ✓ |\n| 無法下床可申請到府鑑定 | ✓ |\n| 第二類多重感官障礙 +1 級 | ✓ |\n| 第七類上下肢同等障礙 +1 級 | ✓ |\n\n| 諮詢小組組成 | 類型 |\n|---|---|\n| 醫療、社政、教育、勞政 | ✓ |\n| 身障者或家屬代表 | ✓ |\n| 身障團體代表 | ✓ |\n| 學者專家 | ✓ |\n| **宗教團體代表** | **✗** |",

      "detail": "**《病人自主權利法》(病主法)**\n\n## 立法背景\n\n### 立法時程\n- **民國 104 年 12 月 18 日公布**\n- **民國 108 年 1 月 6 日施行**\n- 台灣**亞洲第一部**專法\n- 體現病人自主核心價值\n\n### 立法目的 — (A) 正確\n- **尊重病人醫療自主**\n- **保障善終權益** ★\n- **促進醫病關係和諧**\n\n## 核心概念\n\n### 病人自主(Patient Autonomy)\n- 病人有權決定自己的醫療\n- 包括「拒絕」治療的權利\n- 即使拒絕會導致死亡\n\n### 善終權(Right to Die with Dignity)\n- 不是安樂死\n- 不是主動加速死亡\n- 是**拒絕無效維持生命治療**的權利\n- 自然過世、尊嚴離開\n\n## 第 4 條:知情、選擇、決定權 — (B) 正確\n\n### 病人有權:\n1. **知情**(Informed):\n   - 病情\n   - 醫療選項\n   - 各選項成效、風險、預後\n2. **選擇**(Choose):\n   - 選擇醫師提供的醫療選項\n3. **決定**(Decide):\n   - 決定是否接受治療\n   - 包括拒絕\n\n### 相對於《醫療法》\n- **醫療法**:醫師告知義務\n- **病主法**:**病人主動的權利** ★\n\n## 預立醫療決定(Advance Decision, AD) — (C) 本題關鍵\n\n### 定義\n- **20 歲以上、具完全行為能力者**\n- **經預立醫療照護諮商(ACP)**\n- **以書面表達**\n- 在特定臨床條件下\n- **同意或拒絕維持生命治療 / 人工營養餵養**\n\n### 流程\n\n#### Step 1: 預立醫療照護諮商(ACP)\n- 由指定醫療機構辦理\n- 病人 + 至少一位二親等內親屬 + 指定代理人\n- 醫療團隊說明\n- 充分討論\n- 理解預立醫療決定的後果\n\n#### Step 2: 立 AD 書\n- 書面文件\n- 病人簽名\n- 見證人兩人\n- 公證或醫療機構見證\n\n#### Step 3: 註記於健保卡\n- **全國通用**\n- 醫療人員可查閱\n- 即時生效\n\n### 變更 / 撤回 ★ (C) 核心\n\n**第 12 條明確規定**:\n- **預立醫療決定可以書面撤回或變更**\n- **隨時** ★\n- 病人自主權持續存在\n- 不會「一旦確立就不可變更」\n\n### 為什麼可以變更?\n\n1. **尊重病人自主**:\n   - 病人的想法會隨時間、病情變化\n   - 強迫遵守過去決定 → 違反自主精神\n\n2. **動態決策**:\n   - 知識、價值觀演進\n   - 需要彈性\n\n3. **國際標準**:\n   - 各國預立醫療決定皆可變更\n   - 美國 Patient Self-Determination Act\n   - 德國、新加坡等國\n\n### (C) 為什麼錯誤?\n\n選項說「預立醫療決定**一旦確立後即不可撤回或變更**」\n\n**錯誤原因**:\n- **完全違反病主法精神** ★\n- 第 12 條明文可撤回變更\n- 病人自主權不應被過去決定綁定\n- 實際上變更程序相對簡便\n\n## 第 14 條:可拒絕治療的臨床條件 — (E) 正確\n\n### 五大臨床條件\n\n1. **末期病人**\n   - 符合安寧緩和條例之末期病人\n   - 疾病不可治癒\n   - 近期死亡不可避免\n\n2. **處於不可逆轉之昏迷狀況**\n   - 持續昏迷\n   - 回復機率極低\n\n3. **永久植物人狀態**\n   - Persistent vegetative state\n   - > 3-6 個月不恢復\n\n4. **極重度失智**\n   - CDR = 3(Clinical Dementia Rating)\n   - 失去意識、溝通、日常生活能力\n\n5. **其他經中央主管機關公告之病人疾病狀況或痛苦難以忍受、疾病無法治癒且依當時醫療水準無其他合適解決方法之情形**\n   - 開放性條款\n   - 衛福部公告:\n     - 罕見疾病\n     - 特定進行性神經退化疾病\n   - 確保病主法與時俱進\n\n## 可終止/撤除/不施行的項目\n\n### 維持生命治療\n- 心肺復甦術(CPR)\n- 機械通氣\n- 血液透析\n- 化療\n- 抗生素\n- 輸血\n- 其他治療\n\n### 人工營養及流體餵養\n- NG tube feeding\n- PEG feeding\n- IV fluids\n- TPN\n\n## 第 16 條 — (D) 正確\n\n### 緩和醫療義務\n- 終止、撤除或不施行維持治療時\n- **應提供緩和醫療**(palliative care)\n- 確保病人不痛苦\n\n### 轉診義務\n- 若本院無法提供\n- **應建議病人轉診**\n- 提供協助\n\n### 機構人員意願\n- 醫事人員可基於信念拒絕執行\n- 但機構必須安排其他人員\n- **不得完全拒絕病人需求**\n\n## 常見誤解澄清\n\n### 病主法 ≠ 安樂死\n| 項目 | 病主法 | 安樂死 |\n|---|---|---|\n| 行為 | **拒絕無效治療** | 主動結束生命 |\n| 藥物 | 緩和 | **注射致死** |\n| 合法性 | **台灣合法** | 台灣禁止 |\n| 倫理 | 自主拒絕 | 主動致死 |\n\n### 病主法 ≠ 安寧緩和條例\n| 項目 | 病主法 | 安寧緩和 |\n|---|---|---|\n| 適用 | 五大臨床條件 | **末期病人** |\n| 核心 | 預立決定 | DNR |\n| 範圍 | 廣(含人工營養) | 限維生治療 |\n| 年代 | 較新(108 年) | 較早(89 年) |\n\n## 考點速記\n\n| 病主法重點 | 關鍵 |\n|---|---|\n| 立法時程 | 108 年 1 月施行 |\n| 核心價值 | **病人自主 + 善終權** |\n| 預立醫療決定 | 20 歲以上完全行為能力 |\n| **可以變更?** | **✓ 可**隨時書面撤回變更 ★ |\n| 五大臨床條件 | 末期、不可逆昏迷、永久植物人、極重度失智、其他公告 |\n| 對象治療 | 維持生命治療 + 人工營養餵養 |\n| **Vs 安樂死** | **病主法不等於安樂死** |",

/* =========================================================================
   Markdown (輕量解析器 — 支援 GFM 表格、粗體、斜體、標題、清單、inline code)
   ========================================================================= */
function mdInline(text) {
  /* 處理 inline 語法 → 回傳 React children 陣列 */
  if (!text) return null;
  const parts = [];
  let key = 0;
  let remaining = text;
  /* 依序比對：inline code, 粗體, 斜體 */
  const patterns = [
    { re: /`([^`]+?)`/, render: (m) => <code key={key++} className="md-inline-code">{m[1]}</code> },
    { re: /\*\*([^*]+?)\*\*/, render: (m) => <strong key={key++}>{m[1]}</strong> },
    { re: /\*([^*]+?)\*/, render: (m) => <em key={key++}>{m[1]}</em> },
  ];
  while (remaining.length > 0) {
    let earliest = null;
    let earliestPatIdx = -1;
    patterns.forEach((p, idx) => {
      const m = remaining.match(p.re);
      if (m && (earliest === null || m.index < earliest.index)) {
        earliest = m;
        earliestPatIdx = idx;
      }
    });
    if (!earliest) {
      parts.push(remaining);
      break;
    }
    if (earliest.index > 0) parts.push(remaining.slice(0, earliest.index));
    parts.push(patterns[earliestPatIdx].render(earliest));
    remaining = remaining.slice(earliest.index + earliest[0].length);
  }
  return parts;
}

function Markdown({ text }) {
  if (!text) return null;
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  let keyCounter = 0;

  while (i < lines.length) {
    const line = lines[i];

    /* 表格偵測：當前行含 | 且下一行是 |---| 分隔線 */
    if (line.includes('|') && i + 1 < lines.length && /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(lines[i + 1])) {
      const headerCells = line.split('|').map(c => c.trim()).filter((c, idx, arr) => !(idx === 0 && c === '') && !(idx === arr.length - 1 && c === ''));
      const bodyRows = [];
      i += 2;
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        const cells = lines[i].split('|').map(c => c.trim()).filter((c, idx, arr) => !(idx === 0 && c === '') && !(idx === arr.length - 1 && c === ''));
        bodyRows.push(cells);
        i++;
      }
      elements.push(
        <div key={keyCounter++} className="md-table-wrap">
          <table className="md-table">
            <thead>
              <tr>{headerCells.map((c, j) => <th key={j}>{mdInline(c)}</th>)}</tr>
            </thead>
            <tbody>
              {bodyRows.map((row, rIdx) => (
                <tr key={rIdx}>{row.map((c, j) => <td key={j}>{mdInline(c)}</td>)}</tr>
              ))}
            </tbody>
          </table>
        </div>
      );
      continue;
    }

    /* 標題 */
    const h3 = line.match(/^###\s+(.+)$/);
    if (h3) { elements.push(<h4 key={keyCounter++} className="md-h3">{mdInline(h3[1])}</h4>); i++; continue; }
    const h2 = line.match(/^##\s+(.+)$/);
    if (h2) { elements.push(<h3 key={keyCounter++} className="md-h2">{mdInline(h2[1])}</h3>); i++; continue; }
    const h1 = line.match(/^#\s+(.+)$/);
    if (h1) { elements.push(<h3 key={keyCounter++} className="md-h1">{mdInline(h1[1])}</h3>); i++; continue; }

    /* 無序清單 */
    if (/^\s*[-•]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-•]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-•]\s+/, ''));
        i++;
      }
      elements.push(
        <ul key={keyCounter++} className="md-ul">
          {items.map((it, j) => <li key={j}>{mdInline(it)}</li>)}
        </ul>
      );
      continue;
    }

    /* 有序清單 */
    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
        i++;
      }
      elements.push(
        <ol key={keyCounter++} className="md-ol">
          {items.map((it, j) => <li key={j}>{mdInline(it)}</li>)}
        </ol>
      );
      continue;
    }

    /* 空行：段落分隔 */
    if (line.trim() === '') {
      elements.push(<div key={keyCounter++} className="md-spacer"/>);
      i++;
      continue;
    }

    /* 一般段落（合併連續非空白非特殊行） */
    const paraLines = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== '' &&
           !lines[i].match(/^(#+\s+|[-•]\s+|\d+\.\s+)/) &&
           !(lines[i].includes('|') && i + 1 < lines.length && /^\s*\|?\s*:?-+:?/.test(lines[i + 1]))) {
      paraLines.push(lines[i]);
      i++;
    }
    elements.push(<p key={keyCounter++} className="md-p">{mdInline(paraLines.join(' '))}</p>);
  }
  return <>{elements}</>;
}

/* =========================================================================
   Analytics 作答分析頁 — 依主題分類看強弱
   ========================================================================= */
function Analytics({ answered, starred, onBack, onPracticeCategory }) {
  const analysis = useMemo(() => {
    // 統整：每個 category 的作答、答對、未作答
    const catMap = {};
    QUESTIONS.forEach(q => {
      if (!catMap[q.category]) {
        catMap[q.category] = {
          category: q.category,
          total: 0, answered: 0, correct: 0, wrong: 0,
          questionIds: [], wrongIds: []
        };
      }
      const c = catMap[q.category];
      c.total += 1;
      c.questionIds.push(q.id);
      if (answered[q.id]) {
        c.answered += 1;
        if (answered[q.id].correct) c.correct += 1;
        else { c.wrong += 1; c.wrongIds.push(q.id); }
      }
    });

    const list = Object.values(catMap).map(c => ({
      ...c,
      accuracy: c.answered > 0 ? Math.round((c.correct / c.answered) * 100) : null,
      coverage: Math.round((c.answered / c.total) * 100)
    }));

    return list;
  }, [answered]);

  const overall = useMemo(() => {
    const total = QUESTIONS.length;
    const ans = Object.keys(answered).length;
    const correct = Object.values(answered).filter(a => a.correct).length;
    return {
      total, answered: ans, correct,
      accuracy: ans > 0 ? Math.round((correct / ans) * 100) : 0
    };
  }, [answered]);

  // 答過 > 0 且正確率排序
  const answeredCats = analysis.filter(c => c.answered > 0).sort((a, b) => a.accuracy - b.accuracy);
  const unansweredCats = analysis.filter(c => c.answered === 0);

  const weakCats = answeredCats.filter(c => c.accuracy < 70);
  const strongCats = [...answeredCats].filter(c => c.accuracy >= 70).reverse();

  // 圖表用：依作答量排序
  const sortedByAnswered = [...analysis].sort((a, b) => b.answered - a.answered);

  return (
    <main className="max-w-5xl mx-auto px-6 py-10 fadein">
      <button onClick={onBack} className="text-sm text-dim hover:accent mb-6 flex items-center gap-1.5">
        <span>←</span> 返回首頁
      </button>

      <div className="mb-10">
        <div className="text-xs font-mono text-subtle tracking-widest mb-2">— ANALYTICS</div>
        <h1 className="font-display text-4xl md:text-5xl font-medium tracking-tight mb-3">
          作答分析
        </h1>
        <p className="text-soft leading-relaxed">
          依主題分類顯示你的作答狀況。找出弱點主題針對性複習，強項則可跳過。
        </p>
      </div>

      {/* 整體概況 */}
      <section className="mb-10">
        <h2 className="font-display text-xs uppercase tracking-[0.2em] text-subtle mb-4">Overall 整體</h2>
        <div className="surface rounded-lg p-6">
          <div className="flex items-baseline justify-between mb-4">
            <div>
              <span className="font-display text-5xl font-medium">{overall.accuracy}</span>
              <span className="text-2xl text-dim ml-1">%</span>
              <span className="text-sm text-dim ml-3">正確率</span>
            </div>
            <div className="text-right">
              <div className="text-sm text-dim">已作答 / 總題庫</div>
              <div className="font-display text-xl font-medium">
                {overall.answered} / {overall.total}
              </div>
            </div>
          </div>
          <div className="progress-bar mb-2">
            <div className="progress-fill" style={{ width: `${(overall.answered / overall.total) * 100}%` }}/>
          </div>
          <div className="flex gap-4 text-xs text-dim mt-2">
            <span>✓ 答對 {overall.correct}</span>
            <span>✗ 答錯 {overall.answered - overall.correct}</span>
            <span>○ 未答 {overall.total - overall.answered}</span>
            <span>★ 星號 {starred.length}</span>
          </div>
        </div>
      </section>

      {/* 弱點主題 */}
      {weakCats.length > 0 && (
        <section className="mb-10">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="font-display text-xs uppercase tracking-[0.2em]" style={{ color: 'var(--wrong)' }}>
              Weak Spots 待加強主題 ({weakCats.length})
            </h2>
            <span className="text-xs text-subtle font-mono">正確率 &lt; 70%</span>
          </div>
          <div className="grid grid-cols-1 gap-2">
            {weakCats.map(c => (
              <CategoryBar key={c.category} cat={c} accent="wrong" onClick={onPracticeCategory} />
            ))}
          </div>
        </section>
      )}

      {/* 強項主題 */}
      {strongCats.length > 0 && (
        <section className="mb-10">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="font-display text-xs uppercase tracking-[0.2em]" style={{ color: 'var(--correct)' }}>
              Strong Areas 熟練主題 ({strongCats.length})
            </h2>
            <span className="text-xs text-subtle font-mono">正確率 ≥ 70%</span>
          </div>
          <div className="grid grid-cols-1 gap-2">
            {strongCats.map(c => (
              <CategoryBar key={c.category} cat={c} accent="correct" onClick={onPracticeCategory} />
            ))}
          </div>
        </section>
      )}

      {/* 未練習主題 */}
      {unansweredCats.length > 0 && (
        <section className="mb-10">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="font-display text-xs uppercase tracking-[0.2em] text-subtle">
              Not Started 尚未練習 ({unansweredCats.length})
            </h2>
          </div>
          <div className="grid grid-cols-1 gap-2">
            {unansweredCats.map(c => (
              <CategoryBar key={c.category} cat={c} accent="neutral" onClick={onPracticeCategory} />
            ))}
          </div>
        </section>
      )}

      {/* 完整分布圖 */}
      <section className="mb-10">
        <h2 className="font-display text-xs uppercase tracking-[0.2em] text-subtle mb-4">
          All Categories 所有主題分布
        </h2>
        <div className="surface rounded-lg p-5">
          <div className="space-y-3">
            {sortedByAnswered.map(c => {
              const correctPct = c.total > 0 ? (c.correct / c.total) * 100 : 0;
              const wrongPct = c.total > 0 ? (c.wrong / c.total) * 100 : 0;
              return (
                <div key={c.category}>
                  <div className="flex items-baseline justify-between text-sm mb-1">
                    <span className="font-medium">{c.category}</span>
                    <span className="text-xs font-mono text-dim">
                      {c.correct}✓ / {c.wrong}✗ / {c.total - c.answered}○ · {c.total}題
                    </span>
                  </div>
                  <div className="flex h-2 rounded-full overflow-hidden" style={{ background: 'var(--bg-2)' }}>
                    {correctPct > 0 && (
                      <div style={{ width: `${correctPct}%`, background: 'var(--correct)' }} title={`答對 ${c.correct}`} />
                    )}
                    {wrongPct > 0 && (
                      <div style={{ width: `${wrongPct}%`, background: 'var(--wrong)' }} title={`答錯 ${c.wrong}`} />
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </section>
    </main>
  );
}

function CategoryBar({ cat, accent, onClick }) {
  const barColor = accent === 'wrong' ? 'var(--wrong)' :
                   accent === 'correct' ? 'var(--correct)' :
                   'var(--border-strong)';
  const bg = accent === 'wrong' ? 'var(--wrong-soft)' :
             accent === 'correct' ? 'var(--correct-soft)' :
             'var(--bg-1)';
  const hasAcc = cat.accuracy !== null;

  return (
    <button
      onClick={() => onClick && onClick(cat)}
      className="surface rounded-lg p-4 text-left card-hover flex items-center gap-4"
    >
      <div className="flex-1 min-w-0">
        <div className="flex items-baseline justify-between mb-1.5">
          <span className="font-medium truncate">{cat.category}</span>
          {hasAcc && (
            <span className="font-display text-xl font-medium ml-3" style={{ color: barColor }}>
              {cat.accuracy}%
            </span>
          )}
        </div>
        <div className="flex items-center gap-3">
          <div className="flex-1 progress-bar">
            {hasAcc && <div style={{ width: `${cat.accuracy}%`, background: barColor, height: '100%', borderRadius: '999px', transition: 'width 0.4s ease' }}/>}
          </div>
          <span className="text-xs font-mono text-dim whitespace-nowrap">
            {cat.answered}/{cat.total}
          </span>
        </div>
      </div>
    </button>
  );
}

function Practice({ mode, year, session, category, startIdx, onExit, answered, setAnswered, starred, setStarred }) {
  // 建立題目清單
  const queue = useMemo(() => {
    let list = [...QUESTIONS];
    if (mode === 'session') {
      list = list.filter(q => q.year === year && q.session === session).sort((a, b) => a.number - b.number);
    } else if (mode === 'random') {
      list = [...list].sort(() => Math.random() - 0.5);
    } else if (mode === 'simulation') {
      list = [...list].sort(() => Math.random() - 0.5).slice(0, Math.min(50, list.length));
    } else if (mode === 'wrong') {
      list = list.filter(q => answered[q.id] && !answered[q.id].correct);
    } else if (mode === 'starred') {
      list = list.filter(q => starred.includes(q.id));
    } else if (mode === 'category') {
      list = list.filter(q => q.category === category).sort((a, b) => (a.year - b.year) || (a.session - b.session) || (a.number - b.number));
    }
    return list;
  }, [mode, year, session, category]);

  const [idx, setIdx] = useState(() => {
    if (typeof startIdx === 'number' && startIdx >= 0) return startIdx;
    return 0;
  });
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [showExplanation, setShowExplanation] = useState(false);

  // 計時 (simulation/timer mode)
  const isTimed = mode === 'simulation';
  const [seconds, setSeconds] = useState(isTimed ? queue.length * 90 : 0);
  const timerRef = useRef();

  useEffect(() => {
    if (!isTimed) return;
    timerRef.current = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) { clearInterval(timerRef.current); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [isTimed]);

  // 切換題目時重置狀態
  useEffect(() => {
    setSelected(null);
    setSubmitted(false);
    setShowExplanation(false);
    // 如果這題已經答過（非 simulation 模式），直接顯示結果
    const q = queue[idx];
    if (q && !isTimed && answered[q.id]) {
      setSelected(answered[q.id].selected);
      setSubmitted(true);
      setShowExplanation(true);
    }
  }, [idx, queue, isTimed]);

  if (queue.length === 0) {
    return (
      <main className="max-w-3xl mx-auto px-6 py-20 text-center fadein">
        <div className="font-display text-2xl mb-3">沒有符合條件的題目</div>
        <p className="text-dim mb-6">這個模式目前沒有題目可以練習。</p>
        <button onClick={onExit} className="btn-ghost px-5 py-2 rounded-md">返回首頁</button>
      </main>
    );
  }

  const q = queue[idx];
  const isStarred = starred.includes(q.id);

  const submit = () => {
    if (!selected) return;
    const correct = selected === q.answer;
    setSubmitted(true);
    if (!isTimed) setShowExplanation(true);
    const next = { ...answered, [q.id]: { selected, correct, timestamp: Date.now() } };
    setAnswered(next);
    save(STORAGE.answered, next);
  };

  const toggleStar = () => {
    const next = isStarred ? starred.filter(id => id !== q.id) : [...starred, q.id];
    setStarred(next);
    save(STORAGE.starred, next);
  };

  const next = () => {
    if (idx < queue.length - 1) setIdx(idx + 1);
    else onExit();
  };
  const prev = () => { if (idx > 0) setIdx(idx - 1); };

  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  };

  return (
    <main className="max-w-3xl mx-auto px-6 py-8 fadein">
      {/* Top bar */}
      <div className="flex items-center justify-between mb-6">
        <button onClick={onExit} className="text-sm text-dim hover:text-soft flex items-center gap-1.5">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          退出練習
        </button>
        <div className="flex items-center gap-3 text-sm">
          {isTimed && (
            <span className={`font-mono flex items-center gap-1.5 ${seconds < 60 ? 'timer-warn' : 'accent'}`}>
              <IconClock size={14}/> {formatTime(seconds)}
            </span>
          )}
          <span className="font-mono text-xs text-dim">
            {idx + 1} / {queue.length}
          </span>
        </div>
      </div>

      <div className="progress-bar mb-8">
        <div className="progress-fill" style={{ width: `${((idx + 1) / queue.length) * 100}%` }}/>
      </div>

      {/* 題目 meta */}
      <div className="flex items-center flex-wrap gap-2 mb-4">
        <span className="chip font-mono">{q.year}-{q.session}-{String(q.number).padStart(2, '0')}</span>
        {q.category && <span className="chip">{q.category}</span>}
        {answered[q.id] && (
          answered[q.id].correct
            ? <span className="chip" style={{ background: 'var(--correct-soft)', borderColor: 'rgba(74,222,128,0.3)', color: 'var(--correct)' }}><IconCheck size={12}/> 答對過</span>
            : <span className="chip chip-wrong"><IconX size={12}/> 答錯過</span>
        )}
        <button
          onClick={toggleStar}
          className={`chip ml-auto transition-all ${isStarred ? 'chip-star' : ''}`}
          title={isStarred ? '取消星號' : '標記為重要'}
        >
          <IconStar filled={isStarred} size={13}/>
          {isStarred ? '已標記' : '標記重要'}
        </button>
      </div>

      {/* 題幹 */}
      <div className="surface rounded-lg p-6 mb-5">
        <p className="text-[1.05rem] leading-[1.8] text-soft whitespace-pre-wrap">
          {q.question}
        </p>
        {q.imageUrl && (
          <img src={q.imageUrl} alt={`Question ${q.id}`} className="mt-5 rounded-md max-w-full border hairline" />
        )}
      </div>

      {/* 選項 */}
      <div className="space-y-2.5 mb-6">
        {q.choices.map(c => {
          let state = '';
          if (submitted) {
            if (c.key === q.answer) state = 'correct';
            else if (c.key === selected) state = 'wrong';
          } else if (c.key === selected) {
            state = 'selected';
          }
          return (
            <button
              key={c.key}
              disabled={submitted}
              onClick={() => setSelected(c.key)}
              className={`choice-btn ${state} w-full rounded-lg p-4 flex items-start gap-4`}
            >
              <span className="choice-letter">{c.key}</span>
              <span className="flex-1 text-soft leading-relaxed pt-0.5">{c.text}</span>
              {submitted && c.key === q.answer && (
                <span style={{ color: 'var(--correct)' }}><IconCheck size={20}/></span>
              )}
              {submitted && c.key === selected && c.key !== q.answer && (
                <span style={{ color: 'var(--wrong)' }}><IconX size={20}/></span>
              )}
            </button>
          );
        })}
      </div>

      {/* 詳解 */}
      {showExplanation && q.explanation && (
        <div className="explanation-box rounded-lg p-6 mb-6 fadein">
          <div className="flex items-center gap-2 mb-3">
            <span className="font-display italic text-lg" style={{ color: 'var(--accent)' }}>Explanation</span>
            <span className="text-xs font-mono text-subtle">/ 詳解</span>
          </div>
          <div className="text-soft leading-relaxed mb-4 md-content md-summary">
            <Markdown text={q.explanation.summary} />
          </div>
          {q.explanation.detail && (
            <details className="mb-4">
              <summary className="text-sm flex items-center gap-1.5 accent hover:text-[var(--accent-dim)] mb-3">
                <IconChevron size={12}/>
                展開完整詳解
              </summary>
              <div className="text-sm text-soft leading-[1.85] pl-4 border-l hairline-strong md-content">
                <Markdown text={q.explanation.detail} />
              </div>
            </details>
          )}
          {q.explanation.sources && q.explanation.sources.length > 0 && (
            <div>
              <div className="text-xs font-mono uppercase tracking-wider text-subtle mb-2">Sources · 資料來源</div>
              <div className="flex flex-wrap gap-2">
                {q.explanation.sources.map((s, i) => (
                  s.url
                    ? <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="source-tag hover:text-[var(--accent)] hover:border-[var(--accent-deep)]">↗ {s.text}</a>
                    : <span key={i} className="source-tag">{s.text}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* 底部動作 */}
      <div className="flex items-center justify-between gap-3">
        <button onClick={prev} disabled={idx === 0} className="btn-ghost px-4 py-2.5 rounded-md text-sm disabled:opacity-30">
          上一題
        </button>
        <div className="flex gap-3">
          {!submitted ? (
            <button onClick={submit} disabled={!selected} className="btn-accent px-6 py-2.5 rounded-md text-sm disabled:opacity-40">
              提交答案
            </button>
          ) : (
            <button onClick={next} className="btn-accent px-6 py-2.5 rounded-md text-sm">
              {idx < queue.length - 1 ? '下一題 →' : '完成練習'}
            </button>
          )}
        </div>
      </div>
    </main>
  );
}

/* =========================================================================
   Root App
   ========================================================================= */
function App() {
  const [view, setView] = useState({ page: 'home' });
  const [answered, setAnswered] = useState(() => load(STORAGE.answered, {}));
  const [starred, setStarred] = useState(() => load(STORAGE.starred, []));
  const [stats, setStats] = useState(() => load(STORAGE.stats, {}));
  const [showResetModal, setShowResetModal] = useState(false);

  return (
    <div className="min-h-screen relative" style={{ zIndex: 2 }}>
      <Header
        onHome={() => setView({ page: 'home' })}
        answeredCount={Object.keys(answered).length}
        totalCount={QUESTIONS.length}
      />
      {view.page === 'home' && (
        <Home
          onStart={(opts) => {
            // 點年份卡片 → 進 session-menu 中介頁
            if (opts.mode === 'session') {
              setView({ page: 'session-menu', year: opts.year, session: opts.session });
            } else {
              setView({ page: 'practice', ...opts });
            }
          }}
          onViewAnalytics={() => setView({ page: 'analytics' })}
          onResetProgress={() => setShowResetModal(true)}
          stats={stats}
          starred={starred}
          answered={answered}
        />
      )}
      {view.page === 'analytics' && (
        <Analytics
          answered={answered}
          starred={starred}
          onBack={() => setView({ page: 'home' })}
          onPracticeCategory={(cat) => {
            if (cat.total === 0) return;
            setView({ page: 'practice', mode: 'category', category: cat.category });
          }}
        />
      )}
      {view.page === 'session-menu' && (
        <SessionMenu
          year={view.year}
          session={view.session}
          answered={answered}
          starred={starred}
          onBack={() => setView({ page: 'home' })}
          onStart={(startIdx) => setView({
            page: 'practice', mode: 'session',
            year: view.year, session: view.session, startIdx
          })}
        />
      )}
      {view.page === 'practice' && (
        <Practice
          mode={view.mode}
          year={view.year}
          session={view.session}
          category={view.category}
          startIdx={view.startIdx}
          onExit={() => {
            // 從 session → session-menu；從 category → analytics；其他回首頁
            if (view.mode === 'session') {
              setView({ page: 'session-menu', year: view.year, session: view.session });
            } else if (view.mode === 'category') {
              setView({ page: 'analytics' });
            } else {
              setView({ page: 'home' });
            }
          }}
          answered={answered}
          setAnswered={setAnswered}
          starred={starred}
          setStarred={setStarred}
        />
      )}
      <footer className="max-w-6xl mx-auto px-6 py-10 text-center">
        <p className="text-xs font-mono text-subtle">
          PM&R Board Prep · built for Dale · <span className="accent">dale199707.github.io/pmr-exam</span>
        </p>
      </footer>

      {/* 清除內存確認對話框 */}
      {showResetModal && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 fadein"
          style={{ background: 'rgba(26, 46, 43, 0.4)', backdropFilter: 'blur(4px)' }}
          onClick={() => setShowResetModal(false)}
        >
          <div
            className="surface rounded-lg max-w-md w-full p-6"
            style={{ boxShadow: 'var(--shadow-lg)' }}
            onClick={(e) => e.stopPropagation()}
          >
            <div className="font-display text-2xl font-medium mb-3">清除內存？</div>
            <p className="text-soft text-sm leading-relaxed mb-5">
              這會刪除所有已儲存的作答記錄、星號標記與統計資料，並且<strong>無法復原</strong>。
              確定要清空嗎？
            </p>
            <div className="surface-soft rounded-md p-3 mb-5 text-xs text-dim font-mono space-y-1">
              <div>• 作答記錄：{Object.keys(answered).length} 題</div>
              <div>• 星號標記：{starred.length} 題</div>
            </div>
            <div className="flex gap-3 justify-end">
              <button
                onClick={() => setShowResetModal(false)}
                className="btn-ghost px-4 py-2 rounded-md text-sm"
              >
                取消
              </button>
              <button
                onClick={() => {
                  // 清除 localStorage
                  try {
                    localStorage.removeItem(STORAGE.answered);
                    localStorage.removeItem(STORAGE.starred);
                    localStorage.removeItem(STORAGE.stats);
                  } catch {}
                  setAnswered({});
                  setStarred([]);
                  setStats({});
                  setShowResetModal(false);
                  setView({ page: 'home' });
                }}
                className="px-4 py-2 rounded-md text-sm font-medium text-white transition-all"
                style={{ background: 'var(--wrong)', boxShadow: '0 2px 6px rgba(220, 38, 38, 0.25)' }}
              >
                確定清除
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
