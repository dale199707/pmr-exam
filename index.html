    "explanation": {
      "summary": "(D) 錯誤。**MMI（最大醫療進步）的定義是「病況已穩定、進一步治療不會顯著改善功能」**，**不需要保證病況未來不會惡化**。事實上慢性退化性疾病（OA、MS、Parkinson）達到穩定期即可判定 MMI，之後若惡化可以重新評估（reopen），不因此不判 MMI。",
      "detail": "**失能判定（Disability Determination）**\n\n## 失能判定的類型\n\n### 1. Administrative Disability（行政失能判定）\n- 依法規、保險、雇主要求\n- 類型：\n  - **Workers' compensation**（職災補償）\n  - **Social Security Disability**（美國 SSDI）\n  - **Private insurance**（私人保險）\n  - **Veterans Affairs**（退輔會）\n  - **身心障礙證明**（台灣）\n- 通常依賴**impairment rating**（損傷評分）\n\n### 2. Medical Disability（醫療失能判定）\n- 臨床對病人功能的評估\n- 用於：回復工作、輔具申請、照顧計畫\n\n## 失能相關名詞（★ 重要區分）\n\n| 名詞 | 定義 | 範例 |\n|---|---|---|\n| **Impairment** | 身體結構或功能的喪失/異常 | 關節 ROM 下降、肌力 grade 3 |\n| **Disability** | 執行特定活動的能力受限 | 無法蹲、無法搬 20 kg |\n| **Handicap** | 社會角色的限制 | 無法返回原工作、失去運動員生涯 |\n| **Functional limitation** | 執行基本動作的限制 | 無法行走 100 m |\n\n- ICIDH（1980）採用上述框架\n- ICF（2001）改為中性詞：**Body functions/structures, Activities, Participation**\n\n## Maximum Medical Improvement (MMI) ★ 本題核心\n\n### 定義\n- **病況已達醫療穩定（stable）**\n- **進一步治療不會顯著改善功能**\n- 也稱：\n  - Maximum Medical Recovery\n  - Medical stationary\n  - End of healing period\n\n### 判定條件\n1. **治療已達合理極限**\n2. **功能已達穩定狀態**（持續 3-6 個月無顯著變化）\n3. **預後可評估**\n\n### 重要觀念\n- **MMI ≠ 完全康復**\n- **MMI ≠ 永久無惡化**\n- MMI 只代表「目前的穩定狀態」\n\n### (D) 為什麼錯誤？\n\n選項說「預期未來仍可能惡化，不應判定 MMI」\n\n**錯誤原因**：\n- 許多慢性病（OA、MS、RA、CMT）\n- 達到穩定期就判 MMI\n- 之後若顯著惡化，可**重新開啟評估（reopen）**\n- 若等「永遠不會惡化」才判 MMI → 永遠判不了\n- 正確觀念：**目前穩定即可判 MMI，未來變化另行評估**\n\n### MMI 的重要性\n- 決定**永久性失能評分（permanent impairment rating）**\n- 結束臨時失能給付，開始永久補償\n- 職災保險案件結案基準\n- 回歸工作判定\n\n## Impartial Evaluation — (B) 正確\n\n### 原則\n- **醫事人員執行**\n- **絕對公正（impartial）**\n- 避免利益衝突\n- 基於客觀證據\n- 不受病人、雇主、律師壓力\n\n### 常見問題\n- 看診醫師 vs 評估醫師分開（某些制度要求）\n- **Independent Medical Examination (IME)**：第三方評估\n- 美國 AMA Guides 統一標準\n\n## Impairment Rating 工具\n\n### 1. AMA Guides to the Evaluation of Permanent Impairment\n- 美國最常用（現 6th ed, 2008）\n- 以各器官系統評分\n- **% whole person impairment**\n- 用於 Workers' comp 等\n\n### 2. FCE（Functional Capacity Evaluation）\n- 實作測試\n- 評估工作能力\n- 適合**永久性失能的功能衡量** → (A) 正確\n\n### 3. WHODAS 2.0 ★ (E) 關鍵\n\n**WHO Disability Assessment Schedule 2.0**：\n- **WHO 官方工具，基於 ICF**\n- 評估 6 個領域：\n  1. **Cognition**（認知）\n  2. **Mobility**（移動）\n  3. **Self-care**（自我照顧）\n  4. **Getting along**（與他人相處）\n  5. **Life activities**（生活活動）\n  6. **Participation**（社會參與）\n- 版本：\n  - 36-item version（完整）\n  - 12-item version（簡版）\n  - 12+24 version\n- **每個項目對應 ICF 編碼** ★\n- 適用：一般人口、臨床、研究\n\n## 失能評估的核心內容 — (C) 正確\n\n### 標準內容\n1. **確認診斷與預後**\n2. **功能障礙評估**\n3. **是否達 MMI**\n4. **工作限制**\n5. **永久性失能評分**\n6. **康復計畫建議**\n7. **重返工作建議**\n\n## 台灣失能判定實務\n\n### 身心障礙鑑定（ICF 制）\n- 2012 年起採用 **ICF** 架構\n- **醫事人員評估（A, B 類）+ 社工訪視（C, D, E, F, G 類）**\n- 新制涵蓋：\n  - 身體功能\n  - 身體構造\n  - 活動與參與\n  - 環境因素\n\n### 勞保失能給付\n- 依《勞工保險失能給付標準》\n- 15 個系列、220 項失能項目\n- 1-15 等級\n\n### 民事賠償\n- 依 AMA Guides 或專家鑑定\n- 影響賠償金額\n\n## 常見考點\n\n### MMI 相關\n- **何時判 MMI？**\n  - 病況穩定 3-6 個月\n  - 合理治療已完成\n  - 不是「完全康復」\n- **MMI 後仍可否治療？**\n  - 可以（maintenance care）\n  - 但不期待顯著改善\n\n### 評估者角色\n- 公正中立（impartial）\n- 基於醫學證據\n- 書面記錄詳盡\n- 必要時出庭作證\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| Impairment vs Disability | 身體/功能 vs 活動限制 |\n| **MMI 定義** | **病況穩定、治療不顯著改善** |\n| **MMI 判定** | **不需「保證未來不惡化」** ★ |\n| 判定原則 | Impartial（公正）|\n| WHODAS 2.0 | 基於 ICF，6 領域 |\n| AMA Guides | 美國標準 impairment rating |\n| FCE | 功能能力評估工具 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 36 \"Disability Determination and Impairment Rating\"", "url": null },
        { "text": "Rondinelli RD, Genovese E, Katz RT, et al. AMA Guides to the Evaluation of Permanent Impairment. 6th ed. American Medical Association, 2008", "url": null },
        { "text": "Üstün TB et al. Measuring Health and Disability: Manual for WHO Disability Assessment Schedule (WHODAS 2.0). WHO, 2010", "url": "https://www.who.int/publications/i/item/measuring-health-and-disability-manual-for-who-disability-assessment-schedule" },
        { "text": "Cocchiarella L, Andersson GB. Guides to the Evaluation of Permanent Impairment. 5th ed. AMA, 2001", "url": null }
      ]
    }

      "summary": "(E) 錯誤。**ICD-10 主要分類「健康狀況與死因（health conditions）」**，不是描述**失能、社會參與、環境因素**。後者（失能、社會參與、環境）是 **ICF（International Classification of Functioning, Disability and Health）** 的範疇。ICD-10 與 ICF 是 WHO 國際分類家族中**互補但不同**的兩個系統。",
      "detail": "**WHO 國際分類家族（WHO Family of International Classifications, WHO-FIC）**\n\n## 核心分類系統\n\n### 1. ICD（International Classification of Diseases）\n- **疾病診斷與死亡原因分類**\n- 目前版本：\n  - **ICD-10**：1990 年發布\n  - **ICD-11**：2019 年發布（台灣尚未全面採用）\n- 用途：\n  - 醫療記錄編碼\n  - 疾病統計\n  - 健保申報\n  - 死因分析\n\n### 2. ICF（International Classification of Functioning, Disability and Health）\n- **功能、失能、健康狀態的分類**\n- 2001 年發布（取代 ICIDH）\n- 用途：\n  - 失能評估\n  - 復健目標設定\n  - 政策制定\n  - 教育、研究\n\n### 3. ICHI（International Classification of Health Interventions）\n- 健康介入分類\n- 較新的系統\n\n## ICD vs ICF 比較（★ 核心考點）\n\n| 項目 | **ICD-10** | **ICF** |\n|---|---|---|\n| **分類對象** | **疾病、健康狀況** | **功能、失能、環境** |\n| **主要用途** | 死亡率、發病率、診斷 | 健康結果、失能 |\n| **觀點** | 病因學（etiological） | 功能學（functional） |\n| **軸向** | 身體系統 × 病因 | 身體 × 活動 × 參與 × 環境 |\n| **範例** | I63.9 腦梗塞 | d450 步行、b730 肌力、e120 助行器 |\n\n## ICD-10 結構與功能 — (A)(B)(C)(D) 正確\n\n### 編碼結構\n- **字母 + 數字**（3-5 碼）\n- 22 大章（chapter）\n- 例：\n  - I63.9 腦梗塞\n  - G20 巴金森氏症\n  - S06.9 創傷性腦損傷\n\n### 台灣實施歷程 — (C) 正確\n- **ICD-9-CM**：2015 年底前\n- **ICD-10-CM / PCS**：2016 年起全面實施\n- 健保申報必用\n\n### ICD-10 的描述範圍 — (D) 正確\n- **病因學架構（etiological framework）**\n- 涵蓋：\n  - 疾病（diseases）\n  - 障礙（disorders）\n  - 傷害（injuries）\n  - 外因（external causes）\n  - 症狀（symptoms）\n  - 健康狀況接觸（Z codes）\n\n### 健康狀況的定義 — (B) 正確\n- 急性、慢性疾病\n- 障礙、傷害、外傷\n- Z codes：健康狀況接觸因素\n\n## ICF 的架構\n\n### ICF 兩大部分\n\n#### Part 1：Functioning & Disability\n- **Body functions (b)**：生理功能\n- **Body structures (s)**：解剖結構\n- **Activities & Participation (d)**：活動與參與\n\n#### Part 2：Contextual Factors\n- **Environmental factors (e)**：環境因素\n- **Personal factors**：個人因素（不編碼）\n\n### ICF 編碼範例\n- b7302：Power of muscles of one side of the body\n- d450：Walking\n- e120：Products and technology for personal indoor and outdoor mobility\n- s760：Structure of trunk\n\n### ICF Qualifier（限定符）\n- 0：No impairment（0-4%）\n- 1：Mild（5-24%）\n- 2：Moderate（25-49%）\n- 3：Severe（50-95%）\n- 4：Complete（96-100%）\n- 8：Not specified\n- 9：Not applicable\n\n## (E) 為什麼錯誤？\n\n選項說 ICD-10 描述：\n- 健康狀況 ✓（ICD-10 涵蓋）\n- 失能 ✗\n- 社會參與 ✗\n- 環境 ✗\n\n**這些「失能、社會參與、環境」屬於 ICF 的範疇**，不是 ICD-10。\n\n**正確的分工**：\n- ICD-10：**「What is the disease?」**（是什麼病？）\n- ICF：**「How does it affect functioning and life?」**（如何影響功能與生活？）\n\n## ICD-10 vs ICD-11\n\n### ICD-11 的改變（2019）\n- 完全數位化\n- 整合遺傳、免疫、精神疾病新知\n- 傳統醫學章節（中醫、印度醫）\n- 性健康分類獨立\n- Gender incongruence 從精神疾病移出\n- **保留與 ICF 整合的能力**\n\n### 台灣 ICD-11 導入時程\n- 仍以 ICD-10-CM 為主\n- ICD-11 評估中\n\n## 臨床應用範例\n\n### 病例：腦中風後病人\n- **ICD-10**：I63.9（Cerebral infarction, unspecified）\n- **ICF 評估**：\n  - b730.3（Muscle power functions）\n  - d450.2（Walking）\n  - d550.1（Eating）\n  - e120+2（Products for mobility）\n  - e410+3（Individual attitudes of family）\n\n兩者整合使用 = **完整的病人畫像**\n\n## 台灣身心障礙新制（2012 起）\n\n### ICF 架構應用\n- 以 ICF 為基礎\n- **醫事人員評估（A, B 類）**：\n  - A：身體功能\n  - B：身體構造\n- **社工訪視（C-G 類）**：\n  - 活動與參與\n  - 環境因素\n- 取代舊制「16 類 × 6 等級」\n\n## 考點速記\n\n| 系統 | 主要內容 | 範疇 |\n|---|---|---|\n| **ICD-10** | **疾病、死因、健康狀況** ★ | 病因學 |\n| **ICF** | **功能、失能、環境** | 功能學 |\n| ICHI | 健康介入 | — |\n| WHODAS 2.0 | 失能評估量表（基於 ICF） | 評估工具 |\n\n**關鍵區別**：\n- **ICD-10 說「是什麼病」**\n- **ICF 說「對生活影響如何」**\n- 兩者**互補**，非重疊",

      "summary": "(B) 錯誤。根據 ICF，**物理環境（physical environment）涵蓋「個人直接接觸的物理空間及其中的互動」**。選項把「互動」排除於物理環境外，但**互動正是環境評估的核心**——無論是操作門把、使用扶手、行走於特定路面，都是人與物理環境的互動。沒有互動的「空間描述」不是無障礙環境評估的重點。",
      "detail": "**無障礙環境評估（Accessible Environment Assessment）**\n\n## ICF 架構下的環境因素 — (A) 正確\n\n### 環境因素（Environmental Factors, e-codes）\n\nICF 將環境因素分為 **5 大類**：\n\n#### 1. Products and Technology（產品與科技，e1）\n- 食物、藥物、個人用品\n- 輔具、科技\n- **e120**：移動輔具（輪椅、拐杖）\n- **e125**：溝通用產品\n- **e150**：公共建築的設計\n- **e155**：私人建築的設計\n\n#### 2. Natural Environment and Human-made Changes (e2)\n- 地理、氣候、光、聲\n- 自然光、人造光\n- 空氣品質\n\n#### 3. Support and Relationships (e3)\n- 家人、朋友、照顧者\n- 寵物\n- 專業人員\n\n#### 4. Attitudes (e4)\n- 家人態度\n- 社會態度\n- 個人態度\n- 文化規範\n\n#### 5. Services, Systems, and Policies (e5)\n- 衛生、教育、勞動、法律、交通服務\n- 建築政策\n- 社會安全\n\n## 環境的三大類別（★）\n\n根據 ICF 與職能治療框架，環境包含：\n\n### 1. Physical Environment（物理環境）\n- 建築空間\n- 地形\n- 光線、聲音\n- 溫度\n- **與人的「互動」** ★\n\n### 2. Social Environment（社會環境）\n- 家人、朋友、社群\n- 支持網絡\n- 文化規範\n\n### 3. Attitudinal Environment（態度環境）\n- 對失能的看法\n- 歧視與偏見\n- 文化價值觀\n\n## (B) 為什麼錯誤？\n\n選項說「物理環境...包括個人直接接觸的環境，**但不包括在此環境中的互動**」\n\n**錯誤原因**：\n1. **ICF 的物理環境定義包含「與環境的互動」**\n2. 沒有互動 = 單純的空間描述，無評估意義\n3. 無障礙設計的核心就是**「人-物理環境互動」**：\n   - 門把（操作互動）\n   - 扶手（抓握互動）\n   - 地面（步行互動）\n   - 坡道（移動互動）\n4. 沒有互動無法評估可用性（usability）\n\n## Person-Environment-Occupation (PEO) Model — (C) 正確\n\n### 模型起源\n- Law et al. 1996 職能治療模型\n- 三要素：\n  - **Person（人）**：能力、技巧、價值觀\n  - **Environment（環境）**：物理、社會、文化、體制\n  - **Occupation（職能）**：活動、任務、角色\n\n### 核心概念\n- 三要素互相影響\n- **最佳配適（optimal fit）** = 三者一致\n- **職能表現（occupational performance）** = 三者交集面積\n- 交集越大 → 表現越好\n\n### 臨床應用\n- 識別**配適不良**的原因\n- 調整策略：\n  - 改變人（技能訓練、輔具）\n  - 改變環境（可及性改造）\n  - 改變職能（任務修改）\n\n## 高齡者感官退化 — (D) 正確\n\n### 視覺退化\n- **老花眼（presbyopia）**：40+ 歲\n- 白內障\n- 黃斑部病變\n- 青光眼\n- **影響**：\n  - 跌倒風險\n  - 閱讀困難\n  - 夜間活動困難\n\n### 聽覺退化\n- **老年性聽障（presbycusis）**\n- 高頻聽力先下降\n- 影響溝通\n- 社交孤立\n\n### 其他感官\n- 味覺、嗅覺退化\n- 觸覺、本體感覺下降\n- **前庭系統退化**：平衡問題\n\n### 無障礙設計考量\n- 對比色標示\n- 放大字體\n- 良好照明\n- 減少眩光\n- 音頻輔助\n- 觸覺標示\n\n## Universal Design（通用設計）— (E) 正確\n\n### 定義\n- Ronald Mace 提出（1980s）\n- 設計**讓所有人都能使用**的產品與環境\n- 不限於失能者\n\n### 七大原則\n1. **Equitable use**（公平使用）\n2. **Flexibility in use**（使用彈性）\n3. **Simple and intuitive**（簡單直覺）\n4. **Perceptible information**（可感知資訊）\n5. **Tolerance for error**（容錯）\n6. **Low physical effort**（低體力需求）\n7. **Size and space for approach and use**（適當尺寸與空間）\n\n### 受益族群\n- **身心障礙者**\n- **高齡者**\n- **懷孕者**\n- **體型特殊者**（過高、過胖、過矮）\n- **兒童**\n- **暫時性受傷者**\n- 其實是**每個人**\n\n→ (E) 正確：無障礙設計不只為失能者\n\n## 台灣無障礙設計規範（★ 重要）\n\n### 法規依據\n- 《建築技術規則》建築設計施工編第 10 章\n- 《內政部 建築物無障礙設施設計規範》\n- 《身心障礙者權益保障法》\n\n### 重要規範（常考）\n\n#### 通路\n- 寬度 ≥ **90 cm**\n- 淨高 ≥ **190 cm**\n- 坡度 ≤ **1:12**\n- 高低差處理：\n  - ≤ 0.5 cm：不需處理\n  - 0.5-3 cm：作 1/2 斜角\n  - \\> 3 cm：設斜坡或升降設備\n\n#### 門\n- 淨寬 ≥ **80 cm**\n- 操作力 ≤ **5 kg**\n\n#### 廁所\n- 迴轉空間：**直徑 ≥ 150 cm**\n- 馬桶座高度 40-45 cm\n- 扶手 L 型\n\n#### 樓梯\n- 級深 ≥ 26 cm\n- 級高 ≤ 16 cm\n- 扶手高度 75-85 cm\n\n#### 停車位\n- 寬度 ≥ 350 cm\n- 長度 ≥ 600 cm\n- 標誌清楚\n\n## 無障礙環境評估流程\n\n### Step 1：需求確認\n- 個案失能種類、嚴重度\n- 輔具使用\n- 照顧者\n- 經濟考量\n\n### Step 2：病人能力評估\n- ROM、肌力、平衡\n- ADL、IADL\n- 認知、感官\n- 精細動作\n\n### Step 3：住宅環境評估\n- 家屬繪製平面圖\n- ADL 室模擬\n- 實地訪視（最準確）\n- 紀錄各區域問題\n\n### Step 4：定義問題與設目標\n- 分級：\n  - 立即需改善（危險）\n  - 短期改善（影響獨立）\n  - 長期改善（便利性）\n\n### Step 5：擬定處置策略\n- 環境改造\n- 輔具處方\n- 訓練\n- 照顧者教育\n- 資源連結\n\n### Step 6：執行與追蹤\n- 補助申請\n- 工程監督\n- 使用評估\n- 必要調整\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 環境三大類 | 物理、社會、態度 |\n| **物理環境** | **包含人與環境互動** ★ |\n| PEO 模型 | 人-環境-職能配適 |\n| 高齡退化 | 視覺聽覺最明顯 |\n| Universal design | 為**所有人**設計，不只失能者 |\n| 通路寬度 | ≥ 90 cm |\n| 迴轉空間 | 直徑 ≥ 150 cm |\n| 坡度 | ≤ 1:12 |",

      "summary": "(D) **非必要**。ICF 與 ICD 是兩個**互補但獨立**的分類系統：ICF 評估功能、失能、環境；ICD 分類疾病與死因。**使用 ICF 進行功能評估時，並不需要「依 ICD 編碼選擇功能分項選單」**——ICF 分類是依功能領域而非病因/病名構築的。雖然臨床常兩者併用，但 ICF 操作本身不倚賴 ICD。",
      "detail": "**ICF 應用的標準步驟**\n\n## ICF 使用流程（WHO / Cieza 框架）\n\n根據 Cieza et al. 2002 及 WHO ICF 應用手冊，將 ICF 用於臨床或研究的標準流程包括：\n\n### Step 1：Select the ICF categories（選擇合適的 ICF 分類）\n- 根據評估目的選擇相關 ICF codes\n- 可使用：\n  - **ICF Core Sets**（特定疾病的核心 code 組合）\n    - 中風 Core Set（共 130 個 codes）\n    - SCI Core Set\n    - OA Core Set\n    - 慢性疼痛 Core Set\n  - 完整 ICF（約 1400+ codes）\n- → (A) 必要\n\n### Step 2：Choose perspective of functioning（選擇功能性觀點）\n- **Lived experience（個案主觀）**\n- **Professional rating（專業客觀）**\n- **Testing/measurement（測量）**\n- 不同觀點可能給出不同 qualifier 分數\n- → (B) 必要\n\n### Step 3：Select data collection tools（選擇評估工具）\n- 量化工具：\n  - WHODAS 2.0\n  - Barthel Index\n  - 6MWT\n  - FIM\n- 質性工具：\n  - 訪談\n  - 觀察\n- 將工具結果對應至 ICF codes\n- → (C) 必要\n\n### Step 4：Score qualifiers（評分）\n- 0：No problem（0-4%）\n- 1：Mild\n- 2：Moderate\n- 3：Severe\n- 4：Complete\n- 8：Not specified\n- 9：Not applicable\n\n### Step 5：Choose reporting approach（選擇報告方法）\n- **ICF profile / chart**：視覺化呈現各 code 分數\n- **Core set summary**：特定疾病的分數摘要\n- **Narrative report**：敘述性報告\n- **Individual care plan**：個人化照護計畫\n- → (E) 必要\n\n## 為什麼 (D) 非必要？\n\n### ICF 的分類邏輯\n\nICF 的組織原則：\n```\nICF\n├── Part 1: Functioning & Disability\n│   ├── Body Functions (b codes)\n│   ├── Body Structures (s codes)\n│   └── Activities & Participation (d codes)\n└── Part 2: Contextual Factors\n    ├── Environmental Factors (e codes)\n    └── Personal Factors (不編碼)\n```\n\n**ICF codes 是依「功能領域」編排，不是依「疾病」**。\n\n### ICD 的分類邏輯\n\nICD 的組織原則：依**疾病與病因**編排\n- I00-I99：循環系統\n- J00-J99：呼吸系統\n- S00-T98：外傷\n- 等 22 章\n\n### 兩者的關係\n\n- **互補不重疊**\n- ICF ≠ ICD 的「功能版本」\n- **ICF 不需要依 ICD 編碼來選擇 codes**\n\n### (D) 為什麼錯誤？\n\n選項說「選擇合適其 ICD 編碼之功能性分項選單」\n\n**錯誤原因**：\n1. ICF 不依賴 ICD 編碼結構\n2. 使用 ICF Core Sets 是依**疾病**挑選，但那也不是「ICD 分項選單」\n3. ICF 本身的 hierarchy 是獨立的\n4. 此描述混淆了兩個分類系統\n\n**正確做法**：\n- 根據評估目的（疾病、情境、研究問題）選擇 ICF Core Set 或相關 codes\n- 不是「看 ICD 有什麼就選什麼」\n\n## ICF Core Sets（常考）\n\n### Comprehensive Core Set\n- 大量 codes（100-130+）\n- 研究、完整評估用\n- 例：中風 Comprehensive Core Set\n\n### Brief Core Set\n- 精簡版（15-20 codes）\n- 臨床快速評估\n- 例：中風 Brief Core Set\n\n### 常見疾病 Core Sets\n- **Stroke**（中風）\n- **Spinal cord injury (SCI)**\n- **Traumatic brain injury (TBI)**\n- **Low back pain (LBP)**\n- **Osteoarthritis (OA)**\n- **Rheumatoid arthritis (RA)**\n- **Breast cancer**\n- **Depression**\n- **Diabetes**\n- **Chronic pain**\n- **Obesity**\n- **Multiple sclerosis**\n- **Parkinson disease**\n- **Vocational rehabilitation**（職業復健）\n\n## ICF 在臨床應用範例\n\n### 中風病人使用 ICF Core Set\n\n**Body Functions**：\n- b110 Consciousness (0)\n- b114 Orientation (1)\n- b144 Memory (2)\n- b167 Mental functions of language (3)\n- b730 Muscle power (3)\n- b770 Gait pattern (3)\n\n**Body Structures**：\n- s110 Structure of brain (3)\n- s750 Structure of lower extremity (1)\n\n**Activities & Participation**：\n- d330 Speaking (2)\n- d450 Walking (3)\n- d510 Washing oneself (3)\n- d550 Eating (2)\n- d845 Acquiring, keeping a job (4)\n\n**Environmental Factors**：\n- e120+3 Products for mobility\n- e310+3 Support from immediate family\n- e410-1 Individual attitudes of family（負面）\n\n### 整合使用\n- **ICD-10**：I63.9 Cerebral infarction\n- **ICF Core Set**：如上述評分\n- 兩者併用 = 完整病人畫像\n\n## 台灣身心障礙 ICF 新制\n\n### 8 大類身心障礙（依 ICF 分類）\n1. 神經系統構造及精神、心智功能\n2. 眼、耳及相關構造與感官功能及疼痛\n3. 涉及聲音與言語構造及其功能\n4. 循環、造血、免疫與呼吸系統構造及其功能\n5. 消化、新陳代謝與內分泌系統相關構造及其功能\n6. 泌尿與生殖系統相關構造及其功能\n7. 神經、肌肉、骨骼相關構造及其功能\n8. 皮膚與相關構造及其功能\n\n### 評估組合\n- **鑑定人員（A類）**：醫師評估 body functions & structures\n- **訪談人員（B類）**：社工評估 activities & participation + environmental factors\n\n## 考點速記\n\n| 步驟 | 是否必要 |\n|---|---|\n| (A) 選擇 ICF 分類 | ✓ 必要 |\n| (B) 選擇功能性觀點 | ✓ 必要 |\n| (C) 選擇評估工具 | ✓ 必要 |\n| **(D) 依 ICD 編碼選功能分項** | **✗ 非必要** ★ |\n| (E) 選擇報告方法 | ✓ 必要 |\n\n**關鍵**：ICF 獨立於 ICD，不依賴 ICD 結構。",

      "detail": "**帕拉林匹克運動（Paralympic Sports）**\n\n## Paralympic Movement 概述\n\n### 歷史\n- **1948**：Ludwig Guttmann 於 Stoke Mandeville 舉辦脊髓損傷運動會（World War II 退伍軍人）\n- **1960**：第一屆 Paralympic Games（羅馬）\n- **IPC (International Paralympic Committee)**：1989 年成立，總部德國\n- 與奧運（IOC）同年、同地舉辦（自 1988 起）\n\n### 四大運動會（殘障運動）\n\n| 運動會 | 對象 |\n|---|---|\n| **Paralympics** | 10 種特定身體/智能障礙 |\n| **Deaflympics** | 聽覺障礙（≥ 55 dB 單耳好耳） |\n| **Special Olympics** | 智能障礙（IQ < 70 等） |\n| **Invictus Games** | 受傷退役軍人 |\n\n## Paralympic 10 種合格障礙（★ 核心考點）\n\n### Physical Impairments（8 類）\n\n#### 1. **Impaired muscle power**（肌力降低）\n- 脊髓損傷、脊髓灰質炎、脊髓裂\n- 臂叢神經損傷\n\n#### 2. **Impaired passive range of motion**（被動 ROM 受限）\n- 關節攣縮\n- 關節強直\n- 不含：hypermobility、單純關節痛\n\n#### 3. **Limb deficiency**（肢體缺失）\n- 截肢\n- 先天性肢體缺損\n\n#### 4. **Leg length difference**（下肢不等長）\n- 先天或後天 ≥ 7 cm\n\n#### 5. **Short stature**（身材矮小）★ 本題\n- **侏儒症、骨骼發育不全**\n- 男性 ≤ 145 cm\n- 女性 ≤ 137 cm\n\n#### 6. **Hypertonia**（張力過高）\n- 腦性麻痺、中風、TBI\n- 痙攣性\n\n#### 7. **Ataxia**（共濟失調）\n- 小腦疾患\n- MS\n- CP（ataxic type）\n\n#### 8. **Athetosis**（徐動）\n- CP（dyskinetic type）\n- 亨丁頓舞蹈症\n\n### Sensory Impairments（1 類）\n\n#### 9. **Visual impairment**（視覺障礙）\n- 分級：B1（完全失明）、B2、B3\n\n### Intellectual Impairments（1 類）\n\n#### 10. **Intellectual impairment**（智能障礙）\n- IQ ≤ 75\n- 發病於 18 歲前\n\n## 不列入 Paralympics 的障礙\n\n### 聽覺障礙 — (A) 錯誤\n- **Deafness 不是 Paralympic 類別**\n- **屬 Deaflympics**（獨立的世界級運動會，始於 1924 年）\n- IPC 曾考慮納入，但因聽障社群傾向維持 Deaflympics 獨立而未加入\n- 聽障運動員使用手語溝通、閃光信號而非聲音\n\n### 非永久性 / 未達標準的障礙\n\n| 選項 | 為何不符合 |\n|---|---|\n| **(A) 聽覺障礙** | 屬 Deaflympics，非 Paralympics |\n| **(B) 坐骨神經痛** | 非永久性、症狀波動、不符 10 類 |\n| (C) **Short stature** ★ | **符合第 5 類** |\n| **(D) 膝 OA** | 單純退化性疼痛、非永久結構/功能障礙 |\n| **(E) 血友病** | 內科疾病，非結構/功能障礙（凝血因子缺乏） |\n\n### 其他常見不符合的疾病\n- 疼痛症候群（CRPS, fibromyalgia）\n- 精神疾病（憂鬱、焦慮）\n- 癲癇（除非合併其他永久性障礙）\n- 氣喘\n- 糖尿病\n- 心臟病\n- 內分泌異常\n\n## IPC 分級系統（Classification）\n\n### 目的\n- 確保公平競賽\n- **Minimum Impairment Criteria (MIC)**：最低障礙程度\n- 每運動項目分級不同\n\n### 分級流程\n1. **Medical evaluation**：醫療評估\n2. **Technical assessment**：運動表現評估\n3. **Observation**：比賽觀察\n4. **Classification decision**：指定 sport class\n\n### 分級範例（田徑）\n- **T11-T13**：視障\n- **T20**：智能障礙\n- **T31-T38**：CP / hypertonia\n- **T40-T41**：短小\n- **T42-T47**：截肢\n- **T51-T54**：輪椅\n\n## Paralympic 運動項目\n\n### 夏季（22 項，2024 巴黎）\n- 田徑、游泳、自行車\n- 輪椅籃球、輪椅網球、輪椅橄欖球\n- 舉重、射擊、射箭\n- 盲人柔道、盲人足球\n- Boccia（地擲球）、坐式排球\n- 乒乓球、羽球、跆拳道\n- Goalball（盲人球類）\n- 馬術、划船、帆船、輪椅擊劍\n- 鐵人三項\n\n### 冬季（6 項）\n- 高山滑雪、越野滑雪\n- 雙板滑雪\n- 冰球、冬兩項（biathlon）\n- 輪椅冰壺\n\n## Paralympic 特殊醫學議題\n\n### 1. Autonomic Dysreflexia\n- SCI 選手\n- 有些選手**故意誘發**（boosting）提升表現\n- IPC **嚴禁 boosting**\n- 比賽前檢測血壓\n\n### 2. 體溫調節\n- SCI 選手汗腺功能差\n- 高溫/低溫環境特別注意\n\n### 3. 輪椅運動傷害\n- 肩部過度使用（RC tear, impingement）\n- 手腕病變（CTS）\n- 壓瘡\n\n### 4. 視障選手\n- Guide（嚮導）配合\n- 跑步中的 tether\n- 游泳 tapper\n\n## 台灣 Paralympic 表現\n\n- 中華隊參加 Paralympics 自 1976（多倫多）\n- 獎牌項目：射箭、舉重、柔道、桌球、田徑\n- 國訓中心左營基地訓練\n\n## 考點速記\n\n| Paralympic 10 類 | 備註 |\n|---|---|\n| Impaired muscle power | SCI, polio |\n| Impaired passive ROM | Contracture |\n| Limb deficiency | 截肢 |\n| Leg length difference | ≥ 7 cm |\n| **Short stature** ★ | M≤145, F≤137 cm |\n| Hypertonia | CP, stroke |\n| Ataxia | MS, CP |\n| Athetosis | CP dyskinetic |\n| Visual impairment | B1-B3 |\n| Intellectual impairment | IQ ≤ 75 |\n\n**不屬 Paralympics**：\n- Deaf（→ Deaflympics）\n- OA、sciatica（非永久結構障礙）\n- 內科疾病（血友病、糖尿病、心臟病）",

      "detail": "**運動禁藥：麻黃素類（Ephedrines）**\n\n## 麻黃素家族\n\n### 主要成員\n- **Ephedrine（麻黃鹼）**\n- **Methylephedrine（甲基麻黃鹼）** ★ 本題\n- Pseudoephedrine（偽麻黃鹼）\n- Phenylephrine\n\n### 藥理作用\n- **擬交感神經作用（sympathomimetic）**\n- 活化 α、β 腎上腺素受體\n- 促進 NE 釋放\n- 刺激 CNS\n\n### 效果\n- **中樞刺激**：警覺、反應時間\n- **心血管**：↑ HR、↑ BP\n- **支氣管擴張**\n- **鼻黏膜收縮**（減輕鼻塞）\n- **食慾抑制**\n\n## WADA 禁藥清單分類（2025）\n\n### Section S6: Stimulants（興奮劑）\n\n#### S6a: Non-Specified Stimulants（非特異性）\n- Amphetamines\n- Cocaine\n- Methamphetamine\n- **重度違規，處罰較重**\n\n#### S6b: Specified Stimulants（特異性）\n- **Ephedrine, Methylephedrine** ★\n- Pseudoephedrine\n- Strychnine\n- Cathine\n- Adrenaline（局部應用除外）\n- **較可能誤用、處罰相對較輕**\n\n### (A) 正確：Methylephedrine 屬 S6 特異性興奮劑\n\n## 尿液閾值（★ 考點）\n\n### WADA 2025 規定\n\n| 物質 | 閾值 |\n|---|---|\n| **Ephedrine** | **> 10 µg/ml** |\n| **Methylephedrine** | **> 10 µg/ml** ★ |\n| **Pseudoephedrine** | **> 150 µg/ml** |\n| **Cathine** | **> 5 µg/ml** |\n| Morphine | > 1.0 µg/ml |\n\n### (E) 正確：> 10 µg/ml\n\n### 閾值以下\n- 不視為違規\n- 允許治療用途\n- 超過才是禁藥陽性\n\n## 賽內 vs 賽外禁用（★）\n\n### (D) 正確：Methylephedrine 屬**賽內（In-competition）禁用**\n\n**In-competition**：\n- 自比賽前 12 小時至比賽結束及取樣採集期間\n- 興奮劑、麻醉劑、大麻類、糖皮質類固醇多屬此類\n- 賽外使用無違規\n\n**Out-of-competition（賽外）**：\n- 任何時候都禁用\n- 雄性激素、EPO、成長激素、血液興奮、基因興奮等\n\n## (B) 常見誤用來源\n\n### 常見含麻黃素成藥\n- **感冒藥**（cold medicine）★ 最常見\n- 支氣管擴張藥\n- 減充血劑（decongestants）\n- 中藥：**麻黃、麻黃湯、葛根湯、小青龍湯**\n\n### 台灣常見感冒藥含麻黃素\n- 斯斯感冒膠囊\n- 諾比舒冒\n- 普拿疼伏冒熱飲\n- 許多「中西合併」感冒藥\n\n### 防範建議\n- 運動員感冒**優先諮詢運動醫學科醫師**\n- 使用前確認成分\n- 使用 WADA Global DRO 查詢\n- 必要時申請 **TUE（Therapeutic Use Exemption）**\n\n## Strict Liability（嚴格責任原則）★ 本題核心\n\n### WADA Code 原則\n- **運動員對其體內物質負全責**\n- 不論來源：\n  - 醫師處方\n  - 教練指示\n  - 感冒藥誤用\n  - 營養補充劑污染\n  - 飲料、食物污染\n  - 第三方下毒（除非能證明）\n\n### (C) 為什麼錯誤？\n\n選項說「經過查證如果屬於誤用，則**不會被處罰**」\n\n**錯誤原因**：\n1. **嚴格責任**：誤用仍需負責\n2. 可能獲得**減刑**，但不會完全免除處罰\n3. WADA Code 第 10 條：\n   - **No Fault or Negligence**（極罕見，完全無過失）：可免除\n   - **No Significant Fault**（沒有重大過失）：減輕刑期\n   - 一般誤用：減刑不免刑\n\n### 減刑範圍\n- 原本 4 年禁賽\n- 若能證明「非故意」+ 「物質來自污染產品」：可減至**警告-2 年**\n- 特殊興奮劑（S6b）：可減至**警告-12 個月**\n- 若證明 **No Significant Fault**：1-2 年\n\n## 著名案例\n\n### 莊智淵案（2010）\n- 台灣桌球選手\n- 感冒藥含 methylephedrine\n- 被國際乒聯禁賽 4 個月\n- 展現「嚴格責任」即使誤用仍處罰\n\n### 孫楊案（2019）\n- 中國游泳選手\n- 破壞採樣瓶事件\n- 被 CAS 禁賽 8 年（後減 4 年 3 月）\n\n### Maria Sharapova 案（2016）\n- 服用 Meldonium（2016 新列入禁藥）\n- 聲稱不知已被禁用\n- 禁賽 2 年（後減 15 個月）\n\n## Therapeutic Use Exemption (TUE)\n\n### 適用情形\n- 運動員因醫療需求使用禁藥\n- 事先申請\n- 提供醫療證明\n\n### TUE 申請條件（4 項皆需滿足）\n1. **顯著健康損害** 若不使用\n2. **不會顯著提升表現**\n3. **無合法替代治療**\n4. **非治療前期禁藥使用所致**\n\n### 常見 TUE 適應\n- 氣喘（β2-agonist）\n- DM（insulin）\n- ADHD（stimulants）\n- Hypogonadism（testosterone）\n\n## 台灣藥檢機構\n\n### Taiwan Anti-Doping Agency (TADA)\n- 2014 年成立\n- 教育、檢測、管理\n- 查詢：https://www.antidoping.tw\n\n### 運動員查詢工具\n- **Global DRO**：國際禁藥查詢\n- **TADA 禁藥查詢**（台灣版）\n- **運動禁藥管制查詢系統**\n\n## 考點速記\n\n| 項目 | Methylephedrine |\n|---|---|\n| 分類 | **S6b 特異性興奮劑** |\n| 閾值 | **> 10 µg/ml** |\n| 禁用時機 | **In-competition** |\n| 常見誤用來源 | **感冒藥**、中藥 |\n| **誤用是否免責** | **否！** 嚴格責任 ★ |\n| 減刑依據 | No Significant Fault |",

      "detail": "**急性高山症（Acute Mountain Sickness, AMS）與 Acetazolamide 預防**\n\n## 高海拔疾病分類\n\n### 1. Acute Mountain Sickness (AMS)\n- 最常見、最輕\n- **海拔 > 2500 m** 即可發生\n- 症狀：頭痛 + 噁心/嘔吐、疲倦、頭暈、失眠\n- **Lake Louise Score**：評估嚴重度\n\n### 2. High-Altitude Cerebral Edema (HACE)\n- AMS 的重症化\n- **共濟失調（ataxia）**、意識改變\n- 可致命\n- 急需下撤 + dexamethasone\n\n### 3. High-Altitude Pulmonary Edema (HAPE)\n- 肺水腫\n- 咳嗽、粉紅色泡沫痰、呼吸困難\n- **殺人最快的高山症**\n- 急需下撤 + nifedipine / sildenafil + O₂\n\n## 玉山海拔與 AMS 風險\n\n- 玉山主峰：**3952 m**\n- 排雲山莊：**3402 m**\n- > 2500 m 即可能 AMS\n- 玉山屬**中高海拔**，多數人有症狀風險\n\n## Acetazolamide（Diamox）預防 AMS\n\n### 作用機轉\n- **碳酸酐酶抑制劑（Carbonic Anhydrase Inhibitor）**\n- 造成**代謝性酸中毒**\n- 身體代償性**過度通氣**\n- **增加 PaO₂，降低 PaCO₂**\n- 模擬已適應高海拔的狀態\n- 可促進自然 acclimatization\n\n### 標準預防劑量（成人）\n- **125-250 mg，口服，每日 2 次（BID）**\n- 小劑量 125 mg 與 250 mg 效果類似，副作用較少\n- 兒童：2.5 mg/kg BID（最大 125 mg）\n\n### 使用時機（★ 本題核心）\n\n**Wilderness Medical Society (WMS) 2019 指引**：\n\n- **開始時間：出發前 24 小時（前一天）**\n- **持續使用**：\n  - 抵達最高海拔後 **再服用 2-3 天**\n  - 或開始下降時停用\n\n### 為什麼選擇「前一天」？\n\n| 時機 | 評估 |\n|---|---|\n| 前一週 | 過早，無謂承受副作用，無額外效益 |\n| 前三天 | 偏早 |\n| **前一天** ★ | **WMS 標準建議** |\n| 有症狀才吃 | 屬「治療」而非「預防」 |\n| 登頂時吃 | 無法預防 |\n\n### 適用對象\n\n**建議預防使用**：\n- 海拔攀升 > 500 m/day（高於 3000 m 時）\n- 前往 > 3500 m 睡眠海拔\n- **有 AMS 病史**\n- 快速攀升（飛機直達高海拔）\n- 合併 COPD、心臟病、懷孕（依個別評估）\n\n**不需常規預防**\n- 緩慢階段性攀升\n- 已適應高海拔者\n- 無 AMS 病史、海拔 < 2500 m\n\n## 副作用\n\n### 常見\n- **感覺異常（paresthesia）**：手指、腳趾刺麻感 ★\n- **多尿**（利尿作用）\n- **口渴**\n- **碳酸飲料變難喝**（碳酸酐酶抑制）\n- 疲倦\n- 噁心\n\n### 少見但重要\n- 代謝性酸中毒（特別腎病患）\n- 低血鉀\n- 腎結石（長期使用）\n- 對磺胺過敏者可能交叉過敏\n\n### 禁忌\n- **磺胺過敏**（sulfa allergy）\n- 肝硬化\n- 嚴重腎功能不全\n- 孕婦（相對禁忌）\n\n## 其他 AMS 預防策略\n\n### 非藥物（最重要！）\n\n#### 1. 漸進式攀升（Gradual ascent）★ 最有效\n- **> 3000 m 以上，每日睡眠海拔上升 ≤ 500 m**\n- 每上升 1000 m 休息 1 天\n- 「Climb high, sleep low」原則\n\n#### 2. 充足水分\n- 每日 3-4 L\n- 避免脫水\n\n#### 3. 避免過度用力\n- 第一天放慢\n- 高海拔不可過度運動\n\n#### 4. 避免酒精、鎮靜劑\n- 壓抑呼吸\n\n#### 5. 高碳水化合物飲食\n- 降低呼吸熵\n- 有助代謝適應\n\n### 藥物\n\n#### (a) Acetazolamide（首選）\n- 125-250 mg BID\n- 出發前一天開始\n\n#### (b) Dexamethasone\n- **不促進 acclimatization**\n- 4 mg Q6H 或 8 mg Q12H\n- 用於：對 acetazolamide 過敏者、快速攀升\n- 停藥後可能反彈 AMS\n\n#### (c) Ibuprofen\n- 對單純頭痛預防有效\n- 600 mg Q8H\n- 較新的研究支持\n\n#### (d) Ginkgo biloba（銀杏）\n- 證據不一致\n- 不建議常規使用\n\n## AMS 治療\n\n### 輕度 AMS\n- 停止攀升\n- 休息、水分\n- NSAIDs（頭痛）\n- **Acetazolamide 250 mg BID 治療**\n- 如症狀改善，隔日可續行\n\n### 中重度 AMS\n- **立即下降**（最有效）\n- O₂ 補充（目標 SpO₂ > 90%）\n- Acetazolamide + Dexamethasone\n- 嚴重者：高壓氧艙（Gamow bag）\n\n### HACE\n- **立即下降！**\n- **Dexamethasone 8 mg IV/PO, then 4 mg Q6H**\n- O₂\n- 高壓氧艙\n\n### HAPE\n- **立即下降！**\n- O₂\n- **Nifedipine 30 mg ER PO BID** 或 **Sildenafil 50 mg PO Q8H**\n- 避免過度用力\n- 高壓氧艙\n\n## Lake Louise AMS Score\n\n| 項目 | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| 頭痛 | 無 | 輕微 | 中度 | 嚴重 |\n| 腸胃症狀 | 無 | 食慾差 | 噁心/嘔吐 | 嚴重 |\n| 疲倦 | 無 | 輕微 | 中度 | 嚴重無法活動 |\n| 頭暈/暈眩 | 無 | 輕微 | 中度 | 嚴重 |\n\n- **總分 ≥ 3 + 頭痛 = AMS**\n- **≥ 6 分：嚴重 AMS**\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| **Acetazolamide 開始時間** | **出發前 24 小時（前一天）** ★ |\n| 劑量 | 125-250 mg BID |\n| 持續時間 | 抵達最高後 2-3 天或開始下降 |\n| 機轉 | 代謝性酸中毒 → 過度通氣 |\n| 副作用 | 感覺異常、多尿、碳酸飲料難喝 |\n| 禁忌 | 磺胺過敏、肝硬化 |\n| **最有效 AMS 預防** | **漸進攀升**（非藥物） |\n| HAPE 治療 | 下降 + nifedipine |\n| HACE 治療 | 下降 + dexamethasone |",

      "detail": "**高地訓練（Altitude Training）**\n\n## 生理原理\n\n### 低壓低氧刺激\n- 海拔 ↑ → 大氣壓 ↓ → 肺泡 PO₂ ↓ → 動脈血 O₂ ↓\n- 腎臟偵測 → 釋放 **Erythropoietin (EPO)**\n- 骨髓增生紅血球\n- 結果：\n  - **紅血球數量 ↑**\n  - **血紅素 ↑**\n  - **血液攜氧量 ↑**\n  - 理論上有氧運動表現提升\n\n### 其他適應\n- 微血管密度 ↑\n- 粒線體 ↑\n- 肌紅蛋白 ↑\n- 2,3-DPG ↑（血紅素釋氧曲線右移）\n- 換氣量 ↑\n- 緩衝能力 ↑\n\n## 高地訓練的有效條件（★ 本題核心）\n\n### 1. 高度閾值\n- **< 2000 m**：EPO 反應**不顯著**\n- **2000-3000 m**：**最佳範圍**（足夠刺激，副作用可接受）\n- **> 3000 m**：刺激強，但副作用多（睡眠差、免疫下降、肌肉流失、恢復困難）\n- **> 4000 m**：不推薦長期訓練\n\n### 2. 時間閾值\n- **< 2 週**：EPO 上升但血紅素未顯著增加\n- **2-3 週**：開始看到血液學變化\n- **3-4 週以上**：**有意義的紅血球增加**\n- **典型方案：3-6 週**\n\n### 3. 海拔 × 時間乘積\n- 部分研究使用「**km-hrs**」單位\n- 通常需 **> 300-400 km-hrs** 才有效\n- 2500 m × 3 週 ≈ 1260 km-hrs（足夠）\n- 2000 m × 1 週 ≈ 336 km-hrs（剛好達最低閾值）\n\n## 各選項分析\n\n### (A) 2000 m × 1 週\n- 高度：**閾值邊緣**（剛好達 2000 m）\n- 時間：1 週 = 7 天（較短，但在所給選項中最長）\n- km-hrs：336（剛好達最低閾值）\n- **所給選項中，最接近「有效」的組合**\n- 實際臨床效果有限，但比其他選項都更接近標準\n\n### (B) 3000 m × 3 天\n- 高度足夠，但**時間太短**\n- EPO 會上升但 RBC 來不及增加\n- 且高度過高可能造成急性高山症\n\n### (C) 2500 m × 3 天\n- 高度剛好，**時間太短**\n- 同上\n\n### (D) 1500 m × 1 週\n- **高度不夠**（< 2000 m）\n- 無顯著 EPO 反應\n- 對 RBC 增加無效\n\n### (E) 4000 m × 2 天\n- 高度過高\n- 時間過短\n- 可能誘發急性高山症\n- 對訓練無效\n\n**→ 最佳答案是 (A)**，雖不理想但在所給選項中最接近有效條件。\n\n## 高地訓練四大模式\n\n### 1. Live High, Train High (LHTH)\n- 居住 + 訓練皆高地\n- **傳統**模式\n- 優點：完全高地刺激\n- 缺點：\n  - 訓練強度受限（低氧難以承受高強度）\n  - 肌肉質量可能流失\n- 適合：中長距離有氧運動\n\n### 2. Live High, Train Low (LHTL) ★ 現代黃金標準\n- **居住高地，下山訓練**\n- Levine & Stray-Gundersen 1997 經典研究\n- 優勢：\n  - 獲得紅血球刺激\n  - 保持訓練強度\n- 缺點：需要可行的地理位置\n- 實例：\n  - 美國猶他州 Deer Valley（2500 m 住 + 下山訓）\n  - 肯亞 Iten（高地訓練聖地）\n\n### 3. Live Low, Train High (LLTH) / Intermittent Hypoxic Training (IHT)\n- 低地住，特定訓練時間用低氧\n- 低氧帳篷、低氧房\n- 彈性高\n- 效果不如 LHTL\n\n### 4. Intermittent Hypoxic Exposure (IHE)\n- 短時間（1-2 小時/天）暴露於低氧\n- 證據有限\n- 不是主流\n\n## 高地訓練注意事項\n\n### 時序安排\n- 比賽前 **2-3 週下山**（讓 RBC 效益顯現）\n- 下山後**短暫表現下降**（1-2 天 re-adaptation）\n- **2-3 週內比賽**效果最佳\n- 效益維持約 **3-4 週**\n\n### 上山前準備\n- 鐵質儲備**必須充足**（ferritin > 50 ng/ml）\n  - 鐵不足 → RBC 無法增加\n- 健康狀態評估\n- 預防性藥物（acetazolamide）考量\n\n### 上山期間\n- 監測：\n  - 體重（防肌肉流失）\n  - 睡眠\n  - 心跳（morning HR）\n  - SpO₂\n  - 血液學（Hb, Hct, reticulocytes）\n- 適度訓練強度\n- 充足營養\n- 水分（3-4 L/day）\n- 充足休息\n\n### 常見問題\n- 上呼吸道感染\n- 失眠\n- 食慾下降\n- 肌肉質量流失\n- 訓練 quality 下降\n\n## Altitude vs Hypoxic Chamber\n\n| 方式 | 優點 | 缺點 |\n|---|---|---|\n| **真高地** | 完整刺激、心理效益 | 地理限制、安全 |\n| **常壓低氧** | 彈性、可控 | 缺少低壓成分 |\n| **低壓低氧艙** | 接近真實 | 昂貴、稀少 |\n\n## 高地訓練的個別差異\n\n### Responders vs Non-responders\n- 約 **1/3 運動員無顯著反應**\n- 可能原因：\n  - 基因差異（EPO 受體）\n  - 鐵代謝差異\n  - Baseline 狀態\n  - 訓練負荷\n\n### 性別差異\n- 女性可能反應較強\n- 月經相關的鐵代謝影響\n\n## WADA 相關\n\n### 高地訓練合法\n- Chronic altitude exposure 不違反 WADA 規範\n- Altitude tents / hypoxic chambers 也合法\n\n### 相關禁用\n- **EPO 注射**：禁用（S2 類）\n- **血液興奮（blood doping）**：禁用\n- 自體輸血：禁用\n- Xenon、argon gases：2014 曾加入禁用清單\n\n## 考點速記\n\n| 高地訓練條件 | 最佳範圍 |\n|---|---|\n| **高度** | **2000-2500 m** |\n| **時間** | **3-4 週以上** |\n| 模式首選 | **Live High, Train Low (LHTL)** |\n| 下山比賽 | 2-3 週內 |\n| 上山前 | 鐵儲備充足 |\n| 主要效應 | **RBC↑、Hb↑、VO₂max↑** |\n| 反應比例 | 約 2/3 有反應 |",

      "detail": "**前十字韌帶（ACL）損傷與重建術後復健**\n\n## ACL 損傷機轉 — (A) 錯誤\n\n### 最常見機轉（★ 考點）\n\n**Non-contact mechanism（非接觸性）**：佔 70-80%\n- **Valgus（外翻）+ internal rotation + 減速**\n- **Deceleration + pivot（切入轉向）**\n- 落地姿勢不良（膝外翻、膝蓋內扣）\n- 急停（cutting）\n- 不平穩著地\n\n### 典型場景\n- 籃球跳投落地\n- 足球切入轉向\n- 滑雪摔倒\n- 排球扣殺落地\n- 網球急停\n\n### Contact mechanism（接觸性）：20-30%\n- 直接被撞擊膝外側 → 外翻力\n- 少見 hyperextension 或 varus（內翻）單獨造成\n\n### (A) 為什麼錯誤？\n\n選項說「**過度伸展**損傷，或**膝內翻**撞擊」\n\n**錯誤原因**：\n1. **機轉方向顛倒**：最常見是**外翻（valgus）+ 旋轉**，不是內翻（varus）\n2. Hyperextension 單獨造成 ACL 傷害**不是主要機轉**\n3. 正確說法：「減速 + 切入 + 膝外翻」\n\n## 女性 ACL 傷害風險 2-8 倍於男性\n\n### 原因\n- 解剖：Q-angle 較大、髁間切跡較窄\n- 荷爾蒙：estrogen 影響韌帶鬆弛度\n- 生物力學：落地姿勢差異\n- 肌力：hamstring 相對弱、股四頭肌主導\n- 本體感覺差異\n\n## 臨床診斷\n\n### 典型病史\n- 「pop」聲\n- 立即腫脹（關節內出血）\n- 無法繼續運動\n- 膝關節不穩定感\n\n### 理學檢查（按敏感度）\n- **Lachman test**（最敏感）\n- **Pivot shift test**（最特異）\n- **Anterior drawer test**\n\n### 影像\n- **MRI**：gold standard\n- X-ray：排除骨折，可見 Segond fracture（外側脛骨撕裂骨折 = 病理徵象）\n\n## ACL 重建手術\n\n### 適應\n- 年輕活躍\n- 職業運動員\n- 慢性不穩定\n- 合併半月板或軟骨損傷需修補\n- 可選擇保守治療者：老年、活動量低、單純 ACL\n\n### 移植物選擇\n- **BPTB（骨-髕腱-骨）**：傳統標準\n- **Hamstring tendon**（STG）：近年常用\n- **Quadriceps tendon**\n- **Allograft**：老年、revision\n\n### 手術時機\n- 急性期 3-6 週後（arthrofibrosis 風險低）\n- 先物理治療恢復 ROM 再手術\n\n## 術後復健時程（★ 本題考點）\n\n### 現代加速復健協議（ACL Accelerated Rehabilitation）\n\n### Phase 1：術後 0-2 週\n\n**重點**：\n- **立即部分負重**（toe-touch WB → partial WB）→ (C) 錯誤！\n- **被動伸展優先**（防屈曲攣縮）→ (B) 錯誤！\n- 維持完全伸展（0°）\n- 主動輔助屈曲至 90°\n- 冰敷、壓迫\n- 股四頭肌等長收縮（quad set）\n- 直腿抬舉（SLR）\n- 踝幫浦\n\n### Phase 2：2-6 週\n\n- 完全負重（FWB）\n- ROM 0-125°\n- **閉鎖鏈運動為主**（CKC）：\n  - Squat 0-45°\n  - Leg press\n  - Step-ups\n- **避免 OKC 末端伸展**（0-30° 剪力最大）→ (D) 錯誤！\n- 本體感覺訓練\n\n### Phase 3：6-12 週\n\n- ROM 接近全範圍\n- 功能性訓練\n- 輕度跑步（12 週起）\n- 繼續漸進阻力\n\n### Phase 4：3-6 個月\n\n- 跑步、agility\n- 單腳運動\n- 跳躍訓練\n- 專項運動訓練\n\n### Phase 5：回到運動\n\n- **6-9 個月以上** ★ 本題核心\n- 通過 Return-to-Sport (RTS) 測試\n\n## (B) 為什麼錯誤？\n\n選項說「術後第一天...著重**被動屈曲 + 主動伸展**」\n\n**錯誤原因**：\n- 術後早期最擔心**屈曲攣縮**（flexion contracture）\n- 應該**被動伸展優先**（防止膝無法完全伸直）\n- **主動屈曲**（或主動輔助）是次要\n- 完全伸展（0°）比完全屈曲更重要（步態影響大）\n\n**正確做法**：\n- Day 1：被動伸展、quad set、SLR、踝幫浦、冰敷\n- 漸進式主動協助屈曲至 90°（1-2 週內）\n\n## (C) 為什麼錯誤？\n\n選項說「**2 星期才開始部分負重**」\n\n**錯誤原因**：\n- **現代加速復健**：**術後立即**即可部分負重\n- 大多數 ACL 重建（含半月板修補後）可立即 toe-touch → partial → full WB\n- 不需等 2 週\n\n## (D) 為什麼錯誤？（★ 重要概念）\n\n選項說「末端 30° (0-30°) OKC 股四頭肌伸展訓練...降低重建韌帶剪力」\n\n**錯誤原因**：\n\n### OKC 末端伸展的力學分析\n\n| 膝屈曲角度 | OKC 伸展（坐姿伸膝）的 ACL 剪力 |\n|---|---|\n| **0-30°** | **剪力最大** ★ |\n| 30-60° | 中等 |\n| > 60° | 最小 |\n\n**原因**：\n- 膝接近伸直時，股四頭肌的拉力向前拉脛骨\n- 產生 **anterior tibial translation**\n- ACL 必須對抗此力 → 重建韌帶承受高剪力\n\n### 正確復健建議\n\n- **避免 OKC 末端伸展（0-30°）於術後 3-6 個月內**\n- 可做 OKC 於 60-90°（剪力較小）\n- **首選 CKC 運動**：\n  - CKC 中，承重壓力讓股四頭與膕繩肌共同收縮\n  - **降低 ACL 剪力**\n  - 例：squat, leg press\n\n## (E) 為什麼正確？\n\n### 回到運動的時機（Return to Sport, RTS）\n\n**傳統建議**：6 個月\n\n**現代證據**：\n\n#### Grindem et al. 2016 BJSM（KANON 世代研究）\n- **每延遲 1 個月 RTS**，再傷率 **降低 51%**\n- **9 個月後** RTS：再傷率顯著下降\n- 整合功能測試 + 時間，效果更佳\n\n#### Kyritsis et al. 2016 BJSM\n- 未通過 RTS 測試 → 再傷率**高 4 倍**\n- 通過測試 → 再傷率僅 5.6%\n- 未通過 → 22%\n\n### RTS 標準（2016 BJSM 共識）\n\n1. **時間 ≥ 9 個月**\n2. **Quadriceps strength 對稱性（LSI）≥ 90%**\n3. **Hamstring strength LSI ≥ 90%**\n4. **Hop tests LSI ≥ 90%**（Single, triple, cross-over, 6-m timed）\n5. **KOOS（或 IKDC）主觀評分佳**\n6. **心理準備**（ACL-RSI ≥ 65）\n\n### 功能測試套組\n- Single leg hop\n- Triple hop\n- Cross-over hop\n- 6-m timed hop\n- Y-balance test\n- Drop vertical jump（生物力學分析）\n\n## 再次受傷率（Re-injury Risk）\n\n### 統計\n- **同側再斷裂率**：6-20%\n- **對側 ACL 斷裂率**：10-25%\n- **複合 re-injury率**：高達 30%（2 年內）\n\n### 高風險族群\n- 年輕（< 25 歲）\n- 女性\n- 早期回運動（< 9 個月）\n- 未通過功能測試\n- 專項運動需求高\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 最常機轉 | **Non-contact, valgus + rotation** |\n| 術後 Day 1 | **被動伸展 + quad set** |\n| 負重 | **立即部分負重** |\n| **OKC 末端伸展** | **0-30° 剪力最大，應避免** ★ |\n| **回到運動時間** | **≥ 9 個月** ★ |\n| RTS 標準 | 時間 + 肌力對稱性 + hop tests + 心理 |\n| 再傷率 | 同側 6-20%、對側 10-25% |",

    "explanation": {
      "summary": "(B) 錯誤。**WADA 2025 禁藥清單新增：Tramadol（曲馬多）正式列入 S7 類麻醉劑，在「In-competition」期間禁用**。這是 2024 年 1 月起生效的重大變動（醞釀多年後正式實施）。Tramadol 曾被自行車、足球等項目濫用（止痛提升耐力），WADA 經長期監測（Monitoring Program）後決定禁用。",
      "detail": "**WADA 2025 禁藥規範重點**\n\n## WADA 2025 清單結構\n\n### 任何時候禁用（Prohibited at All Times）\n\n- **S0**: 非核准物質\n- **S1**: 同化製劑（Anabolic agents）\n- **S2**: 胜肽荷爾蒙、生長因子、相關物質、擬激物質（EPO 類）\n- **S3**: Beta-2 agonists（特定例外）\n- **S4**: 荷爾蒙調節劑（aromatase inhibitors, SERMs）\n- **S5**: 利尿劑與遮罩劑\n- **M1**: 血液操作（blood doping）\n- **M2**: 化學物理操作\n- **M3**: 基因與細胞操作\n\n### 僅賽內期禁用（In-competition only）\n\n- **S6**: 興奮劑\n- **S7**: 麻醉劑（**含 Tramadol 2024 起**）★\n- **S8**: 大麻類\n- **S9**: 糖皮質類固醇\n\n### 特定運動禁用（Particular Sports）\n\n- **P1**: Beta-blockers（射箭、射擊、高爾夫等需要穩定的項目）\n\n## 2025 年重要變動（★ 本題核心）\n\n### 1. Tramadol 正式列入 S7 禁藥 — (B) 錯誤\n\n**歷史**：\n- 2011-2022：列入 **Monitoring Program**（監測計畫）\n- 發現運動員濫用（特別自行車、足球）\n- 2019：WADA 宣布將納入禁用\n- **2024 年 1 月 1 日生效**\n- 2025 繼續禁用\n\n**為什麼禁？**\n- **強效止痛** → 掩蓋疼痛繼續運動\n- 提升耐力表現\n- 研究顯示影響運動表現\n- 濫用風險高（成癮性）\n- 副作用：昏睡、頭暈 → 運動員跌倒、自行車賽事故\n\n**規範**：\n- **In-competition 禁用**\n- Out-of-competition 可用\n- 賽前 **24 小時**需停用（藥物半衰期考量）\n\n### 2. 血漿捐贈 — (A) 正確\n\n**M1: Blood Doping 條文**：\n- 禁止：自體、同種、異種輸血\n- 禁止：血紅素 artificially enhance 的化學品\n- **允許：在註冊血液/血漿中心的標準捐贈**\n  - 運動員可**合法捐血**\n  - 包括 plasmapheresis（血漿分離術）\n  - 不違反規範\n\n## 各選項分析\n\n### (A) 血漿捐贈 ★ 正確\n\n**WADA 2025 明確條文**：\n- **註冊血液中心**的標準捐贈程序是允許的\n- Plasmapheresis（血漿置換術）捐贈\n- 不影響比賽資格\n\n### (B) Tramadol ★ 本題答案（錯誤）\n\n- 2024 起 **In-competition 禁用**\n- 不再允許在比賽期使用\n\n### (C) Pethidine — 正確（禁用）\n\n**S7: 麻醉劑（Narcotics）** 包括：\n- Fentanyl\n- Heroin\n- **Hydromorphone**\n- **Methadone**\n- Morphine\n- **Oxycodone**\n- **Oxymorphone**\n- **Pentazocine**\n- **Pethidine**（配西汀）★\n- **Tramadol**（2024 新增）\n\n**所有 S7 物質 In-competition 禁用**。\n\n**注意例外**：\n- **Codeine**（可待因）：**不在 S7**（在監測）\n- **Dextromethorphan**（右美沙芬）：**不在禁藥**\n- 一般鎮痛 OTC 多允許\n\n### (D) Glucocorticoids 關節注射 — 正確\n\n**S9: Glucocorticoids（2022 改版）**：\n\n**禁止途徑（In-competition）**：\n1. **口服（oral）**\n2. **靜脈（IV）**\n3. **肌肉注射（IM）**\n4. **直腸（rectal）**\n5. **關節內注射（intra-articular）** ★\n6. **硬膜外（epidural）**\n7. **軟組織注射（periarticular/peritendinous）**\n\n**允許途徑（In-competition）**：\n- **局部用途（topical）**：\n  - **Inhaled**（吸入）\n  - **Intranasal**（鼻噴） ★\n  - **Ophthalmic**（眼用）\n  - **Otic**（耳用）\n  - **Dental**（牙用）\n  - **Dermatological**（皮膚用）\n\n### 過往 vs 現在\n- **2022 前**：部分 injection 途徑允許\n- **2022 起**：**所有注射途徑 In-competition 禁用**\n- 關節注射後需清除期（washout period）：\n  - **Triamcinolone**：30 天\n  - **Betamethasone, Dexamethasone**：5 天\n  - **Methylprednisolone**：5 天\n  - **Prednisone, prednisolone**：3 天\n\n### (E) 經鼻類固醇 ★ 正確\n\n- 鼻噴類固醇（如 Flunisolide, Budesonide, Mometasone）\n- 屬 **topical** 途徑\n- **In-competition 允許**\n- 適應：過敏性鼻炎、鼻竇炎\n- **不需 TUE**\n\n## WADA 禁藥測試實務\n\n### Sample 分類\n\n- **Urine**：最常見\n- **Blood**：ABP（運動員生物護照）、EPO、GH 檢測\n\n### 檢測時機\n\n- **In-competition**：比賽前 12 小時至比賽結束取樣\n- **Out-of-competition**：任何時間\n- **Biological Passport**：長期監測\n\n### 違規後果\n\n- 第一次陽性（non-specified）：**4 年禁賽**\n- 第一次陽性（specified）：**2 年禁賽**（可減至 1 年）\n- 故意使用可加重\n- 第二次違規：**8 年至終身**\n\n## TUE（Therapeutic Use Exemption）\n\n### 適用情形\n\n- 運動員因醫療需求使用禁藥\n- 需**事先申請**（急診例外可事後補）\n\n### 四大條件\n\n1. **顯著健康損害** 若不使用\n2. **不會顯著提升表現**\n3. **無合法替代治療**\n4. **非治療前期禁藥使用所致**\n\n### 常見 TUE 藥物\n\n- **氣喘**：β2-agonist（超過每日限量）\n- **DM**：Insulin（S5）\n- **ADHD**：Amphetamines, Methylphenidate\n- **Hypogonadism**：Testosterone\n- **癌症治療**：化療、類固醇\n- **關節炎**：特殊 DMARD\n\n## 台灣案例（Tramadol 相關）\n\n- 2024 起生效後，國內賽事藥檢需特別注意\n- 運動醫學科醫師需提醒運動員\n- 術後止痛改用其他非禁藥\n\n## Monitoring Program（監測清單）\n\n### 2025 監測中（尚未禁用）\n\n- **Bupropion**（抗憂鬱）\n- **Caffeine**（咖啡因）\n- **Nicotine**\n- **Phenylephrine**\n- **Pipradrol**\n- **Synephrine**\n- **Codeine**\n- **2-amino-4-methylhexane**\n- **Ecdysterone**\n\n**注意**：\n- Caffeine 過去曾禁用，1988 起解禁\n- 若濫用徵象明顯，可能被重新禁用\n\n## 考點速記\n\n| 物質/途徑 | 2025 規範 |\n|---|---|\n| **Tramadol** | **In-competition 禁用**（2024 新增）★ |\n| **Pethidine** | In-competition 禁用 |\n| Codeine | 不在禁藥（監測） |\n| **Glucocorticoids 所有注射** | **In-competition 禁用**（2022 起） |\n| **Intranasal glucocorticoids** | **允許** |\n| Inhaled glucocorticoids | 允許 |\n| 血漿捐贈（註冊中心） | **允許** |\n| 自體輸血 | 禁用 |\n| EPO | 禁用（S2） |\n| Salbutamol | ≤ 1600 mcg/24h 允許 |",

      "detail": "**WADA Glucocorticoids 禁藥規範（S9 類）**\n\n## 2022 新制重點\n\n### 禁用範圍擴大\n- **2022 年起，所有注射途徑的 glucocorticoids 在賽內期（in-competition）全面禁用**\n- 包括：口服、IV、IM、**肌肉注射、關節注射、硬膜外、軟組織注射**\n- 允許：局部應用（吸入、鼻噴、眼/耳/牙/皮膚）\n\n### Washout Periods（清除期）★ 本題核心\n\nWADA 2022 公布的 **minimum washout periods**（最短需停藥時間，以確保尿檢陰性）：\n\n| 藥物 | 途徑 | Washout Period |\n|---|---|---|\n| **Triamcinolone acetonide** | **任何注射** | **30 天** ★★ |\n| **Betamethasone** | IM, IV, 關節 | **5 天** |\n| **Dexamethasone** | IM, IV, 關節 | **5 天** |\n| **Methylprednisolone** | IM, IV, 關節 | **5 天** |\n| **Prednisolone / Prednisone** | IM, IV, 口服 | **3 天** |\n| **Hydrocortisone** | IM, IV | **3 天** |\n\n## 為什麼 Triamcinolone 的 washout 時間這麼長？\n\n### 藥物動力學差異\n- **Triamcinolone acetonide** 是**微溶性長效製劑**\n- 肌肉注射後**緩慢釋放**\n- 在組織中可儲存數週至數月\n- 尿液中仍可被偵測到相當長時間\n- 半衰期：局部組織內可達 **12-36 週**\n\n### 著名歷史案例\n- **Bradley Wiggins（環法冠軍）**：2011-2013 年間使用 triamcinolone（透過 TUE）\n- 2016 Fancy Bears 駭客事件曝光後引發爭議\n- 促成 WADA 檢討類固醇規範\n- **2022 年起 triamcinolone 列為最嚴格清除期的藥物**\n\n## 本題情境分析\n\n### 病人設定\n- 田徑選手\n- **1 個月後（約 30 天）**比賽\n- 現在肌肉注射\n- 問：哪種最可能違反賽內規範？\n\n### 逐項評估\n\n| 藥物 | Washout | 1 個月（30 天）後尿檢是否陽性？ |\n|---|---|---|\n| Betamethasone | 5 天 | 陰性（早已清除） |\n| Dexamethasone | 5 天 | 陰性 |\n| **Triamcinolone** ★ | **30 天** | **邊緣值，極可能陽性** ★ |\n| Methylprednisolone | 5 天 | 陰性 |\n| Prednisolone | 3 天 | 陰性 |\n\n**答案：(C) Triamcinolone**\n\n### 為什麼 30 天剛好危險？\n- Triamcinolone washout = 30 天\n- 個體差異可能 25-35 天\n- 藥物代謝因素：\n  - 劑量越高，清除時間越長\n  - 注射部位（關節比肌肉更慢）\n  - 個人代謝速率\n  - 水分攝取、腎功能\n- 「1 個月後」的時間點風險最高\n\n## 糖皮質類固醇的常見運動醫學應用\n\n### 臨床情境\n- 肌腱炎、bursitis 局部注射\n- 關節注射（OA, RA）\n- 硬膜外注射（腰椎神經根痛）\n- 系統性疾病（RA flare）\n- 過敏反應\n\n### 選擇原則\n- **長效、緩釋製劑**：triamcinolone\n- **短效**：betamethasone、hydrocortisone\n- **中效**：methylprednisolone\n\n## WADA S9 類完整規範（2025）\n\n### 賽內禁用途徑\n- **口服**（oral）\n- **肛門**（rectal）\n- **IV / IM**\n- **關節內注射**（intra-articular）\n- **硬膜外**（epidural）\n- **軟組織注射**（periarticular, peritendinous）\n\n### 允許途徑（Topical）\n- **Inhaled**（吸入）：治療氣喘\n- **Intranasal**（鼻噴）：過敏性鼻炎\n- **Ophthalmic**（眼用）\n- **Otic**（耳用）\n- **Dental**（牙用）\n- **Dermatological**（皮膚用）\n- **Intralesional skin**（皮內）\n\n### 需要 TUE 的情況\n- 賽內期不得不使用禁用途徑\n- 事先申請 Therapeutic Use Exemption\n- 需證明：醫療必要性、無合法替代治療\n\n## 臨床建議（給運動醫學科醫師）\n\n### 賽前處方注意事項\n\n1. **確認比賽時間**\n   - 距離比賽時間\n   - 類固醇 washout 期\n\n2. **選擇最短半衰期**\n   - 若需要 local injection，優先 betamethasone 或 dexamethasone\n   - **避免 triamcinolone**（除非必要）\n\n3. **書面記錄**\n   - 注射日期、劑量、部位\n   - 若需 TUE 即時申請\n\n4. **運動員教育**\n   - 告知 washout period\n   - 禁用與允許途徑\n   - 標示藥物\n\n5. **考慮替代治療**\n   - PRP\n   - Prolotherapy\n   - 物理治療\n   - 非類固醇抗發炎藥\n\n## 考點速記\n\n| Glucocorticoid Washout 排序 | 天數 |\n|---|---|\n| **Triamcinolone acetonide** | **30 天** ★★ |\n| Betamethasone | 5 天 |\n| Dexamethasone | 5 天 |\n| Methylprednisolone | 5 天 |\n| Prednisolone / Prednisone | 3 天 |\n| Hydrocortisone | 3 天 |\n\n**記憶口訣**：「Triamcinolone = 30 天，其他都是一週內」",

      "detail": "**脊髓損傷與阻塞性睡眠呼吸中止症（SCI + OSA）**\n\n## SCI 病人 OSA 的流行病學 — (B) 正確\n\n### 盛行率\n- **一般成人**：4-9%（OSA）\n- **SCI 病人**：**50-60%** ★\n- 高達一般人群的 **10 倍**\n- 四肢癱瘓（tetraplegia）風險更高\n\n### 為什麼 SCI 容易合併 OSA？\n\n#### 1. 呼吸肌無力\n- 頸椎 SCI 影響橫膈、肋間肌、腹肌\n- 上呼吸道支撐肌力下降\n- 失去呼氣、咳嗽的力量\n\n#### 2. 上呼吸道解剖改變\n- 頸部僵硬、變形\n- 長期仰臥睡姿\n- 中央脂肪分佈改變\n\n#### 3. 神經支配異常\n- 舌下神經、喉返神經支配的上呼吸道肌肉\n- 可能因自主神經失調影響肌張力\n\n#### 4. 體位\n- 多數 SCI 病人**習慣仰睡**（仰姿較易翻身護理）\n- 仰臥使舌根後墜、上呼吸道狹窄\n\n#### 5. 體重變化\n- 運動量減少 → 肥胖\n- 肌肉轉換為脂肪組織\n- 頸圍增加\n\n#### 6. 藥物使用 ★ 本題關鍵\n- **抗痙攣藥物**（Baclofen, Tizanidine, Benzodiazepines）\n- **鎮痛藥**（opioids, gabapentin）\n- **鎮靜劑**\n\n## OSA 的全身影響 — (A) 正確\n\n### 急性生理變化\n- 間歇性低氧（IH）\n- CO₂ 滯留\n- 睡眠片段化\n- **交感神經過度活化**\n- 血壓夜間升高（non-dipper）\n- 心律不整\n\n### 慢性影響\n- **白天嗜睡**（EDS）\n- **高血壓**\n- **肺高壓**\n- **冠心病、心肌梗塞**\n- **中風**\n- 認知障礙、憂鬱\n- 代謝症候群、糖尿病\n- 死亡率增加\n\n## OSA 危險因子 — (C) 正確\n\n### 一般人群\n- **肥胖**（BMI ≥ 30）\n- 男性\n- 年齡 40-70\n- **頸圍大**（男 > 17 吋、女 > 16 吋）\n- 解剖：下顎後縮、扁桃腺肥大\n- 家族史\n- 飲酒、吸菸\n\n### SCI 病人特有\n- **較高位的損傷**（tetraplegia）\n- **仰睡**\n- **完全性損傷**\n- **抗痙攣藥物使用**\n- 體重增加\n- 慢性鼻塞（autonomic dysreflexia 影響）\n\n## (D) 為什麼錯誤？ — 抗痙攣藥與 OSA 的關係\n\n### Baclofen 的影響\n- GABA-B agonist\n- **全身肌肉鬆弛作用**\n- 包括**上呼吸道肌肉**\n- → 上呼吸道塌陷風險↑\n- → **加重 OSA**\n- 研究：Baclofen 使 AHI 增加 30-50%\n\n### Tizanidine 的影響\n- α2-agonist\n- 中樞抑制\n- 嗜睡副作用顯著\n- **抑制呼吸驅動**\n- **降低覺醒閾值**（arousal threshold）\n- → 加重 OSA\n\n### Benzodiazepines 的影響\n- Diazepam, Clonazepam（SCI 痙攣常用）\n- GABA-A agonist\n- 中樞抑制\n- **降低上呼吸道肌張力**\n- **降低呼吸驅動**\n- 增加 AHI\n- 增加夜間去飽和\n\n### 正確的 SCI 痙攣治療策略（若合併 OSA）\n\n#### 1. 優先局部治療\n- **Botulinum toxin 注射**（特定肌肉）\n- **局部酚注射**（phenol block）\n- **Intrathecal baclofen（ITB pump）**\n  - 劑量遠低於口服\n  - 對呼吸影響較小\n\n#### 2. 避免中樞抑制劑\n- 避免 Baclofen（口服大劑量）\n- 避免 Benzodiazepines\n- 避免 Tizanidine\n\n#### 3. 替代藥物\n- **Dantrolene**（作用於肌肉細胞，對 CNS 影響小）\n- **Gabapentin**（有些研究支持，但也有呼吸抑制風險）\n\n#### 4. 物理治療\n- Stretching\n- Splinting\n- 定期 ROM\n\n## (E) CPAP 治療 — 正確\n\n### CPAP 是 OSA 的金標準治療\n\n**效益**：\n- 維持上呼吸道通暢\n- 降低 AHI\n- 改善白天嗜睡\n- 降低心血管風險\n- 改善生活品質\n\n### SCI 病人 CPAP 使用\n\n**優勢**：\n- 可改善呼吸\n- 減少 atelectasis\n- 改善氧合\n\n**挑戰**（compliance 低）：\n- 面罩配戴困難（特別 tetraplegia）\n- 需他人協助\n- 自主神經失調可能受面罩影響\n- 幽閉感、不適\n- 高流量可能加重腹脹（SCI 腸道問題）\n\n### 提升 compliance 策略\n- 完整的設備教育\n- Auto-CPAP（APAP）\n- 個人化面罩選擇\n- 加濕系統\n- 逐漸適應（ramp time）\n- 家屬支持與訓練\n\n## OSA 診斷\n\n### 篩檢工具\n- **Epworth Sleepiness Scale (ESS)**\n- **STOP-BANG questionnaire**\n- **Berlin Questionnaire**\n- **NoSAS score**\n\n### 金標準：Polysomnography (PSG)\n- 夜間多項睡眠生理檢查\n- 測：EEG, EMG, airflow, SpO₂, ECG\n- 計算 **AHI (Apnea-Hypopnea Index)**：\n  - 輕度：5-14/hour\n  - 中度：15-29/hour\n  - 重度：≥ 30/hour\n\n### 替代工具\n- **Home Sleep Apnea Test (HSAT)**：攜帶式\n- **Overnight oximetry**：粗篩\n\n## OSA 治療階梯\n\n### 第一線\n- **CPAP**（黃金標準）\n- 生活方式：減重、側睡、戒酒\n\n### 第二線\n- **BiPAP**（CPAP 不耐受）\n- **Mandibular Advancement Device (MAD)**\n- Positional therapy（體位治療）\n\n### 第三線\n- 手術：\n  - Uvulopalatopharyngoplasty (UPPP)\n  - Maxillomandibular advancement\n  - Hypoglossal nerve stimulation\n- 減重手術\n\n## SCI OSA 特別處置\n\n### 1. 積極篩檢\n- 所有 tetraplegia 病人\n- Paraplegia 有 risk factors\n- PSG 作為基線\n\n### 2. 避免加重藥物\n- **謹慎使用中樞抑制類抗痙攣藥** ★\n- 替代方案優先\n- 鎮靜藥物最小化\n\n### 3. 體位處理\n- 側睡訓練（若可能）\n- 枕頭墊高\n- 特殊床具\n\n### 4. CPAP 支持\n- 個人化\n- 家屬培訓\n- 定期追蹤 compliance\n\n### 5. 肥胖管理\n- 營養師介入\n- 運動計畫（水療、上肢有氧）\n\n## 考點速記\n\n| 項目 | SCI + OSA |\n|---|---|\n| SCI 病人 OSA 盛行率 | **50-60%** |\n| 一般人群 | 4-9% |\n| 主要誘因 | 高位 SCI、肥胖、仰睡、藥物 |\n| **Baclofen, Tizanidine** | **加重 OSA** ★ |\n| **錯誤觀念** | 抗痙攣藥不會減少 OSA |\n| 首選治療 | **CPAP**（但 compliance 低） |\n| 嚴重痙攣替代 | ITB pump, botox, dantrolene |",
      "sources": [

    "explanation": {
      "summary": "(B) 正確。**姿勢性低血壓好發於頸髓（特別是 T6 以上）完全損傷的病人**，因為完全失去交感神經輸出（T1-L2）對血管收縮的控制。其他選項皆錯：(A) 標準定義為**收縮壓下降 ≥ 20 或舒張壓 ≥ 10**，不是「都 > 20」；(C) 進食（餐後 postprandial hypotension）與溫暖環境**加重**症狀；(D) 應將**頭部抬高**（head-up tilt）而非朝下；(E) 第一線是 **midodrine**，fludrocortisone 才是第二線。",
      "detail": "**脊髓損傷後的姿勢性低血壓（Orthostatic Hypotension, OH）**\n\n## 定義\n\n### 標準定義（American Autonomic Society）\n\n**姿勢改變 3 分鐘內**：\n- **收縮壓下降 ≥ 20 mmHg** ✓\n- **或舒張壓下降 ≥ 10 mmHg** ✓\n\n注意：\n- 「或」不是「且」\n- SBP 20 + DBP 10（不是 20/20）\n- → (A) 選項錯誤（DBP 也寫 20）\n\n### 症狀\n- 頭暈、眼前發黑\n- 視力模糊\n- 無力\n- 噁心\n- 昏厥（syncope）\n- 頸痛（coathanger pattern）\n- 認知遲鈍\n\n## 病生理（SCI 為什麼會 OH）\n\n### 交感神經輸出失調\n\n**正常人**：\n- 站立 → 血液池積下肢\n- 壓力感受器（頸動脈竇、主動脈弓）偵測\n- 經延腦心血管中樞 → **交感神經活化**（T1-L2 節前纖維）\n- 外週血管收縮、HR↑、CO↑\n- 維持血壓\n\n**SCI（特別 T6 以上完全損傷）**：\n- **交感神經下行徑路中斷**\n- 無法活化 T1-L2 交感輸出\n- 血管收縮反應消失\n- 下肢血液池積、CO 下降\n- **嚴重 OH**\n\n### 其他因素\n- 副交感神經（迷走）支配保留 → 心跳代償性加快\n- 肌肉泵（muscle pump）功能喪失\n- 腎素-血管收縮素系統延遲\n- 長期臥床→體液減少\n- 藥物（抗痙攣藥、降壓藥、抗憂鬱藥、利尿劑）\n- 低血容、貧血\n\n## SCI 病人 OH 流行病學 — (B) 正確\n\n### 好發族群\n- **急性期（acute）**：> 70% 有 OH\n- **T6 以上完全損傷（tetraplegia complete）**：最高風險 ★\n- **隨時間改善**：慢性期（> 6 個月）OH 可自然代償\n- 殘障適應、側支循環、RAAS 上調\n\n### 完全損傷 vs 不完全損傷\n- **完全（AIS A）**：嚴重、持續 OH\n- **不完全**：較輕、易恢復\n\n## (C) 為什麼錯誤？\n\n### Postprandial Hypotension（餐後低血壓）\n- 進食後**內臟血管擴張**（splanchnic vasodilation）\n- 血液流至腸道\n- **姿勢性血壓降更低**\n- 症狀**加重**，非緩解\n- 特別高碳水化合物餐\n- SCI 病人飯後 30-60 分鐘風險高\n\n### 溫暖環境\n- 皮膚血管擴張（散熱）\n- 血液更易池積\n- **加重 OH**\n- 特別夏天、熱水澡後\n\n→ 選項敘述**方向完全錯誤**\n\n## (D) 為什麼錯誤？\n\n### 睡眠體位建議\n\n**正確做法**：\n- **Head-up tilt**（頭抬高）10-30°\n- 床頭墊高\n- 機轉：\n  - 刺激夜間 RAAS\n  - 減少夜間 supine hypertension\n  - 訓練心血管對重力反應\n  - 改善晨起 OH\n\n**錯誤做法**：\n- 頭朝下傾斜 → 無此做法\n- 反而可能加重夜間血液集中頭部，沒有訓練效果\n\n### 補充：Supine Hypertension（仰臥高血壓）\n- OH 病人**夜間仰臥時血壓反而過高**\n- 自主神經失調的矛盾現象\n- Head-up tilt 也可減少此問題\n\n## (E) 為什麼錯誤？\n\n### 藥物治療順序\n\n**第一線藥物**：\n- **Midodrine**（α1-agonist）★\n  - 2.5-10 mg TID\n  - 選擇性外週血管收縮\n  - 不過 blood-brain barrier\n  - 不影響 CNS\n  - 短效（作用 3-4 小時）\n  - 避免睡前使用（防 supine HTN）\n\n**第二線藥物**：\n- **Fludrocortisone**（mineralocorticoid）\n  - 0.1-0.2 mg QD\n  - 增加體液、鈉滯留\n  - 作用緩慢（數週）\n  - 副作用：低血鉀、水腫、supine HTN\n\n**其他選項**：\n- **Pyridostigmine**（cholinesterase inhibitor）\n- **Droxidopa**（NE 前驅物）\n- **Octreotide**（splanchnic vasoconstriction）\n- **EPO**（增加 RBC）\n\n### 常見排序錯誤\n- 許多教科書把 fludrocortisone 列第一線（舊觀念）\n- **現代建議：midodrine 為第一線**（證據較強、起效快）\n- Fludrocortisone 現為第二線或合併使用\n\n## OH 處置階梯（完整）\n\n### 第一步：非藥物介入\n\n1. **體位訓練**\n   - **Tilt table training**（傾斜床訓練）\n   - 漸進式直立\n   - 每日 2-3 次\n\n2. **壓力裝置**\n   - **Abdominal binder**（腹帶）★ SCI 常用\n   - **下肢壓力襪（compression stockings）**\n   - TED stockings（膝上至大腿）\n\n3. **飲食調整**\n   - **鹽分增加**（2-10 g/day）\n   - **液體攝取 2-3 L/day**\n   - 少量多餐（避免 postprandial HTN）\n   - 飯前飲用 400-500 ml 水\n\n4. **體位**\n   - **Head-up tilt 睡眠**（10-30°）\n   - 從臥→坐→站循序\n   - 避免突然起身\n\n5. **身體動作**\n   - Muscle pumping（腿部動作）\n   - 交叉腿、蹲屈站立技巧\n\n### 第二步：藥物治療（若非藥物無效）\n\n1. **Midodrine**（第一線）\n2. **Fludrocortisone**（第二線）\n3. **Pyridostigmine**（合併使用）\n4. **Droxidopa**（難治型）\n\n### 合併治療\n- 常需多種藥物\n- 個別調整劑量\n\n## OH 的特別情境\n\n### 高齡合併 OH\n- 藥物相互作用考量\n- 跌倒風險高\n- Fludrocortisone 特別慎用（心衰、水腫）\n\n### 神經退化性疾病（Parkinson, MSA）\n- Multiple system atrophy 特別嚴重\n- L-dopa 可能加重\n- Droxidopa 有效\n\n### 糖尿病自主神經病變\n- 晚期併發症\n- 需綜合處理血糖、營養、藥物\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| **OH 定義** | SBP ↓ ≥ 20 **或** DBP ↓ ≥ 10 |\n| SCI 好發 | **T6 以上完全損傷** ★ |\n| 餐後 / 溫暖 | **加重**（非緩解） |\n| 睡眠體位 | **Head-up tilt**（非朝下） |\n| 第一線藥物 | **Midodrine** ★ |\n| 第二線藥物 | Fludrocortisone |\n| 非藥物首選 | Abdominal binder + tilt training |",

      "detail": "**自主神經反射異常（Autonomic Dysreflexia, AD）**\n\n## 定義\n\n**SCI 病人（T6 以上）因病灶以下有害刺激誘發的大規模交感神經反射**，造成血壓急遽上升的危險併發症。\n\n- 別稱：Autonomic hyperreflexia\n- **SCI 專有急症**\n- 可危及生命\n- 老練 SCI 照護者必須能辨認與處置\n\n## 流行病學 — (A) 正確\n\n### 好發族群\n- **T6 以上 SCI**（T6 是主要分水嶺）\n  - T6 以下病灶：splanchnic bed 血管收縮仍可靠上位交感神經調控 → AD 罕見\n  - **T6 以上**：**失去 splanchnic 區血管收縮控制** → AD 發生\n- **完全性損傷**（AIS A）> 不完全性\n- **損傷節段越高、症狀越嚴重**\n- **受傷 3-6 個月後**開始出現（脊髓休克結束、反射恢復後）\n\n### 發生率\n- T6 以上 SCI：**50-90% 會有 AD 事件**\n- 日常管理不良、合併症多者發生頻繁\n- 可能是無症狀（silent AD，僅血壓升高但無症狀）\n\n## 病生理 — (B) 正確（大部分）\n\n### 機轉流程\n\n```\n有害刺激 (noxious stimulus) 於 T6 以下\n    ↓\n經脊髓上傳\n    ↓\n病灶以上 CNS 無法接收、調控\n    ↓\n不受控制的交感神經放電 (massive sympathetic discharge)\n    ↓\n病灶以下血管劇烈收縮\n    ↓\n血壓急遽上升 (SBP 可飆 > 200 mmHg)\n    ↓\n頸動脈/主動脈壓力感受器偵測\n    ↓\n經迷走神經 (parasympathetic) 反射\n    ↓\n心跳減慢 (bradycardia)\n    ↓\n病灶以上血管擴張\n    ↓\n頭痛、臉潮紅、冒汗（僅病灶以上）\n    ↓\n病灶以下皮膚蒼白、起雞皮疙瘩、冷\n```\n\n### 常見刺激來源（依頻率）\n\n1. **膀胱問題**（最常，約 75-85%）★\n   - 膀胱過脹（漏導尿、膀胱石）\n   - UTI\n   - 結石\n   - 導管堵塞\n   - 膀胱痙攣\n\n2. **腸道問題**（第二常見）\n   - 便秘、糞便嵌塞\n   - 灌腸過度\n   - 痔瘡\n   - 腸阻塞\n\n3. **皮膚**\n   - 壓瘡\n   - 內生趾甲\n   - 緊身衣物\n   - 燒傷、燙傷\n\n4. **肌肉骨骼**\n   - 骨折\n   - 異位性骨化\n   - 關節脫位\n   - 痙攣\n\n5. **醫療處置**\n   - 膀胱鏡\n   - 手術\n   - 生產（懷孕 SCI 病人）\n\n6. **生殖系統**\n   - 月經\n   - 射精、性行為\n   - 懷孕\n\n## 臨床表現 — (C) 正確\n\n### 典型症狀\n\n| 病灶以上（副交感主導） | 病灶以下（交感主導） |\n|---|---|\n| **頭痛**（脹痛、嚴重） | 皮膚蒼白、冷 |\n| **臉潮紅、發紅** | 起雞皮疙瘩（piloerection） |\n| **冒汗** | 冰冷 |\n| 鼻塞 | 血管收縮 |\n| 視力模糊 | |\n| 心搏**過慢**（反射性，迷走介導） | |\n\n### 心律變化\n- **心搏過慢**（最常見）\n- 但**也可心搏過速**（特別急性期）\n- (C) 選項「心搏過慢或過速」都正確\n\n### 血壓\n- **劇烈升高**\n- SCI 病人基礎 BP 通常偏低（SBP 90-110）\n- AD 時可飆至 **180-250+ mmHg**\n- **「正常 BP」可能已是 AD**（若 > 基礎值 20 mmHg）\n\n### 併發症\n- **腦出血、中風**\n- **心肌梗塞**\n- **癲癇**\n- **視網膜剝離**\n- **肺水腫**\n- **死亡**\n\n## 處置（緊急！）— (D) 本題關鍵\n\n### 處置步驟\n\n**Step 1：姿勢**\n- **立即扶坐起**\n- 利用重力 **orthostatic reduction**\n- **不可平躺**（加重高血壓）\n\n**Step 2：移除誘因**\n- 鬆開緊身衣物\n- 檢查**膀胱**（首要）\n  - 導管？堵塞？\n  - 若無留置管 → 插管\n  - 若有 → 檢查通暢\n- 檢查**腸道**（次要）\n  - 使用 **Lidocaine gel** 麻醉\n  - **輕柔 digital evacuation**\n- 皮膚、管路檢查\n\n**Step 3：監測**\n- **每 2-5 分鐘量血壓** ★（不是 10-20 分鐘！）\n- 持續監測心律\n- 直到血壓穩定 2-3 次正常\n\n**Step 4：藥物（若 BP 持續 ≥ 150 mmHg）**\n- **Nifedipine 10 mg**（bite and swallow，咬破立即吞服）\n- **Nitroglycerin SL / paste**（2% 藥膏塗皮膚）\n  - 作用快速（數分鐘）\n  - 短效\n- **Captopril 25 mg SL**\n- **Hydralazine**（IV 若需要）\n\n**避免使用**：\n- Beta-blocker（加重 bradycardia）\n- 長效降壓藥（BP 可能跌太低）\n\n## (D) 為什麼錯誤？\n\n### 血壓監測頻率\n\n**正確**：**每 2-5 分鐘** ★\n\n**為什麼不是 10-20 分鐘？**\n1. BP 變化**極快**：數分鐘內可上升 50-100 mmHg\n2. 併發症（中風、MI）在數分鐘內發生\n3. 治療反應需快速評估\n4. 預防 BP 過度下降（醫源性低血壓）\n5. **PVA Guidelines 2002 明確規定 q2-5 min**\n\n**「10-20 分鐘」的問題**：\n- 太久\n- 無法及時調整\n- 錯失治療窗\n- 可能延誤處置\n\n## (E) 處置流程 — 正確\n\n選項 (E) 描述標準流程：\n1. 扶坐直 ✓\n2. 鬆緊身衣物 ✓\n3. 檢查膀胱 ✓\n4. SBP > 150 時給藥 ✓\n\n## 預防\n\n### 日常管理\n1. **良好膀胱管理**\n   - 定時 CIC\n   - 充足水分\n   - 感染預防\n\n2. **良好腸道管理**\n   - 規律 bowel program\n   - 預防便秘、嵌塞\n\n3. **皮膚檢查**\n   - 定期視診\n   - 預防壓瘡\n\n4. **輔具檢查**\n   - 鞋子合腳\n   - 輪椅姿勢\n   - 衣物不緊\n\n### 衛教\n- 病人、家屬認識 AD\n- 識別症狀\n- 緊急應變\n- 隨身攜帶 AD card（說明病況）\n\n### 高風險情境\n- 懷孕（產前諮詢）\n- 手術（麻醉醫師警示）\n- 膀胱鏡（預防性藥物）\n- 旅行（帶藥備用）\n\n## AD 與 Orthostatic Hypotension 的對比\n\n| 項目 | AD | OH |\n|---|---|---|\n| 血壓 | **升高** | **降低** |\n| HR | 慢（或快） | 代償性快 |\n| 誘因 | 有害刺激 | 姿勢改變 |\n| 好發 | **T6 以上 SCI** | **T6 以上 SCI** |\n| 時期 | 慢性期 | 急性期 |\n| 緊急性 | **急症** | 非急症 |\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 好發損傷 | **T6 以上完全** |\n| 最常刺激源 | **膀胱** (75-85%) |\n| 第二常刺激源 | 腸道 |\n| 症狀 | 頭痛、潮紅、出汗、BP↑ |\n| 處置首步 | **扶坐直** |\n| **監測頻率** | **每 2-5 分鐘** ★ |\n| SBP > 150 給藥 | Nifedipine, Nitroglycerin |\n| 避免 | Beta-blocker |",

      "summary": "(D) 錯誤。**「分離性感覺喪失（dissociated sensory loss）」— 溫痛覺喪失但輕觸覺保留 — 是中央脊髓症候群（central cord syndrome）或脊髓空洞症（syringomyelia）的特徵**，而非馬尾或圓錐症候群。馬尾症候群是**周邊神經根（LMN）病變**，感覺喪失通常**各種感覺模式一致受影響**（因為神經根受壓影響所有纖維），無分離性感覺喪失。",
      "detail": "**馬尾症候群 vs 圓錐症候群（Cauda Equina vs Conus Medullaris Syndrome）**\n\n## 解剖學基礎\n\n### 脊髓圓錐（Conus Medullaris）\n- 脊髓的**錐形末端**\n- 位於 **T12-L2 椎體層**（典型 L1-L2）\n- 包含 **L1-S5 節段的脊髓實質**\n- **上運動神經元（UMN）**\n- 有**S2-S4 副交感排尿中樞**\n\n### 馬尾（Cauda Equina）\n- 源自 **L2 以下的神經根**（L2-S5, Co1）\n- 在脊髓外自由飄浮於蛛網膜下腔\n- **下運動神經元（LMN）**性質\n- 類似周邊神經\n\n## 病因（兩者相似）\n\n### 常見原因\n- **中央型椎間盤突出**（L4-5, L5-S1）\n- **外傷**（骨折、壓迫）\n- **腫瘤**（原發、轉移）\n- 感染（膿瘍）\n- 血腫\n- 醫源性（手術）\n- **發炎**（神經炎）\n- **椎管狹窄**（脊椎狹窄症）\n\n## 臨床比較（★ 本題核心）\n\n### 完整比較表\n\n| 項目 | **馬尾症候群** | **圓錐症候群** |\n|---|---|---|\n| **病灶** | L2 以下神經根 | 脊髓圓錐（T12-L2 椎體） |\n| **性質** | LMN | UMN + LMN 混合 |\n| **發病** | 漸進（可急性） | 突發性為多 |\n| **對稱性** | **不對稱**（單側或兩側不均） | **對稱**（雙側） |\n| **運動無力** | 下肢（根據受侵神經根） | 下肢（對稱） |\n| **感覺缺損** | **神經根分佈**（依 dermatome）★ | **鞍部分佈**（S2-S5）★ |\n| **疼痛** | **顯著、劇烈**（神經根痛）★ | **不顯著或輕微** |\n| **反射** | **消失**（LMN）★ | **可消失或過度**（取決於精確位置） |\n| **膀胱** | LMN（areflexic，溢流失禁） | LMN（areflexic） |\n| **肛門反射** | **消失** | 可保留或消失 |\n| **性功能** | 受影響、漸進 | 早期影響 |\n| **預後** | **較佳**（神經根有再生能力） | **較差**（脊髓實質損傷） |\n\n## 詳細各選項分析\n\n### (A) 反射變化 — 正確\n\n- **馬尾**：純 LMN → **反射消失**\n- **圓錐**：UMN + LMN 混合\n  - 若病灶精確 → 膀胱肛門反射消失（S2-S4 LMN）\n  - 若略高或略低 → 可能保留或混合\n\n### (B) 疼痛 — 正確\n\n**馬尾症候群典型疼痛**：\n- **神經根性疼痛**（radicular pain）\n- 劇烈、銳利、電擊樣\n- 沿神經根分佈（如坐骨神經痛）\n- **雙側坐骨神經痛**是典型特徵\n- Straight leg raise 陽性\n\n**圓錐症候群**：\n- **少見疼痛**（脊髓損傷本身不傳導疼痛）\n- 若有疼痛，多為後背局部痛（機械性）\n- 無明顯神經根痛\n\n### (C) 感覺分佈 — 正確\n\n**馬尾症候群**：\n- **依神經根分佈（dermatomal）** ★\n- L4：大腿前外、小腿內\n- L5：小腿外側、足背、大拇趾\n- S1：小腿後、足外側、小趾\n- S2-S5：鞍部（若影響 sacral roots）\n- **不對稱**（若病灶偏一側）\n\n**圓錐症候群**：\n- **鞍部分佈（saddle distribution）** ★\n- S2-S5 區域\n- **對稱**\n- 會陰、臀、大腿後內\n- 也可能影響下肢（若病灶稍高）\n\n### (D) 分離性感覺喪失 — ★ 本題錯誤\n\n### 分離性感覺喪失（Dissociated Sensory Loss）\n\n**定義**：\n- **溫痛覺喪失**（spinothalamic tract）\n- **輕觸覺、本體感覺保留**（dorsal column）\n- 或反之\n\n**典型疾病**：\n1. **中央脊髓症候群（Central cord syndrome）**\n   - Spinothalamic 纖維位於中央 → 先受損\n   - Dorsal column 位於後方 → 保留\n   - 結果：上肢 > 下肢無力、cape-like distribution\n\n2. **脊髓空洞症（Syringomyelia）**\n   - 脊髓中央腔擴大\n   - 壓迫 crossing spinothalamic fibers\n   - 典型「披肩樣」溫痛覺喪失（cape-like）\n\n3. **Brown-Séquard 症候群**\n   - 半側脊髓損傷\n   - 同側本體覺喪失 + 對側溫痛覺喪失\n\n### 馬尾症候群為什麼沒有分離性感覺喪失？\n\n- 馬尾是**神經根**\n- 神經根包含**所有感覺纖維**（spinothalamic + dorsal column 的 peripheral counterparts）\n- 受壓時**所有感覺模式同時受影響**\n- 無法解剖上分離痛溫與觸覺\n\n### (D) 選項錯誤的核心\n- 馬尾症候群**無**分離性感覺喪失\n- 分離性感覺喪失的疾病是中央脊髓 / syringomyelia\n- 陳述方向完全錯誤\n\n### (E) 預後 — 正確\n\n**馬尾症候群預後較佳**：\n- 神經根為**周邊神經**（PNS）\n- **有再生能力**（1 mm/day）\n- 適當手術減壓 + 復健可恢復\n- 即使不完全，多數可改善\n\n**圓錐症候群預後較差**：\n- 脊髓實質損傷\n- **CNS 再生有限**\n- 功能恢復有限\n- 自主功能（膀胱、性）恢復差\n\n### 共同預後因素\n- **減壓時機**：< 48 小時最佳\n- **損傷嚴重度**\n- 年齡\n- 共病症\n- 復健質量\n\n## 臨床警訊（Cauda Equina Red Flags）\n\n### 必須緊急處理\n- **進行性下肢無力**\n- **鞍部麻木**（saddle anesthesia）\n- **膀胱失禁、溢流**（overflow）\n- **肛門張力下降**\n- **雙側坐骨神經痛**\n- **性功能障礙**（新發）\n\n### 檢查\n- **急診 MRI**（gold standard）\n- 直腸指檢（肛門張力、鞍部感覺）\n- 評估 post-void residual（> 500 ml 警訊）\n- 神經學檢查（反射、感覺、肌力）\n\n### 處置\n- **緊急手術減壓**（< 48 小時）\n- Delayed 手術預後差\n- 類固醇（若適應）\n- 復健介入\n\n## 膀胱症狀比較\n\n### 兩者都是 LMN 型神經性膀胱\n- **Detrusor areflexia**（逼尿肌無反射）\n- **Sphincter 鬆弛或無協調**\n- **溢流性失禁**（overflow incontinence）\n- **殘尿量大**\n\n### 差異\n- 馬尾：依神經根影響範圍\n- 圓錐：S2-S4 中樞受損，通常較完整\n\n## 性功能影響\n\n### 馬尾症候群\n- 漸進性\n- 勃起、射精障礙\n- 女性性交痛、潤滑不足\n- 感覺缺損影響\n\n### 圓錐症候群\n- 早期、完整影響\n- 自主神經控制喪失\n- 通常更嚴重\n\n## 考點速記\n\n| 項目 | 馬尾 | 圓錐 |\n|---|---|---|\n| 性質 | **LMN** | **UMN + LMN** |\n| 對稱性 | 不對稱 | 對稱 |\n| 感覺 | **根性分佈** | **鞍部分佈** |\n| 疼痛 | **顯著** | 不顯著 |\n| 反射 | 消失 | 可混合 |\n| **分離性感覺喪失** | **不會** ★ | **不會** |\n| 預後 | **較佳** | 較差 |\n\n**關鍵**：分離性感覺喪失是**中央脊髓 / Syringomyelia** 的特徵，不是馬尾或圓錐。",

      "summary": "(E) 正確。SCI 骨質流失受多因素影響：**年齡（年輕時骨流失速率最快）、肌肉密度（肌肉量 proxy 於承重刺激）、痙攣程度（輕度痙攣是保護因子，因肌肉張力提供機械刺激；重度痙攣則加重流失）**。其他選項：(A) 流失**前 3-4 個月最快，其後漸緩**；(B) Opioid/BZD **加重**骨流失；(C) PTH 通常**抑制**而非升高；(D) 維他命 D 對慢性期也有益。",
      "detail": "**脊髓損傷後的骨質流失（Post-SCI Osteoporosis）**\n\n## 流行病學\n\n### 特點\n- **SCI 後幾乎 100% 有骨質流失**\n- 主要在**下肢**（承重喪失區域）\n- 上肢相對保留（因為使用輪椅）\n- **骨折風險增加 1-10 倍**\n- 下肢骨折好發：**股骨遠端、脛骨近端**（超聲膝關節）\n\n### 骨質流失模式\n\n- SCI 骨質流失型態**獨特**\n- 與絕經後、老年性骨鬆不同\n- 主要是**trabecular bone（骨小樑）**\n- **Cortical bone** 也流失但較慢\n\n## 時間進程（★ 考點）\n\n### 骨流失速率\n\n| 時期 | 骨密度下降 |\n|---|---|\n| **前 1-4 個月** | **最快**（急性流失期）★ |\n| 4-12 個月 | 漸緩 |\n| 12 個月-2 年 | 繼續緩慢下降 |\n| 2-5 年 | 達到平穩期（plateau） |\n| > 5 年 | 慢性期，相對穩定 |\n\n### 具體數字\n- 前 6 個月：下肢骨密度下降 **15-25%**\n- 第一年：下肢總計下降 **20-40%**\n- 3 年時：下肢 BMD 可達**正常人的 50-67%**\n- 最終趨於新的平衡點\n\n### (A) 為什麼錯誤？\n\n選項說「第一年內骨密度的流失速率**逐漸加快**」\n\n**錯誤原因**：\n- 事實**相反**\n- **前 1-4 個月流失最快**\n- 之後**速率遞減**\n- 第一年末已比最初緩慢許多\n\n### 為什麼早期流失最快？\n\n1. **立即失去機械性刺激**（unloading）\n2. **急性 RANKL/OPG 失衡**\n3. **骨吸收 > 骨形成**\n4. 全身炎症反應\n5. 激素變化\n6. 肌肉急速萎縮\n\n## 骨質流失機轉\n\n### 1. Mechanical Unloading（機械負荷喪失）★ 主因\n- 正常行走 → 骨細胞（osteocytes）感受應力\n- SCI → 完全喪失站立、行走的壓力\n- Wolff's law：骨骼根據承受的應力而塑形\n- **輪椅 / 臥床 → 下肢骨流失**\n\n### 2. 神經因素\n- **Sympathetic innervation 對骨形成的調控喪失**\n- β-adrenergic 受體直接影響 osteoblast\n- SCI 後自主神經失調 → 骨代謝異常\n\n### 3. 內分泌變化\n- **RANKL ↑、OPG ↓** → 破骨細胞活化\n- **Sclerostin ↑** → 抑制骨形成\n- **PTH 可能降低**（因大量鈣離開骨骼進入血液）\n- **Calcium ↑、Phosphate ↑ 在血中（急性期）**\n- **Hypercalciuria**（尿鈣高）\n- 維他命 D、PTH 軸功能異常\n\n### 4. 肌肉萎縮\n- 失去肌肉收縮對骨骼的拉力\n- 肌肉-骨骼 crosstalk 喪失\n- 肌激素（myokines）減少\n\n### 5. 藥物\n- **Opioids**（加重）\n- **Benzodiazepines**（加重）\n- **抗癲癇藥**（phenytoin, carbamazepine）\n- 類固醇\n- Heparin 長期使用\n- PPI 長期使用\n\n## 為什麼各選項錯誤？\n\n### (B) Opioids 與 BZD 的影響 — 錯誤\n\n**Opioids**：\n- 抑制 HPG axis\n- **降低性腺激素**（testosterone, estrogen）\n- **加重骨流失**\n- 增加跌倒風險（→ 骨折）\n- 影響肌肉質量\n\n**Benzodiazepines**：\n- 增加跌倒風險\n- 影響肌肉功能\n- 可能影響骨代謝（間接）\n- **不改善骨密度**\n\n→ 兩種藥物**加重**骨流失、**增加**骨折風險，非保護因素\n\n### (C) PTH 變化 — 錯誤\n\n**急性 SCI 期間**：\n- 骨大量流失 → 血鈣升高\n- **PTH 反射性「被抑制」（降低）**\n- 非「明顯升高」\n- 高血鈣可能導致：\n  - Hypercalcemia（高血鈣）\n  - Hypercalciuria（高尿鈣）\n  - 腎結石風險\n\n### (D) Vitamin D 補充 — 錯誤\n\n**維他命 D 補充價值**：\n- **急性期**：改善骨代謝、減少流失\n- **慢性期**：\n  - 很多 SCI 病人**日曬不足**（因輪椅、室內時間長）\n  - **維他命 D 缺乏盛行率高達 81%**\n  - 補充**仍有益**\n  - 改善肌肉功能（預防跌倒）\n  - 改善骨代謝\n- **建議目標**：25(OH)D > 30 ng/ml\n- 劑量：**1000-2000 IU/day**\n\n## (E) 為什麼正確？影響骨流失的因素\n\n### 1. 年齡 ★\n- **年輕時流失最快**\n- 幼年/青少年 SCI：骨骼發育期中斷\n- 老年 SCI：在已有骨質疏鬆基礎上加重\n- 20-40 歲流失速率高\n\n### 2. 肌肉密度 / 質量 ★\n- **肌肉是骨形成的重要刺激來源**\n- 肌肉收縮 → 機械應力 → 骨骼反應\n- **肌肉量大** → 骨骼保留較好\n- 營養、蛋白質攝取影響肌肉\n\n### 3. 痙攣程度 ★\n- **輕度-中度痙攣：保護作用**\n  - 肌肉張力 → 機械刺激\n  - 維持肌肉量\n  - 研究顯示痙攣性 SCI 病人骨密度略高於弛緩性\n- **重度痙攣 / spasms：加重流失**\n  - 大量能量消耗\n  - 打斷骨形成\n  - 可能伴隨 fracture\n\n### 4. 損傷完整性\n- **完全性（AIS A）**：流失更嚴重\n- 不完全性：保留部分承重能力\n\n### 5. 損傷時間\n- 急性 vs 慢性\n- 時間越久，骨流失總量越大\n\n### 6. 承重能力\n- 站立訓練\n- FES-cycling\n- 減重步態訓練\n- 協助行走\n\n### 7. 其他因素\n- 吸菸\n- 飲酒\n- 營養不良\n- 腎功能\n- 維他命 D 狀態\n- 合併藥物\n- 性別、種族\n\n## 診斷與監測\n\n### DXA（雙能量 X 光吸收儀）\n- 標準工具\n- SCI 特定部位：\n  - **股骨遠端**（supracondylar）\n  - **脛骨近端**（proximal tibia）\n  - 這些是 SCI 骨折好發部位\n- 一般部位（髖、腰椎）**可能正常**，但下肢已嚴重流失\n\n### 骨代謝標記\n- NTX, CTX（骨吸收）\n- P1NP, osteocalcin（骨形成）\n- 追蹤治療反應\n\n### 時機\n- 受傷後 3-6 個月 baseline\n- 每 1-2 年追蹤\n- 治療開始後 6 個月 / 1 年\n\n## 治療\n\n### 非藥物\n\n#### 1. 機械性承重\n- **站立**（站立框、床）\n- **FES-cycling**\n- **減重步態訓練**\n- **機器人輔助行走**（exoskeleton）\n- Vibration training（全身震動）\n\n#### 2. 營養\n- **鈣攝取**：1000-1500 mg/day\n- **維他命 D**：1000-2000 IU/day\n- 足夠蛋白質\n\n#### 3. 生活方式\n- 戒菸\n- 限酒\n- 預防跌倒\n- 日曬\n\n### 藥物\n\n#### 1. Bisphosphonates（首選）\n- **Alendronate, Zoledronic acid**\n- 抑制 osteoclasts\n- 減少骨流失\n- IV zoledronic acid 對 SCI 證據較強\n\n#### 2. Denosumab\n- RANKL 抑制劑\n- 每 6 個月皮下\n\n#### 3. Teriparatide\n- PTH analog\n- 促進骨形成\n- 高骨折風險者\n\n#### 4. 其他\n- Calcitonin（較少用）\n- Estrogen/Testosterone（補充若低下）\n\n### 治療時機\n- **急性期（6 週內）開始最有效**\n- 慢性期效果有限（但仍值得治療）\n\n## 考點速記\n\n| 因素 | 影響 |\n|---|---|\n| **時間** | **前 3-4 個月流失最快** ★ |\n| **年齡** | 年輕流失快 |\n| **肌肉密度** | 肌肉大 → 保護 |\n| **輕度痙攣** | 保護作用 |\n| **重度痙攣** | 加重流失 |\n| **Opioids, BZD** | **加重**（非保護） |\n| **PTH（急性期）** | **抑制**（不是升高） |\n| **Vitamin D** | **急性 + 慢性皆有益** |\n| 好發骨折部位 | 股骨遠端、脛骨近端 |",

      "summary": "(E) 正確。**PTS 最常見的症狀是疼痛**（40-80% 病人），特徵是**灼痛、神經病變痛，且在 Valsalva（咳嗽、打噴嚏、出力、用力排便）時加重**——這是因為這些動作增加腹腔壓力，傳導至脊髓空洞使其擴張。其他選項：(A) 完全性損傷 > 不完全（2-3 倍）；(B) 頸髓最常見；(C) 分離性感覺喪失是典型；(D) **上行性（ascending）**喪失，不是下行性。",
      "detail": "**創傷後脊髓空洞症（Posttraumatic Syringomyelia, PTS）**\n\n## 定義\n\n- SCI 後在脊髓內形成的**充滿液體的空洞（syrinx）**\n- 可發生於任何 SCI 後的時期（月、年、甚至數十年後）\n- **進行性擴大可能造成神經功能惡化**\n- 又稱：post-traumatic spinal cord cavitation, post-traumatic cystic myelopathy\n\n## 流行病學\n\n### 發生率\n- **SCI 後 PTS 影像學發現率**：10-30%\n- **有症狀 PTS**：3-10%\n- 好發時間：**SCI 後 3 個月至數十年**\n  - 中位數：**6 年**\n  - 可在傷後 2 個月快至 30 年出現\n\n### 風險因素 — (A) 錯誤\n\n**較高風險**：\n- **完全性脊髓損傷（AIS A）** ★\n- 高位損傷（頸髓）\n- 脊柱不穩定、嚴重變形\n- 減壓手術不完全\n- 蛛網膜沾黏（arachnoid scarring）\n\n**較低風險**：\n- 不完全損傷\n- 早期手術穩定\n- 無併發症者\n\n**(A) 為什麼錯誤**：PTS 好發**完全性 SCI**，不是不完全性\n\n## 好發位置 — (B) 錯誤\n\n### 好發部位（按頻率）\n1. **頸髓（cervical）**：最常 ★\n2. **胸髓（thoracic）**：次之\n3. **腰髓**：少見\n\n### 解剖延伸\n- 可從原病灶向上或向下延伸\n- 典型**向上延伸**（ascending syringomyelia）\n- 可跨越多節段\n- 嚴重者可到延腦（syringobulbia）\n\n**(B) 為什麼錯誤**：最常見於**頸髓**損傷病人\n\n## 病理生理\n\n### 形成機轉（多假說）\n\n1. **Microcyst theory**（微囊融合理論）\n2. **Gardner's hydrodynamic theory**（流體動力學）\n3. **Fluid influx theory**（液體流入理論）\n4. **Williams' postural theory**（姿勢理論）\n\n### 關鍵因素\n- **蛛網膜沾黏**阻斷 CSF 流動\n- **脊椎變形**壓迫\n- 微小空腔融合擴大\n- Valsalva 動作促進\n\n## 臨床表現 — (C)(D)(E) 考點\n\n### 最常見症狀（依頻率）\n\n#### 1. **疼痛**（40-80%）★ (E)\n- **神經病變痛、灼痛**\n- 分佈：\n  - 原病灶層級\n  - **向上延伸**（隨 syrinx 擴大）\n  - 上肢、肩、頸\n- **Valsalva 動作加重**（★）：\n  - 咳嗽\n  - 打噴嚏\n  - 用力（解便、搬重物）\n  - 排便\n- 機轉：腹壓→硬膜外靜脈→蛛網膜下 CSF 壓力→空洞壓力\n\n#### 2. **感覺喪失** — (C) 錯誤\n- **Dissociated sensory loss（分離性感覺喪失）** ★\n  - **溫痛覺喪失**（spinothalamic 於中央先受影響）\n  - **輕觸覺、本體覺保留**（dorsal column 在後方）\n- **Cape-like distribution**（披肩樣分佈）\n- 典型上肢分佈\n- 燙傷、割傷不自覺\n\n**(C) 為什麼錯誤**：PTS **會造成典型的分離性感覺喪失**，不是只影響運動\n\n#### 3. **運動無力**（進行性）\n- **上運動神經元徵象**（若 syrinx 向上延伸）：\n  - 下肢痙攣增加\n  - 反射亢進\n  - Babinski 陽性\n- **下運動神經元徵象**（同一節段）：\n  - **手內在肌萎縮**（頸髓 syrinx 典型）\n  - 上肢無力\n  - 深層肌腱反射喪失\n\n#### 4. **反射變化** — (D) 錯誤\n- **上行性（ascending）深層肌腱反射喪失** ★\n  - 原因：向上延伸的 syrinx 影響前角細胞 LMN\n  - 節段由低至高逐漸消失\n- 選項說「**下行性喪失**」方向錯誤\n\n#### 5. 其他\n- 自主功能惡化\n- 吞嚥困難（頸髓高位、延伸至延腦）\n- 呼吸變化\n- 霍納氏症候群（若影響交感神經）\n- 脊髓張力增加或減少（不定）\n\n## Syrinx 的典型演變過程\n\n### 階段性變化\n\n```\n第 1 階段：無症狀（影像上小空洞）\n    ↓\n第 2 階段：局部神經痛（Valsalva 誘發）\n    ↓\n第 3 階段：分離性感覺喪失（Cape-like）\n    ↓\n第 4 階段：運動無力（進行性）\n    ↓\n第 5 階段：反射喪失、肌萎縮\n    ↓\n第 6 階段：自主功能惡化、呼吸變化\n```\n\n## 診斷\n\n### MRI（Gold Standard）\n- T2 加權像：**高訊號**（液體）\n- 全脊髓掃描（C1-sacrum）\n- 動態 MRI 可觀察流體動力\n- 追蹤 syrinx 變化\n\n### 電生理\n- SSEP 可能異常\n- EMG 去神經變化\n\n### 臨床評估\n- 定期神經學檢查\n- ASIA 分級變化\n- 疼痛評估\n\n## 治療\n\n### 保守治療\n- 疼痛管理（gabapentin, pregabalin, opioids）\n- 症狀監測\n- 避免 Valsalva 誘發動作\n- 物理治療維持功能\n\n### 手術適應症\n- 進行性神經惡化\n- 無法控制的疼痛\n- 快速擴大的 syrinx\n- 功能下降\n\n### 手術方式\n\n#### 1. Shunt（分流術）\n- Syringo-subarachnoid shunt\n- Syringo-pleural shunt\n- Syringo-peritoneal shunt\n- 短期效果佳，長期可能失效\n\n#### 2. **Decompression（減壓）**\n- 解除蛛網膜沾黏\n- 脊椎減壓\n- 恢復 CSF 流通\n- 對應脊柱不穩時合併固定\n\n#### 3. Untethering\n- 解除脊髓束縛（tethering）\n- 特別是創傷後沾黏\n\n### 預後\n- 手術可**穩定症狀**（50-80%）\n- **很難恢復已失去的功能**\n- **越早手術預後越好**\n- **追蹤重要**：即使手術後仍需長期 MRI 追蹤\n\n## 與先天性 syringomyelia 比較\n\n| 項目 | PTS（創傷後） | 先天性 |\n|---|---|---|\n| 病因 | SCI | Chiari I malformation 等 |\n| 發病時機 | SCI 後 | 兒童/青年 |\n| 位置 | 可任何位置 | 常頸胸 |\n| 小腦扁桃體 | 正常 | Herniation |\n| 治療 | 同上 | Chiari decompression 常首選 |\n\n## 鑑別診斷（SCI 病人神經惡化）\n\n- **PTS**（syringomyelia）\n- **Tethered cord**\n- 椎管壓迫（新 HNP、OPLL）\n- 骨折不穩定\n- 感染（abscess）\n- 腫瘤\n- 代謝異常（vit B12 deficiency）\n- 新發中風或 MS\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| 高風險 | **完全性 SCI**（非不完全） |\n| 好發部位 | **頸髓**（非胸髓） |\n| 典型感覺障礙 | **分離性感覺喪失**（Cape-like） |\n| **反射變化** | **上行性喪失**（ascending） |\n| **最常症狀** | **疼痛，Valsalva 加重** ★ |\n| 發病時間 | 中位數 6 年 |\n| 診斷 | 全脊髓 MRI |\n| 治療原則 | 進展性 → 手術 |",
      "sources": [

      "summary": "(C) 錯誤。**抗痙攣藥（Baclofen, Tizanidine）、Benzodiazepines、TCA 大多造成「體溫過低（hypothermia）或正常」，不會造成高溫**。事實上，SCI 病人本來就有**體溫調節障礙（poikilothermia）**，傾向與環境溫度一致。會造成「高溫」的藥物是：**抗精神病藥（NMS）、Anticholinergics、MAOI + Tyramine、SSRI + MAOI（serotonin syndrome）、MDMA、Cocaine 等**。",
      "detail": "**脊髓損傷併發症與處置**\n\n## 異位性骨化 (Heterotopic Ossification, HO) — (A)(B)\n\n### 定義\n- 軟組織（肌肉、結締組織）內**骨化形成**\n- SCI 好發併發症\n\n### 流行病學 — (A) 正確\n- **SCI 發生率**：10-53%\n- **發病時機**：\n  - **典型：受傷後 1-4 個月**\n  - **高峰：受傷後 2 個月** ★\n  - 大部分於前 6 個月發生\n  - 罕見 1 年後新發\n\n### 好發部位 — (B) 正確\n- **神經損傷節段以下的大關節** ★\n- 常見：\n  1. **髖關節**（最常，60-90%）\n  2. 膝關節\n  3. 肩膀\n  4. 手肘\n- **不會在神經損傷節段以上發生**（機轉不清，可能與自主神經控制有關）\n\n### 診斷\n- **早期徵象**：局部腫脹、紅熱、ROM 減少、發燒\n- **鑑別**：DVT、蜂窩性組織炎\n- **Bone scan**：最敏感（早期）\n- **Alkaline phosphatase ↑**\n- **X-ray**：較晚期才可見（3-6 週）\n- **MRI / Ultrasound**\n\n### 治療\n- **Etidronate（bisphosphonate）**：抑制早期\n- **NSAIDs**：indomethacin 有預防效果\n- **Radiation**（術前/術後）\n- **ROM 保持**（溫和被動運動）\n- **手術切除**：成熟後（> 12-18 個月），alkaline phosphatase 正常化後\n\n## 痙攣 (Spasticity) — (D) 正確\n\n### SCI 痙攣特徵\n- **UMN 症候群**\n- **頸髓與胸髓 SCI 常見**\n- **完全性損傷（AIS A）** 比不完全更常痙攣\n- **受傷後 1-6 個月**發展成熟\n- 慢性期穩定\n\n### 影響\n- 疼痛、不適\n- 影響活動與照顧\n- 可能造成攣縮\n- 也可能有幫助（輔助轉位、站立）\n\n### 分級 — Modified Ashworth Scale\n\n### 治療\n- **物理治療**（伸展、ROM）\n- **藥物**：\n  - Baclofen（口服 / 鞘內 pump）\n  - Tizanidine\n  - Dantrolene\n  - Benzodiazepines\n  - Gabapentin\n- **Botulinum toxin** 注射\n- **Phenol / Alcohol block**\n- **手術**：Selective dorsal rhizotomy\n\n## 體溫調節 — (C) 本題核心\n\n### SCI 體溫調節障礙\n\n**Poikilothermia（變溫動物化）**：\n- SCI 破壞交感神經控制\n- **體溫隨環境變化**\n- T6 以上更明顯\n- **既可能過高（hyperthermia）也可能過低（hypothermia）**\n- 失去：\n  - 出汗調節（病灶以下無汗）\n  - 皮膚血管收縮/擴張\n  - 雞皮疙瘩\n  - 顫抖\n\n### 臨床意義\n- **環境溫度**重要：寒冷易失溫、炎熱易中暑\n- 需主動調節（衣物、環境溫度）\n- 感染時發燒反應可能不典型\n\n## 造成高溫的藥物（★ 本題重點）\n\n### 真正會造成 Hyperthermia 的藥物\n\n#### 1. **Neuroleptic Malignant Syndrome (NMS)**\n- **抗精神病藥（antipsychotics）**\n  - Haloperidol\n  - Chlorpromazine\n  - Fluphenazine\n  - 新型 atypicals（較少）\n- 機轉：中樞 D2 阻斷\n- 特徵：高熱、肌僵硬、AMS、autonomic instability\n\n#### 2. **Serotonin Syndrome**\n- **SSRI, SNRI**\n- **MAOI** + serotonergic\n- **Tramadol, Linezolid**\n- 混用：多種 serotonergic 藥物\n- 特徵：高熱、肌陣攣、HR↑、震顫、意識改變\n\n#### 3. **Malignant Hyperthermia**\n- 全身麻醉藥（halothane, isoflurane）\n- 去極化肌肉鬆弛劑（succinylcholine）\n- 遺傳性（RYR1 基因）\n- 緊急使用 Dantrolene\n\n#### 4. **Anticholinergic Toxicity**\n- Atropine, scopolamine\n- 抗組織胺（diphenhydramine）\n- 三環抗憂鬱劑（**大劑量 / 過量時**）\n- 阻止出汗 → 高溫\n- 「Red as a beet, hot as a hare, dry as a bone, blind as a bat, mad as a hatter」\n\n#### 5. **Sympathomimetics**\n- Cocaine\n- Amphetamines\n- MDMA（ecstasy）\n- 通過中樞 + 肌肉活性\n\n### 不會造成高溫的藥物\n\n- **Baclofen**：中樞抑制 → 低體溫為主\n- **Tizanidine**：α2-agonist → 低血壓、低體溫\n- **Benzodiazepines**：鎮靜 → 體溫略降或正常\n- **TCA（一般治療劑量）**：不明顯影響體溫\n  - 大劑量過量：才有 anticholinergic 高溫\n\n## (C) 為什麼錯誤？\n\n選項將三類藥物都歸類為造成高溫的藥物：\n\n### 抗痙攣藥（Baclofen, Tizanidine）\n- **→ 低溫或正常**\n- 中樞抑制作用\n- 不會造成 hyperthermia\n\n### Benzodiazepines\n- **→ 低溫或正常**\n- GABA-A 增強\n- 鎮靜、體溫下降\n\n### TCA（治療劑量）\n- **→ 一般不影響體溫**\n- 大劑量中毒才有 anticholinergic 效應\n- 非「常見造成高溫」的藥物\n\n**這三類藥物作為「引發 hyperthermia 原因」的敘述錯誤**。\n\n## 機械通氣 (Mechanical Ventilation) — (E) 正確\n\n### SCI 的 Tidal Volume 策略\n\n**一般成人 ARDS / 正常肺**：\n- 低潮氣量策略：**6-8 ml/kg IBW**\n- 減少 ventilator-induced lung injury\n\n**SCI 特殊情況**：\n- **更高潮氣量：10-20 ml/kg IBW** ★\n- **可接受且有利**\n\n### 為什麼 SCI 要用高 TV？\n\n1. **預防肺塌陷（atelectasis）**\n   - SCI 病人咳嗽弱、深呼吸少\n   - 低 TV 會加劇塌陷\n   \n2. **痰液清除**\n   - 高 TV 可協助推出痰液\n   - 配合 MI-E（mechanical insufflator-exsufflator）\n\n3. **減少肺炎**\n\n4. **SCI 肺通常完好**（不是 ARDS）\n   - 不適用 lung-protective strategy\n\n### 安全性\n- 監測 plateau pressure（< 30 cmH₂O）\n- 避免氣道創傷\n- 定期評估\n- Peterson et al. 1994、Consortium Guidelines 支持\n\n## 考點速記\n\n| 併發症 | 重點 |\n|---|---|\n| **HO 高峰** | **受傷後 2 個月**，病灶**以下** |\n| **痙攣** | 頸 + 胸髓 UMN 典型 |\n| **體溫調節** | Poikilothermia（變溫） |\n| **造成高溫的藥物** | **NMS、Serotonin Syndrome、抗膽鹼、擬交感**（★ 非 Baclofen/BZD/TCA） |\n| **SCI 機械通氣** | **TV 10-20 ml/kg IBW** |",

      "detail": "**VFSS vs FEES 吞嚥檢查比較**\n\n## VFSS（Videofluoroscopic Study of Swallowing）\n\n### 原理\n- **X 光即時錄影**\n- 病人吞入 **含鋇劑（barium）或水溶性顯影劑**的食物/液體\n- 放射科檢查\n- 側位 + 正位可視化整個吞嚥過程\n- 又稱 **Modified Barium Swallow (MBS)**\n\n### 優點\n- **全吞嚥階段可視化**：\n  - **口腔準備期**（oral preparatory）\n  - **口腔期**（oral）\n  - **咽部期**（pharyngeal）\n  - **食道期**（esophageal）\n- **完整的解剖顯示**\n- **骨性結構清楚**\n- **食道期評估**\n- 可評估 aspiration timing（before/during/after swallow）\n\n### 缺點\n- **輻射曝露**\n- 需專用設備、放射科\n- 不可攜帶\n- 鋇劑可能影響後續治療（如 MRI、手術）\n- 費用較高\n- 需病人可配合直立、吞嚥\n\n### 黃金標準地位\n- 仍是**吞嚥困難評估的 gold standard**\n- 特別是**口腔期問題**\n- **食道期評估**必要時\n\n## FEES（Fiberoptic Endoscopic Examination of Swallowing）\n\n### 原理\n- **纖維光學內視鏡**\n- 經**鼻腔**進入（transnasal）\n- **直接視診咽喉部**\n- 病人吃/喝有色食物（如藍色染料）\n- 床邊可做\n\n### 優點\n- **床邊檢查**（bedside）★\n- **可攜帶**\n- **無輻射**\n- **可觀察實際結構與分泌物**\n- **直接視診**\n- **反覆進行**\n- **評估唾液處理能力**（salivary management）★ 本題重點\n- **看到氣道保護**（喉頭閉合）\n- 較便宜\n- 可評估感覺功能（touch-cue 測試）\n\n### 缺點\n- **看不到口腔期** ★（選項 C 錯）\n  - 因為內視鏡從鼻腔進入，在鼻咽以下\n  - 無法視診口腔內活動\n- **「White-out phenomenon」**：\n  - 吞嚥瞬間咽部肌肉收縮\n  - 咽部關閉，視野被遮擋\n  - **「正吞嚥瞬間看不到」**\n  - 需根據前後推測\n- **不能看食道期**\n- 需要專業操作\n- 病人可能不適（鼻腔插管）\n\n## 詳細比較表（★ 考點）\n\n| 項目 | VFSS | FEES |\n|---|---|---|\n| **地點** | 放射科 | **床邊** |\n| **輻射** | **有** | **無** |\n| **設備** | 大型、固定 | 可攜帶 |\n| **口腔期觀察** | **可** | **不可** ★ |\n| **咽部期觀察** | 可 | 可（但 white-out） |\n| **食道期觀察** | **可** | 不可 |\n| **吞嚥瞬間觀察** | 可（X-ray 透過） | **不可（white-out）** |\n| **吞嚥前/後觀察** | 可 | **可（直視）** |\n| **分泌物/唾液** | 不易看（無顯影） | **清楚可見** ★ |\n| **黏膜病灶** | 不易看 | 清楚 |\n| **骨性結構** | 清楚 | 不可見 |\n| **感覺評估** | 不可 | 可（touch test） |\n| **反覆使用** | 輻射劑量限制 | 可反覆 |\n| **費用** | 高 | 低 |\n| **需 SLP + 放射師** | ✓ | 只需 SLP |\n\n## 各選項分析\n\n### (A) 敏感度與特異度 — 錯誤\n\n**實際研究結果**：\n- 兩者**敏感度和特異度相當**\n- FEES 在某些面向**甚至更好**：\n  - 唾液誤吸\n  - 感覺缺損\n  - 分泌物管理\n- VFSS 在某些面向更好：\n  - 口腔期\n  - 食道期\n  - Kinematic 分析\n- **沒有哪一個是「全面」更佳**\n\n### (B) FEES 偵測唾液誤吸 ★ 正確\n\n**為什麼 FEES 更適合？**\n\n#### VFSS 的限制\n- 唾液**無顯影劑**\n- X-ray 下**看不見**\n- 只能偵測有鋇劑的物質\n- 若只看 VFSS：**錯過唾液誤吸**\n\n#### FEES 的優勢\n- 直接視診咽喉\n- 可見：\n  - **唾液積聚（pooling）**\n  - **流入氣道**\n  - **聲帶上殘留**\n  - **氣管內分泌物**\n- 可長時間觀察（監測數分鐘至數十分鐘）\n- 適合：\n  - 慢性神經系統疾病\n  - 中風後管理\n  - NPO 病人（吞嚥停食中）\n  - ICU 插管後\n\n### (C) FEES 口腔期 — 錯誤\n\n**FEES 無法觀察口腔期**：\n- 內視鏡在鼻咽以下\n- 從鼻腔進入\n- 無法視診口腔內\n- 口腔期問題（咀嚼、食團形成、舌頭推進）需 VFSS\n\n### (D) 誤吸一致性 — 錯誤\n\n**實際研究**：\n- **VFSS 與 FEES 對「是否誤吸」一致性高**\n- Kelly et al. 2007：kappa > 0.7\n- 各研究：一致性**中等至高**\n- (D) 敘述「很低」不正確\n\n### (E) 咽殘留一致性 — 錯誤\n\n- 兩者在判斷**咽殘留**的一致性**也佳**\n- FEES 甚至**更敏感**（直接視診）\n- (E) 敘述「不佳」不正確\n\n## 適應症比較\n\n### 優先選 VFSS\n- 首次完整評估\n- 口腔期明顯問題\n- 食道期疑慮\n- 兒科（兒童配合度）\n- 特殊姿勢評估\n- 治療介入評估（thickening、下顎動作）\n\n### 優先選 FEES\n- 床邊、ICU\n- **無法移動的病人**\n- **疑唾液誤吸**（神經系統疾病）★\n- **分泌物管理評估**\n- 黏膜病灶懷疑\n- 反覆監測（如術後追蹤）\n- 輻射敏感族群（孕婦、兒童）\n- 鋇劑過敏\n\n### 合併使用\n- 複雜個案兩者結合\n- 優勢互補\n\n## 臨床情境範例\n\n### 案例 1：急性中風\n- 首選：FEES（床邊、反覆）\n- 後續：VFSS（全面評估）\n\n### 案例 2：Parkinson 病人\n- 首選：VFSS（可評估動作失調、口腔期）\n- 追蹤：FEES（長期監測）\n\n### 案例 3：ALS\n- 首選：FEES（監測惡化）\n- 評估唾液管理與分泌物\n\n### 案例 4：頭頸癌術後\n- 兩者皆用\n- FEES 看術後結構與殘留\n- VFSS 看整體吞嚥動力\n\n## 相關評估工具\n\n### 通用量表（用於兩種檢查）\n- **PAS（Penetration-Aspiration Scale）**（Rosenbek 1996）\n  - 8 級\n  - 1：正常 → 8：沉默誤吸\n- **Functional Oral Intake Scale (FOIS)**\n- **Yale Pharyngeal Residue Severity Rating Scale**\n\n### 特定於 FEES\n- **FEDSS (Fiberoptic Endoscopic Dysphagia Severity Scale)**\n- **NOMS (National Outcomes Measurement System)**\n\n## 考點速記\n\n| 項目 | 正確答案 |\n|---|---|\n| **唾液誤吸偵測** | **FEES 優** ★ |\n| 口腔期觀察 | **VFSS（FEES 不可）** |\n| 食道期 | VFSS |\n| 床邊檢查 | FEES |\n| 輻射 | VFSS 有 |\n| 一致性 | 兩者一致性**高**（非低） |\n| White-out | FEES 特徵（吞嚥瞬間看不到） |\n| Gold standard | **VFSS**（綜合能力） |",

      "detail": "**兒童語言與社交溝通發展**\n\n## 正常語言發展里程碑（★ 核心）\n\n### 0-3 個月\n- **哭泣、咕咕聲**（cooing，2 個月起）\n- **社會性微笑（social smile）**：**6-8 週** ★\n- 可辨認熟悉聲音\n- 轉向聲音來源\n- 3 個月：微笑已穩定\n\n### 4-6 個月\n- **牙牙學語**（babbling，4-6 個月）\n- 模仿聲音\n- 發出「ba」「ma」聲\n- 笑出聲\n- 表情豐富\n\n### 7-12 個月\n- **有意義的 babbling**（reduplicated babbling）\n- 指物（pointing，約 9-12 個月）\n- **第一個有意義的字**（12 個月）★\n- 揮手再見、拍手\n- Joint attention 建立\n\n### 12-18 個月\n- 單字詞彙 10-50\n- 指物、指身體部位\n- 服從簡單指令\n\n### 18-24 個月\n- **雙字詞組合**（18-24 個月）\n- 詞彙爆發（word spurt）\n- 50+ 詞彙\n\n### 2-3 歲\n- **3 字句**\n- 詞彙 200-1000\n- 開始問問題\n- **陌生人聽懂 50%**\n\n### 3-4 歲\n- 4-5 字句\n- 完整句子\n- **陌生人聽懂 75-100%**\n\n### 5 歲\n- 語言基本完整\n- 說故事\n- 遵守多步驟指令\n\n## (B) 為什麼錯誤？\n\n### 社會性微笑（Social Smile）時程\n\n| 年齡 | 發展 |\n|---|---|\n| 0-4 週 | Reflexive smile（反射性、睡眠中） |\n| **6-8 週** | **Social smile 開始**（對人臉反應）★ |\n| 3 個月 | **Social smile 成熟、穩定** |\n| 4-6 個月 | 針對性（認識的人） |\n\n### 3 個月未發展 social smile 的意義\n\n**這是溝通障礙警訊**：\n- **自閉症類群障礙（ASD）**早期徵兆\n- 發展遲緩\n- 視覺障礙\n- 重度智能障礙\n- 嚴重憂鬱（產後互動問題）\n- 神經系統疾患\n\n**應該評估**：\n- 眼神接觸\n- Joint attention\n- 對名字反應\n- 模仿\n- 情感互動\n\n### 選項 (B) 敘述錯誤\n- 「年齡 3 個月的嬰兒**未**發展出社會性的微笑」\n- 這不是正常現象，是**警訊**\n- 應在 6-8 週就發展，3 個月已應穩定\n\n## 溝通障礙警訊（Red Flags）— (E) 正確\n\n### 任何年齡\n- 溝通能力退化\n- 反覆、刻板行為\n\n### 6 個月前\n- **缺乏 social smile**（6-8 週後）\n- **缺乏 eye contact**（6 個月） ★\n- 不轉向聲音\n- 缺乏 cooing\n- 不回應互動\n\n### 9-12 個月\n- 無 babbling\n- 無 gesture（揮手、指物）\n- 不回應名字\n- 無 joint attention\n- 不回應情感\n\n### 16 個月\n- 無單字\n\n### 24 個月\n- 無雙字詞組合\n- 詞彙 < 50\n\n### 任何時間\n- **退化**（語言或社交能力）\n- 目光不對\n- 無對話輪流\n- 不尋求分享\n\n## DSM-5 定義的溝通障礙 — (A) 正確\n\n### 1. Language Disorder（語言障礙）\n- 詞彙、語法、論述困難\n- 接受性、表達性或兩者\n\n### 2. Speech Sound Disorder（構音障礙）\n- 發音困難\n- 影響理解\n\n### 3. Childhood-Onset Fluency Disorder（口吃）\n- 流暢度、節奏異常\n\n### 4. Social (Pragmatic) Communication Disorder（社交溝通障礙）\n- **社交溝通的實用性問題**\n- 不會：\n  - 問候、輪流對話\n  - 改變溝通方式\n  - 推論意義\n  - 理解隱喻、幽默\n- **無 ASD 的限制重複行為**\n\n### 5. Autism Spectrum Disorder（自閉症類群障礙）\n- **社交溝通與互動缺損**\n- **+ 限制、重複的行為、興趣或活動**（必要）\n\n### SCD vs ASD（★ 本題考點）\n\n| 項目 | SCD | ASD |\n|---|---|---|\n| 社交溝通缺損 | ✓ | ✓ |\n| **限制重複行為** | ✗ | **✓** ★ |\n| 狹隘興趣 | ✗ | ✓ |\n| 感官敏感 | 不典型 | 常見 |\n| 發病 | 早期 | 早期 |\n| 治療 | 語言治療 | 綜合治療 |\n\n**最大區別**：**限制重複行為（RRB）的有無**\n\n## 顎裂（Cleft Palate）與發音 — (C) 正確\n\n### 解剖與功能\n- **軟顎 + 硬顎**功能：\n  - 在說話時**分隔口腔與鼻腔**\n  - Velopharyngeal closure（顎咽閉合）\n- 顎裂：無法有效閉合\n\n### 發音特徵\n\n**過度鼻音（Hypernasal speech）** ★\n- 空氣從鼻腔漏出\n- 口腔音（如 p, b, t, d, k, g）受影響\n- 聲音悶、鼻音重\n- 如「m」一樣但應該是「b」\n\n**其他特徵**：\n- Nasal air emission（鼻漏氣）\n- Compensatory articulation（代償性發音）\n- 重度者智商正常但語音不清\n\n### 與鼻音不足（Hyponasal）區別\n| 類型 | 原因 |\n|---|---|\n| **Hypernasal** | 顎咽閉合不全（顎裂、短軟顎） |\n| Hyponasal | 鼻塞、扁桃腺肥大 |\n\n### 處置\n- **手術修補**（6-12 個月） — 注意：台灣原出題選項 (D) 寫「年齡 6-12 個月時可接受腭裂修補手術」，但本題題目用的是「下列敘述何者錯誤」的判斷，這敘述**大致正確**\n- **語言治療**\n- **顎蓋板**（若無法手術）\n- 長期追蹤\n\n## 聽障與溝通 — (D) 正確\n\n### 影響因素\n\n1. **聽障類別**：\n   - 傳導性（conductive）\n   - 感音性（sensorineural）\n   - 混合性\n   - 中樞性\n\n2. **嚴重度**：\n   - 輕度 26-40 dB\n   - 中度 41-70 dB\n   - 重度 71-90 dB\n   - 極重度 > 90 dB\n\n3. **病因**：\n   - 遺傳\n   - 感染（TORCH、meningitis）\n   - 噪音暴露\n   - 藥物（ototoxic）\n   - 老化\n\n4. **發生年齡**：\n   - **Prelingual**（語言發展前）：衝擊最大\n   - **Perilingual**\n   - **Postlingual**：保留語言能力\n\n5. **認知能力**：智力 = 補償能力\n\n6. **後天環境**：\n   - 家庭支持\n   - 早期介入\n   - 教育\n   - 語言暴露（手語 / 口語 / 唇讀）\n   - 科技輔具（hearing aids, CI）\n\n### 新生兒聽力篩檢\n- **台灣：出生後 3 天內篩檢**\n- OAE、ABR\n- 異常：3 個月確診 → 6 個月介入（1-3-6 原則）\n\n## 眼神接觸（Eye Contact）發展 — (E) 正確\n\n### 正常發展\n- **出生時**：初步眼神接觸\n- **6 週**：主動尋找臉\n- **2-3 個月**：穩定追蹤\n- **4-6 個月**：眼神交流\n- **9-12 個月**：Joint attention\n\n### 6 個月前\n- **無眼神接觸**：警訊\n- 可能意味：\n  - ASD\n  - 視覺障礙\n  - 發展遲緩\n  - 照顧互動問題\n\n## 考點速記\n\n| 發展 | 時間 |\n|---|---|\n| **Social smile** | **6-8 週** |\n| Cooing | 2 個月 |\n| Babbling | 4-6 個月 |\n| 第一個字 | 12 個月 |\n| 雙字句 | 18-24 個月 |\n| 完整句子 | 3-4 歲 |\n\n**3 個月無 social smile = 警訊**（非正常）",

    "question": "下列有關吞嚥困難病人接受吞嚥治療之敘述，何者錯誤？",

    "choices": [

      { "key": "B", "text": "在上食道括約肌不易打開的情況下可使用 Shaker 運動來改善，Shaker 運動可訓練舌骨上肌 (suprahyoid muscle)" },

    ],
    "answer": "C",
    "explanation": {
      "summary": "(C) 錯誤。**神經性吞嚥困難病人有會厭谿殘留時，應採「低頭（chin-down/chin-tuck）」姿勢**，而非抬下巴。Chin-tuck 可增加咽部空間、保護氣道、防止殘留物進入氣道；**Chin-up（抬下巴）則相反—打開咽部通道**，適合**舌頭功能差但咽喉正常**的病人（如舌癌術後，利用重力送食）。會厭谿殘留者用 chin-up 反而**增加誤吸風險**。",
      "detail": "**吞嚥治療技巧總覽**\n\n## 吞嚥的四階段\n\n1. **口腔準備期（Oral preparatory）**：咀嚼、形成食團\n2. **口腔期（Oral）**：舌頭推送食團至咽喉\n3. **咽喉期（Pharyngeal）**：吞嚥反射、氣道保護、食團通過咽喉\n4. **食道期（Esophageal）**：食道蠕動送至胃\n\n## 姿勢調整技巧（★ 本題核心）\n\n### 1. Chin-Down / Chin-Tuck（低頭、縮下巴）\n\n**動作**：下巴下壓、貼近胸骨\n\n**適應症**：\n- **延遲性吞嚥反射**（delayed swallow reflex）\n- **會厭谿（valleculae）殘留** ★\n- **舌根推送力不足**\n- **氣道保護不全**\n- 防止 premature spillage\n\n**機轉**：\n- 縮小咽部入口\n- **擴大會厭谿空間**\n- 會厭更易覆蓋氣道\n- 咽後壁靠近\n- 降低誤吸風險\n\n### 2. Chin-Up（抬下巴、仰頭）\n\n**適應症**：\n- **舌頭推送力嚴重受損**（舌癌術後、舌下神經麻痺）\n- **咽喉功能正常**\n- **利用重力**將食物送至咽喉\n\n**機轉**：\n- 伸直咽部通道\n- 重力輔助\n- **但會打開氣道入口**\n- **若咽喉功能異常則危險**\n\n**(C) 為什麼錯誤**：\n- 會厭谿殘留屬**咽喉功能異常**\n- 用 chin-up 會使殘留物**更易流入氣道**\n- 正確應為 **chin-down**\n\n### 3. Head Rotation（頭部轉向患側）\n\n**適應症**：單側咽部無力\n\n**機轉**：\n- 頭轉向**患側**\n- 壓迫患側，關閉患側通道\n- 食物從**健側**通過\n- 減少梨狀竇（pyriform sinus）殘留\n\n### 4. Head Tilt（頭部側傾至健側）\n\n**適應症**：\n- 單側舌頭或咽部無力\n- 側頭至健側利用重力\n\n## 吞嚥運動訓練\n\n### 1. Masako Maneuver（Tongue-hold swallow）— (A) 正確\n\n**動作**：\n- 舌尖**輕咬於上下牙齒之間**\n- 保持舌頭前伸姿勢下吞嚥\n\n**目的**：\n- 訓練**後咽壁**（posterior pharyngeal wall）肌力\n- 增加咽後壁與舌根的接觸\n- 強化吞嚥時的咽部收縮\n\n**注意**：\n- 不要在進食時做（只做乾吞嚥）\n- 舌頭伸太前反而減少食團輸送效率\n\n### 2. Shaker Exercise — (B) 正確\n\n**動作**：\n- **仰臥**，不用枕頭\n- 頭抬起看自己腳趾（sustained + repetitive）\n- 30 秒 × 3 次 + 30 次快速抬頭\n- 每日 3 次\n\n**目的**：\n- 訓練 **suprahyoid muscles**（舌骨上肌）★\n- 增加喉部上提\n- **改善上食道括約肌（UES）打開**\n- 減少咽部殘留\n\n**適應症**：\n- UES 開啟不足\n- 梨狀竇殘留\n- 腦幹中風後\n\n### 3. Mendelsohn Maneuver（孟德森手法）— (D) 正確\n\n**動作**：\n- 吞嚥時**持續上提喉部 2-5 秒**\n- 手動感覺喉結上升維持\n\n**目的**：\n- 延長喉部上提時間\n- 延長 UES 打開時間\n- 改善食團通過\n- **減少梨狀竇殘留**\n- **減少誤吸**\n\n**適應症**：\n- 喉部上提不足\n- UES 打開不良\n- 梨狀竇殘留\n\n### 4. Effortful Swallow（用力吞嚥）\n\n**動作**：吞嚥時極力用力，像吞大藥丸一樣\n\n**目的**：\n- 增加舌根後推\n- 減少 valleculae 殘留\n- 改善咽部壓力\n\n### 5. Supraglottic Swallow\n\n**動作**：\n1. 深吸氣後閉氣\n2. 吞嚥\n3. 咳嗽\n4. 再吞一次\n\n**目的**：\n- **主動關閉聲門**\n- 保護氣道\n- 適合聲帶無力、氣道保護不全\n\n### 6. Super-Supraglottic Swallow\n\n- 比 supraglottic 更用力\n- 額外的 false vocal cord adduction\n- 用於喉部術後\n\n## 食物質地調整（IDDSI 標準）\n\n### IDDSI（International Dysphagia Diet Standardisation Initiative）\n\n| Level | 食物 |\n|---|---|\n| 0 | Thin liquid（稀流質） |\n| 1 | Slightly thick |\n| 2 | Mildly thick |\n| 3 | Moderately thick / Liquidised |\n| 4 | Pureed / Extremely thick |\n| 5 | Minced & moist |\n| 6 | Soft & bite-sized |\n| 7 | Regular |\n\n## 吞嚥治療進階技巧\n\n### 1. Neuromuscular Electrical Stimulation (NMES)\n- VitalStim、其他設備\n- 電刺激咽部肌群\n- 配合傳統治療\n- 證據混合\n\n### 2. Thermal-Tactile Stimulation\n- 冰凍棉棒刺激舌前弓\n- 加速吞嚥反射\n\n### 3. Expiratory Muscle Strength Training (EMST)\n- 訓練 expiratory muscle\n- 改善咳嗽、氣道保護\n- Parkinson 病人研究支持\n\n### 4. Lee Silverman Voice Treatment (LSVT)\n- PD 病人語音治療\n- 也改善吞嚥\n\n## 鼻胃管、胃造口\n\n### 適應症\n- 嚴重誤吸\n- 無法經口足夠進食\n- 預期長期需求\n\n### 選擇\n- 短期（< 4-6 週）：NG tube\n- 長期：**PEG**（percutaneous endoscopic gastrostomy）\n\n## 常見臨床情境\n\n| 情境 | 首選技巧 |\n|---|---|\n| Valleculae 殘留 | **Chin-down** ★ |\n| 延遲吞嚥反射 | Chin-down + thermal-tactile |\n| 舌癌術後 + 正常咽喉 | **Chin-up** ★ |\n| UES 開啟不足 | **Shaker** |\n| 喉部上提不足 | **Mendelsohn** |\n| 單側咽無力 | **Head rotation to weak side** |\n| 氣道保護不全 | **Supraglottic swallow** |\n| 咽部肌力弱 | **Masako** |\n\n## 考點速記\n\n| 姿勢/技巧 | 目的 |\n|---|---|\n| **Chin-down** | **Valleculae 殘留、延遲反射** ★ |\n| **Chin-up** | 舌頭差 + 咽喉正常（舌癌術後） |\n| **Head rotation** | 單側無力（轉向患側） |\n| **Masako** | 後咽壁肌力 |\n| **Shaker** | 舌骨上肌、UES 打開 |\n| **Mendelsohn** | 喉部上提、梨狀竇殘留 |\n| **Supraglottic** | 氣道保護 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 26 \"Dysphagia\"", "url": null },
        { "text": "Logemann JA. Evaluation and Treatment of Swallowing Disorders. 2nd ed. Pro-Ed, 1998", "url": null },
