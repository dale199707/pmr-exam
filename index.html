    "question": "下列有關顱內出血 (intracranial hemorrhage)之敘述，何者最正確？",
    "imageUrl": null,
    "choices": [
      {
        "key": "A",
        "text": "出血性腦中風的死亡率比缺血性腦中風高，所造成的神經缺損 (neurological deficit) 的恢復也比缺血性腦中風差"
      },

        "text": "高血壓是造成出血性腦中風最常見的原因，其常見的出血位置為基底核 (basal ganglia)、丘腦 (thalmus)、小腦及延腦 (medulla oblongata)"
      },

        "key": "C",
        "text": "囊狀動脈瘤 (berry aneurysm) 是造成蜘蛛膜下腔出血最常見的原因，而動脈瘤破裂最常發生在前大腦動脈 (anterior cerebral artery)，最少發生在椎基底動脈循環 (vertebrobasilar system)"
      },

        "text": "腦出血的發生原因、發生部位、出血容積 (volume)及病人昏迷指數 (Glasgow coma scale)可用來預測中風的預後"

        "text": "缺血性腦中風的急性期處置，可在中風發生後 3 小時之內注射靜脈血栓溶解劑 (recombinant tissue plasminogen activator, rtPA)，但越接近 3 個小時，注射後發生腦出血的風險會變高"
      }

    "answer": "C",
    "explanation": {
      "summary": "**囊狀動脈瘤最常發生在前交通動脈（ACoA，約 30-35%）**，然後是後交通動脈（PCoA，約 25-30%）、中大腦動脈（MCA，約 20%）；**後循環（vertebrobasilar）確實最少（~5-10%）**。前大腦動脈（ACA）本身的動脈瘤不算最多，但前循環整體遠多於後循環。此題答案選 C 的核心是「後循環最少」這個描述正確。\n\n**其他選項都有錯**：A 的神經恢復描述錯、B 的出血位置漏掉 pons 且延腦不是典型位置、D 雖接近但「發生原因」不一定直接影響預後、E 的 rtPA 風險描述反了。",
      "detail": "**詳細分析**\n\n**(A) ✗ 「神經缺損恢復比缺血性差」並不完全正確**：\n\n整體死亡率 ICH > ischemic 這部分正確，但：\n- ICH 倖存者的神經缺損**恢復速度甚至較快**（初期）\n- 因為 ICH 周圍的血腫會吸收，腦組織受壓迫改善\n- 相對地，ischemic stroke 的組織已壞死，恢復更多靠代償\n- 但**功能預後**整體 ICH 較差（因為死亡率高）\n- 這個選項描述過於絕對\n\n**(B) ✗ 常見出血位置列錯一個**：\n\n高血壓性 ICH 好發位置（頻率由高至低）：\n1. **Basal ganglia（putamen，~50%）**\n2. **Thalamus（~15%）**\n3. **Pons（~10%）** ← 選項漏掉\n4. **Cerebellum（~10%）**\n5. Lobar（~10-15%，但 lobar 多由 CAA 而非 HTN）\n\n- 選項寫「**延腦（medulla oblongata）**」而非 **pons** — medulla 不是高血壓性出血的典型位置\n- 所以 (B) **錯誤**\n\n**(C) ✓ 囊狀動脈瘤好發部位**：\n\n**Anterior circulation（~85-90%）**\n- **Anterior communicating artery (ACoA)**：**30-35%**（最常見！）\n- **Posterior communicating artery (PCoA)**：25-30%\n- **MCA bifurcation**：20-25%\n- ICA 其他位置：10%\n\n**Posterior circulation（~10-15%，最少）**\n- Basilar tip：~5-8%\n- PICA、AICA、SCA：~5%\n\n- 選項說「**動脈瘤最常發生在前大腦動脈**」— 廣義可解讀為 ACoA（前交通動脈）或前循環\n- 「**最少發生在椎基底動脈循環**」— 正確\n- 所以 (C) **基本正確**，因此為最佳答案\n\n**(D) ✗ 預後預測因子描述不夠精準**：\n\n**ICH Score（Hemphill 2001）** 使用：\n1. GCS（13-15: 0 分、5-12: 1 分、3-4: 2 分）\n2. Age（≥ 80: 1 分）\n3. **Infratentorial origin（1 分）**—「部位」\n4. **Volume（≥ 30 ml: 1 分）**—「容積」\n5. IVH presence（1 分）\n\n- 「**發生原因（etiology）**」並不是 ICH Score 的項目\n- 雖然原因**間接影響**預後（如 CAA vs HTN）\n- 但選項描述將「原因」列為直接預測因子，**不夠精準**\n\n**(E) ✗ rtPA 描述反了**：\n\n- 「**越接近 3 小時注射，腦出血風險越高**」— **錯誤**\n- 實際上是：\n  - **越早注射效果越好**（time is brain）\n  - **腦出血風險雖隨時間增加（0-3 hr 較低，3-4.5 hr 稍高），但絕對風險仍然不高**\n  - 對病人選擇標準仔細的話，腦出血風險 3-4.5 hr 窗口仍可接受\n- 2018 AHA 指引：**0-3 hr**（標準）、**3-4.5 hr**（部分病人）\n- **> 4.5 hr 不建議靜脈 rtPA**（需考慮機械取栓）\n- 此選項描述反了 — **時間越久，不是越接近 3 小時，腦出血風險才較高**\n\n**囊狀動脈瘤（Berry / Saccular Aneurysm）進一步細節**\n\n**危險因子**\n- 高血壓\n- 抽菸\n- 酗酒\n- 家族史\n- 多囊性腎病（ADPKD）\n- 結締組織疾病（Ehlers-Danlos type IV、Marfan）\n\n**破裂風險**\n- **大小**：> 7 mm 風險增加\n- 位置：**後循環 > 前循環**（雖後循環發生率少但破裂風險高）\n- 形狀不規則、dome-to-neck ratio 高\n\n**治療**\n1. **Endovascular coiling**（血管內彈簧圈栓塞）：第一選擇\n2. **Surgical clipping**：特定情況（巨大動脈瘤、MCA 動脈瘤）\n3. **Flow diverter**：巨大/無頸動脈瘤\n\n**ISAT trial（2002, Lancet）**：\n- Coiling vs Clipping\n- Coiling 組**1 年死亡/失能率較低**\n- 但 coiling 再治療率較高\n- 目前大多情況 coiling 為優先\n\n**急性 SAH 併發症（3R）**\n1. **Re-bleeding**：前 72 hr 最高風險\n2. **Vasospasm → Delayed Cerebral Ischemia (DCI)**：Day 4-14\n3. **Hydrocephalus**：急性（血塊阻塞）或慢性（蛛網膜顆粒功能差）",

        "key": "C",
        "text": "中風發生仍在 24 小時之內，雖然病人非大血管栓塞，仍可給予機械性血栓取出術"
      },
      {
        "key": "D",
        "text": "上午 10:00，仍可給予靜脈注射 rtPA，並可合併使用機械性血栓取出術"

      {
        "key": "E",
        "text": "給予靜脈注射血栓溶解劑後 12 小時之後才能開始予抗凝血劑"

      "summary": "病人於 6:00 發病，10:00 時已過 **4 小時** — 超過 IV rtPA 標準 4.5 小時時限的邊緣。**動脈注射血栓溶解劑（IA thrombolytics）** 可延伸使用到 **6 小時**，此時仍可考慮。",
      "detail": "**本題時間軸分析**：\n- 發病：早上 6:00\n- 評估/決定：上午 10:00\n- **經過 4 小時**\n\n**各治療時間窗**：\n\n| 治療方式 | 時間窗 | 本題適用性 |\n|---|---|---|\n| **IV rtPA（標準）** | 0-4.5 小時 | **邊緣（剩 30 分鐘），實務上已接近錯過** |\n| **IA thrombolytics（動脈內溶栓）** | **0-6 小時** | **✓ 仍可用** |\n| **Mechanical thrombectomy** | 0-24 小時（需 LVO + 影像符合） | 需 LVO |\n\n**各選項分析**：\n\n**(A) ✗** 現行 AHA/ASA 標準是 **4.5 小時**。且本題病人還在 4 小時多的邊緣，不能說「已超過」（指超過 4.5hr）。\n\n**(B) ✓** IA thrombolytics 時間窗到 6 小時，現在 4 小時仍可考慮\n- PROACT II trial 證實 IA pro-urokinase 對 MCA 阻塞有效\n- 現代實務已被 mechanical thrombectomy 取代，但傳統上時間窗較長\n\n**(C) ✗** Mechanical thrombectomy **僅適用於 large vessel occlusion (LVO)**，本題病人「非大血管栓塞」，**不符合取栓適應症**。\n\n**(D) ✗** 10:00 已接近 4.5 小時極限，實務上難以及時完成 IV rtPA。且非 LVO 不需 bridging thrombectomy。\n\n**(E) ✗** IV rtPA 後抗凝血劑啟動時間：**24 小時後**（不是 12 小時），且需確認無腦出血轉化。\n\n**補充：IA vs Mechanical Thrombectomy 現況**：\n- 2015 年起（MR CLEAN、ESCAPE、EXTEND-IA、SWIFT PRIME、REVASCAT）機械取栓成為 LVO 首選\n- 2018 年 DAWN、DEFUSE-3 將取栓窗口延至 24 小時\n- IA 溶栓仍用於無法取栓或遠端血管病灶",

      "detail": "**失語症類型與血管定位**（重要！常考）：\n\n| 失語症 | 病灶 | 血管 | 特徵 |\n|---|---|---|---|\n| **Broca** | Left inferior frontal gyrus | **Left MCA superior division** | 非流暢、理解佳、重覆差 |\n| **Wernicke** | Left posterior superior temporal gyrus | **Left MCA inferior division** | 流暢但無意義、理解差、重覆差 |\n| Conduction | Arcuate fasciculus | Left MCA | 流暢、理解好、**重覆差** |\n| Global | 大範圍左半球 | Left ICA | 非流暢、理解差、重覆差 |\n| **TMA** | **Anterior to Broca（SMA）** | **Left ACA** | 非流暢、理解好、**重覆保留** |\n| TSA | Posterior to Wernicke | Left PCA | 流暢、理解差、**重覆保留** |\n| Mixed Transcortical | Watershed | Border zone | 非流暢、理解差、**重覆保留** |\n\n**記憶訣竅**：**Transcortical 系列：repetition 保留**（因為 arcuate fasciculus 完整）\n\n**各選項分析**：\n\n**(A) ✓ Left ACA → TMA**：SMA、prefrontal 受損，自發語言極少、重覆保留，常伴「下肢無力 > 上肢」\n\n**(B) ✗** Left MCA **inferior division → Wernicke aphasia**，不是 Broca。Broca 是 **superior division**。\n\n**(C) ✗** Hemineglect 主要是 **right MCA inferior division**（temporal, parietal），不是單純 superior division\n\n**(D) ✗** **Hemispatial neglect 主要在右半球**。左頂葉大範圍 → Gerstmann + ideomotor apraxia + alexia\n\n**(E) ✗** **Ideomotor apraxia 主要在左頂葉（優勢側）**，非優勢側頂葉特徵是 neglect、constructional apraxia、anosognosia",

      "detail": "**各選項分析**：\n\n**(A) ✗ 過度嚴格控糖**：\n- 急性中風病人血糖目標：**140-180 mg/dL**（AHA 建議）\n- 避免低血糖（嚴重低血糖反而加重腦傷）\n- 不是「< 120 mg/dL 嚴格控制」\n\n**(B) ✗ 長期 DAPT 增加出血**：\n- **短期 DAPT（21 天）**：minor stroke/TIA 實證（CHANCE、POINT）有效，之後轉單藥\n- **長期 DAPT**：**出血風險顯著增加**（MATCH trial），不建議\n\n**(C) ✗ NOACs 不需要監測 INR**：\n- **Warfarin**：需監測 INR（目標 2-3）\n- **NOACs (DOACs)**：**不需監測 INR**（固定劑量）\n- 兩者是不同類藥物，選項混淆\n\n**(D) ✗ Statin 對正常血脂中風病人也有效**：\n- **SPARCL trial**（Atorvastatin 80mg）：\n  - 對象：中風/TIA 病人（不必高膽固醇）\n  - 結果：**再中風 ↓ 16%**\n  - LDL < 70 mg/dL 獲益最大\n- Statin 益處不只降脂：**plaque stabilization、anti-inflammatory、endothelial function**\n- 血脂正常的中風病人**仍建議 high-intensity statin**\n\n**(E) ✓ CEA 的實證**：\n- **NASCET trial**（NEJM 1991）：症狀性 ICA 狹窄 **70-99%**，CEA 可將 2 年中風風險由 26% 降至 9%\n- **ECST trial**：相似結論\n- 狹窄 50-69% 也有益處（但較小）\n- < 50% 無益\n\n**CAS vs CEA（CREST trial）**：效果相當；CAS 短期中風風險較高，CEA 短期 MI 風險較高。\n\n**中風次級預防總整理**：\n\n| 介入 | 適應症 |\n|---|---|\n| 抗血小板 | 非心因性中風 |\n| 抗凝血 | AF、機械瓣膜、LV 血栓 |\n| **Statin** | **所有 ASCVD 中風**，LDL < 70 |\n| BP 控制 | < 130/80 |\n| HbA1c | < 7%（個別化） |\n| **CEA** | **症狀性 ICA 狹窄 ≥ 70%** |\n| PFO closure | 60 歲以下 cryptogenic + large PFO |",

      "summary": "**Second lumbrical-interosseous (2L-INT) technique** 是 **PNP + 懷疑 CTS** 的診斷利器。蚓狀肌（median）和骨間肌（ulnar）在**同一位置記錄、相同距離刺激**，可排除個體差異，適用於 SNAP 消失或振幅低的病人。",
      "detail": "**2L-INT Technique 原理**：\n\n- 同一個 active electrode 位置（第三掌骨外側中點）\n- 分別刺激 median 和 ulnar 神經（同樣 8-10 cm 距離）\n- 記錄：\n  - Median → 2nd lumbrical（蚓狀肌）\n  - Ulnar → 2nd interosseous（骨間肌）\n- 比較 distal motor latency\n- **> 0.4-0.5 ms 差異 = 異常（支持 CTS）**\n\n**優點**：\n\n1. **適用 PNP + CTS**：\n   - PNP 使兩條神經都受影響\n   - 比較 median vs ulnar 可**消除全身性因素**\n   - 只剩「腕隧道局部差異」\n\n2. **嚴重 CTS 仍可測**：\n   - 即使 APB 記錄無 CMAP、SNAP 消失\n   - 蚓狀肌運動纖維**較深、較內側**，相對保留\n   - 可在極重度 CTS 仍有訊號\n\n**為什麼蚓狀肌較 thenar 保留？**\n- Yates（1981）：thenar motor fibers 較淺、較前方 → 容易被 flexor retinaculum 壓迫\n- Lumbrical fibers 較深、較中央 → 相對保留\n\n**各選項分析**：\n\n**(A) ✗** Median vs Ulnar DML：受全身 PNP 影響，無法區分局部或全身\n**(B) ✓ 2L-INT technique**：cross-nerve comparison 消除全身因素\n**(C) ✗** CMAP amplitude 比較：PNP 兩條都下降\n**(D) ✗** Median vs Radial DML：非標準方法\n**(E) ✗** Palm-wrist vs wrist-finger 比較：PNP 兩段都慢，仍有干擾\n\n**2L-INT 敏感度**：Mild CTS ~76-85%；Severe CTS（無 SNAP/APB）~75% 仍可抓到。\n\n**臨床流程**：\n1. 懷疑 CTS → routine NCS\n2. 若 routine 正常 → median-ulnar sensory D4 比較\n3. 若病人有 PNP → **2L-INT comparison**（關鍵）\n4. 若 median SNAP/CMAP 都消失 → **2L-INT 仍可檢測**",

      "detail": "**Recruitment Patterns 整理**：\n\n| Pattern | MUP 數量 | 發射頻率 | 意義 |\n|---|---|---|---|\n| **Full** | 多 | 正常 | 正常 |\n| **Reduced** | 少 | **高**（> 20 Hz） | Neurogenic |\n| **Discrete / Single-unit** | **極少（1-2 units）** | **極高**（> 30 Hz） | **嚴重 neurogenic loss** |\n| **Early recruitment** | 多 | **低** | Myopathic |\n| **Absent** | 無 | — | 完全 denervation |\n\n**各選項對應**：\n\n**(A) 多發性神經病變**：遠端肌肉 reduced，通常不到 discrete\n**(B) 神經根病變**：reduced，非 extreme discrete\n**(C) 外傷重接恢復**：MUP polyphasic, long duration（nascent MUPs）\n**(D) 脊髓病變 ✓**：\n- **Anterior horn cell 廣泛破壞**（多 segments）\n- **下行 corticospinal tract 中斷**（central drive 減少）\n- **兩重 motor unit 損失**\n- **Extreme reduced / discrete recruitment**\n- 典型：ALS、CSM、spinal cord tumor\n**(E) CTS**：侷限 median distal，嚴重時 reduced，非脊髓層級\n\n**Central activation failure**：\n- Corticospinal tract 受損時，病人無法徵召更多 MUs\n- UMN lesion 的表現\n- 脊髓病變常見\n\n**正常 recruitment 生理**（size principle, Henneman）：\n- Low-threshold MUs 先（slow-twitch type I）\n- Higher-threshold MUs 後（fast-twitch type II）\n- Firing rate 5-10 Hz → 40-50 Hz",

      "summary": "**F-wave 是 stimulus-locked 反應**（與刺激時間綁定）。「將刺激器離開皮膚後再放電」可以觀察訊號是否仍出現——若是真正的 F-wave，離開皮膚後就不會再出現；若是背景 volitional MU activity，即使沒刺激也會繼續放電。調高音量更容易聽到時間關聯。",
      "detail": "**F-wave 基本原理**：\n\n- 最大（supramaximal）強度刺激運動神經\n- 產生 **orthodromic**（順行）衝動 → 肌肉（M-wave）\n- 同時 **antidromic**（逆行）衝動傳回 α motor neuron\n- 部分 α motor neuron 被反向激發後「backfire」\n- 再向下傳 → 產生 **F-wave**\n\n**F-wave 特徵**：\n- **變異性大**（每次激發的 motor unit 不同）\n- Latency 有範圍\n- Amplitude 小（< M-wave 5%）\n- **Stimulus-locked**：必定在刺激後某固定時間範圍內出現\n\n**本題情境**：\n- F-wave 看到但 morphology 和 latency 都變異很大\n- 懷疑有背景 volitional MU activity 混入（病人沒完全放鬆）\n\n**區分方法**：\n\n**(D) ✓** 調高音量 + 觀察刺激 artifact：\n- 真的 F-wave：一定跟在 stimulus artifact 之後\n- 背景 MU activity：**即使沒刺激也會出現**\n- 把刺激器離開皮膚（不刺激）觀察 → 仍有訊號 = 背景 volitional activity\n- 聽音量也有幫助辨識（volitional activity 有聲音連續性）\n\n**(A) ✗** 增加 stimulus duration 到 5 ms：\n- 不會幫助區分\n- 反而可能增大 stimulus artifact 污染波形\n\n**(B) ✗** 降低刺激強度：\n- F-wave 需要 **supramaximal stimulation** 才穩定、才可重複\n- 降低強度會讓 F-wave 消失或更不穩定\n- 不能區分\n\n**(C) ✗** 增加刺激頻率（> 1 Hz）：\n- F-wave 會**習慣化（habituation）**，amplitude 下降\n- 正確頻率是 **0.5 Hz**（每 2 秒一次）\n- 不能區分\n\n**(E) ✗** 請病人做輕微自主收縮：\n- 這會**增加**背景 MU activity，更難區分\n- 相反的做法：應該請病人完全放鬆\n- （輕微收縮是用在 H-reflex 輔助或 single fiber EMG）\n\n**F-wave 臨床應用**：\n\n| 用途 | 意義 |\n|---|---|\n| Minimal F latency 延長 | Demyelinating neuropathy (CIDP、GBS) |\n| F-wave absent / low persistence | 近端運動神經病變 / GBS 早期 |\n| F-wave chronodispersion 增加 | Demyelination |\n| Persistence（出現率）< 50% | 異常 |\n\n**F-wave vs H-reflex 複習**：\n\n| 特徵 | F-wave | H-reflex |\n|---|---|---|\n| 刺激強度 | **Supramaximal** | **Submaximal** |\n| 刺激 duration | 短（0.1-0.2 ms） | **長（0.5-1 ms）** |\n| 機制 | Motor 逆行 backfire | Ia 感覺單突觸反射 |\n| 頻率 | 0.5 Hz | 0.1-0.2 Hz |\n| 主要肌肉 | 多數運動神經 | Soleus（主）、FCR |",

      "detail": "**Suprascapular Nerve（肩胛上神經）解剖軌跡**：\n\n起源：上臂叢 **upper trunk (C5-C6)**\n\n**走向**：\n\n1. Upper trunk → 超肩鎖骨\n2. 穿越 **suprascapular ligament**\n3. 通過 **Suprascapular notch（肩胛上切跡）**\n4. → **分支給 supraspinatus（棘上肌）**\n5. 繼續沿肩胛骨後側\n6. 通過 **Spinoglenoid notch（肩胛盂棘切跡）**\n7. → **分支給 infraspinatus（棘下肌）**\n\n**病灶定位表**：\n\n| 病灶位置 | Supraspinatus | Infraspinatus | LABCN | Deltoid/Biceps |\n|---|---|---|---|---|\n| **Spinoglenoid notch** | **正常** | **異常** | 正常 | 正常 |\n| Suprascapular notch | 異常 | 異常 | 正常 | 正常 |\n| Upper trunk | 異常 | 異常 | **異常** | 異常 |\n| C5-C6 radiculopathy | 異常 | 異常 | 可能正常 | 異常 + paraspinal 異常 |\n\n**為什麼 LABCN 是關鍵？**\n\n- **Lateral Antebrachial Cutaneous Nerve**：Musculocutaneous nerve 的感覺終支\n- 路徑：upper trunk → lateral cord → musculocutaneous → LABCN\n- **LABCN sensory NCS 正常 → 排除 upper trunk 病變**\n- **LABCN sensory NCS 異常 → 支持 upper trunk 或近端病變**\n\n**各選項分析**：\n\n**(A) ✗** 棘上 + 棘下都異常：支持 suprascapular notch 或更近端，不是 spinoglenoid\n\n**(B) ✓** 僅棘下肌異常 + 棘上肌正常 + LABCN 正常：\n- 棘下肌異常：病灶在 spinoglenoid notch 之後\n- 棘上肌正常：病灶在 suprascapular notch **之後**（已分支給棘上肌）\n- LABCN 正常：排除 upper trunk\n- **最特異性支持 spinoglenoid notch 病變**\n\n**(C) ✗** 棘上肌 CMAP 異常 → 病灶在 suprascapular notch 或更近端\n\n**(D) ✗** 三角肌（axillary n.）+ 肱二頭肌（musculocutaneous n.）異常 → 典型 **C5 radiculopathy 或 upper trunk plexopathy**\n\n**(E) ✗** 棘上+棘下+LABCN 都異常 → upper trunk 病變\n\n**Spinoglenoid Notch Syndrome 臨床要點**：\n\n**常見原因**：\n- **Paralabral cyst**（最典型！盂唇撕裂後關節液滲出形成囊腫）\n- 反覆過頂動作（排球、網球、投球）\n- 外傷\n\n**臨床表現**：\n- **外旋無力**（infraspinatus 是主要外旋肌）\n- 外展無力較輕（supraspinatus 保留）\n- **深層肩後疼痛**（神經性）\n- **棘下肌萎縮可見**\n- 感覺正常（suprascapular n. 無皮膚感覺支配）\n\n**影像**：超音波 / MRI 常可見 paralabral cyst\n\n**治療**：\n- 保守：肌力訓練、休息\n- 手術：囊腫抽吸 + 盂唇修復 + 神經減壓",

      "detail": "**Radial Nerve 分支順序（由近至遠）**：\n\n1. **在 axilla**：triceps（medial, long, lateral heads）\n2. **Spiral groove 之前**：triceps 分支大多已分出\n3. **Spiral groove**：穿 lateral intermuscular septum\n4. **Radial tunnel / 肘前**：分為兩支：\n   - **Radial nerve 主幹（superficial radial, 感覺）**\n   - **PIN（posterior interosseous nerve, 純運動）**\n5. Supinator：PIN 穿過 Arcade of Frohse\n\n**關鍵：誰由 PIN 支配，誰不是？**\n\n**不經過 PIN（仍由 radial 主幹）**：\n- **Brachioradialis (BR)**\n- **ECRL（Extensor Carpi Radialis Longus）** ← 非常重要！\n- Supinator 的部分分支\n\n**由 PIN 支配**：\n- ECRB（Extensor Carpi Radialis Brevis，部分研究）\n- **Supinator**（Arcade of Frohse 之後）\n- **ECU（Extensor Carpi Ulnaris）** ← 關鍵！\n- **EDC（Extensor Digitorum Communis）**\n- EDM（Extensor Digiti Minimi）\n- **APL、EPB、EPL**（拇指伸展）\n- **EIP（Extensor Indicis Proprius）**\n\n**PIN 病變的伸腕表現**：\n\n- **ECRL 正常**：拉腕橈側屈（**radial deviation**）\n- **ECU 無力**：本應平衡到尺側屈\n- **淨效果：伸腕時偏橈側**（radial deviation）\n\n→ 選項 (E) 說尺側偏移，**方向相反，錯誤**\n\n**各選項分析**：\n\n**(A) ✓ 鑑別診斷範圍**：\n- C7 radiculopathy：可能影響伸肌（C7 多 innervate triceps + 伸肌）\n- Posterior cord lesion：Radial + axillary 都受影響\n- Radial axilla：全部 radial innervated 都受影響，含 triceps\n- Radial spiral groove：triceps 保留但其他 radial 肌肉受影響\n- PIN：BR、ECRL、triceps 保留，其他伸肌受影響\n- 都合理\n\n**(B) ✓** NCS 與健側對照是電診常規（排除個體變異）\n\n**(C) ✓ 排除 C7 radiculopathy 的肌肉選擇**：\n- FCR（Flexor Carpi Radialis）：Median n. 支配，**C6-C7 根**\n- PT（Pronator Teres）：Median n. 支配，**C6-C7 根**\n- 這些肌肉若異常 → 支持 C7 radiculopathy（同一節神經根分布）\n- 若正常 → 排除 C7 radiculopathy（病灶不在根部）\n- 適合的鑑別工具\n\n**(D) ✓ 超音波檢查 PIN 壓迫**：\n- PIN 最常壓迫於 **Arcade of Frohse**（supinator 近端腱膜）\n- 其他原因：脂肪瘤、神經節囊腫\n- 超音波可動態觀察\n\n**(E) ✗** 如上所述，PIN 病變手腕偏**橈側**\n\n**進階：PIN vs 其他 Radial 病變的鑑別**\n\n| 肌肉 | Axilla | Spiral groove | PIN |\n|---|---|---|---|\n| Triceps | 異常 | **正常** | 正常 |\n| BR | 異常 | 異常/可能保留 | **正常** |\n| ECRL | 異常 | 異常 | **正常** |\n| EDC | 異常 | 異常 | **異常** |\n| ECU | 異常 | 異常 | **異常** |\n| 感覺（手背橈側） | 異常 | 異常 | **正常**（純運動） |\n\n**垂腕（Wrist Drop）**：\n- Full wrist drop：Axilla / spiral groove lesion（ECRL 也受影響）\n- **Partial wrist drop + radial deviation**：PIN lesion（ECRL 保留）\n- Finger drop only + wrist extension OK：**典型 PIN**\n\n**Radial Tunnel Syndrome（RTS）**：\n- 同樣在 supinator 區域\n- **疼痛為主**，**無明顯無力**\n- 常與 tennis elbow 混淆或共存\n- 電診通常正常",

      "detail": "**H reflex 刺激參數**：\n\n| 參數 | 正確值 | 選項 (B) 說的 |\n|---|---|---|\n| **Duration** | **長（0.5-1 ms）** | 短 < 0.4 ms ✗ |\n| Intensity | **Submaximal**（低於 M-wave threshold） | — |\n| Frequency | 0.1-0.2 Hz | — |\n| 記錄肌肉 | Soleus（成人） / FCR（上肢） | — |\n\n**為什麼 H reflex 需要長 duration + 低強度？**\n\n**Strength-Duration curve 原理**：\n- 大直徑纖維（**Ia, 12-20 µm**）閾值低，對長 duration 電流較敏感\n- 小直徑運動纖維（α motor）閾值較高\n- 用**長 duration + 低強度**：\n  - 只激發 Ia\n  - Ia orthodromic → 脊髓 → 單突觸 → α motor neuron → H wave\n  - **不激發運動纖維 → 沒有 antidromic 碰撞**\n- 相反地，用**短 duration + 高強度**（用於 CMAP）：\n  - 同時激發運動纖維\n  - **Antidromic collision → H wave 被消除**\n\n**所以 (B) 「duration < 0.4 ms 避免刺激 Ia」完全錯誤**（要短 duration 反而刺激不到 Ia）\n\n**各選項分析**：\n\n**(A) ✓ H reflex 雙側比較**：\n- **Latency 差 > 1.5 ms 為異常**\n- 身高/腿長影響 latency，故兩側**距離必須相同**\n- 通常刺激位置：popliteal fossa\n- 記錄位置：soleus-gastrocnemius junction\n\n**(B) ✗** 如上，方向顛倒\n\n**(C) ✓ 記錄位置**：\n- **Active electrode**：比目魚肌與腓腸肌交界\n- Reference：Achilles tendon\n- Ground：膝蓋區\n\n**(D) ✓ Ia 纖維先被激發**：\n- Ia 直徑最大，閾值最低\n- 電刺激由小到大：\n  - 低強度 → 激發 Ia → **H wave 先出現**\n  - 中強度 → 開始激發運動纖維 → M wave 出現\n  - 高強度 → Antidromic 碰撞 → **H wave 消失**\n  - Supramaximal → 只有 M wave，H wave 不見\n\n**(E) ✓ H reflex 分布**：\n- **成人主要可在 soleus 記錄**（以 tibial n. 刺激）\n- 上肢：**FCR with median n.**（較難做）\n- 其他多數肌肉成人無法記錄（嬰兒 < 1 歲各處都可，因為 descending inhibition 未成熟）\n\n**H reflex 臨床應用**：\n\n1. **S1 radiculopathy**（最重要）：\n   - 單側 absent 或 latency 延長 > 1.5 ms\n   - 比 SEP 或 EMG 更早異常\n   - 可檢出純感覺性根病變\n\n2. **Generalized polyneuropathy**：\n   - 雙側 absent 或延長\n   - GBS、CIDP、DM neuropathy\n\n3. **Spasticity evaluation**：\n   - **H/M ratio > 0.5** 異常（肌肉痙攣）\n   - 用於 UMN lesion 的量化\n\n4. **Motoneuron excitability 研究**\n\n**H reflex 異常判讀要點**：\n\n| 表現 | 意義 |\n|---|---|\n| 單側 absent | S1 radiculopathy |\n| 單側 latency 延長 > 1.5 ms | S1 radiculopathy |\n| 雙側 absent | PNP、CIDP、> 60 歲可能正常人 |\n| H/M ratio ↑ | Spasticity (UMN) |\n| H/M ratio ↓ | 下運動神經元病變 |\n\n**F-wave vs H-reflex 比較**：\n\n| 項目 | F-wave | H-reflex |\n|---|---|---|\n| Duration | 短（0.1-0.2 ms） | **長（0.5-1 ms）** |\n| Intensity | **Supramaximal** | **Submaximal** |\n| 機制 | Motor backfire | Ia 單突觸反射 |\n| 是否真反射 | 否 | **是** |\n| 主要肌肉 | 多數運動神經 | Soleus 為主 |",

      "detail": "**各選項分析**：\n\n**(A) ✓ 有氧運動對血壓的影響**：\n- **高血壓病人**：\n  - 收縮壓：約 **-5 to -8 mmHg**\n  - 舒張壓：約 **-2 to -5 mmHg**\n  - 顯著臨床意義（類似一顆降壓藥的效果）\n  - Cornelissen 2013 meta-analysis 證實\n- **血壓正常者**：\n  - 多數研究顯示 **< 10 mmHg** 變化\n  - 可能是 -2 ~ -5 mmHg\n  - 仍有心血管預防效益（不只看 BP）\n\n**(B) ✗ 總血液量增加的機制**：\n\n| 時間 | 變化 |\n|---|---|\n| 訓練 1-2 週 | **血漿容量快速增加（10-20%）** |\n| 訓練 2-4 週 | 紅血球逐漸增加 |\n| 訓練數月 | 兩者都持續增加 |\n\n- **Plasma volume expansion**是主要快速變化（透過 renin-aldosterone、albumin）\n- **紅血球增加較慢**\n- 實際上**血漿增加比紅血球多** → **初期 hematocrit 反而下降**（sports pseudoanemia）\n- 選項 (B) 說「只與 RBC 有關，與 plasma 無關」**完全錯誤**\n\n**(C) ✗ 體成分變化**：\n- **體脂肪 ↓**（主要效果）\n- **Fat-free mass（去脂肪體重）維持或略升**，**不是下降**\n- 有氧運動主要減脂肪，不減肌肉\n- 若合併阻力訓練，去脂肪體重會**明顯增加**\n- 選項說「去脂肪體重也下降」錯誤\n\n**(D) ✗ 肌纖維類型的改變**：\n- **Type 1 vs Type 2 的總數量比例 = 基因決定為主，訓練不會改變**\n- 運動引起的改變：\n  - **Selective hypertrophy**（某類纖維變大，但數量不變）\n  - **Type 2B → Type 2A 的轉換**（耐力訓練使肌纖維偏向氧化）\n  - 粒線體密度、毛細血管密度增加\n- **數量比例本身不改變** → (D) 錯\n\n**(E) ✗ 訓練特異性（Specificity of Training）**：\n- **會**造成特異性適應\n- **SAID principle (Specific Adaptation to Imposed Demand)**：\n  - 跑步訓練 → 跑步進步最多\n  - 游泳訓練 → 游泳進步最多\n- **肌肉群特異性**：訓練到的肌肉才有適應\n- **能量系統特異性**：\n  - 有氧訓練 → 粒線體、氧化酵素 ↑\n  - 無氧訓練 → 糖解酵素 ↑\n- 選項 (E) 完全反面，錯誤\n\n**完整有氧訓練後的適應整理**：\n\n**心血管系統**：\n| 參數 | 變化 |\n|---|---|\n| Resting HR | ↓ |\n| Max HR | 不變 |\n| Stroke volume（max 和 rest） | ↑ |\n| Cardiac output (max) | ↑ |\n| VO₂max | ↑（黃金指標） |\n| BP（HTN 病人） | ↓ |\n| BP（正常人） | 略↓（< 10 mmHg） |\n| Total blood volume | ↑（plasma > RBC） |\n| Hematocrit（初期） | ↓（plasma 擴張） |\n\n**肌肉骨骼**：\n- 粒線體數量 ↑、大小 ↑\n- 氧化酵素（SDH、citrate synthase）↑\n- Myoglobin ↑\n- Capillary density ↑\n- Type 1 hypertrophy（耐力訓練）\n- Type 2B → 2A conversion\n\n**代謝**：\n- FFA 氧化能力 ↑\n- Insulin sensitivity ↑\n- HDL ↑\n- LDL、TG ↓\n- Glycogen 儲存 ↑\n\n**體成分**：\n- **體脂肪 ↓**\n- **Fat-free mass 維持或略升**\n\n**呼吸系統**：\n- Max ventilation ↑\n- 休息通氣率不變\n- VE/VO₂ ratio ↓（呼吸效率提高）",

      "detail": "**糖尿病運動處方指引（ADA/ACSM 2022）**：\n\n**運動前評估**：\n\n1. **Medical screening 必做**：\n   - 心血管病史、藥物、低血糖史\n   - 足部、眼部、腎功能\n   - 併發症評估\n\n2. **Exercise stress testing 建議給誰？**\n   - 年齡 > 35 歲\n   - 有 CVD 風險因子（HTN、dyslipidemia、smoking、family history）\n   - 併發症（neuropathy、nephropathy、retinopathy）\n   - 有心血管症狀\n   - **準備開始激烈強度（> 60% VO₂max）運動**\n\n→ ADA 目前不要求**所有** DM 病人做運動測試（已不是硬性要求），但有 risk factor 或計畫激烈運動者**仍應考慮**。\n\n**為什麼 DM 需要特別謹慎？**\n\n- **Silent MI**：DM neuropathy 讓胸痛感覺遲鈍\n- **Autonomic neuropathy**：HR 反應異常、BP 調節差、heat intolerance\n- **Subclinical CAD 盛行率高**（即使年輕）\n\n**各選項分析**：\n\n**(A) ✓** 規律運動益處：\n- 改善胰島素敏感性（最直接）\n- 降低 HbA1c（0.5-0.7%）\n- 減少 DM 併發症（CVD、CKD、retinopathy 進展）\n- 改善血脂、血壓\n- 降低心血管事件\n\n**(B) ✓ 預防 DM 進展**：\n- **DPP trial**（Diabetes Prevention Program）:\n  - 生活型態（運動+飲食+減重 5-7%）→ **T2DM 發生率 ↓ 58%**\n  - Metformin 組 ↓ 31%\n  - 生活型態效果比藥還好\n- 150 分鐘/週中等強度運動可有效預防\n\n**(C) ✓ 有氧 + 阻力訓練加成**：\n- HART-D trial：combined training 對 HbA1c 降幅最大\n- ADA 建議：\n  - 有氧：150 min 中等強度 或 75 min 高強度/週\n  - 阻力：**2-3 次/週**\n  - 合併更佳\n- 機制：\n  - 有氧 → insulin sensitivity ↑\n  - 阻力 → 肌肉量 ↑（glucose disposal ↑）\n\n**(D) ✗** 如上，DM 病人不能**直接套用一般人處方**，需個別化評估\n- 低血糖預防（SU、insulin 使用者）\n- 足部保護（neuropathy）\n- 眼部（retinopathy）\n- 心血管\n- 激烈運動前**仍應評估**\n\n**(E) ✓ 阻力訓練禁忌**：\n\n| 狀況 | 原因 |\n|---|---|\n| **控制不良高血壓** | 阻力運動 → BP 飆升 |\n| **嚴重增殖性視網膜病變** | Valsalva → 視網膜/玻璃體出血 |\n| **嚴重周邊神經病變** | 感覺差 → 足部潰瘍風險、關節損傷 |\n| 不穩定心血管疾病 | 心臟負荷 |\n| 急性併發症（DKA、HHS） | 代謝不穩 |\n\n**DM 運動處方實務**：\n\n**1. 血糖管理**：\n- 運動前 < 100 mg/dL → 補充 15-30 g CHO\n- > 250 mg/dL + ketones → 延後運動\n- 運動中監測低血糖：發抖、冒汗、頭暈\n- **運動後延遲性低血糖**（可能 4-24 小時發生）\n\n**2. 足部**：\n- 適當鞋具\n- 運動後檢查\n- Neuropathy 患者：避免高衝擊（改 swimming、cycling）\n\n**3. Retinopathy**：\n- Proliferative：避免 Valsalva、阻力、高衝擊\n- 非增殖性、穩定：中等強度可接受\n\n**4. Autonomic neuropathy**：\n- Silent ischemia 風險\n- HR / BP 反應異常 → 運動測試特別有價值\n\n**5. 注射胰島素者**：\n- 避免注射在運動的肢體（吸收加速 → 低血糖）\n- 運動前 1 小時內減量\n- 運動中補糖",

      "detail": "**Length-Tension Relationship 詳解**：\n\n**主動張力（Active tension）**：\n- 來自 actin-myosin 的 crossbridge 形成\n- **Optimal length（最適長度）**：actin 和 myosin filament 重疊最佳\n- **過長**：filament 重疊減少 → 主動張力下降\n- **過短**：filament 互相干擾（thin filament collision）→ 主動張力下降\n\n**被動張力（Passive tension）**：\n- 來自結締組織、titin 等彈性成分\n- 肌肉**越拉長，被動張力越大**（像橡皮筋）\n\n**總張力 = 主動 + 被動**：\n- 在 optimal length 附近：主動為主\n- 很長時：被動為主（但主動貢獻小）\n\n→ 選項 (D) 錯誤：**主動收縮力量最大不在最長時**，而是在 **optimal length（中等長度）**\n\n**各選項分析**：\n\n**(A) ✓ Type 1 vs Type 2 粒線體**：\n\n| 特徵 | Type 1 (Slow) | Type 2A | Type 2B/2X (Fast) |\n|---|---|---|---|\n| **粒線體** | **多** | 中 | **少** |\n| 氧化酵素 | 高 | 中 | 低 |\n| 糖解酵素 | 低 | 中 | 高 |\n| 收縮速度 | 慢 | 快 | 最快 |\n| 易疲勞 | 不易 | 中 | 易 |\n| 適合活動 | **耐力** | 中間 | **爆發力** |\n| 顏色 | 紅（myoglobin 多） | 紅 | 白 |\n\n**(B) ✓ Eccentric contraction（離心收縮）**：\n- 肌肉被動拉長的同時主動出力\n- **力量最大**的收縮形式（> concentric > isometric）\n- **徵召較多 fast twitch fibers**（type 2）\n- **較容易造成 DOMS**（延遲性肌肉痠痛）\n- 訓練中重要但風險較高\n\n**(C) ✓ Isokinetic contraction（等速收縮）**：\n- **固定速度的收縮**\n- **自然界不存在**（自然動作都是變速的）\n- 需要特殊設備（Cybex、Biodex）才能達成\n- 臨床用於：\n  - 肌力精確測量\n  - 復健訓練\n  - 運動表現評估\n\n**(D) ✗** 如上所述\n\n**(E) ✓ 肌力訓練初期的 Neuromuscular adaptation**：\n- **訓練前 4-6 週**：力量顯著增加\n- 主要機制：\n  - **神經徵召效率 ↑**（motor unit recruitment）\n  - **Firing rate ↑**\n  - **同步性 ↑**（motor unit synchronization）\n  - **拮抗肌抑制 ↑**\n  - **運動技巧提升**\n- **肌肉體積（hypertrophy）需 4-6 週以上才顯著改變**\n- Moritani & deVries 經典研究（1979）\n\n**三種肌肉收縮比較**：\n\n| 類型 | 長度變化 | 力量大小 | 能量效率 |\n|---|---|---|---|\n| **Isometric**（等長） | 不變 | 中 | 最高 |\n| **Concentric**（向心，縮短） | 變短 | 中 | 中 |\n| **Eccentric**（離心，伸長） | 變長 | **最大** | 最低（最易損傷） |\n\n**收縮速度與力量**（Hill equation / Force-velocity）：\n- Concentric：速度越快，力量越小\n- Eccentric：速度越快，力量仍大（甚至更大）\n- Isometric：速度 = 0，力量中等",

      "detail": "**老化運動生理核心觀念**：\n\n**VO₂max 隨年齡下降**：\n\n| 族群 | 下降速度 |\n|---|---|\n| **Sedentary（久坐不動）** | **~ 10% per decade**（25-30 歲以後） |\n| Active | ~ 5% per decade |\n| Trained athletes | ~ 5% per decade（甚至更慢） |\n| 女性停經後 | 12-15% per decade（若 sedentary） |\n\n→ 選項 (A) 說 5-15% 是合理範圍（視活動程度而定）\n\n**VO₂max 下降的機轉（Fick equation）**：\n\n$$VO_2 = CO \\times (a\\text{-}vO_2 \\text{ diff}) = HR \\times SV \\times (a\\text{-}vO_2)$$\n\n**老化各要素下降**：\n\n| 參數 | 隨年齡變化 | 主要原因 |\n|---|---|---|\n| **HRmax** | **↓** | 公式：~ 220 - age（或 208 - 0.7×age） |\n| **Stroke volume** | ↓ | 心室僵硬、preload 下降 |\n| **Cardiac output** | ↓ | HR + SV 兩者都↓ |\n| **Max a-v O₂ difference** | ↓ | **肌肉氧化能力↓、粒線體↓、capillary↓** |\n| VO₂max | ↓↓ | 綜合結果 |\n\n- 年輕人：VO₂max 限制主要是**中央因素（cardiac output, ~ 77%）**\n- 老年人：**peripheral（肌肉氧化）的貢獻增加**，尤其極老（senescent）族群\n\n**Trainability（訓練反應性）**：\n\n- **老年人的 VO₂max 相對提升（% improvement）和年輕人相當**\n- 文獻：12 週耐力訓練後：\n  - 年輕人：VO₂max ↑ 13%\n  - 老年人：VO₂max ↑ 6-15%（多數研究顯示接近）\n- Meta-analysis（Huang 2005）：老年人平均 **↑ 16.3%**\n- 機制：cardiac output 仍可改善（70%）+ 氧萃取仍可改善（30%）\n\n→ **(C) 錯誤**：老人訓練後 VO₂max 上升幅度**不輸給年輕人**\n\n**各選項分析**：\n\n**(A) ✓** VO₂max 每 10 年下降 5-15%（視活動程度）\n\n**(B) ✓** 肌肉氧化能力下降 → a-v O₂ difference 下降\n- Capillary density ↓\n- 粒線體數量、功能 ↓\n- 氧化酵素 ↓\n\n**(C) ✗** 如上，老人的相對 trainability 接近年輕人\n\n**(D) ✓ 使用實測 HRmax 而非預測值**：\n- 老年人 **HRmax 個體變異大**\n- 「220 - age」公式的標準差 ± 10-15 bpm\n- 高估或低估訓練強度都不好\n- 實務：**symptom-limited GXT 測 HRmax** 最準\n- 若無法做測試，改用 **RPE (Borg 6-20 scale)** 或 talk test\n\n**(E) ✓ 優先使用器械，非自由重量**：\n- 老年人使用器械（machine）的好處：\n  - **安全性高**（固定軌跡）\n  - 不需要平衡技巧\n  - 適合平衡差的長者\n  - 減少跌倒風險\n  - 學習曲線短\n- 自由重量需要：\n  - 平衡、協調\n  - 核心穩定\n  - 技巧\n- 老年人**先用機器建立基礎**，之後技巧好可以漸進加入 free weight\n\n**老年人運動處方要點（ACSM 2022）**：\n\n**有氧**：\n- 150 min 中等強度/週（如快走）\n- 或 75 min 高強度\n- 分散 ≥ 3 天\n- 從 RPE 11-13 開始\n\n**阻力**：\n- 2-3 次/週\n- 8-10 個主要肌群\n- 每組 10-15 reps\n- **器械優先**，漸進 free weight\n\n**平衡**：\n- ≥ 2-3 次/週\n- 尤其跌倒風險高者\n- Tai Chi、Frenkel exercises\n\n**柔軟度**：\n- ≥ 2 次/週\n- 每次 10 分鐘\n- 動態 + 靜態\n\n**注意事項**：\n- 特殊族群（CHF、COPD、DM、骨質疏鬆）需個別化\n- 從低強度開始漸進\n- 水分補充、溫度調節\n- 跌倒防範",

      "detail": "**肌纖維類型完整比較表**（重要！常考）：\n\n| 特徵 | **Type 1 (SO)** | **Type 2A (FOG)** | **Type 2B/2X (FG)** |\n|---|---|---|---|\n| **別稱** | Slow Oxidative, Red | Fast Oxidative-Glycolytic | Fast Glycolytic, White |\n| **收縮速度** | 慢 | 快 | **最快** |\n| **疲勞耐受** | **最耐疲勞** | 中等 | 易疲勞 |\n| **ATP 來源** | **氧化磷酸化** | 氧化 + 糖解 | 糖解為主 |\n| **粒線體** | 多 | 中-多 | **少** |\n| **氧化酵素**（SDH、citrate） | 高 | 中-高 | 低 |\n| **糖解酵素**（PFK、LDH） | 低 | 中 | **高** |\n| **Myoglobin** | **多**（紅肌） | 中 | 少（白肌） |\n| **微血管密度** | **高** | 中 | 低 |\n| **肝醣儲存** | 中 | 中-高 | **高**（2B > 2A > 1） |\n| **Triglyceride 儲存** | **高** | 中 | 低 |\n| **肌纖維直徑** | 小 | 中 | **大**（2B > 2A > 1） |\n| **運動單位大小** | 小 | 中 | 大 |\n| **徵召閾值** | 低（先徵召） | 中 | 高（後徵召） |\n| **代表肌肉** | Soleus、脊椎旁肌 | 大腿肌（混合） | 二頭肌、小腿外展肌 |\n| **適合活動** | **耐力**（馬拉松） | 中距離（800-1500m） | **爆發力**（舉重、100m 衝刺） |\n\n**各選項分析**：\n\n**(A) ✓ Type 1 ATP 來源**：\n- 主要：**氧化磷酸化（mitochondria）**\n- 底物：脂肪酸、葡萄糖、乳酸\n- 適合長時間、低強度\n\n**(B) ✓ 粒線體：Type 2A > Type 2B**：\n- Type 2A 是「氧化-糖解混合型」，粒線體較多\n- Type 2B 純糖解，粒線體少\n- 粒線體排序：**Type 1 > Type 2A > Type 2B**\n\n**(C) ✗ 肝醣儲存（錯誤）**：\n\n正確順序：**Type 2B > Type 2A > Type 1**\n\n**為什麼快縮肌肝醣多？**\n- Type 2B 主要靠**糖解（glycolysis）**產能\n- 糖解需要快速動員 glycogen\n- 所以肝醣儲存必須高\n- 相反，Type 1 主要靠脂肪氧化，不太需要大量肝醣\n\n**肝醣、triglyceride、myoglobin 儲存對比**：\n\n| 底物 | Type 1 | Type 2A | Type 2B |\n|---|---|---|---|\n| **Glycogen（肝醣）** | 中 | 中-高 | **高** |\n| **Triglyceride（脂肪）** | **高** | 中 | 低 |\n| **Myoglobin** | **高** | 中-高 | 低 |\n\n**記憶法**：\n- 紅肌（type 1）儲存**脂肪**（長效能）\n- 白肌（type 2B）儲存**肝醣**（快速能）\n\n**(D) ✓ Type 2B vs Type 1**：\n- 收縮速度：2B > 1（2B 為爆發型）\n- 易疲勞：2B > 1\n- ATPase 活性：2B 高（收縮快）\n\n**(E) ✓ 肌纖維直徑**：Type 2B > Type 2A > Type 1\n- 大直徑 → 大力量\n- 但也較容易肥大（hypertrophy potential）\n- 阻力訓練主要讓 type 2 纖維增大\n\n**訓練對肌纖維的影響**：\n\n**耐力訓練**：\n- Type 1 hypertrophy\n- **Type 2B → Type 2A 轉換**（變得更氧化）\n- 粒線體密度 ↑（各種纖維）\n- 微血管密度 ↑\n- 氧化酵素活性 ↑\n\n**阻力訓練**：\n- **Type 2 hypertrophy**（主要）\n- 糖解酵素 ↑\n- CP 儲存 ↑\n- 神經適應（前幾週）\n- 肌纖維**數量比例基本不改變**（僅有 2B ↔ 2A 轉換）\n\n**老化對肌纖維的影響**：\n- **Type 2 preferential atrophy**（快縮肌優先萎縮）\n- Motor unit 數量減少\n- 肌纖維體積縮小\n- 殘存 motor unit 會「吸收」去神經纖維 → reinnervation\n- 結果：剩下的 motor unit 變大但慢（type 1 dominant）\n- 這就是 **sarcopenia** 的神經-肌肉基礎\n\n**臨床應用**：\n\n**運動員的肌纖維比例**：\n- 馬拉松選手：type 1 ~ 80%\n- 短跑衝刺選手：type 2 ~ 70%\n- 一般人：接近 50:50（因人而異）\n\n**訓練處方建議**：\n- 要改善**耐力** → 長時間、低-中強度有氧（targeting type 1 + type 2A）\n- 要改善**爆發力** → 短時間、高強度、舉重（targeting type 2B）\n- 要改善**老年 sarcopenia** → **阻力訓練 + 蛋白質攝取**（targeting type 2 恢復）",

      "summary": "**等長運動（isometric）**因為**無動態肌肉泵**，血管壓迫造成**收縮壓與舒張壓都上升**（典型的 pressure load），不是「舒張壓持平或下降」。相反地，**動態運動（dynamic / aerobic）**才是**收縮壓升、舒張壓持平或略降**。",
      "detail": "**動態 vs 等長運動的心血管反應（重要！）**：\n\n**動態運動（Dynamic / Aerobic Exercise）**：\n- 例子：跑步、騎車、游泳\n- 肌肉反覆收縮-放鬆 → **肌肉泵作用**促進回心血量\n- **心輸出量（CO）大幅上升**（可達休息的 4-6 倍）\n- **HR 大幅上升**\n- **Stroke volume 上升**\n- **周邊血管阻力（PVR）下降**（運動肌肉的血管擴張）\n- **收縮壓 ↑↑**（20-40 mmHg）\n- **舒張壓：持平或略降**（PVR 下降所致）\n- 又稱 **volume load**（容量負荷）\n\n**等長運動（Isometric / Static Exercise）**：\n- 例子：舉重、握拳、撐體操\n- **持續的肌肉收縮**無放鬆 → **壓迫血管、阻礙血流**\n- **心輸出量上升較小**（無 muscle pump）\n- **HR 上升較小**\n- **Stroke volume 不顯著上升**\n- **周邊血管阻力維持或升高**（被壓迫的肌肉動脈、加上交感反射）\n- **收縮壓 ↑**\n- **舒張壓 ↑**（因 PVR 增加）\n- 又稱 **pressure load**（壓力負荷）\n\n**兩種反應比較表**：\n\n| 指標 | Dynamic | Isometric |\n|---|---|---|\n| HR ↑ | **大幅** | 較小 |\n| CO ↑ | **大幅** | 較小 |\n| Stroke volume ↑ | 大幅 | 較少 |\n| **PVR** | **下降** | **維持 / 升高** |\n| **SBP** | **大幅 ↑** | ↑ |\n| **DBP** | **持平或略降** | **↑**（重要！） |\n| 心臟負荷 | Volume load | **Pressure load** |\n\n**各選項分析**：\n\n**(A) ✓** HR：dynamic > isometric（動態運動 HR 上升較多）\n\n**(B) ✗** **等長運動時 DBP 也上升**（因 PVR 增加），選項說「持平或略降」錯誤\n\n**(C) ✓** CO：dynamic > isometric（動態 CO 上升較多）\n\n**(D) ✓** Dynamic 運動 → 運動肌肉血管擴張 → PVR 下降\n\n**(E) ✓** Isometric 運動 → **PVR 不下降**（反而可能上升）\n\n**臨床意義**：\n\n**心衰竭病人避免等長運動的原因**：\n- Isometric 產生 **pressure load** → 心臟後負荷急劇增加\n- 可能誘發：\n  - 血壓飆升\n  - 心肌耗氧增加（demand ischemia）\n  - 心衰惡化\n  - 主動脈剝離風險\n- 建議 aerobic exercise（volume load）為主\n\n**高血壓病人運動建議**：\n- 有氧為主\n- 阻力訓練 OK 但**中低強度、避免屏息（Valsalva）**\n- 避免極端 isometric\n\n**年長者 / CAD 病人注意**：\n- 舉重時的 Valsalva 引起血壓尖峰（可達 300/150 mmHg）\n- 教導「呼氣時出力」\n\n**Resistance exercise 介於兩者之間**：\n- 動態的肌肉收縮（類似 dynamic）\n- 但負重高、反覆 Valsalva → 帶有部分 isometric 特性\n- 現在廣泛用於 rehabilitation，**中低強度安全**",

      "summary": "**橫膈神經電刺激植入後無法立即取代呼吸器**。長期機械通氣使橫膈肌萎縮、去適應（deconditioning），需要**數週至數個月的漸進式 pacing 訓練**（conditioning/reconditioning）讓橫膈肌重建耐力，才能完全脫離呼吸器。",
      "detail": "**Phrenic Nerve Pacing（橫膈神經起搏）基礎**：\n\n**適應症**：\n- 高位頸髓損傷（C3 以上）需長期機械通氣\n- Central alveolar hypoventilation syndrome\n- 中樞性呼吸衰竭（brainstem lesion）\n- 必要條件：**橫膈神經 LMN 仍完整**（phrenic n. 起源 C3-C5，此段 anterior horn cells 需保留）\n\n**術前評估**：\n1. 橫膈神經 CMAP 檢查（電刺激頸部/胸部 phrenic n. 看橫膈 CMAP）\n2. 橫膈透視（fluoroscopy）看動態\n3. 肺功能、胸壁順應性\n4. 心理社會因素\n\n**術後管理（重要！）**：\n\n**Conditioning / Reconditioning Phase（橫膈肌再訓練）**：\n\n| 時期 | 做法 |\n|---|---|\n| 植入後 2-4 週 | 傷口復原 |\n| Conditioning 初期 | **低頻、低振幅、短時間刺激**（每天數分鐘開始） |\n| 漸進期 | 每週增加刺激時長 |\n| 3-6 個月 | 目標達到每天 12-24 小時 pacing |\n| 最終 | 可完全脫離 ventilator |\n\n**為什麼需要漸進訓練？**\n- 長期 ventilator 使橫膈肌**嚴重萎縮**（disuse atrophy）\n- **Type 1 纖維轉化為 Type 2**（快縮、易疲勞）\n- 直接高頻刺激會造成**疲勞、失敗**\n- 需要類似復健概念，慢慢把 Type 2 轉回 Type 1\n\n**各選項分析**：\n\n**(A) ✗ 單側 pacing 也有用**：\n- 單側橫膈神經 pacing 可產生部分通氣\n- 加上殘存的肋間肌（若有）、accessory muscle，可維持基本通氣\n- **不需要雙側都完好**\n- 對部分病人甚至單側已夠用（night-only pacing）\n\n**(B) ✗ 雙側橫膈神經嚴重受損不能做 pacing**：\n- Phrenic pacing **必要條件**：phrenic nerve LMN（anterior horn cell）保留\n- 若 phrenic nerve 或 C3-C5 前角細胞受損 → 刺激無效\n- 肋間肌保留**不能替代**橫膈神經 pacing\n- 這類病人需考慮 intercostal/diaphragm pacing 或其他方式\n\n**(C) ✗ 可刺激吸氣肋間肌來輔助**：\n- 若僅單側 phrenic 仍功能，可**合併刺激對側吸氣肋間肌**\n- 提高胸腔擴張、吸氣效率\n- 所以選項「無法以刺激吸氣肋間肌」錯誤\n\n**(D) ✗ 應低頻漸進，不是立即高頻**：\n- 高頻長時間刺激 → **橫膈肌急速疲勞、損傷**\n- 正確做法：**低頻短時間開始，漸進延長**（像復健訓練）\n\n**(E) ✓** 如上所述，植入後需 conditioning phase\n- 病人**不能立即脫離 ventilator**\n- 數週至數個月漸進式訓練\n- 最終才能完全 pacing 替代\n\n**臨床實務**：\n\n**Conditioning protocol 範例**（Glenn/Hogan protocol）：\n- 每次 pacing 5 分鐘 on / 25 分鐘 off\n- 每天 2-4 次\n- 漸進延長 on time\n- 監測：SpO₂、ETCO₂、RR、主觀疲勞感\n\n**併發症**：\n- 感染（植入物）\n- 機械故障\n- 神經傷害（手術）\n- 肌肉疲勞\n- Upper airway obstruction（睡眠時聲門未協調打開）\n\n**Phrenic pacing 的好處**：\n- 脫離 ventilator（生活品質 ↑）\n- 減少感染（無 ETT/氣切）\n- 正常講話、吞嚥\n- 減少長期 ventilator 花費\n\n**與其他技術比較**：\n- Diaphragm pacing stimulator（DPS）：電極植入橫膈肌（腹腔鏡）\n- Phrenic nerve pacing：電極直接在 phrenic nerve\n- 兩者理念相似但入路不同",

      "detail": "**Motor Threshold (MT) 標準定義**：\n\n**IFCN (International Federation of Clinical Neurophysiology) 定義**：\n\n- **Resting MT (RMT)**：\n  - **最小刺激強度（% MSO）**\n  - 在放鬆肌肉狀態下\n  - **至少 5/10 trials（即 50%）**\n  - **引發 peak-to-peak MEP ≥ 50 μV**\n\n- **Active MT (AMT)**：\n  - 肌肉輕度收縮狀態（~ 10% MVC）\n  - 同樣 5/10 trials\n  - MEP threshold 較低（≥ 200 μV 或類似標準）\n\n**記憶法**：**50 μV, 50%, 10 trials**\n\n**選項 (C) 錯誤分析**：\n- 比例：60% ✗（正確 50%）\n- 振幅：75 mV ✗（正確 50 μV）\n- 單位：mV vs μV 差 1000 倍\n- 三個數值都錯\n\n**各選項分析**：\n\n**(A) ✓ rTMS 機制**：\n- 磁脈衝產生感應電流\n- 穿透顱骨刺激**運動皮質 (M1)**\n- 激發大錐體細胞 (Betz cells)\n- 通過**皮質脊髓束（corticospinal tract）**\n- 到達 α motor neuron\n- 產生 **MEP (motor evoked potential)** 或肌電反應\n\n**(B) ✓ MEP amplitude + MT 作為興奮性指標**：\n- **MEP amplitude ↑** = 皮質脊髓通路興奮性↑\n- **MT ↓** = 興奮性↑（低刺激就能引發反應）\n- **MT ↑** = 興奮性↓\n- 兩者為 rTMS 研究與臨床應用的重要指標\n\n**(C) ✗** 如上所述\n\n**(D) ✓ 線圈種類**：\n\n| 線圈形狀 | 特性 | 應用 |\n|---|---|---|\n| **Circular coil** | 電場較分散、範圍大 | 淺層皮質 |\n| **Figure-of-eight** | 電場集中於交叉點 | **最常用**，精確定位 |\n| **Double-cone coil** | 可到較深處 | 下肢運動皮質、深部結構 |\n| H-coil（Brainsway） | 深部刺激 | 憂鬱症、addiction |\n| **Air-cooled / Liquid-cooled** | 散熱好 | 長時間刺激 |\n\n**(E) ✓ Circular coil**：\n- 電場分布廣泛，不集中\n- 適合淺層、大範圍皮質\n- 定位不精確 → 較少用於精準研究\n- 適合：上肢運動皮質定位（粗略）\n\n**rTMS 頻率與效果**：\n\n| 頻率 | 名稱 | 效果 |\n|---|---|---|\n| **≥ 5 Hz** | **High frequency** | **興奮（LTP-like）** |\n| ≤ 1 Hz | **Low frequency** | **抑制（LTD-like）** |\n| Theta burst (TBS) | 特殊 pattern | |\n| - iTBS | Intermittent | **興奮**（類似 HF） |\n| - cTBS | Continuous | **抑制**（類似 LF） |\n| 特殊頻率 | 5-7 Hz | 可能無效或不穩定 |\n\n**中風 rTMS 治療邏輯（Bimodal Balance Recovery）**：\n- 中風後：**病側 M1 受損 → 健側 M1 過度興奮**\n- 健側透過 transcallosal inhibition 壓制病側\n- 治療策略：\n  - **抑制健側** → 低頻（≤ 1 Hz）或 cTBS\n  - **激發病側** → 高頻（≥ 5 Hz）或 iTBS\n\n**安全性**：\n- 禁忌：癲癇史、顱內金屬、心律調節器（相對）\n- 副作用：頭皮不適、頭痛、聽力（需耳塞）\n- 癲癇：罕見（< 0.02% per session 以下）但可能",

      "detail": "**rTMS 頻率與效應完整整理**：\n\n## 傳統 rTMS\n\n**低頻 (Low frequency, LF)**：\n- **頻率 ≤ 1 Hz**\n- 效應：**LTD-like 抑制**（long-term depression）\n- 應用：抑制健側（中風）、癲癇、tics\n- 效果持續：數小時\n- 每 session 約 20-30 分鐘\n\n**高頻 (High frequency, HF)**：\n- **頻率 ≥ 5 Hz**（典型 5-20 Hz，臨床常用 10 Hz）\n- **不是 100 Hz 或 30-50 Hz**（選項 A 與 B 數值錯誤）\n- 效應：**LTP-like 興奮**（long-term potentiation）\n- 應用：憂鬱症（DLPFC）、激發病側（中風）\n- 效果持續：**30-60 分鐘**（不是 3-4 小時）\n- 每 session 約 20-40 分鐘\n\n## Theta Burst Stimulation（TBS）\n\n**基本 pattern**：\n- 每個 burst：3 pulses @ 50 Hz\n- Burst 之間：5 Hz（200 ms 間隔）\n- 類似 theta wave 節律\n\n**iTBS（Intermittent TBS）**：\n- 2 秒 on / 8 秒 off 反覆\n- 總時間：**約 3 分鐘**\n- 600 pulses\n- **效果：興奮（類似 HF rTMS）**\n- 應用：憂鬱症（取代 HF-rTMS，已 FDA 核准）、中風激發病側\n\n**cTBS（Continuous TBS）**：\n- **連續 40 秒刺激**不間斷\n- 600 pulses\n- **效果：抑制（類似 LF rTMS）**\n- 應用：抑制健側（中風）、研究用\n\n**為什麼間斷 vs 連續會有相反效應？**\n- 細胞分子層次：不同模式觸發不同 NMDA/BDNF 路徑\n- iTBS：Pulse 間有休息 → 類似 HFS (high-frequency stim) → LTP\n- cTBS：持續刺激 → 類似 LFS (low-frequency stim) → LTD\n\n**各選項分析**：\n\n**(A) ✗ 高頻 rTMS ≠ 100 Hz**：\n- 一般高頻是 **5-20 Hz**（臨床常用 10 Hz）\n- 100 Hz 太高，實務不用\n- LTP 效應描述正確，但頻率錯\n\n**(B) ✗ 高頻 rTMS ≠ 30-50 Hz**：\n- 30-50 Hz 也非標準高頻（接近 TBS 中 50 Hz burst 的頻率，但整體定義不同）\n- 且「LTD」描述錯誤（高頻應引發 LTP）\n\n**(C) ✓ iTBS ≈ HF rTMS（興奮）**：\n- 完全正確\n- iTBS 是 HF rTMS 的 shorter analogue\n\n**(D) ✗ cTBS ≠ HF rTMS**：\n- cTBS 類似 **LF rTMS（抑制）**，不是 HF\n\n**(E) ✗ 時間窗口**：\n- HF rTMS 效果持續 **30-60 分鐘**（單次 session）\n- 不是 3-4 小時\n- 多次療程可產生累積與較長效果（可能數天到數週）\n- 但單次 session 的生理窗口不會持續 3-4 小時\n- 不過實務上常在 rTMS 後立即接復健治療（利用短期窗口）\n\n**rTMS 治療窗口臨床應用**：\n\n- rTMS 後立刻進行復健治療（physical / occupational therapy、speech therapy）\n- 利用 cortical plasticity 的增強期\n- **時間窗口：約 30-60 分鐘**\n- 對中風運動/失語症復健有增強效果（priming effect）\n\n**不同 Protocol 的臨床應用**：\n\n| Protocol | 頻率 / Pattern | 時間 | 效應 | 常用指引 |\n|---|---|---|---|---|\n| LF-rTMS | ≤ 1 Hz | 20-30 min | 抑制 | 癲癇、中風健側 |\n| **HF-rTMS** | **≥ 5 Hz** | 20-40 min | **興奮** | **憂鬱症（DLPFC）** |\n| **iTBS** | 50 Hz burst @ 5 Hz | **3 min** | **興奮** | **憂鬱症（新）**、中風病側 |\n| **cTBS** | 50 Hz burst @ 5 Hz | **40 sec** | **抑制** | 中風健側、研究 |\n\n**FDA 核准**：\n- HF-rTMS：2008 核准 MDD（憂鬱症）\n- iTBS：2018 核准 MDD（與 HF 等效）\n- 偏頭痛：single-pulse TMS 核准\n- 強迫症、戒菸、PTSD：陸續核准",

      "detail": "**Lefaucheur et al. 2020 歐洲 rTMS 治療指引重點**：\n\n**核心概念**：\n- rTMS 治療效果在個體間**差異顯著**\n- 約 30-50% 病人為 non-responders\n- 原因：\n  - 基因差異（BDNF Val66Met 多型性）\n  - 解剖差異（頭皮、顱骨厚度、腦萎縮）\n  - 神經可塑性個體差異\n  - 疾病嚴重度、時程\n  - 合併用藥（抗癲癇、安眠藥 影響 cortical excitability）\n\n**中風動作恢復的證據等級**：\n\n| 介入 | 證據等級 | 說明 |\n|---|---|---|\n| **LF-rTMS 於健側 M1** | **Definite (A 級)** | **促進動作功能恢復有確定效果** |\n| HF-rTMS 於病側 M1 | Probable (B 級) | 可能有效 |\n| iTBS 於病側 M1 | Probable | 類似 HF |\n| cTBS 於健側 M1 | Probable | 類似 LF |\n| 中風 aphasia（非流暢型） | **Probable (B 級)** | 低頻刺激右腦 IFG 相當可能有改善 |\n\n**2020 指引的 rTMS 適應症**（等級 A = definite efficacy）：\n\n1. **HF-rTMS 於 DLPFC 治療憂鬱症**（A 級）\n2. **LF-rTMS 於健側 M1 改善中風動作功能**（A 級）\n3. HF-rTMS 於 M1 或 DLPFC 治療神經痛（A 級）\n4. 偏頭痛預防（single-pulse TMS）（A 級）\n5. iTBS 治療憂鬱症（A 級，與 HF 等效）\n\n**臨床治療有效性（Responder rates）**：\n- 中風動作恢復：**約 70-80%** 病人有顯著改善（A 級證據）\n- 憂鬱症：response rate 30-50%、remission rate 25-35%\n- 失語症：約 60-70%\n\n**各選項分析**：\n\n**(A) ✗ 治療效果個體間差異大**：\n- Non-responder 比例顯著（~ 30-50%）\n- 原因複雜（遺傳、解剖、合併藥物、疾病特性）\n- 選項說「差異不大」與實際相反\n\n**(B) ✓ LF-rTMS 於中風動作恢復（A 級）**：\n- 刺激健側 M1（以抑制其過度活動）\n- 減少 transcallosal inhibition 對病側的壓制\n- 2020 指引明確 A 級推薦\n\n**(C) ✓ LF-rTMS 於非流暢性失語症**：\n- 中風後左半球 Broca 受損\n- 右腦同源區（IFG, pars triangularis）過度活躍\n- 低頻刺激右腦同源區 → 抑制\n- 2020 指引 B 級（probable efficacy）\n\n**(D) ✓ 治療需個人化**：\n- 因個體差異大\n- 需根據：\n  - 病灶位置\n  - 急性 vs 慢性期\n  - 功能缺損程度\n  - 合併用藥\n  - 個人 MT、MEP 反應\n- 決定刺激 protocol、強度、頻率、部位\n\n**(E) ✓ 中風動作恢復有效比例 70-80%**：\n- Meta-analyses 顯示：\n  - Hsu 2012、Hao 2013、Graef 2016 等 meta-analysis\n  - 整體顯著效果\n  - Responder rate 在符合 ideal candidate 的病人約 70-80%\n\n**如何選擇 ideal candidate（Bimodal Balance Recovery Model）**：\n\n**最適合 rTMS 的病人**：\n- Subcortical stroke（皮質下中風）\n- 皮質脊髓束**部分保留**（MEP 仍可引出）\n- 發病後 3-6 個月內（亞急性-慢性早期）\n- 中度動作缺損\n- 健側 M1 過度活化\n\n**不適合的病人**：\n- 大範圍皮質中風（無可激發的 M1）\n- 完全性 corticospinal tract 損傷（MEP 無）\n- 癲癇史、顱內金屬\n- 懷孕（相對禁忌）\n\n**rTMS 治療流程**：\n1. 神經學、MRI、TMS 興奮性評估\n2. 決定 protocol（依病灶、動作缺損型式）\n3. 典型 10-15 次治療（每天 1 次，5 次/週）\n4. **治療後立即復健治療**（priming 效應）\n       "detail": "**高齡者用藥原則（重要！）**：\n\n## 老化對藥物代謝的影響\n\n**藥物動力學（Pharmacokinetics）改變**：\n\n| 變化 | 影響 |\n|---|---|\n| **Absorption** | 通常變化小，但胃酸↓、血流↓可能影響某些藥 |\n| **Distribution** | **體脂肪 ↑ + 身體水分 ↓** → 脂溶性藥物 Vd ↑（如 BZD 作用延長）、水溶性藥物 Vd ↓（初始濃度較高） |\n| **Albumin ↓** | Free drug fraction ↑（warfarin、phenytoin） |\n| **Metabolism（肝）** | **肝血流 ↓**、first-pass ↓（propranolol、TCA、morphine） |\n| **Excretion（腎）** | **GFR ↓**（即使 creatinine 正常） → 多數藥物半衰期延長 |\n\n**藥物動態學（Pharmacodynamics）改變**：\n- **CNS 受體敏感性 ↑**（對 BZD、opioids 反應強）\n- **β-adrenergic 反應 ↓**（對 catecholamine 反應差）\n- 血壓調節變差 → 姿勢性低血壓\n- Homeostatic reserve ↓\n\n## 各選項分析\n\n**(A) ✓ Polypharmacy 常伴 OTC**：\n- 定義：同時使用 **≥ 5 種藥物**\n- 美國：65 歲以上 40% 用 ≥ 5 種藥\n- 台灣：老人族群 polypharmacy 盛行率 ~ 80%\n- **OTC（非處方藥）**、**營養補充品**、**中藥** 常被忽略\n- NSAID、抗組織胺、制酸劑等 OTC 易造成 interaction\n\n**(B) ✓ \"Start low, go slow\"**：\n- 老年人開藥原則\n- 從**低劑量開始**\n- **慢慢調整**\n- 密切監測副作用\n- 減少不良反應風險\n\n**(C) ✓ 住院是藥物調整的好機會 + Beers Criteria**：\n- 住院期間可以：\n  - 完整 medication reconciliation\n  - 檢視必要性\n  - 識別 potentially inappropriate medications (PIM)\n- **Beers Criteria（AGS 發布）**：\n  - 列出老年人應避免或慎用的藥物\n  - 每 3-4 年更新（最新 2023）\n  - 例如避免：long-acting BZD、anticholinergics、muscle relaxants\n- **STOPP/START Criteria**（歐洲版）\n- **Modified Beers** 可用於台灣情境\n\n**(D) ✗** 如上：\n- **即使合適劑量，老年人仍常發生副作用**\n- 原因：\n  - Pharmacokinetic changes\n  - Pharmacodynamic changes\n  - 合併症\n  - Drug-drug interactions\n  - Drug-disease interactions\n- ADR 發生率 65 歲以上是年輕人的 2-3 倍\n- 不能說「給合適劑量就不會有副作用」\n\n**(E) ✓** 高齡用藥問題：\n- Polypharmacy\n- 不遵從性（non-adherence）\n- Pharmacokinetic changes\n- Pharmacodynamic / receptor sensitivity 改變\n- 易發生副作用\n- 以上都正確列舉\n\n## Beers Criteria 常見避免藥物範例\n\n**避免**：\n- First-gen antihistamine（diphenhydramine）：抗膽鹼\n- Benzodiazepines 長效（diazepam、flurazepam）\n- Tricyclic antidepressants（amitriptyline）\n- Muscle relaxants（carisoprodol、cyclobenzaprine）\n- NSAIDs 長期使用\n- Alpha-1 blockers for HTN（prazosin）\n- PPI 長期超過 8 週（除非必要）\n\n**小心使用**：\n- Benzodiazepines 短效（lorazepam）\n- Antipsychotics\n- Anticholinergics\n- SSRI（特別 citalopram、QT 延長）\n\n## 高齡用藥其他重要觀念\n\n**Medication Reconciliation**（藥物整合）：\n- 住院、出院、門診轉換時必做\n- 避免藥物重複、漏開、錯誤劑量\n\n**Deprescribing（去處方）**：\n- 積極考慮停藥\n- 特別是 benefit-risk 不利的藥\n- 注意停藥症狀（withdrawal, rebound）\n\n**實務 Tips**：\n- 每次 visit 確認全部藥物（OTC 含）\n- 簡化 regimen（降低不遵從）\n- 大包裝、清楚標示\n- 家屬、照護者參與\n- 定期 medication review",

    "explanation": {
      "summary": "官方答案為 (C)，但嚴格來說 (C) **後半段有爭議 — 抽菸確實是 osteoporosis 的已知風險因子**（ISCD、NOF、WHO 都認可）。本題可能是題目印刷錯誤（應為「抽菸則是已知的危險因子之一」）。以官方答案為準。其他 (A)(B)(D)(E) 明確有錯，故 (C) 為「最不錯」的答案。",
      "detail": "**注意：此題目選項 (C) 後段有爭議**\n\n**選項 (C) 分析**：\n- 前半「危險因子包含老年、家族遺傳、糖皮質類固醇」→ **正確**\n- 後半「抽菸則非已知的危險因子」→ **嚴格說是錯的**\n- 抽菸是**已知的 osteoporosis 風險因子**（ISCD、NOF、IOF 都列入）\n- 可能是題目 typo（應為「抽菸則是已知的危險因子之一」）\n\n**但因為其他選項錯誤更明顯，官方答案選 (C)**\n\n## 髖關節骨折分類與處置（各選項詳解）\n\n### (A) 血流解剖完全反了 ✗\n\n**正確概念**：\n\n| 骨折位置 | 血流 | AVN 風險 | 主要手術 |\n|---|---|---|---|\n| **Femoral neck（股骨頸，intracapsular）** | **差**（retinacular vessels 易斷） | **高** | **Hemiarthroplasty 或 THA**（位移者） |\n| **Intertrochanteric（轉子間，extracapsular）** | **好**（肌肉附著多） | **低** | **ORIF**（如 Dynamic Hip Screw、Proximal Femoral Nail） |\n\n- 股骨頭血流主要來自 **medial femoral circumflex artery** 的 retinacular vessels，貼著股骨頸\n- 股骨頸骨折易撕裂此血管 → AVN\n- 轉子間骨折通過 cancellous 部分，血流豐富 → 癒合佳\n- 選項 (A) 完全顛倒\n\n### (B) THA vs Hemiarthroplasty 脫位率反了 ✗\n\n**比較**：\n\n| 手術 | 優點 | 缺點 |\n|---|---|---|\n| **THA（全髖）** | 長期效果好、活動度高、較少疼痛、較少再翻修、功能恢復佳 | **脫位率較高**（~ 5-15% vs hemi 1-4%）、手術大、時間長、較貴 |\n| **Hemiarthroplasty（半髖）** | 手術快、脫位率低 | 長期髖臼磨損、疼痛 |\n\n- 研究：THA 在**活動力高、年齡較輕、預期壽命長**的病人較佳\n- **脫位風險：THA > Hemi**（因為 head 比較小 + 兩個接觸面）\n- 選項 (B) 的「較低的脫位風險」錯誤\n\n### (C) 爭議選項（官方正確）\n\n### (D) 復健目標說法不夠精確 ✗\n\n**髖骨折後復健目標**：\n- 早期活動（prevent deconditioning、DVT、pressure sore）\n- **功能恢復**（ADL、gait）\n- 肌力強化\n- 平衡訓練\n- **預防再跌倒**\n- 次發骨折預防（DXA、骨鬆藥物）\n\n不是以「**避免疼痛、避免再骨折/錯位**」為**主要**目標。疼痛控制和避免錯位是**必要條件**不是**主要目標**。\n\n### (E) 48 小時內手術是黃金時間 ✗\n\n**手術時機**：\n- **48 小時內**：最佳，死亡率最低\n- **48 小時以上**：每延遲一天，死亡率增加\n- **延遲至 72 小時**：死亡率明顯↑\n- **延遲至 7 天**：**死亡率顯著增加**（即使共病少）\n- 研究：即使共病 ≤ 2，延遲 72 小時以上仍增加死亡率\n- 選項 (E) 錯誤\n\n## Osteoporosis 風險因子（完整列表）\n\n**不可改變**：\n- 老年（女 > 65，男 > 70）\n- **女性**（停經後加速）\n- **亞洲/白人種族**\n- 家族史\n- 小骨架\n\n**可改變的生活型態**：\n- **抽菸 ✓**（明確風險因子！毒害骨母細胞、影響性激素）\n- **過度飲酒**（> 3 drinks/day）\n- 運動不足\n- 低鈣飲食\n- 維生素 D 不足\n- 低體重（BMI < 19）\n\n**內科疾病**：\n- 內分泌：hyperparathyroidism、Cushing、hyperthyroid、hypogonadism\n- GI：malabsorption、IBD、celiac\n- 腎：CKD\n- 血液：多發性骨髓瘤\n- 風濕：RA、SLE\n\n**藥物**：\n- **糖皮質類固醇**（> 5 mg prednisone > 3 個月）\n- Antiepileptics（phenytoin、phenobarbital）\n- Heparin 長期\n- PPI 長期\n- Aromatase inhibitors、GnRH agonists\n- SSRI 長期\n- Thiazolidinediones（DM 藥）\n\n## 髖骨折術後復健原則\n\n**術後階段**：\n1. **POD 1-2**：早期下床（非石膏、若穩定內固定）\n2. **POD 3-7**：坐起、轉位、短距行走\n3. **術後 2-6 週**：加強負重、gait training\n4. **術後 6-12 週**：肌力強化、平衡\n5. **長期**：再跌倒預防、骨鬆治療\n\n**負重原則**：\n- Arthroplasty：通常 WBAT（as tolerated）\n- ORIF：依穩定度，部分 TDWB 或 PWB 數週\n\n**骨鬆藥物**：\n- Bisphosphonates、denosumab、teriparatide、romosozumab\n- 術後 2 週內開始（不影響癒合）\n- 目標：防止對側或其他部位骨折",

      "detail": "**Sarcopenia（肌少症）神經-肌肉病理**：\n\n## 老化的肌纖維變化\n\n**1. α Motor Neuron 流失（主要機制）**：\n- 脊髓 anterior horn cell **數量隨年齡減少**\n- 60-80 歲可減少 ~ 25-50%\n- **絕對是減少，不是增加**（選項 B 後段錯）\n\n**2. Motor Unit Remodeling**：\n- Motor neuron 死亡 → 原本支配的肌纖維成為 orphan\n- 殘餘 motor neuron 發出 sprouting 再支配這些 orphan 纖維\n- 結果：**剩下的 motor unit 變大但變慢**（type 1 特性主導）\n\n**3. 肌纖維類型變化**：\n- **Type 2（快縮肌）優先流失**\n- 尤其 **Type 2B（最快型）流失最多**\n- Type 2A 也流失但較輕\n- Type 1 相對保留\n- 選項 B 說「Type 2A 為主」**不夠精確**（真正主要流失是 Type 2B 或整體 Type 2，但**不是特定 Type 2A**）\n\n**4. 神經肌肉接合處（NMJ）變化**：\n- Acetylcholine 受體密度 ↓\n- 神經末梢萎縮\n- 影響肌肉徵召效率\n\n## 各選項分析\n\n**(A) ✓ 下肢近端肌肉萎縮最明顯**：\n- Quadriceps 萎縮是 sarcopenia 最典型表現\n- 下肢 > 上肢（負重、活動量下降）\n- 近端 > 遠端\n- 影響站立、爬樓梯、起身\n\n**(B) ✗** 兩個錯誤：\n1. **肌纖維流失以 Type 2 為主（不是只有 Type 2A）**\n2. **α motor neuron 數量減少，不是增加**\n\n**(C) ✓ 肌肉量下降速率**：\n- 40 歲後：約 0.8% /年（累積顯著）\n- 70 歲後加速：1.5-2.0% /年\n- 數據合理，符合 EWGSOP 共識\n\n**(D) ✓ 肌力下降速率**：\n- 30 歲後未訓練者：**1-1.5% /年**\n- 70 歲後：**2.5% /年以上**\n- 肌力下降速度 > 肌肉量下降（因為 quality、神經徵召也在變差）\n- 正確\n\n**(E) ✓ 心肌對 β-adrenergic 反應下降**：\n- β-adrenergic receptor density ↓\n- Receptor coupling efficiency ↓\n- 最大刺激下，老年人 CO 減少 20-30%\n- 因此老人 HRmax↓、SV↓\n- 這是 VO₂max 下降的原因之一\n\n## Sarcopenia 診斷標準（EWGSOP2 / AWGS 2019）\n\n**篩檢**：\n- **SARC-F questionnaire**（5 題）\n- Strength（提 5 kg 重）\n- Assistance walking\n- Rise from chair\n- Climb stairs\n- Falls\n\n**診斷（確診需 3 項）**：\n\n1. **低肌力（low muscle strength）**：\n   - Grip strength：\n     - 男 < 27 kg（EWGSOP2）/ < 28 kg（AWGS）\n     - 女 < 16 kg / < 18 kg\n   - Chair stand test：> 15 sec 做 5 次\n\n2. **低肌肉量（low muscle quantity）**：\n   - DXA、BIA、CT、MRI\n   - 男 < 7.0 kg/m²、女 < 5.5 kg/m²（ASMI）\n\n3. **低身體功能（low physical performance，確認嚴重度）**：\n   - **Gait speed ≤ 0.8 m/s**\n   - SPPB ≤ 8\n   - TUG ≥ 20 sec\n   - 400 m walk test ≥ 6 分鐘\n\n## Sarcopenia 治療（以肌力、功能改善為主）\n\n**1. 阻力訓練（最有效）**：\n- 每週 2-3 次\n- 主要肌群\n- 漸進負重\n- 即使 90 歲以上仍有效\n\n**2. 蛋白質攝取**：\n- **1.0-1.2 g/kg/day**（健康老人）\n- **1.2-1.5 g/kg/day**（virility、住院）\n- 均勻分布於三餐（每餐 25-30g）\n- Leucine-rich（雞蛋、乳清蛋白）\n\n**3. Vitamin D**：\n- 若缺乏，補充至 30 ng/mL\n- 800-1000 IU/day\n- 助於肌力、平衡\n\n**4. 有氧運動**：\n- 維持心肺功能\n- 間接助肌肉氧化能力\n\n**5. 治療合併症**：\n- 糖尿病、甲狀腺、慢性腎病\n- 消除可逆因素\n\n**新興治療（研究中）**：\n- Myostatin inhibitors\n- Testosterone replacement（慎用）\n- SARM（Selective Androgen Receptor Modulators）\n- HMB（β-hydroxy β-methylbutyrate）\n- Omega-3 fatty acids",

      "detail": "**各選項分析**：\n\n## (A) 吞嚥困難原因部分錯誤\n\n**老年人吞嚥困難原因**：\n- 牙齒掉落（缺牙）✓\n- 食道蠕動不良（presbyesophagus）✓\n- 吞嚥時**喉部上升時間延遲**（不是「減少」）✓\n- Cricopharyngeus 放鬆不全\n\n**關鍵錯誤**：\n- 「**賁門失弛症（esophageal achalasia）**」**不是老化常見原因**\n- Achalasia 是一種特定的 esophageal motility disorder（LES 不鬆弛），病因不明，不屬於正常老化\n- 老化相關的食道變化叫 **presbyesophagus**（收縮幅度下降、同步性下降），**不是 achalasia**\n\n所以 (A) 錯\n\n## (B) ✓ 老年人低體溫\n\n**老年人易發生 hypothermia 原因**：\n\n1. **生理因素**：\n   - **Shivering 反應減弱**（顫抖產熱 ↓）\n   - **基礎代謝率 ↓**\n   - 體脂肪分布改變（絕緣差）\n   - 血管反應遲鈍\n\n2. **合併病症**：\n   - 甲狀腺功能低下\n   - **低血糖**\n   - 營養不良\n   - 感染（septic shock 相反初期發熱但可能低溫）\n\n3. **藥物因素**：\n   - **酒精**（血管擴張、抑制中樞體溫調節）\n   - **Barbiturates**\n   - **Benzodiazepines**\n   - Phenothiazines（chlorpromazine）\n   - β-blockers\n   - Opioids\n\n所有列出項目**都是低體溫的確定危險因子** → (B) 正確\n\n## (C) 失禁不是正常老化現象 ✗\n\n- **Urinary incontinence 在老人很常見**（30-50%）**但不是正常老化**\n- 是病理性狀況，需評估治療\n- 原因多樣：stress、urge、overflow、functional、mixed\n- **不應被視為「正常老化」而忽略治療**\n- 選項 (C) 錯誤\n\n## (D) 首渡代謝藥物敘述反了 ✗\n\n**老化對肝臟的影響**：\n- **肝臟尺寸縮小 ✓**\n- **肝血流量 ↓ ✓**\n- **Phase I（CYP450）代謝 ↓**（phase II 較保留）\n\n**對首渡代謝（first-pass metabolism）高的藥物**：\n- 例子：**propranolol、TCA、morphine、verapamil、lidocaine**\n- 首渡代謝率高 = 口服後大部分被肝代謝掉\n- **肝血流↓、代謝↓ → first-pass effect ↓ → 生體可用率 ↑**（不是下降）\n- 選項說「TCA 生體可用率下降」**反了**\n\n正確：**高 first-pass 藥物在老人 bioavailability 上升**（所以需要減量！）\n\n## (E) 血清 creatinine 不會下降反而穩定 ✗\n\n**老化對腎的影響**：\n- 腎皮質縮小 ✓\n- Nephron 數量減少 ✓\n- **腎血流 ↓** ✓\n- **GFR ↓**（每 10 年約 ↓ 8-10 mL/min）✓\n- **Creatinine clearance ↓** ✓\n- **血清 creatinine 反而維持正常或略升**（不是下降）！\n\n**為什麼血清 creatinine 不變？**\n- Creatinine 來自肌肉代謝\n- 老人**肌肉量減少** → creatinine 生成 ↓\n- GFR 下降（清除 ↓）\n- **兩者互相抵消** → 血清 creatinine 正常\n- 這是**老人腎功能容易被低估的陷阱**！\n\n臨床意義：\n- **不能只看血清 creatinine 評估老人腎功能**\n- 要用 **Cockcroft-Gault 或 MDRD 公式估算 eGFR**\n- 或用 **cystatin C**（不受肌肉量影響）\n\n選項 (E) 「血清 creatinine 也會下降」**錯誤**\n\n## 老化各系統變化總整理\n\n### 心血管\n- Maximum HR ↓\n- Stroke volume ↑ at rest, unchanged at peak\n- Cardiac output ↓ at peak\n- 血管僵硬 → SBP ↑\n- Baroreceptor 反應 ↓ → 姿勢性低血壓\n\n### 呼吸\n- FEV1 ↓（每年 30 mL）\n- FVC ↓\n- Residual volume ↑\n- 胸壁僵硬、肺彈性 ↓\n- PaO₂ ↓\n\n### 腎\n- GFR ↓（如上）\n- 藥物排除 ↓\n- 鈉、水平衡差\n\n### 肝\n- 體積 ↓\n- 血流 ↓\n- Phase I 代謝 ↓\n- First-pass 藥物 bioavailability ↑\n\n### GI\n- 胃酸 ↓\n- 蠕動慢\n- 吞嚥協調差\n\n### 中樞神經\n- Brain volume ↓\n- 神經元 ↓\n- 突觸 ↓\n- 反應時間 ↑\n- 睡眠品質 ↓\n\n### 內分泌\n- Insulin resistance ↑\n- GH ↓\n- DHEA ↓\n- Vitamin D 活化 ↓\n- 甲狀腺 subclinical hypothyroid\n\n### 免疫\n- T cell 功能 ↓\n- 疫苗反應 ↓\n- 發炎基線 ↑（inflammaging）\n\n### 皮膚/體溫\n- 皮下脂肪 ↓\n- 汗腺 ↓\n- 微血管密度 ↓\n- **體溫調節能力 ↓**（heat stroke、hypothermia 都易發生）",

      "detail": "**Fried Frailty Phenotype（CHS criteria, 2001）**：\n\n這是最被廣泛使用的 frailty 定義，包含 **5 個 domain**：\n\n## 五大 Domain\n\n### 1. Unintentional Weight Loss（體重減輕）\n- 過去 1 年減 ≥ 4.5 kg (10 lb)\n- 或 ≥ 5% 總體重\n\n### 2. Weakness（無力）— Grip Strength\n- 測量：Jamar dynamometer\n- 依 BMI 調整：\n  - 男 BMI ≤ 24：< 29 kg\n  - 男 BMI 24-28：< 30 kg\n  - 男 BMI > 28：< 32 kg\n  - 女依 BMI 約 < 17-21 kg\n- AWGS 亞洲標準：男 < 28 kg, 女 < 18 kg\n\n### 3. Exhaustion（疲憊）\n- CES-D 量表 2 題：\n  - 「我感覺做任何事都很費力」\n  - 「我無法繼續進行任何事」\n- 過去 1 週有 3-4 天以上符合\n\n### 4. Slow Walking Speed（步態緩慢）\n- **4.57 m (15 feet) 走路時間**\n- 依性別、身高調整：\n  - **男身高 ≤ 173 cm（68 inches）**：> 7 秒（= < 0.65 m/s）\n  - **男身高 > 173 cm**：> 6 秒（= < 0.76 m/s）\n  - **女身高 ≤ 159 cm（62.5 inches）**：> 7 秒\n  - **女身高 > 159 cm**：> 6 秒\n- 等效：**約 < 0.65-0.8 m/s**（**不是 0.4 m/s**）\n\n**補充：其他常用 gait speed cutoff**：\n- 0.8 m/s：EWGSOP2 sarcopenia cutoff（及一般老年病學 cutoff）\n- 1.0 m/s：functional decline 預測\n- **0.4 m/s：極度嚴重（household-only ambulation）**\n\n### 5. Low Physical Activity（低活動量）\n- Minnesota Leisure Time Activities Questionnaire\n- 男：< 383 kcal/week\n- 女：< 270 kcal/week\n- 約等於「幾乎不運動」\n\n## Frailty 診斷\n\n- **≥ 3 criteria = Frail**\n- **1-2 criteria = Pre-frail**\n- **0 criteria = Robust（健康）**\n\n## 各選項分析\n\n**(A) ✓** 五大 domain 列出正確\n\n**(B) ✓** Frailty 定義：\n- 老年族群常見問題\n- **Multidimensional syndrome**（多面向）\n- **易受傷害狀態（vulnerability）**\n- **可逆或可預防（關鍵觀念）**\n- 是一種 **dynamic state**\n\n**(C) ✓** Frailty 後果：\n- 失能 ↑\n- 跌倒 ↑\n- 住院 ↑\n- 長期照護需求 ↑\n- **死亡率 ↑**\n- 多個大型世代研究證實\n\n**(D) ✗** Gait speed cutoff **約 0.65-0.8 m/s**（依性別、身高），不是 0.4 m/s\n\n**(E) ✓** 臨床應用：\n- 評估老人失能、合併症時必須考慮 frailty\n- Frailty 是許多 adverse outcome 的獨立預測因子\n- 影響手術風險評估、預後判斷、治療目標\n\n## Frailty 其他重要工具\n\n### FRAIL Scale（簡化版）\n- **F**atigue\n- **R**esistance（無法獨立爬一層樓）\n- **A**mbulation（無法獨立走 1 block）\n- **I**llnesses（> 5 個慢性病）\n- **L**oss of weight（> 5%）\n- ≥ 3 frail\n\n### SARC-F（Sarcopenia 篩檢）\n- Strength\n- Assistance walking\n- Rise from chair\n- Climb stairs\n- Falls\n\n### Clinical Frailty Scale（CFS, Rockwood）\n- 1-9 分\n- 基於臨床評估\n- 1（very fit）到 9（terminally ill）\n\n### Comprehensive Geriatric Assessment (CGA)\n- 完整多面向評估\n- 金標準但耗時\n\n## Frailty 治療（可逆！）\n\n**1. 阻力訓練**（最重要）\n- 即使 frail 老人仍有反應\n- 從低強度開始\n\n**2. 有氧運動**\n\n**3. 蛋白質攝取**\n- 1.2-1.5 g/kg/day\n\n**4. Vitamin D 補充**\n- 若缺乏\n\n**5. 治療合併症**\n\n**6. 減少多重用藥（deprescribing）**\n\n**7. 社會參與 / 認知刺激**\n\n**8. 營養狀態改善**",

      "detail": "**老年人跌倒流行病學**：\n\n- 65 歲以上每年 **約 30% 會跌倒**\n- 80 歲以上每年 **約 50% 會跌倒**\n- 5-10% 跌倒造成嚴重傷害（骨折、腦傷）\n- **跌倒是老年人事故死亡的首因**\n- 髖骨折後 1 年死亡率 20-30%\n\n## 跌倒危險因子\n\n### 內在因子（intrinsic）\n- **年齡**（最大因子）\n- **過去跌倒史**（最強預測因子）\n- **肌力下降（sarcopenia）**\n- **平衡障礙**\n- **步態異常**\n- **視覺缺損**（cataract、glaucoma、diabetic retinopathy）\n- **聽覺 / 前庭**障礙\n- **心血管**：posture hypotension、arrhythmia、carotid sinus hypersensitivity\n- **神經系統**：Parkinson、stroke、neuropathy、dementia\n- **骨關節**：arthritis、foot problems、amputation\n- **失禁**（夜尿急著上廁所）\n- **認知障礙 / 失智**\n- **憂鬱**\n\n### 外在因子（extrinsic）\n- **多重用藥**（> 4 種藥，特別 psychotropic、BP 藥、hypoglycemic）\n- **環境**：地毯、光線、樓梯、浴室、寵物\n- **鞋具**\n- **輔具不當使用**\n\n## 實證有效的跌倒預防介入（Cochrane 2012、2019）\n\n### 1. **運動（最重要）**\n- **平衡訓練**：Tai Chi、Frenkel exercises、Otago program\n- **肌力訓練**：下肢阻力訓練\n- **步行訓練**\n- **多成分運動**（multicomponent）效果最佳\n- **降低跌倒率 20-30%**\n- 降低嚴重傷害 30-40%\n\n### 2. 多面向介入（multifactorial）\n- 經過完整評估後個別化介入\n- 包括藥物檢視、視力矯正、環境改善、運動、營養\n\n### 3. 環境評估與改善\n- 居家訪視評估\n- 移除障礙、加裝扶手、改善照明\n- 對最近跌倒過者特別有效\n\n### 4. 藥物檢視（deprescribing）\n- 特別減少：BZD、opioids、antihistamines、muscle relaxants\n- STOPP/START、Beers Criteria\n\n### 5. 視力介入\n- 白內障手術有效\n- 但換眼鏡度數初期可能反而增加跌倒（需適應）\n\n### 6. 足踝介入\n- **足部疼痛、bunion、姆趾外翻**處理\n- 適當鞋具\n- 足踝肌力訓練\n- 選項 (E) ✓\n\n### 7. 維生素 D 補充\n- 缺乏者有效\n- 不缺乏者效果不明確\n\n### 8. 心血管介入\n- Pacemaker（for vasovagal syncope）\n- 姿勢性低血壓處理\n\n## 各選項分析\n\n**(A) ✓** 危險因子分類正確，例子也對\n\n**(B) ✓** 認知障礙與失智：\n- 失智病人跌倒率是認知正常者的 2-3 倍\n- 因 attention、judgment、visuospatial 功能下降\n- 增加傷害性跌倒\n\n**(C) ✗** 完全相反：運動（平衡、肌力、步行）是最有效預防\n\n**(D) ✓** 環境評估是關鍵介入\n\n**(E) ✓** 足踝問題處理有效\n\n## 跌倒評估工具\n\n### 篩檢\n- **「過去 1 年有沒有跌倒過？」**（最簡單）\n- 「平衡有沒有問題？」\n\n### 評估工具\n- **TUG (Timed Up and Go)**：> 12 秒 = 跌倒風險↑\n- **Berg Balance Scale**：< 45 分 = 風險↑\n- **Tinetti POMA**：< 19 分 = 高風險\n- **30-second chair stand test**\n- **5x sit-to-stand**\n- **Functional Reach Test**\n\n### 多面向評估（高風險者）\n- 完整病史、用藥\n- 神經學檢查\n- 肌骨檢查\n- 視力\n- 心血管（含姿勢性 BP）\n- 認知功能\n- 憂鬱篩檢\n- 環境評估\n\n## 跌倒後處置\n\n- ABC 優先：傷勢評估\n- Head injury、hip fracture、vertebral fracture 排除\n- 評估 **「下地難」（long lie）**：> 1 小時 → rhabdomyolysis、dehydration、pressure sore 風險\n- 心理創傷（fear of falling）\n- 預防再跌倒計畫",

      "summary": "**下顎骨壞死（ONJ, Osteonecrosis of the Jaw）**是**抗骨再吸收劑**（antiresorptive，如 bisphosphonates、denosumab）的副作用，**不是促骨生成劑（如 teriparatide、PTH 類似物）**。選項 (D) 把類別搞反了。",
      "detail": "**骨質疏鬆藥物分類**：\n\n## 抗骨再吸收劑（Antiresorptive）— **抑制破骨細胞**\n\n### 1. 雙磷酸鹽（Bisphosphonates）\n- **口服**：Alendronate（Fosamax）、Risedronate、Ibandronate\n- **靜脈**：Zoledronic acid、Ibandronate\n- 機轉：附著於 hydroxyapatite → osteoclast 吞噬 → 誘發 apoptosis\n- **副作用：ONJ、非典型股骨骨折（AFF）**、食道炎、急性期反應（IV 類）、低血鈣\n\n### 2. RANKL 抑制劑\n- **Denosumab**（Prolia）— 單株抗體\n- 每 6 個月一次皮下注射\n- 機轉：抑制 RANKL → 阻止 osteoclast 成熟\n- **副作用：ONJ、AFF、停藥後 rebound vertebral fracture**\n\n### 3. SERM（Selective Estrogen Receptor Modulator）\n- Raloxifene、Tamoxifen\n- 機轉：在骨骼是 agonist（類似 estrogen 抑制 bone turnover），在乳腺是 antagonist\n- 副作用：VTE 風險↑、熱潮紅\n\n### 4. STEAR（Selective Tissue Estrogenic Activity Regulator）\n- Tibolone\n- 獨特，一藥多效\n\n### 5. 雌激素（Estrogen / HRT）\n- 僅短期使用於停經相關症狀\n- 長期使用 breast cancer、VTE、CVD 風險↑\n\n### 6. 抑鈣素（Calcitonin）\n- Miacalcin（鼻噴、注射）\n- 效果較弱，現在較少用於骨鬆\n\n## 促骨質生成劑（Anabolic）— **刺激造骨細胞**\n\n### 1. PTH 類似物\n- **Teriparatide**（Forteo）：PTH(1-34)\n- **Abaloparatide**：PTHrP 類似物\n- 每日皮下注射\n- 機轉：間歇性 PTH 刺激造骨\n- **使用限制：2 年（因大鼠試驗有 osteosarcoma 疑慮）**\n- 副作用：**hypercalcemia、head dizziness、leg cramps、NOT ONJ**\n\n### 2. Sclerostin 抑制劑\n- **Romosozumab**（Evenity）\n- 單株抗體，既 anabolic 又輕度 antiresorptive\n- 每月皮下注射 × 12 個月\n- 副作用：心血管事件風險（FDA boxed warning）\n\n## ONJ（Osteonecrosis of the Jaw）\n\n**風險藥物**：\n- **Bisphosphonates（特別 IV 高劑量）**\n- **Denosumab**\n- 其他：高劑量 anti-VEGF（貝伐單抗）、TKI 等\n\n**發生率**：\n- 骨鬆使用一般劑量：**< 0.1%**（極罕見）\n- 癌症病人高劑量 IV bisphosphonate：**1-10%**（明顯較高）\n\n**風險因子**：\n- 拔牙、侵入性牙科手術（最大風險）\n- 口腔衛生差\n- 長期使用（> 4 年）\n- 合併類固醇\n- 抽菸、DM\n\n**預防**：\n- **開始治療前先看牙醫**\n- 先處理需要的侵入性牙科治療\n- 開始後減少拔牙（小心 extraction）\n- 治療中良好口腔衛生\n\n**治療**：\n- 抗生素（amoxicillin、metronidazole）\n- 手術清創（嚴重者）\n- 可能需停藥（drug holiday）\n\n## 鈣質攝取建議\n\n**美國 NOF / AACE / ACOG**：\n- **停經後婦女**：1200 mg/day\n- **50 歲以上男性**：1000-1200 mg/day\n- 維生素 D：**800-1000 IU/day**\n\n**台灣**：\n- 成人：1000 mg/day\n- 停經後 / 50 歲以上：**1200 mg/day**\n- 選項 (A) 正確\n\n## 各選項分析\n\n**(A) ✓** 鈣質建議正確\n\n**(B) ✓** 抗骨再吸收劑列舉完整正確\n\n**(C) ✓** 促骨生成劑以 PTH / PTHrP 類似物為主（teriparatide、abaloparatide）\n\n**(D) ✗** ONJ 發生於**抗骨再吸收劑**，不是促骨生成劑\n- Teriparatide 反而**可用於 ONJ 的治療**（促進骨癒合）\n- 選項方向完全反了\n\n**(E) ✓** 脊椎壓迫骨折運動建議：\n- 多元性運動（multicomponent）\n- 含阻力 + 平衡 + 有氧\n- 可改善 QoL、降低疼痛\n- 降低再骨折風險\n- 運動介入本身不會顯著增加骨折風險\n- NOF、IOF 都建議\n\n## 骨鬆運動原則\n\n**建議**：\n- 阻力訓練（weight-bearing）\n- 衝擊運動（moderate impact，如跳繩、快走）\n- 平衡訓練\n- 姿勢訓練（背伸肌）\n\n**避免**：\n- **屈曲運動（flexion exercise）** — 傳統 Sinaki 研究顯示增加脊椎骨折風險\n- 大幅度扭轉\n- 高衝擊跳躍（於嚴重骨鬆）\n\n## 非典型股骨骨折（AFF, Atypical Femoral Fracture）\n\n- 長期使用雙磷酸鹽 / denosumab > 5 年風險↑\n- 位置：subtrochanteric / diaphyseal femur\n- X-ray 特徵：**橫向骨折線、外側皮質增厚 (beaking)**\n- 預兆：股骨外側大腿疼痛\n- 處置：停藥、prophylactic nailing（若未斷）\n\n## Drug Holiday（藥物假期）\n\n- 雙磷酸鹽使用 3-5 年後評估\n- **低風險**：可考慮停藥 1-3 年\n- **高風險**：繼續使用\n- Denosumab：**不能隨意停藥**（rebound fracture）",

      "detail": "**Deconditioning（失調 / 去條件化）核心概念**：\n\n**定義**：\n- 身體系統因長期**不活動 / 臥床 / 久坐生活**導致的**多系統性功能退化**\n- 是可逆的（若介入適當）\n\n**兩大類**：\n1. **急性疾病臥床**（acute bed rest）\n   - 住院、手術、重症\n   - 典型 1-2 週內明顯變化\n2. **慢性久坐生活**（sedentary lifestyle）\n   - 漸進式\n   - 老化加速此過程\n\n## 臥床對各系統的影響（與時間）\n\n### 肌肉骨骼系統\n\n**肌肉**：\n- 臥床 1-2 天：蛋白質合成下降\n- 臥床 1-3 週：**肌肉量減少 10-15%**\n- 臥床 6 週：**肌肉量減少 40%**\n- **抗重力肌肉先受影響**（下肢 > 上肢）：\n  - **Quadriceps** — 最先受損\n  - Gastrocnemius、Soleus\n  - Gluteals\n  - Erector spinae\n- 選項 (C) 「軀幹核心 > 下肢」**完全相反**\n\n**肌力下降**：\n- 第 1 週：**1-5%/天**\n- 總累積可達 40-50%\n\n**骨骼**：\n- 骨質流失 1-2% 每週（較肌肉慢）\n- 主要在承重骨（跟骨、脊椎、股骨）\n- 尿鈣排出↑\n\n**關節**：\n- 攣縮（contracture）— 未活動的關節\n- 軟骨退化（因無 loading）\n\n### 心血管系統\n- **SV↓、CO↓**\n- **Orthostatic hypotension**（姿勢性低血壓）— 第一個常見表現\n- **Resting HR ↑**\n- VO₂max ↓ 約 0.8-1.0% /day\n- 血栓形成風險（DVT）\n- Total blood volume ↓\n\n### 呼吸系統\n- Vital capacity ↓\n- FRC ↓\n- 痰液清除 ↓\n- 肺炎風險 ↑\n\n### 代謝 / 內分泌\n- 胰島素抵抗 ↑（臥床 3 天就明顯）\n- 脂肪代謝 ↓\n- 尿氮流失 ↑（蛋白質代謝增加）\n- 尿鈣 ↑\n- 低血容\n\n### 皮膚\n- 壓瘡風險\n- 循環差\n\n### 胃腸\n- 便秘\n- 食慾下降\n\n### 泌尿\n- 尿滯留\n- 結石風險（calciuria）\n- UTI\n\n### 神經 / 心理\n- Sensory deprivation\n- 混亂、譫妄\n- 憂鬱\n- 認知下降\n- **平衡、協調 ↓** → **跌倒風險 ↑**\n\n## 各選項分析\n\n**(A) ✓** 肌肉流失：如上詳述\n\n**(B) ✓** Deconditioning 兩大類：急性臥床 + 慢性久坐\n\n**(C) ✗** 下肢影響 > 軀幹核心：\n- 抗重力肌群（下肢）對 unloading 最敏感\n- Quadriceps 的萎縮是 ICU-acquired weakness 的經典表現\n- 軀幹核心肌肉相對穩定（仍有抗重力活動）\n\n**(D) ✓** 跌倒風險↑：\n- 下肢無力、平衡差、反射慢、姿勢性低血壓\n- 跌倒是重要後果\n\n**(E) ✓** 可透過復健恢復：\n- **關鍵：早期復健介入**（early mobilization）\n- 阻力訓練、功能性活動\n- 恢復時間通常是臥床時間的 2-3 倍（對老人可能更長）\n- 年輕人恢復較快\n\n## 預防 Deconditioning 的策略\n\n### 住院期間\n- **Early mobilization**（即使 ICU）\n- 每天起身\n- 坐椅子 vs 臥床\n- 走動（若可）\n- ROM exercises（若不能下床）\n- Respiratory therapy\n- DVT 預防\n\n### ICU 病人\n- 每日 **sedation vacation**\n- Early PT/OT\n- 減少 prolonged bedrest\n- ABCDEF bundle\n\n### 住院老人\n- 避免不必要的尿管（→ 不下床）\n- 鼓勵家屬協助起身\n- 物理治療介入\n- 減少限制（rails、restraints）\n\n### 出院後\n- 居家運動計畫\n- 漸進增加活動\n- 避免 re-hospitalization\n\n## ICU-Acquired Weakness（ICU 獲得性無力）\n\n**特徵**：\n- 重症後廣泛性肌力下降\n- 包括：\n  - Critical illness myopathy (CIM)\n  - Critical illness polyneuropathy (CIP)\n  - Disuse atrophy\n- 可持續數月到數年\n- 影響出院後生活品質\n\n**風險因子**：\n- Sepsis、MODS\n- 長期類固醇\n- 神經肌肉阻斷劑\n- Hyperglycemia\n- 長期 immobilization\n\n**預防**：Early mobilization 在 ICU 是 class I recommendation",

    "explanation": {
      "summary": "**腦源性（腦中風、Parkinson）神經性膀胱**少影響上尿路（因下尿路多為 overactivity 而非 high-pressure retention），腎功能惡化風險低，初期篩檢**超音波即可**。相對於脊髓損傷等高風險族群，需要更完整的 urodynamic + 影像追蹤。",
      "detail": "**神經性膀胱病灶位置與上尿路風險**：\n\n| 病灶位置 | 典型膀胱問題 | **上尿路受損風險** |\n|---|---|---|\n| **腦源性（Cerebral）** — Stroke、Parkinson、dementia | Detrusor overactivity，通常無 DSD | **低**（低壓系統） |\n| **高位脊髓（Suprasacral SCI）** | **DO + DSD** 高壓排尿 | **高**（需密切追蹤） |\n| **Sacral / Cauda equina** | Detrusor areflexia + open BN | 中（overflow） |\n| **Peripheral（DM、pelvic surgery）** | Detrusor underactivity | 中-低 |\n\n## 為什麼腦源性較少影響上尿路？\n\n**腦中風 / Parkinson 膀胱病理生理**：\n- Suprapontine lesion 解除 pontine micturition center 的下降調節\n- 主要表現：**detrusor overactivity without DSD**\n- **不會有 DSD（detrusor 與 sphincter 同時收縮）**\n- 膀胱壓力相對低\n- 輸尿管逆流、腎水腫風險低\n\n**相對地，高位脊髓損傷**：\n- 有 DSD\n- **高壓排尿（> 40 cmH₂O = 危險壓力）**\n- **Urinary reflux → hydronephrosis → 腎衰竭**\n- 歷史上 SCI 病人曾因腎衰竭為主要死因\n- **需要密切追蹤上尿路**（每年一次 renal ultrasound + renal function）\n\n## 各選項分析\n\n**(A) ✓ 腦源性神經膀胱的初期篩檢**：\n- 超音波評估膀胱容量、殘尿、上尿路狀態\n- 若無異常，不一定需要 urodynamic\n- 追蹤頻率可較低\n- 對比：SCI 病人需要 baseline + yearly urodynamic study\n\n**(B) ✗ 急性輸尿管阻塞**：\n- **Non-contrast CT（KUB CT）是 gold standard**（sensitivity > 95%、specificity > 95%）\n- 超音波 sensitivity 約 70-80%（較差）\n- CT 可看到結石、腫瘤、外壓、氣體、脓\n- 超音波特別容易漏診小結石、輸尿管中段、遠端結石\n- 選項說超音波「更敏感」錯誤\n\n**(C) ✗ 超音波看輸尿管的限制**：\n- **沒有阻塞或擴張時，輸尿管很難看**\n- 正常輸尿管寬度 ~ 4 mm，深處且被腸氣擋住\n- **只能看 dilated（阻塞）的輸尿管**\n- 選項說「即使無阻塞也清楚」錯誤\n\n**(D) ✗ 膀胱結石偵測**：\n- 超音波可以看到 > 3-5 mm 的結石，但\n- **CT 或膀胱鏡才是最敏感**\n- 小結石超音波可能漏診\n\n**(E) ✗ 膀胱結石超音波的操作**：\n- 實際**膀胱要「裝滿水」比較好看**（acoustic window）\n- 結石會沉在 dependent portion，隨體位移動（特徵 shifting + shadow）\n- 完全排空膀胱反而看不清（沒有音學窗）\n- 選項方向反了\n\n## 超音波在神經性膀胱的應用\n\n### 1. Baseline 評估\n- 膀胱形狀、壁厚（> 5 mm 異常）\n- 容量、殘尿量\n- 膀胱結石\n- 腎臟：hydronephrosis、皮質厚度、結石\n- 輸尿管：擴張？\n\n### 2. 長期追蹤\n- **SCI、脊椎裂**：每年\n- **腦源性（無風險因子）**：隔年或依症狀\n- 發現 hydronephrosis → 進一步 IVP、CT、renography\n\n### 3. Residual urine 測定\n- 非侵入性\n- 避免反覆導尿\n- Bladder scanner 方便床邊使用\n\n## 各神經性膀胱的完整評估建議\n\n**初期（diagnosis）**：\n- **所有病人**：症狀評估 + 尿液分析 + 殘尿 + 腎功能\n- **泌尿系統超音波**\n- **高風險族群（SCI、spina bifida、DSD）**：加做 urodynamic\n\n**追蹤**：\n- **低風險（腦源性）**：每 1-2 年評估\n- **高風險**：每年 urodynamic + 上尿路影像\n\n**Video urodynamic（VCUG + urodynamic）**：\n- 最完整評估\n- 可看 DSD、VUR、bladder neck、bladder deformity\n- 用於複雜病人、手術前",

    "answer": "E",
    "explanation": {
      "summary": "**長期留置尿管（indwelling Foley）絕不是「適合的長期處置」**。併發症極多：反覆 UTI、膀胱結石、腎結石、腎衰竭、膀胱癌（長期 > 10 年風險顯著↑）、尿道糜爛、自主神經反射不良。特別女性尿道短，併發症更快出現。首選仍是 **CIC（間歇性導尿）+ 藥物**。",
      "detail": "**神經性膀胱治療階梯（Neurogenic Bladder Treatment）**：\n\n## 本題病人狀態\n\n- **C7 完全 SCI 女性**\n- **Suprasacral lesion** → DO（detrusor overactivity）\n- **Detrusor-Sphincter Dyssynergia (DSD)**\n- **Bladder neck obstruction**（功能性阻塞）\n\n**問題**：\n- 高壓排尿 → 上尿路風險\n- 不完整排尿 → 殘尿多\n- 尿失禁（DO）\n\n## 各選項分析\n\n**(A) ✓ C7 女性 CIC 可行性**：\n- C7 保留：deltoid、biceps、wrist extensor（**ECRL, ECRB**）、triceps\n- 手部大肌肉：可抓握（非精細）\n- **Tenodesis grip**（被動握持）\n- **適當輔具 + 訓練下可執行 CIC**\n- C6 是功能性的 boundary（以下 CIC 較困難）\n- C7 在訓練後多數可達成\n\n**(B) ✓ CIC 合併藥物選擇**：\n\n**目的：降低 DO、增加膀胱容量、改善尿失禁**\n\n- **Antimuscarinics（抗膽鹼）**：\n  - Oxybutynin、tolterodine、solifenacin、fesoterodine、trospium\n  - 副作用：口乾、便秘、視物模糊、認知下降（老人慎用）\n  - Trospium 較少中樞副作用\n- **β3-agonist**：\n  - **Mirabegron**、Vibegron\n  - 機轉：β3 刺激膀胱放鬆\n  - 副作用少（主要是血壓）\n  - 可合併 antimuscarinics\n- **Calcium channel blockers**（膀胱選擇性）：\n  - 理論上減少 detrusor 收縮\n  - 效果不如 antimuscarinics\n  - 臨床使用較少\n- **TCA（imipramine）**：傳統用法\n\n**(C) ✓ 膀胱壁 Botox 注射**：\n- **OnabotulinumtoxinA（Botox）200 U**\n- Cystoscope 引導多點注射\n- **台灣健保給付**：適用於神經性膀胱 NDO 且藥物無效者\n- 效果持續 **約 6-9 個月**\n- 可重複注射\n- 副作用：可能暫時 areflexia → 需要 CIC\n- 其他：UTI、血尿\n\n**(D) ✓ α1a selective blocker**：\n- **Tamsulosin**、Silodosin\n- 改善膀胱頸阻塞、DSD\n- α1A selective → 對攝護腺與膀胱頸選擇性高\n- **血壓副作用較少**（non-selective 如 doxazosin 血壓降較多）\n- 但女性使用 off-label，仍可考慮\n\n**(E) ✗ 長期留置尿管的問題**：\n\n**長期留置 Foley 的併發症**：\n\n1. **CAUTI**（反覆尿路感染）\n   - 幾乎必然 colonized\n   - 每天感染機率↑\n   - 可引發 urosepsis\n\n2. **膀胱結石**（bladder stone）\n   - 留置 5+ 年發生率顯著\n   - 需手術\n\n3. **腎結石、腎水腫**\n\n4. **膀胱癌**（long-term > 10 年）\n   - Squamous cell carcinoma 風險↑\n   - 相對風險 > 4-5 倍\n\n5. **尿道糜爛 / 尿道結石**\n   - 女性特別容易陰道糜爛\n   - 男性尿道狹窄\n\n6. **Autonomic dysreflexia**（T6 以上 SCI）\n\n7. **腎衰竭**\n   - 長期高壓、反覆 UTI → CKD\n\n**女性特別不適合長期留置的原因**：\n- 尿道短（3-4 cm） → urethral erosion 風險高\n- 陰道炎\n- 美觀、社交\n- 活動不便\n\n**正確的長期處置順序（AUA 2021 Guideline）**：\n\n### 第一線\n1. **CIC（間歇性導尿，首選）**+ antimuscarinics/β3\n2. 行為治療（timed voiding、fluid management）\n\n### 第二線（CIC + 藥物失敗）\n3. **Botox 注射**\n4. Sacral neuromodulation\n5. Posterior tibial nerve stimulation\n\n### 第三線（嚴重病人）\n6. **Augmentation cystoplasty**（膀胱擴大術）\n7. **Continent catheterizable channel**（Mitrofanoff）\n8. Urinary diversion（ileal conduit）\n\n### 不得已才考慮長期留置\n- **優先 suprapubic catheter > urethral**（至少避免女性尿道糜爛）\n- 需每月更換\n- 密切追蹤\n- 絕對不是「適合的選擇」，只是 **least worst option**\n\n## 其他處置考量\n\n### Valsalva / Crede maneuver\n- 僅用於 LMN lesion（無 DSD）\n- SCI 有 DSD 者**禁忌**（會推高壓力）\n\n### External sphincterotomy\n- 男性選項（破壞 sphincter → 低壓）\n- 搭配 condom catheter\n- 女性不適用（無尿套）\n\n### Condom catheter\n- 男性限定\n- 女性無類似產品\n\n## Autonomic Dysreflexia（T6 以上 SCI 的急症）\n\n- 膀胱過脹是最常見誘因\n- BP 驟升 + 頭痛、冒汗、心律慢\n- 立即處置：坐起 + 找誘因 + 降壓\n- 長期留置 Foley 可能增加此風險",

      "detail": "**Myelomeningocele（脊髓脊膜膨出）概述**：\n\n- 最常見的 neural tube defect（活產嬰兒 0.3-1/1000）\n- 脊髓與脊膜突出於體外\n- 多在 lumbosacral 區\n- **產前 MRI 可診斷**；產前或出生後關閉手術\n- 合併 Chiari II malformation + hydrocephalus（需 VP shunt）\n\n## 神經性膀胱處置時間軸\n\n### 出生後立即\n- Bladder 評估\n- 殘尿測定\n- 防止膀胱過脹\n- Clean Intermittent Catheterization (CIC) **可立即開始**（若需要）\n\n### **出生後 2-3 個月**（不是 6 個月）\n- **Baseline urodynamic study**（UDS）\n- 腎臟 ultrasound\n- VCUG（if indicated）\n- 選項 (A) 「6 個月」**太晚**\n- 早期 UDS 可預測 upper tract risk，及早介入\n\n### 1 年內\n- 建立長期管理方案\n\n### 持續追蹤\n- 每年 renal US\n- 每 1-2 年 UDS（生長、功能變化）\n- 青春期再評估\n\n## Spina Bifida 膀胱問題類型\n\n依病灶與殘存神經決定：\n\n| 膀胱類型 | 括約肌 | 治療 |\n|---|---|---|\n| **Detrusor hyperactive** + sphincter hyperactive | 緊（DSD） | CIC + antimuscarinic（大部分病人） |\n| Detrusor hypoactive + sphincter hyperactive | 緊 | CIC |\n| Detrusor hyperactive + sphincter hypoactive | 鬆 | 失禁難治，可能需 sling |\n| Detrusor hypoactive + sphincter hypoactive | 鬆 | Overflow incontinence |\n\n**膀胱容量小 + DO 很常見**：\n- 因此 **antimuscarinics + Botox 有效**\n- 選項 (C) 說「效果不佳」錯誤\n\n## 各選項分析\n\n**(A) ✗** 應在 **出生後 2-3 個月**做 baseline UDS（不是 6 個月）\n\n**(B) ✓ Hydronephrosis / VUR → 預防性抗生素**：\n- 目的：預防 pyelonephritis、保護腎功能\n- 常用：Trimethoprim、amoxicillin、nitrofurantoin（較少）\n- 低劑量每日或 EOD\n- 同時要減壓（CIC、藥物、手術）\n- 長期追蹤\n\n**(C) ✗** 膀胱容量小 + DO 很常見：\n- 約 70-80% spina bifida 病人有 DO\n- **Antimuscarinics 有效**（oxybutynin 是標準）\n- **Botox 200 U 注射也有效**\n- 選項說「效果不佳」錯誤\n\n**(D) ✗ 病灶位置與排便**：\n\n**理解肛門內括約肌（IAS）與外括約肌（EAS）**：\n- **IAS（平滑肌，自主神經支配）**：S2-S4 parasympathetic + sympathetic\n- **EAS（橫紋肌，自主控制）**：S2-S4 pudendal nerve\n\n**病灶位置影響**：\n- **L3 以上（高位）**：**UMN lesion** → **IAS 和 EAS 張力都保留或過高** → 但排便反射**保留**（reflex defecation）\n- **L3 以下（sacral / cauda equina）**：**LMN lesion** → **IAS 張力低、EAS 鬆弛** → 肛門外觀平坦、無皺褶（patulous anus） → 常 constipation + **無法自主排便**\n\n選項 (D) 說「L3 以上 IAS 張力高無法排便」**不完全正確**：\n- High lesion 確實 IAS/EAS 張力過高\n- 但有 reflex defecation（薦髓反射保留）\n- 通常搭配 bowel program（suppository, digital stimulation）可以排便\n- Low lesion 反而**更無法排便**（無反射）\n- 選項描述方向似乎混淆\n\n**(E) ✗ Bulbocavernosus + Anocutaneous Reflex**：\n\n- **Bulbocavernosus reflex (BCR)**：S2-S4 反射（擠陰莖/陰蒂 → 肛門括約肌收縮）\n- **Anocutaneous reflex (anal wink)**：S2-S4 反射（肛門周皮膚刺激 → 收縮）\n\n**解讀**：\n- **陽性（正常）反射 = 薦髓反射弧保留**\n- 這反而表示 EAS 有功能 → 將來**可能有控制能力**\n- 選項說「陽性者控制不佳」**方向相反**\n- 陰性（absent）反射才表示完全 LMN lesion、預後差\n\n## Myelomeningocele 腸道管理\n\n### 目標\n- Social continence\n- 規律排便（每 1-2 天）\n- 避免便秘、嵌塞\n\n### 方法\n1. **飲食**：高纖維、足水分\n2. **時間訓練**：固定時間坐便盆（利用 gastrocolic reflex）\n3. **Laxatives**：\n   - Osmotic（PEG、lactulose）\n   - Stimulant（senna、bisacodyl）\n4. **Suppository + digital stimulation**（LMN 病人）\n5. **Enemas**\n6. **Antegrade Continence Enema (ACE / Malone procedure)**：嚴重病人\n\n## Myelomeningocele 其他併發症\n\n- **Chiari II malformation** + hydrocephalus（~ 80-90%）\n- **Tethered cord syndrome**\n- 下肢 flaccid paresis\n- Sensory loss → 壓瘡\n- 足畸形（clubfoot）\n- 髖關節脫臼\n- 脊椎側彎\n- Latex 過敏（反覆手術）\n- 學習障礙、注意力\n- 青春期、性功能問題",
      "sources": [

      "summary": "**小腦梗塞病人較「常」出現 detrusor areflexia**（不是較少）。小腦 vermis 參與 micturition 的抑制控制；小腦梗塞可能造成 areflexia。另外，小腦對膀胱控制的調節也透過 brainstem（pontine micturition center），受損可能有不同表現。",
      "detail": "**中風後神經性膀胱**：\n\n## 中風各時期的膀胱變化\n\n### 急性期（spinal shock analog）\n- **Detrusor areflexia**（沒收縮）\n- 類似 spinal shock\n- 需要 CIC 或 Foley\n- 持續數天到 2-3 週\n\n### 亞急性 / 慢性期\n- **Detrusor overactivity (DO)** 最常見（~ 50%）\n- 頻尿、急尿、急迫性尿失禁\n- 通常無 DSD（因為是 suprapontine lesion）\n- 低壓系統，上尿路風險低\n\n### 少數病人持續 areflexia\n- **雙側中風**（bilateral）\n- 額葉病灶大\n- **小腦梗塞**可能有 detrusor areflexia\n- 混合型\n\n## 中風病灶與膀胱問題的關係\n\n| 病灶位置 | 常見膀胱問題 |\n|---|---|\n| **Cerebral cortex（multiple）** | DO（最常見） |\n| **Frontal lobe** | DO、可能 voiding apraxia、失禁 |\n| **Basal ganglia** | DO |\n| **Brainstem（pontine）** | DSD 可能 |\n| **Cerebellum** | **Detrusor areflexia 較常見** |\n| 雙側大腦 | Persistent areflexia 可能 |\n\n**為什麼小腦梗塞較常 areflexia？**\n\n- 小腦透過 brainstem（pontine micturition center）調節排尿\n- 小腦病灶可能**抑制** PMC → 排尿啟動困難\n- 臨床：detrusor underactivity or areflexia\n- 患者抱怨排尿困難、殘尿多\n- 選項 (B) 說「小腦梗塞較**少**出現 areflexia」**錯誤**，應為「較**常**」\n\n## 尿失禁與中風預後\n\n### 重要預測因子\n- **尿失禁是最強的功能預後預測因子之一**\n- 急性期尿失禁的病人：\n  - 3 個月後死亡率 **2-3 倍**\n  - ADL 獨立比例明顯較低\n  - 較差的出院地點（nursing home 率↑）\n  - 較差的長期 QoL\n\n### 可能的解釋\n- 尿失禁反映**病灶較大、較多區域受損**\n- 合併認知障礙、意識下降\n- 失能程度高\n- 照顧負擔重\n\n## 老年人 + 認知障礙的抗膽鹼藥物選擇\n\n### 抗膽鹼藥物的 CNS 副作用\n- 認知下降\n- 譫妄\n- 失眠、嗜睡矛盾\n- 跌倒風險↑\n\n### 不同藥物的 BBB 穿透性\n\n**容易穿透 BBB（認知副作用多）**：\n- **Oxybutynin**（immediate-release 最糟）\n- Atropine\n- **避免用於老人 / 失智**\n\n**較少穿透 BBB（認知副作用少）**：\n- **Trospium**（季銨鹽結構，帶電 → BBB 穿透差）\n- **Darifenacin**（M3 選擇性）\n- **Fesoterodine**\n- **Solifenacin**\n\n**結論**：老人、失智、認知障礙者選 Trospium 或 Darifenacin\n\n## 各選項分析\n\n**(A) ✓ 中風膀胱時期**：\n- 早期：areflexia（spinal shock-like，可持續數天至數週）\n- 慢性：hyperactivity（DO）\n\n**(B) ✗** 小腦梗塞**較常**（不是較少）出現 areflexia\n\n**(C) ✓ 雙側中風的 persistent areflexia**：\n- 雙側大腦受損 → 嚴重破壞 micturition network\n- 可能長期 areflexia\n- 需長期 CIC\n\n**(D) ✓ 尿失禁 = 預後預測**：\n- 多個 large cohort 證實\n- 獨立於其他因子\n- Outcome 較差\n\n**(E) ✓ Trospium 適合老人認知障礙**：\n- 不穿 BBB\n- 認知安全\n- 推薦選擇\n\n## 中風後尿失禁的治療\n\n### 非藥物\n- **行為治療**：prompted voiding、timed voiding\n- 膀胱訓練\n- 骨盆底運動（若可配合）\n- 環境改善（離廁所近、輔具）\n- 衣著（易脫穿）\n\n### 藥物\n- **Antimuscarinics**：trospium、solifenacin、fesoterodine\n- **β3-agonist**：mirabegron（老人友善）\n- **TCA**（imipramine）— 避免（副作用）\n- 避免 BZD、opioids（加重）\n\n### 進階\n- **Botox**（refractory DO）\n- Sacral neuromodulation（選擇性病人）\n\n### 急性期管理\n- Timed voiding\n- Bladder scanner 監測 PVR\n- 若 retention → CIC（避免 Foley 若可）\n- 避免長期 Foley（UTI、免疫）\n\n## Stroke Rehabilitation Continence Bundle\n\n每日：\n- 記錄排尿時間、量\n- 評估殘尿\n- 鼓勵 toilet 習慣\n- 膀胱訓練\n- 介入尿失禁原因（如活動受限、認知）\n\n## 附帶：中風後排便問題\n\n- 便秘較常見（低活動、飲食、藥物）\n- 急迫性大便失禁可能有\n- Bowel program：高纖、足水、固定時間、suppository/laxatives",

      "summary": "DSD（逼尿肌括約肌共濟失調）病人在 detrusor 收縮時，**外括約肌也同步收縮**，**膀胱頸或外括約肌處會看到 funneling 被阻擋、下尿道無法顯影**，不是「清楚觀察到打開」。選項 (C) 描述的是**正常排尿**，不是 DSD。",
      "detail": "**Video Urodynamic Study（錄影尿路動力學）**：\n\n## 檢查內容\n\n### 同步記錄三項\n1. **Pressure measurements**：\n   - Intravesical pressure (Pves)\n   - Abdominal pressure (Pabd)\n   - **Detrusor pressure (Pdet = Pves - Pabd)**\n   - Urethral pressure（有需要時）\n2. **External sphincter EMG**\n3. **Fluoroscopic imaging**（VCUG）\n\n### 可評估\n- **Filling phase**：\n  - 感覺（first sensation、strong desire）\n  - Capacity\n  - Compliance (ΔV/ΔP)\n  - DO 有無\n  - Leak point pressure\n  - **VUR 何時出現**\n  - 膀胱形狀（trabeculation、saccules、diverticula）\n- **Voiding phase**：\n  - Detrusor contractility\n  - **Urethral opening pattern**\n  - **DSD（外括約肌）**\n  - **Bladder neck dyssynergia**\n  - Sphincterotomy 後是否復發\n\n## 正常排尿 vs DSD 的影像差異\n\n### 正常排尿 fluoroscopy\n1. Detrusor 收縮（Pdet ↑）\n2. **EMG 同時 silent**（外括約肌放鬆）\n3. **Bladder neck funneling**（膀胱頸打開呈漏斗狀）\n4. **External sphincter relaxed**\n5. **下尿道完整顯影**（contrast 流經整個尿道）\n6. 排尿順暢、壓力適中\n\n### DSD（Detrusor-Sphincter Dyssynergia）\n1. Detrusor 收縮（Pdet ↑↑ 高壓）\n2. **EMG 反而活化**（外括約肌同步收縮）\n3. Bladder neck 可能打開（但外括約肌處阻塞）\n4. **External sphincter 不放鬆**\n5. **下尿道上段顯影，遠端無顯影**（被阻擋）\n6. 尿道呈「nipple」或 \"crown-like\" 外觀\n7. 高壓、間歇排尿\n\n**DSD 有 3 個類型（Blaivas classification）**：\n- **Type 1**：Detrusor 收縮時 sphincter 先緊，稍後突然放鬆（crescendo-decrescendo EMG）\n- **Type 2**：Detrusor 收縮同時 sphincter clonic 收縮（間歇高壓）\n- **Type 3**：Detrusor 收縮整個過程 sphincter 持續收縮（tonic）\n\n## 各選項分析\n\n**(A) ✓ 放射線透視下的觀察**：\n- **膀胱輸尿管逆流（VUR）**：觀察 contrast 是否上行\n- **膀胱順應性**：看壓力-容積曲線\n- **膀胱壁變形**：trabeculation、diverticula、saccules、Christmas tree appearance\n\n**(B) ✓ 最完整的評估工具**：\n- Pressure + EMG + Fluoroscopy 三合一\n- 是 **gold standard**\n- 特別對複雜病人（SCI、spina bifida、pelvic surgery）\n\n**(C) ✗** 完全相反\n- DSD 時**外括約肌收縮、下尿道遠端無法顯影**\n- 選項描述的是**正常排尿**\n\n**(D) ✓ Sphincterotomy 術後評估**：\n- External sphincterotomy（男性 SCI 的手術）\n- 切斷 external sphincter 減少阻塞\n- 長期可能**組織再生 → DSD 復發**\n- Video UDS 可發現復發的 DSD（EMG + 尿道形狀）\n- 可見 contrast 通過手術部位受阻\n\n**(E) ✓ VUR 監測**：\n- Fluoroscopy 可動態觀察 VUR 出現\n- 記錄發生時的 bladder volume 與 pressure\n- 指引膀胱安全容量（safe volume）\n- 決定處置（CIC 頻率、augmentation）\n\n## Video UDS 適應症\n\n- **神經性膀胱**（SCI、MS、spina bifida、MMC）\n- **DSD 懷疑**\n- **VUR 評估**\n- Outlet obstruction（男性 BPH、女性 urethral stricture）\n- Stress incontinence（Valsalva leak point pressure）\n- 反覆 UTI 原因探查\n- 手術前評估（augmentation、sphincterotomy）\n\n## 基本 Urodynamic 參數\n\n**正常值（成人）**：\n- **Capacity**：400-600 mL\n- **First sensation**：100-200 mL\n- **Strong desire**：300-400 mL\n- **Compliance**：> 20 mL/cmH₂O（臨床使用）\n- **Detrusor pressure at voiding**：\n  - 男 < 60 cmH₂O\n  - 女 < 40 cmH₂O\n- **Qmax (maximum flow)**：> 15 mL/sec\n- **PVR (post-void residual)**：< 50 mL\n- **EMG during voiding**：silent（放鬆）\n\n**異常**：\n- **DO**：filling 時 detrusor 自發性收縮\n- **Low compliance**：< 12.5 mL/cmH₂O（危險，upper tract risk）\n- **DSD**：EMG 與 detrusor 不協調\n- **Detrusor underactivity / areflexia**：排尿時 Pdet 無上升\n- **Leak point pressure**：\n  - DLPP > 40 cmH₂O → 上尿路危險\n  - VLPP（Valsalva）：評估 SUI 嚴重度\n\n## 其他影像檢查\n\n- **Renal US**：baseline + yearly\n- **VCUG** alone：兒童\n- **IVP**：較少用\n- **CT/MRI urography**：結構評估\n- **Renogram (MAG3/DTPA)**：腎功能",

      "summary": "LMN（薦髓以下）腸道損傷會使直腸**容量增加、compliance 增加**（不是下降）。因為失去 sacral reflex 與自主神經張力，**直腸壁張力下降、變鬆**，可容納更多糞便但排空困難（flaccid bowel）。",
      "detail": "**神經性腸道 (Neurogenic Bowel) 分類**：\n\n## 兩大類\n\n### UMN Bowel（反射性腸道，Reflexic）\n- 病灶：**T12 / conus medullaris 以上**\n- 薦髓反射**保留**\n- 特徵：\n  - 外括約肌**緊（痙攣）**\n  - 肛門外觀**有皺褶**\n  - Resting tone **正常或增加**\n  - Sacral reflex（BCR、anocutaneous）**保留**\n  - 反射性排便（digital stimulation、suppository 有效）\n  - **Constipation + 偶發 reflex incontinence**\n- 治療：利用反射（digital stim、suppository）+ 時間表\n\n### LMN Bowel（鬆弛性腸道，Areflexic / Flaccid）\n- 病灶：**Conus medullaris、cauda equina、sacral nerve roots、pudendal nerve**\n- 薦髓反射**消失**\n- 特徵：\n  - **外括約肌鬆**（EAS denervated）\n  - **肛門外觀平坦、無皺褶**（patulous anus）\n  - **Resting tone 下降**\n  - Sacral reflex **消失**（negative BCR、negative anocutaneous reflex）\n  - **大便失禁風險高**（sphincter weak）\n  - **排便困難**（無反射）\n- 治療：手動清除、適度便秘化飲食（稍緊大便便於控制）\n\n## 腸道生理學回顧\n\n### 肛門括約肌\n- **IAS（內括約肌）**：平滑肌，**自主神經支配**（parasympathetic + sympathetic）\n- **EAS（外括約肌）**：橫紋肌，**pudendal n.（S2-S4）自主控制**\n- **Puborectalis**：pelvic floor 肌肉，負責 continence\n\n### Resting tone 組成\n- **主要來自 IAS（~ 70-85%）**\n- 部分來自 EAS tonic activity\n- LMN lesion 影響\n  - **IAS：可能保留（因為有非神經性 myogenic tone + 交感神經）**\n  - **EAS：明顯鬆弛**（pudendal n. 受損）\n- 總體 resting tone 下降\n\n### 肛門皺褶（anal cushions / puckering）\n- 主要來自 EAS tonic contraction 與 pelvic floor support\n- EAS 萎縮 → 肛門外觀平坦（**patulous anus**）\n\n## LMN 腸道的病理生理\n\n### 直腸變化（重要！）\n- **直腸壁失去神經張力**\n- **Rectal compliance 增加**（變鬆）\n- **Rectal distension volume 增加**（可容納更多）\n- 但感覺缺失 → 不知道該排便\n- 糞便累積 → impaction\n- **選項 (E) 「compliance 下降」錯誤**\n\n### 結腸 transit 時間\n- 一般正常或略慢\n- 不像 UMN 那麼慢\n\n### 大便失禁（fecal incontinence）\n- **LMN > UMN 的 FI 風險**\n- 因為 EAS 完全不能控制\n- 需保持大便較硬\n\n## Colocolic Reflex\n\n- 直腸擴張 → 透過局部反射 → 結腸蠕動**抑制**\n- 這是正常生理反射（保護性）\n- **LMN lesion 仍可能保留**（mural reflex，腸神經系統自身）\n- 排便不順 → 直腸擴張 → 抑制結腸 → 更不排便（惡性循環）\n- 選項 (D) 的敘述**正確**\n\n## 各選項分析\n\n**(A) ✓** Resting tone 下降（主要因 EAS 鬆弛，IAS 部分保留）\n\n**(B) ✓** 肛門平坦無皺褶（patulous anus）是 LMN 經典徵象\n\n**(C) ✓** 薦髓反射消失 → digital stim、suppository **效果較差**\n- UMN 病人才適用這些反射性排便方法\n- LMN 病人主要靠手動清除、Valsalva、腹部按摩\n\n**(D) ✓** Colocolic reflex：\n- 直腸擴張抑制近端結腸蠕動\n- 不利排便\n- 這是為什麼要**避免排便不順 / impaction**\n\n**(E) ✗** Compliance **增加**，不是下降\n\n## LMN 腸道管理\n\n### 原則\n1. **保持大便形狀較硬**（易控制）\n2. **每日 1-2 次規律排便**\n3. **手動清除**（manual disimpaction）\n4. 避免 enema / suppository（無效）\n\n### 飲食\n- 適中纖維（不要過多，會造成太軟）\n- 足水分但不過量\n- 避免刺激性食物\n\n### 藥物\n- **Bulking agent**（psyllium）形成較成形大便\n- **Stool softener**（docusate）適量\n- **避免 stimulant laxatives**（會造成軟便失禁）\n\n### 手動方法\n- **Manual disimpaction**（手指清除）\n- Valsalva maneuver\n- 腹部按摩（順結腸方向）\n- 適當的便盆姿勢\n\n### 進階\n- **Transanal irrigation**（有效方法）\n- **Antegrade Continence Enema (ACE, Malone procedure)**\n- Sacral nerve stimulation\n- Colostomy（嚴重病人最後選擇）\n\n## UMN 腸道管理（對比）\n\n### 原則\n- 利用反射\n- 固定時間（利用 gastrocolic reflex，飯後 30 分鐘）\n- 大便保持 soft-formed\n\n### 方法\n1. **Digital rectal stimulation**（刺激 → 反射排便）\n2. **Suppository**（glycerin、bisacodyl）\n3. **Abdominal massage**\n4. **Stool softeners + bulk-forming**\n\n## 兒童 Spina Bifida 的特殊考量\n\n- 多為 LMN type\n- 早期建立 bowel program\n- **ACE（Malone）** 對 refractory 病人有效\n- 目標：social continence by school age\n\n## 大便失禁的評估\n\n- **Wexner / Cleveland Clinic FI Score**\n- **St Mark's Incontinence Score**\n- **Anal manometry**：resting + squeeze pressure\n- **Endoanal ultrasound**：sphincter anatomy\n- **EMG**：external sphincter\n- **Rectal sensation**：balloon test",

      "summary": "**多尿症（polyuria）需要找潛在病因**（DM、DI、hypercalcemia、過度飲水等），**不能只用「行為調整」治療**。多尿本身是症狀，治療的是根本原因。**行為調整適用於 OAB（膀胱過動）或尿失禁**，不是多尿症。",
      "detail": "**各選項分析**：\n\n## (A) ✓ 嬰兒排尿\n- **新生兒 / 嬰兒排尿 = 反射性（非自主）**\n- 透過 sacral reflex arc\n- **膀胱容量 50-100 mL 時誘發**\n- 每天排尿 15-20 次（新生兒）\n- 1 歲後逐漸減少到 6-8 次/日\n- 尚無 cortical control\n\n## (B) ✓ 兒童排尿控制發展\n\n**發展階段**：\n- **18-24 個月**：能認知膀胱充盈\n- **2-3 歲**：白天可控制（daytime continence）\n- **3-4 歲**：夜間可控制（nighttime continence）\n- **5 歲**：**約 80-90% 兒童完全 continent**\n- **5 歲以後的尿床 = enuresis**\n\n**Primary Nocturnal Enuresis（原發性尿床）**：\n- 自發緩解率：每年 ~ 15%\n- **青春期大多自行緩解**\n- 但若 **7 歲後仍嚴重尿床** 建議治療\n- 治療：\n  - 鬧鐘 alarm therapy\n  - Desmopressin\n  - Imipramine（少用）\n  - 行為治療\n- 鼓勵、不責罵\n- 選項 (B) 大致正確（雖然「無需過度擔憂」的說法對嚴重者不一定適用，但主流觀念是會自然緩解）\n\n## (C) ✓ 老年 OAB（膀胱過動）\n- 老年人盛行率 20-30%\n- 症狀：**頻尿、急尿、夜尿、urge incontinence**\n- **常找不到明確原因（idiopathic）**\n- 病理可能涉及：\n  - Detrusor smooth muscle 變化\n  - 神經退化\n  - 感覺受器改變\n  - Bladder wall ischemia\n\n## (D) ✓ 男女老年尿問題差異\n- **老年男性主要問題**：\n  - **BPH（benign prostatic hyperplasia）→ 排尿困難、hesitancy、weak stream、殘尿多**\n  - 可合併 urge symptoms（secondary OAB）\n- **老年女性主要問題**：\n  - **Stress UI**：分娩、停經、盆底功能減退\n  - **Urge UI**：OAB\n  - **Mixed incontinence** 常見\n  - Prolapse（子宮、膀胱、直腸脫垂）\n\n## (E) ✗ 多尿症不能只用行為調整\n\n### Polyuria（多尿症）定義\n- **> 3 L/day**（成人）\n- 或 > 40 mL/kg/day（兒童）\n\n### 多尿症的原因（必須找出潛在病因）\n\n**1. Osmotic diuresis（滲透性）**：\n- **糖尿病（DM）**：glucosuria → 水隨糖排出\n- **高鈣血症、甘露醇**\n\n**2. Water diuresis（水利尿）**：\n- **Diabetes insipidus（DI）**：\n  - Central DI：ADH 分泌不足\n  - Nephrogenic DI：腎臟對 ADH 無反應\n- **Primary polydipsia**：過度喝水（心理性、強迫性）\n- 藥物：利尿劑、lithium、demeclocycline\n\n**3. 其他**：\n- 酒精\n- 咖啡因（過量）\n- 高蛋白飲食\n- 低鉀、低鈣失調\n- CKD\n\n### 多尿症的治療\n- **治療根本原因（最重要）**：\n  - DM → 血糖控制\n  - DI → desmopressin\n  - 高鈣 → 治療病因\n  - Primary polydipsia → 心理治療 + 限水\n- **不是單純的「行為調整」**\n- 行為調整只對 primary polydipsia 部分有效\n\n**選項 (E) 說「通常可透過行為調整來治療」錯誤**\n\n## Nocturnal Polyuria（夜尿多尿症）\n\n### 定義\n- 夜間尿量佔 24 小時總尿量的 **> 33%**（不是 25%；各 guideline 定義略不同，ICS 2002 標準為 > 33%）\n- 有些指引用 > 20% 或 > 35%\n- 選項說 > 25% 雖不太精準但接近概念\n\n### 原因\n- **心衰竭** → 夜間回心血量↑\n- **睡眠呼吸中止症（OSA）** → hypoxia、BNP↑\n- **Diuretic 時間點不當**\n- **糖尿病**、DI\n- **Age-related ADH secretion 改變**\n- **Peripheral edema**（DVT、venous insufficiency）\n- 飲水習慣（晚上喝多）\n\n### 治療\n- **找出潛在病因**\n- Desmopressin（特定條件下）\n- 提早使用利尿劑\n- 下肢抬高\n- 睡前限水\n- 治療 OSA\n\n選項 (E) 「可能與其他潛在病況有關」**對於夜尿多尿是正確的**，但「多尿症行為調整」的部分**錯誤**。\n\n## Nocturia（夜尿）\n\n- **定義**：睡眠中被尿意叫醒 ≥ 1 次\n- **原因分類**：\n  - **Global polyuria**（24 小時尿多）\n  - **Nocturnal polyuria**（夜間尿多）\n  - **Reduced bladder capacity**（OAB、BPH）\n  - **Sleep disorders**（insomnia → 夜醒就想尿）\n  - 混合型\n- **評估**：\n  - Frequency-volume chart（記錄 3 天）\n  - 找出類型\n  - 依類型治療\n\n## 兒童尿床進一步\n\n**Enuresis 分類**：\n- **Monosymptomatic**：單純夜尿，白天正常\n- **Non-monosymptomatic**：合併白天症狀\n\n**治療步驟**：\n1. **動機、衛教**\n2. **Alarm therapy**（最有效長期方法）\n3. **Desmopressin**\n4. 合併\n5. 特殊情況（ADHD、behavioral issues）\n\n**排除 organic 原因**：\n- 糖尿病、DI\n- 泌尿道異常\n- Spinal dysraphism（occult spina bifida）\n- Constipation（重要！）\n- Sleep apnea",
