    "category": "聽覺障礙",
    "question": "下列有關聽障相關的描述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "老年性聽障 (presbycusis) 通常是高頻感覺神經性 (high-frequency) 聽障" },
      { "key": "B", "text": "噪音引起的聽障 (noise-induced) 一開始是影響低頻的聽力" },
      { "key": "C", "text": "常見引起聽障的耳毒性藥物包括 aminoglycoside、cisplatin、high-dose salicylates 及 loop diuretics" },
      { "key": "D", "text": "Aminoglycoside、cisplatin 引起的聽障是永久性聽障" },
      { "key": "E", "text": "High-dose salicylates 及 loop diuretics 引起的聽障通常是可逆的" }
    ],
    "answer": "B",
    "explanation": {
      "summary": "(B) 錯誤。**噪音引起的聽障（NIHL）一開始影響的是「高頻」，特別是 3000-6000 Hz 的「notch」（典型 4000 Hz 凹陷）**，而非低頻。因為耳蝸底部（basal turn）負責高頻、最易受噪音傷害。隨著曝露延長才逐漸擴及中頻與低頻。",
      "detail": "**聽覺障礙總覽**\n\n## 聽障分類\n\n### 依部位分類\n\n#### 1. Conductive Hearing Loss（傳導性）\n- 外耳、中耳病變\n- 例：耳垢、中耳炎、耳硬化症、鼓膜穿孔\n- **骨導 > 氣導**\n- 多可治療\n\n#### 2. Sensorineural Hearing Loss（感音神經性，SNHL）\n- 內耳、聽神經病變\n- **骨導 = 氣導**（同時下降）\n- 多數不可逆\n- 老年性、噪音、耳毒性\n\n#### 3. Mixed（混合型）\n- 傳導 + 感音\n\n#### 4. Central（中樞型）\n- 聽覺皮質、中樞通路\n- 聽閾正常但辨識困難\n\n### 依嚴重度分類（純音平均, PTA）\n\n| 分級 | 聽閾 (dB) |\n|---|---|\n| 正常 | ≤ 25 |\n| 輕度 | 26-40 |\n| 中度 | 41-55 |\n| 中重度 | 56-70 |\n| 重度 | 71-90 |\n| 極重度 | > 90 |\n\n## 各類聽障特徵\n\n### 1. Presbycusis（老年性聽障）— (A) 正確\n\n**特徵**：\n- **對稱性、雙側**\n- **高頻優先下降** ★\n- 4000-8000 Hz 先受影響\n- 漸進性\n- 感音神經性\n- 語音辨識差（特別在噪音環境）\n\n**病理**：\n- 毛細胞退化（特別 **basal turn**，負責高頻）\n- 聽神經纖維減少\n- 血管紋萎縮\n- 中央聽覺皮質退化\n\n**盛行率**：\n- 65 歲以上：30-40%\n- 75 歲以上：50%+\n- 85 歲以上：> 80%\n\n**治療**：\n- 助聽器\n- 必要時植入式助聽設備\n- 重度：人工電子耳\n\n### 2. Noise-Induced Hearing Loss (NIHL)（噪音性聽障）— ★ 本題核心\n\n**特徵**：\n- **高頻優先（特別 3000-6000 Hz）** ★\n- **典型 4000 Hz notch**（凹陷）\n- 起初可能單側或不對稱\n- 曝露時間長 → 擴及中頻、低頻\n- 感音神經性\n\n**為什麼 4000 Hz 最易受影響？**\n- 耳蝸 **basal turn** 的機械共振頻率\n- 接近許多工業噪音頻譜\n- 血流相對少\n\n### (B) 為什麼錯誤？\n\n選項說「噪音引起的聽障一開始是影響**低頻**」\n\n**錯誤原因**：\n1. 噪音 NIHL 起始於**高頻**（4000 Hz notch）\n2. 低頻通常是**晚期才受影響**\n3. 方向完全相反\n\n**NIHL 病理機轉**：\n- **急性暴露（acoustic trauma）**：可能傷及鼓膜、毛細胞死亡\n- **慢性暴露**：\n  - 毛細胞代謝壓力、氧化損傷\n  - 突觸病變（synaptopathy）\n  - 永久性\n\n**預防**：\n- 減少暴露時間\n- 使用耳塞/耳罩\n- 職業衛生：**暴露限值 85 dBA × 8 小時**（每增加 3 dB 減半時間）\n- 音樂家、軍人高風險\n\n### 3. Ototoxic Drugs（耳毒性藥物）— (C)(D)(E) 正確\n\n#### (A) Aminoglycoside 類\n- **Gentamicin, Tobramycin, Amikacin, Streptomycin, Neomycin**\n- 機轉：破壞毛細胞\n- **永久性、不可逆** ★\n- 高頻優先\n- 通常雙側\n- 劑量累積相關\n- 腎功能差者風險高\n- Gentamicin 有前庭毒性\n\n#### (B) Platinum-based\n- **Cisplatin**\n- 化療藥\n- **永久性** ★\n- 60-80% 病人受影響\n- 高頻為主\n\n#### (C) Loop Diuretics\n- **Furosemide, Bumetanide, Ethacrynic acid**\n- 機轉：影響血管紋離子運輸\n- **通常可逆** ★\n- 但 ethacrynic acid 可能永久\n- 快速靜脈給藥風險最高\n\n#### (D) High-dose Salicylates\n- **Aspirin > 3-4 g/day**\n- 伴耳鳴\n- **停藥後可逆** ★\n- 偶爾永久\n\n#### (E) NSAIDs\n- 少數報告\n- 通常可逆\n\n#### (F) Macrolides\n- Erythromycin, Azithromycin（少見）\n- 通常可逆\n\n#### (G) Quinine\n- 抗瘧藥\n- 耳鳴、可逆\n\n### 4. Sudden Sensorineural Hearing Loss（突發性感音神經性聽障）\n\n**診斷**：\n- 72 小時內\n- 連續 3 個頻率 ≥ 30 dB 下降\n- 一耳\n\n**病因**：\n- 病毒感染（多數原因不明）\n- 血管性\n- 自體免疫\n- 腫瘤（小腦橋腦角）\n- 梅毒\n\n**治療**：\n- **高劑量類固醇**（口服、鞘內）\n- 越早治療越佳（14 天內）\n- 部分恢復：50-70%\n\n### 5. Ménière 氏病\n\n**典型三聯徵**：\n- 發作性眩暈\n- 感音神經性聽障（**低頻優先**）\n- 耳鳴 + 耳脹滿感\n\n**機轉**：內淋巴水腫（endolymphatic hydrops）\n\n## 聽力檢查\n\n### 1. Audiometry（聽力圖）\n- 純音閾值測試\n- 250-8000 Hz\n- 氣導 + 骨導\n\n### 2. Tympanometry（鼓室圖）\n- 鼓膜、中耳功能\n\n### 3. OAE（耳聲傳射）\n- 耳蝸外毛細胞功能\n- 新生兒篩檢\n\n### 4. ABR（聽性腦幹反應）\n- 聽神經與腦幹傳導\n- 新生兒、無法配合者\n\n### 5. Speech Audiometry\n- 語音接收閾\n- 語音辨識分數\n\n## 聽障復健\n\n### 助聽器（Hearing Aids）\n- 輕度至重度\n- 放大聲音\n- 數位、類比\n\n### 人工電子耳（Cochlear Implant）\n- 重度-極重度 SNHL\n- 繞過受損毛細胞\n- 直接刺激聽神經\n- 兒童 > 1 歲可植入\n\n### BAHA（骨傳導助聽器）\n- 傳導性、混合型聽障\n- 單側重度 SNHL\n\n### 新生兒聽力篩檢（台灣）\n- **1-3-6 原則**：\n  - 1 個月內篩檢\n  - 3 個月內確診\n  - 6 個月內介入\n\n## 考點速記\n\n| 聽障類型 | 頻率特徵 | 可逆性 |\n|---|---|---|\n| **Presbycusis** | 高頻為主 | 不可逆 |\n| **NIHL** | **高頻 notch（4000 Hz）** ★ | 不可逆 |\n| **Aminoglycoside** | 高頻 | **永久** |\n| **Cisplatin** | 高頻 | **永久** |\n| **Loop diuretics** | 全頻 | **可逆** |\n| **Salicylates（高劑量）** | 全頻 | **可逆** |\n| **Meniere's** | **低頻** | 波動 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 27 \"Hearing Impairment\"", "url": null },
        { "text": "Kujawa SG, Liberman MC. Adding insult to injury: cochlear nerve degeneration after \"temporary\" noise-induced hearing loss. J Neurosci 2009;29:14077", "url": "https://pubmed.ncbi.nlm.nih.gov/19906956/" },

        { "text": "Gates GA, Mills JH. Presbycusis. Lancet 2005;366:1111", "url": "https://pubmed.ncbi.nlm.nih.gov/16182900/" }
      ]
    }

      "summary": "(D) 正確。**Parkinson 病人因感覺功能下降、喉部反射遲鈍，常出現「靜默式吸入（silent aspiration）」**—誤吸時不會咳嗽、無臨床徵象。VFSS 上可見食物進入氣道但病人毫無反應，是 PD 吸入性肺炎的重要原因。其他選項皆錯：PD 有口腔、咽喉、**食道**三期障礙；舌頭反覆動作反映**傳送障礙**（lingual pumping）；環咽肌異常**參與**延遲；食物質地**明顯影響**吞嚥表現。",
      "detail": "**Parkinson 病的吞嚥障礙**\n\n## 流行病學\n\n- **PD 病人吞嚥障礙盛行率：70-90%**（視診斷方法）\n- 早期就可能有（很多人不自知）\n- 進行性惡化\n- **吸入性肺炎是 PD 最常見死因之一**（約 70%）\n\n## PD 吞嚥障礙的四階段表現\n\n### 1. 口腔準備期（Oral Preparatory）\n- **Festination**（碎動）於口腔\n- 咀嚼困難、無力\n- **Drooling（流口水）**：不是因為口水多，而是**吞嚥頻率下降**\n- 食物漏出口外\n- 食團形成不完整\n\n### 2. 口腔期（Oral）— (B) 關鍵\n\n#### **Lingual Pumping / Tongue Pumping** ★\n- 舌頭**反覆前後動作**\n- **「反覆嘗試」推送食團**\n- 不是能動性好，而是**無法一次有效推送**\n- 是 PD 口腔期的**典型特徵**\n- Tremor-like 動作\n- 吞嚥起始延遲\n\n#### (B) 為什麼錯誤？\n- 舌頭反覆前後動作**反映障礙**，不是能動性佳\n- PD 舌頭肌肉 rigidity、bradykinesia\n- 顯示**無法一次完成食團傳送**\n- 食團通常延遲、殘留\n\n### 3. 咽喉期（Pharyngeal）\n\n#### 典型異常\n- **吞嚥反射延遲**（delayed swallow reflex）\n- **喉部上提不足**\n- **Valleculae（會厭谿）殘留**\n- **Pyriform sinus（梨狀竇）殘留**\n- **Cricopharyngeal dysfunction**（環咽肌功能障礙）\n- 食團通過咽喉時間延長\n\n#### (C) 為什麼錯誤？\n- 環咽肌（UES）的 **incomplete relaxation / incoordination** 是 PD 典型\n- 常合併 Zenker's diverticulum\n- **食團通過延遲與環咽肌密切相關**\n- 是 Shaker exercise 或 Botox 注射的適應症\n\n### 4. 食道期（Esophageal）— (A) 關鍵\n\n#### PD **有食道期異常** ★\n- 食道蠕動異常\n- 食道張力異常\n- 反流\n- 食團滯留\n\n#### (A) 為什麼錯誤？\n- PD 吞嚥障礙**涉及全部三期**（口腔、咽喉、食道）\n- 不是只有口腔和咽喉期\n\n## 靜默式吸入（Silent Aspiration） — (D) 正確\n\n### 定義\n- **食物/液體進入聲門以下（氣道）**\n- **無咳嗽、無嗆咳反射**\n- 病人無感\n- 只能經 VFSS / FEES 發現\n\n### PD 為何常見靜默式吸入？\n1. **喉部感覺下降**\n   - 迷走神經、舌咽神經功能異常\n   - 上氣道感覺受損\n\n2. **咳嗽反射減弱**\n   - Cough reflex 下降\n   - 自發咳嗽無力\n\n3. **認知功能**\n   - 進階 PD 的注意力、反應時間受影響\n\n4. **呼吸肌力下降**\n   - 無法有效咳嗽排出\n\n### 臨床意義\n- 看似吃得好的 PD 病人可能**暗地裡誤吸**\n- 無臨床警訊\n- **反覆肺炎 = red flag**\n- **發燒、肺部聽診 crackle 要警覺**\n- 建議**早期 VFSS 評估**\n\n### 靜默式吸入的族群\n- **PD**（★ 本題）\n- **腦中風**（尤其腦幹）\n- **失智症**\n- **頭頸癌放療後**\n- **老年人**\n- **ALS**\n- **MS**\n\n## (E) 為什麼錯誤？食物質地與吞嚥\n\n### PD 病人對不同質地的反應\n\n#### 液體（Thin liquids）\n- **最容易誤吸**\n- 流速快\n- 吞嚥反射延遲來不及保護氣道\n\n#### 稠液（Thickened liquids）\n- 流速慢\n- 較安全\n- 但**過稠可能殘留**\n\n#### 固體（Regular / soft）\n- 咀嚼困難（口腔期問題）\n- 食團形成不全\n\n#### Pureed（泥狀）\n- 口腔期易處理\n- 但可能無吞嚥觸發\n\n**結論**：\n- 食物質地**顯著影響**吞嚥表現\n- 個別化評估\n- 常見處方：**Nectar-thick 或 Honey-thick liquids**\n\n### (E) 敘述錯誤\n- 不同質地表現不同\n- 液體 vs 固體 vs 泥狀各有問題\n- 是治療調整的核心依據\n\n## VFSS 典型 PD 發現\n\n### 口腔期\n- Lingual pumping（舌反覆動作）\n- 延遲吞嚥起始\n- 食物在口腔滯留\n- Premature spillage（食物提早流入咽部）\n\n### 咽喉期\n- 延遲吞嚥反射\n- 喉部上提不足\n- Valleculae 殘留\n- Pyriform sinus 殘留\n- **靜默吸入** ★\n- Cricopharyngeal dysfunction\n\n### 食道期\n- 食道蠕動異常\n- 反流\n\n## 治療\n\n### 1. 藥物優化\n- **L-dopa 劑量最佳化**\n- On-off 期差異明顯\n- **On 時吞嚥進食**\n- Off 時難以吞嚥\n\n### 2. 姿勢調整\n- **Chin-tuck**（下巴下壓）\n- 少量多次\n- 直坐進食\n\n### 3. 食物質地調整\n- **Nectar-thick liquids**\n- 軟質食物\n- 避免薄液\n\n### 4. 吞嚥訓練\n\n#### LSVT（Lee Silverman Voice Treatment）\n- 大聲發音訓練\n- 兼改善吞嚥\n- 16 次療程\n\n#### **Expiratory Muscle Strength Training (EMST)**\n- **Troche 2010** 經典研究\n- 訓練呼氣肌\n- 改善咳嗽、吞嚥\n- 改善 PAS 分數\n\n#### Video-assisted Swallowing Therapy\n- 生物回饋\n\n#### 舌/咽肌群訓練\n\n### 5. 進階介入\n\n#### 藥物\n- 調整 PD 藥物\n- 治療流口水：抗膽鹼藥（glycopyrrolate, atropine 舌下）、肉毒桿菌注射\n\n#### Botulinum Toxin 注射\n- 唾液腺（治流口水）\n- Cricopharyngeal muscle（UES）\n\n#### DBS（Deep Brain Stimulation）\n- 對吞嚥改善有限\n- 主要改善動作症狀\n\n#### PEG（胃造口）\n- 嚴重誤吸、肺炎反覆\n- 末期 PD\n\n## 預防吸入性肺炎\n\n### 高危險族群\n- **PD + 失智**\n- **PD 病史 > 10 年**\n- **反覆肺炎**\n- **UPDRS 高**\n\n### 預防策略\n- **口腔衛生**（減少口腔菌落）\n- **咳嗽訓練**\n- **直坐進食 + 飯後 30 分鐘不躺**\n- 每年流感、肺炎鏈球菌疫苗\n- 避免鎮靜劑\n\n## 考點速記\n\n| PD 吞嚥特徵 | 重點 |\n|---|---|\n| **障礙期別** | **口腔 + 咽喉 + 食道**（三期皆有） |\n| **口腔期特徵** | **Lingual pumping**（舌反覆動作） |\n| **咽喉期** | 延遲反射、殘留、UES 異常 |\n| **最危險** | **靜默式吸入** ★ |\n| **食物質地** | 顯著影響，需調整 |\n| **治療首選** | L-dopa 優化 + 姿勢 + 質地調整 |\n| **EMST** | 證據強 |",

      "summary": "(C) 正確。**假性延髓麻痺（pseudobulbar palsy）是雙側 UMN 病變**—皮質延髓徑路雙側受損（如多次中風），導致軟顎、咽喉、舌肌活動障礙；但因為**延髓核本身完整**，**吞嚥反射與嘔吐反射通常仍保留**（甚至亢進）。其他選項：(A) 單側中風**可以**造成吞嚥障礙；(B) 雙側皮質中風常是**UES 張力升高**且殘留於**梨狀竇**；(D) 腦幹中風影響**咽喉期最嚴重**；(E) 腦幹中風**預後最差**。",
      "detail": "**腦中風與吞嚥障礙**\n\n## 流行病學\n\n- **急性中風吞嚥障礙盛行率：37-78%**\n- **出院時仍有吞嚥障礙：11-50%**\n- **6 個月仍有：8-12%**\n- **吸入性肺炎是中風常見併發症** — 增加死亡率 3-7 倍\n\n## 吞嚥的神經控制\n\n### Central Control（中樞）\n\n#### 1. Cortical（皮質）\n- **雙側皮質控制吞嚥**\n- 不對稱：**約 60% 人右側優勢**（個別差異大）\n- **Swallow center（側向）**：前額葉、島葉、頂葉、感覺運動皮質\n- **皮質延髓徑路（corticobulbar tract）** 雙側下達腦幹核\n\n#### 2. Brainstem（腦幹）\n- **Nucleus tractus solitarius (NTS)**（延腦）\n- **Nucleus ambiguus**（延腦）\n- **Central pattern generator**：協調吞嚥動作\n- **吞嚥反射 + 嘔吐反射**的核心位置\n\n#### 3. 顱神經\n- **V**：三叉神經（咀嚼）\n- **VII**：顏面神經（嘴唇、表情）\n- **IX**：舌咽神經（後 1/3 舌、咽感覺）\n- **X**：迷走神經（軟顎、咽、喉、食道）\n- **XII**：舌下神經（舌運動）\n\n## 中風位置 vs 吞嚥障礙（★ 考點）\n\n### 1. 單側大腦皮質中風 — (A) 錯誤\n\n**可造成吞嚥障礙** ✓\n- 約 **40-50% 單側中風有吞嚥障礙**\n- 雖皮質雙側控制，但非絕對對稱\n- **右側中風**：常有 inattention、失認\n- **左側中風**：常有 apraxia、失語影響吞嚥指令理解\n- 口腔期、咽喉期均可受影響\n- 但預後通常較好（可恢復）\n\n**優勢側中風**更易吞嚥障礙。\n\n### 2. 雙側大腦皮質中風（Pseudobulbar palsy）— (B)(C) 關鍵\n\n**特徵**：\n- 雙側皮質延髓徑路（corticobulbar）受損\n- **UMN 病變**\n- 原因：多次中風、廣泛白質病變、MS、ALS\n\n**吞嚥特徵**：\n- **嚴重 dysphagia**\n- **軟顎、咽喉、舌肌 UMN 型無力**（spastic）\n- **Spastic bulbar signs**\n- **情感失禁**（emotional lability，突發哭泣/大笑）\n- **吞嚥反射亢進或延遲**\n- **嘔吐反射亢進**（UMN）★\n- **環咽肌張力升高**（UES failure to relax）\n- 食團通過困難\n- **梨狀竇殘留** > valleculae 殘留\n\n**(B) 錯誤原因**：\n- 雙側皮質中風 → UES **張力升高**（不是下降）\n- UMN 病變造成 **spasticity**\n- 殘留多在**梨狀竇**（下）而非會厭谿（上）\n\n**(C) 正確原因**：\n- 假性延髓麻痺：UMN 病變\n- 軟顎、咽、舌功能障礙 ✓\n- **延髓核本身完整**：吞嚥反射、嘔吐反射**保留** ✓\n- 可能反射亢進\n\n### 3. 腦幹中風（Bulbar palsy）— (D)(E) 關鍵\n\n**特徵**：\n- **延髓核/核下病變（LMN）**\n- **吞嚥中樞直接受損**\n- 常見位置：**Wallenberg syndrome（lateral medullary infarct）**\n\n**吞嚥特徵**：\n- **咽喉期最嚴重** ★（非口腔期）\n- **吞嚥反射消失或嚴重延遲**\n- **嘔吐反射消失**\n- **咽喉感覺喪失**（silent aspiration 風險極高）\n- 軟顎下垂（單側）\n- 聲帶麻痺（Horner sign 同側）\n- 環咽肌無法協調打開\n\n**(D) 為什麼錯誤**：\n- 腦幹中風主要影響**咽喉期**（不是口腔期）\n- 口腔期主要由皮質與前運動區控制\n- 延髓管咽喉期\n\n**(E) 為什麼錯誤**：\n- 腦幹中風吞嚥障礙**預後最差** ★\n- 核/核下 LMN 損傷，重生能力有限\n- 可能需 PEG 長期\n- **皮質中風預後較好**（神經可塑性、可恢復）\n\n## Wallenberg Syndrome（外側延髓症候群）\n\n### 病灶\n- 下外側延髓（posterior inferior cerebellar artery, PICA）\n- 椎動脈阻塞\n\n### 臨床（經典）\n- **同側**：\n  - 面部感覺喪失（V trigeminal）\n  - Horner sign（sympathetic）\n  - 聲帶麻痺（Nucleus ambiguus，CN X）\n  - **吞嚥困難**（CN IX, X）\n  - 運動失調（小腦腳）\n- **對側**：\n  - 軀幹、肢體溫痛覺喪失（spinothalamic）\n\n### 吞嚥特徵\n- **最嚴重的中風吞嚥障礙之一**\n- UES 開啟失調\n- 單側咽部癱瘓\n- 聲帶麻痺 → 氣道保護差\n- **梨狀竇積留**\n- **靜默吸入常見**\n\n### 治療\n- **Head rotation to affected side**（頭轉向患側）\n- Shaker exercise（UES）\n- 手術：cricopharyngeal myotomy（頑固型）\n- PEG 可能必要\n\n## 吞嚥障礙篩檢工具\n\n### 1. Water Swallow Test\n- 給 50 ml 水\n- 觀察嗆咳\n- 簡單但假陰性多\n\n### 2. GUSS（Gugging Swallowing Screen）\n- 結構化分級\n- 由簡單到複雜\n\n### 3. 3-oz Water Test\n- 90 ml 連續喝\n\n### 4. V-VST（Volume-Viscosity Swallow Test）\n- 不同黏稠度、量測\n\n## 中風吞嚥治療\n\n### 急性期（前 2 週）\n- **禁食（NPO）until screened**\n- 床邊評估 < 24 小時\n- 異常 → VFSS / FEES\n- 食物質地調整\n- 姿勢訓練\n\n### 亞急性/慢性\n- 吞嚥運動（Masako, Shaker, Mendelsohn）\n- NMES\n- rTMS（實驗）\n- tDCS（經顱直流）\n- 食物質地漸進\n\n### 嚴重\n- NG tube → PEG（若 > 4 週）\n- Tracheostomy（保護氣道）\n\n## 預後因素\n\n### 較好預後\n- 皮質中風\n- 單側\n- 年輕\n- 無失智\n- 早期介入\n- 營養良好\n- 家屬支持\n\n### 較差預後\n- **腦幹中風**\n- 雙側\n- 老年\n- 合併失智/認知障礙\n- 靜默吸入\n- 反覆肺炎\n- 呼吸肌無力\n\n## 考點速記\n\n| 中風位置 | 吞嚥特徵 | 預後 |\n|---|---|---|\n| 單側皮質 | 可能吞嚥障礙、多恢復 | 較好 |\n| **雙側皮質（假性延髓）** | **UMN、吞嚥反射保留、UES 張力升高** | 中 |\n| **腦幹（真性延髓）** | **LMN、咽喉期最嚴重、反射消失、靜默吸入** | **最差** |\n| Wallenberg | 單側咽癱、UES 失調 | 差 |\n| 小腦 | 協調差 | 中 |",

      "detail": "**失語症（Aphasia）分類與鑑別**\n\n## 失語症的三大評估軸\n\n1. **Fluency（流暢度）**：說話速度、句長、韻律\n2. **Comprehension（理解力）**：理解指令的能力\n3. **Repetition（覆誦）**：能否重複別人的話\n\n### 經典 8 種失語症分類表（★ 必背）\n\n| 失語症 | Fluency | Comprehension | Repetition | 病灶 |\n|---|---|---|---|---|\n| **Broca's** | **非流暢** | 好 | 差 | 左額下回（44, 45 區）|\n| **Wernicke's** | 流暢 | **差** | 差 | 左顳上回後部（22 區）|\n| **Conduction**（傳導型） | 流暢 | 好 | **差** ★ | Arcuate fasciculus |\n| **Global**（全失語） | 非流暢 | 差 | 差 | 廣泛 MCA |\n| **Transcortical Motor (TCMA)** | **非流暢** | 好 | **保留** | 前分水嶺 |\n| **Transcortical Sensory (TCSA)** | 流暢 | 差 | **保留** | 後分水嶺 ★ |\n| **Mixed Transcortical** | 非流暢 | 差 | **保留** | 雙分水嶺 |\n| **Anomic**（命名型） | 流暢 | 好 | 保留 | 多處 |\n\n## 本題病人分析\n\n### 臨床表現\n- **45 歲工程師**\n- 中風位置：**左中-後大腦動脈分水嶺區**\n- **口語表達流暢** ← Fluent\n- **可覆誦、仿說** ← Repetition preserved ★\n- **無法正確執行指令** ← Comprehension 差\n- **常有語誤（paraphasia）**\n\n### 套用失語症分類表\n\n| 特徵 | 本病人 |\n|---|---|\n| Fluency | **流暢** ✓ |\n| Comprehension | **差** ✓ |\n| Repetition | **保留** ✓ |\n\n**唯一符合的答案 = Transcortical Sensory Aphasia（跨皮質感覺型）** ★\n\n### 與其他選項的區別\n\n| 選項 | Fluency | Comp | Rep | 與本病人比較 |\n|---|---|---|---|---|\n| (A) Mixed TC | 非流暢 | 差 | 保留 | ✗ 本病人流暢 |\n| (B) Wernicke's | 流暢 | 差 | **差** | ✗ 本病人 Rep 保留 |\n| **(C) TCSA** ★ | **流暢** | **差** | **保留** | ✓ 完全符合 |\n| (D) TCMA | 非流暢 | 好 | 保留 | ✗ 流暢度、理解不符 |\n| (E) Conduction | 流暢 | 好 | **差** | ✗ 本病人 Rep 保留 |\n\n## 跨皮質失語症（Transcortical Aphasias）解析\n\n### 共同特徵\n- **Repetition preserved**（覆誦保留）★\n- 病灶位於**分水嶺區（watershed areas）**\n- 保留 perisylvian language network\n\n### 解剖基礎\n\n#### Perisylvian language network\n- Broca's area（44, 45）\n- Wernicke's area（22）\n- Arcuate fasciculus\n- 由 **MCA** 直接供血\n\n#### 跨皮質區（Transcortical areas）\n- 在 Perisylvian 外圍\n- **Watershed zones**：\n  - ACA-MCA 邊界（前）\n  - MCA-PCA 邊界（後）\n- 由末端血管供血\n- **低血壓、低灌流時先受損**\n\n### 1. Transcortical Motor Aphasia (TCMA)\n- 病灶：**前分水嶺**（ACA-MCA 邊界、前額葉）\n- 非流暢\n- 自發性說話少\n- **但覆誦流暢**\n- 理解好\n- 類似 Broca's 但 repetition OK\n\n### 2. **Transcortical Sensory Aphasia (TCSA)** ★ 本題\n- 病灶：**後分水嶺**（MCA-PCA 邊界、顳頂葉）★\n- **流暢**（有時 empty speech）\n- **理解差**\n- **覆誦保留**（可仿說）\n- 語誤明顯\n- **類似 Wernicke 但 repetition OK**\n\n### 3. Mixed Transcortical（Isolation of Speech Area）\n- 病灶：雙分水嶺（ACA + PCA 邊界）\n- 僅保留 Perisylvian\n- 只能 echolalia（仿說）\n- 理解差、自發言語差\n- 罕見、嚴重\n\n## 失語症的常見病因\n\n### 血管性（最常）\n- 中風（缺血性、出血性）\n- MCA 最常\n- Watershed infarct（低血壓）\n\n### 其他\n- TBI\n- 腦炎\n- 腦膜炎\n- 腫瘤\n- Dementia（primary progressive aphasia）\n- 癲癇\n\n## 語誤（Paraphasia）類型\n\n### 1. Phonemic（literal）paraphasia\n- 音節替換\n- 例：說「dat」代替「cat」\n- 常見於：傳導型、Wernicke\n\n### 2. Semantic（verbal）paraphasia\n- 語意替換\n- 例：說「狗」代替「貓」\n- 常見於：Wernicke、TCSA、Anomic\n\n### 3. Neologism（新詞）\n- 完全新造的字詞\n- 常見於：Wernicke（嚴重）\n\n### 4. Jargon\n- 流暢但無意義\n- 嚴重 Wernicke\n\n## 失語症評估工具\n\n### 經典工具\n- **Boston Diagnostic Aphasia Examination (BDAE)**\n- **Western Aphasia Battery (WAB)**\n- **Aachener Aphasie Test**\n\n### 台灣常用\n- 簡明失語症測驗\n- Concise Chinese Aphasia Test\n\n### 快速篩檢\n- **NIHSS**（中風量表）語言項\n- **Frenchay Aphasia Screening Test (FAST)**\n\n## 失語症治療\n\n### 基本原則\n- **越早介入越好**\n- **個別化**\n- **高強度、反覆**（> 8.8 小時/週，CIAT 研究）\n\n### Constraint-Induced Aphasia Therapy (CIAT)\n- 限制代償（手勢、圖片）\n- 強迫使用語言\n\n### Melodic Intonation Therapy (MIT)\n- 利用音樂旋律\n- 主要用於 Broca's\n\n### Computer-assisted therapy\n- Tablets、apps\n\n### Group therapy\n- 社交情境\n- 情感支持\n\n### 藥物（實驗）\n- Piracetam\n- Dopamine agonists\n- Donepezil\n- Memantine\n- 效果有限\n\n### 非侵入性腦刺激\n- rTMS\n- tDCS\n- 研究進行中\n\n## 預後\n\n### 恢復時程\n- **急性期（首 3 個月）**：最大恢復\n- **6 個月**：穩定\n- 慢性期緩慢進步\n\n### 預後好的因素\n- 年輕\n- 病灶小\n- 純語言區損傷\n- 早期介入\n- 家屬支持\n- 原本語言能力好\n\n### 預後差的因素\n- 大範圍病灶\n- **Global aphasia**\n- 合併認知障礙\n- 年老\n- 低教育\n\n## 考點速記（★ 必記分類表）\n\n**口訣**：**\"流暢 理解 覆誦\"三軸鑑別**\n\n| 類型 | F | C | R |\n|---|---|---|---|\n| Broca | ✗ | ✓ | ✗ |\n| Wernicke | ✓ | ✗ | ✗ |\n| Conduction | ✓ | ✓ | ✗ |\n| Global | ✗ | ✗ | ✗ |\n| TCMA | ✗ | ✓ | ✓ |\n| **TCSA** ★ | **✓** | **✗** | **✓** |\n| Mixed TC | ✗ | ✗ | ✓ |\n| Anomic | ✓ | ✓ | ✓ |\n\n**關鍵辨識**：\n- **覆誦保留 + 分水嶺區** → 跨皮質失語\n- **後分水嶺 + 流暢 + 理解差** → **TCSA** ★",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 3 \"Examination of Speech and Language\" + Ch. 44 \"Stroke\"", "url": null },
        { "text": "Damasio AR. Aphasia. N Engl J Med 1992;326:531", "url": "https://pubmed.ncbi.nlm.nih.gov/1732792/" },
        { "text": "Goodglass H, Kaplan E, Barresi B. Boston Diagnostic Aphasia Examination. 3rd ed. Lippincott Williams & Wilkins, 2001", "url": null },

        { "text": "Berthier ML. Transcortical aphasias. Psychology Press, 1999", "url": null }

    "question": "下列有關兒童先天性腭咽閉鎖不全之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [

      { "key": "D", "text": "新生兒早期發現，在年齡 6-12 個月時，可接受腭裂修補手術" },
      { "key": "E", "text": "無法手術的病人可使用牙蓋板改善說話共鳴" }

    "explanation": {
      "summary": "(B) 錯誤。**腭咽閉鎖不全（VPI）造成的是「過度鼻音（hypernasal speech）」而非「鼻音過輕」**。VPI 使口腔與鼻腔無法有效分隔，說話時空氣從鼻腔漏出，導致聲音**過度鼻音化**。「鼻音過輕（hyponasal）」剛好相反，是鼻塞、肥大腺樣體等「阻塞」造成的。VPI 也會有鼻漏氣（nasal air emission）、代償發音，但**不會是鼻音不足**。",
      "detail": "**腭咽閉鎖不全（Velopharyngeal Insufficiency, VPI）**\n\n## 定義\n\n**腭咽閉合（velopharyngeal closure）**：\n- 說話時軟腭（velum）向後上移動\n- 咽後壁向前移動\n- 咽側壁向內移動\n- **分隔口腔與鼻腔**\n- 為構音提供口腔壓力\n\n**VPI = 無法有效閉合腭咽瓣膜**：\n- 空氣從鼻腔逸出\n- 口腔壓力不足\n- 影響構音、共鳴、吞嚥\n\n## 病因（★ 分類）\n\n### 1. Velopharyngeal Insufficiency（結構性）\n- **腭裂**（cleft palate）★ 最常 — (A) 正確\n- **黏膜下腭裂**（submucous cleft palate）\n- **短軟腭**（short velum）\n- **大咽部**（deep pharynx）\n- **術後**（腺樣體切除後、Fried drink syndrome）\n- **外傷**\n\n### 2. Velopharyngeal Incompetence（功能性）\n- **神經肌肉**問題\n- **腦性麻痺**\n- **肌肉萎縮症**\n- **顱神經病變**（V, VII, IX, X）\n- **22q11.2 deletion（Velocardiofacial syndrome）**\n\n### 3. Velopharyngeal Mislearning\n- 習得性\n- 錯誤代償性發音\n- 發展出習慣（可治療）\n\n## 腭裂（Cleft Palate）— 最常見病因\n\n### 流行病學\n- **盛行率**：1/500-1000 活產兒（亞洲最高）\n- **家族遺傳 + 環境因素**\n- 男 > 女\n- **合併唇裂**佔 50%\n- 單純腭裂佔 50%\n- 台灣新生兒每年 200-300 例\n\n### 分類\n\n#### 依位置\n- **Primary palate**：從鼻尖到 incisive foramen（包括唇、前上顎、牙槽）\n- **Secondary palate**：從 incisive foramen 到軟腭末端\n\n#### 依嚴重度\n- **Complete**：貫穿整個\n- **Incomplete**：部分\n- **Submucous**：僅肌肉層缺損、黏膜完整（易漏診）\n\n### 關聯症候群\n- **Pierre Robin sequence**：小下巴 + U 型腭裂 + glossoptosis\n- **22q11.2 deletion（DiGeorge / VCFS）**\n- **Treacher Collins**\n- **Van der Woude**\n- **Stickler syndrome**\n\n## 臨床表現\n\n### 語音特徵 — (B) 關鍵\n\n#### **Hypernasal Speech（過度鼻音）** ★\n- 空氣從鼻腔漏出\n- 口腔音（p, b, t, d, k, g）受影響\n- 聲音「悶」、鼻音重\n- 特別在「壓力音（pressure consonants）」\n- 母音也受影響\n\n#### **Nasal Air Emission（鼻漏氣）**\n- 可見、可聞\n- 特別在 fricatives（s, f, sh, z）\n- Phonemic-specific nasal emission\n\n#### **Compensatory Articulations（代償發音）**\n- **Glottal stop**（聲門停頓）\n- **Pharyngeal fricatives**（咽摩擦音）\n- **Velar fricatives**\n- **Nasal snort**\n- 取代正常的口腔音\n- 需要語言治療矯正\n\n#### Reduced Oral Pressure\n- 說話無力\n- Aerodynamic 異常\n\n### 與 Hyponasal Speech（鼻音過輕）區別 ★\n\n| 項目 | **Hypernasal** | **Hyponasal** |\n|---|---|---|\n| 原因 | 腭咽**不全**（VPI） | 鼻道**阻塞** |\n| 病因 | 腭裂、短軟腭 | 感冒、腺樣體肥大、鼻息肉、鼻中隔彎曲 |\n| 發聲 | 空氣**出**鼻腔 | 空氣**不能出**鼻腔 |\n| 聽感 | 鼻音**重** | 鼻音**輕**（像感冒） |\n| 影響音 | 口腔音（p, b, t, d） | 鼻音（m, n, ng）失真 |\n\n### **(B) 為什麼錯誤？**\n\n選項說 VPI 造成：\n- 「**口鼻換氣不足**」❌ — 應為「漏氣」\n- 「**鼻音過輕**」❌ — 應為「**鼻音過重（hypernasal）**」\n- 「代償發音」✓ — 正確\n\n**VPI 造成 Hypernasal，不是 Hyponasal。方向錯誤。**\n\n## 餵食問題 — (C) 正確\n\n### 吸奶困難\n- **無法產生有效口腔負壓**\n- 奶水從鼻腔流出\n- 鼻漏氣合併\n- **吸奶慢、量少**\n- 易疲倦\n- 易嗆咳\n\n### 餵食策略\n- **特殊奶瓶**（Haberman, Pigeon, Dr. Brown's）\n- 半直立餵食\n- 少量多餐\n- 母乳擠出瓶餵\n- 必要時 NG tube\n- **Palatal obturator**（牙蓋板）輔助吸吮\n\n## 診斷\n\n### 1. 身體檢查\n- 視診口腔\n- 觸診腭\n- Cotton test\n- Mirror test（鏡下呼氣測試）\n\n### 2. 語音評估\n- 語言治療師\n- 過度鼻音評估（nasometer）\n- 構音評估\n\n### 3. 影像\n- **Nasoendoscopy**（鼻內視鏡）★ 直接視診\n- **Videofluoroscopy**（透視）：側位、底位\n- MRI（特殊情況）\n\n### 4. Aerodynamic Testing\n- 鼻腔氣流測量\n- 口腔壓力\n\n## 手術處置 — (D) 正確（但時機可討論）\n\n### 腭裂修補時機\n\n#### 原則\n- **越早修補越能正常語言發展**\n- **但不可太早，需組織成熟**\n\n#### 標準時程\n- **6-18 個月**（世界各中心略不同）\n- **常見：9-12 個月**\n- 語言發展前完成\n- (D) 選項「6-12 個月」**符合標準建議** ✓\n\n#### 手術方法\n- **Furlow palatoplasty**（Z-plasty）\n- **Two-flap palatoplasty**（Bardach）\n- **Intravelar veloplasty**（IVV）\n- **Sommerlad technique**\n\n### Secondary Procedures\n\n#### 若語音仍有 VPI（約 20-40%）\n- **Pharyngeal flap**（咽瓣）\n- **Sphincter pharyngoplasty**（括約肌成形）\n- **Palatal lengthening**（腭延長）\n- **Furlow double-opposing Z-plasty**\n\n## 非手術選擇 — (E) 正確\n\n### Prosthetic Options（義齒/牙蓋板）\n\n#### 1. Palatal Obturator\n- 覆蓋腭裂\n- 協助吸吮、餵食\n- 嬰兒期使用\n\n#### 2. Speech Bulb / Speech Aid Appliance\n- 填補腭咽閉合\n- 協助共鳴\n- 適應：\n  - 無法手術\n  - 神經肌肉問題\n  - 術後殘餘 VPI\n\n#### 3. Palatal Lift\n- 舉起軟腭\n- 腦性麻痺、神經疾患常用\n\n### 語言治療\n- 矯正代償發音\n- 強化腭咽閉合\n- 改善氣流控制\n\n## 多學科團隊\n\n### Cleft Palate Team（標準配置）\n- **整形外科 / 顱顏外科**\n- **口腔顎面外科**\n- **小兒科**\n- **耳鼻喉科**\n- **語言治療師**\n- **聽力師**\n- **齒顎矯正**\n- **心理師**\n- **護理師、個管**\n- **社工**\n\n## 長期追蹤\n\n- 聽力（中耳炎風險高）\n- 語音評估\n- 牙齒矯正\n- 心理社會\n- 成年：正顎手術、鼻整形\n\n## 台灣腭裂照護\n\n- 健保給付\n- **顱顏基金會**支援\n- 長庚、台大、榮總、馬偕皆有 cleft team\n- 家庭支持團體\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| VPI 最常病因 | **腭裂** |\n| **語音特徵** | **Hypernasal（過度鼻音）** ★ |\n| **錯誤觀念** | **不是 hyponasal** |\n| 其他特徵 | 鼻漏氣、代償發音、吸奶困難 |\n| 修補時機 | **6-18 個月**（常 9-12） |\n| 無法手術 | Speech bulb / palatal lift |",

      "summary": "(C) 錯誤。**失智症早期語言退化的典型特徵是「語意層面」—命名困難、詞彙檢索困難、語意型語誤**；而**「語法（syntax）」與「構音（articulation）」通常保留至中晚期**。典型 AD 病人能說流暢但「空洞」的話（empty speech），文法結構完整但內容缺乏。構音障礙出現屬於非常晚期或合併其他疾病。",
      "detail": "**失智症的溝通障礙**\n\n## 失智症類型與溝通特徵\n\n### 1. Alzheimer's Disease (AD)（最常）\n- 佔 60-70%\n- 語言退化明顯\n- **語意 > 語法**退化\n\n### 2. Vascular Dementia\n- 依中風位置變化大\n- 可能合併失語\n\n### 3. Frontotemporal Dementia (FTD)\n- **語言變異型（PPA）** 特別影響語言\n- 三亞型：semantic, agrammatic, logopenic\n\n### 4. Lewy Body Dementia (DLB)\n- 認知波動\n- 視覺幻覺\n- Parkinsonism\n\n### 5. Normal Pressure Hydrocephalus\n- 步態、尿失禁、認知\n\n## 失智症溝通障礙總體特徵\n\n### 屬於認知型溝通障礙 — (A) 正確\n- **Cognitive-Communicative Disorder**\n- 不是純粹語言區域病變（如失語症）\n- 是**認知功能**（記憶、注意、執行）障礙反映到語言\n- 需用不同評估工具\n\n### 與失語症的區別\n\n| 項目 | **失語症（Aphasia）** | **失智症溝通障礙** |\n|---|---|---|\n| 病因 | 局部語言區病變（中風） | 廣泛皮質退化 |\n| 病程 | 急性、漸恢復 | 漸進惡化 |\n| 本質 | **語言**問題 | **認知**問題 |\n| 理解 | 變化大 | 初期輕度 |\n| 命名 | 依類型 | **早期即差** |\n| 流暢 | 視類型 | 多流暢但空洞 |\n| 覆誦 | 視類型 | **初期保留** |\n| 社交溝通 | 受限 | **早期失調** |\n| 治療 | 語言治療可恢復 | 保守、支持 |\n\n## AD 語言退化進程（★ 考點）\n\n### 早期（輕度 AD）\n\n#### 典型特徵\n- **命名困難（anomia）** ★ — (D) 正確\n- **詞彙檢索困難**（word-finding difficulty）\n- **迴圈性言語**（circumlocution，繞圈子說）\n- **語意型語誤**（semantic paraphasia）\n  - 例：「筆」說成「鉛」或相關但錯誤的字\n- **空洞言語**（empty speech）\n  - 用代名詞代替（「那個」、「東西」）\n- **覆誦、理解保留**\n- **語法正確**（C 選項關鍵！）\n- **構音正常**\n\n#### 為什麼語意先退化？\n- AD 早期病變：**顳葉內側 + 海馬迴**\n- **語意記憶儲存於顳葉 + 前額葉**\n- 先影響詞彙-概念連結\n- 語法中心（Broca 區、後額葉）較晚受影響\n\n### 中期（中度 AD）\n- 語意退化加重\n- 閱讀困難\n- 書寫困難\n- **理解複雜指令困難**\n- 對話維持力下降\n- 重複提問\n- 開始有迷失語境\n\n### 晚期（重度 AD）\n- 字詞極少\n- 短句、片段\n- 無意義\n- **可能開始有構音障礙**（但此時因全腦退化）\n- 最終：mutism（失語）\n- 嘔吐反射、吞嚥反射也退化\n- 可能臥床、合併吞嚥障礙\n\n## (B) 為什麼正確？\n\n### 語言退化是早期變化\n\n- **AD 診斷前即可能出現語言困難**\n- 微小變化：\n  - 詞彙選擇變少\n  - 書寫退化\n  - 複雜對話困難\n- **Mild Cognitive Impairment (MCI)** 期已可觀察\n- 有時是家人最早察覺的徵兆\n\n## (C) 為什麼錯誤？★ 本題核心\n\n選項說 AD 語言早期退化特徵：\n- **語法運用錯誤** ❌\n- **構音偏差** ❌\n\n### 正確觀念\n\n| 項目 | 早期 AD | 中晚期 AD |\n|---|---|---|\n| 語意 | **早期退化** ✓ | 嚴重 |\n| 語法（syntax） | **保留** | 部分受影響 |\n| 構音（articulation） | **保留** | 可能受損 |\n| 音韻（phonology） | **保留** | 晚期 |\n| 命名 | 困難 | 嚴重 |\n\n### 對比：哪些疾病有早期語法/構音問題？\n\n- **PPA-agrammatic variant**（原發進行性失語症-語法變異型）\n  - 語法錯誤\n  - 構音費力（apraxia of speech）\n  - 前額葉病變\n- **FTD**\n- **中風後失語**\n- **Parkinson's dysarthria**\n\n→ **不是典型 AD 早期特徵**\n\n## (E) 語言流暢度 — 正確\n\n### 失智症流暢度表現\n\n**AD**：\n- 早期：**流暢但空洞**（fluent but empty）\n- 中期：**漸漸減少**\n- 晚期：非常少、斷斷續續\n\n**FTD**：\n- 視亞型\n- Semantic variant：**流暢**\n- Agrammatic variant：**非流暢**\n\n### 流暢度評估\n- Verbal fluency test：\n  - **Letter fluency**（FAS）：前額葉\n  - **Category fluency**（動物、水果）：顳葉、語意記憶 ★\n  - **AD 在 category fluency 特別差**\n  - **FTD 在 letter fluency 特別差**\n\n## 失智症溝通障礙的治療\n\n### 非藥物（主要）\n\n#### 1. Environmental Modification\n- 清靜環境\n- 減少干擾\n- 視覺提示、照片\n\n#### 2. Communication Strategies\n- 簡單、短句\n- 慢慢說\n- 一次一件事\n- 眼神接觸\n- 重複確認\n- 不糾正錯誤\n- 用肢體語言輔助\n\n#### 3. Reminiscence Therapy\n- 懷舊治療\n- 老照片、老音樂\n- 保留的**情節記憶**\n\n#### 4. Music Therapy\n- 音樂相關記憶保留較久\n- 改善情緒、行為\n\n#### 5. Validation Therapy\n- 不糾正現實\n- 接受病人感受\n\n### 藥物（有限）\n- AChE inhibitors（donepezil, rivastigmine, galantamine）\n  - 輕度改善\n  - 不逆轉\n- Memantine（NMDA antagonist）\n  - 中重度 AD\n- **這些藥物對語言本身效果有限**\n\n### 家屬支援\n- 衛教\n- 照顧者支持團體\n- 喘息服務\n- 避免照顧者 burnout\n\n## 失智症篩檢工具\n\n### 認知篩檢\n- **MMSE**（Mini-Mental State Examination）\n- **MoCA**（Montreal Cognitive Assessment）★ 較敏感\n- **CDR**（Clinical Dementia Rating）\n\n### 語言評估\n- **Boston Naming Test**\n- **Verbal fluency**\n- **Token Test**\n\n## 預後\n\n- AD 從診斷起存活：**平均 8-10 年**\n- 語言退化漸進\n- 末期無語言溝通\n- 照顧者負擔重\n\n## 考點速記\n\n| AD 語言退化 | 特徵 |\n|---|---|\n| **早期主要受影響** | **語意（semantic）** ★ |\n| 早期保留 | **語法、構音、音韻** |\n| 典型早期 | **命名困難、語意型語誤、空洞言語** |\n| 流暢度 | 流暢但空洞 |\n| 覆誦 | 早期保留 |\n| **與失語症區別** | **認知型溝通障礙** |\n| 治療 | 非藥物為主、環境、策略 |",

      "summary": "(D) 錯誤。**TBI 認知復原的主要治療是「認知復健（cognitive rehabilitation）」而非藥物**。Methylphenidate 雖有證據可改善注意力，但**僅為輔助**。主力是：**認知訓練（注意力、記憶策略）、代償性策略、環境調整、職能治療、心理治療**。藥物是輔助，不是主要治療方式。INCOG Guidelines 2014 也強調**非藥物認知復健為核心**。",
      "detail": "**TBI 認知與行為障礙的處置**\n\n## TBI 分類\n\n### 依嚴重度（GCS 初始）\n- **Mild**：GCS 13-15\n- **Moderate**：GCS 9-12\n- **Severe**：GCS 3-8\n\n### 依損傷機制\n- **Focal**：contusion, hematoma\n- **Diffuse axonal injury (DAI)**：白質 shearing\n\n## TBI 認知障礙 — (C) 正確\n\n### 常見認知缺損\n\n#### 1. Attention（注意力）\n- Sustained attention（持續）\n- Selective attention（選擇性）\n- Divided attention（分散性）\n- **前額葉、網狀活化系統**\n\n#### 2. Memory（記憶）\n- **Declarative memory**（陳述性，海馬迴）受影響\n- **Procedural memory**（程序性）相對保留\n- Working memory（工作記憶）\n- **Post-traumatic amnesia (PTA)** 常見\n\n#### 3. Executive Functions（執行功能）\n- 計畫、組織、決策\n- 抑制控制\n- Cognitive flexibility\n- 問題解決\n- **前額葉（特別是眶額、前扣帶）**\n\n#### 4. Processing Speed（處理速度）\n- 反應時間延長\n- 資訊處理變慢\n- DAI 影響\n\n#### 5. Social Cognition\n- Theory of mind\n- 情緒辨識\n- **前額葉、顳葉**\n\n### 即使輕度 TBI 也可能有認知問題\n\n- 許多「post-concussion syndrome」\n- 可持續數月至數年\n- 頭痛、認知、情緒\n- 影響 RTW（回到工作）\n\n## Agitation（躁動）— (A) 正確\n\n### 定義\n- TBI 恢復期的過度激動、反應\n- Rancho Los Amigos Scale **Level IV**（Confused-Agitated）\n- 約 **35-70% 中重度 TBI** 會發生\n\n### 特徵\n- 通常持續 **2-3 週** ★ — (A) 正確\n- 範圍：言語激動 → 身體攻擊\n- 無法遵從指令\n- 記憶差、迷失\n- 可能合併幻覺\n\n### 評估工具 — (A) 正確\n\n#### **Agitated Behavior Scale (ABS)** ★\n- Corrigan 1989 發展\n- 14 項，每項 1-4 分\n- 總分 14-56\n- **> 21 分**：需介入\n- **> 28 分**：嚴重躁動\n- 追蹤治療效果\n\n#### 其他工具\n- Overt Aggression Scale (OAS)\n- Neuropsychiatric Inventory (NPI)\n- Rancho Los Amigos Scale\n\n## Agitation 處置 — (B) 正確\n\n### 非藥物優先（★ 核心）\n\n#### 1. 環境調整\n- **安靜、低刺激**\n- 單人房\n- 減少訪客\n- **固定照顧者**\n- 熟悉物品、照片\n- 良好照明（避免暗）\n\n#### 2. 行為管理\n- 一致性 routine\n- 簡單指令\n- 不對抗\n- 疏導、轉移注意\n- 避免負面回應\n\n#### 3. 誘因排除\n- **疼痛**（常被忽略）\n- 尿滯留\n- 便秘\n- 感染（UTI, pneumonia）\n- 藥物副作用（特別鎮靜類、opioid, benzodiazepines）\n- 脫水、電解質\n- 睡眠不足\n\n#### 4. **避免約束** ★ — (B) 正確\n- 物理約束**加重躁動**\n- 增加受傷風險\n- 皮膚傷害、壓瘡\n- 心理創傷\n- **Floor mat** 代替 bed rail\n- Sitter（照護員）看護\n- Low bed\n- Posey net / soft enclosure（若必要且時間短）\n\n### 藥物（必要時）\n\n#### 第一線\n- **Propranolol（β-blocker）**★\n  - 證據較強\n  - 減少交感過度活化\n- **Amantadine**\n  - 促進 dopamine\n  - Giacino 2012 NEJM 大型 RCT\n- **Methylphenidate**\n  - 減少注意力問題相關激動\n\n#### 第二線\n- **SSRI**（trazodone, sertraline）\n- **Valproic acid**\n- **Carbamazepine**\n\n#### 應避免\n- **Benzodiazepines**（加重 confusion）\n- **Haloperidol**（D2 阻斷影響神經可塑性）\n- **Antipsychotics**（除非極嚴重）\n- 長期使用需評估利弊\n\n## 認知復健 — (D) 本題關鍵\n\n### TBI 認知復健的主流\n\n**INCOG Guidelines 2014 / 2023**：\n- 推薦**認知復健為核心**\n- 針對性訓練\n- **證據等級 A**\n\n#### 1. 注意力訓練\n- **Attention Process Training (APT)**\n  - Sohlberg & Mateer\n  - 階梯式訓練\n- 雙重任務訓練\n- 電腦化認知訓練\n\n#### 2. 記憶訓練\n- **代償策略**：\n  - 行事曆\n  - 智慧手機提醒\n  - 筆記\n  - Memory notebook\n- **錯誤無誤學習**（errorless learning）\n- 記憶外部輔具\n\n#### 3. 執行功能訓練\n- **Goal Management Training (GMT)**\n- **Problem-Solving Training**\n- Metacognitive strategies\n- Self-monitoring\n\n#### 4. 社交認知訓練\n- Emotion recognition\n- Communication skills\n- Social skills\n\n### 藥物（輔助）\n\n#### Neurostimulants\n\n**Methylphenidate**\n- 證據中等\n- 改善注意力、處理速度\n- 劑量：5-20 mg BID\n- 副作用：血壓、心跳、焦慮、失眠\n- **從小劑量開始**\n\n**Amantadine**\n- 最強證據\n- **Giacino et al. 2012 NEJM**：\n  - RCT, 184 位 severe TBI\n  - Vegetative / MCS 病人\n  - **加速意識恢復**\n- 劑量：100 mg BID → 200 mg BID\n\n**Donepezil**\n- AChE inhibitor\n- 改善記憶、注意\n- 證據較弱\n\n**Modafinil**\n- 疲倦、白日嗜睡\n- 非 FDA 批准用於 TBI\n\n### (D) 為什麼錯誤？\n\n選項說：\n- 改善認知**以藥物治療為主** ❌\n- 使用 Methylphenidate 為**主要** ❌\n\n**正確觀念**：\n1. **認知復健（非藥物）為主** ★\n2. 藥物是**輔助**\n3. Methylphenidate 證據**中等**，非首選\n4. Amantadine 證據更強，但也是輔助\n\n## Consciousness Disorders — (E) 正確\n\n### Disorders of Consciousness (DoC)\n\n#### 分級\n- **Coma**：無喚醒、無意識\n- **Vegetative State (VS) / Unresponsive Wakefulness**：有喚醒但無意識\n- **Minimally Conscious State (MCS)**：間歇性意識\n- **Emerging from MCS**\n\n### Mesocircuit Model — (E) 正確\n\n**Schiff et al. 2010 提出**：\n- 嚴重 TBI / HIBI 後\n- **廣泛去傳入損傷**\n- 影響：\n  - 前額葉皮質\n  - Striatum（紋狀體）\n  - 丘腦\n  - 前扣帶\n- 丘腦中央核群興奮性降低\n- 皮質 deafferentation\n- 無法維持足夠意識活動\n\n### 治療\n\n#### 1. Amantadine（★ 最強證據）\n- NEJM 2012 RCT\n- 加速從 VS/MCS 恢復\n\n#### 2. Zolpidem\n- 部分病人 paradoxical awakening\n- 不可預測\n\n#### 3. Deep Brain Stimulation（實驗性）\n- 丘腦刺激\n- 中央丘腦\n\n#### 4. 感覺刺激治療\n- 家屬互動\n- 多感官刺激\n\n## 長期追蹤\n\n### Outcome Measures\n- **GOS-E**（Glasgow Outcome Scale-Extended）\n- **DRS**（Disability Rating Scale）\n- **CRS-R**（Coma Recovery Scale-Revised）\n- FIM\n\n## 考點速記\n\n| TBI 認知/行為處置 | 重點 |\n|---|---|\n| Agitation 持續 | 2-3 週 |\n| Agitation 評估 | **ABS 量表** |\n| 不建議 | **物理約束** |\n| **認知改善主力** | **認知復健（非藥物）** ★ |\n| 藥物（輔助） | Amantadine, MPH |\n| 意識障礙主因 | Mesocircuit deafferentation |\n| Amantadine 證據 | Giacino 2012 NEJM |",
      "sources": [

    "explanation": {
      "summary": "(E) 錯誤。**創傷後混亂狀態（PCS）既可作為損傷嚴重度指標，也與預後高度相關**：PCS 持續時間越長（特別 > 4 週），功能預後越差、失能率越高、回歸工作越困難。PTA（post-traumatic amnesia）時長是經典預後指標之一。選項說「與預後較無相關性」與實證完全相反。",
      "detail": "**TBI 嚴重度分級與預後指標**\n\n## TBI 嚴重度分級\n\n### 標準分級（多個維度）\n\n| 項目 | **輕度 (Mild)** | **中度 (Moderate)** | **重度 (Severe)** |\n|---|---|---|---|\n| **GCS（初始）** | **13-15** | 9-12 | 3-8 |\n| **意識喪失（LOC）** | **< 30 分** | 30 分-24 小時 | > 24 小時 |\n| **PTA 持續時間** | **< 24 小時** | 1-7 天 | > 7 天 |\n| **神經學缺損** | 無或短暫 | 可能 | 嚴重 |\n| **影像學** | 多數正常 | 可有變化 | 常有 |\n\n## 本題病人分析\n\n### 臨床資料\n- 意識喪失 **20 分鐘**（< 30 分）→ 輕度\n- 最低 GCS **E3V4M6 = 13**（輕度 13-15）→ 輕度\n- 暫時性失憶 **12 小時後恢復**（PTA < 24 小時）→ 輕度\n- 無 focal neurologic deficit\n- CT 無出血\n\n### 嚴重度判定\n→ **輕度腦損傷（Mild TBI / Concussion）** ✓\n\n**(A) 正確**：此病人確實屬於輕度 TBI\n\n## Mild TBI（Concussion）\n\n### 定義（ACRM 1993）\n任何創傷誘發的下列之一：\n- **意識變化（LOC < 30 分）**\n- **失憶（PTA < 24 小時）**\n- 精神狀態改變（confused, disoriented）\n- 神經功能短暫異常\n- **初始 GCS 13-15（受傷 30 分後）**\n\n### 常見症狀（post-concussion symptoms）\n- 頭痛\n- 頭暈\n- 疲倦\n- 認知霧（brain fog）\n- 注意力、記憶\n- 情緒波動\n- 光敏感、噪音敏感\n- 睡眠問題\n- 平衡問題\n\n### Persistent Post-Concussion Symptoms (PPCS)\n- 症狀 > 3 個月\n- 約 10-15% 的 mild TBI\n- 需綜合處置\n\n## TBI vs Non-traumatic Brain Injury — (B) 正確\n\n### 機轉不同\n\n| 類型 | 機轉 |\n|---|---|\n| **TBI** | 外力衝擊 |\n| **中風** | 血管阻塞或破裂 |\n| **腦腫瘤** | 腫瘤壓迫/浸潤 |\n| **HIE / 缺氧性** | 缺氧 |\n| **感染** | 細菌/病毒 |\n| **代謝** | 肝/腎/電解質 |\n\n### 治療不同\n- TBI：保守支持 + 復健\n- 中風：tPA、血栓切除\n- 腫瘤：手術、化放療\n\n### 預後不同\n- 各類機轉預後差異大\n- 年齡、合併症、介入時機\n\n## 身體 vs 認知/行為障礙 — (C) 正確\n\n### 中-重度 TBI 的失能來源\n\n#### 身體功能障礙\n- 肢體無力\n- 平衡、協調\n- 吞嚥\n- 視力\n- 這些通常**在首年內相對恢復**\n\n#### **認知與行為障礙** ★\n- 執行功能\n- 記憶\n- 注意力\n- 情緒調節\n- 衝動控制\n- Disinhibition\n- 社交判斷\n- **這些是「hidden disability」**\n- **更難恢復**\n- **社區整合最大障礙** ★\n\n### 社區整合（Community Reintegration）\n- 回歸工作（RTW）\n- 社交參與\n- 駕駛\n- 家庭角色\n- 獨立生活\n\n**研究顯示**：\n- 中-重度 TBI 病人 **5 年內 RTW < 50%**\n- 主因：**認知 + 行為問題 > 身體缺損**\n- 這也是復健後期的主要挑戰\n\n## Mount Fuji Sign — (D) 正確\n\n### 定義\n- **CT 影像特徵**\n- 雙側前額 tension pneumocephalus（張力性氣顱）\n- 兩側額葉被氣體壓迫分開\n- 形狀如**富士山雙峰**（或雙乳外觀）\n\n### 臨床意義\n- **神經外科急症** ★\n- 氣體壓迫造成腦幹疝出風險\n- 原因：\n  - 顱底骨折 + 持續 CSF 漏氣\n  - 副鼻竇破裂與顱腔相通\n  - 術後\n\n### 處理\n- **緊急減壓**\n- 修補漏口\n- 放置導管或手術\n- 100% 氧氣治療（小量 pneumocephalus）\n\n## PCS / PTA 作為預後指標 — (E) 本題錯誤\n\n### Posttraumatic Amnesia (PTA)\n\n**定義**：\n- 受傷後**無法形成新記憶**的時期\n- 從受傷到**連續、日常記憶恢復**之間\n- 經典預後指標（Russell 1932）\n\n**評估工具**：\n- **GOAT**（Galveston Orientation and Amnesia Test）\n  - 連續 2 天 > 75 分 → PTA 結束\n- **O-Log**（Orientation Log）\n- **WPTAS**（Westmead PTA Scale）\n\n**嚴重度分級（PTA duration）**：\n| PTA 時間 | 嚴重度 |\n|---|---|\n| < 5 分鐘 | Very mild |\n| 5 min-1 hr | Mild |\n| 1 hr-24 hr | Moderate |\n| 1-7 天 | Severe |\n| 7 天-4 週 | Very severe |\n| **> 4 週** | **Extremely severe** |\n\n### PTA 與預後的強相關性（★ 本題關鍵）\n\n**Walker & Pickett 2007、Sherer 2008、Ponsford 2014 研究**：\n- **PTA 時間是最佳預後指標之一**\n- **PTA > 4 週** → 嚴重失能率 > 60%\n- **PTA > 12 週** → 多數無法完全獨立\n- **與 RTW 強相關**\n- **與 FIM 分數相關**\n- **與生活品質相關**\n\n### Posttraumatic Confusional State (PCS)\n\n**定義**：\n- PTA 時期\n- 特徵：\n  - 定向感差\n  - 注意力差\n  - 情緒波動\n  - 睡眠/覺醒混亂\n  - 可能躁動\n  - 幻覺可能\n\n**嚴重度 vs 預後**：\n- **PCS 既是嚴重度指標也是預後指標** ★\n- 持續越久，預後越差\n- 與 GOS-E、DRS 相關\n\n### (E) 為什麼錯誤？\n\n選項說「PCS 與預後較無相關性」\n\n**錯誤原因**：\n1. PCS/PTA **與預後高度相關**\n2. 臨床使用 PTA duration 預測：\n   - RTW 可能性\n   - 功能恢復\n   - 需要的復健時長\n3. **與預後高度相關是 PTA 的核心臨床價值**\n\n## 其他 TBI 預後指標\n\n### 1. GCS（初始）\n- 重度 TBI 預後差\n- 但不是唯一指標\n\n### 2. 年齡\n- 老年預後差\n- 兒童恢復能力較好\n\n### 3. 影像學發現\n- Marshall CT classification\n- Rotterdam score\n- **DAI** 預後差\n- Midline shift\n\n### 4. 生理指標\n- **ICP > 20** 預後差\n- **CPP 維持 > 60**\n- Hypoxia, hypotension（second insult）\n\n### 5. 生物標記\n- **GFAP**（glial fibrillary acidic protein）\n- **UCH-L1**\n- Blood S100B\n- 商業化 ABCD brain bleed test\n\n### 6. 合併症\n- 酒精、藥物\n- 既有精神疾病\n- Polytrauma\n\n## Prognostic Calculators\n\n- **IMPACT**：International Mission on Prognosis and Analysis of CT\n- **CRASH**：Corticosteroid Randomisation After Significant Head Injury\n- 提供 6 個月 mortality / unfavorable outcome 預測\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| Mild TBI | GCS 13-15, LOC < 30 min, PTA < 24 hr |\n| 本病人嚴重度 | **輕度** |\n| TBI vs non-TBI | 鑑別重要 |\n| 社區整合障礙 | **認知、行為 > 身體** |\n| Mount Fuji sign | **神經外科急症** |\n| **PCS/PTA** | **嚴重度 + 預後指標**（高度相關）★ |\n| PTA > 4 週 | 嚴重 TBI |\n| PTA 評估 | GOAT, O-Log |",
      "sources": [

        { "text": "Ponsford JL et al. Predictors of postconcussive symptoms 3 months after mild traumatic brain injury. Neuropsychology 2012;26:304", "url": "https://pubmed.ncbi.nlm.nih.gov/22563872/" },

    "id": "114-1-170",

    "category": "兒童復健",
    "question": "下列有關兒童創傷性腦損傷 (pediatric TBI) 的描述，何者最正確？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "兒童 TBI 可依嚴重程度分為輕度（腦震盪）、中度及重度，多數發生腦震盪 (concussion) 的兒童在 3 個月後仍有症狀存在" },

      { "key": "C", "text": "針對兒童重度創傷性腦損傷 (severe pediatric TBI) 的急性處理，現行臨床指引建議使用低溫治療 (hypothermia) 來改善整體預後" },
      { "key": "D", "text": "與成人相似，兒童 TBI 常導致注意力與喚醒障礙 (attention and arousal disorders)。兒童 TBI 病人使用神經興奮劑 (neurostimulants) 相當常見，且使用率正逐漸增加，主要用於學齡前兒童與輕度 TBI 個案" },
      { "key": "E", "text": "對於因注意力缺陷導致功能困難的兒童 TBI 病人，刺激劑 (如 methylphenidate, MPH) 並無明顯療效" }
    ],
    "answer": "B",
    "explanation": {
      "summary": "(B) 正確。**既存 ADHD 是兒童 TBI 最重要的危險因子之一**—ADHD 兒童因衝動、注意力不集中、risk-taking 行為，導致**意外、跌倒、運動傷害發生率顯著增加**，TBI 風險是一般兒童 3-4 倍。其他選項皆錯：(A) 多數腦震盪兒童**數週內**恢復（非 3 個月後仍有）；(C) 小兒 TBI **低溫治療無益**（Cool Kids trial 2013 停止）；(D) MPH 主要用於**學齡兒童與中重度 TBI**；(E) MPH 在部分兒童 TBI **確有療效**。",
      "detail": "**兒童創傷性腦損傷（Pediatric TBI）**\n\n## 流行病學\n\n### 統計\n- **最常見兒童死亡 / 殘疾原因之一**\n- 美國：年 > 70 萬兒童急診因 TBI\n- 2-4 歲、15-19 歲**雙峰**\n- 男 > 女\n\n### 主要原因（依年齡）\n\n#### 0-4 歲\n- **跌倒**（最多）\n- **虐待性腦傷**（Abusive Head Trauma, AHT / Shaken Baby Syndrome）\n- 交通事故\n\n#### 5-14 歲\n- **運動傷害**\n- 交通事故\n- 跌倒\n\n#### 15-19 歲\n- **機動車事故**（最多）\n- **運動傷害**\n- 攻擊、自傷\n\n## 兒童 vs 成人 TBI 差異\n\n### 解剖與生理差異\n\n| 特徵 | 兒童特性 |\n|---|---|\n| 頭身比 | **頭部比例大**（嬰幼兒頭佔體重 25%） |\n| 頸部肌肉 | **較弱** |\n| 顱骨 | **較薄**（易骨折） |\n| 大腦含水量 | **較高** |\n| 髓鞘化 | **未完成**（易 DAI） |\n| 未閉合囟門（< 18 mo） | **可緩衝 ICP** |\n| 腦血流自調 | **較差** |\n| 腦血流 / 代謝率 | 高於成人 |\n\n### 病理特徵\n- **彌漫性軸突損傷（DAI）**更常見\n- **繼發性損傷**（second insult）影響大\n- 中心點被拉動：兒童 **whiplash 損傷**特別嚴重\n- 虐待性腦傷（AHT）具特殊病理：\n  - 網膜出血\n  - 硬腦膜下血腫\n  - 骨折（肋骨、長骨）\n  - 腦水腫\n\n## 嚴重度分級（同成人）\n\n- **Mild（概震盪）**：GCS 13-15\n- **Moderate**：GCS 9-12\n- **Severe**：GCS 3-8\n\n### 兒童改良 GCS\n- **Pediatric GCS**\n- 考慮發展年齡\n- 言語、動作反應調整\n\n## (A) 腦震盪恢復 — 錯誤\n\n### 兒童腦震盪自然病程\n\n**多數兒童恢復時程**：\n- **2-4 週內恢復** ★\n- **症狀持續 > 1 個月 = PPCS**（< 10-20%）\n- **3 個月後仍有症狀**：**少數**\n\n**CDC 2018 指引**：\n- 大多數兒童 **2-4 週內恢復**\n- 選項說「多數兒童 3 個月後仍有症狀」**不正確**\n\n### Return-to-Play / Return-to-Learn\n- Berlin Consensus 2017\n- 循序漸進\n- 症狀緩解 24 小時後開始\n- 6 階段進展\n- 每階段無症狀 24 小時後進到下階段\n\n## (B) ADHD 為最重要危險因子 ★ 正確\n\n### 兒童 TBI 危險因子\n\n#### 1. **ADHD** ★ 最重要\n- ADHD 兒童 TBI 風險**高 3-4 倍**\n- 衝動、注意力差 → 意外\n- 跌倒、車禍、運動傷害\n- **也是腦震盪後恢復慢的危險因子**\n- PPCS 風險增加\n\n#### 2. 其他危險因子\n- 既存學習障礙\n- 先前頭部外傷史\n- 男性\n- 家庭社經低\n- 行為問題\n- 虐待高危家庭\n\n### ADHD 與 TBI 的雙向關係\n\n- **ADHD → TBI 風險↑**（本題選項）\n- **TBI → Secondary ADHD**（腦傷後可能發展 ADHD-like 症狀）\n- 是雙向影響\n\n## (C) 低溫治療 — 錯誤\n\n### Cool Kids Trial（2013）\n\n- **目的**：評估治療性低溫（33°C）對小兒重度 TBI 預後\n- **結果**：\n  - **未改善結果**\n  - **甚至可能有害**\n  - 試驗**提前終止**\n- 發表於 Lancet Neurology\n\n### 現行指引\n\n**Brain Trauma Foundation Pediatric Guidelines（2019）**：\n- **不建議治療性低溫**\n- 體溫控制：**維持正常體溫**（36-37°C）\n- **避免高溫**（發燒惡化預後）\n\n### 治療性低溫在 TBI 的角色\n- 成人：證據也有限\n- 兒童：**不建議** ★\n\n## (D)(E) 神經興奮劑使用\n\n### Methylphenidate (MPH) 在兒童 TBI\n\n#### 適應症\n- **注意力與喚醒問題**\n- **中度至重度 TBI**（不是輕度）\n- **學齡兒童及青少年**（非學齡前）\n\n#### 證據\n- Jin & Schachar 2004 系統性回顧\n- Mahalick 1998 RCT\n- **確有改善注意力、處理速度**\n- 效果不如 ADHD 顯著\n\n#### 劑量\n- 0.3 mg/kg BID\n- 小劑量開始\n- 監測副作用\n\n#### 副作用\n- 食慾下降\n- 失眠\n- 心跳、血壓升高\n- 頭痛\n- 情緒波動\n- **Seizure threshold 可能降低**（慎用於 TBI 癲癇史）\n\n#### (D) 為什麼錯誤？\n- 選項說「主要用於**學齡前兒童**與**輕度 TBI**」\n- **錯誤**：\n  - 學齡前兒童一般不用 MPH（年齡限制 ≥ 6 歲）\n  - 輕度 TBI 一般不需神經興奮劑\n  - 適用**學齡兒童 + 中重度 TBI**\n\n#### (E) 為什麼錯誤？\n- 選項說「MPH 並無明顯療效」\n- **錯誤**：\n  - 臨床研究顯示**有療效**\n  - 改善注意力、處理速度\n  - 雖效果比 ADHD 稍弱\n  - 是常用輔助治療\n\n## 兒童 TBI 長期影響\n\n### 認知\n- **執行功能**（特別年紀越小越嚴重）\n- 學習能力\n- 記憶\n- 注意力\n- **「Growing into deficit」**：年齡漸長才顯現\n\n### 行為\n- ADHD-like symptoms\n- 衝動\n- 情緒失調\n- 社交困難\n\n### 學業\n- 學校適應\n- IEP（Individualized Education Program）\n- 504 plan（美國法規）\n\n### 生活技能\n- ADL / IADL 延遲\n- 獨立性\n- 就業困難\n\n## 兒童 TBI 復健\n\n### 急性期\n- ICU 照護\n- ICP 監測\n- 神經保護\n- 早期活動\n\n### 亞急性\n- 多專業復健\n- PT, OT, SLP\n- 教育支持（school liaison）\n\n### 長期\n- 追蹤至青少年 / 成年\n- 「growing into deficit」需後續評估\n- 家庭支持\n- 學校合作\n- 職業輔導\n\n## 虐待性腦傷（Abusive Head Trauma, AHT）\n\n### 特徵\n- < 2 歲嬰幼兒\n- **搖晃、撞擊**\n- **高死亡率**（20-30%）\n- 後遺症嚴重\n\n### 警訊\n- 不符外傷病史\n- 視網膜出血（查眼底）\n- 硬腦膜下血腫（bridging vein 斷裂）\n- 骨折（舊新並存）\n- 發育遲緩\n\n### 處置\n- 立即通報（113 / 113 兒保專線）\n- 社工介入\n- 法律程序\n- 家庭評估\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| Mild TBI 恢復 | **2-4 週多數恢復** |\n| **最重要危險因子** | **ADHD** ★ |\n| 治療性低溫 | **不建議**（Cool Kids 停止） |\n| MPH 適用 | **學齡兒童 + 中重度 TBI** |\n| MPH 療效 | 有療效（非無效） |\n| 虐待性腦傷 | 嬰幼兒、視網膜出血 |\n| 特殊評估 | Pediatric GCS、發展年齡 |",

      "detail": "**TBI 的記憶與執行功能**\n\n## 記憶系統分類 (★ 考點)\n\n### 1. Explicit Memory(外顯記憶)= Declarative Memory(陳述性記憶)\n- **有意識的記憶提取**\n- **海馬迴 (hippocampus)** 為核心\n- 顳葉內側結構\n- 兩大亞型:\n  - **Episodic memory**(情節記憶):個人經歷\n  - **Semantic memory**(語意記憶):一般知識、事實\n- **TBI 常受影響** ★\n\n### 2. Implicit Memory(內隱記憶)\n- **無意識的記憶提取**\n- **基底核、小腦、運動皮質**\n- 包括:\n  - **Procedural memory**(程序性記憶):騎腳踏車、打字\n  - Priming\n  - 古典制約\n- **TBI 相對保留** ★\n- 可用於復健:反覆練習建立程序\n\n### 臨床應用\n- **錯誤無誤學習 (errorless learning)**:利用 implicit memory\n- **Spaced retrieval**\n- **Procedural routines**:照顧者訓練病人固定流程\n\n## 執行功能 (Executive Function)\n\n### 定義\n- 前額葉主導的**高階認知**\n- 包括:\n  - 計畫、決策\n  - 工作記憶 (working memory)\n  - 抑制控制\n  - 認知彈性 (cognitive flexibility)\n  - 問題解決\n  - 監控\n\n### 神經環路\n\n**前額葉-紋狀體環路 (Prefrontal-Striatal Circuit)** ★\n- 前額葉 → 紋狀體 → 蒼白球/黑質 → 丘腦 → 前額葉\n- **多巴胺調控核心**\n- 三大環路:\n  1. **Dorsolateral prefrontal circuit**:工作記憶、執行功能\n  2. **Orbitofrontal circuit**:衝動、社交、決策\n  3. **Anterior cingulate circuit**:動機、注意\n\n### TBI 對執行功能的影響\n- **DAI 影響白質連結**\n- **前額葉挫傷常見**(eyebrow、底部)\n- **多巴胺神經元減少**\n- 執行功能障礙常見\n\n## 多巴胺與認知 (★ 本題核心)\n\n### 前額葉多巴胺的重要性\n\n**倒 U 型曲線 (Inverted-U relationship)**:\n- DA 太低或太高都影響表現\n- 最佳表現在中間濃度\n\n**D1 vs D2 受體**:\n- **D1**:前額葉豐富,調控工作記憶\n- **D2**:紋狀體豐富,調控運動、獎勵\n\n### TBI 後多巴胺系統變化\n- 黑質-紋狀體系統受損\n- 中腦-皮質系統受損\n- DA transporter (DAT) 改變\n- 前額葉 DA 不足\n\n### 多巴胺作用劑的治療證據\n\n#### 1. **Amantadine** (證據最強)\n- **NMDA 拮抗 + 間接增加 DA**\n- **Giacino et al. 2012 NEJM RCT**:\n  - 184 位 severe TBI(VS/MCS)\n  - **顯著加速意識恢復**\n  - DRS 分數改善\n- **第一線神經興奮劑**\n- 劑量:100 mg BID → 200 mg BID\n\n#### 2. **Methylphenidate (Ritalin)**\n- **DA + NE reuptake inhibitor**\n- 改善注意力、處理速度\n- 劑量:0.3 mg/kg BID\n- 證據等級:B\n\n#### 3. **Bromocriptine**\n- **D2 agonist**\n- 改善執行功能\n- 證據有限\n\n#### 4. **Modafinil**\n- 未明機轉,可能影響 DA\n- 改善疲倦、警覺\n\n#### 5. **Levodopa/Carbidopa**\n- 少用於 TBI\n- 主要 PD\n\n### 為什麼 (E) 錯誤?\n\n選項兩個斷言都錯:\n1. **「前額葉多巴胺與執行功能無關」** ❌\n   - 事實:**高度相關**,是主要調控神經傳遞\n2. **「多巴胺作用劑無法改善 TBI 認知」** ❌\n   - 事實:**有明確證據改善**(amantadine NEJM RCT)\n\n## 其他認知改善藥物(非多巴胺系)\n\n### Cholinergic\n- **Donepezil**(AChE inhibitor)\n- 改善記憶、注意\n- 證據中等\n\n### Glutamatergic\n- **Memantine** (NMDA antagonist)\n- 較少 TBI 研究\n\n### Noradrenergic\n- **Atomoxetine**(NE reuptake inhibitor)\n- 改善注意力\n\n## TBI 認知復健整合\n\n### 核心原則\n1. **非藥物為主**(認知復健)\n2. **藥物為輔**\n3. **個別化**\n4. **長期追蹤**\n\n### 非藥物介入\n- Attention Process Training\n- Compensatory strategies(筆記、提醒)\n- Goal Management Training\n- Errorless learning\n- 環境調整\n\n### 藥物選擇階梯\n- 首選: Amantadine(特別 DoC)\n- 次選: Methylphenidate(注意力)\n- 其他: Bromocriptine, Donepezil\n\n## 考點速記\n\n| 記憶類型 | 神經基礎 | TBI 受影響 |\n|---|---|---|\n| **Explicit (Declarative)** | **海馬迴** | **是** |\n| **Implicit (Procedural)** | 基底核、小腦 | **否** |\n| Working memory | 前額葉 | 是(DA 調控) |\n\n| 認知藥物 | 作用 | TBI 證據 |\n|---|---|---|\n| **Amantadine** ★ | NMDA+DA | **NEJM 2012 RCT** |\n| Methylphenidate | DA+NE | 中等 |\n| Bromocriptine | D2 | 有限 |\n| Donepezil | AChE | 中等 |",

      "detail": "**TBI 恢復機轉 (Recovery Mechanisms)**\n\n## TBI 損傷的兩階段\n\n### 1. Primary Injury(原發性損傷)\n- **受傷當下發生**\n- 不可避免\n- 機制:\n  - Focal:挫傷、血腫、撕裂\n  - Diffuse:DAI (diffuse axonal injury)\n  - 頭骨骨折\n- **治療重點:預防**(頭盔、安全帶)\n\n### 2. Secondary Injury(續發性損傷) — (A) 關鍵\n- **受傷後數分鐘到數天發生**\n- **可預防、可治療**\n- **顯著影響預後** ★\n- 機轉:\n  - **腦水腫 (edema)**\n  - **ICP 升高**\n  - **腦血流異常**\n  - **Hypoxia, hypotension**(Marshall trial 指出是最大預後因子)\n  - **興奮性毒性**(glutamate surge)\n  - **氧化壓力**\n  - **炎症反應**\n  - **粒線體功能障礙**\n  - **細胞凋亡**\n\n### (A) 為什麼錯誤?\n- Secondary injury **影響巨大**\n- 現代 ICU 治療重點就在預防 secondary insult\n- **Brain Trauma Foundation guidelines** 核心\n- 維持 CPP > 60, SpO₂ > 90%, 避免 hypotension\n\n## 恢復機轉時程\n\n### 早期恢復 (Days to Weeks) — (B) 正確\n\n**主要機轉**:\n1. **腦水腫消退 (edema resolution)**\n   - Cytotoxic edema → 細胞膜功能恢復\n   - Vasogenic edema → BBB 修復\n2. **腦血流恢復**\n   - Cerebral autoregulation 恢復\n   - Reperfusion\n3. **離子平衡**\n   - K⁺、Ca²⁺、Na⁺ 恢復\n4. **Spreading depression 結束**\n5. **神經傳導恢復**(未永久損傷的軸突)\n\n→ 這些都是**可逆**的神經功能抑制解除\n\n### 中期恢復 (Weeks to Months)\n1. **Diaschisis 解除** ★\n2. **Remyelination**\n3. **Neuroplasticity 啟動**\n\n### 晚期恢復 (Months to Years)\n1. **Long-term potentiation (LTP)**\n2. **Synaptogenesis**(新突觸形成)\n3. **Cortical reorganization**\n4. **Axonal sprouting**\n5. **Neurogenesis**(海馬迴、SVZ,有限)\n\n## Diaschisis — (C) 關鍵\n\n### 定義\n- **遠端神經失聯現象**\n- 1914 von Monakow 提出\n- 損傷部位**遠端**的功能區,因**失去神經輸入**而暫時失能\n- **不是該區域受到直接損傷**\n\n### 例子\n- 前額葉損傷 → **對側小腦** blood flow 下降(crossed cerebellar diaschisis)\n- 腦幹損傷 → 兩側皮質抑制\n- 皮質損傷 → 同側丘腦功能下降\n\n### 重要特性\n- **可逆** ★\n- 隨時間恢復(weeks to months)\n- **藥物可調控**:\n  - **Amantadine**(促 DA)\n  - **Dopamine agonists**\n  - **Methylphenidate**\n  - 這些藥物加速 diaschisis 恢復\n\n### (C) 為什麼錯誤?\n- 說「不可逆、無法藥物調控」\n- **完全錯誤**\n- Diaschisis 是可逆的典型現象\n- 藥物治療已證實有效\n\n## 神經傳遞與認知恢復 — (D) 關鍵\n\n### 各系統與功能\n\n| 系統 | 功能 |\n|---|---|\n| **Dopamine (DA)** ★ | **注意力、工作記憶、任務顯著性、動機** |\n| **Norepinephrine (NE)** | 警覺、注意、情緒 |\n| **Acetylcholine (ACh)** | 記憶、學習 |\n| **Serotonin (5-HT)** | 情緒、睡眠 |\n| **Glutamate** | 興奮性、學習 |\n| **GABA** | **抑制性**、焦慮 |\n\n### (D) 為什麼錯誤?\n- 選項說「GABA 系統涉及注意力、任務顯著性、認知」\n- **方向錯誤**:\n  - 注意力 + 任務顯著性 + 工作記憶 = **多巴胺系統**\n  - GABA 是抑制性傳導,不是認知關鍵\n- GABA 確實在 TBI 後可能失調(如痙攣性癲癇)\n- 但**非認知/注意力**主軸\n\n## Norepinephrine 與 TBI — (E) 關鍵\n\n### NE 的角色\n- 由 **locus coeruleus (LC)** 產生\n- 廣泛投射至皮質\n- 調控:\n  - 警覺(arousal)\n  - 注意\n  - 情緒\n  - 交感反應\n\n### TBI 後 NE 變化\n- **早期 NE 大量釋放**(\"NE surge\")\n- 可能有神經保護作用\n- 但也造成心血管不穩定\n\n### NE 藥物在 TBI\n- **NE agonists / reuptake inhibitors**(增加 NE):\n  - Methylphenidate(同時增加 DA, NE)\n  - Atomoxetine\n  - **可能改善認知**\n- **NE antagonists (β-blockers):\n  - Propranolol\n  - 用於**控制躁動、交感風暴**\n  - 但**不是促進神經恢復**\n  - 有些研究顯示可能降低死亡率(急性期)\n\n### (E) 為什麼錯誤?\n- 前半正確:「NE 增加有神經保護」✓\n- **後半錯誤**:「NE 拮抗劑**有助神經恢復**」❌\n- **NE 拮抗劑(β-blocker)主要用於症狀控制,不是促進神經恢復**\n- 某些動物研究顯示 NE 受體拮抗劑**反而損害**神經可塑性和功能恢復\n- Feeney 1982 經典研究:Propranolol 延遲 hemiplegia 恢復\n- 臨床使用 β-blocker 於 TBI 主要為急性期血壓/心率管理,非為恢復\n\n## TBI 恢復影響因素\n\n### 影響恢復的負面因素\n1. **Secondary insults**(hypoxia, hypotension)\n2. **持續發炎**\n3. **ICP 升高**\n4. **Seizures**\n5. **感染**\n6. **電解質異常**\n7. **藥物**:\n   - **Haloperidol**(D2 阻斷、降神經可塑)\n   - **Benzodiazepines**(認知鈍化)\n   - **Phenytoin**(認知影響)\n   - **β-blockers**(部分研究)\n\n### 促進恢復的因素\n1. **避免二次傷害**\n2. **早期復健**\n3. **環境豐富化 (enriched environment)**\n4. **認知復健**\n5. **正確用藥**:\n   - Amantadine\n   - Methylphenidate\n   - 避免 cognitive-impairing drugs\n\n## Neuroplasticity 原則\n\n### 可塑性的 10 原則 (Kleim & Jones 2008)\n\n1. Use it or lose it\n2. Use it and improve it\n3. Specificity\n4. Repetition matters\n5. Intensity matters\n6. Time matters\n7. Salience matters\n8. Age matters\n9. Transference\n10. Interference\n\n## 考點速記\n\n| TBI 恢復機轉 | 時程 | 可逆性 |\n|---|---|---|\n| 腦水腫消退 | 早期 | 可逆 |\n| 腦血流恢復 | 早期 | 可逆 |\n| **Diaschisis 解除** | 數週-月 | **可逆**(藥物可調控) |\n| Remyelination | 月 | 部分 |\n| Neuroplasticity | 月-年 | 長期 |\n| Axonal sprouting | 月 | 新連結 |\n\n| 神經傳導 | 主要功能 | TBI 治療 |\n|---|---|---|\n| **DA** ★ | 注意、工作記憶 | Amantadine, MPH |\n| NE | 警覺 | 慎用拮抗劑 |\n| ACh | 記憶 | Donepezil |\n| GABA | 抑制 | 非認知主軸 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 48 \"Traumatic Brain Injury\"", "url": null },
        { "text": "Sharp DJ et al. Network dysfunction after traumatic brain injury. Nat Rev Neurol 2014;10:156", "url": "https://pubmed.ncbi.nlm.nih.gov/24514870/" },

        { "text": "Kleim JA, Jones TA. Principles of experience-dependent neural plasticity: implications for rehabilitation after brain damage. J Speech Lang Hear Res 2008;51:S225", "url": "https://pubmed.ncbi.nlm.nih.gov/18230848/" },
        { "text": "Brain Trauma Foundation. Guidelines for the Management of Severe Traumatic Brain Injury, 4th ed. Neurosurgery 2017;80:6", "url": "https://pubmed.ncbi.nlm.nih.gov/27654000/" }

      "summary": "(C) 錯誤。**Alkaline phosphatase(ALP)升高雖然是 HO 的有用指標,但「敏感性高、特異性低」**。ALP 升高可見於骨折、肝疾病、骨代謝疾病、生長中的兒童、Paget's disease 等許多情況,**並不特異於 HO**。ALP 主要用於**追蹤 HO 活動度與成熟度**(成熟後 ALP 回到正常),而非診斷特異性工具。",
      "detail": "**TBI 合併異位性骨化 (Heterotopic Ossification, HO)**\n\n## 流行病學 — (A) 正確\n\n### 發生率\n- **TBI**:**11-28%**\n- **重度 TBI**:更高(20-30%)\n- SCI:10-53%\n- Burn:1-3%\n- Total joint arthroplasty:10-20%\n\n### 好發部位 — (E) 正確\n- **髖關節(最常)**:70-90%\n- 膝關節\n- 肩膀\n- 手肘\n- **神經損傷節段以下的大關節**(SCI 中)\n- 肘關節在 TBI 病人也常見\n\n## 病理生理\n\n### 機轉(未完全理解)\n- 軟組織內**間葉細胞分化為成骨細胞**\n- 形成**成熟板狀骨**(lamellar bone)\n- 有 Haversian system\n- 不同於 calcification\n\n### 神經源性因素\n- 不明確,可能涉及:\n  - Sympathetic overdrive\n  - BMPs (Bone Morphogenetic Proteins)\n  - 神經性分泌因子\n  - 微血管改變\n\n## 危險因子 — (B) 正確\n\n### TBI HO 的危險因子\n\n#### 1. **Dysautonomia(自律神經失調)** ★ (B) 關鍵\n- 又稱 **Paroxysmal Sympathetic Hyperactivity (PSH)**\n- Severe TBI 常見\n- 症狀:高血壓、心跳過速、發汗、高溫、posturing\n- **強烈相關於 HO 發生**\n- 機轉可能:交感風暴造成局部組織改變\n\n#### 2. **嚴重 TBI / 長期昏迷**\n#### 3. **痙攣 (spasticity)**\n#### 4. **骨折、脫臼**\n#### 5. **長期臥床、制動**\n#### 6. **壓瘡**\n#### 7. **UTI、感染**\n#### 8. **男性**\n#### 9. **Diffuse axonal injury**\n\n## 臨床表現\n\n### 早期徵象\n- **局部腫脹、紅熱**\n- **ROM 減少**\n- **發燒**(低度)\n- **疼痛**(若有感覺)\n- 通常受傷後 **4-12 週**出現\n\n### 鑑別診斷 (同時發熱 + 紅腫)\n- **DVT**(必須排除!)\n- **蜂窩性組織炎**\n- **化膿性關節炎**\n- **壓瘡感染**\n- **骨折**\n\n### 晚期徵象\n- ROM 漸減少\n- 關節攣縮\n- Ankylosis(關節強直)\n- 影響 ADL、坐姿、照護\n\n## 診斷 — (C)(D) 關鍵\n\n### 1. Alkaline Phosphatase (ALP)\n\n**特性**:\n- **敏感性高、特異性低** ★\n- 早期 HO 可上升\n- 其他原因也會升高:\n  - 骨折\n  - 肝膽疾病\n  - 骨代謝疾病\n  - 兒童生長期\n  - Paget's disease\n  - 懷孕\n- **追蹤治療反應有用**\n- HO 成熟後 ALP 回到正常\n- 升高幅度不等同嚴重度\n\n### (C) 為什麼錯誤?\n\n選項說「ALP 升高是**具高特異性**的診斷工具」\n\n**錯誤原因**:\n- ALP **敏感性高、特異性低**\n- **非特異性**(很多原因都會升高)\n- 是**追蹤**工具,**非診斷**工具\n\n### 2. Bone Scan (Three-phase) — (D) 正確\n\n**敏感性極高** ★\n- **早期偵測**:HO 形成前 **2-4 週**即可陽性\n- 比 X-ray 早 7-10 天\n- 可評估**成熟度**:\n  - Phase 1 (blood flow):活躍期高\n  - Phase 2 (blood pool):活躍期高\n  - Phase 3 (bone):所有階段皆高\n- 成熟時 blood flow 回到正常,但 bone phase 仍高\n\n### 3. X-ray\n- 較晚才能看到 (傷後 3-6 週)\n- 確定診斷用\n- 評估 HO 嚴重度 (Brooker classification)\n- 評估成熟度(皮質界限清楚 = 成熟)\n\n### 4. Ultrasound\n- 早期可看到軟組織變化\n- 較少使用\n\n### 5. MRI\n- 可顯示早期炎症\n- 不作為常規\n\n### 6. CT\n- 手術前評估用\n- 顯示精確範圍\n\n## 治療\n\n### 預防(高風險病人)\n\n#### 1. **Bisphosphonates**\n- **Etidronate**(經典)\n  - 抑制鈣化\n  - 20 mg/kg/day × 2 週 → 10 mg/kg/day × 10 週\n  - 問題:停藥後可能再發\n- **Alendronate**\n\n#### 2. **NSAIDs**\n- **Indomethacin**(25 mg TID × 3-6 週)\n- 預防 HO 有效(術後)\n- 但有出血、腎功能風險\n\n#### 3. **Radiation**\n- 低劑量(500-700 cGy)\n- 術前或術後 72 小時內\n- 主要用於 THA 等術後預防\n\n#### 4. **ROM 運動**\n- 溫和被動 ROM\n- **避免劇烈拉伸**(加重)\n\n### 已發生 HO 的治療\n\n#### 保守\n- ROM 保持(溫和)\n- NSAIDs\n- Bisphosphonates\n- 痙攣控制\n- 物理治療\n\n#### 手術切除\n- **時機**:成熟後(bone scan 活躍度下降、**ALP 正常**)\n  - 通常受傷後 **12-18 個月**\n  - 過早切除復發率極高\n- **適應**:\n  - 嚴重 ROM 限制\n  - 影響 ADL\n  - 神經血管壓迫\n  - 壓瘡風險\n- **術後預防復發**:\n  - NSAIDs\n  - Bisphosphonates\n  - Radiation\n\n## 考點速記\n\n| 項目 | 重點 |\n|---|---|\n| TBI HO 發生率 | 11-28% |\n| **好發部位** | **髖關節** |\n| **危險因子** | Dysautonomia、重度 TBI、spasticity |\n| 發病時間 | 4-12 週 |\n| **ALP 角色** | **敏感高、特異低**(追蹤非診斷) |\n| **Bone scan** | **最早診斷、敏感性極高** |\n| X-ray | 較晚(3-6 週) |\n| 手術時機 | 成熟後(12-18 個月) |\n| 預防 | NSAIDs、Bisphosphonates |",

    "explanation": {
      "summary": "(E) 正確。**硬腦膜上出血(Epidural Hematoma, EDH)的 PTS 風險「相對較低」**,因為 EDH 通常位於硬腦膜與顱骨之間,**不直接接觸皮質**,對皮質損傷較小。相比之下,**皮質挫傷、穿透傷、多次顱內手術** 都直接損傷皮質,PTS 風險顯著更高。精神病史在部分文獻也列為風險因子。",
      "detail": "**Posttraumatic Seizure (PTS) 的危險因子**\n\n## PTS 分類\n\n### 依時間分類\n\n| 分類 | 時間 | 特徵 |\n|---|---|---|\n| **Immediate** | 受傷後 < 24 小時 | 急性反應、非癲癇本質 |\n| **Early** | 受傷後 1-7 天 | 可能反應性、部分發展為癲癇 |\n| **Late (PTE)** | 受傷後 > 7 天 | **真正癲癇**、可持續終生 |\n\n### Posttraumatic Epilepsy (PTE)\n- **Late PTS 稱為 PTE**\n- 反覆、無誘因性癲癇\n- 中度 TBI:**2-20%**\n- 重度 TBI:**10-37%**\n- 主要源於皮質癲癇病灶\n\n## PTS 風險因子 (★ 本題核心)\n\n### 高風險因子\n\n#### 1. **皮質損傷相關** ★ 核心\n- **皮質挫傷(cortical contusion)** — (C) 正確\n- **皮質下血腫**\n- **穿透性腦傷(penetrating injury)** — (D) 正確\n- 腦部異物(彈片)\n\n#### 2. **顱內出血**\n- **硬腦膜下血腫(SDH)**:高風險\n- **Intracerebral hematoma(ICH)**:高風險\n- **硬腦膜上血腫(EDH)**:**相對較低** ★\n\n#### 3. **多次顱內手術** — (B) 正確\n- 每次手術增加皮質損傷\n- 術後癲癇風險\n- 特別**切除血腫、挫傷清除**\n\n#### 4. **嚴重度指標**\n- **GCS < 9**\n- **PTA > 24 小時**\n- **Immediate seizure 史**\n- **Early seizure 史**\n- **Skull fracture**(linear, depressed)\n\n#### 5. **年齡**\n- 雙峰:\n  - < 5 歲(尤其 < 2 歲)\n  - > 65 歲\n\n#### 6. **其他因素**\n- **酗酒史**\n- **精神病史** — (A) 可能相關(證據等級較弱)\n- 家族癲癇史\n- 既往癲癇\n- 腦炎、腦膜炎\n\n## 硬腦膜上 vs 硬腦膜下血腫的 PTS 風險\n\n### Epidural Hematoma (EDH) — (E) 關鍵\n\n**解剖位置**:\n- 硬腦膜**外**(硬腦膜與顱骨之間)\n- 通常**凸透鏡形(lens-shaped)** 於 CT\n- 常由**動脈**(中腦膜動脈)出血\n- 不接觸皮質\n\n**PTS 風險**:\n- **相對較低**\n- 快速清除後 cortex 未受損則復原好\n- 不直接刺激皮質\n\n### Subdural Hematoma (SDH)\n\n**解剖位置**:\n- 硬腦膜**下**(硬腦膜與蛛網膜之間)\n- 新月形(crescent-shaped)\n- **直接接觸皮質**\n\n**PTS 風險**:\n- **較高**\n- 皮質刺激、缺血\n- 合併皮質挫傷常見\n- Chronic SDH 也可致癲癇\n\n## 其他選項分析\n\n### (A) 精神病史\n- 部分研究列為風險因子\n- 證據等級不如結構性損傷強\n- 可能反映:\n  - 神經傳導異常易感\n  - 藥物使用\n  - 癲癇共病\n- **較弱風險因子**,但仍列入考量\n\n### (B) 多次顱內手術\n- **強烈風險因子**\n- 手術切除血腫本身損傷腦組織\n- 皮質疤痕\n- Focal cortical dysfunction\n\n### (C) 皮質挫傷併血腫\n- **最強風險因子之一**\n- 直接皮質損傷\n- 鐵沉積(含鐵血黃素)→ 致癲癇\n- Gliosis 形成癲癇病灶\n\n### (D) 穿透性腦傷\n- **最高風險之一**\n- 殘留異物、骨片\n- 皮質直接撕裂\n- 伴隨感染\n- PTE 率:35-50%(越南戰爭 Feeney 研究)\n\n### (E) 硬腦膜上出血\n- **相對較低風險**\n- 不接觸皮質\n- 快速手術清除後恢復佳\n- **本題答案**\n\n## PTS 預防\n\n### 指引:Brain Trauma Foundation 2017\n\n**適應**(第二級建議):\n- **重度 TBI**(GCS ≤ 8)\n- 預防 **early PTS**(7 天內)\n- **不預防 late PTS**(藥物無助預防 PTE)\n\n### 標準藥物\n\n#### **Phenytoin**\n- 經典標準\n- 7 天內使用\n- 之後停藥\n- Temkin 1990 NEJM:減少 early PTS,不影響 late PTS\n\n#### **Levetiracetam (Keppra)**\n- 現代常用\n- 副作用較少\n- 不需血中濃度監測\n- 證據等級:與 phenytoin 相當\n\n#### 其他\n- Valproic acid\n- Lacosamide\n- 少用於預防\n\n### 治療 PTE\n- Late seizures 發生後治療\n- Levetiracetam、lamotrigine 常用\n- 少數需手術切除病灶\n\n## 考點速記\n\n| PTS 危險因子 | 風險等級 |\n|---|---|\n| **穿透性腦傷** | **極高** |\n| **皮質挫傷** | **高** |\n| **SDH + 挫傷** | **高** |\n| **多次顱內手術** | **高** |\n| Depressed skull fracture | 高 |\n| GCS < 9 | 高 |\n| Early seizure 史 | 高 |\n| 酗酒 | 中 |\n| 精神病史 | 低-中 |\n| **EDH**(單純) | **相對低** ★ |\n\n| 藥物預防 | 適應 |\n|---|---|\n| Phenytoin 或 Levetiracetam | 重度 TBI 7 天內 |\n| 預防 early PTS | ✓ |\n| 預防 late PTS / PTE | ✗(無效) |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 48 \"Traumatic Brain Injury\"", "url": null },
        { "text": "Temkin NR et al. A randomized, double-blind study of phenytoin for the prevention of post-traumatic seizures. N Engl J Med 1990;323:497", "url": "https://pubmed.ncbi.nlm.nih.gov/2115976/" },
        { "text": "Englander J et al. Analyzing risk factors for late posttraumatic seizures: a prospective, multicenter investigation. Arch Phys Med Rehabil 2003;84:365", "url": "https://pubmed.ncbi.nlm.nih.gov/12638104/" },

        { "text": "Salazar AM et al. Epilepsy after penetrating head injury (Vietnam Head Injury Study). Neurology 1985;35:1406", "url": "https://pubmed.ncbi.nlm.nih.gov/3929158/" }

      "summary": "(E) 正確。**使用仰躺(recline)或向後傾斜(tilt)功能時,輪椅整體長度變長,重心改變,轉向半徑增加**—需要更大空間迴轉。其他選項:(A) Tilt-in-space **不改變關節角度**(整體傾斜),不會造成髖過度屈曲;(B) Recline **有助**代償 OH;(C) Tilt **不會**產生 sacral sitting(那是 recline 問題);(D) **需 > 45 度**才有效減壓,20 度不夠。",
      "detail": "**輪椅附加功能 (Wheelchair Accessories)**\n\n## 兩大主要傾斜功能\n\n### 1. Tilt-in-Space (空中傾倒)\n\n**定義**:\n- **整個座椅單元一起向後傾**\n- **髖、膝、踝關節角度不變**\n- 像在空中「翻」整張椅子\n\n**優點**:\n- **保持良好姿勢**\n- 維持關節角度穩定\n- 不會產生 sacral sitting\n- 不會造成壓力/剪力變化於椎管\n- 姿勢固定的病人較適合\n\n**減壓需求**:\n- **≥ 45° 才有效減壓** ★\n- 20-30° 效果不明顯\n- **與 recline 合併使用效果更好**\n\n**適合**:\n- 嚴重姿勢問題病人\n- 需頻繁減壓者\n- 需避免剪力者\n- 無法配合主動減壓的病人\n\n### 2. Recline (仰躺)\n\n**定義**:\n- **只有椅背向後倒**\n- **髖關節角度改變**(增加)\n- 膝、踝不變\n- 像躺椅\n\n**優點**:\n- **代償姿勢性低血壓(OH)** ★\n- 導尿、換藥、餐後方便\n- 休息、小睡\n- 舒展筋骨\n\n**缺點** ★ 重要:\n- **Sacral sitting 問題**:\n  - 躺回來時病人**臀部向前滑**\n  - **薦部(sacrum)受壓增加**\n  - **剪力(shear force)增加**\n  - **壓瘡風險** ★\n- 若無良好姿勢支撐,會滑下椅\n\n**減壓需求**:\n- **需 ≥ 120° 椅背才有效減壓**\n- 小角度 recline 效果有限\n\n**適合**:\n- **姿勢性低血壓病人** ★\n- 需導尿、排便者\n- 長時間使用者需休息\n\n## 各選項分析\n\n### (A) Tilt-in-space 會造成髖過度屈曲? — 錯誤\n- **不會**\n- Tilt 整個座椅一起傾\n- 髖關節角度**不變**\n- 這是 tilt 比 recline 的優勢之一\n\n### (B) Recline 對 OH 無幫助? — 錯誤\n- **有幫助** ★\n- Recline 到 120° 以上可\n- 改善靜脈回流\n- 代償 SCI、DM 等自主神經失調\n- **是 OH 病人重要處方**\n\n### (C) Tilt 造成 sacral sitting? — 錯誤\n- **Tilt 不會造成 sacral sitting**\n- **Recline 才會** ★(髖角改變 → 滑動)\n- 把 tilt 和 recline 的缺點搞混\n\n### (D) 20 度減壓足夠? — 錯誤\n- **需 ≥ 45 度** ★\n- 20 度效果不明顯\n- 研究:\n  - Tilt 25°:減壓有限\n  - Tilt 45°:顯著減壓\n  - Tilt 55-65°:最大效益\n- 合併 recline 更好\n\n### (E) 增加轉向半徑? ★ 正確\n- **仰躺或傾斜時**:\n  - 輪椅整體**變長**\n  - **重心後移**\n  - **轉向半徑增加**\n- 狹窄空間(廁所、電梯)需考慮\n- 電動輪椅移動前需收回傾斜角度\n\n## 其他輪椅附加功能\n\n### 1. Elevating Legrests (抬腿板)\n- 可抬高下肢\n- 適合:\n  - 水腫\n  - 關節疼痛\n  - DVT 預防\n- 不建議長期固定抬高(影響坐姿、結構)\n\n### 2. Elevating Seat (升降座椅)\n- 座椅高度可調\n- 接觸高處、社交互動\n- 伸手取物\n- 改善自尊\n\n### 3. Standing Wheelchair\n- 協助站立姿勢\n- 心理、生理效益\n- 減少骨質流失\n- 改善血液循環、腎功能\n\n### 4. Power Seat Functions\n- 電動 tilt, recline, leg elevation\n- 由輪椅控制器操作\n- 獨立使用\n\n## 輪椅處方 — 減壓策略\n\n### 常規減壓(重要!)\n- **每 15-30 分鐘**\n- 方法:\n  - Push-up (上肢撐起)\n  - Lean forward\n  - Lean side-to-side\n  - Power tilt/recline\n\n### 減壓建議角度\n- **Tilt ≥ 45°**\n- **Recline ≥ 120°**\n- **持續 2-3 分鐘**\n- **合併使用最佳**\n\n## 考點速記\n\n| 功能 | 定義 | 優點 | 缺點 |\n|---|---|---|---|\n| **Tilt-in-space** | 整體傾斜、關節不變 | **無 sacral sitting**、減壓 | 需大空間 |\n| **Recline** | 椅背後倒、髖角變 | **代償 OH** | **Sacral sitting 風險** |\n| **合併兩者** | 雙重效果 | 最佳減壓 + OH | 最複雜設備 |\n\n| 減壓角度 | 效益 |\n|---|---|\n| Tilt 20-30° | 效果有限 |\n| **Tilt ≥ 45°** | **顯著減壓** |\n| **Recline ≥ 120°** | **有效減壓 + OH** |\n| 20° tilt ❌ | 不足 |",

      "detail": "**輪椅處方 — 手動輪椅 (Manual Wheelchair Prescription)**\n\n## 尺寸測量標準 (★ 考點)\n\n### 1. Seat Width (座椅寬度)\n- **測量髖部最寬處(通常大轉子或大腿)**\n- **加 2 inch (5 cm)**\n- **兩側各 1 inch 餘裕**\n\n**過寬的問題** — (E) 正確\n- 推進時**肩膀過度外展**\n- 肩部夾擠、勞損\n- 體位不穩定\n- 無法通過狹窄處\n\n**過窄的問題**:\n- 大轉子壓力\n- 皮膚破損\n- 坐姿不舒適\n\n### 2. Seat Depth (座椅深度) — (D) 本題關鍵\n\n**測量方法**:\n- 從椅背量到膝後(膕窩)\n- **前緣應距膕窩 2-3 指(約 2 inch / 5 cm)**\n\n**過長的問題** ★:\n- **壓迫膕窩神經血管束**:\n  - 腓總神經壓迫 → 足下垂\n  - 膕動靜脈壓迫 → 下肢水腫\n- **限制膝關節屈曲**\n- **產生剪力**(病人往前滑)\n- **壓瘡風險**\n\n**過短的問題**:\n- **大腿支撐不足**\n- **坐骨結節壓力集中**\n- **壓瘡風險**\n- 姿勢不穩\n\n### (D) 為什麼錯誤?\n- 選項說「**緊靠膕窩**」\n- 正確是「**貼近但保留 2-3 指距離**」\n- 緊靠會壓迫神經血管、限制動作\n\n### 3. Seat Height (座椅高度)\n- 允許踩踏腳踏時,膝膕窩距座椅 2 inch\n- 腳踏距離地面 ≥ 2 inch\n- 上肢推動輪圈時,肘 100-120° 屈曲\n\n### 4. Backrest Height (椅背高度)\n- **依損傷層級**:\n  - Tetraplegia(高位):**高椅背**(肩胛下緣)\n  - Paraplegia(低位):**低椅背**(腋下 2-3 inch)\n  - 軀幹控制好者:**低椅背**(髂嵴)\n- 本題病人(高位胸髓):低-中椅背(T1-T6 軀幹穩定性有差)\n- 更低的椅背利於上肢運動,但需足夠軀幹控制\n\n### 5. Armrest Height (扶手高度)\n- 肘 90° 屈曲時貼合\n- 過高:肩聳起、頸痛\n- 過低:軀幹前傾\n\n## 輪椅配件\n\n### 1. Anti-tipper (防傾桿) — (A)(B) 正確\n\n**功能**:\n- 防止輪椅**向後翻倒**\n- 增加安全性\n\n**適用**:\n- **初學者** ★ (A) 正確\n- **截肢病人**(下肢缺失、重心後移)\n- **輪軸前移的病人**(不穩定)\n\n**缺點**:\n- **無法做 wheelies 技巧**(前輪抬起)\n- 上下人行道困難\n\n**改良**:\n- **Flip-up anti-tipper** — (B) 正確\n  - 需要時向上翻起\n  - 做 wheelies 時不阻礙\n  - 常用於中階使用者\n\n### 2. Push Rims (手推輪圈) — (C) 正確\n\n**材質**:\n- **鋁製**(最常)\n- **塑膠**\n- **鈦**(輕量)\n- 適合手部功能正常\n\n**特殊輪圈**:\n- **Vinyl-coated**(乙烯塗層):\n  - 增加摩擦\n  - 適合抓握差者\n- **Projections**(突起):\n  - 類似旋鈕\n  - 用前臂或掌背推進\n  - 適合 **tetraplegia** 手指功能差者\n- **Quad grip**\n- **Palm guards**\n\n### 3. Wheels (主輪)\n- 20-26 inch 直徑\n- 手動:大多 24 inch\n- 材質:鋼、鋁、複合材質\n\n### 4. Casters (前導輪)\n- 3-8 inch\n- 大 caster:戶外、跨越障礙\n- 小 caster:室內、靈活\n\n### 5. Tires (輪胎)\n- **Pneumatic**(充氣):吸震好,需保養\n- **Solid**(實心):免充氣,震動大\n- **Foam filled**:折衷\n\n## 輪軸位置\n\n### 輪軸前移 (Forward Axle)\n- 優點:\n  - 較少推進能量\n  - 較少肩部勞損\n  - 迴轉靈活\n- 缺點:\n  - **後翻風險↑**\n  - 穩定性↓\n  - 新手不適\n\n### 輪軸後移 (Backward Axle)\n- 優點:\n  - **穩定性↑**\n  - 適合新手\n- 缺點:\n  - 推進效率低\n  - 上肢勞損多\n\n### 輪軸上移\n- 推進效率提升\n- **肩夾擠風險↑**\n\n### 輪軸下移\n- 肩較舒適\n- 推進吃力\n\n## 高位胸髓 SCI 特殊考量\n\n### T1-T6 損傷\n- **軀幹控制部分有限**\n- 需中等椅背支撐\n- 平衡訓練重要\n\n### T7 以下\n- 軀幹控制完好\n- 可用較低椅背\n- 上肢運動受限少\n\n## 輪椅使用訓練 (Wheelchair Skills)\n\n- **Wheelies** (前輪抬起):\n  - 上下人行道\n  - 跨越小障礙\n  - 需練習平衡\n- 轉位訓練\n- 單手操作(特殊情況)\n- 坡道上下\n- 越野操作\n\n## 考點速記\n\n| 尺寸 | 測量標準 |\n|---|---|\n| **座椅寬度** | 髖最寬 + 2 inch |\n| **座椅深度** | **膕窩前 2-3 指(2 inch)** ★ |\n| **座椅高度** | 膝屈曲足踏地、肘 100-120° |\n| 椅背高度 | 依軀幹功能調整 |\n\n| 配件 | 適合 |\n|---|---|\n| Anti-tipper | 初學者、下肢截肢 |\n| Flip-up anti-tipper | 想做 wheelies 者 |\n| Vinyl-coated rims | 手抓握差 |\n| Projections | 手指功能極差 |",

      "summary": "(D) 錯誤。**「非比例式控制(non-proportional)」指的是開關式控制—只有「開/關」、「最大速度/停止」,方向也是固定選項(前/後/左/右)**,無法連續調整速度與方向。**「比例式控制(proportional)」才能依搖桿偏移量即時調整速度與方向**(搖桿越斜越快)。選項把兩者定義顛倒。",
      "detail": "**電動輪椅 (Power Wheelchair)**\n\n## 驅動型態分類 (★ 考點)\n\n### 1. 後輪驅動 (Rear-Wheel Drive, RWD) — (A) 正確\n\n**特徵**:\n- 傳統型\n- 主輪在後,caster 在前\n\n**優點**:\n- **直線穩定性好**\n- 高速時穩定\n- 適合戶外長距離\n- 轉向預測性佳\n\n**缺點**:\n- **前方小 caster 難跨障礙** ★\n- **轉向半徑大**\n- 無法原地迴轉\n\n### 2. 前輪驅動 (Front-Wheel Drive, FWD) — (B) 正確\n\n**特徵**:\n- 主驅動輪在前\n- caster 在後\n\n**優點**:\n- **跨越障礙物能力強**\n- 轉向半徑較小\n- 適合狹窄空間\n\n**缺點**:\n- **高速時後方 caster 易擺動(fishtailing)** ★\n- 不穩定\n- 不適長距離戶外\n\n### 3. 中輪驅動 (Mid-Wheel Drive, MWD) — (C) 正確\n\n**特徵**:\n- 6 輪(4 caster + 2 主輪)\n- 主輪在中央\n- 前後各有 caster\n\n**優點**:\n- **迴轉半徑最小** ★\n- 適合狹窄空間(室內首選)\n- 前後都能跨障礙\n\n**缺點**:\n- **不平地面** → **前後 caster 懸空時主輪失去接觸**\n- 高低起伏路面易 \"高中心化\"\n- 戶外崎嶇不適合\n\n## 控制方式\n\n### 1. Proportional Control(比例式控制)\n\n**定義**:\n- **搖桿偏移量 ∝ 速度**\n- **搖桿方向 = 行駛方向**\n- 連續可調\n\n**優點**:\n- **精準控制速度與方向** ★\n- 使用感受像駕駛車輛\n- 適合手部功能佳者\n\n### 2. Non-proportional Control(非比例式控制)\n\n**定義**:\n- **開關式(on/off)**\n- **固定速度**(最大)\n- **固定方向**(前/後/左/右 四選項)\n- 像搖控器\n\n**使用方式**:\n- Sip-and-puff(吸吹控制)\n- Chin switch\n- Head array\n- Button switches\n- 適合**嚴重肢體障礙**(如 C1-C4 SCI)\n\n**缺點**:\n- **無法隨時調整速度** ★\n- 方向切換突兀\n- 學習曲線\n\n### (D) 為什麼錯誤?\n\n選項說「非比例式控制的好處在於**可隨時調整方向和速度**」\n\n**錯誤原因**:\n- **完全相反** ★\n- **非比例式 = 固定速度、固定方向選項**\n- **比例式才能隨時調整**\n- 定義顛倒\n\n## 替代控制器 (Alternative Access)\n\n### 1. **Chin-Control Joystick(下巴操作)** — (E) 正確\n- 下巴操作搖桿\n- 適合:手部功能差、軀幹控制好\n- **容易導致頸部肌張力增加** ★\n- 長期使用頸部勞損\n\n### 2. **Sip-and-Puff**\n- 吸(前進)、吹(後退)\n- 不同強度變化方向\n- 適合 C1-C4 SCI\n- 需要足夠呼吸功能\n\n### 3. **Head Array**\n- 3-5 個感應器於頭枕\n- 頭部動作控制\n- 需頸部控制\n\n### 4. **Eye Gaze**\n- 眼球追蹤\n- 極嚴重障礙\n- 高科技\n\n### 5. **Voice Control**\n- 語音指令\n- 需清晰語言\n\n### 6. **Switch Control**\n- 身體任何可控制部位\n- 手指、腳、膝、臉頰\n\n## 電動輪椅附加功能\n\n### 1. Power Seat Functions\n- 電動 tilt\n- 電動 recline\n- 電動 leg elevation\n- 電動升降座椅\n- 電動站立\n\n### 2. 連接輔助溝通設備 (AAC)\n- IR 控制\n- 藍芽\n- 電腦整合\n\n### 3. Environmental Control\n- 控制家電、燈光、電視\n\n## 電動輪椅選擇考量\n\n### 病人因素\n- 診斷、預後\n- 功能、認知\n- 視力\n- 控制能力\n- 生活環境\n\n### 環境因素\n- 室內 vs 戶外\n- 地面、地形\n- 門寬、電梯\n- 交通工具\n\n### 使用目的\n- ADL 為主\n- 職業、學業\n- 社交、休閒\n\n## 考點速記\n\n| 驅動 | 優點 | 缺點 | 適合 |\n|---|---|---|---|\n| **RWD** | 直線穩定 | 跨障礙差、迴轉大 | 戶外 |\n| **FWD** | 跨障礙好 | 高速 fishtailing | 中等 |\n| **MWD** | **迴轉小** | 崎嶇地懸空 | **室內** |\n\n| 控制 | 特性 | 適合 |\n|---|---|---|\n| **Proportional** | **連續控制** | 手功能正常 |\n| **Non-proportional** | **開關式** | 嚴重障礙 |\n\n| 替代控制器 | 適合 |\n|---|---|\n| Chin joystick | 手差、頸好 |\n| Sip-and-puff | C1-C4 SCI |\n| Head array | 頸控制正常 |\n| Eye gaze | 極嚴重障礙 |",

      "detail": "**兒童輪椅設計 (Pediatric Wheelchair Design)**\n\n## 兒童輪椅的特殊考量\n\n### 與成人的差異\n- **成長變化**:尺寸需可調整\n- **發展需求**:促進認知、社交\n- **學習經驗**:遊戲、探索\n- **家庭整合**:家人協作\n- **學校環境**:教室、校車\n- **耐用度 vs 輕量**:兒童力氣小\n\n## 早期電動移動 (Early Powered Mobility) — (C) 核心\n\n### 處方時機\n- **12-18 個月** ★\n- 相當於正常兒童自主移動的年齡\n- 不是等到 3-5 歲才考慮\n\n### 為什麼要早?\n\n#### 自主移動對發展的影響\n- 正常兒童 **9-12 個月**開始爬行\n- **12-15 個月**開始行走\n- 自主移動帶來:\n  - **認知發展**(空間、因果)\n  - **語言發展**(主動溝通)\n  - **社交發展**(互動)\n  - **自我概念**(自主感)\n  - **視覺-空間整合**\n  - **身體圖式**\n\n#### 被動移動兒童的風險\n- **Learned helplessness**(習得無助)\n- 發展遲緩加重\n- 認知、語言較差\n- 社交退縮\n- 依賴照顧者\n\n### 早期電動移動的證據\n- **Butler 1986** 經典研究:1.5-3 歲電動輪椅可行\n- **Jones 2012**:可早至 12 個月\n- **Home 2019**:認知、語言、社交均改善\n- AAP 與 APTA 建議早期處方\n\n### 處方要求\n- **視覺功能足夠**\n- **認知理解基本因果關係**\n- **能執行安全指令**\n- **控制搖桿或替代控制**\n- **家長支持**\n\n### 設備選擇\n- **Ride-on toys**(玩具車型)\n- **小型電動輪椅**\n- **Go Baby Go**(改造電動玩具車)\n- 模擬環境訓練\n\n## 其他選項分析\n\n### (A) 配件越少越好? — 錯誤\n\n**正確觀念**:\n- **姿勢支撐配件要「足夠」但不「過度」**\n- 目標:\n  - 維持中立姿勢\n  - 預防畸形(scoliosis, hip dysplasia)\n  - 促進功能\n- 不足的支撐:\n  - 畸形加重\n  - 疲勞\n  - 無法使用雙手(要維持姿勢)\n- 過度支撐:\n  - 限制動作\n  - 依賴性\n\n**常見配件**(依需要使用):\n- 頭枕\n- 軀幹側支撐 (lateral supports)\n- 髖 adductor/abductor pads\n- Lap belt / chest strap\n- 腳踝固定帶\n- Pommel(防髖內收)\n\n### (B) 用現成模組化避免依賴客製化? — 錯誤\n\n**正確觀念**:\n- **嚴重姿勢異常 → 客製化系統**\n- **輕度 → 模組化(可調整)**\n- **不是「為了避免依賴而用不合適的」**\n- 不當座椅會:\n  - 加重畸形\n  - 引起壓瘡\n  - 影響呼吸、消化\n\n**選擇依據**:\n- 病情嚴重度\n- 成長需求(可調整性)\n- 預後\n- 經濟考量\n\n### (D) 鼓勵行走不依賴電動輪椅? — 錯誤(表述過於絕對)\n\n**現代觀念**:\n- **行走能力 + 電動輪椅並非二擇一**\n- 部分行走能力的兒童:\n  - 短距離走路\n  - 長距離用電動輪椅\n  - 擴大參與度\n  - 減少疲勞、能量消耗\n  - 保留能量用於重要活動\n- 稱為 **\"Mobility Continuum\"**(移動連續譜)\n\n**過度鼓勵走路的問題**:\n- 疲勞累積\n- 社交受限(跟不上同齡)\n- 放棄活動\n- 關節損傷(CP 兒童特別)\n- 心理挫折\n\n### (E) 極輕量輪椅不適合兒童? — 錯誤\n\n**正確觀念**:\n- **極輕量(ultra-lightweight)輪椅適合兒童** ★\n- 兒童力氣小 → 需要越輕越好\n- 鈦、鋁合金、碳纖維\n- 推行省力\n- 減少上肢過度使用\n- **不會因此容易翻覆**(設計考量平衡)\n- 實際上輕量**降低**上肢傷害風險\n\n**兒童輪椅重量建議**:\n- < 9 kg (ultralight)\n- < 13 kg (lightweight)\n\n## 兒童輪椅處方原則\n\n### 1. 成長彈性\n- **可調整尺寸**(座椅寬度、深度、腿長)\n- **椅背高度可調**\n- **腳踏可調**\n- 每 6-12 個月重新評估\n\n### 2. 耐用度\n- 兒童使用粗暴\n- 需堅固\n- 易維修\n\n### 3. 外觀\n- **顏色選擇**(兒童喜好)\n- 貼紙、裝飾\n- 增加自我認同\n- 減少 stigma\n\n### 4. 社會心理\n- 與同齡整合\n- 校車、娛樂場所\n- 家庭旅行\n\n## 常見兒童診斷與輪椅選擇\n\n### 腦性麻痺 (CP)\n- **GMFCS 分級指引**\n- Level I-II:可能不需輪椅,或輔助型\n- Level III:手動輪椅 + 行走\n- Level IV-V:**電動輪椅**為主\n\n### Duchenne MD\n- 行走階段:無輪椅\n- **10-12 歲開始電動輪椅**\n- 保留能量\n- 延長功能\n\n### Spina Bifida\n- Thoracic:早期電動\n- L1-L3:手動或電動\n- L4 以下:手動 + AFO\n\n### 脊髓肌萎縮症 (SMA)\n- SMA Type I:極早期支持\n- SMA Type II:**早期電動**\n- SMA Type III:部分需求\n\n## 考點速記\n\n| 兒童輪椅原則 | 重點 |\n|---|---|\n| **早期電動移動** | **12-18 個月即可** ★ |\n| 姿勢配件 | **足夠但不過度** |\n| 嚴重姿勢問題 | **客製化**優於現成 |\n| 能走 + 電動輪椅 | **並非二擇一** |\n| 極輕量輪椅 | **適合**兒童 |\n| 可成長調整 | 關鍵 |",

        { "text": "Livingstone R, Paleg G. Practice considerations for the introduction and use of power mobility for children. Dev Med Child Neurol 2014;56:210", "url": "https://pubmed.ncbi.nlm.nih.gov/23998402/" }

      "summary": "(C) 錯誤。**四點式固定系統雖然是最常用且最安全的方法,但「使用繁瑣耗時」而非「簡易省時」**—需要專業人員安裝四條綁帶、每條都要正確角度、固定於輪椅結構強點、綁緊。每次上下車都要重新安裝,可能需要 **5-10 分鐘**。強調「簡易省時」的是 **docking system**(對接系統,獨立使用)。",
      "detail": "**輪椅運輸 (Wheelchair Transportation)**\n\n## 進出交通工具的輔具\n\n### 1. Ramp (斜坡)\n\n**特性**:\n- 成本低\n- 折疊式或固定式\n- 需要推行能力\n- 角度標準 **1:12** (WCAG)\n\n**適合**:\n- **有推行能力者**\n- 輕型手動輪椅\n- 中小型車輛\n- 經濟考量\n\n**缺點**:\n- 陡坡上下吃力\n- 高地板車輛不適合\n- 需人力協助可能\n\n### 2. Lift (升降系統)\n\n**特性**:\n- 垂直升降\n- 承重大(電動輪椅)\n- 成本高\n\n**類型**:\n\n#### (a) Platform Lift(平台式)\n- 最常見\n- 從車門升降\n- 佔車內空間\n\n#### (b) **Overhead Strap Lift(懸吊式)** — (B) 正確\n- 車頂軌道 + 吊帶\n- **節省車內空間** ★\n- 適合大型車輛\n\n#### (c) Rotary Lift\n- 旋轉式\n- 小型車輛\n\n**適合**:\n- 電動輪椅\n- 無法獨立推行者\n- 商用車輛(校車、復康巴士)\n\n## 輪椅固定系統 (Wheelchair Tie-Downs)\n\n### 必要性\n- **預防碰撞時輪椅移動**\n- 保護乘客安全\n- 法規要求(ADA、WC19 標準)\n\n## 1. **Four-Point Tie-Down System (四點式)** — (C)(D) 關鍵\n\n### 標準規格\n- **4 條綁帶**\n- **固定於輪椅結構強點**(非配件)\n- **固定於車輛地板錨點**\n\n### 角度規範 (SAE J2249) — (D) 正確\n\n| 綁帶位置 | 水平角度 |\n|---|---|\n| **後方綁帶 (Rear)** | **30-45 度** |\n| **前方綁帶 (Front)** | **40-60 度** |\n\n### 優點\n- **最高安全性** ★\n- 經過 30 mph 正面撞擊測試\n- WC18/WC19 認證\n- 標準化\n\n### 缺點 ★ (C) 本題關鍵\n- **使用繁瑣、耗時**\n- 需要駕駛/照顧者安裝\n- 每次 5-10 分鐘\n- 需訓練\n- **非「簡易省時」**\n\n### (C) 為什麼錯誤?\n\n選項說「四點式...**使用簡易省時**」\n\n**錯誤原因**:\n- 四點式是**最安全但最繁瑣**\n- 需人員協助安裝\n- 每趟都重新安裝\n- 不是「簡易」也不是「省時」\n\n## 2. Docking System (對接系統) — (E) 正確\n\n### 原理\n- 輪椅底部有**對接介面**\n- 車輛地板有**對接點**\n- 輪椅駛入後**自動鎖定**\n\n### 優點 ★\n- **獨立使用**(不需協助)\n- **快速**(數秒)\n- **適合自駕者**\n- 每次上下車方便\n\n### 缺點\n- 需特殊輪椅(有對接介面)\n- 設備昂貴\n- 較少車輛設置\n\n### 代表系統\n- **EZ Lock**\n- **Q'Straint**\n- **Permobil docking**\n\n## 3. Seat Belt (安全帶)\n\n### 雙重要求\n- **Lap belt**(腰部)\n- **Shoulder belt**(肩部)\n- 與輪椅固定系統**分開**\n- 直接固定於車輛結構\n- 保護乘客本身\n\n## 4. WC19 認證輪椅\n\n**ANSI/RESNA WC19 標準**:\n- 通過 30 mph 正面撞擊測試\n- 有標準化 tie-down 點\n- 標示清楚\n- 保護乘客安全\n\n**WC20**:座椅系統(separate from frame)\n\n## 進階運輸選項\n\n### 1. 復康巴士 (Accessible Bus/Van)\n- 低地板(kneeling feature)\n- Ramp 或 lift\n- 固定系統\n- 大眾交通\n\n### 2. Wheelchair Accessible Vehicles (WAV)\n- 私人改裝車\n- 降低地板\n- 側門或後門斜坡\n\n### 3. 航空運輸\n- 輪椅需鋰電池規範\n- 地勤協助轉移至機上座位\n- 電動輪椅需 declaration\n\n### 4. 火車、捷運\n- 台灣高鐵、台鐵有無障礙空間\n- 捷運有升降設備\n- 需預約\n\n## 台灣相關規範\n\n- 《身心障礙者權益保障法》\n- 交通部復康巴士補助\n- 各縣市身障交通接送\n- 專用停車位規範\n\n## 考點速記\n\n| 運輸設備 | 特色 |\n|---|---|\n| Ramp | 便宜、需推行能力 |\n| Platform Lift | 最常見 |\n| **Overhead Strap Lift** | **省車內空間** |\n| Rotary Lift | 小型車 |\n\n| 固定系統 | 優缺 |\n|---|---|\n| **4-Point Tie-Down** | **最安全,但繁瑣耗時** ★ |\n| **Docking System** | **獨立、快速、省時** |\n| Seat belt | 必備、保護乘客 |\n\n| 4-Point 角度 | 水平 |\n|---|---|\n| **後方綁帶** | **30-45°** |\n| **前方綁帶** | **40-60°** |",

    "explanation": {
      "summary": "(B) 錯誤。**輪軸往後移提供更高穩定性,但會減少後翻覆風險,不是「增加」**。後翻覆發生於重心偏在輪軸**前方**時(輪軸前移)。輪軸後移**後翻覆風險降低、但上坡推進效率下降、肩部更費力**。選項把穩定性改善的方向和後翻覆風險的方向搞混。",
      "detail": "**輪軸位置 (Axle Position)**\n\n## 基本原理\n\n### 輪軸與重心的關係\n- **輪椅重心 vs 主輪軸位置**決定穩定性與推進效率\n- 重心前移於輪軸:後翻覆\n- 重心後移於輪軸:前翻覆(少見)\n- 平衡點:理想位置\n\n## 輪軸前移 (Forward Axle Position)\n\n### 效應\n- 使用者重心**相對於軸往後**\n- 主輪離使用者更近\n\n### 優點\n- **推進效率↑**\n  - 更短的手推路徑\n  - 更直接用力\n  - 減少推動次數\n- **迴轉半徑小**(更靈活)\n- **上肢運動範圍較佳**\n- **省力**\n\n### 缺點\n- **後翻覆風險↑** ★\n- **穩定性↓**\n- 新手不適應\n\n### 適合\n- 有經驗的使用者\n- 運動型輪椅\n- 主動生活型態\n- 需較多肩部保健\n\n## 輪軸後移 (Backward Axle Position) — (B) 關鍵\n\n### 效應\n- 使用者重心**相對於軸往前**\n- 主輪離使用者較遠\n\n### 優點\n- **穩定性↑** ★\n- **後翻覆風險↓** ★(重要!)\n- 適合新手\n- 適合需要穩定的病人\n\n### 缺點\n- **推進效率↓**\n- 每推一次距離短\n- **肩部勞損↑**(需更多推動)\n- 迴轉半徑大\n- 慢性上肢損傷風險\n\n### (B) 為什麼錯誤?\n\n選項說「輪軸後移...**增加上坡時後傾翻覆的危險**」\n\n**錯誤原因**:\n- 輪軸後移 → **減少**後翻覆風險(重心相對前移)\n- 真正增加後翻覆的是**輪軸前移** ★\n- 方向完全顛倒\n\n**上坡時的狀況**:\n- 上坡本身會增加後翻覆風險(不論軸位置)\n- 但**輪軸後移**反而**降低**此風險(穩定性較好)\n- 選項說法錯誤\n\n## 輪軸上移 (Upward Axle) — (A) 正確\n\n### 效應\n- 使用者相對於輪軸較低\n- 肘角度變大(推進時)\n\n### 優點\n- **推進效率↑**\n\n### 缺點\n- **肩部夾擠症候群 (shoulder impingement)↑** ★\n- 肩關節過度上舉\n- 慢性肩部疼痛\n- Rotator cuff 傷害\n\n## 輪軸下移 (Downward Axle)\n\n### 效應\n- 使用者相對較高\n- 肘角度變小\n\n### 優點\n- 肩部較舒適\n- 減少過度上舉\n\n### 缺點\n- 推進吃力\n- 效率下降\n\n## 理想輪軸位置\n\n### 推進時的理想肘角\n- **100-120° 肘屈曲**\n- 手放在輪圈**最高點**時\n- 此時最省力\n\n### 前後位置建議\n- **使用者手放正中時**\n- **肩關節垂直於輪軸**\n- 或**輪軸稍前於肩關節**\n- **手指尖可觸及輪軸下方**\n\n## 輪軸前移與座位後移的類比 — (D) 正確\n\n### 兩者效應相似\n- **輪軸前移**:軸往前 → 使用者相對軸後\n- **座位後移**:使用者往後 → 相對軸前\n- **都增加後翻覆風險**\n\n### 為什麼?\n- 相對位置是關鍵\n- 重心在輪軸**前方** → 後翻覆\n- 兩種調整都將重心相對往前\n\n## Anti-tipper (防傾桿) — (C) 正確\n\n### 功能\n- 防止後翻覆\n- 安全輔助\n\n### 用於\n- **輪軸前移者**\n- 新手\n- 下肢截肢\n- 平衡差\n\n### 缺點\n- 無法做 wheelies\n- 上下人行道困難\n- 越野受限\n- 可用 flip-up 型改善\n\n## 雙側下肢截肢 — (E) 正確\n\n### 問題\n- 失去下肢重量\n- **重心前移**\n- **後翻覆風險↑**\n\n### 解決\n- **輪軸後移** ★\n- 重新平衡重心\n- 增加穩定性\n\n### 副作用\n- **推進效率下降**\n- **上肢使用增加**\n- **上肢勞損↑**\n- 需預防 shoulder, wrist injuries\n\n## 輪軸調整對肩部的影響\n\n### Shoulder Injury Prevention\n\n**High Risk Axle Positions**:\n- 輪軸**太上**:shoulder impingement\n- 輪軸**太後**:excessive shoulder reach\n- **太低**:wrist extension extreme\n\n**Consortium for Spinal Cord Medicine 建議**:\n- 輪軸位置適中\n- 使用效率最佳\n- 預防長期肩部傷害\n\n## 特殊族群考量\n\n### SCI 病人\n- 長期使用輪椅 30+ 年\n- 保護上肢功能至關重要\n- **輪軸位置 = 預防退休性肩痛**\n\n### 運動型輪椅使用者\n- 輪軸位置常前移\n- 最大推進效率\n- 但需肩部保健\n\n### 老年 / 新手\n- 輪軸稍後移\n- 重視穩定\n- 加 anti-tippers\n\n## 考點速記\n\n| 輪軸位置 | 推進效率 | 穩定性 | 後翻覆風險 |\n|---|---|---|---|\n| **前移** | **高** | **低** | **高** |\n| **後移** | **低** | **高** | **低** ★ |\n| 上移 | 高 | 中 | 中(夾擠) |\n| 下移 | 低 | 中 | 中 |\n\n| 情境 | 建議 |\n|---|---|\n| 新手 | 後移 + anti-tipper |\n| 有經驗使用者 | 稍前移 |\n| 運動型 | 前移 |\n| **雙下肢截肢** | **後移** |\n| 肩部問題 | 避免太上 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 15 \"Wheelchair and Seating Systems\"", "url": null },
        { "text": "Boninger ML et al. Wheelchair axle position: influence on propulsion biomechanics. Arch Phys Med Rehabil 2000;81:608", "url": "https://pubmed.ncbi.nlm.nih.gov/10807100/" },
        { "text": "Consortium for Spinal Cord Medicine. Preservation of upper limb function following spinal cord injury: a clinical practice guideline. J Spinal Cord Med 2005;28:434", "url": "https://pubmed.ncbi.nlm.nih.gov/16869091/" },
        { "text": "Cowan RE et al. Impact of surface type, wheelchair weight, and axle position on wheelchair propulsion by novice older adults. Arch Phys Med Rehabil 2009;90:1076", "url": "https://pubmed.ncbi.nlm.nih.gov/19463777/" }
      ]
    }
  }

    "question": "下列有關選用電動輪椅動力底座 (power base) 之敘述,何者最正確?",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "室內使用時,應選擇大於 12 吋的驅動輪,轉向的靈敏度較高" },
      { "key": "B", "text": "前輪驅動型的動力底座是戶外活躍型電動輪椅的主流" },
      { "key": "C", "text": "迴轉半徑大小排序為後輪驅動 > 中輪驅動 > 前輪驅動" },
      { "key": "D", "text": "前輪驅動輪椅在高速行駛時容易出現甩尾 (fishtailing) 的情形" },

      "summary": "(D) 正確。**前輪驅動(FWD)輪椅高速時容易 fishtailing(甩尾)** — 因為主驅動輪在前,後方 caster 在高速時會左右不穩定擺動。其他選項:(A) 室內應選**較小**的驅動輪(更靈活);(B) 戶外主流是**後輪驅動(RWD)**(穩定、直線性好);(C) 迴轉半徑排序 **RWD > FWD > MWD**(MWD 最小);(E) 後輪驅動穩定度佳但**跨越障礙物較差**(前方 caster 小)。",
      "detail": "**電動輪椅動力底座 (Power Base) 選擇**\n\n## 三大驅動型態回顧\n\n### 1. 後輪驅動 (RWD)\n\n**特徵**:\n- 主驅動輪在後、caster 在前\n- 傳統型設計\n\n**優點**:\n- **直線穩定、高速穩定** ★\n- 戶外活躍型主流 ★ (B 考點)\n- 可預測轉向\n- 省電、續航久\n\n**缺點**:\n- **迴轉半徑最大**\n- **跨越障礙能力差**(前方小 caster)\n\n### 2. 前輪驅動 (FWD)\n\n**特徵**:\n- 主驅動輪在前、caster 在後\n\n**優點**:\n- **跨越障礙能力好**\n- 中等迴轉半徑\n\n**缺點**:\n- **高速 fishtailing** ★ (D 本題答案)\n  - 後方 caster 不穩定擺動\n  - 類似車輛後輪打滑\n- 需較多訓練\n\n### 3. 中輪驅動 (MWD)\n\n**特徵**:\n- 主輪在中央、前後各有 caster(6 輪)\n\n**優點**:\n- **迴轉半徑最小** ★ (C 考點)\n- 室內最靈活\n- 前後都能跨障礙\n\n**缺點**:\n- 崎嶇地面 caster 懸空\n- 不適戶外越野\n\n## 各選項完整分析\n\n### (A) 室內用 > 12 吋驅動輪? — 錯誤\n\n**正確觀念**:\n- **室內應選較小驅動輪**(8-10 吋)\n- 小輪:\n  - 迴轉靈敏\n  - 適合狹窄空間\n- 大輪(> 12 吋):\n  - 戶外、跨障礙強\n  - 室內過於笨重\n\n### (B) FWD 是戶外活躍型主流? — 錯誤\n\n**正確觀念**:\n- **戶外活躍型主流是 RWD** ★\n- 原因:\n  - 高速穩定性\n  - 直線性好\n  - 適合長距離\n- FWD 高速 fishtailing 不穩定,不適戶外高速\n\n### (C) 迴轉半徑排序錯誤\n\n**正確排序**(大到小):\n**RWD > FWD > MWD**\n\n- RWD:最大(傳統設計)\n- FWD:中等\n- **MWD:最小**(中輪驅動特色)\n\n選項「RWD > MWD > FWD」錯誤,MWD 應是最小。\n\n### (D) FWD 高速 fishtailing ★ 正確\n\n- 前驅、後方 caster 缺乏導引\n- 高速時後輪擺動\n- 類似後輪打滑\n- 是 FWD 經典缺點\n\n### (E) RWD 跨越障礙最佳? — 錯誤\n\n**正確觀念**:\n- RWD **穩定**是優點\n- 但**跨越障礙能力差** ★\n- 前方 caster 較小,易卡住\n- **跨越障礙最強是 FWD 或 MWD**\n- 不是 RWD\n\n## 驅動輪尺寸考量\n\n| 用途 | 驅動輪建議 |\n|---|---|\n| **室內為主** | 小(8-10 吋)、**MWD** 首選 |\n| **戶外活躍** | 大(12-14 吋)、**RWD** 首選 |\n| 混合使用 | 中等、FWD 或 MWD |\n\n## 其他動力底座選擇考量\n\n### 1. 使用環境\n- 居家地板、門檻\n- 戶外坡度、地形\n- 交通工具搭乘\n\n### 2. 身體能力\n- 手部控制\n- 軀幹穩定性\n- 視覺\n- 認知\n\n### 3. 附加功能\n- Power tilt / recline\n- Leg elevation\n- 站立功能\n- 溝通介面整合\n\n### 4. 電池續航\n- Group 24 (24V)\n- Lithium(輕、昂貴)\n- AGM(鉛酸)\n\n### 5. 承重\n- 標準(≤ 135 kg)\n- 加強型(> 135 kg)\n\n### 6. 價格\n- 基本型\n- 中階\n- 高階 complex rehab\n\n## 考點速記\n\n| 驅動 | 迴轉半徑 | 跨障礙 | 高速穩定 | 用途 |\n|---|---|---|---|---|\n| **RWD** | **大** | 差 | **好** | 戶外、長距 |\n| FWD | 中 | 好 | 差(fishtailing) | 中等 |\n| **MWD** | **小** | 好 | 中 | 室內 |\n\n| 情境 | 建議驅動 |\n|---|---|\n| 戶外活躍型主流 | **RWD** |\n| 室內靈活 | **MWD** |\n| 跨障礙強 | FWD 或 MWD |\n| 高速需要 | RWD |",
      "sources": [

        { "text": "Lange ML, Minkel JL. Seating and Wheeled Mobility: A Clinical Resource Guide. SLACK Incorporated, 2018", "url": null }
      ]

      "summary": "(D) 錯誤。**從腳踝後外側掃描顯示距骨下關節(subtalar joint)的位置,此處看到的韌帶應為「後距腓韌帶(PTFL)」或「跟腓韌帶(CFL)」,而非「前距腓韌帶(ATFL)」**。ATFL 位於踝關節前外側,從前方掃描才能看到,解剖位置完全不同。",
      "detail": "**踝後外側超音波與距骨下關節**\n\n## 影像位置說明\n\n**超音波探頭位置**:腳踝後外側 (posterolateral)\n**可見構造**:\n- Cal = **跟骨(calcaneus)**\n- 星號(*) = **無回音積液**(距骨下關節)\n- 箭頭 = **韌帶**(應為 PTFL 或 CFL,非 ATFL)\n\n## 踝外側韌帶解剖\n\n### 三條主要外側韌帶\n\n| 韌帶 | 位置 | 檢查探頭位置 |\n|---|---|---|\n| **ATFL (前距腓韌帶)** | 踝**前外側** | 前外側掃描 |\n| **CFL (跟腓韌帶)** | 踝**外側**(腓骨→跟骨) | 外側 |\n| **PTFL (後距腓韌帶)** | 踝**後外側** ★ | **後外側掃描** |\n\n### (D) 為什麼錯誤?\n- 題目明確說「腳踝**後外側**」超音波\n- 後外側掃描看到的韌帶是 **PTFL 或 CFL**\n- ATFL **不會**出現在後外側畫面\n- 選項誤植\n\n## 距骨下關節 (Subtalar Joint)\n\n### 解剖\n- **距骨(talus)與跟骨(calcaneus)之間**\n- 後方亞關節 (posterior subtalar joint) 最大\n- 中方、前方亞關節較小\n\n### 功能 — (B) 正確\n- **提供足踝內翻(inversion)與外翻(eversion)活動** ★\n- 踝關節本身(距小腿關節)提供背屈/蹠屈\n- 距骨下關節補足**冠狀面**活動\n\n### 超音波特徵 — (A)(C) 正確\n- **正常時**:很難看到關節囊\n- **積液時**:\n  - **低迴音或無迴音**(hypoechoic/anechoic)\n  - 關節囊擴大\n  - 後方亞關節最容易發現積液\n- **診斷**:距骨下關節炎、退化、RA、痛風等\n\n### 鑑別診斷(腳踝後外側痛)\n- **距骨下關節炎** ★\n- 腓骨長短肌肌腱炎\n- 跟骨後滑囊炎\n- Haglund's deformity\n- 後撞擊症候群 (posterior impingement)\n- 後脛骨肌腱病變\n\n## 動態掃描 (Dynamic Scanning) — (E) 正確\n\n### 原理\n- 超音波**即時影像**優勢\n- 病人主動/被動動作下觀察\n\n### 應用\n- **確認積液**(液體隨動作流動)\n- **肌腱脫位**\n- **撞擊症候群**\n- **韌帶完整性**\n- **關節穩定性**\n\n### 距骨下關節動態檢查\n- 內翻/外翻動作\n- 積液流動確認\n- 區別積液 vs 腱鞘炎 vs 腫塊\n\n## 治療\n\n### 保守\n- 休息、冰敷\n- NSAIDs\n- 物理治療\n- 足弓鞋墊(訂製矯正)\n- 超音波引導關節內注射\n\n### 手術\n- 關節鏡清創\n- 關節融合術(末期)\n\n## 考點速記\n\n| 構造 | 位置 | 探頭位置 |\n|---|---|---|\n| ATFL | 前外側 | 前外側 |\n| CFL | 外側 | 外側 |\n| **PTFL** | **後外側** | **後外側** ★ |\n| 距骨下關節 | 距骨-跟骨間 | 外側、後外側 |\n| 功能 | 內翻、外翻 | — |\n\n**關鍵**:後外側超音波 → 看到韌帶應是 **PTFL/CFL**,不是 ATFL",
      "sources": [
        { "text": "Jacobson JA. Fundamentals of Musculoskeletal Ultrasound. 3rd ed. Elsevier, 2018", "url": null },

        { "text": "Sconfienza LM et al. Ultrasound-guided procedures and radiology in rheumatology (EULAR recommendations). Ann Rheum Dis 2016", "url": "https://pubmed.ncbi.nlm.nih.gov/26791134/" }

    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "一般彩色都卜勒超音波影像以紅色表示血流速度向探頭而來,藍色代表血流遠離探頭" },

    "explanation": {
      "summary": "(B) 錯誤。**功率都卜勒(Power Doppler)敏感度「高於」彩色都卜勒(Color Doppler)**,特別是**對低流速微血流**的偵測更佳。Power Doppler 以訊號強度(非流速)呈現,能偵測小血管、滑膜炎、新生血管,是類風濕、腱鞘炎活動度評估的關鍵工具。選項把兩者敏感度的方向完全顛倒。",
      "detail": "**Color Doppler vs Power Doppler**\n\n## 基本原理比較\n\n### Color Doppler Imaging (CDI,彩色都卜勒)\n\n**原理**:\n- 基於**都卜勒頻率位移**(Doppler frequency shift)\n- **偵測血流速度 + 方向**\n- **紅色**:血流向探頭 (+ shift) — (A) 正確\n- **藍色**:血流遠離探頭 (- shift)\n- 顏色飽和度反映速度高低\n\n**優點**:\n- **顯示方向**\n- 顯示速度\n\n**缺點**:\n- **對低流速敏感度較低** ★\n- **角度依賴性強**(cosθ effect):角度 90° 時訊號最弱\n- 訊號雜訊比差\n- 小血管偵測差\n\n### Power Doppler Imaging (PDI,功率都卜勒)\n\n**原理**:\n- 基於**訊號強度**(power, amplitude)\n- **不計速度與方向,只偵測有無血流**\n- 訊號由**紅血球數量**(移動散射元)得來 — (C) 正確\n\n**優點**:\n- **敏感度高**(是 CDI 的 3-5 倍) ★\n- **低流速血流偵測佳**\n- **角度依賴性低** — (D) 正確\n- **訊號雜訊比佳**\n- **小血管、新生血管偵測**\n- 滑膜炎、腱鞘炎活動度評估\n\n**缺點**:\n- **無法顯示方向** — (E) 正確\n- 無法量化速度\n- 對動作敏感(容易動作偽影)\n\n## 詳細比較表\n\n| 項目 | **CDI** | **PDI** |\n|---|---|---|\n| 原理 | 頻率位移 | 訊號強度 |\n| **速度資訊** | **有** | **無** |\n| **方向資訊** | **有** | **無** ★ |\n| **敏感度** | 較低 | **較高** ★ |\n| **低流速** | 偵測差 | **偵測佳** |\n| **角度依賴** | **強** | 弱 ★ |\n| 顏色 | 紅/藍(雙向) | 單一漸層 |\n| 動作敏感 | 中 | **高**(易偽影) |\n| 大血管評估 | 佳 | 不需 |\n| 小血管/微血流 | 差 | **佳** ★ |\n\n## (B) 為什麼錯誤?\n\n選項說「CDI 敏感度比 PDI **高**,可偵測較低流速」\n\n**錯誤原因**:\n- **完全相反** ★\n- **PDI 敏感度 > CDI**\n- **PDI 才能偵測低流速微血流**\n- CDI 對低流速相對不敏感\n\n## 臨床應用\n\n### PDI 適合的情境\n\n#### 1. 滑膜炎評估 (Synovitis)\n- **類風濕關節炎(RA)**\n- **痛風**\n- 銀屑病關節炎\n- 活動度評估:\n  - Grade 0: 無血流\n  - Grade 1: 單一小血管\n  - Grade 2: 數個小血管\n  - Grade 3: 整個滑膜高度血流\n- **治療反應追蹤**\n\n#### 2. 腱鞘炎 (Tenosynovitis)\n- 偵測腱鞘內炎症血流\n\n#### 3. 附著點炎 (Enthesitis)\n- 肌腱附著處炎症\n- Spondyloarthritis 評估\n\n#### 4. 軟組織病灶\n- **腫瘤血管**(良惡性鑑別)\n- **感染**\n- 血管瘤\n\n#### 5. 周邊神經病變\n- **神經內新生血管**\n- 慢性壓迫性神經病變\n\n### CDI 適合的情境\n\n#### 1. 大血管評估\n- 動脈、靜脈\n- DVT\n- 血管阻塞\n\n#### 2. 方向確認\n- 胎兒心血管\n- 血管分支\n\n#### 3. 速度量化\n- 動脈狹窄評估\n\n## 進階技術\n\n### Super Microvascular Imaging (SMI)\n- 新一代技術\n- 敏感度更高於 PDI\n- 可視化微血流\n- 無偽影\n\n### Contrast-Enhanced Ultrasound (CEUS)\n- 微氣泡對比劑\n- 最高敏感度\n- 腫瘤特徵判別\n\n## RA 滑膜炎 PDI 分級 (OMERACT)\n\n| Grade | 描述 |\n|---|---|\n| 0 | 無 PD 訊號 |\n| 1 | 局限性單一訊號 |\n| 2 | < 50% 滑膜面積有訊號 |\n| 3 | > 50% 滑膜面積有訊號 |\n\n- Grade 1+ 代表活動性滑膜炎\n- 追蹤治療反應指標\n\n## 考點速記\n\n| Doppler 類型 | 特性 |\n|---|---|\n| **Color Doppler (CDI)** | 速度 + 方向、角度依賴、低流速差 |\n| **Power Doppler (PDI)** | **敏感度高**、**低流速佳**、無方向、角度依賴低 |\n\n| 臨床用途 | 首選 |\n|---|---|\n| 大血管 DVT | CDI |\n| **滑膜炎活動度** | **PDI** |\n| **腱鞘炎** | **PDI** |\n| **微血管新生** | **PDI** |\n| 速度量化 | CDI |",
      "sources": [
        { "text": "Jacobson JA. Fundamentals of Musculoskeletal Ultrasound. 3rd ed. Elsevier, 2018", "url": null },
