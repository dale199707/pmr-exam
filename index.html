      "detail": "**神經性膀胱手術治療總覽**：\n\n## 1. 膀胱擴大術（Bladder Augmentation / Augmentation Cystoplasty）\n\n**目的**：增加膀胱容量、降低儲尿壓力\n**做法**：切一段迴腸（ileum，最常用）接到膀胱頂\n**適應症**：低容量、低 compliance、高壓膀胱對藥物 / Botox 無效者\n\n**長期併發症**：\n- **Hyperchloremic metabolic acidosis**（最典型！）\n  - 腸段吸收尿液中 NH₄⁺、H⁺、Cl⁻\n  - 造成 metabolic acidosis\n  - 長期需監測 electrolytes、bicarb\n- Mucus plug（黏液阻塞）\n- UTI、結石\n- 維生素 B12 缺乏（若用 ileum > 50 cm）\n- Bladder perforation（須認真看待）\n- 惡性腫瘤風險（長期 > 10 年）\n\n選項 (A) ✓\n\n## 2. 電刺激 + Dorsal Rhizotomy（Brindley / Finetech procedure）\n\n**Sacral Anterior Root Stimulator (SARS)**：\n- 植入 S2-S4 前根（運動根）\n- 電刺激激發膀胱收縮 → 排尿\n- 同時搭配 **S2-S4 後根（dorsal root）切除**\n- 後根切除的目的：\n  - **去除 detrusor hyperreflexia / overactivity**（防止 uncontrolled 反射排尿）\n  - **降低 outlet resistance**\n  - 減少 AD 發作\n  - 增加膀胱容量\n\n選項 (B) ✓\n\n## 3. 自體筋膜吊帶（Autologous Fascial Sling）\n\n**目的**：**增加 bladder outlet resistance**\n**適應症**：\n- **Stress urinary incontinence**（尿道/膀胱頸 incompetent）\n- 神經性膀胱 + sphincter 無力\n**做法**：取自體 rectus fascia 做 sling，托住尿道\n\n**術後排尿**：\n- Sling 增加 outlet resistance → 排尿困難可能\n- **大多需要 CIC（間歇性導尿）**\n- **不建議 Valsalva 排尿**：\n  - 高壓排尿傷上尿路\n  - Sling + Valsalva 可能造成 sling erosion\n- 神經性膀胱病人做 sling 後通常已計畫使用 CIC\n\n選項 (C) ✗ **說要「Valsalva 排尿」錯誤**\n\n## 4. Sphincterotomy（外括約肌切開）\n\n**目的**：**降低 outlet resistance**\n**適應症**：男性 SCI + DSD + 不願/無法 CIC\n**做法**：切斷 external urethral sphincter（經尿道鏡）\n\n**術後**：\n- 低壓排尿\n- **搭配 external (condom) catheter** 收集尿液\n- 犧牲 continence 換取 upper tract 保護\n- **女性不適用**（無 condom catheter）\n- 可能復發（組織癒合）\n\n選項 (D) ✓\n\n## 5. Intrathecal Baclofen\n\n**目的**：**降低 spasticity**（含骨盆底肌肉）\n**適應症**：\n- 嚴重 spasticity 對口服藥無效\n- 痙攣影響 ADL、疼痛、照護\n**機轉**：GABA-B agonist，直接作用於脊髓\n\n**效果**：\n- 降低骨盆底肌張力 → outlet resistance ↓\n- 也降低 detrusor activity\n- 可能改善排尿 但\n- **也可能減少 detrusor contraction** → 排空困難\n- 需要 CIC\n- 因此不是主要的膀胱治療手術，但有膀胱影響\n\n選項 (E) ✓\n\n## 其他神經性膀胱手術\n\n### 1. Botox 注射（非手術）\n- **Detrusor 注射**：治療 DO\n- **Urethral sphincter 注射**：治療 DSD\n\n### 2. Artificial Urinary Sphincter (AUS)\n- 可植入、可控制\n- 用於嚴重 stress incontinence\n\n### 3. Continent Catheterizable Channel (Mitrofanoff)\n- 利用闌尾或腸段做皮膚造口\n- 從肚臍等位置 CIC\n- 手部功能差、無法做 urethral CIC 者\n\n### 4. Urinary Diversion\n- **Ileal conduit**（不可控）：最常用\n- **Continent reservoir**（Indiana pouch）\n- 最後手段\n\n### 5. Suprapubic Cystostomy\n- 膀胱瘺\n- 優於 urethral Foley（若必須長期留置）\n\n## Brindley Stimulator 詳細\n\n**適應症**：完全 SCI、神經性膀胱、dorsal rhizotomy 後\n**好處**：\n- 自主控制排尿（按控制器）\n- 改善 bladder 和 bowel function\n- 減少 AD\n- 改善勃起功能\n\n**缺點**：\n- 需要完全 SCI（部分保留者做了會失去剩餘功能）\n- 不可逆 rhizotomy\n- 手術 invasive\n- 失去反射性勃起（但 S2-S4 前根刺激可引發）\n\n## 女性神經性膀胱 outlet 阻力問題\n\n**選擇**：\n1. Pubovaginal sling（自體筋膜）\n2. Urethral bulking agent\n3. AUS\n4. Continent diversion\n\n**術後共通問題**：多需 CIC，**不建議 Valsalva voiding**",

      "detail": "**各選項完整分析**：\n\n## (A) ✗ 無症狀菌尿不需治療\n\n**Asymptomatic Bacteriuria（ASB）在神經性膀胱**：\n\n- 使用 CIC 或 Foley 的病人 **幾乎必然有菌尿**（colonization）\n- **不等於感染**\n- **常規治療的害處**：\n  - 抗生素抗藥性\n  - C. difficile\n  - 副作用、過敏\n  - Fungal overgrowth\n  - 成本\n- **指引明確不建議 ASB 常規治療**（AUA 2022、IDSA 2019）\n\n**例外（要治療）**：\n- 懷孕\n- 泌尿道侵入性手術前\n- 特定病人（如 pre-transplant）\n- **有症狀才治療**\n\n## (B) ✗ 肌腱斷裂屬 Fluoroquinolone（非 TMP/SMX）\n\n**各類抗生素與肌腱副作用**：\n- **Fluoroquinolones**（ciprofloxacin、levofloxacin）：\n  - **Tendinitis、tendon rupture**（FDA black box warning）\n  - Achilles tendon 最常見\n  - 老年、合併類固醇風險↑\n- **TMP/SMX（Bactrim/Septra）**：\n  - 副作用：皮膚疹（Stevens-Johnson）、腎功能、高鉀、血液\n  - **不是肌腱問題**\n\n**神經性膀胱 UTI 治療選擇**：\n- 依 culture + sensitivity\n- 常用：TMP/SMX、nitrofurantoin（只能治下尿路）、cephalosporins、fluoroquinolones（限必要時）\n- 慢性 prophylaxis：nitrofurantoin、methenamine（預防用）\n\n## (C) ✗ AD 是 Bradycardia（非 Tachycardia）\n\n**Autonomic Dysreflexia（AD）典型表現**：\n\n**上方症狀（level 以上）**：\n- **搏動性頭痛**（throbbing headache）\n- **臉紅 / 出汗**（flushing、profuse sweating）\n- **鼻塞**\n- 視力模糊\n- 焦慮\n\n**下方症狀（level 以下）**：\n- **皮膚蒼白、冰冷**\n- **雞皮疙瘩（piloerection）**\n- 血管收縮\n\n**心血管**：\n- **突發性嚴重高血壓**（SBP > 20 mmHg 或 ≥ 40 mmHg 上升）\n- **反射性心跳慢（baroreflex-mediated bradycardia）** — 典型表現\n  - Vagus nerve 未受脊髓損傷影響\n  - Baroreceptor 感知高血壓 → vagal tone ↑ → HR ↓\n- **不是 tachycardia**\n- 但也有些文獻發現實際上部分病人會 tachycardia（研究顯示相對常見）\n- **傳統教科書與考試答案：bradycardia**\n\n選項 (C) 說「心搏過速」→ 錯誤\n\n## (D) ✗ Nifedipine 應咬碎吞服，非舌下\n\n**AD 的緊急處置**：\n\n**第一步（非藥物）**：\n1. **坐起（sit up）** → 利用 orthostatic 降 BP\n2. **鬆開緊衣、塞得緊的襪子**\n3. **尋找誘因**：\n   - **膀胱（最常見）**：Foley 是否阻塞、是否該 catheterize\n   - **腸道**：便秘、嵌塞\n   - 皮膚問題：壓瘡、感染、踩到異物\n   - 指甲內生\n   - Fracture\n4. 處理誘因\n\n**第二步（若 SBP > 150 mmHg 持續）**：\n- **Nifedipine 10 mg，咬碎吞服**（bite and swallow）\n  - **NOT 舌下**（舌下會吸收太快、難控制、可能 stroke）\n  - 老做法是舌下，已被證明危險\n- **Nitroglycerin SL 或 paste**\n- **Hydralazine IV**\n- **Captopril SL 或 chewed**\n\n**避免**：\n- β-blockers（bradycardia 再加重）\n\n**預防 / 長期控制**：\n- 識別誘因、預防\n- **Phenoxybenzamine**（non-selective α-blocker）**現在較少用**\n- **Prazosin、terazosin（α1-blocker）** 較常用於長期預防\n- Tamsulosin（α1A）亦可\n- 避免 noxious stimuli\n\n選項 (D) 說「舌下 nifedipine」**錯誤（應 bite and swallow）**\n\n## (E) ✓ SCI 後 Hypercalciuria 時程\n\n**SCI 後骨流失與尿鈣**：\n\n**時程**：\n- **約 4 週後**開始尿鈣增加\n- **16 週左右達高峰**\n- **持續 12-18 個月**\n- 之後漸趨穩定，但持續高於正常\n\n**機制**：\n- **廢用性骨吸收**（immobilization hypercalciuria）\n- 骨質快速流失（腿部骨密度 1 年內可 ↓ 30-50%）\n- 釋放大量鈣到血中 → 經腎排出\n- 可能導致：\n  - **腎結石**（特別 calcium stones）\n  - **高鈣血症**（較少見，若嚴重 immobilization）\n  - 尿路感染（鈣促進 biofilm）\n\n**臨床意義**：\n- 監測尿鈣、血鈣\n- 預防結石：水分、降尿鈣（thiazide）\n- 骨密度追蹤、骨鬆治療（bisphosphonates 用於 SCI）\n- 早期 weight-bearing（tilt table、FES）部分減緩\n\n**其他 SCI 代謝變化**：\n- 尿氮流失（蛋白質分解）\n- Negative nitrogen balance\n- 低磷血症\n- 脂肪比例改變\n- Insulin resistance\n\n## AD 預防與病人衛教\n\n**高風險族群**：\n- T6 以上 SCI（發生率 ~ 50-90%）\n- 完全性損傷 > 不完全\n- 受傷後 3-6 個月（spinal shock 後）\n\n**自我管理**：\n- 認識症狀\n- 攜帶緊急卡\n- 家人 / 照護者訓練\n- 常見誘因教育：\n  - 膀胱（阻塞、過脹、UTI、結石）\n  - 腸道（便秘、嵌塞）\n  - 皮膚（指甲、鞋帶、熱、寒）\n  - 性活動\n  - 分娩、生產（需特別準備）\n  - 手術、牙科處置",

      "detail": "**各選項分析**：\n\n## (A) ✗ 原發性骨鬆分類\n\n**原發性骨質疏鬆（Primary Osteoporosis）**：\n\n**Type I — 停經後骨鬆（Postmenopausal）**：\n- 年齡：50-70 歲女性\n- 主因：**雌激素下降** → **蝕骨細胞活性增加**\n- 特徵：**Trabecular bone 流失為主**（脊椎、遠端橈骨）\n- 骨折型態：椎體壓迫、Colles 骨折\n\n**Type II — 老年性骨鬆（Senile）**：\n- 年齡：> 70 歲（男女都有，女多）\n- 主因：**造骨細胞活性下降**（not 蝕骨增加）\n- 同時：腸鈣吸收 ↓、維生素 D 活化 ↓、次發性 hyperparathyroidism\n- 特徵：**Cortical + trabecular 都流失**\n- 骨折型態：**髖骨折、盆骨骨折**\n\n選項 (A) 說「老年性」是「蝕骨細胞活性增加」**錯誤**（實際是造骨細胞活性下降為主）\n\n## (B) ✗ Bisphosphonate 預防性用藥\n\n**一般指引**：\n- **不建議所有停經婦女預防性使用**\n- **T-score ≤ -2.5** 或 **有骨鬆性骨折病史** 或 **FRAX 高風險** 才建議治療\n- 過早使用 bisphosphonate：\n  - ONJ、AFF 風險（長期累積）\n  - Over-suppression of bone turnover\n  - 效益不如想像中大\n- **高風險者才受益**\n\n**例外**：\n- 接受長期類固醇（GIOP 預防）\n- 停經後乳癌（aromatase inhibitor）\n- 其他次發性骨鬆風險\n\n選項 (B) 說「盡早使用可降低骨折」**過度寬泛**，實際是**高風險者盡早治療**\n\n## (C) ✗ Genant 壓迫骨折定義\n\n**Genant Semi-Quantitative Method（半量化法）**：\n\n脊椎壓迫骨折分級（依前、中、後緣高度下降比例）：\n\n| Grade | 高度下降 | 分類 |\n|---|---|---|\n| **Grade 0** | 正常 | 無骨折 |\n| **Grade 1（mild）** | **20-25%**（**註：~20% cutoff**） | 輕度 |\n| **Grade 2（moderate）** | 25-40% | 中度 |\n| **Grade 3（severe）** | > 40% | 重度 |\n\n**型態分類**：\n- **Wedge fracture**（楔型）：前緣下降\n- **Biconcave / endplate fracture**（雙凹）：中間下降\n- **Crush fracture**（壓縮 / 碾壓型）：整體下降\n\n**「爆裂型」（burst fracture）**：通常**不屬於 Genant osteoporotic fracture**\n- Burst 多因高能外傷\n- 侵犯後柱，有神經壓迫風險\n\n選項 (C) 「40% 以上才是骨折」錯誤（**Genant mild 從 20% 開始**）\n\n## (D) ✓ IOF 骨密度檢查建議因子\n\n**FRAX 與 IOF 風險因子（需要 BMD 檢查的情況）**：\n\n1. **年齡**：\n   - 女 ≥ 65 歲（無其他因子）\n   - **男 ≥ 70 歲**\n   - 年齡 > 50 歲 + 其他風險因子\n\n2. **性別**：女性（風險較高）\n\n3. **身高 / BMI**：\n   - 低體重（BMI < 19）\n\n4. **骨折史**：\n   - 低能量性骨折病史\n\n5. **父母髖骨折**：家族史\n\n6. **類固醇使用**：\n   - 口服 > 3 個月\n   - 等效 prednisone > 5 mg/day\n\n7. **吸菸**：目前吸菸\n\n8. **酒精**：\n   - **> 3 units/day**（典型 ≥ 24 g 酒精）\n   - 有些指引寫 > 2 units（≥ 20 g）\n\n9. **次發性骨鬆**：\n   - **Rheumatoid arthritis（RA）**\n   - 1 型糖尿病\n   - Hyperthyroidism（控制不良）\n   - Hypogonadism\n   - 早期停經（< 45 歲）\n   - 吸收不良\n   - 慢性肝病\n\n10. **既有低骨密度 / 骨鬆病史**\n\n選項 (D) 列的 ≥ 40 歲、每日 > 2 杯酒 (~20 g)、RA 都**符合**\n\n## (E) ✗ WHO 與 DXA 建議部位\n\n**WHO / ISCD 建議的 DXA 測量部位**：\n\n1. **Lumbar spine**（腰椎 L1-L4）\n2. **Total hip**（全髖）\n3. **Femoral neck**（股骨頸）\n\n**不建議用於診斷**：\n- **Ward's triangle**（瓦氏三角）：\n  - 三角形區域，位於股骨頸內\n  - **變異大、reproducibility 差**\n  - 不可用於診斷 / 追蹤\n  - 現代 DXA software 已**不建議採用**\n- **Trochanter**：可測但非主要\n- **Forearm**（1/3 radius）：\n  - 只在**特殊情況**使用：\n    - 髖、腰椎無法測（關節置換、嚴重脊椎退化）\n    - 很重（超過 DXA 體重限制）\n    - Hyperparathyroidism（測 cortical bone）\n\n選項 (E) 把 Ward's triangle 列入錯誤\n\n## WHO BMD 分類（T-score，停經後女、≥ 50 歲男）\n\n| T-score | 分類 |\n|---|---|\n| ≥ -1.0 | **正常** |\n| -1.0 ~ -2.5 | **Osteopenia（骨量缺乏）** |\n| ≤ -2.5 | **Osteoporosis（骨質疏鬆）** |\n| ≤ -2.5 + fracture | **Severe / established osteoporosis** |\n\n**Z-score**：\n- < -2.0 = below expected for age（用於 < 50 歲 男、停經前女）\n- 須評估次發性原因\n\n## 骨鬆性骨折的臨床定義\n\n**即使 BMD 未達 -2.5，有以下任一即可診斷骨鬆**：\n- **椎體壓迫骨折（vertebral compression fracture）**（非外傷）\n- **髖骨折**（低能量）\n- 骨盆骨折\n- 其他脆弱性骨折\n\n## 治療閾值（NOF 建議）\n\n考慮治療：\n- T-score ≤ -2.5 at spine / total hip / femoral neck\n- 低能量 hip / vertebral fracture\n- T-score -1 ~ -2.5 + **FRAX ≥ 3% 10-yr hip fracture risk** 或 **≥ 20% 10-yr major osteoporotic fracture risk**",

      "detail": "**肩部鈣化性肌腱炎（Calcific Tendinitis）**：\n\n## 流行病學與致病機轉\n\n- 中年女性常見（30-60 歲）\n- **Supraspinatus 最常受影響**（80%）\n- 其次 infraspinatus、subscapularis\n- 成分：**Calcium hydroxyapatite（鈣磷灰石）**\n\n**可能機轉**：\n- **退化性**：肌腱長期使用退化\n- **反覆微創傷**\n- **Endochondral bone formation 模擬**：軟骨內成骨過程\n- **Tenocyte apoptosis**：肌腱細胞凋亡\n- **局部缺血**（Uhthoff 理論）\n\n## Uhthoff 3 期演變\n\n### Phase 1: Formative（形成期）\n- 肌腱細胞化為軟骨樣\n- 鈣化沉積\n- 可無症狀或輕微不適\n- 鈣化 appearance：dense、chalk-like\n\n### Phase 2: Resting（靜止期）\n- 鈣化穩定\n- 可持續數月到數年\n- 偶爾慢性症狀\n\n### Phase 3: Resorptive（吸收期）\n- **血管增生（angiogenesis）**\n- 發炎反應\n- 單核細胞、巨噬細胞吞噬鈣化\n- **劇烈疼痛期！**（但也是快要好了的訊號）\n- 鈣化 appearance：**cloudy、ill-defined**\n- 最終完全吸收\n\n## Gartner 影像分級（X-ray）\n\n| 分級 | 特徵 | **自發吸收率** |\n|---|---|---|\n| **Type I** | **Dense（密實）、sharply outlined（邊界清楚）、homogeneous** | **低**（最不容易自發吸收） |\n| **Type II** | **中等密度、邊界部分清楚（intermediate）** | 中 |\n| **Type III** | **Cloudy / translucent（雲霧狀）、ill-defined（邊界不清）、heterogeneous** | **高**（最容易自發吸收） |\n\n**為什麼 Type III 容易吸收？**\n- Type III 正處於 **Uhthoff Phase 3（resorptive phase）**\n- 血管與發炎細胞正在吸收鈣化\n- 常伴隨劇痛\n- 治療效果也最好（可保守觀察或引流）\n\n**為什麼 Type I 不易吸收？**\n- Type I 是 **Phase 1（formative）**，穩定\n- 無發炎反應\n- 需要主動治療（震波、穿刺、手術）\n\n選項 (B) 說「Type I 會很高機會自行吸收」**完全相反** ✗\n\n## 治療選項\n\n### 1. 保守治療（第一線）\n- NSAIDs\n- 物理治療（冰敷、超音波、ROM）\n- 類固醇注射\n- 適用：大多數病人，特別 Phase 3\n\n### 2. 體外震波治療（ESWT, Extracorporeal Shock Wave Therapy）\n- 高能量 ESWT（> 0.28 mJ/mm²）效果最好\n- 機轉：\n  - **機械性崩解鈣化**\n  - **促進 neovascularization 和 neolymphangiogenesis**\n  - 刺激局部發炎反應\n  - 加速吸收\n- 效果：70-80% 病人改善\n- 優點：非侵入性\n- 缺點：疼痛、費用、可能需多次\n- **Type I 硬鈣化效果不如 Type III 好**\n\n選項 (D) 關於 neolymphangiogenesis ✓\n\n### 3. 超音波導引穿刺與沖洗（Barbotage / Needling and Lavage）\n- 針頭穿刺鈣化 + 生理食鹽水沖洗 + 類固醇注射\n- 效果好（70-90% 改善）\n- **硬性鈣化（Type I, acoustic shadow）較難**：\n  - 鈣化堅硬、不易崩解\n  - 穿刺時阻力大\n  - 費時\n- **軟性鈣化（Type III, toothpaste-like）較容易**：\n  - 鈣化已半吸收\n  - 容易抽吸\n\n選項 (C) ✓\n\n### 4. 手術（最後選擇）\n- 關節鏡下清除鈣化\n- 適應症：保守治療失敗 > 6 個月\n- 可能合併 rotator cuff repair\n\n**研究比較**：\n- ESWT vs 手術：**1 年後功能類似**（ESWT 相當於手術）\n- Rompe et al、Rebuzzi et al 的研究\n- ESWT 較便宜、非侵入、應為第一線\n\n選項 (E) ✓\n\n## 影像學診斷\n\n### X-ray（首選篩檢）\n- AP、axillary、scapular Y view\n- 看鈣化位置、大小、形狀\n- **Gartner 分類**\n\n### 超音波\n- 動態、無輻射\n- 鈣化 appearance：\n  - **Acoustic shadow**（硬性鈣化）\n  - **Focal hyperechoic area**\n  - 「Toothpaste」appearance（軟性）\n\n### MRI\n- 較少用於純鈣化性肌腱炎\n- 可評估 rotator cuff 整體\n- 鈣化在 MRI 可能不明顯（T1、T2 low signal）\n\n## 臨床表現\n\n- 突發性劇痛（Phase 3）或慢性痛（Phase 1）\n- 活動受限\n- 夜間痛（sleep-disturbing）\n- 類似 rotator cuff tendinopathy 或 impingement 症狀\n- 可能合併 adhesive capsulitis\n\n## 自然史\n\n- 大部分鈣化會**自行消退**（幾個月到幾年）\n- **長期預後好**\n- 教科書建議：若無嚴重症狀 → 觀察 + 保守\n- 有症狀 → 積極治療\n\n## 鑑別診斷\n\n- Rotator cuff tendinopathy / tear\n- Subacromial bursitis\n- Adhesive capsulitis\n- Arthritis（AC joint、GH joint）\n- Cervical radiculopathy",

      "detail": "**骨盆周圍肌肉附著點（重要！）**：\n\n## 前側附著點\n\n| 結構 | 附著肌肉 | 撕脫傷情境 |\n|---|---|---|\n| **ASIS（Anterior Superior Iliac Spine，前上髂骨脊）** | **Sartorius（縫匠肌）**、tensor fascia lata | 衝刺、大步 |\n| **AIIS（Anterior Inferior Iliac Spine，前下髂骨脊）** | **Rectus femoris**（股直肌） | 踢球（足球）、衝刺 |\n| **Iliac crest（髂骨脊）** | Abdominal muscles（腹肌）、ITB | 軀幹急轉 |\n| **Pubic symphysis** | Adductors、rectus abdominis | 變向、踢球 |\n\n## 後側附著點\n\n| 結構 | 附著肌肉 | 撕脫傷情境 |\n|---|---|---|\n| **Ischial tuberosity（坐骨結節）** | **Hamstrings**（biceps femoris、semitendinosus、semimembranosus） | 短跑、跳躍、武術踢腿 |\n| **Greater trochanter（大轉子）** | Gluteus medius、minimus、piriformis | 髖部急拉 |\n| **Lesser trochanter（小轉子）** | **Iliopsoas（髂腰肌）** | 急速髖屈、青少年 |\n\n## 本題選項分析\n\n**(A) ✗ Rectus femoris 撕脫位置**：\n- **Rectus femoris 的近端有兩個頭**：\n  - **Direct head（直頭）：AIIS** ← 主要撕脫位置\n  - **Indirect head（反射頭 / reflected head）：髖臼上緣**\n- **都不是 ASIS**\n- 選項說在 ASIS **錯誤**\n- ASIS 撕脫是 **sartorius** 的病\n\n**(B) ✓ Hamstring 近端撕脫**：\n- Hamstring 起點：**Ischial tuberosity**\n- 撕脫骨折在青少年（骨垢未閉合）常見\n- 成人多為肌肉撕裂（非骨折）\n- 短跑選手、武術、體操常見\n- 症狀：臀部疼痛、壓痛、活動受限\n\n**(C) ✓ 運動型疝氣（Sports Hernia / Athletic Pubalgia）**：\n- **不是真疝氣**（無 hernia sac）\n- 位置：**Pubic symphysis 附近**\n- 涉及：\n  - **Abdominal muscles**（特別 rectus abdominis、external oblique）附著點損傷\n  - **Adductor（股內收肌）**附著點損傷\n- 常見於急停變向運動\n- **男 > 女（多見於足球、冰球、長曲棍球）**\n- 症狀：腹股溝痛、下腹痛、運動時加劇\n\n**(D) ✓ 大轉子疼痛症候群（Greater Trochanteric Pain Syndrome, GTPS）**：\n- 舊稱：trochanteric bursitis\n- 現代觀念：多為 **gluteus medius/minimus tendinopathy**（非單純滑囊炎）\n- 症狀：\n  - 大轉子外側壓痛\n  - 側臥患側疼痛\n  - **主動外展痛**（gluteus medius 收縮）\n  - **被動內收痛**（拉伸 gluteus medius）\n  - 單腳站測試（+）\n- 治療：物理治療、注射、震波、偶爾手術\n\n**(E) ✓ 股骨頭 AVN 早期診斷**：\n- AVN 早期 X-ray 可能正常\n- **MRI 敏感度最高**（早期可見 bone marrow edema、crescent sign）\n- CT 可見晚期變化\n- 早期治療選項：\n  - Core decompression\n  - Stem cell therapy（實驗性）\n  - Bisphosphonates（預防塌陷）\n  - Vascularized bone graft\n- 晚期 → THA\n- 典型病因：類固醇、酒精、外傷、SLE、HIV、sickle cell\n\n## 髖部其他常見病變\n\n### 髂腰肌（Iliopsoas）病變\n\n**Iliopsoas tendinitis / snapping hip**：\n- 內側 snapping：iliopsoas 過 iliopectineal eminence 或股骨頭\n- 疼痛 + 聽到 \"snap\"\n- 髖屈曲→伸直時出現\n\n**Iliopsoas bursitis**：\n- 髖前方疼痛\n- 與 iliopsoas tendinopathy 共存\n\n### 髖臼緣撕裂（Labral Tear）\n\n- FAI（Femoroacetabular Impingement）常併發\n- 典型：前上方 labrum\n- 症狀：groin pain、clicking、catching\n- 檢查：FADIR test（flexion + adduction + internal rotation）\n- 影像：MR arthrogram\n- 治療：保守 → 關節鏡手術\n\n### 股骨髖臼夾擠症（FAI）\n\n**Cam type**：股骨頭-頸交界處 bony overgrowth（男性常見）\n**Pincer type**：髖臼過度覆蓋（女性常見）\n**Mixed type**：兩者併存\n\n**症狀**：\n- 髖屈曲、內旋痛\n- 活動受限\n- 長期可能 labral tear、OA\n\n### 坐骨大腿痛（Piriformis Syndrome）\n\n- 梨狀肌壓迫 sciatic nerve\n- 坐骨神經痛症狀\n- 臀部痛向下放射\n- 長時間坐加劇\n- 檢查：FAIR test\n\n### 髖骨折（Hip Fracture）\n\n- 老年常見（已於 Q077 詳述）\n- Femoral neck vs intertrochanteric\n- 血流供應、手術、預後差異\n\n## 成長期髖部問題\n\n### Legg-Calvé-Perthes Disease\n- 兒童股骨頭缺血性壞死\n- 4-8 歲男孩常見\n- 單側（多）\n- 步態異常、膝痛（referred）\n\n### Slipped Capital Femoral Epiphysis (SCFE)\n- 青少年股骨頭 epiphysis 滑脫\n- 肥胖男孩常見\n- 髖痛、膝痛、跛行\n- 外旋步態\n- 緊急手術固定\n\n### Transient synovitis\n- 幼兒暫時性關節滑膜炎\n- 病毒感染後\n- 自限性\n- 必須排除 septic arthritis\n\n## 影像工具選擇\n\n| 病變 | 首選影像 |\n|---|---|\n| Fracture | X-ray → CT |\n| Labral tear | MR arthrogram |\n| AVN 早期 | **MRI**（bone marrow edema） |\n| AVN 晚期 | X-ray 可見 crescent sign |\n| FAI 骨性 | X-ray (AP + Dunn) |\n| FAI 軟組織 | MR arthrogram |\n| Tendinopathy | Ultrasound 或 MRI |\n| Bursitis | Ultrasound |\n| Muscle strain | MRI > US |",

      "detail": "**Medial Gastrocnemius Tear（內側腓腸肌撕裂，又稱 \"Tennis Leg\"）**：\n\n## 致病機轉與流行病學\n\n**典型情境**：\n- **中年運動員**（30-50 歲為主）\n- 常發生於：tennis、跑步、爬坡、突然 push-off\n- 機轉：**踝 dorsiflexion + 膝 extension 同時收縮**\n  - 腓腸肌 myotendinous junction 處被拉扯\n  - 肌肉急遽拉長 + 強烈收縮\n  - **斷裂處通常在內側腓腸肌 myotendinous junction**\n\n**非 overuse**：\n- **急性受傷為主**\n- 有明確的受傷時間點\n- 病人常能準確描述發病瞬間\n\n選項 (A) ✗（非 overuse）、選項 (B) ✗（非漸進式）\n\n## 臨床表現\n\n**急性期**：\n- **突發性小腿後方「啪一聲」**\n- 劇烈疼痛\n- 無法繼續運動\n- 行走困難\n- 腓腸肌遠端（內側）壓痛\n- 可能有瘀青（數天後出現，沿筋膜向下到踝）\n- 腫脹\n\n**檢查**：\n- **Thompson test（-）**：重要！區分 Achilles tendon rupture\n  - 擠壓小腿，正常腳會 plantarflex\n  - Tennis leg：陽性動作（小腿被擠壓痛但仍有部分動作）\n  - Achilles rupture：（-），無 plantarflexion\n- 壓痛局限於內側腓腸肌 myotendinous junction\n- 踝 ROM 可能受限\n\n## 診斷\n\n### 超音波（首選！）\n- **便宜、快速、可動態**\n- 可看到：\n  - 肌肉纖維斷裂\n  - **Fluid collection（hematoma）between medial gastrocnemius and soleus**\n  - 肌肉回縮程度\n- **美國大部分急診、運動醫學首選**\n- 選項 (C) 說「MRI 主要依據」**不夠正確**\n\n### MRI\n- 更詳細但昂貴、非緊急需要\n- 用於：\n  - US 不清楚\n  - 鑑別其他病變\n  - 研究、運動員精準評估\n- **不是「主要依據」**\n\n### 鑑別診斷\n- **Achilles tendon rupture**（最重要鑑別！）：Thompson test 陽性\n- DVT（深層靜脈栓塞）\n- Baker's cyst rupture\n- Compartment syndrome\n- Plantaris rupture\n\n## 治療\n\n### 急性期（前 48-72 小時）\n- **PRICE**：Protection、Rest、Ice、Compression、Elevation\n- NSAIDs（酌用）\n- 避免完全負重（crutches + partial weight bearing）\n- **避免 stretching**（前幾天）\n\n### 後續\n- **鞋跟墊高（heel lift）**：\n  - **1-2 cm 墊高**\n  - 讓踝 plantarflexion → 腓腸肌放鬆\n  - 減輕疼痛、方便行走\n  - 使用數週\n- 早期 gentle ROM\n- 漸進式 stretching（亞急性期）\n- 漸進式 strengthening\n- **加壓 stocking 助於腫脹**\n\n### 功能恢復\n- 輕度：**2-3 週**可行走、運動\n- 中度：**4-6 週**\n- 嚴重：**6-8 週**，完全恢復 3 個月內\n- **不需半年以上**\n\n選項 (D) ✗（不需半年以上）\n\n### 監測併發症\n- **DVT**：常見併發症！因活動減少 + 腫脹\n  - 有風險因子者考慮預防\n  - 小腿疼痛 / 腫脹不成比例時警覺\n- Compartment syndrome（罕見但嚴重）\n- 反覆發作\n\n## 預後\n\n- 大多數預後良好\n- 完全恢復到運動水準\n- **低復發率**（與 Achilles tendinopathy 不同）\n- 一般保守治療即可\n- 手術極少需要（只在大範圍撕裂、慢性 fluid collection）\n\n## 分級（US 或 MRI 影像）\n\n**Grade I（輕度）**：\n- < 5% 肌纖維受損\n- 輕微疼痛、腫脹\n- 恢復快（1-2 週）\n\n**Grade II（中度）**：\n- 部分撕裂\n- 明顯疼痛、腫脹、瘀青\n- 步態異常\n- 恢復 3-6 週\n\n**Grade III（嚴重）**：\n- 完全斷裂或大範圍撕裂\n- 可觸及 gap\n- 嚴重功能喪失\n- 恢復 6 週以上\n\n## 各選項總結\n\n**(A) ✗** 急性受傷，非 overuse\n\n**(B) ✗** 突發性，有明確受傷時間\n\n**(C) ✗** **超音波為首選**（而非 MRI 為主要依據）\n\n**(D) ✗** 多數幾週到幾個月即可回復運動\n\n**(E) ✓** 墊高鞋跟是標準處置\n\n## 預防\n\n- 運動前 warm-up、stretching\n- 漸進式增加運動強度\n- 適當鞋具\n- 小腿肌肉 conditioning\n- 水分、電解質\n- 中年運動員注意\n\n## 與小腿其他病變鑑別\n\n| 病變 | 特徵 | Thompson test |\n|---|---|---|\n| **Medial gastroc tear** | 急性、內側遠端 MTJ、tennis leg | (-) |\n| **Achilles tendon rupture** | 急性、踝後方、「啪聲」 | **(+)** |\n| **Baker's cyst rupture** | 膕窩腫 → 小腿痛 + 腫 | (-) |\n| **DVT** | 漸進式腫脹、壓痛、Homans sign | (-) |\n| **Compartment syndrome** | 急性、劇痛、緊脹、neurovascular deficit | (-) |\n| **Plantaris rupture** | 類似 tennis leg 但較輕 | (-) |",

    "explanation": {
      "summary": "脛後肌的主要功能是**足 inversion + 支持內側足弓**。PTT dysfunction 時病人**無法完成 single-leg heel raise（墊腳尖）**，因為 tibialis posterior 是啟動 heel inversion 讓 Achilles 可以槓桿抬起腳跟的關鍵。這是**經典檢查徵象**。",
      "detail": "**Tibialis Posterior Tendon Dysfunction（PTTD）**：\n\n## 解剖與功能\n\n**Tibialis Posterior 起源**：\n- 脛骨、腓骨後方、骨間膜\n- 通過**內踝後方**（不是上方！）\n- 沿 medial malleolus 下方繞過\n- 主要附著：**navicular tuberosity（舟骨粗隆）**\n- 次要：cuneiforms、metatarsals 2-4\n\n**功能**：\n- **Foot inversion**（主要）\n- **Plantarflexion**（次要）\n- **支撐內側足弓（medial longitudinal arch）**（最重要！）\n- Heel inversion（走路時）\n\n## 病變位置\n\n**好發部位**：\n- **內踝後下方（retromalleolar area）**\n- **Tendon 通過 medial malleolus 之處**\n- 選項 (B) 說「內踝上方、myotendinous junction」**錯誤**\n  - MTJ 在更近端（小腿中段）\n  - 病變位置是**遠端 tendon**，不是 MTJ\n\n**機轉**：\n- 過度使用（pronated foot、扁平足）\n- 年齡相關退化（中老年女性好發）\n- 血管較少的「watershed」區域（類似 Achilles）\n- 肥胖、DM、RA 增加風險\n\n## 病人族群\n\n- **中老年女性最常見**\n- 肥胖\n- DM、HTN\n- Flatfoot / overpronation（預先存在）\n- 脛後肌是**成人後天扁平足（adult acquired flatfoot）最常見原因**（不是高足弓）\n- 選項 (A) 說「高足弓」**錯誤**，應為**低足弓 / 扁平足**\n\n## 分級（Johnson & Strom classification）\n\n### Stage I\n- **肌腱發炎**，無變形\n- 疼痛：內踝後方\n- 力量正常或輕微下降\n- Single heel raise 可能保留但痛\n- 治療：保守（rest、NSAIDs、orthotic、PT）\n\n### Stage II\n- **Tendon 伸長 / 部分斷裂**\n- **可逆性 flatfoot（reducible flatfoot）**\n- **Too many toes sign**（從後方看，外側可見 > 2 個腳趾）\n- **Single heel raise 無法完成或無 heel inversion**\n- 治療：orthotic（AFO）、bracing、手術（重建）\n\n### Stage III\n- 肌腱嚴重變性\n- **Rigid flatfoot（不可逆）**\n- 併發後足 valgus\n- 治療：手術（subtalar fusion、triple arthrodesis）\n\n### Stage IV\n- 加上 ankle arthritis（talar tilt）\n- Pan-talar arthrodesis\n\n## 臨床表現\n\n**症狀**：\n- **內踝後方疼痛、腫脹**\n- 長時間行走 / 站立加劇\n- **足弓塌陷**感\n- 後期：疼痛向外側轉移（subfibular impingement）\n- 無法跑、跳\n\n**檢查（關鍵！）**：\n\n### 1. Single-leg Heel Raise Test（單腳墊腳尖測試）\n- **最重要的檢查**\n- 正常：墊腳時 heel 會 invert（向內轉）\n- **PTTD：heel 不 invert 或無法完全墊腳**\n- 早期：墊腳但痛\n- 中期：**完全無法單腳墊腳**（特異性高）\n- 選項 (D) ✓ 「步態缺乏 heel lift」= 無法墊腳尖\n\n### 2. Too Many Toes Sign\n- 從後方觀察\n- 正常：1-2 根腳趾可見於外側（小腿外）\n- **PTTD：> 2 根可見**（前足外展）\n- 表示 forefoot abduction\n\n### 3. 內側足弓塌陷\n- 站立時觀察\n- 早期：動態塌陷\n- 晚期：結構性塌陷\n\n### 4. 後足 valgus（heel valgus）\n- 後方觀察，腳跟向外偏\n\n## 鞋子磨損模式\n\n**PTTD / Flatfoot 鞋底磨損**：\n- **內側過度磨損**（medial wear）\n- 因為 overpronation\n- 選項 (C) 說「外側過度磨損」**錯誤**\n- 「外側磨損」是**高足弓（pes cavus）** 的典型鞋底\n\n## 治療\n\n### 保守（Stage I-II）\n- **Rest、冰敷、NSAIDs**\n- **Orthotic**：\n  - 內側足弓支撐（medial arch support）\n  - Medial heel wedge\n  - UCBL（University of California Biomechanics Laboratory）腳托\n- **PT**：\n  - **Tibialis posterior strengthening**\n  - **Foot inversion exercises**（不是外展！）\n  - 關鍵：**eccentric heel raise**（從 heel raise 慢慢放下）\n  - 選項 (E) 說「前足外展訓練」錯誤（應為 inversion + adduction）\n- Bracing：AFO（Arizona brace、leather gauntlet）\n- 震波（ESWT）\n- PRP（有爭議）\n\n### 手術（Stage II-IV）\n- **Tendon debridement 或 reconstruction**（FDL transfer）\n- **Medializing calcaneal osteotomy**\n- **Subtalar / triple arthrodesis**（Stage III-IV）\n\n## 各選項總結\n\n**(A) ✗** 是**扁平足（pes planus）**的原因，不是高足弓\n\n**(B) ✗** 病灶在**內踝後下方 tendon 處**，不是 MTJ（小腿上方）\n\n**(C) ✗** 鞋底**內側過度磨損**（overpronation），外側磨損是高足弓\n\n**(D) ✓** Single heel raise 無法完成 = 「步態缺乏 heel lift」動作\n\n**(E) ✗** 應訓練 **inversion** 而非 abduction\n\n## 鑑別診斷\n\n### 內踝後方疼痛\n- **PTTD**（最常）\n- Tarsal tunnel syndrome\n- FDL 或 FHL tendinopathy\n- Medial calcaneal nerve entrapment\n- Medial ankle sprain\n- Stress fracture（medial malleolus、navicular）\n\n### 扁平足（flatfoot）\n- **PTTD**（成人後天）\n- **先天性 flatfoot**（兒童）\n- Tarsal coalition\n- 神經性（Charcot）\n- RA、Seronegative spondyloarthropathy\n- 外傷後\n\n## Flatfoot 類型\n\n**Flexible flatfoot**：\n- 站立時塌陷\n- 非負重時足弓恢復\n- 多為正常變異（兒童）\n- **Too many toes, heel valgus but reducible**\n\n**Rigid flatfoot**：\n- 任何時候都塌陷\n- 病理性\n- Stage III PTTD、tarsal coalition、外傷後\n\n## Pes Cavus（高足弓）\n\n對比 flatfoot：\n- 足弓過高\n- 鞋底**外側過度磨損**\n- Claw toes\n- 病因：\n  - 神經肌肉（Charcot-Marie-Tooth 最常見！）\n  - Friedreich ataxia\n  - Spina bifida\n  - Poliomyelitis（過去）\n  - 特發性\n- 症狀：外側踝不穩、metatarsalgia、足底痛",

      "detail": "**第五蹠骨骨折（Fifth Metatarsal Fractures）三大分類**：\n\n## Zone 分類（Torg / Lawrence classification）\n\n### Zone 1 — **Tuberosity Avulsion Fracture（撕脫骨折）**\n- **位置：最近端的 tuberosity**\n- **機轉：踝 inversion**（內翻扭傷時 peroneus brevis 拉扯）\n- 好發：所有年齡，特別踝扭傷\n- **血流佳**（近端、cancellous bone）\n- **癒合率高**\n- **治療：保守**\n  - Hard-soled shoe 或 walking boot\n  - **WBAT（weight bear as tolerated）**\n  - 6-8 週癒合\n  - **不需非負重 6-8 週**\n  - 不需手術（除非大位移）\n\n### Zone 2 — **Jones Fracture（Jones 骨折）**\n- **位置：metaphyseal-diaphyseal junction**\n- 機轉：側向應力、壓力\n- **血流差（watershed zone）**\n- **癒合率較低**（non-union 風險）\n- 治療：\n  - 保守（NWB cast）6-8 週 若運動員 / 活動度高 → 手術（IM screw）\n\n### Zone 3 — **Diaphyseal Stress Fracture（骨幹應力骨折）**\n- **位置：distal to metaphyseal-diaphyseal junction**\n- 機轉：反覆壓力\n- 運動員（籃球、足球）\n- **血流極差**\n- **高 non-union、delayed union 風險**\n- 治療：\n  - 運動員：多選手術（IM screw）\n  - 非運動員：保守 NWB cast 可試\n\n## 本題分析 — Zone 1 Tuberosity Avulsion\n\n### 解剖\n- **Peroneus brevis** 附著於**第五蹠骨 tuberosity（styloid process）**\n- **Lateral band of plantar fascia** 也附著在此（Dameron 理論）\n\n### 機轉\n- **踝內翻（inversion）受傷**\n- Peroneus brevis 是 **evertor**（抗內翻）\n- 內翻時 peroneus brevis 急速收縮以阻止扭傷\n- 張力 > 骨附著處強度 → **撕脫骨折**\n\n選項 (A) ✓\n\n### 位置\n- **Tuberosity（第五蹠骨基底最近端）**\n- **不是** metaphyseal-diaphyseal junction（那是 Zone 2 Jones）\n\n選項 (B) ✗（那是 Jones fracture 的位置）\n\n### 血流 / 癒合\n- **Tuberosity 血流佳**（近端、松質骨、多血管）\n- **容易癒合**\n- 非 union 罕見（除非位移極大）\n\n選項 (C) ✗（血流佳、容易癒合）\n\n### 治療與負重\n- **保守治療為主**\n- Hard-soled shoe、walking boot、或 short leg cast\n- **WBAT（耐受下可以負重）**\n- **不需 6-8 週 NWB**\n- 癒合時間：6-8 週\n- 回復運動：約 8-12 週\n\n選項 (D) ✗（可以 WBAT）\n\n### 手術適應症\n- 顯著位移（> 2-3 mm）\n- 關節內骨折 > 30%\n- 不癒合\n- 選項 (E) ✗（**不需** routine 手術）\n\n## 各 Zone 比較表\n\n| 項目 | Zone 1（Avulsion） | Zone 2（Jones） | Zone 3（Stress） |\n|---|---|---|---|\n| 位置 | Tuberosity | Meta-diaphyseal junction | Diaphysis |\n| 機轉 | 踝 inversion | 急性側向力 | 反覆壓力（overuse） |\n| 族群 | 一般人 + 運動員 | 運動員、變向運動 | 運動員、長跑者 |\n| 血流 | 佳 | 差 | 極差 |\n| 癒合率 | 高 | 中 | 低 |\n| **治療** | **保守 + WBAT** | 保守 (NWB) / 手術 | 多數手術 |\n| 典型療程 | 6-8 週 | 8-12 週或更久 | 手術 + 6 週 |\n\n## 鑑別診斷（第五蹠骨基底疼痛）\n\n1. **Avulsion fracture**（本題）\n2. Jones fracture\n3. Stress fracture\n4. **Peroneus brevis insertional tendinopathy**\n5. Apophysis（兒童：Iselin disease）\n6. **未融合的 apophysis**（normal variant，需 X-ray 對比）\n\n## 臨床診斷關鍵\n\n**病史**：\n- 踝扭傷後外側足痛\n- 痛在第五蹠骨基底（不是外踝）\n- 無法負重\n\n**檢查**：\n- 第五蹠骨基底壓痛\n- **外踝 + 第五蹠骨基底**是踝扭傷後都要檢查的位置\n- Ottawa Ankle Rules 納入\n\n**影像**：\n- X-ray（AP、lateral、oblique）\n- 撕脫骨折通常清楚可見\n- Jones fracture 可能需要 oblique view\n- Stress fracture 早期可能無 X-ray findings → bone scan / MRI\n\n**Ottawa Ankle Rules**：\n踝扭傷後，以下情況需 X-ray：\n- 踝疼痛 + malleolar zone：**外/內踝 tip 痛** 或 **後方 6 cm 內骨壓痛**\n- 足疼痛 + midfoot zone：**navicular** 或 **第五蹠骨基底**\n- 無法負重（受傷當下 + ER 都無法走 4 步）\n\n## 特殊情況\n\n### 兒童：Iselin Disease\n- **Fifth metatarsal 基底的 apophysis 的 traction apophysitis**\n- 8-13 歲青少年\n- 類似 Osgood-Schlatter 的概念\n- 治療：休息、冰敷、改變活動\n\n### 兒童 vs 成人鑑別\n- 兒童 apophysis 呈 **平行於骨幹的線**\n- 骨折呈 **垂直於骨幹的線**\n- 雙側 X-ray 對照有幫助\n\n## 典型 X-ray 報告描述\n\n**Zone 1 avulsion fracture**：\n- 「Fracture through the proximal tuberosity of the fifth metatarsal, with a fracture line that is transverse / oblique to the shaft, minimally displaced」\n\n**Jones fracture**：\n- 「Fracture at the metaphyseal-diaphyseal junction of the fifth metatarsal」\n\n**Stress fracture**：\n- 「Periosteal reaction / cortical thickening / fracture line in the proximal diaphysis」",

      "detail": "**頸因性頭痛（Cervicogenic Headache, CGH）**：\n\n## 定義與流行病學\n\n- **次發性頭痛**：源自頸部（上段頸椎 C1-C3）\n- 盛行率：約 1-4.6% 成人\n- 中年女性好發\n- **Sjaastad criteria（1990, 1998 修訂）** 或 **ICHD-3 criteria**\n\n## 病理機轉\n\n**Trigeminocervical Nucleus Convergence**：\n- **C1-C3 感覺纖維**與**三叉神經 V1 分支**在腦幹 converge\n- 頸部 afferent input → 在**三叉神經脊束核**上被知覺為頭痛\n- 這是頸因性頭痛的神經解剖基礎\n\n**可能源頭**：\n- C2-C3 facet joint\n- C1-C2 atlantoaxial joint\n- Upper cervical discs\n- Sub-occipital muscles\n- Greater occipital nerve\n- 頸椎韌帶\n\n## 臨床表現\n\n### 疼痛特徵\n- **單側為主**（但可以雙側）\n- **起始於後枕部、上頸部**\n- **可擴散至同側顳部、前額、眼後、頂部、肩帶**\n- **中等強度**（不如 migraine 或 cluster 劇烈）\n- **非搏動性**（mild throbbing 可能但非主要）\n- 穩定 / dull ache 為主\n\n### 發作時間\n- **變異大：可從幾小時到持續數天**\n- **常為持續性、慢性**\n- **常比偏頭痛「長」**（migraine 典型 4-72 小時）\n- 選項 (B) 說「發作時間短於偏頭痛」**錯誤**\n\n### 誘發因素\n- **頸部動作**：\n  - Axial rotation（轉頭）\n  - Extension（後仰）\n  - Flexion\n  - 長時間姿勢（滑手機、閱讀、工作）\n- 壓迫 trigger points（sub-occipital、trapezius）\n- 枕神經壓迫\n\n### 伴隨症狀\n- **畏光、噁心較少**（vs migraine）\n- 可能有肩頸痠痛\n- 同側手臂痠痛（若合併下頸椎神經根病變）\n- 視力模糊（偶爾）\n- 頭暈（偶爾）\n- **無光環、無嘔吐**（典型偏頭痛有）\n\n## 診斷標準（ICHD-3）\n\n1. 頭痛符合 C 項\n2. **有頸椎疾病 / 病變的臨床、影像證據**\n3. **證據顯示頭痛為頸部病變引起**：\n   - 與頸部病變發生時間吻合\n   - 頸部改善則頭痛改善\n   - 頸椎 ROM 減少\n   - 頸部動作 / 姿勢誘發\n   - **Diagnostic anesthetic block** 可暫時消除頭痛\n4. 非其他 ICHD-3 診斷\n\n## 鑑別診斷\n\n| 特徵 | **Cervicogenic** | **Migraine** | **Cluster** | **Tension** |\n|---|---|---|---|---|\n| **起始位置** | **後枕、頸部** | 顳部、眶上 | 眶後、顳部 | 雙側、整個頭 |\n| **側別** | 單側為主 | 單側或雙側 | **絕對單側** | 雙側 |\n| **性質** | **Dull、穩定** | **搏動** | **尖銳、刺痛** | 壓迫、緊箍 |\n| **強度** | 中等 | 中-嚴重 | **極嚴重** | 輕-中等 |\n| **時間** | **變異大（小時-天，持續）** | 4-72 小時 | 15-180 分鐘（一天多次） | 30 分-7 天 |\n| **誘發** | **頸動作** | 多因子（食物、壓力、激素） | 酒精、硝酸甘油 | 壓力、姿勢 |\n| **畏光噁心** | **少見** | **顯著** | 少見 | 少見 |\n| **自律神經症狀** | 無 | 有時 | **顯著**（紅眼、流淚、鼻塞 同側） | 無 |\n| **性別** | 女 > 男 | 女 >> 男 | 男 > 女 | 女 > 男 |\n\n## 影像學檢查\n\n### 頸椎 X-ray\n- **AP view + lateral view + open-mouth view（odontoid）+ oblique**\n- **Flexion-extension views**：評估穩定性（外傷後）\n- **Open-mouth view** 看 C1-C2、odontoid、transverse process\n- 看：\n  - 骨折（特別 C1、C2 odontoid）\n  - Degenerative changes\n  - Subluxation\n  - Instability\n  - Alignment\n\n### MRI\n- 軟組織、disc、spinal cord 評估\n- 對 atlantoaxial instability、disc disease 敏感\n\n### CT\n- 骨性細節\n- 外傷排除\n\n選項 (E) 描述正確 ✓\n\n## 治療\n\n### 第一線\n- **PT**（物理治療）：\n  - Cervical ROM、stretching、strengthening\n  - Posture correction\n  - Manual therapy\n  - 核心訓練\n- 姿勢矯正\n- Ergonomic 調整（工作站、手機使用）\n- Ice / heat\n\n### 藥物\n- NSAIDs\n- Muscle relaxants（短期）\n- TCA、SNRI（慢性）\n- **三叉神經 / 枕神經 block**（診斷 + 治療）\n\n### Interventional\n- **Occipital nerve block**（greater、lesser、third occipital）\n- **C2-C3 facet block / medial branch block**\n- **Radiofrequency ablation**\n- Occipital nerve stimulation（refractory）\n\n### 手術（少用）\n- C2-C3 fusion（特定病例）\n\n## 各選項總結\n\n**(A) ✓** 疼痛分布：後枕起始 → 延伸多部位\n\n**(B) ✗** CGH **發作時間多較長**（持續性），不短於偏頭痛\n\n**(C) ✓** 中等強度、非搏動性\n\n**(D) ✓** 頸部動作誘發是重要診斷線索\n\n**(E) ✓** 外傷後完整 X-ray（含 open-mouth、flexion-extension）\n\n## 紅旗徵兆（Red Flags for headache）\n\n需要進一步檢查：\n- **突然劇烈頭痛**（thunderclap → SAH）\n- 漸進性加劇\n- 神經學缺損（偏癱、視力、意識）\n- 發燒、僵頸（meningitis）\n- 年齡 > 50 新發頭痛\n- 癌症病史\n- HIV\n- 免疫抑制\n- 外傷\n- **頸因性頭痛通常無紅旗**（但需排除）\n\n## Post-traumatic Headache\n\n- 外傷後常見\n- 可能是 CGH、migraine-like、tension-like 或 mixed\n- Post-concussion syndrome 一部分\n- 需排除：\n  - 骨折（C-spine 7 view X-ray）\n  - Intracranial injury（CT head）\n  - Cervical artery dissection（MRA）\n- 治療：類似 CGH + 適當運動復健",

      "detail": "**椎弓解離 (Spondylolysis) 概述**：\n\n## 解剖\n\n- **Pars interarticularis（椎弓峽部）**：上、下關節突之間\n- **最常發生於 L5**（~ 85-95%）\n- 其次 L4（~ 5-15%）\n- 可單側或雙側\n- 雙側 → 可能進展為 **spondylolisthesis（脊椎滑脫）**\n\n## 病因\n\n**壓力性骨折（stress fracture）為主**：\n- 反覆腰椎 **extension + rotation**（上半身扭轉加後仰）\n- 好發運動：\n  - **體操**\n  - **舞蹈**\n  - **棒球（投手）**\n  - **排球、網球**\n  - **足球（守門員）**\n  - **舉重、划船**\n- 青少年運動員（骨骼未成熟）特別脆弱\n- 遺傳因素（家族史）\n\n**盛行率**：\n- 一般人口：約 3-6%\n- 運動員：可高達 30-50%（特定項目）\n\n## 臨床表現\n\n- **下背痛**（最常）\n- **腰椎伸展時加劇**\n- 休息緩解\n- 可能向臀部輻射\n- **無神經學缺損**（除非嚴重 spondylolisthesis）\n- Single-leg hyperextension test（+）：單腳站立後仰\n- Hamstring tightness 常見\n\n## 自然史\n\n**(B) ✓ 大部分椎弓骨折發生於兒童早期且無症狀**：\n- 首次骨折常在 **6-10 歲**（Beutler 研究）\n- 兒童期運動、過度活動\n- **多數無症狀**\n- 青少年時期運動才顯現症狀\n- 這解釋為何「大部分無症狀」的敘述正確\n\n## 影像學（重要！）\n\n### X-ray\n\n**選項 (D) 的爭議**：\n- 傳統教學：**Oblique view 的 \"Scottie dog\" sign** 是經典\n  - Scottie dog 頸部（pars）斷裂 = spondylolysis\n- 但現代研究顯示：\n  - Oblique view **增加輻射但診斷價值有限**\n  - 多數可疑病例 X-ray 陰性\n  - **Sensitivity 不如預期好**\n- **2020s 指引建議**：**2 view（AP + Lateral）**為主，不再常規加 oblique\n\n### MRI（首選）\n- **早期骨髓水腫**（stress reaction）\n- 無輻射、對青少年友善\n- 看軟組織、神經壓迫\n- **可檢出 X-ray 看不到的早期 stress injury**\n- 現代首選\n\n### CT\n- 骨性細節最清楚\n- 確認診斷、分期\n- 評估癒合\n- 但有輻射（青少年考量）\n\n### Bone scan / SPECT\n- 對 early stress injury 敏感\n- SPECT > planar bone scan\n- 偵測「活動性」（新鮮 vs 陳舊）\n\n## 分期（Morita classification）\n\n| Stage | 影像 | 癒合機會 |\n|---|---|---|\n| **Early（pre-lytic）** | MRI 骨髓水腫 / bone scan (+)、CT 正常 | **高**（70-90%） |\n| **Progressive** | CT 可見線狀低密度 | 中 |\n| **Terminal（chronic）** | CT 可見完整斷裂、硬化邊緣 | **低** |\n\n## 治療\n\n### 保守治療（首選）\n\n**核心原則**：\n1. **Activity restriction（活動限制）**：\n   - 避免引起疼痛的活動\n   - 通常 **休息 3-6 個月**\n   - 引起症狀的運動 retire（至少暫時）\n2. **物理治療**：\n   - 核心肌群訓練\n   - Hamstring stretching\n   - 腰椎 flexion-based exercises（避免 extension）\n   - 姿勢矯正\n3. **NSAIDs**（短期）\n\n### Bracing（有爭議）\n\n**傳統做法**：\n- Anti-lordotic brace（Boston brace）\n- 持續 3-6 個月\n- 每天 18-23 小時\n\n**現代研究**：\n- **Klein et al. 2009 meta-analysis**：\n  - **Bracing vs no bracing：無顯著差異**\n  - 癒合率都約 60-70%\n  - 症狀改善類似\n- **Selhorst et al. 2015**：類似結論\n- **Alqarni et al. 2015**：activity restriction 效果類似 bracing\n\n**Bracing 的問題**：\n- 肌肉萎縮\n- 青少年心理影響\n- 依從性差\n- 成本\n- **並不比單純活動調整好**\n\n**選項 (E) 「bracing 比單純休息更有效」錯誤**\n\n### 回復運動\n- 症狀消失 + 核心強壯後\n- 漸進式回復\n- 約 3-6 個月\n- 早期骨折癒合率較高\n- 慢性骨折（non-union）也可能無症狀回運動\n\n### 手術\n- **保守治療失敗 6-12 個月**\n- 持續症狀、失能\n- 方法：\n  - Direct repair of pars defect（保留運動節）\n  - Fusion（若已有明顯 spondylolisthesis）\n\n## Spondylolisthesis（脊椎滑脫）\n\n**定義**：上椎體相對下椎體向前滑動\n\n**Wiltse 分類**：\n1. **Dysplastic（先天）**\n2. **Isthmic（pars 缺損）** ← spondylolysis 造成\n3. **Degenerative（退化）**：老年常見，L4-L5\n4. **Traumatic**\n5. **Pathologic**（腫瘤、感染）\n6. **Post-surgical**\n\n**Meyerding Grade**（滑脫程度）：\n- Grade I：< 25%\n- Grade II：25-50%\n- Grade III：50-75%\n- Grade IV：75-100%\n- Grade V（spondyloptosis）：100%（完全滑下）\n\n**治療原則**：\n- Grade I-II：大多保守\n- Grade III-IV：考慮手術（特別青少年）\n- Neurological deficit：手術\n\n## 青少年運動員的其他下背痛鑑別\n\n- **Spondylolysis / spondylolisthesis**（本題）\n- Disc herniation（較年輕人少見，但仍會）\n- Scheuermann's disease（青少年脊椎後凸）\n- Stress fracture（其他部位）\n- Sacroiliac joint dysfunction\n- Apophysitis\n- 脊椎腫瘤（osteoid osteoma 等罕見）\n- 感染（discitis）\n\n## 紅旗徵兆（要進一步檢查）\n\n- 夜間痛、休息痛\n- 發燒、體重下降\n- 神經學缺損\n- 膀胱 / 腸道問題\n- 持續 > 4 週不緩解\n\n## 各選項總結\n\n**(A) ✓** Pars interarticularis = isthmus 解剖正確\n\n**(B) ✓** 多兒童早期且無症狀\n\n**(C) ✓** 青少年運動員常見原因，extension-rotation 運動好發\n\n**(D) ✓** X-ray 診斷限制存在，但選項「oblique view 可以顯示缺損，然而並無法有效提升敏感度」描述了一個爭議點 — 現代研究支持這個說法\n\n**(E) ✗** Bracing **並未優於單純活動限制**",

    "explanation": {
      "summary": "(C) 錯誤關鍵字在「extensor carpi radialis **longus**（ECRL）」。外上髁病變主要侵犯的是 **extensor carpi radialis BREVIS（ECRB，橈側伸腕短肌）**的起點，而非 ECRL。ECRB 在橈側伸腕運動中承受最大機械應力，是退化性肌腱病的主責肌腱。",
      "detail": "**肱骨外上髁病變 (Lateral Epicondylopathy / 「網球肘」)**\n\n## 解剖學重點（常考）\n\n共同伸肌腱（common extensor tendon）附著於肱骨外上髁，由淺至深包括：\n- **ECRL（extensor carpi radialis longus）**：起點在外上髁**上方** supracondylar ridge，並非真正的「共同伸肌起點」\n- **ECRB（extensor carpi radialis brevis）** ★ 主要病灶\n- **EDC（extensor digitorum communis）** 次常侵犯\n- **ECU（extensor carpi ulnaris）**\n- **Anconeus**\n\n**為什麼是 ECRB 受影響最多？**\n- 肘伸直時，ECRB 被橈骨頭 capitellum **撞擊（impingement）**\n- 抓握動作時 ECRB 承受最大張力\n- 血流供應相對差的區域\n- Nirschl 解剖學研究證實：主要病變位於 **ECRB 深面的起點**\n\n## 病理（重要概念 → (B) 正確）\n\n**非發炎性退化** — Nirschl 稱為「**angiofibroblastic hyperplasia / tendinosis**」：\n- 膠原蛋白紊亂\n- 不成熟的纖維母細胞與血管增生\n- **無慢性發炎細胞**\n- → 命名應為「tendinopathy / tendinosis」而非「tendinitis / epicondylitis」\n\n## 流行病學\n\n- 好發 **35-55 歲**，峰值 40-50 歲\n- **盛行率 1-3%**（一般人口）\n- 網球運動員只佔 5-10%，**多數非網球運動員**\n- 危險因子：重複性手腕伸展 + 旋後、抓握、震動\n\n## 臨床表現\n\n- 外上髁壓痛（距離外上髁遠端 1 cm ECRB 起點處最痛）\n- **Cozen's test**：阻抗手腕伸展誘發疼痛\n- **Mill's test**：手腕被動屈曲、前臂旋前誘發疼痛\n- **Maudsley's test**：阻抗第三指伸展誘發疼痛（ECRB 測試）\n- 握力下降\n\n## 鑑別診斷\n\n- **Radial tunnel syndrome（後骨間神經纏套）**：痛點較遠端（外上髁遠端 4-5 cm）、無明顯運動無力\n- 頸神經根病變（C6-7）\n- 外側韌帶撕裂\n- Posterolateral rotatory instability\n- 橈肱關節炎\n- Plica syndrome\n\n## 治療金字塔\n\n### 第一線（保守治療）\n- **活動調整**、避免誘發動作\n- **Counterforce brace**（下方 2-3 指幅處，減少 ECRB 張力）\n- NSAIDs（短期）\n- **離心運動（eccentric exercise）** ← (D) 正確\n  - Tyler twist（使用 Thera-Band FlexBar）\n  - 最強證據，和向心 + 拉伸相比，離心更有效\n- 物理治療（超音波、雷射、按摩）\n\n### 第二線\n- **體外震波治療（ESWT）** ← (E) 正確，成功率 40-70%\n- **PRP（platelet-rich plasma）** 注射：近年研究支持\n- **局部類固醇注射**：\n  - 短期（< 6 週）有效\n  - **長期（6-12 個月）結果反而較差**（Coombes 2013 JAMA）\n  - 目前不是首選\n- **Prolotherapy**（增生療法）\n- **Autologous blood injection**\n\n### 第三線\n- 手術：**Nirschl procedure**（清除 ECRB 退化組織）\n- 適應：保守治療 6-12 個月失敗\n- 成功率 85-90%\n\n## 考點整理（選項分析）\n\n| 選項 | 正確性 | 關鍵 |\n|---|---|---|\n| (A) | ✓ | 好發 40-50 歲達峰值 |\n| (B) | ✓ | Tendinosis（退化）而非發炎 |\n| (C) | ✗ | 應為 **ECRB**，不是 ECRL |\n| (D) | ✓ | 離心訓練（Tyler twist）證據強 |\n| (E) | ✓ | ESWT 成功率 40-70% |\n\n## 命名的演變（考前記憶）\n\n- 舊：tennis elbow → lateral epicondylitis\n- 新：**lateral epicondylosis / epicondylopathy / ECRB tendinopathy**\n- 因為是退化而非發炎",

    "explanation": {
      "summary": "(E) 錯誤在「術後恢復更快」。TFCC 依 Palmer 分類分為中央（1A, central）與周邊（1B-1D, peripheral）撕裂。**周邊（peripheral）撕裂因血流供應豐富，適合手術修補且有癒合潛力；中央（central）撕裂因無血管供應，多半只能清創，恢復時間較短**。「周邊恢復更快」說法相反。",
      "detail": "**三角纖維軟骨複合體 (TFCC)**\n\n## 解剖學\n\nTFCC 是腕關節尺側的主要穩定構造，包含：\n1. **Articular disc（關節盤）** ← 中央部分\n2. **Meniscus homologue**\n3. **Dorsal and volar radioulnar ligaments**\n4. **Ulnar collateral ligament**\n5. **ECU tendon sheath**（尺側伸腕肌腱鞘）\n6. **Ulnotriquetral ligament、Ulnolunate ligament**\n\n## 血流供應（決定癒合潛力！關鍵考點）\n\n| 區域 | 血流 | 癒合能力 |\n|---|---|---|\n| **周邊 15-20%** | **有**（來自橈動脈與尺動脈分支） | **可修補** |\n| **中央 80%** | **無血管** | **只能清創，不可修補** |\n\n→ 這就是為什麼「**peripheral tears 手術反應好**」— 因為可以修補；**central tears 無法修補**，術後功能雖恢復，但 TFCC 的支撐結構已失去一部分。\n\n## Palmer 分類（常考）\n\n### Class 1 — Traumatic（外傷性，年輕人）\n- **1A**：Central perforation（中央穿孔）→ debridement\n- **1B**：Ulnar avulsion（可能合併 ulnar styloid fracture）→ **repair**\n- **1C**：Distal avulsion（UT/UL 韌帶）→ repair\n- **1D**：Radial avulsion（橈骨附著處）→ repair\n\n### Class 2 — Degenerative（退化性，老年人）\n- **2A-2E**：漸進性退化（與 **ulnar positive variance** 相關）\n  - 2A：TFCC 磨損，無穿孔\n  - 2B：+ Lunate/ulnar chondromalacia\n  - 2C：TFCC 穿孔 + chondromalacia\n  - 2D：+ LT ligament 撕裂\n  - 2E：+ ulnocarpal arthritis\n\n## Ulnar Variance（尺側變異）\n\n- **Neutral variance**：橈骨尺骨遠端等長\n- **Positive variance**：尺骨突出 → 負重從 ~20% 增加至 **40-60%**\n- **Negative variance**：尺骨較短 → 可能與 Kienböck's disease 相關\n\n**尺骨減短手術（ulnar shortening osteotomy）**：\n- 適應：symptomatic ulnar impaction + ulnar positive variance\n- 目標：轉為 neutral 或 slightly negative variance\n- 常與 TFCC debridement 合併施行 ← (D) 正確\n\n## 臨床診斷\n\n### 疼痛位置\n- **Ulnar-sided wrist pain**\n- 壓痛點：**Fovea sign**（在 ECU 與 FCU 之間、尺骨頭遠端的凹陷處）→ 敏感度 95%、特異度 87%\n\n### 理學檢查\n- **TFCC compression test**（axial loading + ulnar deviation + rotation）\n- **Piano key sign**（DRUJ 不穩定）\n- **Ulnocarpal stress test**\n- **Press test**（從椅子站起手腕負重誘發疼痛）\n\n### 影像\n- X-ray：評估 ulnar variance（standard PA, neutral rotation）\n- **MRI（或 MR arthrogram）**：首選\n- **Arthroscopy**：gold standard\n\n## 治療\n\n### 保守治療（先嘗試 3-6 個月）\n- 副木（sugar-tong 或 Munster splint）\n- NSAIDs\n- 活動調整\n- 類固醇注射\n- 急性外傷：4-6 週石膏固定 + 前臂 neutral 位置\n\n### 手術\n- **Central tears (1A, 2C)**：**Debridement**（不是 repair）\n- **Peripheral tears (1B, 1C, 1D)**：**Repair**\n- **Ulnar positive variance + degenerative**：Ulnar shortening\n- **Chronic DRUJ instability**：TFCC reconstruction\n\n## 考點比較：哪一類才「術後恢復快」？\n\n| 類型 | 手術 | 術後恢復 |\n|---|---|---|\n| Central (1A) | Debridement（清創） | **較快**（僅移除邊緣） |\n| Peripheral (1B-1D) | Repair（縫合） | **較慢**（需保護 6-8 週） |\n\n→ **(E) 說「peripheral 恢復比 central 快」完全相反**。\n\n周邊撕裂雖然**癒合潛力好**，但由於是縫合術，需要更長的保護期（通常 6 週固定 + 漸進復健，總共 3-6 個月才能完全回運動）；中央撕裂僅清創，通常 2-4 週即可恢復活動。",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 41 \"Musculoskeletal Disorders of the Upper Limb\"", "url": null },
        { "text": "Palmer AK. Triangular fibrocartilage complex lesions: a classification. J Hand Surg Am 1989;14:594", "url": "https://pubmed.ncbi.nlm.nih.gov/2666492/" },
        { "text": "Sachar K. Ulnar-sided wrist pain: evaluation and treatment of triangular fibrocartilage complex tears, ulnocarpal impaction syndrome, and lunotriquetral ligament tears. J Hand Surg Am 2012;37:1489", "url": "https://pubmed.ncbi.nlm.nih.gov/22721463/" },
        { "text": "Tay SC et al. The \"ulnar fovea sign\" for defining ulnar wrist pain: an analysis of sensitivity and specificity. J Hand Surg Am 2007;32:438", "url": "https://pubmed.ncbi.nlm.nih.gov/17398352/" }
      ]
    }

    "question": "下列有關髖關節夾擠症候群（femoroacetabular impingement, FAI）之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "是指股骨頭頸交界處（head-neck junction）與髖臼邊緣（acetabular rim）發生撞擊的狀況，可能導致軟骨損傷並進一步惡化為骨關節炎" },
      { "key": "B", "text": "可分為兩種主要類型：凸輪型（cam）和鉗夾型（pincer），但多數病人可能同時具有兩種類型的特徵" },

      { "key": "D", "text": "會緩慢出現腹股溝疼痛，且在活動後加劇，尤其在髖關節屈曲（flexion）和外旋（external rotation）時更明顯" },
      { "key": "E", "text": "通常採用保守治療，包括活動調整、非類固醇消炎藥（NSAIDs）和物理治療，而手術治療主要目的為矯正結構性病變" }
    ],
    "answer": "D",
    "explanation": {
      "summary": "(D) 錯誤在「flexion + external rotation」。FAI 誘發疼痛的典型動作是 **屈曲（flexion）+ 內收（adduction）+ 內旋（internal rotation）**，即 **FADIR test / anterior impingement test**。外旋反而會打開關節空間，不會引發夾擠。",
      "detail": "**髖關節夾擠症候群 (Femoroacetabular Impingement, FAI)**\n\n## 定義與機轉\n\nFAI 是股骨頭頸交界處與髖臼邊緣在髖關節活動過程中產生異常接觸（夾擠），長期導致軟骨與盂唇損傷，最終發展為髖關節退化性關節炎。\n\n**三大類型**：\n\n### 1. Cam type（凸輪型，股骨側）\n- 股骨頭頸交界處 asphericity（球形度不足），常在**前上方**\n- 屈曲時，額外的骨質撞入髖臼，剪切軟骨\n- **男性、年輕運動員**好發\n- 軟骨損傷在前上髖臼，典型破壞模式：**delamination**（軟骨與骨分離）\n- 影像：**alpha angle > 55°**（Nötzli angle）\n\n### 2. Pincer type（鉗夾型，髖臼側）\n- 髖臼覆蓋過多（over-coverage）\n- 原因：\n  - **Coxa profunda**（髖臼過深）\n  - **Protrusio acetabuli**\n  - **Acetabular retroversion**（逆轉）→ crossover sign\n- 髖臼邊緣直接撞擊股骨頸\n- **中年女性**好發\n- 盂唇受壓 → 退化、鈣化\n\n### 3. Mixed type（混合型）\n- **最常見**（> 70%）← (B) 正確\n\n## 盂唇撕裂與 FAI\n\n選項 (C) ✓：**79% 的盂唇撕裂**合併某種形式的骨骼異常（Wenger 2004），這個數字是常考的。FAI 是已知最主要的非創傷性盂唇撕裂原因。\n\n## 臨床表現\n\n### 疼痛特徵\n- **腹股溝痛**（C-sign：病人用 C 型手勢指髖部前外側）\n- 漸進性，初期僅運動後酸痛\n- 進展後日常活動疼痛\n- 久坐後起立、上下車困難\n\n### 誘發動作（★ 關鍵考點）\n**FADIR test（anterior impingement test）**：\n- **F**lexion（屈曲 90°）\n- **AD**duction（內收）\n- **I**nternal **R**otation（內旋）\n- → 誘發腹股溝痛為 (+)\n- 敏感度高（95%），特異度較低\n\n**FABER test**：\n- Flexion + Abduction + External Rotation\n- → 多用於 SI joint 與後側病灶，不是 FAI 主要測試\n\n**(D) 選項錯誤說明**：FAI 疼痛在 **屈曲 + 內旋** 時加劇，**不是外旋**。外旋會開啟關節空間，緩解 cam type 的夾擠。\n\n## 影像\n\n### X-ray\n- AP pelvis + Dunn view（45° 或 90°）+ lateral\n- Cam：alpha angle > 55°、**pistol grip deformity**\n- Pincer：**crossover sign**、coxa profunda、lateral center-edge angle > 40°\n\n### MRI / MRA（gold standard）\n- 評估盂唇撕裂\n- 軟骨損傷\n- Alpha angle 測量\n\n## 治療\n\n### 保守治療（第一線）\n- **活動調整**（避免 deep flexion, prolonged sitting）\n- NSAIDs\n- **物理治療**：\n  - 髖部深層旋轉肌強化\n  - 核心肌群\n  - 改善動作模式\n  - 避免 end-range flexion/IR\n- 關節內類固醇注射（診斷兼治療）\n\n### 手術（保守治療失敗 → 結構矯正）\n- **髖關節鏡（hip arthroscopy）**\n- Cam 類型：**Femoroplasty / osteochondroplasty**（重塑股骨頭頸交界）\n- Pincer 類型：**Rim trimming**（修整髖臼邊緣）\n- 盂唇：**Repair（首選）or debridement**\n- 年輕活躍患者效果佳\n\n## 考點總結\n\n| 類型 | 結構異常 | 好發族群 | 誘發動作 |\n|---|---|---|---|\n| Cam | 股骨 head-neck 不夠圓 | 年輕男性運動員 | Flexion + IR |\n| Pincer | 髖臼覆蓋過多 | 中年女性 | Flexion + IR（較深角度） |\n| Mixed | 兩者都有 | 最常見 | Flexion + IR |\n\n★ 記憶口訣：**FADIR**（Flexion + ADduction + Internal Rotation）= 前方夾擠 = FAI",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 42 \"Musculoskeletal Disorders of the Lower Limb\"", "url": null },
        { "text": "Wenger DE et al. Acetabular labral tears rarely occur in the absence of bony abnormalities. Clin Orthop Relat Res 2004;426:145", "url": "https://pubmed.ncbi.nlm.nih.gov/15346066/" },
        { "text": "Ganz R et al. Femoroacetabular impingement: a cause for osteoarthritis of the hip. Clin Orthop Relat Res 2003;417:112", "url": "https://pubmed.ncbi.nlm.nih.gov/14646708/" },
        { "text": "Griffin DR et al. The Warwick Agreement on femoroacetabular impingement syndrome (FAI syndrome): an international consensus statement. Br J Sports Med 2016;50:1169", "url": "https://pubmed.ncbi.nlm.nih.gov/27629403/" },
        { "text": "UpToDate: Femoroacetabular impingement", "url": "https://www.uptodate.com/contents/approach-to-hip-and-groin-pain-in-the-athlete-and-active-adult" }
      ]

    "id": "114-1-104",

    "category": "肌骨疾病",
    "question": "下列有關髕骨股骨疼痛（patellofemoral pain）之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "髕骨通常向外側脫位，若反覆脫位則需要考慮內側臏骨股骨韌帶（medial patellofemoral ligament, MPFL）撕裂" },
      { "key": "B", "text": "股外側肌（vastus lateralis, VL）和股內側斜肌（vastus medialis obliquus, VMO）應協同作用，若 VMO 在運動中較晚啟動會導致髕骨半脫位或脫位" },
      { "key": "C", "text": "當深蹲做髖部等長內收的動作時中，開放鏈（open kinetic chain）復健對於啟動股內側斜肌（vastus medialis obliquus, VMO）有更好的效果" },
      { "key": "D", "text": "治療方式可使用貼紮或護具，以輔助髕骨的穩定，並減輕疼痛" },
      { "key": "E", "text": "如果有足部過度內旋（overpronation）的問題，可使用足弓支撐墊來輔助矯正" }
    ],
    "answer": "C",
    "explanation": {
      "summary": "(C) 錯誤的關鍵在「深蹲 + 髖部等長內收」**本身就是閉鎖鏈（closed kinetic chain, CKC）動作**。深蹲時腳接觸地面，遠端固定，屬於 CKC。此外大量研究（Escamilla, Powers 等）支持 **CKC（尤其合併髖部強化）比 OKC 更能有效啟動 VMO 且更符合功能需求**，因此敘述本身矛盾且方向相反。",
      "detail": "**髕骨股骨疼痛症候群 (Patellofemoral Pain Syndrome, PFPS)**\n\n又稱 「runner's knee」或「anterior knee pain」，是門診最常見的膝痛原因之一，特別是年輕女性、跑者與青少年運動員。\n\n## 病因學（多因素）\n\n### 結構因素\n- **Q-angle 增加**（女性 > 男性）\n- **Patella alta**（高位髕骨）\n- **Trochlear dysplasia**\n- **Tight lateral retinaculum**\n- **Weak VMO**\n- **Iliotibial band tightness**\n\n### 動力學因素\n- **髖部外展/外旋肌無力**（最重要的近端因素！）\n  - → 動態 knee valgus\n  - → 髕骨外側受力增加\n- **足過度內旋（overpronation）** → tibia internal rotation → 增加 Q-angle → (E) 正確\n- **Hamstring / Gastrocnemius tightness**\n\n## 臨床表現\n\n### 疼痛特徵\n- 膝前疼痛，位置模糊（不是點狀痛）\n- **上下樓梯、蹲下、久坐（theater sign）加劇**\n- 運動後酸痛\n- 可能合併摩擦音（crepitus）\n\n### 理學檢查\n- **Patellar grind test / Clarke's test**\n- **Patellar apprehension test**（懷疑 MPFL 損傷）\n- 評估 Q-angle、足部姿態、髖外展肌力\n\n## 關鍵解剖（MPFL 與髕骨穩定）\n\n- 髕骨穩定主要靠：\n  - **Medial patellofemoral ligament (MPFL)**：提供 **50-60% 的內側靜態穩定**\n  - VMO（動態穩定）\n  - Trochlear groove 形狀\n- **髕骨最常往外側脫位**（因為 Q-angle、股骨外側構造）← (A) 正確\n- 急性髕骨脫位 → MPFL 撕裂率 > 90%\n\n## VMO 與 VL 的時序失衡\n\nCowan 2001 等研究發現 PFPS 患者：\n- VMO 激活**延遲**於 VL\n- 正常人：VMO 與 VL 幾乎同步\n- → 髕骨在屈曲起始時被 VL 拉向外側\n- → 半脫位、疼痛 → (B) 正確\n\n## 開放鏈 vs 閉鎖鏈運動（★ 核心考點）\n\n### Open Kinetic Chain (OKC)\n- 遠端**自由**（不接觸地面）\n- 例：坐姿踢腿、腿伸展機\n- **PFPS 復健中 OKC 伸展 >30° 會增加髕股壓力**\n- 建議限制在 0-40°（最小髕股壓力）\n\n### Closed Kinetic Chain (CKC)\n- 遠端**固定**（接觸地面）\n- 例：**深蹲、弓箭步、靠牆蹲、登階**\n- **更符合功能（walking, stairs）**\n- **髕股壓力在屈曲 0-45° 最低**\n- **可合併髖部強化**（bridge, clamshell, hip abduction）\n\n### VMO 啟動\n- 過去認為「坐姿伸膝 + 等長內收」可選擇性啟動 VMO → 近年被質疑\n- **現代共識**：\n  - VMO 無法被選擇性獨立啟動\n  - **CKC + 髖部強化** 是首選\n  - **Squat 配合髖內收（squeeze a ball）**：有些研究支持，但屬於 CKC 而非 OKC\n\n**選項 (C) 錯誤原因**：\n1. 「深蹲 + 髖部等長內收」**本身就是 CKC 動作**，與 OKC 矛盾\n2. 主流文獻支持 **CKC（結合髖強化）比 OKC 更能啟動 VMO** 並降低髕股壓力\n3. 所以「OKC 對 VMO 啟動有更好效果」的敘述方向錯誤\n\n## 治療\n\n### 第一線（保守治療）\n1. **髖部強化**（外展、外旋）★ 近端控制\n2. **股四頭肌強化**（以 CKC 為主）\n3. **伸展 IT band、hamstring、gastrocnemius**\n4. **髕骨貼紮（McConnell taping）**或髕骨護具 → (D) 正確\n5. **足弓支撐墊**（if overpronation） → (E) 正確\n6. **活動調整**（減量、避免加劇動作）\n7. NSAIDs（短期）\n\n### 第二線\n- 類固醇注射（通常不建議）\n- PRP（證據不足）\n\n### 手術（反覆脫位）\n- **MPFL reconstruction**\n- Tibial tubercle osteotomy (TTO)\n- Lateral retinacular release\n\n## 考點整理\n\n| 介入 | 證據強度 |\n|---|---|\n| 髖外展 / 外旋強化 | **Strong** ★ |\n| CKC 股四頭強化 | Strong |\n| 髕骨貼紮 | Moderate |\n| 足弓墊 | Moderate（limited to overpronators） |\n| OKC 伸膝 | Limited（謹慎使用） |\n| 按摩 / 超音波 | Weak |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 42 \"Musculoskeletal Disorders of the Lower Limb\"", "url": null },
        { "text": "Powers CM. The influence of abnormal hip mechanics on knee injury: a biomechanical perspective. J Orthop Sports Phys Ther 2010;40:42", "url": "https://pubmed.ncbi.nlm.nih.gov/20118526/" },
        { "text": "Cowan SM et al. Delayed onset of electromyographic activity of vastus medialis obliquus relative to vastus lateralis in subjects with patellofemoral pain syndrome. Arch Phys Med Rehabil 2001;82:183", "url": "https://pubmed.ncbi.nlm.nih.gov/11239308/" },
        { "text": "Escamilla RF. Knee biomechanics of the dynamic squat exercise. Med Sci Sports Exerc 2001;33:127", "url": "https://pubmed.ncbi.nlm.nih.gov/11194098/" },
        { "text": "Collins NJ et al. 2018 Consensus statement on exercise therapy and physical interventions for patellofemoral pain. Br J Sports Med 2018;52:1170", "url": "https://pubmed.ncbi.nlm.nih.gov/29925502/" }
      ]
    }
  },
  {

    "question": "下列有關顳顎關節內部損傷 (internal derangement) 之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "是顳顎關節最常見疾病之一" },
      { "key": "B", "text": "早期症狀為關節疼痛及張嘴時關節發出卡搭聲 (clicking sound)" },
      { "key": "C", "text": "成因常為前端關節囊過度拉伸，致半月板前移" },

      "summary": "(C) 錯誤在「前端關節囊」。TMJ internal derangement 的成因是**後方關節囊（posterior attachment / retrodiscal tissue）被過度拉伸或鬆弛**，使得關節盤失去後方的約束，加上前方的**外側翼肌（lateral pterygoid）**上頭過度拉扯，導致關節盤**向前移位**。關鍵是「後方拉伸 + 前方拉扯 → 盤前移」，不是「前端關節囊拉伸」。",
      "detail": "**顳顎關節內部損傷 (TMJ Internal Derangement)**\n\n## 解剖學基礎\n\n顳顎關節由以下構造組成：\n- **Mandibular condyle**（下顎髁）\n- **Mandibular fossa**（顳骨關節窩）\n- **Articular disc**（關節盤 / meniscus）：雙凹（biconcave）結構，前薄後厚\n- **Capsule**（關節囊）\n- **Ligaments**：TM ligament、stylomandibular、sphenomandibular\n- **Lateral pterygoid muscle**：\n  - **Superior head**：附著於關節盤 → 拉盤向前\n  - **Inferior head**：附著於下顎髁 → 開口動作\n\n## 關節盤的正常位置與動作\n\n- 靜息：盤的**後方厚帶（posterior band）**位於髁的 **12 點鐘方向**\n- 開口：盤隨髁向前轉動（rotation）並滑動（translation）\n- 閉口：盤被**後方彈性組織（retrodiscal tissue，富含彈性纖維與血管神經）**拉回\n\n## Internal Derangement 機轉（★ 考點）\n\n### 真正的機轉：\n1. **Retrodiscal tissue（後方 bilaminar zone）拉伸、鬆弛**\n2. **Lateral pterygoid superior head 過度拉扯**\n3. → 關節盤**向前向內**移位（anterior medial displacement）\n4. 開口時髁跳過移位的盤 → **clicking**\n5. 如果盤不再能被「recapture」→ **closed lock**（張口受限）\n\n### 分期（Wilkes classification）\n| 期別 | 表現 | 影像 |\n|---|---|---|\n| I (Early) | 輕度 clicking，無疼痛 | 盤略前移，可 recapture |\n| II | Clicking + 間歇痛 | 盤前移，仍可 recapture |\n| III (Early intermediate) | 疼痛、頻繁 clicking、間歇 lock | Disc displacement with reduction (DDwR) |\n| IV (Late intermediate) | 長期慢性痛、**closed lock** | Disc displacement without reduction (DDwoR) |\n| V (Late) | Osteoarthritis, crepitus | 關節結構破壞 |\n\n## 為什麼 (C) 錯誤？\n\n選項 (C) 說「**前端關節囊過度拉伸**致半月板前移」\n\n**正確敘述應該是**：\n- **後方** retrodiscal tissue 拉伸鬆弛\n- **加上前方** lateral pterygoid 的拉扯\n- → 關節盤前移\n\n如果是前方關節囊拉伸，盤反而會**向後**移位（rare，稱 posterior disc displacement），臨床極罕見。\n\n## 臨床表現\n\n### 早期（Stage I-II）\n- **Clicking / popping sound**（張口、閉口時） ← (B) 正確\n- 輕度疼痛\n- 開口仍正常（> 40 mm）\n\n### 中期（Stage III）\n- 疼痛增加\n- 間歇性 locking\n- 咬合時僵硬\n\n### 晚期（Stage IV-V）\n- **Closed lock**（開口受限，< 30 mm）\n- 開口時**下巴偏向患側** ← (D) 正確\n  - 原因：患側髁無法向前滑動，只能健側代償\n- **S-curve opening**（開口路徑呈 S 型）\n- 關節炎 → crepitus（沙沙聲，不同於 clicking）\n\n## 流行病學\n\n- 成人盛行率 **5-12%**\n- 女性 > 男性（4-6:1）\n- TMJ 最常見疾患之一 ← (A) 正確\n- 相關因素：咬牙切齒（bruxism）、壓力、外傷、關節過度活動\n\n## 治療\n\n### 保守治療（> 90% 的病人首選）\n- **衛教**：軟食、避免大張口、避免咬硬物/口香糖\n- **熱敷、按摩**\n- **NSAIDs**（短期）\n- **肌肉放鬆劑**\n- **Occlusal splint / night guard**（咬合板）：減少夜間 bruxism\n- **物理治療**：\n  - 被動開口牽拉\n  - 下顎肌肉放鬆\n  - **手法治療（manual distraction）**：下壓髁 + 前拉 → 增加關節空間 ← (E) 正確\n- 姿勢矯正（頸部、肩部）\n\n### 中度治療\n- 關節內類固醇注射\n- **Hyaluronic acid 注射**\n- **Arthrocentesis**（沖洗關節腔，釋放沾黏）\n- **Botulinum toxin**（注射咀嚼肌，減少張力）\n\n### 手術（失敗 3-6 個月保守治療 + 嚴重功能障礙）\n- **Arthroscopy**\n- **Disc repositioning**\n- **Discectomy**\n- **Total joint replacement**（末期）\n\n## 開口受限程度分級\n\n| 正常 | > 40 mm（三指幅） |\n| 輕度受限 | 30-40 mm |\n| 中度 | 20-30 mm |\n| 重度 | < 20 mm |",
      "sources": [

        { "text": "UpToDate: Temporomandibular disorders in adults", "url": "https://www.uptodate.com/contents/temporomandibular-disorders-in-adults" }
      ]
    }

      "summary": "(E) 錯誤。**Reverse Thomas heel 用於 supinator 足（旋後足、高弓足）**，目的是支撐外側。Morton's toe（第二趾長於拇趾）常合併**前足內翻與過度內旋（pronation）**，應使用 **Thomas heel（傳統型，內側延伸支撐）** 而非 reverse Thomas heel。兩者方向相反。",
      "detail": "**Morton's Toe（摩頓趾）與足部裝具**\n\n## 名詞澄清（重要！容易混淆）\n\n台灣與國際文獻常混用以下三個名詞：\n\n| 名稱 | 定義 | 特徵 |\n|---|---|---|\n| **Morton's toe / foot** | **第二趾（或第二蹠骨）比第一趾長** | 解剖變異，壓力異常集中於第二蹠骨頭 |\n| **Morton's neuroma** | 第三、四蹠骨間跖神經**腫瘤樣增生** | Mulder's click、前足電擊痛 |\n| **Morton's metatarsalgia** | 第二蹠骨頭轉移性痛 | 本題所指 |\n\n本題「Morton's toe syndrome」指的是**第二趾過長導致前足力學失衡**，壓力異常集中於第二蹠骨頭，引發前足痛（metatarsalgia）。\n\n## 生物力學\n\n- 正常步態 push-off 階段，**第一趾（拇趾）** 承擔主要推進\n- Morton's toe：**第一蹠骨相對短**，無法有效承重\n- → 推進壓力**轉移至第二蹠骨頭**\n- → 第二蹠骨應力性傷害、關節囊炎、胼胝\n- 常合併 **forefoot varus（前足內翻）**，導致代償性 **subtalar pronation（過度內旋）**\n\n## 足部裝具處方原則\n\n### 1. 後足中立位置（subtalar neutral）← (C) 正確\n- 所有 custom orthosis 製作的**基本原則**\n- 在中立位取模，避免固定於異常姿勢\n\n### 2. Forefoot wedge（前足楔墊）← (A) 正確\n- **Forefoot varus**：內側墊高（medial forefoot post）\n- **Forefoot valgus**：外側墊高（lateral forefoot post）\n- 目的：讓前足在站立中期平均受力\n\n### 3. Medial heel wedge ← (B) 正確\n- **內側足跟楔墊**\n- 減少過度內旋（overpronation）\n- 支撐距骨下關節中立\n- 嚴重 pronation 者使用\n\n### 4. Toe box 考量 ← (D) 正確\n- Morton's toe 的第二趾突出，尖頭鞋會**壓迫擠壓第二趾**\n- 造成甲下出血、胼胝、拇趾外翻\n- 應選**寬楦頭、高鞋頭（high toe box）**\n\n### 5. 鞋跟選擇（★ 本題關鍵）\n\n| 鞋跟類型 | 延伸方向 | 用途 |\n|---|---|---|\n| **Thomas heel** | **內側延伸至舟狀骨（navicular）下方** | **支撐 medial arch，用於 pronator / flat foot / Morton's toe** |\n| **Reverse Thomas heel** | **外側延伸** | **支撐外側，用於 supinator / pes cavus / high arch** |\n| SACH heel | Solid Ankle Cushion Heel | 吸震，義足常用 |\n| Negative heel | 前高後低 | 矯正姿勢 |\n\n**Morton's toe 合併 pronation → 應使用 Thomas heel，不是 reverse Thomas heel**\n\n## 金屬壓力桿（Metatarsal bar / pad）\n\n另一個 Morton's toe 的重要處方：\n- **Metatarsal pad（舟狀骨下方到蹠骨頭近端）**\n- 作用：**將壓力從蹠骨頭轉移至蹠骨骨幹**\n- 位置：蹠骨頭近端 1 cm\n- Morton's extension：延伸至拇趾下方，強化第一蹠骨承重\n\n## 其他治療\n\n### 保守\n- 鞋具選擇（寬楦、避免尖頭、適當鞋跟）\n- 足部裝具（如上）\n- 伸展、強化內在肌\n- 貼紮、減重\n\n### 介入\n- 局部類固醇注射（若有明顯發炎）\n- PRP\n\n### 手術\n- 極少數嚴重病例：蹠骨截骨術（Weil osteotomy）\n\n## 考點整理\n\n| 鞋跟 | 方向 | 病況 |\n|---|---|---|\n| **Thomas heel** | 內側延伸 | **Morton's toe, flat foot, pronation** ★本題應選 |\n| **Reverse Thomas heel** | 外側延伸 | Pes cavus, supination |\n\n★ 記憶：**Thomas 支撐內側（正常），reverse 支撐外側（反向）**",

      "detail": "**常見手部副木與裝具原則**\n\n## 1. 手部休息副木（Resting Hand Splint）— (A) 正確\n\n又稱 **functional resting position splint**，目標是維持手部在「安全位置（position of safe immobilization / intrinsic plus position）」：\n\n| 關節 | 角度 |\n|---|---|\n| **Wrist** | Extension **20-30°** |\n| **MCP** | Flexion **20-30°**（部分文獻寫 30-70°，視病況） |\n| **PIP / DIP** | 輕度屈曲或伸展 |\n| **Thumb** | **Opposition + palmar abduction** |\n\n用途：\n- 中風後手（預防攣縮）\n- 術後固定\n- 類風濕性關節炎急性期\n- 夜間穿戴\n\n## 2. Volar vs Dorsal Wrist Splint（★ 本題關鍵）\n\n| 類型 | 硬板位置 | 優點 | 缺點 |\n|---|---|---|---|\n| **Volar（掌側）** | 手掌面 | **穩定度高**，覆蓋 FDS/FDP 抑制屈肌 | **妨礙抓握** |\n| **Dorsal（背側）** | 手背面 | **掌側空出，可抓握** | **穩定度較差** |\n| **Circumferential（全包式）** | 環狀 | **最穩定** | 重、散熱差、不便 |\n\n**正確敘述**：\n- Volar splint → 穩定 ↑，功能 ↓\n- Dorsal splint → 功能 ↑，穩定 ↓\n- Circumferential → 最穩定\n\n**(B) 選項把 volar 與 dorsal 的穩定度說反了。**\n\n## 3. Serial Volar Elbow Extension Splint — (C) 正確\n\n治療手肘屈曲攣縮（flexion contracture）：\n- 每週調整角度（漸進伸展）\n- 低負荷長時間伸展（LLPS, low-load prolonged stretch）原則\n- 適應：中風、TBI、燒燙傷、術後\n- 效果良好，研究證據充足\n\n## 4. Mobile Arm Support + Universal Cuff — (D) 正確\n\n**Mobile Arm Support (MAS) / Ball-Bearing Feeder**：\n- 協助**肩膀與手肘移動**\n- 常用於 **C4-C6 脊髓損傷**、重度肌肉無力（ALS、SMA）\n- 固定於輪椅上\n- 少量肌力（Grade 2）即可操作\n\n**Universal Cuff**：\n- 套在手掌上的皮帶\n- 可插入湯匙、牙刷、筆、打字棒\n- 補償抓握功能缺失\n- **C5-C6 SCI 病人典型處方**\n\n兩者合用可讓 C5-C6 SCI 病人獨立進食、盥洗、寫字。\n\n## 5. 抗痙攣副木（Anti-Spasticity Splint）— (E) 正確\n\n中風後痙攣性手部常見「拳頭緊握」型變形。抗痙攣副木設計原則：\n\n| 關節 | 角度 |\n|---|---|\n| **Wrist** | Extension **30°** |\n| **MCP** | Flexion **45°** |\n| **PIP, DIP** | **完全伸展** |\n| **Fingers** | **外展（abduction，Bobath 理論）** |\n| **Thumb** | Extension + abduction |\n\n**理論基礎**：\n- 手指外展 + 伸展：活化 Golgi tendon organ 抑制屈肌張力（Bobath）\n- 拇指外展：抑制 flexor tone\n- 維持 web space\n\n## 考點快速對照\n\n| 副木 | 關鍵角度 |\n|---|---|\n| Resting hand splint | Wrist 20-30° ext, MCP 20-30° flex, thumb opposition |\n| Anti-spasticity splint | Wrist 30° ext, MCP 45° flex, **PIP/DIP full ext + abd** |\n| Cock-up splint (wrist only) | Wrist 20-30° ext |\n\n## 穩定度排序（本題核心）\n\n**Circumferential > Volar > Dorsal**",

      "detail": "**周邊神經損傷常用裝具**\n\n## 1. 肘隧道症候群（Cubital Tunnel Syndrome）— (A) 正確\n\n壓迫**尺神經於肘管（cubital tunnel）**：\n- 肘屈曲 > 90° 時，尺神經張力與肘管壓力增加\n- 夜間睡覺時手肘常彎曲 → 症狀加重\n\n**裝具處方**：\n- **Long arm orthosis / elbow pad**\n- **肘屈曲 30-45°**（減少尺神經張力）\n- **夜間穿戴**\n- 避免枕手肘睡覺\n\n## 2. 腕隧道症候群（Carpal Tunnel Syndrome）— (B) ★ 錯誤\n\n壓迫**正中神經於腕隧道**：\n\n### 腕隧道內壓力（Gelberman 1981 經典研究）\n| 腕部角度 | 隧道壓力 |\n|---|---|\n| **0°（中立）** | **最低** ✓ |\n| 30° 伸展 | ↑↑ |\n| 45° 伸展 | ↑↑↑ |\n| 30° 屈曲 | ↑↑ |\n| 45° 屈曲 | ↑↑↑ |\n\n**→ Wrist cock-up splint 應置於 0°（neutral）或 ≤ 10° 伸展，絕不超過 20°**\n\n**為什麼 45° 錯誤？**\n- 45° 伸展使屈指肌腱向背側位移，壓迫正中神經\n- 夜間穿戴若 45° 會加重症狀\n\n### 正確處方\n- 角度：**0° ~ +5°** 伸展（neutral position）\n- 夜間為主（nocturnal splinting）\n- 白天工作時亦可\n- 效果：輕度 CTS 首選保守治療之一\n\n## 3. 尺神經損傷與 Figure-of-8 Splint — (C) 正確\n\n**尺神經低位損傷**：\n- 第 4、5 指內在肌（lumbricals）無力\n- → **Claw hand（爪型手）**：\n  - MCP **hyperextension**\n  - PIP/DIP **flexion**\n  - Benediction sign（握拳時第 4、5 指無法屈曲）\n\n**Anti-claw splint（常見 figure-of-eight splint）**：\n- 限制第 4、5 指 MCP **不過度伸展**，保持在 **輕微屈曲（20-30°）**\n- 允許 EDC 伸展 PIP/DIP\n- 改善功能性抓握\n\n## 4. Arm Flail Splint / 肩胛動力外骨骼 — (D) 正確\n\n**適應**：\n- 臂神經叢完全損傷\n- 上肢多重神經損傷\n- 截肢前後復健\n\n**原理**：\n- 利用**肩胛骨上抬**的動作\n- 透過背帶與傳動系統\n- 產生**肘部屈曲/伸直**\n- 類似身體動力型義肢（body-powered prosthesis）\n\n## 5. 橈神經損傷裝具 — (E) 正確\n\n橈神經損傷 → **Wrist drop + finger drop**（垂腕 + 垂指）\n\n### 處方\n- **動態裝具（dynamic splint）**：\n  - 彈簧或橡筋輔助**手腕與手指伸展**\n  - 允許主動屈曲\n  - 範例：**Benik wrist-finger splint**\n- **靜態 cock-up splint**：功能差，但較便宜\n\n### 目標\n- 恢復功能性抓握（需腕穩定）\n- 等待神經再生（通常 3-6 個月）\n\n## 常見神經損傷裝具速記表\n\n| 神經損傷 | 典型表現 | 裝具 |\n|---|---|---|\n| 正中神經（CTS） | 猿手、夜麻 | Wrist cock-up **中立位** |\n| 尺神經（低位） | Claw hand, Benediction sign | Anti-claw (Figure-8) |\n| 尺神經（肘部） | Claw + 肘痛 | Elbow pad, 肘屈曲 30-45° |\n| 橈神經（高位） | Wrist drop + finger drop | Dynamic wrist-finger ext splint |\n| 橈神經（PIN） | Finger drop, wrist OK | Dynamic finger ext splint |\n| 臂叢神經叢 | 全上肢功能喪失 | Arm flail orthosis |\n\n## 考點口訣\n\n**CTS 的副木** = **中立位（neutral）**，0° ± 幾度，**不超過 20°**\n\n45° 伸展絕對是錯的（壓力會倍增）。",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 14 \"Upper Limb Orthoses\"", "url": null },
        { "text": "Gelberman RH et al. The carpal tunnel syndrome. A study of carpal canal pressures. J Bone Joint Surg Am 1981;63:380", "url": "https://pubmed.ncbi.nlm.nih.gov/7204435/" },

      ]

    "explanation": {
      "summary": "(B) 錯誤。**T1 屬於高位胸椎**，TLSO / body jacket 的**固定上界約在 T6-T8**（取決於設計），T1 以上的病灶 TLSO 無法有效固定。**T1 病灶應使用 Cervicothoracic Orthosis (CTO) 或 Minerva orthosis**，甚至 halo vest。一般原則：**TLSO 對 T6 以上的穩定性不足**。",
      "detail": "**脊椎裝具（Spinal Orthoses）**\n\n## 脊椎裝具的層級\n\n| 裝具 | 涵蓋範圍 | 典型適應 |\n|---|---|---|\n| **Cervical collar**（soft/hard） | C-spine | 頸部扭傷、C-spine 穩定骨折 |\n| **Cervicothoracic Orthosis (CTO)** | C + **上胸椎** | C5-T2 |\n| **Minerva / SOMI / Halo** | C + 上胸椎（嚴格） | C1-T3 不穩定 |\n| **TLSO（body jacket）** | **T6-L4** | 中下胸、腰椎 |\n| **LSO（Chairback, Knight brace）** | L1-L5 | 下腰椎 |\n| **SIO（Sacroiliac orthosis）** | 骨盆 | SI joint 問題 |\n\n## TLSO 的固定範圍（★ 關鍵考點）\n\n### 上界\n- 前方：**胸骨切跡（sternal notch）**\n- 後方：**肩胛骨脊（scapular spine）**\n- → (C) 正確敘述\n- **實際脊椎固定的高度約為 T6-T8**（因為更高的胸椎受到肩胛骨活動影響無法有效固定）\n\n### 下界\n- 前方：恥骨聯合上方\n- 後方：薦尾骨或薦骨\n- **固定至 L4**（L5 因骨盆帶干擾效果較差）\n\n**→ T1-T3 的病灶 TLSO 無法有效固定！**\n\n## (B) 為什麼錯誤？\n\n**T1 轉移性骨折**：\n- 位置過高（T1 = 鎖骨附近）\n- TLSO 上界只到 sternal notch / scapular spine\n- 固定效果差，無法控制高位胸椎\n\n**正確選擇**：\n- **Minerva brace**（包覆下巴與後頭）\n- **SOMI (Sternal Occipital Mandibular Immobilizer)**\n- **Halo vest**（不穩定、病理性骨折首選）\n- **CTO**（次選）\n\n## 各式 TLSO 類型\n\n### 1. Custom Body Jacket（量身定製殼）\n- 熱塑性材料（polypropylene）\n- 前後兩片，side straps 固定\n- 最佳貼合與穩定\n- 適應：穩定骨折、術後固定、脊椎側彎\n\n### 2. Jewett Brace\n- **三點式壓力系統**：\n  1. 前方胸骨\n  2. 前方恥骨\n  3. 後方中胸椎（T10-L2 區）\n- **限制 flexion**，不限制 extension\n- 適應：T10-L2 **穩定壓迫骨折**\n\n### 3. CASH Brace（Cruciform Anterior Spinal Hyperextension）\n- 十字型前方壓力\n- 類似 Jewett，主要限制 flexion\n- 穿戴較簡單\n\n### 4. Knight-Taylor Brace\n- **三點式壓力系統限制 flexion + extension**\n- 範圍：T6-L4\n- **不建議用於不穩定骨折**（剛性不足）← (E) 正確\n- 可用於慢性背痛、stable compression fracture\n\n## 何時 body jacket 不適合？— (A) 正確\n\n- **胸管置入（chest tube）**：body jacket 壓迫插管部位\n- **腸造廔（ostomy）**：壓迫造瘻口\n- **嚴重皮膚損傷**\n- **過度肥胖**（fitting 困難）\n- **呼吸功能差**（可能進一步壓迫胸腔）\n- **懷孕**\n- **胸腹部傷口癒合不良**\n\n## Knight-Taylor 與不穩定骨折 — (E) 正確\n\n- Knight-Taylor 屬**半剛性（semi-rigid）**\n- 限制 flex/ext，但**軸向負荷控制不佳**\n- **不穩定骨折（Denis three-column injury、burst fracture）需要 rigid body jacket 或手術**\n\n## Denis 三柱理論（考脊椎穩定必考）\n\n| 柱 | 組成 |\n|---|---|\n| **前柱** | 前縱韌帶 + 椎體前 2/3 + 椎間盤前部 |\n| **中柱** | 椎體後 1/3 + 椎間盤後部 + 後縱韌帶 |\n| **後柱** | 椎弓 + 關節突 + 棘突 + 棘上/間韌帶 |\n\n- **兩柱以上受損 → 不穩定** → 需手術或 rigid immobilization\n\n## 考點整理\n\n| 病灶位置 | 建議裝具 |\n|---|---|\n| C1-C7 | Cervical collar / Halo |\n| C7-T3 | CTO / Minerva / SOMI / Halo |\n| **T1-T3** | **CTO / Minerva，不是 TLSO** ★本題 |\n| T6-L4（穩定） | TLSO (custom jacket, Jewett, CASH, Knight-Taylor) |\n| T6-L4（不穩定） | Rigid custom TLSO 或手術 |\n| L5 | LSO 效果差，多需手術 |",
      "sources": [

    "question": "肌萎縮側索硬化症 (amyotrophic lateral sclerosis, ALS) 病人會有漸進式的四肢無力，下列有關其裝具的處方，何者錯誤？",

      { "key": "C", "text": "如有爪型手 (claw hand)，可使用抗爪型手副木 (anticlaw splint)，避免近端指間關節 (PIP) 和遠端指間關節 (DIP) 過度屈曲" },

    "answer": "C",
    "explanation": {
      "summary": "(C) 錯誤在機轉。**Anticlaw splint（或 Figure-of-eight splint）** 的主要作用是**限制 MCP 關節過度伸展（hyperextension）**，讓 EDC 的力量能有效傳遞到 PIP/DIP 做伸展；它預防的是 **MCP hyperextension + PIP/DIP flexion** 的爪型變形，而**不是預防 PIP/DIP 過度屈曲**。此外 ALS 的爪型手機轉與典型尺神經損傷也不同。",
      "detail": "**肌萎縮側索硬化症（ALS）的裝具處方**\n\n## ALS 的功能退化與裝具介入時機\n\nALS 是漸進性上下運動神經元退化，最終影響四肢與呼吸肌。裝具的目標：\n1. **維持關節活動度、預防攣縮**\n2. **代償肌力不足，維持功能**\n3. **減少跌倒與關節傷害**\n4. **維持獨立與生活品質**\n5. **定期重新評估**（因病程進展快）\n\n## 1. Resting Hand Splint — (A) 正確\n\n- 日夜穿戴（取下讓被動運動）\n- 預防 wrist/finger **flexion contracture**\n- 保持拇指 web space\n- ALS 因全手屈曲張力（或無力）易攣縮\n\n## 2. Volar Cock-up Splint — (B) 正確\n\n當橈神經支配的伸腕肌（ECR, ECU）無力：\n- **Wrist drop（垂腕）**\n- 抓握功能下降（因為失去 tenodesis 效應）\n- **Volar cock-up splint**：\n  - 手腕固定於 **20-30° 伸展**\n  - 穩定腕關節，允許手指活動\n  - 恢復功能性抓握\n\n## 3. Anti-claw Splint（★ 本題關鍵）\n\n### 爪型手（Claw hand）的機轉\n- **Lumbricals（蚓狀肌）無力** → MCP 無法屈曲\n- EDC 無對抗力量 → **MCP hyperextension**\n- FDS/FDP 相對強勢 → **PIP/DIP flexion**\n- 結果：\n  - MCP 伸展過度（hyperextension）\n  - PIP、DIP 屈曲\n  - 手指呈「爪型」\n\n### Anti-claw Splint 的正確機轉\n- **主要限制 MCP hyperextension**\n- 將 MCP 固定在輕微屈曲（20-30°）\n- 讓 EDC 的伸展力**傳遞至 PIP/DIP**\n- **促進 PIP/DIP 伸展**，不是限制屈曲\n\n### (C) 為什麼錯誤？\n- 選項說「避免 PIP 和 DIP **過度屈曲**」\n- 正確：**防止 MCP 過度伸展 → 間接改善 PIP/DIP 伸展能力**\n- 機轉描述方向不對\n\n此外，ALS 的「爪型手」機轉是混合性（上下運動神經元同時），與單純尺神經麻痺的 benediction sign 不完全相同，但 anti-claw 原理仍適用。\n\n## 4. Hinged AFO with Plantar Flexion Stop — (D) 正確\n\nALS 常見 **foot drop**（脛前肌無力）+ 痙攣（UMN 受侵犯）：\n\n### 裝具選擇邏輯\n| 狀況 | AFO 選擇 |\n|---|---|\n| 純 foot drop（無痙攣） | **Posterior leaf spring AFO** |\n| Foot drop + 輕度痙攣 | **Hinged AFO with plantar flexion stop** ★ |\n| Foot drop + 重度痙攣 | **Solid AFO** |\n| Knee + ankle 控制需求 | **KAFO** |\n\n### Hinged AFO 的優點\n- 允許**背屈（dorsiflexion）**（動態步態）\n- **限制蹠屈（plantar flexion stop）**：\n  - 防止 foot drop\n  - 控制痙攣性 equinus\n- 比 solid AFO 更接近正常步態\n\n## 5. 皮膚檢視 — (E) 正確\n\nALS 病人感覺正常，但因：\n- 肌肉萎縮 → 骨突出\n- 水腫\n- 裝具穿戴時間長\n- 無法自行調整\n\n**必須定期檢查皮膚**（每日檢視 + 每週醫療評估）。\n\n## ALS 裝具處方的整體原則\n\n| 階段 | 症狀 | 裝具建議 |\n|---|---|---|\n| 早期 | 單側肌無力 | 單一副木（如 AFO） |\n| 中期 | 多區肌無力 | 多副木合併，加 MAS |\n| 晚期 | 全身無力 | Custom seating, power W/C |\n| 終末期 | 完全依賴 | 姿勢擺位、皮膚保護 |\n\n## 其他常見 ALS 輔具\n\n- **Cervical collar**（頸部伸肌無力、頭垂現象 head drop）\n- **Mobile arm support (MAS)**\n- **Power wheelchair with tilt/recline**\n- **NIV（非侵入性呼吸器）**\n- **Communication devices**（眼動追蹤、字板）",

    "explanation": {
      "summary": "(A) 錯誤有兩處：(1) 「窄楦頭」不正確，扁平足反而應選**寬楦頭（wide toe box）**以容納前足加寬的情形。(2) 專業名詞「shank」指的是**鞋底中段支撐結構（medial shank / steel shank）**，不是楦頭（toe box）。跑者扁平足應選「**堅固足跟 + 強化內側 shank（medial shank reinforcement）**」以減少過度內旋。",
      "detail": "**扁平足 (Pes Planus / Flat Foot) 的裝具處方**\n\n## 分類\n\n### 1. Flexible flat foot（彈性型）\n- **Non-weight-bearing：有足弓**\n- **Weight-bearing：足弓塌陷**\n- 兒童常見（多自行改善）\n- 成人：常合併韌帶鬆弛、PT (posterior tibial) dysfunction\n- 對裝具反應好\n\n### 2. Rigid flat foot（僵硬型）\n- Non-weight-bearing 與 weight-bearing 都無足弓\n- 可能合併：\n  - **Tarsal coalition**（跗骨融合）\n  - Charcot arthropathy\n  - 類風濕性關節炎\n  - Post-traumatic\n- 裝具作用有限，常需手術\n\n## 扁平足的力學連動鏈（★ 考點）\n\n扁平足常合併一連串代償：\n\n```\n足弓塌陷（arch collapse）\n    ↓\nCalcaneal eversion（跟骨外翻）\n    ↓\nSubtalar pronation（距下關節過度內旋）\n    ↓\nTibial internal rotation（脛骨內旋） ← (E) 正確\n    ↓\nKnee valgus（膝外翻）\n    ↓\nHip internal rotation（髖內旋）\n    ↓\nAnterior pelvic tilt（骨盆前傾）\n```\n\n## 鞋子結構名詞（重要！）\n\n| 構造 | 中文 | 位置 |\n|---|---|---|\n| **Toe box** | 楦頭 | 鞋前端，容納足趾 |\n| **Vamp** | 鞋面前部 | 覆蓋趾骨到蹠骨 |\n| **Shank** | **中底支撐板（鋼板/硬板）** | **前掌到後跟之間的中段** |\n| **Heel counter** | 後跟杯 | 包覆跟骨的硬結構 |\n| **Sole** | 鞋底 | 接觸地面 |\n| **Insole** | 鞋墊 | 鞋內襯墊 |\n\n**Shank ≠ toe box**\n\n## 扁平足跑者的正確處方\n\n- **寬楦頭（wide toe box）**：扁平足的前足較寬\n- **堅固的 heel counter**：固定跟骨\n- **Medial shank（內側強化的中段支撐）**：減少內旋\n- **低跟（low heel）**：避免加重前足壓力\n- **Motion control running shoes**：專為 overpronator 設計\n\n### (A) 為什麼錯誤？\n1. 「窄楦頭」：應為寬楦頭\n2. 「shank」用詞混淆：跟「楦頭」是不同部位\n3. 「減少內翻（inversion）」語意上也有問題——扁平足要減少的是**內旋（pronation / eversion）**，不是 inversion\n\n## 客製化鞋墊的目標 — (B) 正確\n\n- 將距下關節與跟骨固定於**中立位置**\n- 支撐內側縱弓\n- 控制過度 pronation\n- 重新分配壓力\n\n## 內側縱弓支撐 — (C) 正確\n\n韌帶鬆弛型扁平足（如 spring ligament 功能差）：\n- 簡單的 **medial arch support** 可改善\n- 市售 OTC 鞋墊即可\n- 疼痛緩解率約 60-80%\n\n## UCBL — (D) 正確\n\n**UCBL (University of California Biomechanics Laboratory) orthosis**：\n- **Semi-rigid custom orthosis**\n- **完全包覆跟骨 + 外側延伸**\n- **深杯型**（deep heel cup）\n- 提供**距下關節最大穩定度**\n- 適應：\n  - 嚴重 pronation\n  - PT (posterior tibial) tendon dysfunction\n  - 兒童 flexible flat foot\n  - **比一般鞋墊更能固定 subtalar joint**\n\n## 扁平足處方階梯\n\n| 嚴重度 | 處方 |\n|---|---|\n| 輕度 | OTC arch support + 運動 |\n| 中度 | Custom orthosis + medial shank shoe |\n| 中重度 | **UCBL** |\n| 重度（with pain, deformity） | **AFO / Arizona brace** |\n| 僵硬 + 嚴重變形 | 手術（reconstruction） |\n\n## PT Tendon Dysfunction（成人 acquired flat foot）\n\n常見病因，分 4 期：\n| 期 | 特徵 | 處置 |\n|---|---|---|\n| I | 肌腱炎無變形 | Short leg cast/boot → orthosis |\n| II | 可矯正變形 | **UCBL / Arizona brace** |\n| III | 固定變形 | AFO / fusion 手術 |\n| IV | 踝關節涉及 | 手術 |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 13 \"Lower Limb Orthoses\"", "url": null },
        { "text": "Lusardi MM, Nielsen CC. Orthotics and Prosthetics in Rehabilitation. 3rd ed. Saunders, 2013", "url": null },
        { "text": "Mosca VS. Flexible flatfoot in children and adolescents. J Child Orthop 2010;4:107", "url": "https://pubmed.ncbi.nlm.nih.gov/21455468/" },
        { "text": "Johnson KA, Strom DE. Tibialis posterior tendon dysfunction. Clin Orthop Relat Res 1989;239:196", "url": "https://pubmed.ncbi.nlm.nih.gov/2912622/" }
      ]
    }

    "category": "副木裝具",
    "question": "下列有關踝足矯具 (Ankle-Foot Orthoses, AFOs) 應用與設計之敘述，何者正確？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "使用金屬和皮革材質的矯具適用於所有體型的病人，因為它們提供最佳的穩定性與外觀效果" },
      { "key": "B", "text": "為控制膝關節過伸 (genu recurvatum)，應選擇設計為踝關節完全可動的 AFO，以保持行走時的膝部穩定性" },
      { "key": "C", "text": "具有膝蓋及踝關節無力但髖關節伸展肌力充足的病人，應考慮使用熱塑性或層壓式髕骨肌腱承重式 AFO (PTB-AFO)" },
      { "key": "D", "text": "對於因中樞神經損傷導致的下肢內翻馬蹄足 (equinovarus deformity)，矯具應避免使用止動裝置以防限制運動範圍" },
      { "key": "E", "text": "為改善擺盪期的步態，矯具應採用完全剛性設計以避免腳踝在步態期過度背屈" }
    ],
    "answer": "C",
    "explanation": {
      "summary": "(C) 正確。**PTB-AFO（Patellar Tendon-Bearing AFO）** 透過髕骨肌腱承重機制，可將部分下肢負重**從遠端傳遞至近端**（類似 PTB 截肢承筒），適用於膝、踝無力但**髖伸肌力良好**的病人；常見適應包括脛骨應力性骨折、慢性 Charcot 足、跟骨骨折、小兒麻痺等。",
      "detail": "**踝足矯具（AFO）的完整分類與臨床應用**\n\n## AFO 材質分類\n\n### 1. Metal upright AFO（雙側金屬支柱）\n- 皮革 + 金屬支柱\n- **重、不美觀**\n- **耐用、承重能力高**\n- 適合：\n  - 重度痙攣\n  - 嚴重水腫（可調整）\n  - 感覺缺損（鬆緊度可微調）\n  - 皮膚狀況差\n- **不是「適用所有體型」**（選項 A 錯誤）\n\n### 2. Thermoplastic AFO（熱塑性塑膠）\n- **Polypropylene**\n- 輕、美觀\n- 適合大多數 foot drop 病人\n- 不適合：嚴重水腫、劇烈運動、極重度痙攣\n\n### 3. Carbon fiber AFO\n- 最輕、彈性好\n- 適合高功能病人（運動、回工作）\n- 價格高\n\n### 4. Custom laminated AFO\n- 層壓式複合材料\n- 客製化，最佳貼合\n\n## AFO 的「踝關節設計」分類\n\n| 類型 | 踝活動度 | 適應 |\n|---|---|---|\n| **Solid AFO** | 固定（0°） | 重度痙攣、完全 foot drop、不穩定 |\n| **Posterior Leaf Spring (PLS)** | 允許少許背屈 | 輕度 foot drop（如 peroneal palsy） |\n| **Hinged AFO** | 可背屈，限制蹠屈 | Foot drop + 輕度痙攣 |\n| **Hinged AFO with PF stop** | 限制蹠屈 | 預防 foot drop + 維持背屈 |\n| **Hinged AFO with DF stop** | 限制背屈 | 預防膝屈曲（quad 無力） |\n| **Articulated AFO with both stops** | 雙向限制 | 雙向不穩 |\n\n## PTB-AFO（★ 本題答案）\n\n### 原理\n- 靈感來自 **PTB（patellar tendon-bearing）截肢承筒**\n- 承重點從**腳底 → 髕骨肌腱（patellar tendon）+ 脛骨內側髁**\n- 可**減少遠端下肢承重 30-50%**\n\n### 適應\n- **Tibial stress fracture**（脛骨應力性骨折）\n- **Charcot foot**（慢性神經病變足）\n- **Calcaneal fracture**（跟骨骨折術後）\n- **Pilon fracture**\n- **Polio sequelae**\n- **Distal tibia/ankle 慢性疼痛**\n\n### 必要條件\n- **髖伸肌（gluteus maximus）肌力良好** → 才能控制 PTB 支撐時的代償步態\n- 膝可穩定\n- 髕骨肌腱完整、無皮膚病灶\n\n## 各選項分析\n\n### (A) 金屬皮革 AFO — 錯\n- 僅適用特定情境（水腫、嚴重痙攣等）\n- 非「所有體型」通用\n- 外觀差\n\n### (B) Genu recurvatum（膝過度伸展）— 錯\n- **完全可動的踝關節 AFO 無法控制 genu recurvatum**\n- 正確：應用 **AFO with plantar flexion stop**（限制蹠屈）\n  - 機轉：站立期蹠屈 → 膝向後推 → 過度伸展\n  - 限制蹠屈 → 減少膝過伸力矩\n- 甚至使用 **solid AFO（slight dorsiflexion 5°）**\n\n### (C) PTB-AFO — ★ 正確\n\n### (D) Equinovarus（馬蹄內翻足）— 錯\n- 中樞神經受損後（如中風）的痙攣性畸形\n- 不是「避免止動」\n- 反而**需要 T-strap + varus/valgus correction stops** 來控制內翻\n- 嚴重者可能需**肉毒桿菌 + 矯形手術**\n\n### (E) 擺盪期步態 — 錯\n- 「完全剛性 + 避免過度背屈」矛盾\n- 改善擺盪期 foot drop 通常用 **PLS AFO**（允許少量動態），不是完全剛性\n- 完全剛性 AFO 反而讓踝關節在站立期僵硬，步態不自然\n\n## 常見神經病變的 AFO 處方速記\n\n| 情境 | AFO |\n|---|---|\n| 單純 foot drop（腓神經麻痺） | **PLS AFO** |\n| 中風 foot drop + 輕痙攣 | **Hinged AFO + PF stop** |\n| 中風重度痙攣 + equinovarus | **Solid AFO + T-strap** |\n| ALS foot drop | Hinged AFO + PF stop |\n| Polio 膝踝無力 | **KAFO 或 PTB-AFO**（本題） |\n| Genu recurvatum | AFO with PF stop |\n| Drop foot + quad weakness | KAFO |\n| Charcot foot | **PTB-AFO** 或 CROW boot |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 13 \"Lower Limb Orthoses\"", "url": null },
        { "text": "Lusardi MM, Jorge M, Nielsen CC. Orthotics and Prosthetics in Rehabilitation. 3rd ed. Saunders, 2013", "url": null },
        { "text": "Bowker JH, Michael JW (Eds.). Atlas of Limb Prosthetics: Surgical, Prosthetic, and Rehabilitation Principles. Mosby, 1992", "url": null },
        { "text": "Saltzman CL et al. Patellar tendon-bearing brace treatment for adult-acquired flatfoot. Foot Ankle Int 2004;25:2", "url": "https://pubmed.ncbi.nlm.nih.gov/14768955/" }
      ]
    }

    "id": "114-1-113",

    "question": "下列有關常見足部畸形 (deformities) 與問題的鞋具選擇敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "前足蹠痛症 (metatarsalgia) 的鞋具處方應包括寬楦頭（wide width）以減少橫向足弓的壓力、長鞋型（long fitting）以消除蹠趾關節過度蹠屈、高鞋頭（high toe box）以允許前足屈伸" },
      { "key": "B", "text": "種子骨炎（sesamoiditis）的鞋具處方目的是將第一蹠趾關節及其種子骨的承重轉移至足弓（long medial arch）和較小的蹠骨的骨幹（shafts of the lesser metatarsals），並通常包括橫向蹠骨桿（transverse metatarsal bar）以重新分配壓力" },
      { "key": "C", "text": "拇趾外翻（hallux valgus）的鞋具應選擇帶有高且寬鞋頭（high and wide toe box）的設計，並包括低跟（low heel）以減少前足壓力，以及強化的內側支撐以防止足部過度旋後（supination）" },
      { "key": "D", "text": "錘狀趾（hammer toe）、爪狀趾（claw toe）和槌狀趾（mallet toe）的鞋具目標是減少蹠骨頭和近端指節間關節（PIP joint）的壓力，並促進蹠趾關節屈曲與近端指節間關節伸展" },
      { "key": "E", "text": "扁平足（pes planus）的鞋具處方，彈性型扁平足（flexible pes planus）可用 Thomas heel，而僵硬型扁平足（rigid pes planus）則可在中足加寬" }
    ],
    "answer": "C",
    "explanation": {
      "summary": "(C) 錯誤在「防止過度**旋後（supination）**」。拇趾外翻常合併**扁平足與過度旋前（pronation）**，應**強化內側支撐以防止過度旋前**，不是旋後。旋後（supinator foot、高弓足）反而是拇趾外翻的**保護因子**，不需預防。方向寫反了。",
      "detail": "**常見足部畸形鞋具處方**\n\n## 1. Metatarsalgia（前足蹠痛症）— (A) 正確\n\n前足蹠骨頭疼痛的統稱，原因：\n- Morton's toe（第二趾長）\n- Interdigital neuroma（Morton's neuroma）\n- 前足肥厚脂肪墊萎縮\n- 蹠骨骨折舊傷\n- 類風濕性關節炎\n- 糖尿病足部潰瘍前期\n\n### 鞋具處方\n- **寬楦頭（wide toe box）**：減少橫向足弓壓力\n- **足夠長度**：消除 MTP 過度蹠屈\n- **高鞋頭（high toe box）**：允許前足屈伸\n- **Metatarsal pad / bar**：將蹠骨頭壓力分散至蹠骨骨幹\n- **Rocker bottom sole**：減少滾動時前足負重\n- **Cushioned insole**\n\n## 2. Sesamoiditis（種子骨炎）— (B) 正確\n\n種子骨位於第一蹠骨頭下方，兩顆（medial + lateral）：\n- 功能：增加屈拇肌的力矩\n- 承重：站立與推進時承受壓力\n- 運動員、芭蕾舞者好發\n\n### 鞋具處方\n- **轉移壓力**：\n  - 從**第一 MTP + 種子骨**\n  - 至**足弓與其他蹠骨骨幹**\n- **Transverse metatarsal bar** 或 **Morton's extension**\n- **低跟鞋**（高跟加重前足壓力）\n- **Cushioned pad 於種子骨下方**（減壓）\n\n## 3. Hallux Valgus（拇趾外翻）★ 本題\n\n### 病理\n- **第一蹠骨內翻**（metatarsus primus varus）\n- **拇趾外翻**\n- 常合併：\n  - **扁平足 + overpronation** ★\n  - 韌帶鬆弛\n  - 窄楦頭鞋子（女性好發）\n\n### 正確鞋具處方\n- **高、寬鞋頭（high + wide toe box）**：減少摩擦擠壓\n- **低跟（low heel）**：減少前足壓力\n- **強化內側支撐（medial support）防止過度 PRONATION**（旋前）\n- **Arch support**：支撐塌陷的內側縱弓\n- **Bunion splint / toe spacer**（夜間）\n\n### (C) 為什麼錯誤？\n- 選項寫「防止過度 **supination（旋後）**」\n- 正確：**防止過度 PRONATION（旋前）**\n- 旋後（inversion, high arch）會讓第一蹠骨負重**減少**，反而**保護**拇趾\n- 旋前（eversion, flat foot）會讓第一蹠骨內側負重**增加**，**加劇**拇趾外翻\n\n## 4. Hammer / Claw / Mallet Toe（足趾變形）— (D) 正確\n\n| 變形 | MTP | PIP | DIP |\n|---|---|---|---|\n| **Hammer toe** | 伸展 | **屈曲** | 伸展 |\n| **Claw toe** | **過度伸展** | **屈曲** | **屈曲** |\n| **Mallet toe** | 中立 | 中立 | **屈曲** |\n\n### 鞋具目標\n- **減少蹠骨頭與 PIP 壓力**\n- **促進 MTP 屈曲、PIP 伸展**（即恢復正常足趾姿態）\n- **High toe box**：容納屈曲變形\n- **Metatarsal pad**：減少蹠骨頭壓力\n- **Toe crest / crest pad**：支撐屈曲的趾節\n- **矯正鞋墊**\n\n## 5. Pes Planus 鞋具 — (E) 正確\n\n### Flexible pes planus\n- **Thomas heel**（內側延伸至舟狀骨）\n- Medial shank reinforcement\n- UCBL（嚴重者）\n\n### Rigid pes planus\n- 裝具效果有限\n- **中足加寬鞋**（accommodate deformity）\n- Custom-molded orthosis\n- 嚴重需手術\n\n## 考點速記\n\n| 變形 | 關鍵鞋具處方 |\n|---|---|\n| Hallux valgus | Wide + high toe box, 防**PRONATION** ★ |\n| Metatarsalgia | Wide, high toe box, met pad |\n| Sesamoiditis | Transverse met bar, low heel |\n| Hammer/claw toe | High toe box, met pad |\n| Flexible flat foot | Thomas heel, medial shank |\n| Rigid flat foot | Widened midfoot shoe |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 13 \"Lower Limb Orthoses\"", "url": null },
        { "text": "Janisse DJ, Janisse E. Shoe modification and the use of orthoses in the treatment of foot and ankle pathology. J Am Acad Orthop Surg 2008;16:152", "url": "https://pubmed.ncbi.nlm.nih.gov/18316713/" },
        { "text": "Coughlin MJ, Jones CP. Hallux valgus: demographics, etiology, and radiographic assessment. Foot Ankle Int 2007;28:759", "url": "https://pubmed.ncbi.nlm.nih.gov/17666168/" },
        { "text": "Glasoe WM et al. First ray kinematics in women with rheumatoid arthritis and bunion deformity. Foot Ankle Int 2014;35:1205", "url": "https://pubmed.ncbi.nlm.nih.gov/25092821/" }
      ]
    }

    "choices": [

      { "key": "B", "text": "在近端指骨附近肌腱受損，易造成鈕扣指畸形，可利用手指副木固定近端指節在伸展位置 6 週" },
      { "key": "C", "text": "若是掌骨處肌腱受損，經手術修復，可將修復手固定在腕關節伸展 40 度，指骨關節全伸展位置 6 週" },
      { "key": "D", "text": "若接受手術，於術後第 4 週起，逐步練習修復肌腱的主動運動、肌力、耐力等活動" },
      { "key": "E", "text": "術後 4 週起，可逐步開始從事居家日常活動" }

    "answer": "C",
    "explanation": {
      "summary": "(C) 錯誤在角度與關節位置。掌骨區（zone V-VI）伸肌腱修補後，經典 dorsal block splint 的位置是：**腕關節伸展 30-40°（可接受），但 MCP 關節屈曲 0-20°（近乎伸展 / 輕度屈曲），IP 關節自由或輕度屈曲**，而非「**指骨關節全伸展**」。全伸展 MCP 會使修補肌腱過度鬆弛且容易造成 MCP 關節僵硬。",
      "detail": "**伸指肌腱損傷與副木治療**\n\n## Verdan 伸肌腱分區（Zones of Injury）\n\n伸肌腱損傷依位置分為 9 區（奇數在關節、偶數在中間）：\n\n| Zone | 位置 | 典型傷害 |\n|---|---|---|\n| **I** | DIP 關節之上（terminal tendon） | **Mallet finger（槌狀指）** |\n| **II** | 中節指骨 | |\n| **III** | PIP 關節（central slip） | **Boutonniere（鈕扣指）** |\n| **IV** | 近節指骨 | |\n| **V** | MCP 關節 | Fight bite（人咬傷） |\n| **VI** | **掌骨背側** | |\n| **VII** | Extensor retinaculum（腕背） | |\n| **VIII** | 前臂遠端 | |\n| **IX** | 肌腹 | |\n\n## 1. Mallet Finger (Zone I) — (A) 正確\n\n### 機轉\n- **Terminal extensor tendon 從 DIP 遠節指骨背側附著處斷裂**\n- 可合併 avulsion fracture\n- 表現：**DIP 無法主動伸展（垂指）**\n\n### 保守治療\n- **DIP 伸展副木 6-8 週**（日夜）\n- 接著逐漸減少穿戴 2-4 週\n- **必須維持 DIP 持續伸展**（取下的一瞬間若 flex 會前功盡棄）\n- PIP **保持活動**（避免僵硬）\n\n### (A) 正確，8 週是標準時間\n\n## 2. Boutonniere Deformity (Zone III) — (B) 正確\n\n### 機轉\n- **Central slip（中央束）斷裂於 PIP 關節背側**\n- Lateral bands 向掌側移位\n- 表現：\n  - **PIP 屈曲**\n  - **DIP 過度伸展**\n  - 形似「鈕扣穿過扣眼」\n\n### 保守治療\n- **PIP 伸展副木 6 週**\n- **DIP 保持主動活動**（防 lateral band 攣縮）\n- 漸進式減少穿戴\n\n### (B) 正確，6 週是標準\n\n## 3. Zone V-VI Repair（★ 本題關鍵）\n\n掌骨背側伸肌腱損傷通常需**手術修補**。\n\n### Dorsal Block Splint / Early Mobilization 原則\n\n**經典做法（Immobilization）**：\n- **Wrist：30-40° extension**\n- **MCP：0-20° flexion**（近乎中立，略屈）\n- **IP joints：0° 伸展 or 自由活動**\n- **4-6 週固定**\n\n**關鍵：MCP 不應「完全伸展」**，因為：\n1. **MCP 0° 伸展 + wrist 40° ext**：肌腱過度鬆弛，修補處癒合品質差\n2. MCP 長時間完全伸展 → **collateral ligament 攣縮** → 僵硬，難屈曲\n3. MCP 安全位置（functional / intrinsic plus）應是 **20-30° 屈曲**\n\n### (C) 為什麼錯誤？\n\n選項寫：\n- Wrist extension 40° ← 可接受\n- **指骨關節「全伸展」** ← ✗\n\n正確應為：**MCP 輕度屈曲（0-20°）+ IP 自由/輕屈**\n\n### 現代做法：早期主動活動（Early Active Motion）\n- **Relative motion splint**（Yoke splint）\n- 允許早期主動伸展\n- 縮短復健時間\n- 傷指 MCP 比鄰指高 15-20°\n\n## 4. 術後時間軸 — (D)(E) 正確\n\n### 經典伸肌腱修補後時程\n\n| 時間 | 活動 |\n|---|---|\n| 0-4 週 | **完全固定**（static splint） |\n| 4 週 | 開始**主動活動**（去副木練習） |\n| 4-6 週 | 漸進肌力訓練、輕度居家活動 |\n| 6-8 週 | 去副木（白天） |\n| 8-12 週 | 阻力訓練、全面回運動 |\n| 12 週 | 重活、競技運動 |\n\n## 手部副木安全位置（記憶重點）\n\n**Intrinsic plus / position of safe immobilization**：\n- Wrist: 20-30° extension\n- **MCP: 60-70° flexion**（collateral ligament 拉緊 → 防攣縮）\n- **PIP/DIP: full extension**\n- Thumb: palmar abduction\n\n此為「休息副木」，**與伸肌腱修補後的 dorsal block 不同**！\n\n## 常見伸肌腱副木角度速記\n\n| 情境 | Wrist | MCP | PIP/DIP |\n|---|---|---|---|\n| Mallet finger (Zone I) | — | — | **DIP ext 8 wks** |\n| Boutonniere (Zone III) | — | free | **PIP ext 6 wks** |\n| **Zone V-VI repair** | **30-40° ext** | **0-20° flex** | **0° or 輕屈** |\n| Resting hand splint | 20-30° ext | 60-70° flex | 0° |",
      "sources": [
        { "text": "Braddom's PM&R, 6th ed., Ch. 41 \"Musculoskeletal Disorders of the Upper Limb\"", "url": null },

        { "text": "Howell JW, Peck F. Rehabilitation of flexor and extensor tendon injuries in the hand: current updates. Injury 2013;44:397", "url": "https://pubmed.ncbi.nlm.nih.gov/23465090/" }
      ]

    "question": "下列有關全身震動療法 (whole body vibration therapy) 之敘述，何者錯誤？",
    "imageUrl": null,
    "choices": [
      { "key": "A", "text": "強直性振動反射 (tonic vibration reflex) 是解釋全身震動療法所引發反射性肌肉活動的機制" },
      { "key": "B", "text": "全身震動療法的效果包括增強肌肉力量和爆發力，但可能增加跌倒風險，故不適用於老年人" },
      { "key": "C", "text": "對於肥胖的病人，10 週以上的訓練可減少體重/脂肪量，也可增強腿部力量，效果如同阻力訓練" },
      { "key": "D", "text": "對於骨質密度低的兒童和青少年，全身震動療法在下肢和腰椎的骨質密度方面有所改善，但對於停經後婦女的改善較少" },
      { "key": "E", "text": "深靜脈血栓 (deep venous thrombosis)、中風或脊髓損傷後的痙攣 (spasticity)、眩暈 (vertigo) 等皆是全身震動療法的禁忌症" }

    "explanation": {
      "summary": "(B) 錯誤在「不適用於老年人」。大量研究（Rogan 2011 系統性回顧、Bogaerts 2007 RCT）顯示 WBV **在老年人身上可改善肌力、平衡、步態穩定，實際上能夠降低跌倒風險**，而非增加。老年人是 WBV 的主要目標族群之一。",
      "detail": "**全身震動療法（Whole Body Vibration, WBV）**\n\n## 原理\n\n病人站立於震動平台上，平台以特定頻率與振幅震動，誘發：\n\n### 1. Tonic Vibration Reflex (TVR)（★ 主要機轉）\n- 震動 → 刺激肌梭的 **Ia afferents**\n- 活化 α-motor neuron\n- 產生反射性肌肉收縮\n- 頻率範圍：**20-50 Hz**\n\n### 2. 神經肌肉活化\n- 增加 motor unit recruitment\n- 提升本體感覺輸入\n- 改善平衡與協調\n\n### 3. 內分泌效應\n- 刺激 growth hormone、testosterone 分泌\n- 促進骨形成\n\n## 震動參數\n\n| 參數 | 範圍 |\n|---|---|\n| 頻率 | 20-50 Hz |\n| 振幅 | 2-10 mm |\n| 時間 | 每次 1-10 分鐘 |\n| 頻率 | 每週 2-3 次 |\n| 療程 | 8-12 週以上 |\n\n## 兩種震動平台\n\n### 1. Synchronous（同步式）\n- 整個平台垂直上下震動\n- 例：Power Plate\n\n### 2. Side-alternating（交替式，Galileo）\n- 左右像蹺蹺板\n- 較符合走路力學\n- 髖部與脊椎壓力較小\n\n## 臨床效益\n\n### 1. 肌力與爆發力\n- 提升下肢等長肌力 10-20%\n- Jump performance 改善\n- **可能作為阻力訓練的替代**（部分研究支持）\n\n### 2. 老年人 — (B) ★ 關鍵考點\n- **Bogaerts et al. 2007**：65 歲以上老人，12 個月 WBV → 肌力、平衡、速度顯著改善\n- **Rogan 2011 Cochrane-like review**：\n  - WBV 對老年人**安全**\n  - **改善平衡、減少跌倒**\n  - 改善 Timed Up & Go\n- **並非不適用於老人**，反而是重要適應\n- 老年人 WBV 注意：\n  - 避免極高頻（< 40 Hz 較安全）\n  - 避免極高振幅\n  - 需扶把手\n\n### 3. 肥胖者 — (C) 正確\n- Milanese 2013 等研究：10-12 週 WBV\n- 可減少體脂、增加瘦肉組織\n- 效果類似中等強度阻力訓練\n- 優勢：低衝擊、時間短、對關節友善\n\n### 4. 骨質密度 — (D) 正確\n- **兒童/青少年**（低骨密、CP、腦瘤存活者）：有顯著改善\n- **停經後婦女**：證據不一致，效果有限（meta-analyses 混合結果）\n- **脊髓損傷**：維持骨質有限效果\n\n### 5. 其他應用\n- 中風復健（改善下肢力量、步態）\n- 多發性硬化症\n- 纖維肌痛\n- 帕金森氏症\n- 糖尿病周邊神經病變\n\n## 禁忌症（Crewther 2004, ACSM）— (E) 正確\n\n### 絕對禁忌\n- **急性 DVT / 血栓栓塞**（震動可能使血栓脫落）\n- **急性發炎或感染**\n- **急性骨折、未癒合骨折**\n- **腫瘤**\n- **懷孕**\n- **癲癇**\n- **心律節律器**\n- **急性椎間盤突出**\n- **近期關節置換**\n\n### 相對禁忌\n- 嚴重骨質疏鬆（需評估）\n- **眩暈、頭暈**\n- **痙攣加劇的中風/SCI**\n- 糖尿病視網膜病變\n- 膽石症、腎結石\n- 近期手術\n\n## 注意事項\n\n- 微屈膝姿勢（避免震動直接傳到脊椎/頭）\n- 赤足或軟底鞋（減少衝擊）\n- 循序漸進（先低頻低振幅）\n- 心血管病人需醫師評估\n\n## 考點總結\n\n| 族群 | WBV 效果 |\n|---|---|\n| **老人** | **改善肌力、平衡，降低跌倒（★ 本題）** |\n| 肥胖 | 減重、增肌，效果類阻力訓練 |\n| 兒童青少年低骨密 | 骨密改善明顯 |\n| 停經後婦女 | 證據不一、效果有限 |\n| SCI | 肌痙攣改善、骨密效果有限 |\n| 中風 | 下肢肌力、步態改善 |",
      "sources": [

        { "text": "Bogaerts AC et al. Impact of whole-body vibration training versus fitness training on muscle strength and muscle mass in older men: a 1-year randomized controlled trial. J Gerontol A Biol Sci Med Sci 2007;62:630", "url": "https://pubmed.ncbi.nlm.nih.gov/17595419/" },
        { "text": "Rittweger J. Vibration as an exercise modality: how it may work, and what its potential might be. Eur J Appl Physiol 2010;108:877", "url": "https://pubmed.ncbi.nlm.nih.gov/20012646/" },
        { "text": "Prisby RD et al. Effects of whole body vibration on the skeleton and other organ systems in man and animal models: what we know and what we need to know. Ageing Res Rev 2008;7:319", "url": "https://pubmed.ncbi.nlm.nih.gov/18547874/" }

    "choices": [

      { "key": "D", "text": "American College of Foot and Ankle Surgeons 已將震波治療列為足底筋膜病變，在接受保守治療失敗後的治療建議" },
      { "key": "E", "text": "使用聚焦式震波治療足底筋膜病變的治療建議，一般是每次 4000 發，治療強度為 0.5 mJ/mm² ，治療頻率為 10 Hz" }
